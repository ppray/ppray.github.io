# 每日危机诊断：美股收盘后自动运行，把诊断结果追加到 crisis-watch/data/crisis_log.csv 并提交。
# 仓库整体作为 GitHub Pages / Vercel 发布，dashboard.html 启动时自动 fetch 同目录下 data/ 数据。
#
# 路径：.github/workflows/daily-detect.yml
# 首次使用：仓库 Settings → Actions → 允许工作流写仓库内容（默认已允许）
# 手动触发：仓库 Actions 页面 → daily-crisis-detect → Run workflow

name: daily-crisis-detect

on:
  schedule:
    # GitHub cron 用 UTC。21:30 UTC = 美东收盘（16:00 ET）后约半小时，周一至周五。
    # 注意夏令时切换时实际本地时间会漂移 1 小时。
    - cron: "30 21 * * 1-5"
  workflow_dispatch: {}   # 允许手动触发，方便首次测试

permissions:
  contents: write          # 允许把更新后的数据提交回仓库

concurrency:
  group: daily-detect
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 安装依赖
        run: pip install yfinance pandas numpy

      - name: 运行每日诊断
        run: |
          mkdir -p crisis-watch/data
          python crisis-watch/crisis_screener.py --detect --log crisis-watch/data/crisis_log.csv

      # 每周五额外跑一次全量个股筛选（crisis-watch/universe.txt 由 build_universe.py 生成，
      # 每行一个股票代码，如 AAPL / 0700.HK）。continue-on-error 保证筛选因限流失败时，
      # 当天已成功的诊断日志仍能正常提交。
      - name: 每周个股筛选
        continue-on-error: true
        run: |
          if [ "$(date -u +%u)" != "5" ]; then
            echo "非周五，跳过个股筛选"
          elif [ ! -f crisis-watch/universe.txt ]; then
            echo "未找到 crisis-watch/universe.txt，跳过个股筛选"
          else
            python crisis-watch/crisis_screener.py --crisis auto \
              --file crisis-watch/universe.txt \
              --out crisis-watch/data/screen_results.csv
          fi

      - name: 提交数据更新
        run: |
          git config user.name "crisis-bot"
          git config user.email "actions@users.noreply.github.com"
          git add crisis-watch/data/
          git diff --cached --quiet && echo "无变化，跳过提交" && exit 0
          git commit -m "detect: $(date -u +%Y-%m-%d) 自动诊断"
          git push
