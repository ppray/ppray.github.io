<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考点背诵助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg: #f0ece2;
            --card: #faf7f1;
            --ink: #4a4540;
            --muted: #9a9590;
            --border: #ddd5c8;
            --green: #5a8a6a;
            --green-bg: #eaf0ec;
            --red: #b07070;
            --red-bg: #f5eaea;
            --blue: #6a8899;
            --blue-bg: #eaeff3;
            --gold: #b89a40;
            --shadow: 0 2px 12px rgba(60,50,40,0.07);
            --radius: 12px;
        }

        body {
            font-family: 'Noto Serif SC', Georgia, serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            -webkit-text-size-adjust: 100%;
        }

        .app {
            max-width: 520px;
            margin: 0 auto;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── 顶栏 ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            margin-bottom: 12px;
        }

        .topbar-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: 1px;
        }

        .topbar-stats {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.82rem;
            color: var(--muted);
        }

        .topbar-stats b {
            font-weight: 700;
            color: var(--ink);
        }

        .accuracy-pill {
            background: var(--green-bg);
            color: var(--green);
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.82rem;
        }

        .accuracy-wrap {
            position: relative;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .help-trigger {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: var(--card);
            color: var(--muted);
            font-size: 0.7rem;
            font-family: inherit;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: all 0.2s;
        }

        .help-trigger:active { transform: scale(0.9); }

        .help-popover {
            position: absolute;
            top: calc(100% + 8px);
            right: -10px;
            width: 210px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: var(--shadow);
            padding: 14px 16px;
            font-size: 0.8rem;
            line-height: 1.7;
            color: var(--ink);
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-4px);
            transition: all 0.2s ease;
        }

        .help-popover.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .help-popover::before {
            content: '';
            position: absolute;
            top: -6px;
            right: 14px;
            width: 10px;
            height: 10px;
            background: var(--card);
            border-left: 1px solid var(--border);
            border-top: 1px solid var(--border);
            transform: rotate(45deg);
        }

        .help-popover b {
            color: var(--ink);
            font-weight: 700;
        }

        /* ── 筛选条 ── */
        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .filter-chip {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            background: var(--card);
            font-family: inherit;
            font-size: 0.88rem;
            color: var(--ink);
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-chip:active { transform: scale(0.97); }
        .filter-chip.active { border-color: var(--ink); background: var(--ink); color: var(--card); }

        .chip-count {
            display: inline-block;
            margin-left: 4px;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 1px 5px;
            border-radius: 8px;
            background: var(--border);
            color: var(--muted);
            line-height: 1;
            vertical-align: middle;
        }

        .filter-chip.active .chip-count,
        .cat-chip.active .chip-count { background: rgba(255,255,255,0.2); color: var(--card); }

        .chip-rate {
            display: inline-block;
            margin-left: 4px;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--green);
            vertical-align: middle;
        }
        .filter-chip.active .chip-rate { color: var(--card); }

        /* ── 主卡片 ── */
        .card-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card {
            flex: 1;
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            animation: cardIn 0.35s ease;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-tag {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--blue);
            background: var(--blue-bg);
            padding: 3px 10px;
            border-radius: 4px;
            margin-bottom: 18px;
            letter-spacing: 1px;
        }

        .card-question {
            font-size: 1.15rem;
            font-weight: 600;
            line-height: 1.85;
            flex: 1;
        }

        /* ── 答案区 ── */
        .answer-area {
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.4s ease, opacity 0.3s ease, margin 0.3s ease;
        }

        .answer-area.show {
            max-height: 600px;
            opacity: 1;
            margin-top: 20px;
        }

        .answer-divider {
            height: 1px;
            background: var(--border);
            margin-bottom: 18px;
        }

        .answer-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--muted);
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .answer-text {
            font-size: 0.95rem;
            line-height: 1.85;
            color: var(--ink);
            margin-bottom: 16px;
        }

        .explain-box {
            background: var(--blue-bg);
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 12px;
            font-size: 0.88rem;
            line-height: 1.75;
            color: var(--ink);
        }

        .memo-box {
            background: var(--green-bg);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 0.88rem;
            line-height: 1.6;
            color: var(--green);
            font-weight: 600;
        }

        /* ── 按钮区 ── */
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 15px 0;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .btn:active { transform: scale(0.96); }

        .btn-reveal {
            background: var(--ink);
            color: var(--card);
            width: 100%;
        }

        .btn-know {
            background: var(--green);
            color: white;
        }

        .btn-unknown {
            background: var(--red);
            color: white;
        }

        .btn-next {
            background: var(--border);
            color: var(--ink);
            width: 100%;
        }

        /* ── 空状态 ── */
        .empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon { font-size: 3rem; margin-bottom: 16px; }
        .empty-title { font-size: 1.15rem; font-weight: 700; color: var(--green); margin-bottom: 8px; }
        .empty-text { font-size: 0.9rem; color: var(--muted); line-height: 1.7; }

        /* ── 题型选择浮层 ── */
        .category-row {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .category-row::-webkit-scrollbar { display: none; }

        .cat-chip {
            flex-shrink: 0;
            padding: 6px 14px;
            border: 1.5px solid var(--border);
            border-radius: 20px;
            background: var(--card);
            font-family: inherit;
            font-size: 0.8rem;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .cat-chip.active {
            border-color: var(--ink);
            background: var(--ink);
            color: var(--card);
        }

        .cat-chip:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="app">
        <div class="topbar">
            <div class="topbar-title">考点背诵</div>
            <div class="topbar-stats">
                <span>错题 <b id="wrong-count">0</b></span>
                <div class="accuracy-wrap">
                    <span class="accuracy-pill" id="accuracy-pill">--</span>
                    <button class="help-trigger" id="help-btn">?</button>
                    <div class="help-popover" id="help-popover">
                        <b>正确率</b> = 答对次数 ÷ 总答题次数<br>
                        统计每次点击「会了」或「不会」的结果。
                    </div>
                </div>
            </div>
        </div>

        <div class="filters">
            <button class="filter-chip active" data-bank="source">源题库 <span class="chip-count" id="cnt-source">0</span><span class="chip-rate" id="rate-source"></span></button>
            <button class="filter-chip" data-bank="wrong">错题库 <span class="chip-count" id="cnt-wrong">0</span></button>
        </div>

        <div class="category-row">
            <button class="cat-chip active" data-cat="all">全部 <span class="chip-count" id="cnt-all">0</span></button>
            <button class="cat-chip" data-cat="填空题">填空 <span class="chip-count" id="cnt-填空题">0</span></button>
            <button class="cat-chip" data-cat="名词解释">名词 <span class="chip-count" id="cnt-名词解释">0</span></button>
            <button class="cat-chip" data-cat="简答题">简答 <span class="chip-count" id="cnt-简答题">0</span></button>
            <button class="cat-chip" data-cat="论述题">论述 <span class="chip-count" id="cnt-论述题">0</span></button>
        </div>

        <div class="card-area" id="card-area"></div>
    </div>

    <script>
        const questions = [
            { id: "fill-1", category: "填空题", question: "政治权力的三大特征：___、___、___", answer: "强制性、专业性、自主性", explanation: "强制性：以国家暴力机器为后盾，如警察执法、司法判决；专业性：由专门的国家机关和人员行使；自主性：相对于社会力量的独立性。", memorization: "口诀：强专自" },
            { id: "fill-2", category: "填空题", question: "可持续发展的四大原则：___、___、___、___", answer: "公平性、持续性、共同性、系统性", explanation: "公平性：代内公平与代际公平；持续性：不超越资源环境承载力；共同性：全球合作应对；系统性：经济社会环境协调发展。", memorization: "口诀：公持共系" },
            { id: "fill-3", category: "填空题", question: "科学精神的四大内涵：___、___、___、___", answer: "求实、批判、创新、协作", explanation: "求实：一切从客观事实出发；批判：敢于质疑权威；创新：突破传统；协作：集体事业。", memorization: "口诀：求批创协" },
            { id: "fill-4", category: "填空题", question: "全球公共物品的供给方式：___、___、___、___", answer: "主导国供给、集体行动与国际制度、PPP模式、技术转让与知识溢出", explanation: "主导国：霸权稳定论；国际制度：如《蒙特利尔议定书》；PPP：公私伙伴关系；技术转让：开源软件等。", memorization: "口诀：主集P技" },
            { id: "fill-5", category: "填空题", question: "世界石油运输的六大战略水道：___、___、___、___、___、___", answer: "霍尔木兹海峡、马六甲海峡、苏伊士运河/苏麦德管道、曼德海峡、土耳其海峡、巴拿马运河", explanation: "霍尔木兹：最繁忙；马六甲：东亚生命线；苏伊士：欧亚捷径；曼德：红海门户；土耳其：黑海出入；巴拿马：两洋通道。", memorization: "口诀：霍马苏曼土巴" },
            { id: "fill-6", category: "填空题", question: "IPE的核心议题：___、___、___、___", answer: "国家市场博弈、全球治理机制、结构性不平等、安全经济交织", explanation: "国家与市场关系、全球治理、结构不平等、安全与经济联系。", memorization: "口诀：国全构安" },
            { id: "fill-7", category: "填空题", question: "经济周期三分法：___、___、___", answer: "基钦周期、朱格拉周期、康德拉季耶夫周期", explanation: "基钦：3-5年库存；朱格拉：8-10年设备；康德拉季耶夫：45-60年技术革命。", memorization: "口诀：基朱康" },
            { id: "term-1", category: "名词解释", question: "结构性权力", answer: "行为体塑造全球政治经济运行规则和环境的能力，包含安全、生产、金融、知识四大维度。", explanation: "与联系性权力相对，结构性权力是间接的、广泛的、隐蔽的，通过塑造游戏规则发挥作用。例如：美国通过美元体系和IMF规则影响全球金融。", memorization: "记忆点：规则塑造+四大维度" },
            { id: "term-2", category: "名词解释", question: "联系性权力", answer: "行为体A通过资源优势直接迫使B做原本不会做的事，是直接、具体、可见的权力。", explanation: "例如：国家A通过经济制裁迫使国家B改变政策，就是典型的联系性权力。", memorization: "记忆点：直接迫使+具体可见" },
            { id: "term-3", category: "名词解释", question: "全球公共物品", answer: "具有非排他性和非竞争性、惠及全球的公共产品，如气候稳定、航行自由、传染病防控。", explanation: "供给困境在于搭便车问题，需要国际合作或霸权国供给。", memorization: "记忆点：两个特性+供给困境" },
            { id: "term-4", category: "名词解释", question: "霸权稳定论", answer: "金德尔伯格和吉尔平提出，认为开放稳定的世界经济体系需要一个霸权国提供公共产品。", explanation: "霸权国承担成本，体系内国家搭便车；霸权衰落后体系可能失序。", memorization: "记忆点：霸权供给公共产品" },
            { id: "term-5", category: "名词解释", question: "基钦周期", answer: "约3-5年的短期经济周期，由库存调整驱动，又称库存周期。", explanation: "分为被动去库存、主动补库存、被动补库存、主动去库存四个阶段。", memorization: "记忆点：3-5年+库存驱动" },
            { id: "short-1", category: "简答题", question: "协作型博弈与协调型博弈的区别", answer: "协作型博弈（囚徒困境）存在帕累托排序，个体理性导致集体非理性，核心是激励问题；协调型博弈（猎鹿问题）无帕累托排序，面临多重均衡选择，核心是预期协调问题。", explanation: "协作博弈需要改变激励（如奖惩机制），协调博弈需要聚焦点（如法律、传统）。", memorization: "对比记忆：囚徒vs猎鹿，激励vs预期" },
            { id: "short-2", category: "简答题", question: "科学精神的内涵与重要性", answer: "【内涵】求实、批判、创新、协作；【重要性】推动科技创新的根本动力、抵制伪科学的武器、整合资源攻克难题、培养理性思维建设创新国家。", explanation: "求实是基础，批判是动力，创新是灵魂，协作是保障。", memorization: "口诀：求批创协+四方面价值" },
            { id: "short-3", category: "简答题", question: "油价形成的影响因素", answer: "供需基本面（全球经济增长与OPEC产量）、地缘政治（产油区动荡战争制裁）、金融因素（美元汇率、期货投机）、技术进步（页岩油技术、新能源车）。", explanation: "供需是基础，地缘是冲击，金融是放大器，技术是长期变量。", memorization: "口诀：供地金技" },
            { id: "short-4", category: "简答题", question: "美林投资时钟模型各阶段表现最好的资产", answer: "复苏期→股票（GDP↑通胀↓）、过热期→商品（GDP↑通胀↑）、滞胀期→现金（GDP↓通胀↑）、衰退期→债券（GDP↓通胀↓）。", explanation: "根据经济增长和通胀两个维度划分四个阶段，不同阶段受益资产不同。", memorization: "口诀：复股过商滞现衰债" },
            { id: "short-5", category: "简答题", question: "解释全球化现象的三个主要流派", answer: "超全球主义派（全球化不可阻挡、国家消失）、怀疑论派（并非史无前例、国家主导）、变革论派（深刻历史转型、国家职能重构）。", explanation: "核心分歧在于全球化对国家主权的冲击程度。", memorization: "口诀：超怀变" },
            { id: "essay-1", category: "论述题", question: "理性主义方法论在国际关系研究中的价值", answer: "【核心假设】行为体理性、追求利益最大化，基于成本-收益计算决策；【主要价值】解释与预测力强、科学严谨、跨学科整合、政策实用、理论对比基础；【局限】过度简化，忽略文化、身份等非理性因素。", explanation: "举例：冷战威慑（MAD）、贸易合作（WTO）、联盟形成（北约）。", memorization: "结构：假设+5价值+局限+3例证" },
            { id: "essay-2", category: "论述题", question: "库存周期的四个阶段", answer: "1.被动去库存：需求快速回升，产出跟不上，库存降；2.主动补库存：需求持续旺盛，企业主动增产；3.被动补库存：需求增速放缓，产出仍高，库存积；4.主动去库存：需求疲弱，企业主动减产。", explanation: "核心驱动机制是预期差与反应时滞，每个阶段价格、盈利、现金流表现不同。", memorization: "口诀：被主补被主去" },
            { id: "essay-3", category: "论述题", question: "特朗普退出《巴黎协定》的动因", answer: "美国优先（认为损害化石能源与制造业利益）、主权回归（反对国际组织约束）、利益博弈（认为对中印限制太少）、气候怀疑论（质疑人为气候变化）。", explanation: "体现了单边主义与多边主义的冲突，短期利益与长期利益的权衡。", memorization: "口诀：优主博怀" }
        ];

        const WRONG_KEY = 'quiz_wrong_ids';
        const STATS_KEY = 'quiz_stats';

        let currentBank = 'source';
        let currentCategory = 'all';
        let currentQuestion = null;
        let revealed = false;
        let wrongIds = JSON.parse(localStorage.getItem(WRONG_KEY) || '[]');

        function loadStats() {
            const raw = localStorage.getItem(STATS_KEY);
            if (!raw) return { source: { correct: 0, wrong: 0 }, wrong: { correct: 0, wrong: 0 } };
            try {
                const parsed = JSON.parse(raw);
                // 兼容旧格式 {correct, wrong}
                if ('correct' in parsed) {
                    return { source: { correct: parsed.correct || 0, wrong: parsed.wrong || 0 }, wrong: { correct: 0, wrong: 0 } };
                }
                return parsed;
            } catch (e) {
                return { source: { correct: 0, wrong: 0 }, wrong: { correct: 0, wrong: 0 } };
            }
        }

        let stats = loadStats();

        function saveWrong() { localStorage.setItem(WRONG_KEY, JSON.stringify(wrongIds)); }
        function saveStats() { localStorage.setItem(STATS_KEY, JSON.stringify(stats)); }

        function updateUI() {
            document.getElementById('wrong-count').textContent = wrongIds.length;
            // 全局正确率
            const totalCorrect = stats.source.correct + stats.wrong.correct;
            const totalWrong = stats.source.wrong + stats.wrong.wrong;
            const total = totalCorrect + totalWrong;
            const pct = total > 0 ? Math.round(totalCorrect / total * 100) : 0;
            const pill = document.getElementById('accuracy-pill');
            pill.textContent = total > 0 ? pct + '%' : '--';
            pill.style.background = pct >= 80 ? 'var(--green-bg)' : pct >= 50 ? 'var(--blue-bg)' : 'var(--red-bg)';
            pill.style.color = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--blue)' : 'var(--red)';
            updateChipCounts();
        }

        function updateChipCounts() {
            document.getElementById('cnt-source').textContent = questions.length;
            document.getElementById('cnt-wrong').textContent = wrongIds.length;

            // 源题库正确率
            const s = stats.source;
            const sourceTotal = s.correct + s.wrong;
            const sourceRate = sourceTotal > 0 ? Math.round(s.correct / sourceTotal * 100) : 0;
            document.getElementById('rate-source').textContent = sourceTotal > 0 ? sourceRate + '%' : '';

            const allCount = currentBank === 'wrong'
                ? questions.filter(q => wrongIds.includes(q.id)).length
                : questions.length;
            document.getElementById('cnt-all').textContent = allCount;

            ['填空题', '名词解释', '简答题', '论述题'].forEach(cat => {
                let count = questions.filter(q => q.category === cat).length;
                if (currentBank === 'wrong') {
                    count = questions.filter(q => q.category === cat && wrongIds.includes(q.id)).length;
                }
                document.getElementById('cnt-' + cat).textContent = count;
            });
        }

        function getFiltered() {
            let list = questions;
            if (currentBank === 'wrong') list = list.filter(q => wrongIds.includes(q.id));
            if (currentCategory !== 'all') list = list.filter(q => q.category === currentCategory);
            return list;
        }

        /* ── 帮助浮窗 ── */
        document.getElementById('help-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('help-popover').classList.toggle('show');
        });

        document.addEventListener('click', () => {
            document.getElementById('help-popover').classList.remove('show');
        });

        document.getElementById('help-popover').addEventListener('click', (e) => {
            e.stopPropagation();
        });

        function nextQuestion() {
            const list = getFiltered();
            if (list.length === 0) {
                renderEmpty();
                return;
            }
            currentQuestion = list[Math.floor(Math.random() * list.length)];
            revealed = false;
            renderCard();
        }

        function renderCard() {
            const q = currentQuestion;
            document.getElementById('card-area').innerHTML = `
                <div class="card">
                    <div class="card-tag">${q.category}</div>
                    <div class="card-question">${q.question}</div>
                    <div class="answer-area" id="answer-area">
                        <div class="answer-divider"></div>
                        <div class="answer-label">参考答案</div>
                        <div class="answer-text">${q.answer}</div>
                        <div class="explain-box">${q.explanation}</div>
                        <div class="memo-box">${q.memorization}</div>
                    </div>
                    <div class="actions" id="actions"></div>
                </div>
            `;
            renderActions();
        }

        function renderActions() {
            const actions = document.getElementById('actions');
            if (!revealed) {
                actions.innerHTML = `<button class="btn btn-reveal" id="btn-reveal">显示答案</button>`;
                document.getElementById('btn-reveal').addEventListener('click', revealAnswer);
            } else {
                actions.innerHTML = `
                    <button class="btn btn-know" id="btn-know">会了</button>
                    <button class="btn btn-unknown" id="btn-unknown">不会</button>
                `;
                document.getElementById('btn-know').addEventListener('click', handleKnow);
                document.getElementById('btn-unknown').addEventListener('click', handleUnknown);
            }
        }

        function revealAnswer() {
            revealed = true;
            document.getElementById('answer-area').classList.add('show');
            renderActions();
        }

        function handleKnow() {
            stats[currentBank].correct++;
            saveStats();
            if (currentBank === 'wrong') {
                wrongIds = wrongIds.filter(id => id !== currentQuestion.id);
                saveWrong();
            }
            updateUI();
            nextQuestion();
        }

        function handleUnknown() {
            stats[currentBank].wrong++;
            saveStats();
            if (!wrongIds.includes(currentQuestion.id)) {
                wrongIds.push(currentQuestion.id);
                saveWrong();
            }
            updateUI();
            nextQuestion();
        }

        function renderEmpty() {
            const isWrongBank = currentBank === 'wrong';
            document.getElementById('card-area').innerHTML = `
                <div class="card">
                    <div class="empty">
                        <div class="empty-icon">${isWrongBank ? '🎉' : '📭'}</div>
                        <div class="empty-title">${isWrongBank ? '错题库已清空！' : '暂无题目'}</div>
                        <div class="empty-text">${isWrongBank ? '所有错题都已掌握，继续保持' : '当前筛选条件下没有题目'}</div>
                    </div>
                </div>
            `;
        }

        /* ── 筛选器事件 ── */
        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentBank = chip.dataset.bank;
                updateUI();
                nextQuestion();
            });
        });

        document.querySelectorAll('.cat-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentCategory = chip.dataset.cat;
                nextQuestion();
            });
        });

        /* ── 启动 ── */
        updateUI();
        nextQuestion();
    </script>
</body>
</html>
