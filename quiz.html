<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考点背诵助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg: #f0ece2;
            --card: #faf7f1;
            --ink: #4a4540;
            --muted: #9a9590;
            --border: #ddd5c8;
            --green: #5a8a6a;
            --green-bg: #eaf0ec;
            --red: #b07070;
            --red-bg: #f5eaea;
            --blue: #6a8899;
            --blue-bg: #eaeff3;
            --gold: #b89a40;
            --shadow: 0 2px 12px rgba(60,50,40,0.07);
            --radius: 12px;
        }

        body {
            font-family: 'Noto Serif SC', Georgia, serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            -webkit-text-size-adjust: 100%;
        }

        .app {
            max-width: 520px;
            margin: 0 auto;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── 顶栏 ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            margin-bottom: 12px;
        }

        .topbar-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: 1px;
        }

        .topbar-stats {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.82rem;
            color: var(--muted);
        }

        .topbar-stats b {
            font-weight: 700;
            color: var(--ink);
        }

        .accuracy-pill {
            background: var(--green-bg);
            color: var(--green);
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.82rem;
        }

        .accuracy-wrap {
            position: relative;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .help-trigger {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: var(--card);
            color: var(--muted);
            font-size: 0.7rem;
            font-family: inherit;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: all 0.2s;
        }

        .help-trigger:active { transform: scale(0.9); }

        .help-popover {
            position: absolute;
            top: calc(100% + 8px);
            right: -10px;
            width: 210px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: var(--shadow);
            padding: 14px 16px;
            font-size: 0.8rem;
            line-height: 1.7;
            color: var(--ink);
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-4px);
            transition: all 0.2s ease;
        }

        .help-popover.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .help-popover::before {
            content: '';
            position: absolute;
            top: -6px;
            right: 14px;
            width: 10px;
            height: 10px;
            background: var(--card);
            border-left: 1px solid var(--border);
            border-top: 1px solid var(--border);
            transform: rotate(45deg);
        }

        .help-popover b {
            color: var(--ink);
            font-weight: 700;
        }

        /* ── 筛选条 ── */
        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .filter-chip {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            background: var(--card);
            font-family: inherit;
            font-size: 0.88rem;
            color: var(--ink);
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-chip:active { transform: scale(0.97); }
        .filter-chip.active { border-color: var(--ink); background: var(--ink); color: var(--card); }

        .chip-count {
            display: inline-block;
            margin-left: 4px;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 1px 5px;
            border-radius: 8px;
            background: var(--border);
            color: var(--muted);
            line-height: 1;
            vertical-align: middle;
        }

        .filter-chip.active .chip-count,
        .cat-chip.active .chip-count { background: rgba(255,255,255,0.2); color: var(--card); }

        .chip-rate {
            display: inline-block;
            margin-left: 4px;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--green);
            vertical-align: middle;
        }
        .filter-chip.active .chip-rate { color: var(--card); }

        /* ── 主卡片 ── */
        .card-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card {
            flex: 1;
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            animation: cardIn 0.35s ease;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-tag {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--blue);
            background: var(--blue-bg);
            padding: 3px 10px;
            border-radius: 4px;
            margin-bottom: 18px;
            letter-spacing: 1px;
        }

        .card-question {
            font-size: 1.15rem;
            font-weight: 600;
            line-height: 1.85;
            flex: 1;
        }

        /* ── 答案区 ── */
        .answer-area {
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.4s ease, opacity 0.3s ease, margin 0.3s ease;
        }

        .answer-area.show {
            max-height: 600px;
            opacity: 1;
            margin-top: 20px;
        }

        .answer-divider {
            height: 1px;
            background: var(--border);
            margin-bottom: 18px;
        }

        .answer-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--muted);
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .answer-text {
            font-size: 0.95rem;
            line-height: 1.85;
            color: var(--ink);
            margin-bottom: 16px;
        }

        .explain-box {
            background: var(--blue-bg);
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 12px;
            font-size: 0.88rem;
            line-height: 1.75;
            color: var(--ink);
        }

        .memo-box {
            background: var(--green-bg);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 0.88rem;
            line-height: 1.6;
            color: var(--green);
            font-weight: 600;
        }

        /* ── 按钮区 ── */
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 15px 0;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .btn:active { transform: scale(0.96); }

        .btn-reveal {
            background: var(--ink);
            color: var(--card);
            width: 100%;
        }

        .btn-know {
            background: var(--green);
            color: white;
        }

        .btn-unknown {
            background: var(--red);
            color: white;
        }

        .btn-next {
            background: var(--border);
            color: var(--ink);
            width: 100%;
        }

        /* ── 空状态 ── */
        .empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon { font-size: 3rem; margin-bottom: 16px; }
        .empty-title { font-size: 1.15rem; font-weight: 700; color: var(--green); margin-bottom: 8px; }
        .empty-text { font-size: 0.9rem; color: var(--muted); line-height: 1.7; }

        /* ── 题型选择浮层 ── */
        .category-row {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .category-row::-webkit-scrollbar { display: none; }

        .cat-chip {
            flex-shrink: 0;
            padding: 6px 14px;
            border: 1.5px solid var(--border);
            border-radius: 20px;
            background: var(--card);
            font-family: inherit;
            font-size: 0.8rem;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .cat-chip.active {
            border-color: var(--ink);
            background: var(--ink);
            color: var(--card);
        }

        .cat-chip:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="app">
        <div class="topbar">
            <div class="topbar-title">考点背诵</div>
            <div class="topbar-stats">
                <span>错题 <b id="wrong-count">0</b></span>
                <div class="accuracy-wrap">
                    <span class="accuracy-pill" id="accuracy-pill">--</span>
                    <button class="help-trigger" id="help-btn">?</button>
                    <div class="help-popover" id="help-popover">
                        <b>正确率</b> = 答对次数 ÷ 总答题次数<br>
                        统计每次点击「会了」或「不会」的结果。
                    </div>
                </div>
            </div>
        </div>

        <div class="filters">
            <button class="filter-chip active" data-bank="source">源题库 <span class="chip-count" id="cnt-source">0</span><span class="chip-rate" id="rate-source"></span></button>
            <button class="filter-chip" data-bank="wrong">错题库 <span class="chip-count" id="cnt-wrong">0</span></button>
        </div>

        <div class="category-row">
            <button class="cat-chip active" data-cat="all">全部 <span class="chip-count" id="cnt-all">0</span></button>
            <button class="cat-chip" data-cat="填空题">填空 <span class="chip-count" id="cnt-填空题">0</span></button>
            <button class="cat-chip" data-cat="名词解释">名词 <span class="chip-count" id="cnt-名词解释">0</span></button>
            <button class="cat-chip" data-cat="简答题">简答 <span class="chip-count" id="cnt-简答题">0</span></button>
            <button class="cat-chip" data-cat="论述题">论述 <span class="chip-count" id="cnt-论述题">0</span></button>
        </div>

        <div class="card-area" id="card-area"></div>
    </div>

    <script src="quiz-questions.js"></script>
    <script>

        const WRONG_KEY = 'quiz_wrong_ids';
        const STATS_KEY = 'quiz_stats';

        let currentBank = 'source';
        let currentCategory = 'all';
        let currentQuestion = null;
        let revealed = false;
        let wrongIds = JSON.parse(localStorage.getItem(WRONG_KEY) || '[]');

        function loadStats() {
            const raw = localStorage.getItem(STATS_KEY);
            if (!raw) return { source: { correct: 0, wrong: 0 }, wrong: { correct: 0, wrong: 0 } };
            try {
                const parsed = JSON.parse(raw);
                // 兼容旧格式 {correct, wrong}
                if ('correct' in parsed) {
                    return { source: { correct: parsed.correct || 0, wrong: parsed.wrong || 0 }, wrong: { correct: 0, wrong: 0 } };
                }
                return parsed;
            } catch (e) {
                return { source: { correct: 0, wrong: 0 }, wrong: { correct: 0, wrong: 0 } };
            }
        }

        let stats = loadStats();

        function saveWrong() { localStorage.setItem(WRONG_KEY, JSON.stringify(wrongIds)); }
        function saveStats() { localStorage.setItem(STATS_KEY, JSON.stringify(stats)); }

        function updateUI() {
            document.getElementById('wrong-count').textContent = wrongIds.length;
            // 全局正确率
            const totalCorrect = stats.source.correct + stats.wrong.correct;
            const totalWrong = stats.source.wrong + stats.wrong.wrong;
            const total = totalCorrect + totalWrong;
            const pct = total > 0 ? Math.round(totalCorrect / total * 100) : 0;
            const pill = document.getElementById('accuracy-pill');
            pill.textContent = total > 0 ? pct + '%' : '--';
            pill.style.background = pct >= 80 ? 'var(--green-bg)' : pct >= 50 ? 'var(--blue-bg)' : 'var(--red-bg)';
            pill.style.color = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--blue)' : 'var(--red)';
            updateChipCounts();
        }

        function updateChipCounts() {
            document.getElementById('cnt-source').textContent = questions.length;
            document.getElementById('cnt-wrong').textContent = wrongIds.length;

            // 源题库正确率
            const s = stats.source;
            const sourceTotal = s.correct + s.wrong;
            const sourceRate = sourceTotal > 0 ? Math.round(s.correct / sourceTotal * 100) : 0;
            document.getElementById('rate-source').textContent = sourceTotal > 0 ? sourceRate + '%' : '';

            const allCount = currentBank === 'wrong'
                ? questions.filter(q => wrongIds.includes(q.id)).length
                : questions.length;
            document.getElementById('cnt-all').textContent = allCount;

            ['填空题', '名词解释', '简答题', '论述题'].forEach(cat => {
                let count = questions.filter(q => q.category === cat).length;
                if (currentBank === 'wrong') {
                    count = questions.filter(q => q.category === cat && wrongIds.includes(q.id)).length;
                }
                document.getElementById('cnt-' + cat).textContent = count;
            });
        }

        function getFiltered() {
            let list = questions;
            if (currentBank === 'wrong') list = list.filter(q => wrongIds.includes(q.id));
            if (currentCategory !== 'all') list = list.filter(q => q.category === currentCategory);
            return list;
        }

        /* ── 帮助浮窗 ── */
        document.getElementById('help-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('help-popover').classList.toggle('show');
        });

        document.addEventListener('click', () => {
            document.getElementById('help-popover').classList.remove('show');
        });

        document.getElementById('help-popover').addEventListener('click', (e) => {
            e.stopPropagation();
        });

        function nextQuestion() {
            const list = getFiltered();
            if (list.length === 0) {
                renderEmpty();
                return;
            }
            currentQuestion = list[Math.floor(Math.random() * list.length)];
            revealed = false;
            renderCard();
        }

        function renderCard() {
            const q = currentQuestion;
            document.getElementById('card-area').innerHTML = `
                <div class="card">
                    <div class="card-tag">${q.category}</div>
                    <div class="card-question">${q.question}</div>
                    <div class="answer-area" id="answer-area">
                        <div class="answer-divider"></div>
                        <div class="answer-label">参考答案</div>
                        <div class="answer-text">${q.answer}</div>
                        <div class="explain-box">${q.explanation}</div>
                        <div class="memo-box">${q.memorization}</div>
                    </div>
                    <div class="actions" id="actions"></div>
                </div>
            `;
            renderActions();
        }

        function renderActions() {
            const actions = document.getElementById('actions');
            if (!revealed) {
                actions.innerHTML = `<button class="btn btn-reveal" id="btn-reveal">显示答案</button>`;
                document.getElementById('btn-reveal').addEventListener('click', revealAnswer);
            } else {
                actions.innerHTML = `
                    <button class="btn btn-know" id="btn-know">会了</button>
                    <button class="btn btn-unknown" id="btn-unknown">不会</button>
                `;
                document.getElementById('btn-know').addEventListener('click', handleKnow);
                document.getElementById('btn-unknown').addEventListener('click', handleUnknown);
            }
        }

        function revealAnswer() {
            revealed = true;
            document.getElementById('answer-area').classList.add('show');
            renderActions();
        }

        function handleKnow() {
            stats[currentBank].correct++;
            saveStats();
            if (currentBank === 'wrong') {
                wrongIds = wrongIds.filter(id => id !== currentQuestion.id);
                saveWrong();
            }
            updateUI();
            nextQuestion();
        }

        function handleUnknown() {
            stats[currentBank].wrong++;
            saveStats();
            if (!wrongIds.includes(currentQuestion.id)) {
                wrongIds.push(currentQuestion.id);
                saveWrong();
            }
            updateUI();
            nextQuestion();
        }

        function renderEmpty() {
            const isWrongBank = currentBank === 'wrong';
            document.getElementById('card-area').innerHTML = `
                <div class="card">
                    <div class="empty">
                        <div class="empty-icon">${isWrongBank ? '🎉' : '📭'}</div>
                        <div class="empty-title">${isWrongBank ? '错题库已清空！' : '暂无题目'}</div>
                        <div class="empty-text">${isWrongBank ? '所有错题都已掌握，继续保持' : '当前筛选条件下没有题目'}</div>
                    </div>
                </div>
            `;
        }

        /* ── 筛选器事件 ── */
        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentBank = chip.dataset.bank;
                updateUI();
                nextQuestion();
            });
        });

        document.querySelectorAll('.cat-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentCategory = chip.dataset.cat;
                nextQuestion();
            });
        });

        /* ── 启动 ── */
        updateUI();
        nextQuestion();
    </script>
</body>
</html>
