<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考点背诵助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg: #f0ece2;
            --card: #faf7f1;
            --ink: #4a4540;
            --muted: #9a9590;
            --border: #ddd5c8;
            --green: #5a8a6a;
            --green-bg: #eaf0ec;
            --red: #b07070;
            --red-bg: #f5eaea;
            --blue: #6a8899;
            --blue-bg: #eaeff3;
            --gold: #b89a40;
            --shadow: 0 2px 12px rgba(60,50,40,0.07);
            --radius: 12px;
        }

        body {
            font-family: 'Noto Serif SC', Georgia, serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            -webkit-text-size-adjust: 100%;
        }

        .app {
            max-width: 520px;
            margin: 0 auto;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── 顶栏 ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            margin-bottom: 12px;
        }

        .topbar-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: 1px;
        }

        .topbar-stats {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.82rem;
            color: var(--muted);
        }

        .topbar-stats b {
            font-weight: 700;
            color: var(--ink);
        }

        .accuracy-pill {
            background: var(--green-bg);
            color: var(--green);
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.82rem;
        }

        .accuracy-wrap {
            position: relative;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .help-trigger {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: var(--card);
            color: var(--muted);
            font-size: 0.7rem;
            font-family: inherit;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: all 0.2s;
        }

        .help-trigger:active { transform: scale(0.9); }

        .help-popover {
            position: absolute;
            top: calc(100% + 8px);
            right: -10px;
            width: 210px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: var(--shadow);
            padding: 14px 16px;
            font-size: 0.8rem;
            line-height: 1.7;
            color: var(--ink);
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-4px);
            transition: all 0.2s ease;
        }

        .help-popover.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .help-popover::before {
            content: '';
            position: absolute;
            top: -6px;
            right: 14px;
            width: 10px;
            height: 10px;
            background: var(--card);
            border-left: 1px solid var(--border);
            border-top: 1px solid var(--border);
            transform: rotate(45deg);
        }

        .help-popover b {
            color: var(--ink);
            font-weight: 700;
        }

        /* ── 筛选条 ── */
        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .filter-chip {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            background: var(--card);
            font-family: inherit;
            font-size: 0.88rem;
            color: var(--ink);
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-chip:active { transform: scale(0.97); }
        .filter-chip.active { border-color: var(--ink); background: var(--ink); color: var(--card); }

        .chip-count {
            display: inline-block;
            margin-left: 4px;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 1px 5px;
            border-radius: 8px;
            background: var(--border);
            color: var(--muted);
            line-height: 1;
            vertical-align: middle;
        }

        .filter-chip.active .chip-count,
        .cat-chip.active .chip-count { background: rgba(255,255,255,0.2); color: var(--card); }

        .chip-rate {
            display: inline-block;
            margin-left: 4px;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--green);
            vertical-align: middle;
        }
        .filter-chip.active .chip-rate { color: var(--card); }

        /* ── 主卡片 ── */
        .card-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card {
            flex: 1;
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            animation: cardIn 0.35s ease;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-tag {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--blue);
            background: var(--blue-bg);
            padding: 3px 10px;
            border-radius: 4px;
            margin-bottom: 18px;
            letter-spacing: 1px;
        }

        .card-question {
            font-size: 1.15rem;
            font-weight: 600;
            line-height: 1.85;
            flex: 1;
        }

        /* ── 答案区 ── */
        .answer-area {
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.5s ease, opacity 0.3s ease, margin 0.3s ease;
        }

        .answer-area.show {
            max-height: none;
            opacity: 1;
            margin-top: 20px;
        }

        .answer-divider {
            height: 1px;
            background: var(--border);
            margin-bottom: 18px;
        }

        .answer-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--muted);
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .answer-text {
            font-size: 0.92rem;
            line-height: 1.9;
            color: var(--ink);
            margin-bottom: 16px;
            max-height: 55vh;
            overflow-y: auto;
            padding-right: 6px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .answer-text::-webkit-scrollbar {
            width: 4px;
        }

        .answer-text::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .answer-text b {
            display: inline-block;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--ink);
            margin-top: 8px;
        }

        .explain-box {
            background: var(--blue-bg);
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 12px;
            font-size: 0.88rem;
            line-height: 1.75;
            color: var(--ink);
        }

        .short-tip-box {
            background: var(--blue-bg);
            border-left: 3px solid var(--blue);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 14px;
            font-size: 0.82rem;
            line-height: 1.6;
            color: var(--blue);
            font-weight: 600;
        }

        .memo-box {
            background: var(--green-bg);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 0.88rem;
            line-height: 1.6;
            color: var(--green);
            font-weight: 600;
        }

        .template-box {
            background: var(--gold-bg, #f5f0e0);
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 12px;
            font-size: 0.85rem;
            line-height: 1.75;
            color: var(--ink);
            border-left: 3px solid var(--gold);
        }

        .template-box summary {
            font-weight: 700;
            color: var(--gold);
            cursor: pointer;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .template-box summary::-webkit-details-marker { display: none; }

        .template-box .template-content {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed var(--border);
            white-space: pre-line;
        }

        .template-tag {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--gold);
            background: var(--gold-bg, #f5f0e0);
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .template-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--gold-bg, #f5f0e0);
            border: 1px solid var(--gold);
            color: var(--gold);
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
        }

        .template-btn:active { transform: scale(0.96); }

        /* ── 模板弹窗 ── */
        .template-modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 100;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .template-modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .template-modal {
            background: var(--card);
            border-radius: 16px 16px 0 0;
            width: 100%;
            max-width: 520px;
            max-height: 75vh;
            overflow-y: auto;
            padding: 0 20px 24px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            -webkit-overflow-scrolling: touch;
        }

        .template-modal-overlay.show .template-modal {
            transform: translateY(0);
        }

        .template-modal-handle {
            width: 36px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 12px auto 16px;
        }

        .template-modal-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 16px;
            text-align: center;
        }

        .template-modal-item {
            background: var(--gold-bg, #f5f0e0);
            border-left: 3px solid var(--gold);
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 12px;
            font-size: 0.88rem;
            line-height: 1.8;
            color: var(--ink);
            white-space: pre-line;
        }

        .template-modal-close {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: var(--ink);
            color: var(--card);
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
        }

        .template-modal-close:active { transform: scale(0.97); }

        /* ── 按钮区 ── */
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 15px 0;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .btn:active { transform: scale(0.96); }

        .btn-reveal {
            background: var(--ink);
            color: var(--card);
            width: 100%;
        }

        .btn-know {
            background: var(--green);
            color: white;
        }

        .btn-unknown {
            background: var(--red);
            color: white;
        }

        .btn-next {
            background: var(--border);
            color: var(--ink);
            width: 100%;
        }

        /* ── 空状态 ── */
        .empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon { font-size: 3rem; margin-bottom: 16px; }
        .empty-title { font-size: 1.15rem; font-weight: 700; color: var(--green); margin-bottom: 8px; }
        .empty-text { font-size: 0.9rem; color: var(--muted); line-height: 1.7; }

        /* ── 题型选择浮层 ── */
        .category-row {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .category-row::-webkit-scrollbar { display: none; }

        .cat-chip {
            flex-shrink: 0;
            padding: 6px 14px;
            border: 1.5px solid var(--border);
            border-radius: 20px;
            background: var(--card);
            font-family: inherit;
            font-size: 0.8rem;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .cat-chip.active {
            border-color: var(--ink);
            background: var(--ink);
            color: var(--card);
        }

        .cat-chip:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="app">
        <div class="topbar">
            <div class="topbar-title">考点背诵</div>
            <div class="topbar-stats">
                <span>错题 <b id="wrong-count">0</b></span>
                <div class="accuracy-wrap">
                    <span class="accuracy-pill" id="accuracy-pill">--</span>
                    <button class="help-trigger" id="help-btn">?</button>
                    <div class="help-popover" id="help-popover">
                        <b>正确率</b> = 答对次数 ÷ 总答题次数<br>
                        统计每次点击「会了」或「不会」的结果。
                    </div>
                </div>
            </div>
        </div>

        <div class="filters">
            <button class="filter-chip active" data-bank="source">源题库 <span class="chip-count" id="cnt-source">0</span><span class="chip-rate" id="rate-source"></span></button>
            <button class="filter-chip" data-bank="wrong">错题库 <span class="chip-count" id="cnt-wrong">0</span></button>
        </div>

        <div class="category-row">
            <button class="cat-chip active" data-cat="all">全部 <span class="chip-count" id="cnt-all">0</span></button>
            <button class="cat-chip" data-cat="填空题">填空 <span class="chip-count" id="cnt-填空题">0</span></button>
            <button class="cat-chip" data-cat="名词解释">名词 <span class="chip-count" id="cnt-名词解释">0</span></button>
            <button class="cat-chip" data-cat="简答题">简答 <span class="chip-count" id="cnt-简答题">0</span></button>
            <button class="cat-chip" data-cat="论述题">论述 <span class="chip-count" id="cnt-论述题">0</span></button>
        </div>

        <div class="card-area" id="card-area"></div>

        <!-- 模板弹窗 -->
        <div class="template-modal-overlay" id="template-modal-overlay">
            <div class="template-modal">
                <div class="template-modal-handle"></div>
                <div class="template-modal-title">推荐答题模板</div>
                <div id="template-modal-items"></div>
                <button class="template-modal-close" id="template-modal-close">关闭</button>
            </div>
        </div>
    </div>

    <script src="quiz-questions.js"></script>
    <script>

        const WRONG_KEY = 'quiz_wrong_ids';
        const STATS_KEY = 'quiz_stats';

        // 论述题答题模板
        const essayTemplates = {
            1: `[模板1：原因/条件类]\n总起：×××是多种因素共同作用的结果。\n分点：①经济基础……②阶级力量……③时代背景……④主观条件……⑤外部环境……\n总结：因此，×××具有历史必然性。`,
            2: `[模板2：意义/作用类]\n总起：×××具有重大而深远的意义。\n分点：①政治上……②经济上……③思想上……④国际上……⑤对未来的启示……\n总结：综上所述，×××是……的重要里程碑。`,
            3: `[模板3：特征/表现类]\n总起：×××主要表现为以下几个方面。\n分点：①……性/化 ②……性/化 ③……性/化 ④……性/化\n总结：这些特征相互联系，共同构成了×××的总体面貌。`,
            4: `[模板4：经验/教训类]\n总起：×××给我们提供了深刻的经验/教训。\n分点：①必须坚持……②必须防止……③必须处理好……与……的关系 ④必须与时俱进……\n总结：只有……才能……`,
            5: `[模板5：关系/联系类]\n总起：A与B是辩证统一、相互影响的关系。\n分点：①A决定B……②B反作用于A……③在……条件下，两者相互转化……\n总结：正确认识和处理A与B的关系，对于……具有重要意义。`
        };

        function extractTemplates(answer) {
            const nums = [];
            for (let i = 1; i <= 5; i++) {
                if (answer.includes('模板' + i)) nums.push(i);
            }
            return nums;
        }

        function buildTemplateHTML(nums) {
            if (!nums.length) return '';
            const ids = nums.join(',');
            return `<button class="template-btn" data-templates="${ids}">📋 查看推荐答题模板（${nums.map(n => '模板' + n).join(' + ')}）</button>`;
        }

        function showTemplateModal(nums) {
            const overlay = document.getElementById('template-modal-overlay');
            const container = document.getElementById('template-modal-items');
            container.innerHTML = nums.map(n =>
                `<div class="template-modal-item">${essayTemplates[n]}</div>`
            ).join('');
            overlay.classList.add('show');
        }

        let currentBank = 'source';
        let currentCategory = 'all';
        let currentQuestion = null;
        let revealed = false;
        let wrongIds = JSON.parse(localStorage.getItem(WRONG_KEY) || '[]');

        function loadStats() {
            const raw = localStorage.getItem(STATS_KEY);
            if (!raw) return { source: { correct: 0, wrong: 0 }, wrong: { correct: 0, wrong: 0 } };
            try {
                const parsed = JSON.parse(raw);
                // 兼容旧格式 {correct, wrong}
                if ('correct' in parsed) {
                    return { source: { correct: parsed.correct || 0, wrong: parsed.wrong || 0 }, wrong: { correct: 0, wrong: 0 } };
                }
                return parsed;
            } catch (e) {
                return { source: { correct: 0, wrong: 0 }, wrong: { correct: 0, wrong: 0 } };
            }
        }

        let stats = loadStats();

        function saveWrong() { localStorage.setItem(WRONG_KEY, JSON.stringify(wrongIds)); }
        function saveStats() { localStorage.setItem(STATS_KEY, JSON.stringify(stats)); }

        function updateUI() {
            document.getElementById('wrong-count').textContent = wrongIds.length;
            // 全局正确率
            const totalCorrect = stats.source.correct + stats.wrong.correct;
            const totalWrong = stats.source.wrong + stats.wrong.wrong;
            const total = totalCorrect + totalWrong;
            const pct = total > 0 ? Math.round(totalCorrect / total * 100) : 0;
            const pill = document.getElementById('accuracy-pill');
            pill.textContent = total > 0 ? pct + '%' : '--';
            pill.style.background = pct >= 80 ? 'var(--green-bg)' : pct >= 50 ? 'var(--blue-bg)' : 'var(--red-bg)';
            pill.style.color = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--blue)' : 'var(--red)';
            updateChipCounts();
        }

        function updateChipCounts() {
            document.getElementById('cnt-source').textContent = questions.length;
            document.getElementById('cnt-wrong').textContent = wrongIds.length;

            // 源题库正确率
            const s = stats.source;
            const sourceTotal = s.correct + s.wrong;
            const sourceRate = sourceTotal > 0 ? Math.round(s.correct / sourceTotal * 100) : 0;
            document.getElementById('rate-source').textContent = sourceTotal > 0 ? sourceRate + '%' : '';

            const allCount = currentBank === 'wrong'
                ? questions.filter(q => wrongIds.includes(q.id)).length
                : questions.length;
            document.getElementById('cnt-all').textContent = allCount;

            ['填空题', '名词解释', '简答题', '论述题'].forEach(cat => {
                let count = questions.filter(q => q.category === cat).length;
                if (currentBank === 'wrong') {
                    count = questions.filter(q => q.category === cat && wrongIds.includes(q.id)).length;
                }
                document.getElementById('cnt-' + cat).textContent = count;
            });
        }

        function getFiltered() {
            let list = questions;
            if (currentBank === 'wrong') list = list.filter(q => wrongIds.includes(q.id));
            if (currentCategory !== 'all') list = list.filter(q => q.category === currentCategory);
            return list;
        }

        /* ── 帮助浮窗 ── */
        document.getElementById('help-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('help-popover').classList.toggle('show');
        });

        document.addEventListener('click', () => {
            document.getElementById('help-popover').classList.remove('show');
        });

        document.getElementById('help-popover').addEventListener('click', (e) => {
            e.stopPropagation();
        });

        function nextQuestion() {
            const list = getFiltered();
            if (list.length === 0) {
                renderEmpty();
                return;
            }
            currentQuestion = list[Math.floor(Math.random() * list.length)];
            revealed = false;
            renderCard();
        }

        function renderCard() {
            const q = currentQuestion;
            const isEssay = q.category === '论述题';
            const isShort = q.category === '简答题';
            const templateHTML = isEssay ? buildTemplateHTML(extractTemplates(q.answer)) : '';
            const shortTipHTML = isShort ? '<div class="short-tip-box">答题技巧：分点作答（①②③④），先写关键词再展开</div>' : '';
            // 清理 answer 中的模板推荐标记，避免显示在正文中
            let cleanAnswer = q.answer.replace(/【推荐模板[^】]*】\n?/g, '');
            // 格式化：\n → <br>，独占一行的中文数字标题加粗
            cleanAnswer = cleanAnswer
                .replace(/\n/g, '<br>')
                .replace(/<br>(一、|二、|三、|四、|五、)/g, (match, title) => `<br><b>${title}</b>`);
            // 简答题格式化：①②③④前换行，关键词加粗
            if (isShort) {
                cleanAnswer = cleanAnswer
                    .replace(/([①②③④⑤⑥⑦⑧⑨⑩])([^：]*?)(：)/g, '<br><b>$1$2</b>$3');
                if (cleanAnswer.startsWith('<br>')) cleanAnswer = cleanAnswer.substring(4);
            }
            document.getElementById('card-area').innerHTML = `
                <div class="card">
                    <div class="card-tag">${q.category}</div>
                    <div class="card-question">${q.question}</div>
                    <div class="answer-area" id="answer-area">
                        <div class="answer-divider"></div>
                        <div class="answer-label">参考答案</div>
                        <div class="answer-text">${cleanAnswer}</div>
                        ${shortTipHTML}
                        ${templateHTML}
                        <div class="explain-box">${q.explanation}</div>
                        <div class="memo-box">${q.memorization}</div>
                    </div>
                    <div class="actions" id="actions"></div>
                </div>
            `;
            renderActions();
            // 模板按钮事件
            const templateBtn = document.querySelector('.template-btn');
            if (templateBtn) {
                templateBtn.addEventListener('click', () => {
                    const nums = templateBtn.dataset.templates.split(',').map(Number);
                    showTemplateModal(nums);
                });
            }
        }

        function renderActions() {
            const actions = document.getElementById('actions');
            if (!revealed) {
                actions.innerHTML = `<button class="btn btn-reveal" id="btn-reveal">显示答案</button>`;
                document.getElementById('btn-reveal').addEventListener('click', revealAnswer);
            } else {
                actions.innerHTML = `
                    <button class="btn btn-know" id="btn-know">会了</button>
                    <button class="btn btn-unknown" id="btn-unknown">不会</button>
                `;
                document.getElementById('btn-know').addEventListener('click', handleKnow);
                document.getElementById('btn-unknown').addEventListener('click', handleUnknown);
            }
        }

        function revealAnswer() {
            revealed = true;
            document.getElementById('answer-area').classList.add('show');
            renderActions();
        }

        function handleKnow() {
            stats[currentBank].correct++;
            saveStats();
            if (currentBank === 'wrong') {
                wrongIds = wrongIds.filter(id => id !== currentQuestion.id);
                saveWrong();
            }
            updateUI();
            nextQuestion();
        }

        function handleUnknown() {
            stats[currentBank].wrong++;
            saveStats();
            if (!wrongIds.includes(currentQuestion.id)) {
                wrongIds.push(currentQuestion.id);
                saveWrong();
            }
            updateUI();
            nextQuestion();
        }

        function renderEmpty() {
            const isWrongBank = currentBank === 'wrong';
            document.getElementById('card-area').innerHTML = `
                <div class="card">
                    <div class="empty">
                        <div class="empty-icon">${isWrongBank ? '🎉' : '📭'}</div>
                        <div class="empty-title">${isWrongBank ? '错题库已清空！' : '暂无题目'}</div>
                        <div class="empty-text">${isWrongBank ? '所有错题都已掌握，继续保持' : '当前筛选条件下没有题目'}</div>
                    </div>
                </div>
            `;
        }

        /* ── 筛选器事件 ── */
        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentBank = chip.dataset.bank;
                updateUI();
                nextQuestion();
            });
        });

        document.querySelectorAll('.cat-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentCategory = chip.dataset.cat;
                nextQuestion();
            });
        });

        /* ── 模板弹窗事件 ── */
        document.getElementById('template-modal-close').addEventListener('click', () => {
            document.getElementById('template-modal-overlay').classList.remove('show');
        });
        document.getElementById('template-modal-overlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                e.currentTarget.classList.remove('show');
            }
        });

        /* ── 启动 ── */
        updateUI();
        nextQuestion();
    </script>
</body>
</html>
