<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>播客频道 | Podcast Channels</title>
    <meta name="description" content="政治学、国政经、国际关系等考试复习播客频道">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #3b82f6;
            --bg-blur: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(255, 255, 255, 0.7);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --glass-border: rgba(255, 255, 255, 0.3);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        [data-theme="dark"] {
            --bg-blur: rgba(15, 23, 42, 0.4);
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Noto Sans SC', sans-serif;
            background: url('assets/bg.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.15) 0%, transparent 40%);
            z-index: -1;
            backdrop-filter: blur(5px);
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }

        .back-link:hover {
            transform: translateX(-5px);
        }

        /* Channel Tabs */
        .channel-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeInUp 0.8s ease-out 0.2s backwards;
        }

        .channel-tab {
            font: inherit;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow);
            position: relative;
        }

        .channel-tab:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 3px;
        }

        .channel-tab:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .channel-tab.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-color: transparent;
        }

        /* 敬请期待频道：灰显 + 角标 */
        .channel-tab.coming {
            opacity: 0.55;
            cursor: not-allowed;
        }
        .channel-tab.coming:hover {
            border-color: var(--glass-border);
            transform: none;
        }
        .coming-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 999px;
            background: var(--text-muted);
            color: #fff;
            margin-left: 2px;
            line-height: 1.4;
        }

        /* Episode List */
        .episodes-section {
            animation: fadeInUp 0.8s ease-out 0.4s backwards;
        }

        .episode-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
        }

        .episode-card:hover {
            border-color: var(--primary);
            transform: translateX(5px);
        }

        .episode-header {
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }

        .episode-number {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .episode-info {
            flex: 1;
        }

        .episode-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 5px;
        }

        .episode-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .episode-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Audio Player */
        .audio-player-wrapper {
            margin-top: 15px;
        }

        .audio-player {
            width: 100%;
            height: 44px;
            border-radius: 10px;
            background: var(--bg-blur);
        }

        /* Playback speed control (global) */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            animation: fadeInUp 0.8s ease-out 0.35s backwards;
        }

        .toolbar-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .speed-group {
            display: inline-flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 5px;
            box-shadow: var(--shadow);
        }

        .speed-btn {
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            padding: 6px 14px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .speed-btn:hover {
            color: var(--primary);
        }

        .speed-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        /* Resume banner ("上次收听") */
        .resume-banner {
            display: none;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.12), rgba(168, 85, 247, 0.12));
            border: 1px solid rgba(99, 102, 241, 0.25);
            border-radius: 14px;
            padding: 14px 18px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
        }

        .resume-banner.active {
            display: flex;
        }

        .resume-banner .resume-text {
            flex: 1;
            font-size: 0.9rem;
            color: var(--text-main);
            line-height: 1.5;
        }

        .resume-banner .resume-text b {
            color: var(--primary);
        }

        .resume-btn {
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-weight: 700;
            font-size: 0.85rem;
            padding: 9px 18px;
            border-radius: 50px;
            cursor: pointer;
            white-space: nowrap;
            font-family: inherit;
            flex-shrink: 0;
        }

        /* Resume hint on a card that has saved progress */
        .resume-hint {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--secondary);
        }

        .episode-notes {
            margin-top: 14px;
            padding: 14px 16px;
            border-radius: 12px;
            background: rgba(99, 102, 241, 0.08);
            border: 1px solid rgba(99, 102, 241, 0.14);
            color: var(--text-main);
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .episode-notes strong {
            color: var(--primary);
        }

        .episode-notes ul {
            margin: 8px 0 0 18px;
        }

        .episode-notes li {
            margin: 4px 0;
        }

        .episode-action {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            color: var(--primary);
            font-size: 0.9rem;
            font-weight: 700;
            text-decoration: none;
        }

        .episode-action:hover {
            text-decoration: underline;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* Channel Info */
        .channel-info {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: var(--shadow);
            animation: fadeInUp 0.8s ease-out 0.3s backwards;
        }

        .channel-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            flex-shrink: 0;
        }

        .channel-details h2 {
            font-size: 1.5rem;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .channel-details p {
            color: var(--text-muted);
            line-height: 1.6;
        }

        .channel-stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Progress Bar */
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(99, 102, 241, 0.2);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0%;
            transition: width 0.1s linear;
        }

        /* Now Playing Indicator */
        .now-playing {
            display: none;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 10px;
        }

        .now-playing.active {
            display: flex;
        }

        .now-playing span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(1.2);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .channel-info {
                flex-direction: column;
                text-align: center;
            }

            .channel-stats {
                justify-content: center;
            }

            .episode-header {
                flex-direction: column;
            }

            .episode-number {
                align-self: flex-start;
            }
        }

        /* Tag */
        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 10px;
        }

        .tag-short {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
        }

        .tag-essay {
            background: rgba(168, 85, 247, 0.1);
            color: var(--secondary);
        }

        .tag-fill {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
        }

        .tag-term {
            background: rgba(249, 115, 22, 0.1);
            color: #f97316;
        }

        .tag-mock {
            background: rgba(14, 165, 233, 0.12);
            color: #0ea5e9;
        }

        .tag-scholar {
            background: rgba(236, 72, 153, 0.1);
            color: #ec4899;
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="index.html" class="back-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
            返回首页
        </a>

        <header>
            <h1>🎙️ 播客频道</h1>
            <p class="subtitle">Podcast Channels - 复习带背</p>
        </header>

        <!-- Channel Tabs -->
        <div class="channel-tabs" id="channelTabs" role="tablist">
            <button type="button" class="channel-tab active" data-channel="political-science"
                role="tab" aria-selected="true">
                <span>📚</span> 国考政治学
            </button>
            <button type="button" class="channel-tab" data-channel="ipe"
                role="tab" aria-selected="false">
                <span>💹</span> 国政经
            </button>
            <button type="button" class="channel-tab" data-channel="ipcs-mocks"
                role="tab" aria-selected="false">
                <span>🌐</span> 国比政经
            </button>
            <button type="button" class="channel-tab coming" data-channel="international-relations"
                role="tab" aria-selected="false" aria-disabled="true" disabled>
                <span>🌍</span> 国际关系
                <span class="coming-badge">敬请期待</span>
            </button>
            <button type="button" class="channel-tab coming" data-channel="dialectics"
                role="tab" aria-selected="false" aria-disabled="true" disabled>
                <span>🔬</span> 自然辩证法
                <span class="coming-badge">敬请期待</span>
            </button>
        </div>

        <!-- Channel Info -->
        <div class="channel-info" id="channelInfo">
            <div class="channel-icon">📚</div>
            <div class="channel-details">
                <h2 id="channelName">国考政治学</h2>
                <p id="channelDesc">政治学核心考点带背，包含简答题、论述题、名词解释等题型，帮助你高效掌握重点知识。</p>
                <div class="channel-stats">
                    <div class="stat">📢 <span id="episodeCount">9</span> 集</div>
                    <div class="stat">⏱️ <span id="channelDuration">总时长约 4 小时</span></div>
                    <div class="stat">🎓 <span id="channelAudience">适合考研/国考复习</span></div>
                </div>
            </div>
        </div>

        <!-- Playback speed toolbar -->
        <div class="toolbar">
            <span class="toolbar-label">播放速度</span>
            <div class="speed-group" id="speedGroup">
                <button class="speed-btn" data-rate="0.5">0.5x</button>
                <button class="speed-btn" data-rate="0.75">0.75x</button>
                <button class="speed-btn" data-rate="1">1x</button>
                <button class="speed-btn" data-rate="1.25">1.25x</button>
                <button class="speed-btn" data-rate="1.5">1.5x</button>
                <button class="speed-btn" data-rate="1.75">1.75x</button>
                <button class="speed-btn" data-rate="2">2x</button>
            </div>
        </div>

        <!-- Resume last-listened banner -->
        <div class="resume-banner" id="resumeBanner">
            <div class="resume-text" id="resumeText"></div>
            <button class="resume-btn" id="resumeBtn">继续收听 →</button>
        </div>

        <!-- Episodes List -->
        <div class="episodes-section" id="episodesList">
            <!-- Episodes will be loaded here -->
        </div>
    </div>

    <script>
        // 音频托管基址（可配置）
        //  · 留空 ''        = 用仓库内相对路径（本地预览 / 若 mp3 仍在仓库时）
        //  · 设为下载基址    = 从 GitHub Releases 加载，mp3 不再占用仓库体积
        const AUDIO_BASE = 'https://github.com/ppray/ppray.github.io/releases/download/podcast-audio';
        // 中文文件名的 political-science 资产改用 ASCII 别名（GitHub 上传 API 不支持多字节名）
        const ASSET_MAP = {
            'podcasts/political-science/名词解释_30题必背.mp3': 'political-science__noun-explanation-30.mp3',
            'podcasts/political-science/填空题.mp3': 'political-science__fill-in-blank.mp3',
            'podcasts/political-science/政治学简答题带背第1集_茉莉版.mp3': 'political-science__short-answer-1.mp3',
            'podcasts/political-science/政治学简答题带背第2集_茉莉版.mp3': 'political-science__short-answer-2.mp3',
            'podcasts/political-science/政治学简答题带背第3集_茉莉版.mp3': 'political-science__short-answer-3.mp3',
            'podcasts/political-science/政治学简答题带背补充_第6-8题_茉莉版.mp3': 'political-science__short-answer-suppl-6-8.mp3',
            'podcasts/political-science/政治学论述题带背第1集.mp3': 'political-science__essay-1.mp3',
            'podcasts/political-science/政治学论述题带背第2集_mimo.mp3': 'political-science__essay-2.mp3',
            'podcasts/political-science/简答题极简带背.mp3': 'political-science__short-answer-minimal.mp3',
        };
        // 其余文件（ipe / ipcs，纯 ASCII）规则：podcasts/<channel>/<name>.mp3 → <channel>__<name>.mp3
        function audioUrl(file) {
            if (!file || !AUDIO_BASE) return file;
            const asset = ASSET_MAP[file] || file.replace(/^podcasts\//, '').replace(/\//g, '__');
            return AUDIO_BASE.replace(/\/$/, '') + '/' + asset;
        }

        // Channel Data
        // 频道元信息（稳定、不漂移）：name / icon / desc / audience 仍硬编码。
        // episodes 与 duration 由对应 JSON 在启动时 fetch 后填充，避免数据双轨漂移。
        const channels = {
            'political-science': {
                name: '国考政治学',
                icon: '📚',
                desc: '政治学核心考点带背，包含简答题、论述题、名词解释等题型，帮助你高效掌握重点知识。',
                audience: '适合考研/国考复习',
                jsonUrl: 'podcasts/political-science/episodes.json',
                episodes: []
            },
            'ipe': {
                name: '国政经',
                icon: '💹',
                desc: '国政经（翟东升·货币金融）题库带背，按「四层理论框架」分集：①历史演变→②现实结构→③中国处境→④破局之路，共 11 集。茉莉中文 TTS。',
                audience: '适合国政经专题复习',
                jsonUrl: 'podcasts/ipe/episodes.json',
                episodes: []
            },
            'ipcs-mocks': {
                name: '国比政经模拟卷',
                icon: '🌐',
                desc: '《国际与比较政治经济学研究》15 套模拟卷全量带背，每集一套：5 名词 + 3 简答 + 2 论述。参考田野、宋新宁/陈岳、吉尔平、基欧汉、斯特兰奇、考克斯、沃勒斯坦等。',
                audience: '适合考前一周冲刺',
                jsonUrl: 'podcasts/ipcs-mocks/episodes.json',
                episodes: []
            },
            'international-relations': {
                name: '国际关系',
                icon: '🌍',
                desc: '国际关系史、制度分析方法等核心内容带背，涵盖理论框架与重点案例。',
                audience: '适合国关课程复习',
                episodes: []
            },
            'dialectics': {
                name: '自然辩证法',
                icon: '🔬',
                desc: '科学技术观、方法论与辩证思维要点带背，助力快速掌握核心概念。',
                audience: '适合自然辩证法复习',
                episodes: []
            }
        };

        // Tag labels
        const tagLabels = {
            'short': { text: '简答', class: 'tag-short' },
            'essay': { text: '论述', class: 'tag-essay' },
            'fill': { text: '填空', class: 'tag-fill' },
            'term': { text: '名词', class: 'tag-term' },
            'mock': { text: '模拟卷', class: 'tag-mock' },
            'scholar': { text: '学术人物', class: 'tag-scholar' }
        };

        let currentChannel = 'political-science';
        let currentAudio = null;

        // ---- Playback speed + resume (localStorage) ----
        const RATE_KEY = 'podcast_rate_v1';       // 播放倍速
        const PROGRESS_KEY = 'podcast_progress_v1'; // { [file]: seconds }
        const LAST_KEY = 'podcast_last_v1';        // 最近收听的一集

        function loadJSON(key, fallback) {
            try { return JSON.parse(localStorage.getItem(key)) ?? fallback; }
            catch { return fallback; }
        }
        function saveJSON(key, val) {
            try { localStorage.setItem(key, JSON.stringify(val)); } catch { }
        }

        let playbackRate = parseFloat(localStorage.getItem(RATE_KEY)) || 1;
        let progress = loadJSON(PROGRESS_KEY, {});

        function getProgress(file) {
            const s = progress[file];
            return (typeof s === 'number' && s > 0) ? s : 0;
        }
        function setProgress(file, seconds) {
            progress[file] = seconds;
            saveJSON(PROGRESS_KEY, progress);
        }
        function clearProgress(file) {
            delete progress[file];
            saveJSON(PROGRESS_KEY, progress);
        }
        function fmtTime(sec) {
            sec = Math.max(0, Math.floor(sec || 0));
            const m = Math.floor(sec / 60), s = sec % 60;
            return `${m}:${String(s).padStart(2, '0')}`;
        }

        // 把秒数格式化为"约 X 分钟" / "约 X.X 小时"，用于单集展示
        function fmtDurationMin(sec) {
            sec = Math.max(0, Math.floor(sec || 0));
            if (sec < 60) return `约 ${sec} 秒`;
            const m = Math.round(sec / 60);
            if (m < 60) return `约 ${m} 分钟`;
            const h = (sec / 3600).toFixed(1);
            return `约 ${h} 小时`;
        }

        // 频道总时长：累加各集 duration_seconds，格式化为"约 X 小时" / "约 X 分钟"
        function fmtChannelDuration(episodes) {
            const total = episodes.reduce((s, e) => s + (e.duration_seconds || 0), 0);
            if (!total) return '—';
            const h = total / 3600;
            if (h >= 1) return `总时长约 ${h.toFixed(1)} 小时`;
            return `总时长约 ${Math.round(total / 60)} 分钟`;
        }

        // 把 JSON 里的一条集数归一化为页面渲染所需的结构
        // · duration_seconds → 派生展示用 duration 字符串
        // · file 字段保持原样（audioUrl 会进一步映射到 Releases）
        function normalizeEpisode(ep) {
            return {
                title: ep.title,
                file: ep.file,
                type: ep.type,
                duration: fmtDurationMin(ep.duration_seconds),
                duration_seconds: ep.duration_seconds || 0
            };
        }

        // 按需加载单个频道的 episodes（懒加载）。
        // · 用 ch._loaded 标记避免重复 fetch；已加载直接返回
        // · JSON 会随分集重组更新，用 no-cache 走条件请求(304 时仍用缓存，
        //   服务器有更新时立即拉新)，避免 force-cache 导致旧 JSON 长期滞留
        // · 失败时降级为空列表 + loadError 标记，渲染层会显示占位
        async function loadChannel(channelId) {
            const ch = channels[channelId];
            if (!ch || !ch.jsonUrl || ch._loaded) return;
            try {
                const res = await fetch(ch.jsonUrl, { cache: 'no-cache' });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                ch.episodes = (Array.isArray(data) ? data : []).map(normalizeEpisode);
                ch.loadError = false;
            } catch (e) {
                console.error(`[podcast] 加载 ${ch.jsonUrl} 失败:`, e);
                ch.episodes = [];
                ch.loadError = true;
            } finally {
                ch._loaded = true;
            }
        }

        // 空闲时预取其它频道的 JSON，切 Tab 时秒开（命中 HTTP 缓存则零网络）。
        // 注意：预取只 warm up 浏览器磁盘缓存，不标记 _loaded、不填充 episodes。
        // 数据填充永远走 loadChannel，避免"预取过 ⇒ loadChannel 跳过 ⇒ episodes 仍为空"的竞态。
        function prefetchOtherChannels(currentId) {
            const doPrefetch = (ch) => {
                fetch(ch.jsonUrl, { cache: 'no-cache' })
                    .catch(() => { /* 预取失败不影响主流程 */ });
            };
            // requestIdleCallback 不支持时降级为 setTimeout
            const sched = window.requestIdleCallback || ((fn) => setTimeout(fn, 200));
            Object.entries(channels).forEach(([id, ch]) => {
                if (id !== currentId && ch.jsonUrl && !ch._loaded) sched(() => doPrefetch(ch));
            });
        }

        // Initialize
        async function init() {
            setupSpeedControl();
            // 暗色模式先应用，避免渲染时闪一下
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.body.setAttribute('data-theme', 'dark');
            }
            // 只加载默认频道即可首屏渲染，其余空闲时预取
            await loadChannel(currentChannel);
            renderChannel(currentChannel);
            setupTabs();
            renderResumeBanner();
            prefetchOtherChannels(currentChannel);
        }

        // ---- Speed control ----
        function setupSpeedControl() {
            const group = document.getElementById('speedGroup');
            group.querySelectorAll('.speed-btn').forEach(btn => {
                const rate = parseFloat(btn.dataset.rate);
                const active = rate === playbackRate;
                btn.classList.toggle('active', active);
                btn.setAttribute('aria-pressed', active ? 'true' : 'false');
                btn.addEventListener('click', () => {
                    playbackRate = rate;
                    localStorage.setItem(RATE_KEY, String(rate));
                    group.querySelectorAll('.speed-btn').forEach(b => {
                        const on = b === btn;
                        b.classList.toggle('active', on);
                        b.setAttribute('aria-pressed', on ? 'true' : 'false');
                    });
                    // Apply to every audio element on the page immediately
                    document.querySelectorAll('.audio-player').forEach(a => { a.playbackRate = rate; });
                });
            });
        }

        // ---- Resume banner (last-listened, cross-channel) ----
        // 懒加载后，上一集可能在尚未加载的频道里。
        // 因此 LAST_KEY 同时存了 channelName / episodeTitle / file，横幅不再依赖 episodes 是否已加载。
        function renderResumeBanner() {
            const banner = document.getElementById('resumeBanner');
            const last = loadJSON(LAST_KEY, null);
            const saved = last && last.file ? getProgress(last.file) : 0;
            if (!last || !last.file || !last.channelName || !last.episodeTitle || saved <= 5) {
                banner.classList.remove('active');
                return;
            }
            document.getElementById('resumeText').innerHTML =
                `上次收听 <b>${last.channelName}</b> · ${last.episodeTitle}，播放到 <b>${fmtTime(saved)}</b>`;
            const btn = document.getElementById('resumeBtn');
            btn.setAttribute('aria-label',
                `继续收听 ${last.channelName} 的 ${last.episodeTitle}，从 ${fmtTime(saved)} 开始`);
            btn.onclick = async () => {
                // 切到对应频道（会触发懒加载），就绪后再定位音频并播放
                await selectChannel(last.channelId, { scrollToFile: last.file, playFrom: saved });
            };
            banner.classList.add('active');
        }

        // 切换频道：同步 active 类、aria-selected，并跳过 disabled 的"敬请期待"频道
        // options.scrollToFile / playFrom：由"继续收听"按钮传入，切完后滚动定位并自动播放
        async function selectChannel(channelId, options = {}) {
            currentChannel = channelId;
            document.querySelectorAll('.channel-tab').forEach(t => {
                const on = t.dataset.channel === channelId;
                t.classList.toggle('active', on);
                if (t.hasAttribute('aria-selected')) t.setAttribute('aria-selected', on ? 'true' : 'false');
            });
            // 未命中缓存时先显示 loading，避免页面停在旧频道内容上
            const ch = channels[channelId];
            if (ch && ch.jsonUrl && !ch._loaded) {
                renderChannelLoading(channelId);
            }
            await loadChannel(channelId);
            renderChannel(channelId);
            // 续听：渲染完成后再定位 audio 元素（此时 DOM 已就绪）
            if (options.scrollToFile) {
                const audio = document.querySelector(
                    `.audio-player[data-file="${CSS.escape(options.scrollToFile)}"]`);
                if (audio) {
                    audio.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    if (options.playFrom) {
                        audio.play().catch(() => { });
                    }
                }
            }
        }

        // 频道数据加载中：先更新频道信息卡，列表区给 loading 占位
        function renderChannelLoading(channelId) {
            const ch = channels[channelId];
            if (!ch) return;
            document.getElementById('channelName').textContent = ch.name;
            document.getElementById('channelDesc').textContent = ch.desc;
            document.getElementById('channelAudience').textContent = ch.audience;
            document.querySelector('.channel-icon').textContent = ch.icon;
            document.getElementById('episodeCount').textContent = '…';
            document.getElementById('channelDuration').textContent = '…';
            document.getElementById('episodesList').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">⏳</div>
                    <h3>加载中…</h3>
                </div>
            `;
        }

        // Setup tabs
        function setupTabs() {
            document.querySelectorAll('.channel-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    if (tab.disabled || tab.classList.contains('coming')) return;
                    selectChannel(tab.dataset.channel);
                });
            });
        }

        // Render channel
        function renderChannel(channelId) {
            const channel = channels[channelId];
            document.getElementById('channelName').textContent = channel.name;
            document.getElementById('channelDesc').textContent = channel.desc;
            document.getElementById('episodeCount').textContent = channel.episodes.length;
            document.getElementById('channelDuration').textContent = fmtChannelDuration(channel.episodes);
            document.getElementById('channelAudience').textContent = channel.audience;
            document.querySelector('.channel-icon').textContent = channel.icon;

            const episodesList = document.getElementById('episodesList');

            // 加载失败：明确提示，而不是静默空白
            if (channel.loadError) {
                episodesList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <h3>音频列表加载失败</h3>
                        <p>请检查网络后刷新页面重试。</p>
                    </div>
                `;
                return;
            }

            if (channel.episodes.length === 0) {
                episodesList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h3>该频道暂未上线</h3>
                        <p>内容正在准备中，敬请期待...</p>
                    </div>
                `;
                return;
            }

            episodesList.innerHTML = channel.episodes.map((ep, index) => `
                <div class="episode-card">
                    <div class="episode-header">
                        <div class="episode-number">${index + 1}</div>
                        <div class="episode-info">
                            <div class="episode-title">
                                ${ep.title}
                                <span class="tag ${tagLabels[ep.type]?.class || 'tag-short'}">${tagLabels[ep.type]?.text || '音频'}</span>
                            </div>
                            <div class="episode-meta">
                                <span>⏱️ ${ep.duration}</span>
                                <span>${ep.file ? `🎵 ${ep.file.split('.').pop().toUpperCase()}` : '📝 文字带背'}</span>
                            </div>
                            ${ep.file ? `
                                <div class="audio-player-wrapper">
                                    <audio class="audio-player" controls preload="metadata"
                                        data-file="${ep.file}" data-index="${index}">
                                        <source src="${audioUrl(ep.file)}" type="audio/mpeg">
                                        您的浏览器不支持音频播放。
                                    </audio>
                                    <div class="resume-hint" id="resume-hint-${index}"
                                        style="${getProgress(ep.file) > 5 ? '' : 'display:none'}">
                                        ⏸️ 上次听到 ${fmtTime(getProgress(ep.file))}，播放即从此处继续
                                    </div>
                                    <div class="now-playing" id="now-playing-${index}">
                                        <span></span> 正在播放...
                                    </div>
                                </div>
                            ` : `
                                <div class="episode-notes">
                                    <strong>带背提纲</strong>
                                    <ul>
                                        ${ep.notes.map(note => `<li>${note}</li>`).join('')}
                                    </ul>
                                    ${ep.link ? `<a class="episode-action" href="${ep.link}">进入题库继续刷题 →</a>` : ''}
                                </div>
                            `}
                        </div>
                    </div>
                </div>
            `).join('');

            // Setup audio events
            setupAudioEvents();
        }

        // Setup audio events
        function setupAudioEvents() {
            document.querySelectorAll('.audio-player').forEach((audio, index) => {
                const file = audio.dataset.file;
                let lastSaved = 0;

                // Apply the current global speed to this player
                audio.playbackRate = playbackRate;

                // Restore saved position once metadata is available.
                // preload="metadata" 让 loadedmetadata 在用户点播放之前就触发，
                // 因此 seek 完成后才进入播放，不会出现"先播一秒再跳回"。
                audio.addEventListener('loadedmetadata', () => {
                    if (audio.dataset.resumed) return;
                    const saved = getProgress(file);
                    if (saved > 5 && (!audio.duration || saved < audio.duration - 5)) {
                        audio.currentTime = saved;
                    }
                    audio.dataset.resumed = '1';
                });

                audio.addEventListener('play', () => {
                    audio.playbackRate = playbackRate;
                    // Pause other audios
                    document.querySelectorAll('.audio-player').forEach((a, i) => {
                        if (a !== audio && !a.paused) {
                            a.pause();
                            document.getElementById(`now-playing-${i}`).classList.remove('active');
                        }
                    });
                    document.getElementById(`now-playing-${index}`).classList.add('active');
                    // 记住最近收听的一集。懒加载后横幅可能在频道未加载时渲染，
                    // 因此同时缓存频道名/标题，横幅不再依赖 episodes 是否已就绪。
                    const ch = channels[currentChannel];
                    const ep = ch && ch.episodes[index];
                    saveJSON(LAST_KEY, {
                        channelId: currentChannel,
                        channelName: ch ? ch.name : '',
                        episodeTitle: ep ? ep.title : '',
                        file
                    });
                });

                // Persist progress at most every ~5s while playing
                audio.addEventListener('timeupdate', () => {
                    const t = audio.currentTime;
                    if (Math.abs(t - lastSaved) >= 5 && t > 0) {
                        lastSaved = t;
                        setProgress(file, Math.floor(t));
                    }
                });

                audio.addEventListener('pause', () => {
                    document.getElementById(`now-playing-${index}`).classList.remove('active');
                    if (audio.currentTime > 5 && !audio.ended) {
                        setProgress(file, Math.floor(audio.currentTime));
                    }
                });

                audio.addEventListener('ended', () => {
                    document.getElementById(`now-playing-${index}`).classList.remove('active');
                    clearProgress(file);           // finished ⇒ next time starts fresh
                    const hint = document.getElementById(`resume-hint-${index}`);
                    if (hint) hint.style.display = 'none';
                });
            });
        }

        // Initialize on load
        init();
    </script>
</body>

</html>
