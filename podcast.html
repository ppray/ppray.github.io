            color: var(--text-main);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),

            z-index: -1;
            backdrop-filter: blur(5px);
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {

            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #a855f7);

            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }

        .back-link:hover {
            transform: translateX(-5px);
        }

            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeInUp 0.8s ease-out 0.2s backwards;
        }

        .channel-tab {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow);
        }

        .channel-tab:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .channel-tab.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-color: transparent;
        }

        /* Episode List */
        .episodes-section {
            animation: fadeInUp 0.8s ease-out 0.4s backwards;
        }

        .episode-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
        }

        .episode-card:hover {
            border-color: var(--primary);
            transform: translateX(5px);
        }

        .episode-header {
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }

        .episode-number {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .episode-info {
            flex: 1;
        }

        .episode-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 5px;
        }

        .episode-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .episode-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Audio Player */
        .audio-player-wrapper {
            margin-top: 15px;
        }

        .audio-player {
            width: 100%;
            height: 44px;
            border-radius: 10px;
            background: var(--bg-blur);
        }

        .episode-notes {
            margin-top: 14px;
            padding: 14px 16px;
            border-radius: 12px;
            background: rgba(99, 102, 241, 0.08);
            border: 1px solid rgba(99, 102, 241, 0.14);

            line-height: 1.7;
            font-size: 0.95rem;

        .episode-notes li {
            margin: 4px 0;
        }

            gap: 6px;
            margin-top: 12px;
            color: var(--primary);
            font-size: 0.9rem;
            font-weight: 700;
            text-decoration: none;
        }

            text-decoration: underline;

            color: var(--text-muted);
        }

            font-size: 4rem;
            margin-bottom: 20px;

            align-items: center;

            justify-content: center;

            color: var(--text-muted);

            gap: 20px;

        .stat {

            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);

            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }

            width: 100%;
            height: 4px;
            background: rgba(99, 102, 241, 0.2);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0%;
            transition: width 0.1s linear;

        .now-playing {
            display: none;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 10px;

            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(1.2);
            }

</head>

                icon: '🌍',
                desc: '国际关系史、制度分析方法等核心内容带背，涵盖理论框架与重点案例。',
                duration: '待更新',
                audience: '适合国关课程复习',
                episodes: []
            },
            'dialectics': {
                name: '自然辩证法',
                icon: '🔬',
                desc: '科学技术观、方法论与辩证思维要点带背，助力快速掌握核心概念。',
                duration: '待更新',
                audience: '适合自然辩证法复习',
                episodes: []
            }
        };

        // Tag labels
        const tagLabels = {
            'short': { text: '简答', class: 'tag-short' },
            'essay': { text: '论述', class: 'tag-essay' },
            'fill': { text: '填空', class: 'tag-fill' },
            'term': { text: '名词', class: 'tag-term' },
            'mock': { text: '模拟卷', class: 'tag-mock' },
            'scholar': { text: '学术人物', class: 'tag-scholar' }
        };

        let currentChannel = 'political-science';
        let currentAudio = null;

        // Initialize
        function init() {
            renderChannel(currentChannel);
            setupTabs();

            // Dark mode
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.body.setAttribute('data-theme', 'dark');
            }
        }

        // Setup tabs
        function setupTabs() {
            document.querySelectorAll('.channel-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.channel-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentChannel = tab.dataset.channel;
                    renderChannel(currentChannel);
                });
            });
        }

        // Render channel
        function renderChannel(channelId) {
            const channel = channels[channelId];
            document.getElementById('channelName').textContent = channel.name;
            document.getElementById('channelDesc').textContent = channel.desc;
            document.getElementById('episodeCount').textContent = channel.episodes.length;
            document.getElementById('channelDuration').textContent = channel.duration;
            document.getElementById('channelAudience').textContent = channel.audience;
            document.querySelector('.channel-icon').textContent = channel.icon;

            const episodesList = document.getElementById('episodesList');

            if (channel.episodes.length === 0) {
                episodesList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h3>暂无内容</h3>
                        <p>该频道正在准备中，敬请期待...</p>
                    </div>
                `;
                return;
            }

            episodesList.innerHTML = channel.episodes.map((ep, index) => `
                <div class="episode-card">
                    <div class="episode-header">
                        <div class="episode-number">${index + 1}</div>
                        <div class="episode-info">
                            <div class="episode-title">
                                ${ep.title}
                                <span class="tag ${tagLabels[ep.type]?.class || 'tag-short'}">${tagLabels[ep.type]?.text || '音频'}</span>
                            </div>
                            <div class="episode-meta">
                                <span>📅 ${ep.date}</span>
                                <span>⏱️ ${ep.duration}</span>
                                <span>${ep.file ? `🎵 ${ep.file.split('.').pop().toUpperCase()}` : '📝 文字带背'}</span>
                            </div>
                            ${ep.file ? `
                                <div class="audio-player-wrapper">
                                    <audio class="audio-player" controls preload="none">
                                        <source src="${ep.file}" type="audio/mpeg">
                                        您的浏览器不支持音频播放。
                                    </audio>
                                    <div class="now-playing" id="now-playing-${index}">
                                        <span></span> 正在播放...
                                    </div>
                                </div>
                            ` : `
                                <div class="episode-notes">
                                    <strong>带背提纲</strong>
                                    <ul>
                                        ${ep.notes.map(note => `<li>${note}</li>`).join('')}
                                    </ul>
                                    ${ep.link ? `<a class="episode-action" href="${ep.link}">进入题库继续刷题 →</a>` : ''}
                                </div>
                            `}
                        </div>
                    </div>
                </div>
            `).join('');

            // Setup audio events
            setupAudioEvents();
        }

        // Setup audio events
        function setupAudioEvents() {
            document.querySelectorAll('.audio-player').forEach((audio, index) => {
                audio.addEventListener('play', () => {
                    // Pause other audios
                    document.querySelectorAll('.audio-player').forEach((a, i) => {
                        if (i !== index && !a.paused) {
                            a.pause();
                            document.getElementById(`now-playing-${i}`).classList.remove('active');
                        }
                    });
                    document.getElementById(`now-playing-${index}`).classList.add('active');
                });

                audio.addEventListener('pause', () => {
                    document.getElementById(`now-playing-${index}`).classList.remove('active');
                });

                audio.addEventListener('ended', () => {
                    document.getElementById(`now-playing-${index}`).classList.remove('active');
                });
            });
        }

        // Initialize on load
        init();
    </script>
</body>

</html>
