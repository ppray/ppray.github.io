<svg width="100%" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#283593;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="500" fill="#f5f5f5" rx="10"/>
  
  <!-- 标题 -->
  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a237e">美国债务上限：信用卡博弈图</text>
  
  <!-- 信用卡主体 -->
  <g transform="translate(400,250)" filter="url(#shadow)">
    <!-- 信用卡 -->
    <rect x="-200" y="-120" width="400" height="240" rx="15" fill="url(#cardGradient)"/>
    
    <!-- 卡面信息 -->
    <text x="-180" y="-100" font-size="12" fill="#fff">美国联邦政府信用卡</text>
    <text x="-180" y="-80" font-size="16" font-weight="bold" fill="#ffd700">债务上限额度</text>
    <text x="0" y="-30" text-anchor="middle" font-size="36" font-weight="bold" fill="#ffd700">$31.4万亿</text>
    <text x="0" y="0" text-anchor="middle" font-size="14" fill="#e0e0e0">（2023年6月触及）</text>
    
    <!-- 持卡人信息 -->
    <text x="-180" y="50" font-size="12" fill="#e0e0e0">持卡人：美国国会</text>
    <text x="-180" y="70" font-size="12" fill="#e0e0e0">发卡行：美国财政部</text>
    
    <!-- 有效期 -->
    <text x="180" y="70" text-anchor="end" font-size="12" fill="#e0e0e0">有效期：永久（需定期提高额度）</text>
    
    <!-- 100+标记 -->
    <circle cx="180" cy="-100" r="25" fill="#ff5722"/>
    <text x="180" y="-100" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="bold" fill="#fff">100+</text>
    <text x="180" y="-75" text-anchor="middle" font-size="10" fill="#ff5722">已上调次数</text>
  </g>
  
  <!-- 两党拔河 -->
  <g transform="translate(400,250)">
    <!-- 驴（民主党） -->
    <g transform="translate(-250,0)">
      <circle cx="0" cy="0" r="30" fill="#1976d2"/>
      <text x="0" y="5" text-anchor="middle" font-size="20">驴</text>
      <text x="0" y="45" text-anchor="middle" font-size="12" fill="#1976d2">民主党</text>
    </g>
    
    <!-- 象（共和党） -->
    <g transform="translate(250,0)">
      <circle cx="0" cy="0" r="30" fill="#d32f2f"/>
      <text x="0" y="5" text-anchor="middle" font-size="20">象</text>
      <text x="0" y="45" text-anchor="middle" font-size="12" fill="#d32f2f">共和党</text>
    </g>
    
    <!-- 拔河绳 -->
    <line x1="-220" y1="0" x2="-200" y2="0" stroke="#795548" stroke-width="4"/>
    <line x1="200" y1="0" x2="220" y2="0" stroke="#795548" stroke-width="4"/>
  </g>
  
  <!-- 警示标志 -->
  <g transform="translate(400,380)">
    <!-- 政府停摆 -->
    <rect x="-150" y="-20" width="120" height="40" fill="#ff9800" rx="5"/>
    <text x="-90" y="5" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">政府停摆</text>
    
    <!-- 技术性违约 -->
    <rect x="30" y="-20" width="120" height="40" fill="#f44336" rx="5"/>
    <text x="90" y="5" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">技术性违约</text>
  </g>
  
  <!-- 四个评价维度（信用卡四角） -->
  <g transform="translate(400,250)">
    <!-- 左上：政治经济学本质 -->
    <g transform="translate(-220,-180)">
      <rect x="-60" y="-15" width="120" height="30" fill="#4caf50" rx="15"/>
      <text x="0" y="5" text-anchor="middle" font-size="11" fill="#fff">① 伪问题</text>
    </g>
    <line x1="-220" y1="-150" x2="-200" y2="-120" stroke="#4caf50" stroke-width="2" stroke-dasharray="5,3"/>
    
    <!-- 右上：政治博弈工具 -->
    <g transform="translate(220,-180)">
      <rect x="-60" y="-15" width="120" height="30" fill="#2196f3" rx="15"/>
      <text x="0" y="5" text-anchor="middle" font-size="11" fill="#fff">② 博弈筹码</text>
    </g>
    <line x1="220" y1="-150" x2="200" y2="-120" stroke="#2196f3" stroke-width="2" stroke-dasharray="5,3"/>
    
    <!-- 左下：信用与信誉损耗 -->
    <g transform="translate(-220,180)">
      <rect x="-60" y="-15" width="120" height="30" fill="#ff9800" rx="15"/>
      <text x="0" y="5" text-anchor="middle" font-size="11" fill="#fff">③ 信誉损耗</text>
    </g>
    <line x1="-220" y1="150" x2="-200" y2="120" stroke="#ff9800" stroke-width="2" stroke-dasharray="5,3"/>
    
    <!-- 右下：结构性矛盾未解 -->
    <g transform="translate(220,180)">
      <rect x="-60" y="-15" width="120" height="30" fill="#9c27b0" rx="15"/>
      <text x="0" y="5" text-anchor="middle" font-size="11" fill="#fff">④ 结构矛盾</text>
    </g>
    <line x1="220" y1="150" x2="200" y2="120" stroke="#9c27b0" stroke-width="2" stroke-dasharray="5,3"/>
  </g>
  
  <!-- 记忆口诀 -->
  <rect x="200" y="430" width="400" height="40" fill="#e3f2fd" rx="20"/>
  <text x="400" y="455" text-anchor="middle" font-size="14" fill="#1565c0" font-weight="bold">
    记忆口诀：信用卡额度两党争，停摆违约是威胁，百次上调老问题
  </text>
</svg>