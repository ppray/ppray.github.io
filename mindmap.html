                            ]
                        },
                        {

                            itemStyle: { color: '#f59e0b' },
                            children: [
                                {

                                },

                                {
                                    name: "• {k|马克思主义} (Marxism)",
                                    example: "主体：{k|阶级}；目标：公平与解放；逻辑：批判{k|结构性不平等}、经济基础决定论。"

                            ]
                        }
                    ]
                },
                {
                    name: "Ⅴ. 全球周期 ⏰",
                    itemStyle: { color: '#8b5cf6' },
                    children: [
                        {
                            name: "❓ 典型周期分类 (时长)",
                            children: [
                                {
                                    name: "• 按时长：基钦 / 朱格拉 / 康波",
                                    example: "1. 基钦({k|库存})：3-5年；2. 朱格拉({k|资本支出})：8-10年；3. 康波({k|技术革命})：45-60年。"

                        },
                        {
                            name: "❓ 美林时钟锚点",
                            children: [
                                {
                                    name: "• 复苏期：{k|股票} (GDP↑ 通胀↓)",
                                    example: "逻辑：{k|盈利回升} + 估值扩张。低通胀给予了货币政策宽松的空间。"
                                },
                                {
                                    name: "• 过热期：{k|商品} (GDP↑ 通胀↑)",
                                    example: "逻辑：产能饱和推高资源价格，资源类商品成为防御通胀的最佳资产。"
                                },
                                {
                                    name: "• 滞胀期：{k|现金} (GDP↓ 通胀↑)",
                                    example: "逻辑：{k|现金为王}。增长停滞而物价飙升，股债双杀，防御至上。"
                                },
                                {
                                    name: "• 衰退期：{k|债券} (GDP↓ 通胀↓)",
                                    example: "逻辑：避险情绪升温。通胀下降预期推低利率，确定的票息资产受宠。"
                                }
                            ]
                        },
                        {
                            name: "⭐ 库存周期深度梳理",
                            itemStyle: { color: '#f59e0b' },
                            children: [
                                {
                                    name: "• {k|核心机制}：预期差与时滞",
                                    example: "定义：由于企业对市场需求变化的预期误差和反应时滞，导致库存被动或主动调整，从而引发约3-5年的经济小周期（基钦周期）。"
                                },
                                {
                                    name: "• 1. 🧗 {k|被动去库存}：需求回升 (追不上)",
                                    example: "特征：产出跟不上需求，库存下降。产品价格上涨，盈利虽有所下滑但仍较高，现金流趋紧。"
                                },
                                {
                                    name: "• 2. 🚀 {k|主动补库存}：补产拓能 (最景气)",
                                    example: "特征：需求旺盛，企业主动增产。价格继续上涨，盈利大幅上升，现金流充裕，是经济最景气阶段。"
                                },
                                {
                                    name: "• 3. 📦 {k|被动补库存}：需求放缓 (高估了)",
                                    example: "特征：前期高估需求维持高产，导致库存积累。价格涨幅放缓，盈利增速减缓，现金流再次趋紧。"
                                },
                                {
                                    name: "• 4. 📉 {k|主动去库存}：减产降损 (铺路期)",
                                    example: "特征：需求疲弱，企业减产。价格趋稳或下跌，盈利下降，现金流紧张，直至经济触底，为下一轮复苏铺路。"
                                }
                            ]
                        }
                    ]
                },
                {
                    name: "Ⅵ. 文献导读 �",
                    itemStyle: { color: '#10b981' },
                    children: [
                        {
                            name: "❓ 全球化三流派",
                            children: [
                                {
                                    name: "• {k|超全球派}：国家消失",
                                    example: "观点：认为全球市场一体化使国家边界失去意义，跨国资本成为{k|真实主宰}。"
                                },
                                {
                                    name: "• {k|怀疑论派}：国家主导",
                                    example: "观点：全球化只是高度国际化，世界经济仍被{k|核心工业国}主导，国家实力未减。"
                                },
                                {
                                    name: "• {k|变革论派}：国家重构",
                                    example: "观点：国家权力并未消失，而是在适应全球化环境中发生{k|职能转型}与权力重组。"
                                }

                        {

                                },
                                {
                                    name: "• 结构性：{k|规则环境塑造}",
                                    example: "定义：通过操纵框架、议程和规则（如金融/知识体系），决定他人的【选择范围】，使他人在“自愿”中服从霸权逻辑。"
                                },
                                {
                                    name: "• 四维：{k|安全} / {k|生产} / {k|金融} / {k|知识}",
                                    example: "模型：苏珊·斯特兰奇提出，这四大结构共同支撑了全球权力的{k|金字塔}。",
                                    children: [
                                        {
                                            name: "  └ {k|安全结构}",
                                            example: "定义：控制保护或威胁安全的权力。\n\n示例：{k|军事力量}提供秩序、核威慑保障国家安全、维和行动维护区域稳定。"
                                        },
                                        {
                                            name: "  └ {k|生产结构}",
                                            example: "定义：决定商品和服务生产方式的权力。\n\n示例：{k|技术标准}（如5G、芯片）、全球产业链分工、制造能力优势决定生产话语权。"
                                        },
                                        {
                                            name: "  └ {k|金融结构}",
                                            example: "定义：控制信贷、资本分配的权力。\n\n示例：{k|美元体系}主导全球结算、SWIFT系统控制跨境支付、IMF影响融资条件。"
                                        },
                                        {
                                            name: "  └ {k|知识结构}",
                                            example: "定义：控制知识、信念、信息传播和获取的权力。\n\n示例：{k|互联网治理}、技术专利垄断、教育体系输出价值观、媒体话语权塑造认知。"
                                        }
                                    ]
                                }
                            ]
                        },
                        {
                            name: "⭐ 霸权稳定论",
                            itemStyle: { color: '#f59e0b' },
                            children: [
                                {
                                    name: "• 论点1：{k|功能说}（Kindleberger）",
                                    example: "核心：世界经济稳定需要{k|稳定者}。霸权国提供{k|公共产品}（市场/货币/安全/贷款）。若霸权缺失（如1929年英衰美退），体系将陷入混乱（{k|金德尔伯格陷阱}）。"
                                },

                                    name: "• 论点2：{k|动力学}（Gilpin）",
                                    example: "机制：{k|不平衡增长}导致霸权国成本（消费/军费）>收益，边缘国通过搭便车追赶。结局：体系失衡 → {k|霸权战争} → 新霸权确立（生命周期论）。"
                                },
                                {
                                    name: "• 论点3：{k|相对收益}（Grieco）",
                                    example: "反驳：格雷科强调国家关注{k|相对收益}（你比我多赚多少）而非绝对收益。霸权衰落后，因担心合作伙伴将经济收益转化为安全威胁，{k|合作难以为继}。"
                                },
                                {
                                    name: "• 论点4：{k|制度论}（Keohane）",
                                    example: "修正：基欧汉认为{k|制度有惯性}（降低交易成本/提供信息）。即便霸权衰落，国家为了绝对收益仍可维持合作（{k|后霸权合作}）。"
                                }
                            ]
                        }
                    ]
                }
            ]
        };

        let myChart = null;
        let isTestMode = false;
        let isRadial = false;

        function initChart() {
            const chartDom = document.getElementById('main-container');
            myChart = echarts.init(chartDom);
            render();

            document.getElementById('loading').style.opacity = 0;
            setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
        }

        function render() {
            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    show: true,
                    trigger: 'item',
                    backgroundColor: 'rgba(15, 23, 42, 0.95)',
                    borderColor: '#3b82f6',
                    padding: [10, 14],
                    textStyle: { color: '#fff', fontSize: 13 },
                    formatter: (params) => {
                        if (isTestMode) return null;
                        let name = params.name.replace(/\{k\|/g, '').replace(/\}/g, '');
                        if (params.data.example) {
                            let ex = params.data.example.replace(/\{k\|/g, '').replace(/\}/g, '');
                            return `
                                <div style="margin-bottom:4px;color:#94a3b8;font-size:10px;font-weight:bold;text-transform:uppercase;letter-spacing:1px">Knowledge Detail</div>
                                <div style="font-weight:bold;margin-bottom:10px;font-size:15px;color:#fff">${name}</div>
                                <div style="border-top:1px solid rgba(255,255,255,0.1);padding-top:10px">
                                    <span style="color:#38bdf8;font-weight:bold">💡 记忆案例：</span><br/>
                                    <span style="color:#e2e8f0;line-height:1.6">${ex}</span>
                                </div>
                            `;
                        }
                        return `<div style="font-weight:bold">${name}</div>`;
                    }
                },
                series: [
                    {
                        type: 'tree',
                        data: [rawData],
                        top: '12%',
                        left: isRadial ? '10%' : '12%',
                        bottom: '12%',
                        right: isRadial ? '10%' : '20%',
                        symbolSize: 8,
                        layout: isRadial ? 'radial' : 'orthogonal',
                        initialTreeDepth: 1,
                        label: {
                            position: 'right',
                            verticalAlign: 'middle',
                            align: 'left',
                            fontSize: 14,
                            offset: [10, 0],
                            color: '#f8fafc',
                            fontWeight: '700',
                            rich: {
                                k: {
                                    color: '#38bdf8',
                                    fontWeight: '900',
                                    fontSize: 15
                                }
                            }
                        },
                        leaves: {
                            label: {
                                position: 'right',
                                verticalAlign: 'middle',
                                align: 'left',
                                fontSize: 13,
                                offset: [10, 0],
                                // In test mode, text color matches background to 'hide' it
                                color: isTestMode ? 'transparent' : '#94a3b8',
                                rich: {
                                    k: {
                                        color: isTestMode ? 'transparent' : '#38bdf8',
                                        fontWeight: '900',
                                        fontSize: 14,
                                        backgroundColor: isTestMode ? 'transparent' : 'rgba(56, 189, 248, 0.15)',
                                        borderRadius: 4,
                                        padding: [2, 4, 2, 4]
                                    }
                                }
                            }
                        },
                        emphasis: {
                            focus: 'descendant',
                            label: {
                                color: '#3b82f6', // Bright blue on hover
                                fontSize: 16,
                                rich: {
                                    k: {
                                        color: '#3b82f6',
                                        fontWeight: '900',
                                        fontSize: 16,
                                        backgroundColor: 'rgba(59, 130, 246, 0.2)',
                                        borderRadius: 4,
                                        padding: [2, 4, 2, 4]
                                    }
                                }
                            }
                        },
                        expandAndCollapse: true,
                        animationDuration: 600,
                        lineStyle: {
                            color: '#334155',
                            width: 2.5,
                            curveness: 0.5
                        },
                        itemStyle: {
                            borderColor: '#3b82f6',
                            borderWidth: 2
                        }
                    }
                ]
            };

            if (window.innerWidth < 768) {
                option.series[0].label.fontSize = 11;
                option.series[0].leaves.label.fontSize = 10;
                option.series[0].left = '5%';
                option.series[0].right = '40%';
            }

            myChart.setOption(option, true);
        }

        function toggleTestMode() {
            isTestMode = !isTestMode;
            document.getElementById('testModeBtn').classList.toggle('active');
            document.getElementById('mode-indicator').innerText = isTestMode ? "模式：自测挑战 · 隐藏答案" : "模式：深度背诵 · 关键词记忆";
            document.getElementById('mode-indicator').classList.toggle('text-blue-500');
            render();
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                document.getElementById('fullscreenBtn').classList.add('active');
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                    document.getElementById('fullscreenBtn').classList.remove('active');
                }
            }
        }

        function toggleLayout() {
            isRadial = !isRadial;
            document.getElementById('layoutBtn').classList.toggle('active');
            render();
        }

        function resetView() {
            isTestMode = false;
            isRadial = false;
            document.getElementById('testModeBtn').classList.remove('active');
            document.getElementById('layoutBtn').classList.remove('active');
            document.getElementById('mode-indicator').innerText = "模式：深度背诵 · 关键词记忆";
            document.getElementById('mode-indicator').classList.remove('text-blue-500');
            myChart.dispatchAction({ type: 'restore' });
            render();
        }

        window.addEventListener('resize', () => myChart && myChart.resize());
        setTimeout(initChart, 200);

    </script>
</body>

</html>
