\u5236\u5ea6\u6784\u60f3**\uff1a\u5728\u6218\u65f6\u8bbe\u60f3\u7684\"\u56fd\u9645\u6e05\u7b97\u540c\u76df\"\uff08Bancor \u65b9\u6848\uff09\u4e2d\uff0c\u8d4b\u4e88\u5404\u56fd\u4fdd\u7559\u5fc5\u8981\u8d44\u672c\u7ba1\u5236\u548c\u8d38\u6613\u8c03\u6574\u6743\u7684\u7a7a\u95f4\uff0c\u53cd\u6620\u4e86\u5176\u8d85\u8d38\u6613\u4fdd\u62a4\u4e3b\u4e49\u9057\u4ea7\u3002\n\n\u51ef\u6069\u65af\u7684\u8d85\u4fdd\u62a4\u4e3b\u4e49\u662f**\u5d4c\u5165\u5f0f\u81ea\u7531\u4e3b\u4e49**\uff08Ruggie\uff09\u7684\u601d\u60f3\u524d\u9a71\uff0c\u628a\u8d38\u6613\u81ea\u7531\u5316\u7f6e\u4e8e\u56fd\u5185\u5b8f\u89c2\u7a33\u5b9a\u7684\u4ece\u5c5e\u5730\u4f4d\uff08\u53c2\u89c1\u5409\u5c14\u5e73\u7b2c\u516b\u7ae0\uff1b\u5b8b\u65b0\u5b81/\u9648\u5cb3\u7b2c\u56db\u7ae0\uff09\u3002\n\n### 6. \u7b80\u8ff0\u7406\u6027\u9009\u62e9\u5236\u5ea6\u4e3b\u4e49\u7684\u4e3b\u8981\u547d\u9898\u3010\u6a21\u62df-1\u300115\u3011\n\n\u7406\u6027\u9009\u62e9\u5236\u5ea6\u4e3b\u4e49\uff08Rational Choice Institutionalism, RCI\uff09\u662f 1970 \u5e74\u4ee3\u4ee5\u6765\u5174\u8d77\u7684\u65b0\u5236\u5ea6\u4e3b\u4e49\u4e09\u5927\u6d41\u6d3e\u4e4b\u4e00\uff08\u53e6\u4e24\u4e3a\u5386\u53f2\u5236\u5ea6\u4e3b\u4e49\u3001\u793e\u4f1a\u5b66\u5236\u5ea6\u4e3b\u4e49\uff09\uff0c\u5176\u5b66\u672f\u6e90\u5934\u662f\u65b0\u5236\u5ea6\u7ecf\u6d4e\u5b66\uff08\u79d1\u65af\u3001\u8bfa\u601d\u3001\u5a01\u5ec9\u59c6\u68ee\uff09\u4e0e\u516c\u5171\u9009\u62e9\u5b66\u6d3e\uff08\u5e03\u574e\u5357\uff09\u3002\u4e3b\u8981\u547d\u9898\uff1a\n\n1. **\u884c\u4e3a\u4eba\u5047\u8bbe**\uff1a\u884c\u4e3a\u8005\u662f**\u6709\u9650\u7406\u6027\u3001\u8ffd\u6c42\u6548\u7528\u6700\u5927\u5316\u7684\u7b56\u7565\u6027\u4e3b\u4f53**\uff0c\u5236\u5ea6\u88ab\u89c6\u4e3a\u7ea6\u675f\u884c\u4e3a\u7684\"\u535a\u5f08\u89c4\u5219\"\u6216\"\u6fc0\u52b1\u7ed3\u6784\"\u3002\n2. **\u5236\u5ea6\u7684\u529f\u80fd\u6027\u8d77\u6e90**\uff1a\u5236\u5ea6\u56e0**\u964d\u4f4e\u4ea4\u6613\u6210\u672c\u3001\u89e3\u51b3\u96c6\u4f53\u884c\u52a8\u56f0\u5883\u3001\u63d0\u4f9b\u4fe1\u606f\u3001\u7a33\u5b9a\u9884\u671f**\u7b49\u529f\u80fd\u6027\u9700\u8981\u800c\u4ea7\u751f\uff08\"\u529f\u80fd\u89e3\u91ca\"\uff09\u3002\n3. **\u5236\u5ea6\u5373\u5747\u8861**\uff1a\u5236\u5ea6\u662f\u884c\u4e3a\u8005\u5728\u53cd\u590d\u535a\u5f08\u4e2d\u5f62\u6210\u7684\u7a33\u5b9a\u9884\u671f\u4e0e\u7b56\u7565\u7ec4\u5408\uff08\u5747\u8861\u6982\u5ff5\uff09\uff0c\u5e76\u901a\u8fc7\u81ea\u6211\u5b9e\u65bd\u673a\u5236\uff08self-enforcing\uff09\u7ef4\u7cfb\u3002\n4. **\u6f14\u7ece\u2014\u5747\u8861\u2014\u6bd4\u8f83\u9759\u6001\u5206\u6790**\uff1a\u65b9\u6cd5\u4e0a\u91cd\u89c6\u5f62\u5f0f\u5316\u5efa\u6a21\u3001\u535a\u5f08\u8bba\u3001\u6bd4\u8f83\u9759\u6001\u63a8\u7406\u3002\n5. **\u56fd\u9645\u5173\u7cfb\u542b\u4e49**\uff1a\u57fa\u6b27\u6c49\u300a\u9738\u6743\u4e4b\u540e\u300b\u501f\u6b64\u8bba\u8bc1\u56fd\u9645\u5236\u5ea6\u5373\u4f7f\u5728\u9738\u6743\u8870\u843d\u540e\u4ecd\u80fd\u6301\u7eed\u2014\u2014\u56e0\u4e3a\u6210\u5458\u56fd\u5728\u53cd\u590d\u535a\u5f08\u4e2d\u5df2\u5efa\u7acb\u9884\u671f\u4e0e\u5229\u76ca\u7ed1\u5b9a\uff0c\u64a4\u9664\u5236\u5ea6\u7684\u8f6c\u6362\u6210\u672c\u5de8\u5927\u3002\n\n\u4ee3\u8868\u4eba\u7269\uff1a\u8bfa\u601d\u3001\u5965\u65af\u7279\u7f57\u59c6\u3001\u8c22\u6cfc\u65af\u5c14\u3001\u6e29\u52a0\u65af\u7279\uff0c\u56fd\u5173\u9886\u57df\u6709\u57fa\u6b27\u6c49\u3001\u7c73\u5c14\u7eb3\u3001\u9a6c\u4e01\uff08Lisa Martin\uff09\u7b49\u3002\u5176\u4f18\u70b9\u662f\u903b\u8f91\u4e25\u5bc6\u3001\u53ef\u8bc1\u4f2a\uff1b\u5e38\u88ab\u6279\u8bc4\u5ffd\u89c6\u5386\u53f2\u3001\u6587\u5316\u4e0e\u6743\u529b\uff08\u53c2\u89c1\u7530\u91ce\u7b2c\u4e00\u3001\u4e8c\u7ae0\uff09\u3002\n\n### 7. \u7b80\u8ff0\u5386\u53f2\u5236\u5ea6\u4e3b\u4e49\u7684\u4e3b\u8981\u547d\u9898\u3010\u6a21\u62df-2\u3011\n\n\u5386\u53f2\u5236\u5ea6\u4e3b\u4e49\uff08Historical Institutionalism, HI\uff09\u662f\u65b0\u5236\u5ea6\u4e3b\u4e49\u4e09\u6d41\u6d3e\u4e4b\u4e00\uff0c\u4ee5\u65af\u8003\u5207\u6ce2\uff08Skocpol\uff09\u3001\u970d\u5c14\uff08P. Hall\uff09\u3001\u65af\u5766\u83ab\uff08Steinmo\uff09\u3001\u585e\u4f26\uff08Thelen\uff09\u7b49\u4e3a\u4ee3\u8868\u3002\u5176\u4e3b\u8981\u547d\u9898\uff1a\n\n1. **\u5236\u5ea6\u7684\u5386\u53f2\u6027**\uff1a\u5236\u5ea6\u662f\u5386\u53f2\u8fdb\u7a0b\u7684\u4ea7\u7269\uff0c**\u5173\u952e\u65f6\u523b\uff08critical junctures\uff09**\u7684\u9009\u62e9\u4f1a\u957f\u671f\u9501\u5b9a\u5236\u5ea6\u8def\u5f84\u3002\n2. **\u8def\u5f84\u4f9d\u8d56\uff08Path Dependence\uff09**\uff1a\u5236\u5ea6\u4e00\u65e6\u5f62\u6210\uff0c\u4f1a\u901a\u8fc7\u62a5\u916c\u9012\u589e\uff08\u5b66\u4e60\u6548\u5e94\u3001\u534f\u8c03\u6548\u5e94\u3001\u9002\u5e94\u9884\u671f\u3001\u7f51\u7edc\u5916\u90e8\u6027\uff09\u81ea\u6211\u5f3a\u5316\uff0c\u4f7f\u540e\u7eed\u9009\u62e9\u88ab\u9501\u5b9a\uff0c\u91cd\u65b0\u9009\u62e9\u6210\u672c\u9ad8\u6602\u3002\n3. **\u5173\u952e\u8282\u70b9 + \u957f\u671f\u7a33\u5b9a**\uff1a\u5236\u5ea6\u6f14\u53d8\u5448\"\u95f4\u65ad\u2014\u7a33\u5b9a\u2014\u95f4\u65ad\"\u6a21\u5f0f\uff08punctuated equilibrium\uff09\uff1a\u957f\u671f\u7a33\u5b9a\u88ab\u5076\u53d1\u7684\u5371\u673a/\u51b2\u51fb\u6253\u7834\uff0c\u8fdb\u5165\u65b0\u4e00\u8f6e\u8def\u5f84\u4f9d\u8d56\u3002\n4. **\u6743\u529b\u975e\u5bf9\u79f0\u6027**\uff1a\u5236\u5ea6\u4e0d\u4ec5\u6709\u534f\u8c03\u4e0e\u964d\u4f4e\u4ea4\u6613\u6210\u672c\u7684\u529f\u80fd\uff0c\u66f4\u662f**\u6743\u529b\u6597\u4e89\u7684\u4ea7\u7269**\uff0c\u53cd\u6620\u7279\u5b9a\u65f6\u671f\u7684\u6743\u529b\u5206\u914d\uff0c\u56e0\u800c\u5177\u6709\u518d\u5206\u914d\u6548\u5e94\u3002\n5. **\u89c2\u5ff5\u4e0e\u884c\u52a8\u8005**\uff1a\u884c\u52a8\u8005\u65e2\u88ab\u5236\u5ea6\u7ed3\u6784\u6240\u5851\u9020\uff0c\u4e5f\u80fd\u5728\u5173\u952e\u65f6\u523b\u901a\u8fc7\u89c2\u5ff5\u521b\u65b0\u3001\u8054\u76df\u91cd\u7ec4\u6539\u53d8\u5236\u5ea6\uff08\"\u6e10\u8fdb\u6027\u5236\u5ea6\u53d8\u8fc1\"\u2014\u2014\u585e\u4f26\u7684\u6982\u5ff5\uff1a\u5206\u5c42\u3001\u6f02\u79fb\u3001\u8f6c\u6362\u3001\u66ff\u6362\u3001\u8017\u5c3d\uff09\u3002\n6. **\u65b9\u6cd5**\uff1a\u504f\u6848\u4f8b\u6bd4\u8f83\u3001\u8fc7\u7a0b\u8ffd\u8e2a\u3001\u957f\u65f6\u6bb5\u5386\u53f2\u53d9\u4e8b\u3002\n\n\u5386\u53f2\u5236\u5ea6\u4e3b\u4e49\u5f25\u8865\u4e86\u7406\u6027\u9009\u62e9\u5236\u5ea6\u4e3b\u4e49\u5bf9\u5386\u53f2\u4e0e\u6743\u529b\u7ef4\u5ea6\u7684\u5ffd\u89c6\uff0c\u5bf9\u89e3\u91ca\u4e0d\u540c\u56fd\u5bb6\u7684\u5236\u5ea6\u5dee\u5f02\uff08\u5982\u798f\u5229\u56fd\u5bb6\u7c7b\u578b\u5b66\u3001\u6c47\u7387\u5236\u5ea6\u9009\u62e9\u3001\u91d1\u878d\u76d1\u7ba1\u6a21\u5f0f\uff09\u6709\u8f83\u5f3a\u89e3\u91ca\u529b\uff08\u53c2\u89c1\u7530\u91ce\u7b2c\u4e00\u7ae0\uff1b\u970d\u5c14\u300a\u653f\u6cbb\u79d1\u5b66\u7684\u4e09\u79cd\u65b0\u5236\u5ea6\u4e3b\u4e49\u300b\uff09\u3002\n\n### 8. \u7b80\u8ff0\u4ea4\u6613\u6210\u672c\u7684\u5206\u7c7b\u3010\u6a21\u62df-3\u300114\u3011\n\n\u4ea4\u6613\u6210\u672c\u7531\u79d1\u65af\u5728\u300a\u4f01\u4e1a\u7684\u6027\u8d28\u300b\uff081937\uff09\u9996\u521b\uff0c\u5a01\u5ec9\u59c6\u68ee\u7cfb\u7edf\u5206\u7c7b\u3002\u53ef\u6309**\u53d1\u751f\u9636\u6bb5**\u4e0e**\u6027\u8d28**\u4e24\u6761\u601d\u8def\u5206\u7c7b\uff1a\n\n**A. \u6309\u4ea4\u6613\u8fc7\u7a0b\u9636\u6bb5\uff08\u4e8b\u524d vs \u4e8b\u540e\uff09\uff1a**\n1. **\u4e8b\u524d\u4ea4\u6613\u6210\u672c**\uff1a\u2460\u641c\u5bfb\u4fe1\u606f\u6210\u672c\uff08\u627e\u4ea4\u6613\u5bf9\u8c61\u3001\u4ea7\u54c1\u4fe1\u606f\uff09\uff1b\u2461\u8c08\u5224\u4e0e\u7f14\u7ea6\u6210\u672c\uff08\u8ba8\u4ef7\u8fd8\u4ef7\u3001\u8d77\u8349\u5408\u540c\uff09\uff1b\u2462\u7b7e\u7ea6\u51b3\u7b56\u6210\u672c\u3002\n2. **\u4e8b\u540e\u4ea4\u6613\u6210\u672c**\uff1a\u2460\u76d1\u7763\u6210\u672c\uff08\u786e\u8ba4\u5bf9\u65b9\u5c65\u7ea6\uff09\uff1b\u2461\u6267\u884c\u6210\u672c\uff08\u5904\u7406\u8fdd\u7ea6\u3001\u8bc9\u8bbc\u4ef2\u88c1\uff09\uff1b\u2462\u8c03\u6574\u6210\u672c\uff08\u6839\u636e\u5916\u90e8\u53d8\u5316\u91cd\u65b0\u8c08\u5224\uff09\uff1b\u2463\u9501\u5b9a\u6210\u672c\uff08\u5173\u7cfb\u4e13\u7528\u6295\u8d44\u88ab\u5bf9\u65b9\"\u6572\u7af9\u6760\"\uff09\u3002\n\n**B. \u6309\u6027\u8d28\uff08\u5317\u65b9/\u5a01\u5ec9\u59c6\u68ee\u7efc\u5408\uff09\uff1a**\n1. **\u4fe1\u606f\u6210\u672c**\uff1a\u514b\u670d\u4fe1\u606f\u4e0d\u5bf9\u79f0\u7684\u6210\u672c\u3002\n2. **\u8c08\u5224\u6210\u672c**\uff1a\u4e0e\u8c08\u5224\u529b\u3001\u5404\u65b9\u6570\u91cf\u3001\u8bae\u7a0b\u590d\u6742\u6027\u76f8\u5173\u3002\n3. **\u76d1\u7763\u4e0e\u6267\u884c\u6210\u672c**\uff1a\u68c0\u6d4b\u8fdd\u7ea6\u3001\u65bd\u52a0\u60e9\u7f5a\u3001\u7ef4\u62a4\u5951\u7ea6\u5c65\u884c\u7684\u6210\u672c\u3002\n4. **\u4e0d\u786e\u5b9a\u6027\u6ea2\u4ef7**\uff1a\u73af\u5883\u4e0d\u786e\u5b9a\u6027\u5bfc\u81f4\u7684\u989d\u5916\u5951\u7ea6\u8bbe\u8ba1\u6210\u672c\u3002\n\n**\u56fd\u9645\u5173\u7cfb\u542b\u4e49**\uff1a\u57fa\u6b27\u6c49\u300a\u9738\u6743\u4e4b\u540e\u300b\u5c06\u4ea4\u6613\u6210\u672c\u6982\u5ff5\u5f15\u5165 IPE\uff0c\u8bba\u8bc1**\u56fd\u9645\u5236\u5ea6\u7684\u6838\u5fc3\u529f\u80fd\u5c31\u662f\u964d\u4f4e\u56fd\u5bb6\u95f4\u5408\u4f5c\u7684\u4e8b\u524d\u4e0e\u4e8b\u540e\u4ea4\u6613\u6210\u672c**\u2014\u2014\u63d0\u4f9b\u4fe1\u606f\uff08\u51cf\u5c11\u4e0d\u5bf9\u79f0\uff09\u3001\u7a33\u5b9a\u9884\u671f\uff08\u51cf\u5c11\u4e0d\u786e\u5b9a\u6027\uff09\u3001\u8bbe\u7acb\u76d1\u7763\u673a\u5236\uff08\u51cf\u5c11\u673a\u4f1a\u4e3b\u4e49\uff09\u3001\u964d\u4f4e\u91cd\u590d\u8c08\u5224\u6210\u672c\uff08\u63d0\u4f9b\u6301\u7eed\u6846\u67b6\uff09\u3002\u56e0\u6b64\u5373\u4f7f\u9738\u6743\u8870\u843d\uff0c\u56fd\u5bb6\u4ecd\u56e0\u8f6c\u6362\u6210\u672c\u800c\u7ef4\u7cfb\u65e2\u6709\u5236\u5ea6\uff08\u53c2\u89c1\u7530\u91ce\u7b2c\u4e8c\u7ae0\uff09\u3002\n\n### 9. \u7b80\u8ff0\u516c\u5171\u9009\u62e9\u7406\u8bba\u7684\u5047\u8bbe\u3010\u6a21\u62df-6\u3011\n\n\u516c\u5171\u9009\u62e9\u7406\u8bba\uff08Public Choice\uff09\u7531\u5e03\u574e\u5357\u3001\u5854\u6d1b\u514b\u5728 1960\u201470 \u5e74\u4ee3\u521b\u7acb\uff0c\u4ee5\u300a\u540c\u610f\u7684\u8ba1\u7b97\u300b\u300a\u81ea\u7531\u5e02\u573a\u4e0e\u56fd\u5bb6\u300b\u4e3a\u4ee3\u8868\u4f5c\uff0c\u628a\u7ecf\u6d4e\u5b66\u65b9\u6cd5\u5e94\u7528\u4e8e\u653f\u6cbb\u8fc7\u7a0b\u5206\u6790\u3002\u5176\u6838\u5fc3\u5047\u8bbe\uff1a\n\n1. **\u65b9\u6cd5\u8bba\u4e2a\u4f53\u4e3b\u4e49**\uff1a\u653f\u6cbb\u884c\u4e3a\u5206\u6790\u5e94\u4ece\u4e2a\u4f53\u51fa\u53d1\uff0c\u96c6\u4f53\u884c\u52a8\u662f\u4e2a\u4f53\u9009\u62e9\u7684\u52a0\u603b\u3002\n2. **\u7406\u6027\u81ea\u5229\u4eba\u5047\u8bbe\uff08\u540c\u8d28\u5316\uff09**\uff1a\u653f\u6cbb\u4eba\u4e0e\u7ecf\u6d4e\u4eba\u9075\u5faa\u540c\u4e00\u884c\u4e3a\u903b\u8f91\u2014\u2014\u8ffd\u6c42\u81ea\u8eab\u6548\u7528\u6700\u5927\u5316\u3002**\u5b98\u5458\u3001\u8bae\u5458\u3001\u9009\u6c11\u3001\u5229\u76ca\u96c6\u56e2**\u90fd\u662f\u7406\u6027\u81ea\u5229\u8005\uff0c\u4e0d\u5b58\u5728\u5929\u7136\"\u4e3a\u516c\"\u7684\u653f\u6cbb\u4eba\u3002\n3. **\u653f\u6cbb\u5373\u4ea4\u6613**\uff1a\u653f\u6cbb\u8fc7\u7a0b\u88ab\u89c6\u4e3a\u5404\u65b9\u5229\u76ca\u7684\u4ea4\u6613\u548c\u535a\u5f08\uff0c\u7c7b\u4f3c\u5e02\u573a\u8fc7\u7a0b\uff1b\u653f\u6cbb\"\u5e02\u573a\"\u4ea6\u53d7\u4f9b\u6c42\u89c4\u5f8b\u652f\u914d\u3002\n4. **\u653f\u5e9c\u5931\u7075\u5047\u8bbe**\uff1a\u653f\u5e9c\u4e0d\u5fc5\u7136\u7ea0\u6b63\u5e02\u573a\u5931\u7075\uff0c\u53ef\u80fd\u56e0\u5b98\u50da\u6269\u5f20\u3001\u5bfb\u79df\u3001\u4fe1\u606f\u4e0d\u8db3\u3001\u6295\u7968\u6096\u8bba\u800c\u4ea7\u751f\u653f\u5e9c\u5931\u7075\u3002\n5. **\u5236\u5ea6\u7ea6\u675f\u81f3\u5173\u91cd\u8981**\uff1a\u65e2\u7136\u653f\u6cbb\u4eba\u81ea\u5229\uff0c\u5fc5\u987b\u901a\u8fc7\u5baa\u653f\u89c4\u5219\u3001\u5206\u6743\u5236\u8861\u3001\u89c4\u5219\u5316\u51b3\u7b56\u7ea6\u675f\u6743\u529b\uff0c\u624d\u80fd\u907f\u514d\u4fb5\u8680\u516c\u5171\u5229\u76ca\u3002\n\n\u4e3b\u8981\u63a8\u8bba\uff1a\u2460\u653f\u6cbb\u5546\u4e1a\u5468\u671f\uff1b\u2461\u5bfb\u79df\u73b0\u8c61\uff1b\u2462\u9009\u6c11\u7406\u6027\u65e0\u77e5\uff1b\u2463\u5229\u76ca\u96c6\u56e2\u5bf9\u653f\u7b56\u7684\u5f71\u54cd\uff1b\u2464\u6295\u7968\u6096\u8bba\u4e0e\u8bae\u7a0b\u64cd\u7eb5\uff1b\u2465\u591a\u6570\u4eba\u7684\u66b4\u653f\u4e0e\u5c11\u6570\u4eba\u7684\u5265\u593a\u3002\u516c\u5171\u9009\u62e9\u5bf9 IPE \u7684\u5f71\u54cd\u4e3b\u8981\u5728\u8d38\u6613\u653f\u6cbb\uff08\u4fdd\u62a4\u5f85\u552e\u6a21\u578b\uff09\u3001\u592e\u884c\u72ec\u7acb\u6027\u8bba\u8bc1\u3001\u6c47\u7387\u653f\u6cbb\u5206\u6790\u7b49\uff08\u53c2\u89c1\u6a0a\u52c7\u660e\u7b2c\u4e94\u7ae0\uff09\u3002\n\n### 10. \u7b80\u8ff0\u5bfb\u79df\u652f\u51fa\u7684\u7c7b\u578b\u3010\u6a21\u62df-6\u3011\n\n\u5bfb\u79df\uff08rent-seeking\uff09\u7531 Tullock\uff081967\uff09\u9996\u521b\uff0cKrueger\uff081974\uff09\u6b63\u5f0f\u547d\u540d\uff0c\u6307\u7ecf\u6d4e\u4e3b\u4f53\u4e3a\u83b7\u53d6\u6216\u7ef4\u6301\u653f\u5e9c\u521b\u9020\u7684\u3001\u8d85\u8fc7\u5e02\u573a\u7ade\u4e89\u6240\u80fd\u7ed9\u4e88\u7684\u8d85\u989d\u6536\u76ca\uff08\"\u79df\u91d1\"\uff09\u800c\u8fdb\u884c\u7684**\u975e\u751f\u4ea7\u6027**\u8d44\u6e90\u652f\u51fa\u3002\u5bfb\u79df\u652f\u51fa\u7684\u4e3b\u8981\u7c7b\u578b\uff1a\n\n1. **\u76f4\u63a5\u5bfb\u79df\u652f\u51fa**\uff1a\u2460\u653f\u6cbb\u732e\u91d1\u4e0e\u6e38\u8bf4\u652f\u51fa\uff08lobbying\uff09\uff1b\u2461\u5bf9\u5b98\u5458\u7684\u8d3f\u8d42\uff1b\u2462\u7ec4\u5efa\u5229\u76ca\u96c6\u56e2\u3001\u884c\u4e1a\u534f\u4f1a\u7684\u8d39\u7528\uff1b\u2463\u8bc9\u8bbc\u548c\u884c\u653f\u590d\u8bae\u8d39\u7528\u3002\n2. **\u8fc7\u5ea6\u6295\u8d44\u4ee5\u4e89\u53d6\u4fdd\u62a4**\uff1a\u5728\u5c1a\u672a\u786e\u7acb\u4fdd\u62a4\u65f6\uff0c\u4f01\u4e1a\u901a\u8fc7\u5938\u5927\u6295\u8d44\u89c4\u6a21\u3001\u5c31\u4e1a\u4eba\u6570\u7b49\u6307\u6807\uff0c\u5236\u9020\"too big to fail\"\u538b\u529b\uff0c\u4e89\u53d6\u5173\u7a0e\u4fdd\u62a4\u3001\u8865\u8d34\u6216\u6551\u52a9\u3002\n3. **\u884c\u653f\u58c1\u5792\u7684\u8fc7\u5ea6\u914d\u5408**\uff1a\u4e3a\u83b7\u5f97\u8bb8\u53ef\u8bc1\u3001\u914d\u989d\u3001\u7279\u8bb8\u7ecf\u8425\u6743\u800c\u8fdb\u884c\u7684\u8fc7\u5ea6\u6295\u5165\uff0c\u5982\u8bc1\u4e66\u4e0e\u8d44\u8d28\u6295\u8d44\u3001\u5173\u7cfb\u5efa\u8bbe\u3002\n4. **\u9632\u5fa1\u6027\u5bfb\u79df\uff08counter-rent-seeking\uff09**\uff1a\u53d7\u73b0\u884c\u653f\u7b56\u4f24\u5bb3\u7684\u7fa4\u4f53\u4e3a\u64a4\u9500\u4e0d\u5229\u653f\u7b56\u800c\u8fdb\u884c\u7684\u652f\u51fa\uff08\u5982\u51fa\u53e3\u4f01\u4e1a\u53cd\u5bf9\u6c47\u7387\u9ad8\u4f30\u7684\u6e38\u8bf4\uff09\u3002\n5. **\u5bfb\u79df\u7684\u4e8c\u6b21\u884d\u751f**\uff1a\u2460\u4fdd\u62a4\u5784\u65ad\u5730\u4f4d\u7684\u8fdb\u4e00\u6b65\u76d1\u7763\u4e0e\u7ef4\u62a4\u6210\u672c\uff1b\u2461\u653f\u5e9c\u53cd\u5bfb\u79df\u673a\u6784\u672c\u8eab\u7684\u8fd0\u884c\u6210\u672c\uff08\u56fe\u6d1b\u514b\u65b9\u9635\uff09\uff1b\u2462\u5bf9\u5bfb\u79df\u5b98\u5458\u7684\"\u79df\u91d1\u5206\u4eab\"\u5b89\u6392\u3002\n6. **\u5df4\u683c\u74e6\u8482\u7684\u76f4\u63a5\u975e\u751f\u4ea7\u6027\u5bfb\u5229\u6d3b\u52a8\uff08DUP\uff09**\uff1a\u628a\u5bfb\u79df\u63a8\u5e7f\u4e3a\u66f4\u5e7f\u6cdb\u7684\"\u975e\u751f\u4ea7\u6027\u9010\u5229\u6d3b\u52a8\"\uff0c\u5305\u62ec\u6e38\u8bf4\u3001\u8d70\u79c1\u3001\u5173\u7a0e\u9003\u907f\u7b49\u3002\n\n\u5bfb\u79df\u652f\u51fa\u7684\u603b\u793e\u4f1a\u6210\u672c\u901a\u5e38\u8fdc\u8d85\u5bfb\u79df\u8005\u5b9e\u9645\u83b7\u5f97\u7684\u79df\u91d1\uff08\u56fe\u6d1b\u514b\u65b9\u9635 + \u5df4\u683c\u74e6\u8482 DUP\uff09\uff0c\u662f\u653f\u5e9c\u5931\u7075\u548c\u4fdd\u62a4\u6027\u653f\u7b56\u798f\u5229\u635f\u5931\u7684\u6838\u5fc3\u5fae\u89c2\u673a\u5236\uff08\u53c2\u89c1\u7530\u91ce\u7b2c\u516d\u7ae0\uff1b\u6a0a\u52c7\u660e\u7b2c\u4e94\u7ae0\uff09\u3002\n\n### 11. \u7b80\u8ff0\u5e76\u4e3e\u4f8b\u8bf4\u660e\u56fd\u5bb6\u81ea\u4e3b\u6027\u7684\u6765\u6e90\u3010\u6a21\u62df-1\uff0c\u539f\u9898\u4e3a\u7b80\u7b54\u3011\n\n\u56fd\u5bb6\u81ea\u4e3b\u6027\uff08state autonomy\uff09\u6307\u56fd\u5bb6\u53ca\u5176\u5b98\u50da\u4f53\u7cfb\u80fd\u72ec\u7acb\u4e8e\u56fd\u5185\u7279\u5b9a\u5229\u76ca\u96c6\u56e2\u5f62\u6210\u504f\u597d\u5e76\u8d2f\u5f7b\u653f\u7b56\u7684\u80fd\u529b\uff0c\u662f\u56fd\u5bb6\u4e3b\u4e49\u5b66\u6d3e\uff08Skocpol\u3001Krasner\u3001Evans\uff09\u6838\u5fc3\u6982\u5ff5\u3002\u5176\u4e3b\u8981\u6765\u6e90\uff1a\n\n1. **\u5b98\u50da\u7ed3\u6784\u7684\u8fde\u8d2f\u6027\u4e0e\u4e13\u4e1a\u6027**\uff1a\u62e5\u6709\u8fde\u8d2f\u3001\u4e13\u4e1a\u3001\u8003\u8bd5\u5f55\u7528\u3001\u957f\u4efb\u671f\u7684\u5b98\u50da\u7cfb\u7edf\uff0c\u4f7f\u5176\u80fd\u5f62\u6210\u8d85\u8d8a\u5177\u4f53\u5229\u76ca\u96c6\u56e2\u7684\u653f\u7b56\u504f\u597d\u3002**\u4f8b**\uff1a\u65e5\u672c\u901a\u4ea7\u7701\u3001\u97e9\u56fd\u7ecf\u6d4e\u4f01\u5212\u9662\u3001\u65b0\u52a0\u5761\u5efa\u5c4b\u53d1\u5c55\u5c40\u3002\n2. **\u56fd\u5bb6\u4e0e\u793e\u4f1a\u7684\u76f8\u5bf9\u8ddd\u79bb**\uff1a\u56fd\u5bb6\u4e0e\u793e\u4f1a\u7ecf\u6d4e\u7cbe\u82f1\u4e4b\u95f4\u5b58\u5728\u5236\u5ea6\u5316\u533a\u9694\u65f6\uff08\u5982\u9009\u62d4\u673a\u5236\u3001\u8f6e\u5c97\u3001\u56de\u907f\u5236\u5ea6\uff09\uff0c\u81ea\u4e3b\u6027\u66f4\u9ad8\u3002**\u4f8b**\uff1a\u4e2d\u56fd\u5e72\u90e8\u5f02\u5730\u4ea4\u6d41\u5236\u5ea6\u3002\n3. **\u5f3a\u56fd\u5bb6\u7684\u8d22\u653f\u4e0e\u5f3a\u5236\u80fd\u529b**\uff1a\u62e5\u6709\u5145\u8db3\u7684\u8d22\u653f\u6c72\u53d6\u80fd\u529b\u548c\u5f3a\u5236\u5de5\u5177\uff08\u519b\u8b66\u3001\u7a0e\u52a1\uff09\uff0c\u51cf\u5c11\u5bf9\u7279\u5b9a\u96c6\u56e2\u7684\u8d44\u6e90\u4f9d\u8d56\u3002**\u4f8b**\uff1a\u5317\u6b27\u9ad8\u7a0e\u6536\u2014\u9ad8\u516c\u5171\u652f\u51fa\u4f53\u5236\u3002\n4. **\u5916\u90e8\u538b\u529b\u4e0e\u5b89\u5168\u5a01\u80c1**\uff1a\u9762\u4e34\u4e25\u91cd\u5916\u90e8\u5a01\u80c1\uff08\u6218\u4e89\u3001\u5371\u673a\uff09\u65f6\uff0c\u56fd\u5bb6\u53ef\u501f\u5408\u6cd5\u6027\u63d0\u5347\u800c\u6269\u5c55\u81ea\u4e3b\u6027\u3002**\u4f8b**\uff1a\u4ee5\u8272\u5217\u3001\u97e9\u56fd\u51b7\u6218\u65f6\u671f\u7684\u53d1\u5c55\u56fd\u5bb6\u3002\n5. **\u610f\u8bc6\u5f62\u6001\u6b63\u5f53\u6027**\uff1a\u62e5\u6709\u652f\u6491\u56fd\u5bb6\u884c\u52a8\u7684\u610f\u8bc6\u5f62\u6001\u8d44\u6e90\uff08\u5982\u53d1\u5c55\u4e3b\u4e49\u3001\u6c11\u65cf\u4e3b\u4e49\u3001\u5e73\u7b49\u4e3b\u4e49\uff09\u3002**\u4f8b**\uff1a\u4e1c\u4e9a\u53d1\u5c55\u578b\u56fd\u5bb6\"\u8d76\u8d85\"\u53d9\u4e8b\u3002\n6. **\u56fd\u5bb6\u4e0e\u793e\u4f1a\u7684\"\u5d4c\u5165\"\u578b\u8054\u7cfb**\uff1a\u57c3\u6587\u65af\u300a\u5d4c\u5165\u5f0f\u81ea\u4e3b\u6027\u300b\u6307\u51fa\uff0c\u56fd\u5bb6\u4e0e\u91cd\u70b9\u4ea7\u4e1a\u7cbe\u82f1\u4fdd\u6301\u7d27\u5bc6\u4f46\u975e\u4fd8\u83b7\u7684\"\u5d4c\u5165\"\u578b\u8054\u7cfb\uff0c\u4f7f\u653f\u7b56\u5177\u6709\u53ef\u64cd\u4f5c\u6027\u4e14\u4e0d\u88ab\u4fd8\u83b7\u3002**\u4f8b**\uff1a\u97e9\u56fd\u6734\u6b63\u7199\u65f6\u671f\u56fd\u5bb6\u2014\u5927\u4f01\u4e1a\u5173\u7cfb\u3002\n7. **\u56fd\u9645\u5236\u5ea6\u4e0e\u5916\u90e8\u8ba4\u53ef**\uff1a\u56fd\u9645\u5730\u4f4d\u3001\u56fd\u9645\u5236\u5ea6\u6210\u5458\u8d44\u683c\u4e5f\u662f\u81ea\u4e3b\u6027\u7684\u8d44\u6e90\u3002**\u4f8b**\uff1a\u6b27\u5143\u533a\u6210\u5458\u56fd\u592e\u884c\u901a\u8fc7\u6b27\u592e\u884c\u72ec\u7acb\u6027\u63d0\u5347\u81ea\u4e3b\u6027\u3002\n\n\u56fd\u5bb6\u81ea\u4e3b\u6027\u7684\u5f3a\u5f31\u89e3\u91ca\u4e86\u4e3a\u4f55\u76f8\u4f3c\u5916\u90e8\u51b2\u51fb\u4e0b\u4e0d\u540c\u56fd\u5bb6\u4ea7\u4e1a\u653f\u7b56\u6210\u8d25\u5dee\u5f02\u5de8\u5927\uff08\u53c2\u89c1\u7530\u91ce\u7b2c\u4e03\u7ae0\uff1bEvans\u300a\u5d4c\u5165\u7684\u81ea\u4e3b\u6027\u300b\uff09\u3002\n\n### 12. \u7b80\u8ff0\u4ea7\u751f\u56fd\u5bb6\u81ea\u4e3b\u6027\u7684\u6761\u4ef6\u3010\u6a21\u62df-2\u3011\n\n\u627f\u63a5\u4e0a\u9898\u3002\u56fd\u5bb6\u81ea\u4e3b\u6027\u5e76\u975e\u5929\u7136\u5b58\u5728\uff0c\u9700\u8981\u4e00\u7cfb\u5217\u6761\u4ef6\u652f\u6491\u3002\u7efc\u5408 Skocpol\u3001Krasner\u3001Evans \u7b49\u5b66\u8005\u7684\u7814\u7a76\uff0c\u4e3b\u8981\u6761\u4ef6\uff1a\n\n1. **\u56fd\u5bb6\u4e0e\u793e\u4f1a\u7684\u7ed3\u6784\u6027\u5206\u79bb**\uff1a\u5b58\u5728\u533a\u5206\"\u56fd\u5bb6\u573a\u57df\"\u4e0e\"\u793e\u4f1a\u573a\u57df\"\u7684\u5236\u5ea6\u8fb9\u754c\uff08\u516c\u52a1\u5458\u5236\u5ea6\u3001\u5229\u76ca\u51b2\u7a81\u56de\u907f\u3001\u653f\u5546\u65cb\u8f6c\u95e8\u9650\u5236\uff09\u3002\n2. **\u5b98\u50da\u4f53\u7cfb\u7684\u97e6\u4f2f\u5f0f\u7279\u5f81**\uff1a\u2460\u57fa\u4e8e\u8003\u8bd5\u4e0e\u529f\u7ee9\u7684\u9009\u62d4\uff1b\u2461\u5c42\u7ea7\u5316\u3001\u89c4\u5219\u5316\u3001\u6587\u4e66\u5316\u8fd0\u4f5c\uff1b\u2462\u957f\u4efb\u671f\u4e0e\u4e13\u4e1a\u5316\u5206\u5de5\uff1b\u2463\u7a33\u5b9a\u7684\u85aa\u916c\u4e0e\u9000\u4f11\u4fdd\u969c\u3002\u8fd9\u662f Evans\"\u5d4c\u5165\u5f0f\u81ea\u4e3b\u6027\"\u7684\"\u81ea\u4e3b\"\u4e00\u9762\u3002\n3. **\u5145\u8db3\u7684\u8d22\u653f\u4e0e\u5f3a\u5236\u80fd\u529b**\uff1a\u7a33\u5b9a\u8d22\u6e90\uff08\u76f4\u63a5\u7a0e\u4f53\u7cfb\u3001\u571f\u5730\u7a0e\u6216\u8d44\u6e90\u79df\u91d1\uff09+ \u6709\u6548\u66b4\u529b\u5784\u65ad\uff0c\u4f7f\u56fd\u5bb6\u884c\u52a8\u4e0d\u5fc5\u4f9d\u8d56\u7279\u5b9a\u5229\u76ca\u96c6\u56e2\u6350\u8d44\u3002\n4. **\u56fd\u5bb6\u7cbe\u82f1\u7684\u653f\u6cbb\u610f\u5fd7\u4e0e\u51dd\u805a\u529b**\uff1a\u9886\u5bfc\u96c6\u56e2\u5fc5\u987b\u6709\u6e05\u6670\u7684\u6218\u7565\u76ee\u6807\u548c\u5185\u90e8\u4e00\u81f4\u6027\uff08\u5982\u4e1c\u4e9a\u53d1\u5c55\u578b\u56fd\u5bb6\"\u8d76\u8d85\u610f\u8bc6\u5f62\u6001\"\uff09\u3002\n5. **\u62b5\u5fa1\u5229\u76ca\u96c6\u56e2\u4fd8\u83b7\u7684\u5236\u5ea6\u5b89\u6392**\uff1a\u900f\u660e\u5ea6\u3001\u76d1\u7763\u673a\u5236\u3001\u5a92\u4f53\u76d1\u7763\u3001\u53cd\u8150\u673a\u6784\u7b49\u53ef\u9650\u5236\u4fd8\u83b7\u98ce\u9669\u3002\n6. **\u56fd\u9645\u5730\u4f4d\u4e0e\u5916\u90e8\u8d44\u6e90**\uff1a\u56fd\u9645\u627f\u8ba4\u3001\u5916\u63f4\u3001\u5b89\u5168\u4fdd\u62a4\u3001\u6280\u672f\u5f15\u8fdb\u7b49\u4e3a\u56fd\u5bb6\u81ea\u4e3b\u884c\u52a8\u63d0\u4f9b\u8d44\u6e90\u6760\u6746\u3002\n7. **\u5371\u673a\u4e0e\u5173\u952e\u8282\u70b9**\uff1a\u6218\u4e89\u3001\u9769\u547d\u3001\u6df1\u5ea6\u5371\u673a\u7b49\u4f1a**\u77ed\u6682\u89e3\u9501**\u81ea\u4e3b\u6027\u6269\u5f20\u7a97\u53e3\uff0c\u4f46\u80fd\u5426\u5236\u5ea6\u5316\u4e3a\u957f\u671f\u81ea\u4e3b\u6027\u53d6\u51b3\u4e8e\u4e0a\u8ff0\u7ed3\u6784\u6027\u6761\u4ef6\u3002\n8. **\u610f\u8bc6\u5f62\u6001\u4e0e\u793e\u4f1a\u8ba4\u540c**\uff1a\u53d1\u5c55\u4e3b\u4e49\u3001\u6c11\u65cf\u4e3b\u4e49\u3001\u5e73\u7b49\u4e3b\u4e49\u7b49\u6b63\u5f53\u6027\u53d9\u4e8b\u662f\u56fd\u5bb6\u81ea\u4e3b\u884c\u52a8\u7684\"\u8f6f\"\u8d44\u6e90\u3002\n\n\u503c\u5f97\u6ce8\u610f\u7684\u662f\uff0c\u81ea\u4e3b\u6027\u8fc7\u9ad8\u4e5f\u53ef\u80fd\u5bfc\u81f4\u8131\u79bb\u793e\u4f1a\u53cd\u9988\u3001\u8d70\u5411\u63a0\u593a\u578b\u56fd\u5bb6\uff0c\u56e0\u6b64 Evans \u5f3a\u8c03\"\u81ea\u4e3b\u6027\u5fc5\u987b\u4ee5\u5d4c\u5165\u6027\u4e3a\u57fa\u7840\"\u2014\u2014\u65e2\u72ec\u7acb\u4e8e\u53c8\u8054\u7cfb\u4e8e\u5173\u952e\u793e\u4f1a\u96c6\u56e2\uff08\u53c2\u89c1\u7530\u91ce\u7b2c\u4e03\u7ae0\uff1bSkocpol\u300a\u56fd\u5bb6\u4e0e\u793e\u4f1a\u9769\u547d\u300b\uff09\u3002\n\n### 13. \u7b80\u8ff0\u56fd\u5185\u7ed3\u6784\u5bf9\u8de8\u56fd\u884c\u4e3a\u4f53\u8fdb\u5165\u76ee\u6807\u56fd\u793e\u4f1a\u7684\u5f71\u54cd\u3010\u6a21\u62df-3\u3011\n\n\u56fd\u5185\u7ed3\u6784\uff08domestic structure\uff09\u7531 Risse-Kappen\u3001\u5361\u8d5e\u65af\u5766\u53d1\u5c55\uff0c\u6307\u4e00\u56fd\"\u56fd\u5bb6\u2014\u793e\u4f1a\u5173\u7cfb\u7684\u7a33\u5b9a\u6a21\u5f0f\"\uff0c\u5305\u62ec\u56fd\u5bb6\u96c6\u6743\u5ea6\u3001\u793e\u4f1a\u7ec4\u7ec7\u5316\u7a0b\u5ea6\u3001\u56fd\u5bb6\u4e0e\u793e\u4f1a\u7684\u8054\u7cfb\u65b9\u5f0f\u3002\u5b83\u6784\u6210\u8de8\u56fd\u884c\u4e3a\u4f53\uff08\u8de8\u56fd\u516c\u53f8\u3001NGO\u3001\u56fd\u9645\u7ec4\u7ec7\u3001\u5916\u56fd\u653f\u5e9c\u3001\u77e5\u8bc6\u5171\u540c\u4f53\uff09\u8fdb\u5165\u76ee\u6807\u56fd\u793e\u4f1a\u3001\u5f71\u54cd\u5176\u653f\u7b56\u7684\"\u8fc7\u6ee4\u5668\"\u3002\u4e3b\u8981\u5f71\u54cd\u673a\u5236\uff1a\n\n1. **\u5165\u53e3\u6570\u91cf\u4e0e\u6e20\u9053\u5f62\u5f0f**\uff1a\n   - **\u96c6\u6743\u56fd\u5bb6\u3001\u793e\u4f1a\u539f\u5b50\u5316**\uff08\u5982\u82cf\u8054\u5f0f\u56fd\u5bb6\uff09\uff1a\u53ea\u6709\u5c11\u6570\u653f\u5e9c\u5c42\u7ea7\u7684\u5165\u53e3\u53ef\u7528\uff0c\u8de8\u56fd\u884c\u4e3a\u4f53\u51e0\u4e4e\u53ea\u80fd\u8d70\u653f\u5e9c\u6e20\u9053\uff08\u5916\u4ea4\u3001\u5b98\u65b9\u5408\u4f5c\uff09\u3002\n   - **\u5206\u6743\u56fd\u5bb6\u3001\u793e\u4f1a\u591a\u5143\u5316**\uff08\u5982\u7f8e\u56fd\uff09\uff1a\u5165\u53e3\u4f17\u591a\uff08\u56fd\u4f1a\u3001\u5dde\u3001\u5229\u76ca\u96c6\u56e2\u3001\u5a92\u4f53\uff09\uff0c\u8de8\u56fd\u884c\u4e3a\u4f53\u53ef\u8d70\u591a\u6e20\u9053\u6e38\u8bf4\u3002\n   - **\u7edf\u5408\u4e3b\u4e49\u56fd\u5bb6**\uff08\u5982\u5fb7\u56fd\u3001\u5317\u6b27\uff09\uff1a\u5165\u53e3\u96c6\u4e2d\u4e8e\u5c11\u6570\u529f\u80fd\u4ee3\u8868\u673a\u6784\uff08\u9876\u7ea7\u884c\u4e1a\u8054\u5408\u4f1a\u3001\u5de5\u4f1a\uff09\uff0c\u9700\u901a\u8fc7\u5b83\u4eec\u63a5\u5165\u51b3\u7b56\u3002\n2. **\u8054\u76df\u4f19\u4f34\u7684\u9009\u62e9**\uff1a\u56fd\u5185\u7ed3\u6784\u51b3\u5b9a\u8de8\u56fd\u884c\u4e3a\u4f53\u5728\u76ee\u6807\u56fd\u7684\u53ef\u80fd\u76df\u53cb\u3002\u5206\u6743\u591a\u5143\u7ed3\u6784\u4e0b\u76df\u53cb\u9009\u62e9\u4e30\u5bcc\u3001\u653f\u7b56\u5f71\u54cd\u5feb\u4f46\u77ed\u4fc3\uff1b\u96c6\u6743\u7edf\u5408\u7ed3\u6784\u4e0b\u76df\u53cb\u5c11\u4f46\u4e00\u65e6\u5efa\u7acb\u5408\u4f5c\u5f71\u54cd\u6df1\u8fdc\u3002\n3. **\u653f\u7b56\u5f71\u54cd\u901f\u5ea6\u4e0e\u6df1\u5ea6**\uff1a\u5206\u6743\u591a\u5143 \u2192 \u89c1\u6548\u5feb\u4f46\u6613\u53d8\uff1b\u96c6\u6743\u7edf\u5408 \u2192 \u89c1\u6548\u6162\u4f46\u7a33\u5b9a\u3002\n4. **\u8fc7\u6ee4\u6548\u679c**\uff1a\u76f8\u540c\u7684\u56fd\u9645\u538b\u529b\uff08\u5982\u6c14\u5019\u8bae\u9898\u3001\u4eba\u6743\u8bae\u9898\uff09\u5728\u4e0d\u540c\u56fd\u5185\u7ed3\u6784\u4e0b\u4ea7\u751f\u5dee\u5f02\u5316\u7684\u653f\u7b56\u56de\u5e94\u2014\u2014\u5982\u7f8e\u5f0f\u7acb\u6cd5\u653f\u6cbb\u3001\u6b27\u5f0f\u5408\u4f5c\u4e3b\u4e49\u3001\u4e1c\u4e9a\u5f0f\u884c\u653f\u4e3b\u5bfc\u3002\n5. **\u8de8\u56fd\u2014\u56fd\u5185\u8054\u76df**\uff1a\"\u98a0\u5012\u7684\u7b2c\u4e8c\u610f\u8c61\"\u673a\u5236\uff1a\u8de8\u56fd\u884c\u4e3a\u4f53\u5f80\u5f80\u4e0e\u76ee\u6807\u56fd\u5185\u90e8\u53d7\u56fd\u9645\u5316\u51b2\u51fb\u7684\u7fa4\u4f53\u5f62\u6210\u8de8\u8fb9\u754c\u8054\u76df\uff08\u5982\u7f8e\u4f01\u4e0e\u4e2d\u56fd\u5730\u65b9\u653f\u5e9c\u63a8\u52a8\u52a0\u5165 WTO\uff09\u3002\n\n\u8be5\u6846\u67b6\u89e3\u91ca\u4e86\u4e3a\u4f55\u76f8\u540c\u56fd\u9645\u5236\u5ea6\u5bf9\u4e0d\u540c\u56fd\u5bb6\u7684\u5f71\u54cd\u6df1\u6d45\u4e0d\u4e00\uff08\u53c2\u89c1 Risse-Kappen \u7f16\u300a\u628a\u8de8\u56fd\u884c\u4e3a\u4f53\u5e26\u56de\u6765\u300b\uff1b\u5361\u8d5e\u65af\u5766\u300a\u5728\u6743\u529b\u4e0e\u5bcc\u88d5\u4e4b\u95f4\u300b\uff1b\u7530\u91ce\u7b2c\u4e94\u7ae0\uff09\u3002\n\n### 14. \u7b80\u8ff0\u9738\u6743\u56fd\u5efa\u7acb\u7ea6\u675f\u6027\u56fd\u9645\u5236\u5ea6\u7684\u52a8\u673a\u3010\u6a21\u62df-4\u300114\u3011\n\n\u7ea6\u675f\u6027\u56fd\u9645\u5236\u5ea6\uff08binding international institutions\uff09\u6307\u5bf9\u6210\u5458\u56fd\uff08\u5305\u62ec\u9738\u6743\u56fd\u81ea\u8eab\uff09\u884c\u4e3a\u6784\u6210\u5b9e\u8d28\u6027\u7ea6\u675f\u7684\u56fd\u9645\u5236\u5ea6\uff0c\u5982 WTO \u4e89\u7aef\u89e3\u51b3\u673a\u5236\u3001\u300a\u6838\u4e0d\u6269\u6563\u6761\u7ea6\u300b\u3001IMF \u7684\u4efd\u989d\u4e0e\u8868\u51b3\u89c4\u5219\u3002\u9738\u6743\u56fd\u4e3a\u4f55\u613f\u610f\u63a5\u53d7\u5bf9\u81ea\u8eab\u7684\u7ea6\u675f\uff1f\u4e3b\u8981\u52a8\u673a\uff1a\n\n1. **\u53ef\u4fe1\u627f\u8bfa\uff08credible commitment\uff09**\uff1a\u901a\u8fc7\u81ea\u6211\u7ea6\u675f\uff0c\u9738\u6743\u56fd\u80fd\u5411\u5176\u4ed6\u56fd\u5bb6\u53d1\u51fa\"\u4e0d\u4f1a\u6ee5\u7528\u4f18\u52bf\"\u7684\u53ef\u4fe1\u4fe1\u53f7\uff0c\u4ece\u800c\u5438\u5f15\u66f4\u591a\u56fd\u5bb6\u52a0\u5165\u3001\u964d\u4f4e\u5176\u4ed6\u56fd\u5bb6\u7684\u5b89\u5168\u6216\u7ecf\u6d4e\u9632\u5fa1\u6210\u672c\uff0c\u6269\u5927\u5408\u4f5c\u57fa\u7840\u3002\n2. **\u9501\u5b9a\u540e\u9738\u6743\u65f6\u4ee3\u7684\u4f18\u52bf**\uff1a\u7ea6\u7ff0\u00b7\u4f0a\u80af\u4f2f\u91cc\uff08Ikenberry\uff09\u300a\u5927\u6218\u80dc\u5229\u4e4b\u540e\u300b\u8bba\u8bc1\uff1a\u9738\u6743\u56fd\u8d81\u6743\u529b\u9876\u5cf0\u5efa\u7acb\u7ea6\u675f\u6027\u5236\u5ea6\uff0c\u53ef\u5728\u81ea\u8eab\u76f8\u5bf9\u8870\u843d\u540e\u4ecd\u4eab\u53d7\u5236\u5ea6\"\u8def\u5f84\u4f9d\u8d56\"\u7ea2\u5229\u2014\u2014\u5c06\u5f53\u65f6\u7684\u6743\u529b\u4f18\u52bf\"\u5236\u5ea6\u5316\u3001\u6c38\u4e45\u5316\"\u3002\n3. **\u964d\u4f4e\u6cbb\u7406\u6210\u672c\u4e0e\u5916\u90e8\u6027**\uff1a\u7ea6\u675f\u6027\u5236\u5ea6\u53ef\u964d\u4f4e\u53cd\u590d\u8bae\u4ef7\u7684\u4ea4\u6613\u6210\u672c\u3001\u7a33\u5b9a\u9884\u671f\uff0c\u9738\u6743\u56fd\u5b9e\u9645\u4e0a\"\u7528\u90e8\u5206\u81ea\u4e3b\u6027\u6362\u53d6\u7cfb\u7edf\u7a33\u5b9a\"\u3002\n4. **\u5e94\u5bf9\u56fd\u5185\u53cd\u5bf9\u610f\u89c1**\uff1a\u5728\u56fd\u5185\u653f\u6cbb\u5206\u5316\u65f6\uff0c\u9738\u6743\u56fd\u9886\u5bfc\u4eba\u53ef\u501f\u52a9\u56fd\u9645\u627f\u8bfa\u7ea6\u675f\u672a\u6765\u56fd\u5185\u653f\u7b56\u53cd\u590d\uff08\"\u4ee5\u5916\u90e8\u7ea6\u675f\u56fd\u5185\"\uff09\uff0c\u5982\u7f8e\u56fd\u901a\u8fc7 WTO \u7ea6\u675f\u56fd\u5185\u8d38\u6613\u4fdd\u62a4\u6d3e\u3002\n5. **\u7ef4\u62a4\u6b63\u5f53\u6027**\uff1a\u5355\u7eaf\u6743\u529b\u652f\u914d\u4f1a\u6fc0\u8d77\u62b5\u6297\uff0c\u7ea6\u675f\u6027\u5236\u5ea6\u63d0\u4f9b\u5408\u6cd5\u6027\u5916\u8863\uff0c\u4f7f\u9738\u6743\u79e9\u5e8f\u66f4\u5177\u6301\u4e45\u6027\u3002Lake \u79f0\u4e4b\u4e3a\"\u6743\u5a01/\u6b63\u5f53\u6027\u7684\u8d2d\u4e70\"\u3002\n6. **\u62c9\u62e2\u5d1b\u8d77\u56fd**\uff1a\u901a\u8fc7\u8ba9\u51fa\u90e8\u5206\u89c4\u5219\u6743\uff0c\u5438\u7eb3\u5d1b\u8d77\u56fd\u8fdb\u5165\u65e2\u6709\u79e9\u5e8f\uff08\u5982\u4e2d\u56fd\u52a0\u5165 WTO\u3001\u5370\u5ea6\u52a0\u5165\u6c14\u5019\u673a\u5236\uff09\uff0c\u964d\u4f4e\u4f53\u7cfb\u51b2\u7a81\u98ce\u9669\u3002\n7. **\u89e3\u51b3\u4fe1\u606f\u4e0e\u534f\u8c03\u95ee\u9898**\uff1a\u5728\u591a\u8fb9\u6cbb\u7406\u4e2d\uff0c\u7ea6\u675f\u6027\u5236\u5ea6\u5bf9\u6240\u6709\u53c2\u4e0e\u65b9\u800c\u8a00\u964d\u4f4e\u4fe1\u606f\u6210\u672c\u3001\u7a33\u5b9a\u534f\u8c03\uff0c\u9738\u6743\u56fd\u4e5f\u76f4\u63a5\u53d7\u76ca\u3002\n\n\u7ea6\u675f\u6027\u7a0b\u5ea6\u53d7\u9738\u6743\u56fd\u56fd\u5185\u653f\u6cbb\u53d8\u91cf\u5f71\u54cd\uff1a\u5206\u6743\u591a\u5143\u653f\u4f53\u4e0b\u56fd\u4f1a\u76d1\u7763\u66f4\u6613\u8feb\u4f7f\u603b\u7edf\u63a5\u53d7\u7ea6\u675f\uff1b\u5f3a\u4eba\u4f53\u5236\u4e0b\u884c\u653f\u66f4\u503e\u5411\u5355\u8fb9\u4e3b\u4e49\uff08\u53c2\u89c1 Ikenberry\u300a\u5927\u6218\u80dc\u5229\u4e4b\u540e\u300b\uff1b\u7530\u91ce\u7b2c\u56db\u7ae0\uff09\u3002\n\n### 15. \u7b80\u8ff0\u8981\u7d20\u6d41\u52a8\u7a0b\u5ea6\u5bf9\u653f\u6cbb\u8054\u76df\u5f62\u6210\u7684\u5f71\u54cd\u3010\u6a21\u62df-4\u3011\n\n\u8981\u7d20\u6d41\u52a8\u7a0b\u5ea6\uff08factor mobility\uff09\u2014\u2014\u8d44\u672c\u3001\u52b3\u52a8\u7b49\u751f\u4ea7\u8981\u7d20\u5728\u4ea7\u4e1a\u90e8\u95e8\u95f4\u7684\u53ef\u8f6c\u79fb\u6027\u2014\u2014\u662f\u56fd\u9645\u8d38\u6613\u653f\u6cbb\u5206\u6790\u7684\u6838\u5fc3\u53d8\u91cf\uff0c\u51b3\u5b9a\u4e86\u8d38\u6613\u51b2\u51fb\u4e0b\u56fd\u5185\u653f\u6cbb\u8054\u76df\u7684\u5f62\u6210\u65b9\u5f0f\u3002\n\n1. **\u9ad8\u8981\u7d20\u6d41\u52a8\u60c5\u5f62 \u2192 H-O / \u65af\u6258\u5c14\u73c0-\u8428\u7f2a\u5c14\u68ee\u903b\u8f91**\uff1a\n   - \u5047\u8bbe\u8d44\u672c\u3001\u52b3\u52a8\u53ef\u81ea\u7531\u5728\u4ea7\u4e1a\u95f4\u6d41\u52a8\uff1b\n   - \u8d38\u6613\u5f00\u653e\u540e\uff0c**\u4e00\u56fd\u76f8\u5bf9\u4e30\u88d5\u8981\u7d20**\uff08\u5982\u53d1\u8fbe\u56fd\u5bb6\u7684\u8d44\u672c\u3001\u53d1\u5c55\u4e2d\u56fd\u5bb6\u7684\u52b3\u52a8\uff09\u6574\u4f53\u53d7\u76ca\uff0c**\u76f8\u5bf9\u7a00\u7f3a\u8981\u7d20**\u6574\u4f53\u53d7\u635f\uff1b\n   - \u653f\u6cbb\u8054\u76df\u6cbf**\u9636\u7ea7\u7ebf**\u5f62\u6210\uff1a\u53d1\u8fbe\u56fd\u5bb6\u8d44\u672c\u62e5\u62a4\u81ea\u7531\u8d38\u6613\u3001\u52b3\u5de5\u53cd\u5bf9\uff1b\u53d1\u5c55\u4e2d\u56fd\u5bb6\u76f8\u53cd\u3002\n   - **\u7f57\u683c\u592b\u65af\u57fa\uff081989\uff09\u300a\u5546\u4e1a\u4e0e\u8054\u76df\u300b**\u7528\u4e09\u8981\u7d20\uff08\u571f\u5730\u3001\u52b3\u52a8\u3001\u8d44\u672c\uff09\u548c\u8981\u7d20\u4e30\u88d5\u5ea6\u7ec4\u5408\uff0c\u9884\u6d4b\u51fa\u4e0d\u540c\u56fd\u5bb6\u7684\u653f\u6cbb\u5206\u5316\uff08\"\u7ea2 vs \u7eff vs \u57ce\u5e02\"\u7b49\u8054\u76df\u5f62\u5f0f\uff09\u3002\n\n2. **\u4f4e\u8981\u7d20\u6d41\u52a8\u60c5\u5f62 \u2192 \u674e\u5609\u56fe-\u7ef4\u7eb3 / \u7279\u5b9a\u8981\u7d20\u903b\u8f91**\uff1a\n   - \u8d44\u672c\u3001\u52b3\u52a8\u5177\u6709\u8f83\u5f3a\u4ea7\u4e1a\u4e13\u7528\u6027\uff0c\u77ed\u671f\u96be\u4ee5\u8f6c\u79fb\uff1b\n   - \u8d38\u6613\u5f00\u653e\u540e\uff0c**\u51fa\u53e3\u90e8\u95e8**\uff08\u8d44\u672c + \u52b3\u52a8\u90fd\u53d7\u76ca\uff09vs **\u8fdb\u53e3\u7ade\u4e89\u90e8\u95e8**\uff08\u8d44\u672c + \u52b3\u52a8\u90fd\u53d7\u635f\uff09\uff1b\n   - \u653f\u6cbb\u8054\u76df\u6cbf**\u4ea7\u4e1a\u90e8\u95e8\u7ebf**\u5f62\u6210\u3002**\u4f8b**\uff1a\u7f8e\u56fd\u6c7d\u8f66\u4e1a\u5de5\u4f1a\u4e0e\u8d44\u672c\u4e00\u81f4\u53cd\u5bf9\u81ea\u7531\u8d38\u6613\uff1b\u7845\u8c37\u8d44\u672c\u4e0e\u8f6f\u4ef6\u5de5\u7a0b\u5e08\u4e00\u81f4\u652f\u6301\u81ea\u7531\u8d38\u6613\u3002\n   - **Hiscox\uff082002\uff09\u300a\u56fd\u9645\u8d38\u6613\u4e0e\u653f\u6cbb\u51b2\u7a81\u300b**\u5b9e\u8bc1\u8bc1\u660e\uff1a\u8981\u7d20\u6d41\u52a8\u6027\u9ad8\u7684\u56fd\u5bb6\u66f4\u6613\u51fa\u73b0\u9636\u7ea7\u5316\u8d38\u6613\u653f\u6cbb\uff0c\u6d41\u52a8\u6027\u4f4e\u7684\u56fd\u5bb6\u66f4\u6613\u51fa\u73b0\u90e8\u95e8\u5316\u8d38\u6613\u653f\u6cbb\u3002\n\n3. **\u653f\u7b56\u542b\u4e49**\uff1a\u2460\u518d\u5c31\u4e1a\u57f9\u8bad\u3001\u793e\u4fdd\u7b49\u653f\u7b56\u53ef\u63d0\u5347\u8981\u7d20\u6d41\u52a8\u6027\uff0c\u7f13\u548c\u8d38\u6613\u51b2\u7a81\u7684\u9636\u7ea7\u5316\u6216\u90e8\u95e8\u5316\u5bf9\u7acb\uff1b\u2461\u533a\u57df\u5dee\u5f02\u5927\u3001\u4ea7\u4e1a\u96c6\u4e2d\u5ea6\u9ad8\u7684\u56fd\u5bb6\uff08\u5982\u7f8e\u56fd\u94c1\u9508\u5e26\uff09\u6613\u5f62\u6210\u5f3a\u70c8\u7684\u53cd\u5168\u7403\u5316\u90e8\u95e8\u8054\u76df\u3002\n\n\u8be5\u5206\u6790\u6846\u67b6\u662f OEP\uff08Open Economy Politics\uff09\u8303\u5f0f\u7684\u6838\u5fc3\u7ec4\u4ef6\u4e4b\u4e00\uff08\u53c2\u89c1 Rogowski 1989\uff1bHiscox 2002\uff1b\u7530\u91ce\u7b2c\u516d\u7ae0\uff09\u3002\n\n### 16. \u7b80\u8ff0\u9009\u4e3e\u5236\u5ea6\u5bf9\u6c47\u7387\u5236\u5ea6\u9009\u62e9\u7684\u5f71\u54cd\u3010\u6a21\u62df-5\u300115\u3011\n\n\u9009\u4e3e\u5236\u5ea6\uff08\u591a\u6570\u4ee3\u8868\u5236 vs \u6bd4\u4f8b\u4ee3\u8868\u5236\uff09\u901a\u8fc7\u5851\u9020**\u653f\u5e9c\u7c7b\u578b**\uff08\u5355\u4e00\u653f\u515a vs \u8054\u5408\u653f\u5e9c\uff09\u548c**\u5bf9\u5229\u76ca\u96c6\u56e2\u7684\u56de\u5e94\u6a21\u5f0f**\uff0c\u5f71\u54cd\u4e00\u56fd\u6c47\u7387\u5236\u5ea6\u9009\u62e9\u3002\u4e3b\u8981\u8bba\u8bc1\u7531 Bernhard & Leblang\u3001Frieden \u7b49\u63d0\u51fa\uff1a\n\n1. **\u6bd4\u4f8b\u4ee3\u8868\u5236\uff08PR\uff09\u2192 \u8054\u5408\u653f\u5e9c \u2192 \u66f4\u503e\u5411\u56fa\u5b9a\u6c47\u7387**\uff1a\n   - PR \u5236\u4e0b\u591a\u515a\u6797\u7acb\uff0c\u5e38\u51fa\u73b0\u8054\u5408\u653f\u5e9c\uff1b\n   - \u8054\u5408\u653f\u5e9c\u51b3\u7b56\u6613\u9677\u4e8e\u8c08\u5224\u50f5\u5c40\uff0c**\u96be\u4ee5\u72ec\u7acb\u8fd0\u7528\u8d27\u5e01\u653f\u7b56\u5e94\u5bf9\u51b2\u51fb**\uff0c\u56e0\u6b64\u503e\u5411\u4e8e**\u501f\u5916\u90e8\u951a\uff08\u56fa\u5b9a\u6c47\u7387\u3001\u52a0\u5165\u8d27\u5e01\u8054\u76df\uff09\"\u5916\u5305\"\u8d27\u5e01\u653f\u7b56**\uff0c\u907f\u514d\u56fd\u5185\u5206\u6b67\u6d88\u8017\uff1b\n   - \u4f8b\uff1a\u6b27\u5143\u533a\u524d\u897f\u6b27\u5927\u91cf\u5c0f\u56fd\u91c7\u7528\u9489\u4f4f\u9a6c\u514b\u3001\u6700\u7ec8\u52a0\u5165\u6b27\u5143\uff08\u53c2\u89c1 Frieden \u7b49\u5173\u4e8e\u6b27\u6d32\u8d27\u5e01\u4e00\u4f53\u5316\u7814\u7a76\uff09\u3002\n\n2. **\u591a\u6570\u4ee3\u8868\u5236 \u2192 \u5355\u4e00\u653f\u515a\u653f\u5e9c \u2192 \u66f4\u503e\u5411\u6d6e\u52a8\u6c47\u7387**\uff1a\n   - \u5355\u4e00\u653f\u515a\u653f\u5e9c\u5bf9\u8d27\u5e01\u653f\u7b56\u6709\u8f83\u5f3a\u81ea\u4e3b\u63a7\u5236\u6743\uff0c\u503e\u5411**\u4fdd\u7559\u72ec\u7acb\u8d27\u5e01\u653f\u7b56\u5e94\u5bf9\u7ecf\u6d4e\u51b2\u51fb\u548c\u9009\u4e3e\u5468\u671f**\uff1b\n   - \u56e0\u6b64\u5bf9\u6c47\u7387\u81ea\u7531\u5ea6\u6709\u504f\u597d\uff08\u6d6e\u52a8\u6216\u53ef\u8c03\u9489\u4f4f\uff09\uff1b\n   - \u4f8b\uff1a\u82f1\u7f8e\u5728\u91d1\u672c\u4f4d\u540e\u591a\u6b21\u575a\u6301\u6d6e\u52a8\u6216\u8131\u94a9\u3002\n\n3. **\u6c47\u7387\u653f\u7b56\u7684\u5229\u76ca\u96c6\u56e2\u56de\u5e94**\uff1a\n   - PR \u5236 + \u7edf\u5408\u4e3b\u4e49\u56fd\u5bb6\uff08\u5982\u5fb7\u56fd\u3001\u5965\u5730\u5229\uff09\uff1a\u5236\u9020\u4e1a\u51fa\u53e3\u96c6\u56e2 + \u5de5\u4f1a\u504f\u597d\u7a33\u5b9a\u6c47\u7387\u4ee5\u7ef4\u6301\u51fa\u53e3\u7ade\u4e89\u529b\uff0c\u8054\u5408\u653f\u5e9c\u80fd\u5f62\u6210\u7a33\u5b9a\u8054\u76df\u652f\u6301\u56fa\u5b9a\u6c47\u7387\u3002\n   - \u591a\u6570\u5236 + \u591a\u5143\u4e3b\u4e49\u56fd\u5bb6\uff08\u5982\u7f8e\u56fd\uff09\uff1a\u91d1\u878d\u4e1a\u504f\u597d\u6d6e\u52a8\u3001\u5236\u9020\u4e1a\u504f\u597d\u4f4e\u4f30\uff0c\u653f\u5e9c\u6447\u6446\u4e8e\u5229\u76ca\u96c6\u56e2\u4e4b\u95f4\uff0c\u6700\u7ec8\u4ee5\u6d6e\u52a8\u6c47\u7387\u4f53\u73b0\u91d1\u878d\u4e1a\u504f\u597d\u3002\n\n4. **\u653f\u6cbb\u5546\u4e1a\u5468\u671f\u89c6\u89d2**\uff1a\u5355\u4e00\u653f\u515a\u653f\u5e9c\u66f4\u80fd\u5229\u7528\u8d27\u5e01\u653f\u7b56\u64cd\u7eb5\u9009\u4e3e\u5468\u671f\uff08PBC\uff09\uff0c\u56e0\u6b64\u504f\u597d\u6d6e\u52a8\uff1b\u8054\u5408\u653f\u5e9c\u96be\u4ee5\u534f\u8c03 PBC\uff0c\u504f\u597d\u5236\u5ea6\u5316\u951a\u5b9a\u3002\n\n5. **\u6574\u5408\u6027\u7ed3\u8bba**\uff1a\u6c47\u7387\u5236\u5ea6\u9009\u62e9\u5e76\u975e\u7eaf\u6280\u672f\u95ee\u9898\uff0c\u800c\u662f\u56fd\u5185\u653f\u6cbb\u5236\u5ea6\uff08\u9009\u4e3e\u2014\u653f\u5e9c\u7c7b\u578b\u2014\u5229\u76ca\u96c6\u56e2\u56de\u5e94\u6a21\u5f0f\uff09\u7684\u653f\u6cbb\u7ecf\u6d4e\u4ea7\u7269\uff08\u53c2\u89c1\u7530\u91ce\u7b2c\u516d\u7ae0\uff1bBernhard, Broz & Clark \u7f16 \"The Political Economy of Monetary Institutions\"\uff09\u3002\n\n### 17. \u7b80\u8ff0\u6ce2\u62c9\u5207\u514b\u7684\u8d38\u6613\u548c\u5e73\u7406\u8bba\u3010\u6a21\u62df-5\u300114\u3011\n\n\u6240\u7f57\u95e8\u00b7\u6ce2\u62c9\u5207\u514b\uff08Solomon Polachek\uff09\u5728 1980 \u5e74\u53d1\u8868\u300a\u51b2\u7a81\u4e0e\u8d38\u6613\u300b\uff08\"Conflict and Trade\"\uff09\u4e00\u6587\uff0c\u662f\u5f53\u4ee3\"\u8d38\u6613\u548c\u5e73\u8bba\"\u7ecf\u9a8c\u7814\u7a76\u7684\u5f00\u5c71\u4e4b\u4f5c\u3002\u5176\u6838\u5fc3\u547d\u9898\uff1a\n\n1. **\u57fa\u672c\u5047\u8bbe**\uff1a\u56fd\u5bb6\u662f\u7406\u6027\u884c\u4e3a\u4f53\uff0c**\u51b2\u7a81\u4f1a\u7834\u574f\u65e2\u6709\u8d38\u6613\uff0c\u56e0\u800c\u5e26\u6765\u673a\u4f1a\u6210\u672c**\u3002\u8d38\u6613\u5173\u7cfb\u8d8a\u5bc6\u5207\uff0c\u51b2\u7a81\u7684\u673a\u4f1a\u6210\u672c\u8d8a\u9ad8\u3002\n2. **\u6838\u5fc3\u547d\u9898\uff08\u8d38\u6613\u2014\u51b2\u7a81\u53cd\u5411\u5173\u7cfb\uff09**\uff1a**\u4e24\u56fd\u53cc\u8fb9\u8d38\u6613\u89c4\u6a21\u8d8a\u5927\uff0c\u53d1\u751f\u6b66\u88c5\u51b2\u7a81\u6216\u654c\u5bf9\u884c\u4e3a\u7684\u6982\u7387\u8d8a\u4f4e**\u3002\n3. **\u7ecf\u9a8c\u8bbe\u8ba1**\uff1a\u4f7f\u7528 COPDAB / WEIS \u56fd\u5bb6\u95f4\u51b2\u7a81\u4e8b\u4ef6\u6570\u636e + \u53cc\u8fb9\u8d38\u6613\u7edf\u8ba1\uff0c\u63a7\u5236\u76f8\u5bf9\u5b9e\u529b\u3001\u5730\u7406\u8ddd\u79bb\u3001\u653f\u6cbb\u4f53\u5236\u7b49\uff0c\u4f30\u8ba1\u8d38\u6613\u989d\u5bf9\u51b2\u7a81\u9891\u7387\u7684\u5f39\u6027\u3002\u7ed3\u679c\u663e\u793a\u5f39\u6027\u7ea6\u4e3a -0.19 \u81f3 -0.34\uff0c**\u8d38\u6613\u7ffb\u500d\u4f7f\u51b2\u7a81\u51cf\u5c11\u7ea6 1/5**\u3002\n4. **\u7406\u8bba\u673a\u5236**\uff1a\u2460\u51b2\u7a81\u9884\u671f\u673a\u4f1a\u6210\u672c\u4e0a\u5347\uff1b\u2461\u8de8\u56fd\u5229\u76ca\u96c6\u56e2\u5f62\u6210\uff08\u51fa\u53e3\u5546\u3001\u8de8\u56fd\u516c\u53f8\uff09\u53cd\u5bf9\u51b2\u7a81\uff1b\u2462\u4fe1\u606f\u6e20\u9053\u589e\u52a0\uff0c\u964d\u4f4e\u8bef\u5224\u98ce\u9669\u3002\n5. **\u5ef6\u4f38**\uff1a\u2460\u4e0d\u4ec5\u603b\u8d38\u6613\u91cf\u91cd\u8981\uff0c**\u8d38\u6613\u54c1\u7684\u53ef\u66ff\u4ee3\u6027**\u4e5f\u5173\u952e\u2014\u2014\u82e5\u8d38\u6613\u54c1\u6709\u5b8c\u5168\u66ff\u4ee3\u6765\u6e90\uff0c\u673a\u4f1a\u6210\u672c\u4e0b\u964d\uff1b\u2461**\u8d38\u6613\u5bf9\u79f0\u6027**\u5f71\u54cd\u2014\u2014\u4e0d\u5bf9\u79f0\u4f9d\u8d56\u53ef\u80fd\u6fc0\u53d1\u6050\u60e7\u800c\u589e\u52a0\u51b2\u7a81\uff1b\u2462Russett & Oneal \u540e\u7eed\u628a\u8d38\u6613\u4e0e\u6c11\u4e3b\u3001\u56fd\u9645\u5236\u5ea6\u5e76\u5217\uff0c\u53d1\u5c55\u4e3a\"\u5eb7\u5fb7\u4e09\u89d2\"\uff08\u8d38\u6613\u2014\u6c11\u4e3b\u2014\u5236\u5ea6\uff09\u548c\u5e73\u8bba\u3002\n6. **\u73b0\u5b9e\u610f\u6db5**\uff1a\u2460\u63a8\u52a8\u7ecf\u6d4e\u4e00\u4f53\u5316\u662f\u548c\u5e73\u653f\u7b56\u7684\u7ec4\u6210\u90e8\u5206\uff1b\u2461\u5bf9\u4e2d\u7f8e\u5173\u7cfb\u800c\u8a00\uff0c\u6df1\u5ea6\u4e92\u5d4c\u7684\u8d38\u6613\u5173\u7cfb\u6784\u6210\u6218\u7565\u514b\u5236\u7684\u7269\u8d28\u57fa\u7840\uff0c\u4f46\"\u8131\u94a9\"\u4f1a\u4fb5\u8680\u8fd9\u4e00\u57fa\u7840\u3002\n\n\u6279\u8bc4\u610f\u89c1\uff1a\u2460\u4e00\u6218\u524d\u82f1\u5fb7\u5bc6\u5207\u8d38\u6613\u4ecd\u7206\u53d1\u6218\u4e89\uff08\u5409\u5c14\u5e73\u7b49\u5386\u53f2\u53cd\u8bc1\uff09\uff1b\u2461\u8d38\u6613\u4e5f\u53ef\u80fd\u5f15\u53d1\u5206\u914d\u51b2\u7a81\u800c\u6210\u4e3a\u6218\u4e89\u50ac\u5316\uff08\u7f57\u65af\u514b\u5170\u65af\u90e8\u5206\u4fee\u6b63\uff09\u3002\u6ce2\u62c9\u5207\u514b\u4e3a\u540e\u7eed Russett\u3001Oneal\u3001Mansfield \u7b49\u8d38\u6613\u548c\u5e73\u7814\u7a76\u5960\u5b9a\u7ecf\u9a8c\u6846\u67b6\uff08\u53c2\u89c1 Polachek 1980\uff1bRussett & Oneal \u300a\u4e09\u8db3\u9f0e\u7acb\u300b\u4e2d\u8bd1\u672c\uff09\u3002\n\n### 18. \u7b80\u8ff0\u7f57\u65af\u514b\u5170\u65af\u7684\u8d38\u6613\u548c\u5e73\u7406\u8bba\u3010\u6a21\u62df-6\u3011\n\n\u7406\u67e5\u5fb7\u00b7\u7f57\u65af\u514b\u5170\u65af\uff08Richard Rosecrance\uff09\u5728\u300a\u8d38\u6613\u56fd\u7684\u5174\u8d77\u300b\uff081986\uff09\u4e2d\u63d0\u51fa\u7cfb\u7edf\u7684\"\u8d38\u6613\u548c\u5e73\"\u5b8f\u89c2\u8bba\u8bc1\uff0c\u4e0e\u6ce2\u62c9\u5207\u514b\u7684\u5fae\u89c2\u7ecf\u9a8c\u7814\u7a76\u4e92\u8865\u3002\u5176\u6838\u5fc3\u547d\u9898\uff1a\n\n1. **\u4e24\u79cd\u56fd\u5bb6\u6a21\u5f0f**\uff1a\u5386\u53f2\u4e0a\u6709\u4e24\u6761\u5bcc\u5f3a\u8def\u5f84\u2014\u2014**\u519b\u4e8b\u2014\u9886\u571f\u6a21\u5f0f**\uff08\u9760\u5f81\u670d\u6269\u5f20\u83b7\u53d6\u8d22\u5bcc\u4e0e\u6743\u529b\uff09\u548c**\u8d38\u6613\u2014\u5546\u4e1a\u6a21\u5f0f**\uff08\u9760\u5bf9\u5916\u8d38\u6613\u548c\u56fd\u9645\u5206\u5de5\u83b7\u53d6\u6536\u76ca\uff09\u3002\n2. **\u5386\u53f2\u8d8b\u52bf**\uff1a\u4e8c\u6218\u4ee5\u6765\uff0c**\u8d38\u6613\u56fd\u6a21\u5f0f\u6536\u76ca\u4e0a\u5347\u3001\u519b\u4e8b\u56fd\u6a21\u5f0f\u6210\u672c\u4e0a\u5347**\uff0c\u4f53\u7cfb\u65e5\u76ca\u5411\u8d38\u6613\u56fd\u503e\u659c\u3002\u4ee3\u8868\u4e3a\u897f\u5fb7\u3001\u65e5\u672c\u3001\u65b0\u52a0\u5761\u3001\u745e\u58eb\u3001\u5317\u6b27\u8bf8\u56fd\u3002\n3. **\u7ed3\u6784\u539f\u56e0**\uff1a\n   - **\u6838\u6b66\u5668\u4f7f\u5927\u56fd\u6218\u4e89\u4ee3\u4ef7\u4e0d\u53ef\u627f\u53d7**\uff0c\u5f81\u670d\u6536\u76ca\u6025\u5267\u4e0b\u964d\uff1b\n   - **\u73b0\u4ee3\u751f\u4ea7\u6280\u672f\u4f9d\u8d56\u8de8\u56fd\u5206\u5de5**\uff0c\u5f81\u670d\u540e\u65e0\u6cd5\u72ec\u5360\u4ef7\u503c\u94fe\uff1b\n   - **\u8de8\u56fd\u516c\u53f8\u3001\u56fd\u9645\u91d1\u878d**\u4f7f\u8d22\u5bcc\u6d41\u52a8\u6027\u5f3a\uff0c\u96be\u4ee5\u9760\u5360\u9886\u9886\u571f\u9501\u5b9a\uff1b\n   - **\u56fd\u9645\u5236\u5ea6\uff08GATT/WTO\u3001IMF\uff09** \u63d0\u4f9b\u4e86\u8d38\u6613\u2014\u91d1\u878d\u7684\u7a33\u5b9a\u73af\u5883\uff0c\u964d\u4f4e\u4e86\"\u975e\u9886\u571f\u8def\u5f84\u81f4\u5bcc\"\u7684\u4e0d\u786e\u5b9a\u6027\u3002\n4. **\u56fd\u5185\u653f\u6cbb\u6548\u5e94**\uff1a\u8d38\u6613\u56fd\u56fd\u5185\u5f62\u6210\u652f\u6301\u5f00\u653e\u3001\u53cd\u5bf9\u6269\u5f20\u7684\"\u8d38\u6613\u5bfc\u5411\u793e\u4f1a\u8054\u76df\"\uff08\u51fa\u53e3\u5546\u3001\u8de8\u56fd\u516c\u53f8\u3001\u6d88\u8d39\u8005\uff09\uff0c\u524a\u5f31\u519b\u4e8b\u2014\u5de5\u4e1a\u96c6\u56e2\u7684\u653f\u6cbb\u6743\u91cd\u3002\n5. **\u548c\u5e73\u63a8\u8bba**\uff1a\u8d38\u6613\u56fd\u76f8\u4e92\u4e4b\u95f4\u503e\u5411\u901a\u8fc7\u8c08\u5224\u3001\u89c4\u5219\u4e0e\u5236\u5ea6\u800c\u975e\u6218\u4e89\u89e3\u51b3\u4e89\u7aef\uff1b\u4f53\u7cfb\u5185\u8d38\u6613\u56fd\u6bd4\u91cd\u63d0\u5347 \u2192 \u4f53\u7cfb\u5c42\u9762\u6218\u4e89\u6982\u7387\u4e0b\u964d\u3002\n6. **\u9650\u5236\u6761\u4ef6**\uff1a\u8d38\u6613\u548c\u5e73\u4f9d\u8d56\u4e09\u5927\u652f\u67f1\u2014\u2014**\u81ea\u7531\u8d38\u6613\u4f53\u5236\u3001\u5b89\u5168\u4fdd\u969c\uff08\u591a\u7531\u9738\u6743\u63d0\u4f9b\uff09\u3001\u8de8\u56fd\u751f\u4ea7\u7f51\u7edc**\u3002\u4efb\u4f55\u4e00\u9879\u53d7\u635f\uff08\u5982\u4fdd\u62a4\u4e3b\u4e49\u62ac\u5934\u3001\u5b89\u5168\u683c\u5c40\u788e\u7247\u5316\u3001\u4ef7\u503c\u94fe\u65ad\u88c2\uff09\u90fd\u4f1a\u52a8\u6447\u8d38\u6613\u548c\u5e73\u3002\n\n\u7f57\u65af\u514b\u5170\u65af\u6bd4\u6ce2\u62c9\u5207\u514b\u66f4\u5b8f\u89c2\uff1a\u5b83\u4e0d\u53ea\u662f\u7ecf\u9a8c\u4e0a\u770b\u5230\u8d38\u6613\u4e0e\u51b2\u7a81\u53cd\u5411\u76f8\u5173\uff0c\u800c\u662f\u8bba\u8bc1\u6574\u4e2a\u4f53\u7cfb\u7ed3\u6784\u6027\u53d8\u5316\u4f7f\u8d38\u6613\u56fd\u6a21\u5f0f\u65e5\u76ca\u4e3b\u5bfc\uff08\u53c2\u89c1 Rosecrance 1986\uff1b\u6768\u5149\u658c\u300a\u653f\u6cbb\u5b66\u5bfc\u8bba\u300b\u76f8\u5173\u7ae0\u8282\uff1b\u5b8b\u65b0\u5b81/\u9648\u5cb3\u7b2c\u5341\u7ae0\uff09\u3002\n\n### 19. \u7b80\u8ff0\u8d38\u6613\u7684\u9884\u671f\u4ef7\u503c\u5bf9\u6218\u4e89\u4e0e\u548c\u5e73\u7684\u5f71\u54cd\u3010\u6a21\u62df-7\u3011\n\n\u6234\u5c14\u00b7\u79d1\u666e\u5170\uff08Dale Copeland\uff09\u5728\u300a\u7ecf\u6d4e\u76f8\u4e92\u4f9d\u8d56\u4e0e\u6218\u4e89\u300b\uff082015\uff09\u4e2d\u63d0\u51fa\"\u8d38\u6613\u9884\u671f\u7406\u8bba\"\uff0c\u5bf9\u4f20\u7edf\u8d38\u6613\u548c\u5e73\u8bba\u4f5c\u51fa\u5173\u952e\u4fee\u6b63\u3002\u8981\u70b9\uff1a\n\n1. **\u6838\u5fc3\u547d\u9898**\uff1a\u51b3\u5b9a\u8d38\u6613\u80fd\u5426\u5e26\u6765\u548c\u5e73\u7684\uff0c**\u4e0d\u662f\u5f53\u524d\u8d38\u6613\u989d\u672c\u8eab\uff0c\u800c\u662f\u5bf9\u672a\u6765\u8d38\u6613\u524d\u666f\u7684\u9884\u671f**\u3002\n2. **\u673a\u7406**\uff1a\n   - \u82e5\u4e00\u56fd\u9884\u671f**\u672a\u6765\u8d38\u6613\u5c06\u7ee7\u7eed/\u6269\u5927**\uff0c\u5219\u5f53\u524d\u5408\u4f5c\u6536\u76ca\u5de8\u5927\uff0c\u5192\u9669\u52a8\u7528\u6b66\u529b\u7684\u673a\u4f1a\u6210\u672c\u9ad8\uff0c\u503e\u5411\u548c\u5e73\uff1b\n   - \u82e5\u4e00\u56fd\u9884\u671f**\u672a\u6765\u8d38\u6613\u5c06\u88ab\u5207\u65ad/\u840e\u7f29**\uff08\u5982\u5bf9\u624b\u5c06\u5b9e\u65bd\u7981\u8fd0\u3001\u8131\u94a9\uff09\uff0c\u5219\u5f53\u524d\u8d38\u6613\u53cd\u800c\u6210\u4e3a\"\u88ab\u5a01\u80c1\u7684\u8d44\u4ea7\"\uff0c\u56fd\u5bb6\u53ef\u80fd\u91c7\u53d6**\u9884\u9632\u6027\u884c\u52a8**\uff08preventive action\uff09\u9501\u5b9a\u5173\u952e\u8d44\u6e90\u6216\u5e02\u573a\uff0c\u51b2\u7a81\u6982\u7387\u4e0a\u5347\u3002\n3. **\u5386\u53f2\u6848\u4f8b**\uff1a\n   - **\u4e00\u6218\u524d\u7684\u5fb7\u56fd**\uff1a\u4e0e\u82f1\u6cd5\u8d38\u6613\u5bc6\u5207\uff0c\u4f46\u5bf9\u672a\u6765\u8d38\u6613\u524d\u666f\u60b2\u89c2\uff08\u8ba4\u4e3a\u82f1\u56fd\u6d77\u6743\u53ef\u968f\u65f6\u5207\u65ad\u5fb7\u56fd\u6d77\u4e0a\u8d38\u6613\uff09\uff0c\u56e0\u6b64\u53d1\u5c55\u6d77\u519b\u3001\u6269\u5f20\u9646\u519b\uff0c\u6700\u7ec8\u503e\u5411\u6218\u4e89\u2014\u2014\u7ecf\u5178\u53cd\u4f8b\u5bf9\u7eaf\u6ce2\u62c9\u5207\u514b\u5f0f\u8d38\u6613\u548c\u5e73\u8bba\u7684\u4fee\u6b63\u3002\n   - **\u65e5\u672c 1941 \u5e74**\uff1a\u56e0\u7f8e\u56fd\u77f3\u6cb9\u7981\u8fd0 + \u8d44\u4ea7\u51bb\u7ed3\u4f7f\u5176\u9884\u671f\u672a\u6765\u8d38\u6613\u5f7b\u5e95\u65ad\u7edd\uff0c\u8f6c\u5411\u5077\u88ad\u73cd\u73e0\u6e2f\u7684\u9884\u9632\u6027\u6218\u4e89\u3002\n4. **\u653f\u7b56\u542b\u4e49**\uff1a\n   - \u5355\u7eaf\u589e\u52a0\u8d38\u6613\u989d\u4e0d\u7b49\u4e8e\u548c\u5e73\uff1b**\u4fdd\u6301\u8d38\u6613\u524d\u666f\u7684\u53ef\u9884\u671f\u6027\u3001\u907f\u514d\u7a81\u7136\u8131\u94a9\u6216\u5236\u88c1\u5a01\u80c1**\u624d\u662f\u5173\u952e\u3002\n   - \u7ecf\u6d4e\u6b66\u5668\u5316\uff08\u5236\u88c1\u3001\u51fa\u53e3\u7ba1\u5236\uff09\u867d\u5177\u77ed\u671f\u6548\u529b\uff0c\u4f46\u4f1a\u626d\u66f2\u9884\u671f\u3001\u50ac\u5316\u51b2\u7a81\u3002\n5. **\u4e2d\u7f8e\u5173\u7cfb\u542b\u4e49**\uff1a\u7f8e\u56fd\u5bf9\u534e\u82af\u7247\u3001\u534a\u5bfc\u4f53\u51fa\u53e3\u7ba1\u5236\u4e0d\u65ad\u5347\u7ea7\uff0c\u53ef\u80fd\u4fc3\u4f7f\u4e2d\u56fd\u4ece\"\u5f00\u653e\u9884\u671f\"\u8f6c\u5411\"\u5c01\u9501\u9884\u671f\"\uff0c\u52a0\u5feb\u81ea\u4e3b\u521b\u65b0\u548c\u6218\u7565\u50a8\u5907\uff0c\u4ece\u4e2d\u957f\u671f\u770b\u4e0d\u5229\u4e8e\u4f53\u7cfb\u7a33\u5b9a\u3002\n6. **\u7406\u8bba\u610f\u4e49**\uff1a\u79d1\u666e\u5170\u628a\u73b0\u5b9e\u4e3b\u4e49\"\u5b89\u5168\u56f0\u5883\"\u4e0e\u81ea\u7531\u4e3b\u4e49\"\u8d38\u6613\u548c\u5e73\"\u7edf\u4e00\u5728\"\u9884\u671f\"\u8fd9\u4e00\u53d8\u91cf\u4e0a\uff0c\u88ab\u89c6\u4e3a\u8fd1 30 \u5e74\u8d38\u6613\u2014\u548c\u5e73\u7814\u7a76\u6700\u91cd\u8981\u7684\u7406\u8bba\u7efc\u5408\u4e4b\u4e00\uff08\u53c2\u89c1 Copeland 2015\uff1b\u7530\u91ce\u7b2c\u5341\u7ae0\uff09\u3002\n\n### 20. \u7b80\u8ff0\u590d\u5408\u76f8\u4e92\u4f9d\u8d56\u7684\u4e3b\u8981\u7279\u5f81\u3010\u6a21\u62df-7\u3011\n\n\u57fa\u6b27\u6c49\u3001\u5948\u5728\u300a\u6743\u529b\u4e0e\u76f8\u4e92\u4f9d\u8d56\u300b\uff081977\uff09\u63d0\u51fa\"\u590d\u5408\u76f8\u4e92\u4f9d\u8d56\"\uff08Complex Interdependence\uff09\u4f5c\u4e3a\"\u73b0\u5b9e\u4e3b\u4e49\u4e16\u754c\"\u7684\u5bf9\u7acb\u7406\u60f3\u578b\uff0c\u4e09\u5927\u4e3b\u8981\u7279\u5f81\uff1a\n\n1. **\u591a\u6e20\u9053\u8054\u7cfb\uff08multiple channels\uff09**\uff1a\n   - \u56fd\u5bb6\u95f4\u4e92\u52a8**\u4e0d\u518d\u9650\u4e8e\u653f\u5e9c\u9996\u8111\u5916\u4ea4**\uff0c\u8fd8\u5305\u62ec\u8de8\u653f\u5e9c\u8054\u7cfb\uff08\u5982\u5404\u56fd\u8d22\u653f\u90e8\u4e4b\u95f4\u3001\u592e\u884c\u884c\u957f\u4e4b\u95f4\uff09\u548c\u8de8\u56fd\u793e\u4f1a\u8054\u7cfb\uff08\u8de8\u56fd\u516c\u53f8\u3001NGO\u3001\u4e13\u4e1a\u56e2\u4f53\u3001\u5b66\u672f\u5171\u540c\u4f53\uff09\uff1b\n   - \u591a\u6e20\u9053\u4f7f\u5916\u4ea4\u653f\u7b56\u5236\u5b9a\u53d8\u5f97\u590d\u6742\u3001\u8bae\u7a0b\u88ab\u5206\u6563\u5230\u591a\u4e2a\u90e8\u95e8\u3002\n2. **\u8bae\u9898\u65e0\u7b49\u7ea7\uff08absence of hierarchy among issues\uff09**\uff1a\n   - \u56fd\u5bb6\u95f4\u8bae\u7a0b**\u4e0d\u518d\u4ee5\u519b\u4e8b\u5b89\u5168\u4e3a\u7edd\u5bf9\u4f18\u5148**\uff0c\u7ecf\u6d4e\u3001\u73af\u5883\u3001\u80fd\u6e90\u3001\u6280\u672f\u3001\u4eba\u6743\u7b49\u8bae\u9898\u5e76\u5217\uff1b\n   - \u4e0d\u540c\u8bae\u9898\u9886\u57df\u7684\u5229\u76ca\u96c6\u56e2\u3001\u5229\u76ca\u7ed3\u6784\u4e0d\u540c\uff0c\u56e0\u6b64\u5916\u4ea4\u653f\u7b56\u5185\u90e8\u5b58\u5728\u5f20\u529b\u3002\n3. **\u519b\u4e8b\u529b\u91cf\u4f5c\u7528\u4e0b\u964d\uff08minor role of military force\uff09**\uff1a\n   - \u5728\u5bcc\u56fd\u4e4b\u95f4\u3001\u7279\u5b9a\u8bae\u9898\uff08\u8d38\u6613\u3001\u91d1\u878d\u3001\u73af\u5883\uff09\u4e0a\uff0c\u519b\u4e8b\u529b\u91cf\u96be\u4ee5\u4f7f\u7528\u6216\u4f7f\u7528\u4ee3\u4ef7\u8fc7\u9ad8\uff1b\n   - \u8bae\u9898\u8054\u63a5\uff08issue linkage\uff09\u7684\u4ee3\u4ef7 \u2192 \u5728\u67d0\u8bae\u9898\u4e0a\u52a8\u7528\u519b\u529b\u4f1a\u635f\u5bb3\u5176\u4ed6\u8bae\u9898\u5408\u4f5c\uff1b\n   - \u56fd\u5185\u653f\u6cbb\u53cd\u5bf9\u52a8\u7528\u519b\u529b\u7684\u6210\u672c\u4e0a\u5347\u3002\n\n**\u4e0e\u73b0\u5b9e\u4e3b\u4e49\u5bf9\u7167**\uff1a\u73b0\u5b9e\u4e3b\u4e49\u5047\u8bbe\u56fd\u5bb6\u662f\u5355\u4e00\u884c\u4e3a\u4f53\u3001\u5b89\u5168\u81f3\u4e0a\u3001\u519b\u529b\u662f\u4e3b\u8981\u6743\u529b\u6765\u6e90\uff1b\u590d\u5408\u76f8\u4e92\u4f9d\u8d56\u5219\u5047\u8bbe\u591a\u5143\u884c\u4e3a\u4f53\u3001\u591a\u8bae\u9898\u3001\u8bae\u9898\u5bf9\u5e94\u7684\u975e\u519b\u4e8b\u6743\u529b\uff08\u5e02\u573a\u3001\u6280\u672f\u3001\u89c4\u5219\uff09\u6210\u4e3a\u4e3b\u5bfc\u3002\n\n**\u6743\u529b\u542b\u4e49**\uff1a\u5728\u590d\u5408\u76f8\u4e92\u4f9d\u8d56\u4e2d\uff0c\u6743\u529b\u5448\u73b0\u8bae\u9898\u7279\u5b9a\u6027\uff08issue-specific power\uff09\uff0c\u7ed3\u6784\u6027\u6743\u529b\uff08\u8bae\u7a0b\u8bbe\u7f6e\u3001\u5236\u5ea6\u5f62\u5851\uff09\u548c\u8bae\u9898\u8054\u63a5\u80fd\u529b\u6210\u4e3a\u4e3b\u5bfc\u3002\n\n**\u7ecf\u9a8c\u89e3\u91ca\u529b**\uff1a\u2460\u6b27\u76df\u5185\u90e8\u3001\u7f8e\u52a0\u3001\u7f8e\u65e5\u5173\u7cfb\u90e8\u5206\u7b26\u5408\u8be5\u7406\u60f3\u578b\uff1b\u2461\u7f8e\u4e2d\u5173\u7cfb\u957f\u671f\u5177\u6709\"\u534a\u590d\u5408\u76f8\u4e92\u4f9d\u8d56\"\u7279\u5f81\uff0c\u4f46 2017 \u5e74\u540e\u519b\u4e8b\u5316\u3001\u5b89\u5168\u5316\u8d8b\u52bf\u524a\u5f31\u4e86\u8fd9\u4e00\u7279\u5f81\u3002\n\n\u590d\u5408\u76f8\u4e92\u4f9d\u8d56\u662f IPE \u4e3b\u6d41\u6846\u67b6\u7684\u6838\u5fc3\u7406\u8bba\u8d77\u70b9\uff08\u53c2\u89c1\u57fa\u6b27\u6c49/\u5948\u300a\u6743\u529b\u4e0e\u76f8\u4e92\u4f9d\u8d56\u300b\u4e2d\u8bd1\u672c\uff1b\u7530\u91ce\u7b2c\u4e09\u7ae0\uff09\u3002\n\n### 21. \u7b80\u8ff0\u590d\u5408\u76f8\u4e92\u4f9d\u8d56\u7684\u653f\u6cbb\u8fc7\u7a0b\u3010\u6a21\u62df-7\u3011\n\n\u627f\u63a5\u4e0a\u9898\u3002\u5728\u590d\u5408\u76f8\u4e92\u4f9d\u8d56\u6761\u4ef6\u4e0b\uff0c\u56fd\u9645\u653f\u6cbb\u8fc7\u7a0b\u76f8\u6bd4\u73b0\u5b9e\u4e3b\u4e49\u6709\u663e\u8457\u4e0d\u540c\u3002\u57fa\u6b27\u6c49\u3001\u5948\u8bc6\u522b\u51fa\u56db\u79cd\u5178\u578b\u653f\u6cbb\u8fc7\u7a0b\uff1a\n\n1. **\u8bae\u7a0b\u8bbe\u7f6e\u8fc7\u7a0b\u7684\u53d8\u5316**\uff1a\n   - \u5b89\u5168\u8bae\u9898\u4e0d\u518d\u81ea\u52a8\u5360\u636e\u8bae\u7a0b\u9996\u4f4d\uff1b\n   - \u7531\u8bae\u9898\u72ec\u7279\u7684\u5229\u76ca\u7ed3\u6784\u3001\u8de8\u56fd\u884c\u4e3a\u4f53\u3001\u4e13\u4e1a\u77e5\u8bc6\u5171\u540c\u4f53\u63a8\u52a8\u8bae\u9898\u8fdb\u5165\u8bae\u7a0b\uff08\u5982\u6c14\u5019\u53d8\u5316\u7531\u79d1\u5b66\u754c\u63a8\u52a8\uff09\uff1b\n   - \u8bae\u7a0b\u8bbe\u7f6e\u6743\uff08agenda-setting power\uff09\u6210\u4e3a\u5173\u952e\u6743\u529b\u6765\u6e90\u3002\n2. **\u8bae\u9898\u8054\u63a5\uff08issue linkage\uff09\u7684\u590d\u6742\u5316**\uff1a\n   - \u73b0\u5b9e\u4e3b\u4e49\u5047\u8bbe\u5404\u8bae\u9898\u53ef\u88ab\u9ad8\u5ea6\u8054\u63a5\uff08\u5f3a\u56fd\u53ef\u7528\u4e00\u8bae\u9898\u538b\u53e6\u4e00\u8bae\u9898\uff09\uff1b\n   - \u590d\u5408\u76f8\u4e92\u4f9d\u8d56\u4e0b\uff0c\u8bae\u9898\u9886\u57df\u76f8\u5bf9\u81ea\u6cbb\u3001\u5404\u81ea\u5229\u76ca\u7ed3\u6784\u4e0d\u540c\uff0c**\u5f3a\u8054\u63a5\u4ee3\u4ef7\u9ad8**\u3001\u5bb9\u6613\u5f15\u53d1\u8de8\u8bae\u9898\u53cd\u5f39\uff1b\n   - \u56e0\u6b64\u8054\u63a5\u66f4\u591a\u53d1\u751f\u4e8e\u540c\u8bae\u9898\u57df\u5185\u6216\u7d27\u5bc6\u76f8\u5173\u8bae\u9898\u95f4\u3002\n3. **\u56fd\u9645\u7ec4\u7ec7\u7684\u4f5c\u7528\u4e0a\u5347**\uff1a\n   - \u56fd\u9645\u7ec4\u7ec7\u6210\u4e3a\u591a\u8bae\u9898\u3001\u591a\u6e20\u9053\u8054\u7cfb\u7684\u5e38\u6001\u5316\u573a\u6240\uff1b\n   - \u63d0\u4f9b\u8bae\u7a0b\u8bbe\u7f6e\u573a\u6240\u3001\u4e13\u4e1a\u77e5\u8bc6\u3001\u4fe1\u606f\u900f\u660e\u3001\u5229\u76ca\u534f\u8c03\u5e73\u53f0\uff1b\n   - \u5c0f\u56fd\u901a\u8fc7\u56fd\u9645\u7ec4\u7ec7\u653e\u5927\u5176\u5f71\u54cd\u529b\u3002\n4. **\u8de8\u56fd\u4e0e\u8de8\u653f\u5e9c\u8054\u7cfb\u6210\u4e3a\u5e38\u89c4\u6e20\u9053**\uff1a\n   - \u592e\u884c\u884c\u957f\u5b9a\u671f\u4f1a\u6664\uff08BIS\uff09\u3001\u8d22\u957f\u4f1a\u8bae\uff08G20\uff09\u3001\u884c\u4e1a\u76d1\u7ba1\u673a\u6784\u8de8\u56fd\u534f\u8c03\uff1b\n   - \u8de8\u56fd NGO\uff08\u5982\u7eff\u8272\u548c\u5e73\u3001\u4eba\u6743\u89c2\u5bdf\u3001\u56fd\u9645\u7279\u8d66\uff09\u8de8\u8fb9\u754c\u6e38\u8bf4\uff1b\n   - \u8fd9\u4e9b\u6e20\u9053\u4f7f**\u5bf9\u5916\u653f\u7b56\"\u5206\u6563\u5316\"**\uff0c\u56fd\u5bb6\u4e0d\u518d\u662f\u5355\u4e00\u7406\u6027\u884c\u4e3a\u4f53\u3002\n\n**\u653f\u7b56\u542b\u4e49**\uff1a\n- \u5916\u4ea4\u653f\u7b56\u534f\u8c03\u96be\u5ea6\u4e0a\u5347\uff0c\u5bf9\u56fd\u5185\u5b98\u50da\u4f53\u7cfb\u534f\u8c03\u80fd\u529b\u63d0\u51fa\u66f4\u9ad8\u8981\u6c42\uff1b\n- \u8f6f\u5b9e\u529b\u3001\u89c4\u5219\u5851\u9020\u80fd\u529b\u6210\u4e3a\u91cd\u8981\u8d44\u6e90\uff1b\n- \u5c0f\u56fd\u4e0e\u975e\u56fd\u5bb6\u884c\u4e3a\u4f53\u5728\u7279\u5b9a\u8bae\u9898\u4e0a\u53ef\u83b7\u5f97\u4e0d\u6210\u6bd4\u4f8b\u7684\u5f71\u54cd\u529b\u3002\n\n**\u8bc4\u4ef7**\uff1a\u590d\u5408\u76f8\u4e92\u4f9d\u8d56\u6846\u67b6\u5bf9\u6b27\u7f8e\u5173\u7cfb\u3001\u8de8\u592a\u5e73\u6d0b\u7ecf\u6d4e\u5173\u7cfb\u3001\u5168\u7403\u6cbb\u7406\u7b49\u9ad8\u5ea6\u4e92\u5d4c\u9886\u57df\u89e3\u91ca\u529b\u5f3a\uff1b\u5bf9\u6d89\u53ca\u6838\u5fc3\u5b89\u5168\u7684\u5730\u7f18\u51b2\u7a81\u89e3\u91ca\u529b\u5f31\u3002\u5b83\u5bf9\u7406\u89e3 21 \u4e16\u7eaa\u7684\"\u788e\u7247\u5316\u5168\u7403\u6cbb\u7406\"\u5177\u6709\u91cd\u8981\u4ef7\u503c\uff08\u53c2\u89c1\u57fa\u6b27\u6c49/\u5948\u7b2c\u4e8c\u7ae0\uff1b\u7530\u91ce\u7b2c\u4e09\u7ae0\uff09\u3002\n\n### 22. \u7b80\u8ff0\u96c6\u4f53\u884c\u52a8\u56f0\u5883\u7684\u6210\u56e0\u3010\u6a21\u62df-8\u3011\n\n\u96c6\u4f53\u884c\u52a8\u56f0\u5883\uff08Collective Action Problem\uff09\u7531\u5965\u5c14\u68ee\u300a\u96c6\u4f53\u884c\u52a8\u7684\u903b\u8f91\u300b\uff081965\uff09\u7cfb\u7edf\u9610\u8ff0\uff1a\u5728\u81ea\u5229\u7406\u6027\u5047\u8bbe\u4e0b\uff0c**\u4e3a\u5171\u540c\u5229\u76ca\u91c7\u53d6\u884c\u52a8\u53cd\u800c\u96be\u4ee5\u8fbe\u6210**\u3002\u4e3b\u8981\u6210\u56e0\uff1a\n\n1. **\u516c\u5171\u7269\u54c1\u7684\u975e\u6392\u4ed6\u6027**\uff1a\u96c6\u56e2\u4e00\u65e6\u63d0\u4f9b\u4e86\u516c\u5171\u7269\u54c1\uff08\u5982\u56fd\u9645\u5b89\u5168\u3001\u81ea\u7531\u8d38\u6613\u4f53\u5236\u3001\u73af\u5883\u6cbb\u7406\uff09\uff0c\u65e0\u8bba\u662f\u5426\u8d21\u732e\u90fd\u53ef\u4eab\u7528\uff0c**\u642d\u4fbf\u8f66\u5177\u6709\u7406\u6027\u5438\u5f15\u529b**\u3002\n2. **\u4e2a\u4f53\u6536\u76ca\u2014\u6210\u672c\u4e0d\u5bf9\u79f0**\uff1a\u8d21\u732e\u7684\u6210\u672c\u7531\u4e2a\u4f53\u72ec\u81ea\u627f\u62c5\uff0c\u6536\u76ca\u5374\u88ab\u5168\u4f53\u5171\u4eab\uff0c**\u4e2a\u4f53\u8fb9\u9645\u6fc0\u52b1\u8fdc\u5c0f\u4e8e\u793e\u4f1a\u6700\u4f18**\u3002\n3. **\u96c6\u56e2\u89c4\u6a21\u6548\u5e94**\uff1a\n   - **\u5927\u96c6\u56e2**\u4e2d\u4e2a\u4f53\u8d21\u732e\u5bf9\u603b\u4ea7\u51fa\u5f71\u54cd\u5fae\u5c0f\uff0c\u96be\u4ee5\u6fc0\u52b1\uff0c\u4e14\u76d1\u7763\u6210\u672c\u9ad8\uff0c\u66f4\u6613\u5931\u8d25\uff1b\n   - **\u5c0f\u96c6\u56e2**\u4e2d\u4e2a\u4f53\u8d21\u732e\u6548\u5e94\u660e\u663e\u3001\u76d1\u7763\u5bb9\u6613\uff0c\u66f4\u6613\u7ec4\u7ec7\uff08\"\u5c0f\u96c6\u56e2\u4f18\u4e8e\u5927\u96c6\u56e2\"\uff09\u3002\n4. **\u5229\u76ca\u4e0d\u5bf9\u79f0**\uff1a\u5c11\u6570\u5927\u5229\u76ca\u4e3b\u4f53\uff08\u5982\u5927\u4f01\u4e1a\u3001\u5927\u56fd\uff09\u53ef\u80fd\u56e0\u81ea\u8eab\u6536\u76ca\u8db3\u591f\u5927\u800c\u5355\u65b9\u9762\u63d0\u4f9b\u516c\u5171\u7269\u54c1\uff08\"\u9738\u6743\u7a33\u5b9a\"\u903b\u8f91\u7684\u5fae\u89c2\u57fa\u7840\uff09\uff0c\u4f46\u540c\u65f6\u538b\u529b\u4e5f\u6700\u5927\u3002\n5. **\u7f3a\u4e4f\u9009\u62e9\u6027\u6fc0\u52b1**\uff08selective incentives\uff09\uff1a\u5965\u5c14\u68ee\u6307\u51fa\uff0c**\u4ec5\u5f53\u96c6\u56e2\u80fd\u5411\u8d21\u732e\u8005\u63d0\u4f9b\u4e13\u5c5e\u5956\u52b1\uff08\u5982\u884c\u4e1a\u534f\u4f1a\u7684\u5185\u90e8\u670d\u52a1\uff09\u6216\u60e9\u7f5a\u4e0d\u8d21\u732e\u8005\uff08\u5982\u5de5\u4f1a\u4f1a\u8d39\u5f3a\u5236\uff09\u65f6**\uff0c\u96c6\u4f53\u884c\u52a8\u624d\u80fd\u6301\u7eed\u3002\n6. **\u4fe1\u606f\u4e0d\u5bf9\u79f0\u4e0e\u6267\u884c\u56f0\u96be**\uff1a\u76d1\u7763\u8c01\u8d21\u732e\u591a\u5c11\u3001\u8bc6\u522b\u642d\u4fbf\u8f66\u8005\u3001\u65bd\u52a0\u53ef\u4fe1\u60e9\u7f5a\u90fd\u9700\u8981\u4ea4\u6613\u6210\u672c\u3002\n7. **\u91cd\u590d\u535a\u5f08\u4e0e\u6298\u73b0\u7387**\uff1a\u82e5\u884c\u4e3a\u4eba\u5bf9\u672a\u6765\u6298\u73b0\u9ad8\uff08\u77ed\u89c6\uff09\u3001\u4e0d\u671f\u671b\u672a\u6765\u518d\u5408\u4f5c\uff0c\u5219\u66f4\u503e\u5411\u642d\u4fbf\u8f66\uff1b\u957f\u671f\u91cd\u590d\u535a\u5f08\u4e0b\u5408\u4f5c\u53ef\u80fd\u6301\u7eed\uff08Axelrod\"\u91cd\u590d\u56da\u5f92\u56f0\u5883\")\u3002\n\n**\u56fd\u9645\u5173\u7cfb\u542b\u4e49**\uff1a\n- \u56fd\u9645\u516c\u5171\u7269\u54c1\uff08\u81ea\u7531\u8d38\u6613\u3001\u91d1\u878d\u7a33\u5b9a\u3001\u6c14\u5019\u51cf\u6392\uff09\u4f9b\u7ed9\u4e0d\u8db3\uff1b\n- \u9700\u8981\u9738\u6743\u56fd\uff08\u91d1\u5fb7\u5c14\u4f2f\u683c\u3001\u514b\u62c9\u65af\u7eb3\uff09\u6216\u5236\u5ea6\u5b89\u6392\uff08\u57fa\u6b27\u6c49\uff09\u63d0\u4f9b\u9009\u62e9\u6027\u6fc0\u52b1\u3001\u76d1\u7763\u3001\u60e9\u7f5a\u6765\u514b\u670d\u56f0\u5883\uff1b\n- **\u6c14\u5019\u8c08\u5224\u957f\u671f\u50f5\u5c40\u3001WTO \u591a\u54c8\u5931\u8d25**\u90fd\u4f53\u73b0\u5178\u578b\u96c6\u4f53\u884c\u52a8\u56f0\u5883\uff08\u53c2\u89c1 Olson 1965\uff1b\u7530\u91ce\u7b2c\u4e8c\u7ae0\uff09\u3002\n\n### 23. \u7b80\u8ff0\u4e16\u754c\u7ecf\u6d4e\u9738\u6743\u7684\u4e24\u79cd\u6a21\u578b\u3010\u6a21\u62df-8\u3011\n\n\u5173\u4e8e\u4e16\u754c\u7ecf\u6d4e\u9738\u6743\uff0c\u4e3b\u6d41 IPE \u7406\u8bba\u6709\u4e24\u79cd\u6a21\u578b\u2014\u2014**\"\u826f\u6027\"\u9738\u6743\uff08benign hegemony\uff09**\u4e0e**\"\u63a0\u593a\u578b\"\u9738\u6743\uff08predatory/coercive hegemony\uff09**\uff1a\n\n1. **\"\u826f\u6027\"\u9738\u6743\uff08\u516c\u5171\u7269\u54c1\u63d0\u4f9b\u6a21\u578b\uff09**\u2014\u2014\u91d1\u5fb7\u5c14\u4f2f\u683c\u3001\u57fa\u6b27\u6c49\u8def\u5f84\uff1a\n   - **\u6838\u5fc3\u547d\u9898**\uff1a\u9738\u6743\u56fd\u613f\u610f\u627f\u62c5\u7cfb\u7edf\u7a33\u5b9a\u7684\u516c\u5171\u7269\u54c1\u4f9b\u7ed9\u6210\u672c\uff0c\u56e0\u4e3a\u5176\u5355\u65b9\u6536\u76ca\u8db3\u591f\u5927\uff1b\n   - **\u516c\u5171\u7269\u54c1**\uff1a\u2460\u5f00\u653e\u5e02\u573a\uff08buyer of last resort\uff09\uff1b\u2461\u7a33\u5b9a\u6c47\u7387\uff1b\u2462\u6700\u540e\u8d37\u6b3e\u4eba\uff1b\u2463\u53cd\u5468\u671f\u8d44\u672c\u6d41\uff1b\u2464\u4e00\u81f4\u653f\u7b56\uff1b\n   - **\u673a\u5236**\uff1a\u5236\u5ea6\u5efa\u8bbe + \u81ea\u6211\u514b\u5236 + \u63d0\u4f9b\u5355\u8fb9\u60e0\u76ca\uff1b\n   - **\u7ed3\u679c**\uff1a\u4f53\u7cfb\u6210\u5458\u642d\u4fbf\u8f66\u4e5f\u80fd\u83b7\u76ca\uff0c\u9738\u6743\u4e0e\u7a33\u5b9a\u6b63\u76f8\u5173\uff1b\n   - **\u5386\u53f2\u8303\u4f8b**\uff1a1860\u20141914 \u5e74\u82f1\u56fd\uff08\u91d1\u672c\u4f4d + \u81ea\u7531\u8d38\u6613\uff09\u30011945\u20141970 \u5e74\u4ee3\u7f8e\u56fd\uff08\u5e03\u96f7\u987f\u68ee\u6797 + GATT + \u9a6c\u6b47\u5c14\u8ba1\u5212\uff09\uff1b\n   - **\u653f\u7b56\u542b\u4e49**\uff1a\u9738\u6743\u8870\u843d \u2192 \u516c\u5171\u7269\u54c1\u4f9b\u7ed9\u4e0d\u8db3 \u2192 \u4f53\u7cfb\u52a8\u8361\uff08\u89e3\u91ca 1930 \u5e74\u4ee3\u5927\u8427\u6761\uff09\u3002\n\n2. **\"\u63a0\u593a\u578b\"\u9738\u6743\uff08\u5f3a\u5236\u6c72\u53d6\u6a21\u578b\uff09**\u2014\u2014\u514b\u62c9\u65af\u7eb3\u65e9\u671f\u7acb\u573a + \u73b0\u5b9e\u4e3b\u4e49\u8def\u5f84\uff1a\n   - **\u6838\u5fc3\u547d\u9898**\uff1a\u9738\u6743\u56fd\u5229\u7528\u7ed3\u6784\u6027\u6743\u529b**\u5f3a\u5236\u5851\u9020\u89c4\u5219\uff0c\u4f7f\u6536\u76ca\u5411\u81ea\u5df1\u503e\u659c**\uff1b\n   - **\u673a\u5236**\uff1a\u2460\u89c4\u5219\u504f\u597d\u5df1\u65b9\uff1b\u2461\u5dee\u5f02\u5316\u5bf9\u5f85\uff08\u6838\u5fc3\u76df\u53cb vs \u8fb9\u7f18\u56fd\u5bb6\uff09\uff1b\u2462\u8d27\u5e01\u4e0e\u91d1\u878d\u7684\"\u8d85\u989d\u7279\u6743\"\uff08exorbitant privilege\uff0c\u6234\u9ad8\u4e50\u5bf9\u7f8e\u5143\u7684\u6279\u8bc4\uff09\uff1b\n   - **\u5178\u578b\u8868\u73b0**\uff1a\u7f8e\u5143\u94f8\u5e01\u7a0e\u3001SWIFT \u5236\u88c1\u3001\u957f\u81c2\u7ba1\u8f96\u3001\u9650\u5236\u6027\u6280\u672f\u51fa\u53e3\u7ba1\u5236\uff1b\n   - **\u7ed3\u679c**\uff1a\u9738\u6743\u4e0b\u4f53\u7cfb\u7a33\u5b9a\u7684\u4ee3\u4ef7\u7531\u5916\u56f4\u627f\u62c5\uff0c\u4f53\u7cfb\u5b58\u5728\u4e0d\u5e73\u7b49\u5206\u914d\u3002\n\n3. **\u7efc\u5408\u4e0e\u5f20\u529b**\uff1a\n   - \u540c\u4e00\u9738\u6743\u7684\"\u826f\u6027\"\u4e0e\"\u63a0\u593a\"\u7279\u5f81\u5728\u4e0d\u540c\u8bae\u9898\u3001\u4e0d\u540c\u9636\u6bb5\u6bd4\u91cd\u4e0d\u540c\uff1b\n   - \u4f8b\uff1a\u6218\u540e\u7f8e\u56fd\u5bf9\u897f\u6b27\u3001\u65e5\u672c\u91c7\u53d6**\u826f\u6027**\u505a\u6cd5\uff08\u9a6c\u6b47\u5c14\u8ba1\u5212\u3001\u5bb9\u5fcd\u8d38\u6613\u987a\u5dee\uff09\uff0c\u4f46\u5bf9\u53d1\u5c55\u4e2d\u56fd\u5bb6\u4e0e\u51b7\u6218\u5bf9\u624b\u5219\u66f4**\u5f3a\u5236**\uff08CIA \u5e72\u9884\u3001\u5236\u88c1\uff09\uff1b\n   - \u5f53\u4ee3\u7f8e\u56fd\u7684\u91d1\u878d\u5236\u88c1\u4f53\u7cfb\u6269\u6563\u5230\u957f\u81c2\u7ba1\u8f96\uff0c**\u63a0\u593a\u6027\u9762\u5b54\u4e0a\u5347**\u3002\n\n4. **\u7406\u8bba\u8bc4\u4ef7**\uff1a\u5355\u7eaf\u826f\u6027\u6a21\u578b\u56de\u907f\u4e86\u4e0d\u5e73\u7b49\uff0c\u7eaf\u63a0\u593a\u6a21\u578b\u56de\u907f\u4e86\u5408\u4f5c\uff1b\u4e24\u4e2a\u6a21\u578b\u4e92\u8865\uff0c\u66f4\u63a5\u8fd1\u73b0\u5b9e\uff08\u53c2\u89c1 Kindleberger 1973\uff1bGilpin\u300a\u5168\u7403\u653f\u6cbb\u7ecf\u6d4e\u5b66\u300b\u7b2c\u4e09\u7ae0\uff1b\u7530\u91ce\u7b2c\u56db\u7ae0\uff09\u3002\n\n### 24. \u7b80\u8ff0\u91d1\u5fb7\u5c14\u4f2f\u683c\u7684\u9738\u6743\u7a33\u5b9a\u7406\u8bba\u3010\u6a21\u62df-8\u3011\n\n\u67e5\u5c14\u65af\u00b7\u91d1\u5fb7\u5c14\u4f2f\u683c\u5728\u300a1929\u20141939 \u5e74\u7684\u4e16\u754c\u7ecf\u6d4e\u8427\u6761\u300b\uff081973\uff09\u4e2d\u63d0\u51fa**\"\u9886\u5bfc\u8bba\"**\uff0c\u662f\u9738\u6743\u7a33\u5b9a\u8bba\uff08HST\uff09\u7684\u65e9\u671f\u7248\u672c\u3002\u4e3b\u8981\u5185\u5bb9\uff1a\n\n1. **\u7406\u8bba\u95ee\u9898**\uff1a\u4e3a\u4ec0\u4e48 1929 \u5e74\u7684\u7f8e\u56fd\u80a1\u5e02\u5371\u673a\u80fd\u6f14\u53d8\u4e3a\u5168\u7403\u7ecf\u6d4e\u5927\u8427\u6761\uff1f\u4e3a\u4f55 1873 \u5e74\u5371\u673a\u5374\u6ca1\u6709\uff1f\n2. **\u6838\u5fc3\u547d\u9898**\uff1a\u7a33\u5b9a\u7684\u5f00\u653e\u4e16\u754c\u7ecf\u6d4e\u9700\u8981\u4e00\u4e2a\u56fd\u5bb6\u627f\u62c5**\u9886\u5bfc\u8d23\u4efb**\uff0c\u63d0\u4f9b\u4e94\u5927\u516c\u5171\u7269\u54c1\uff1a\n   - **\u5f00\u653e\u5e02\u573a\uff08buyer of last resort\uff09**\uff1a\u5728\u4ed6\u56fd\u51fa\u53e3\u53d7\u963b\u65f6\u63d0\u4f9b\u5438\u7eb3\u5e02\u573a\uff1b\n   - **\u53cd\u5468\u671f\u957f\u671f\u4fe1\u8d37**\uff1a\u5728\u4e16\u754c\u7ecf\u6d4e\u8427\u6761\u65f6\u63d0\u4f9b\u8d44\u672c\u6d41\u51fa\uff1b\n   - **\u7a33\u5b9a\u6c47\u7387\u4f53\u7cfb**\uff1a\u7ef4\u6301\u53ef\u9884\u671f\u7684\u56fd\u9645\u6536\u4ed8\u4f53\u7cfb\uff1b\n   - **\u534f\u8c03\u5b8f\u89c2\u7ecf\u6d4e\u653f\u7b56**\uff1a\u901a\u8fc7\u534f\u5546\u9632\u6b62\u4ee5\u90bb\u4e3a\u58d1\uff1b\n   - **\u6700\u540e\u8d37\u6b3e\u4eba**\uff1a\u5728\u91d1\u878d\u6050\u614c\u65f6\u63d0\u4f9b\u6d41\u52a8\u6027\u3002\n3. **\u9886\u5bfc\u771f\u7a7a\u7406\u8bba**\uff1a1930 \u5e74\u4ee3\u82f1\u56fd\u5df2\u65e0\u529b\u63d0\u4f9b\u9886\u5bfc\uff08\u5b9e\u529b\u8870\u9000\u3001\u653e\u5f03\u91d1\u672c\u4f4d\uff09\uff0c\u7f8e\u56fd\u8fd8\u4e0d\u613f\u627f\u62c5\u8d23\u4efb\uff08\u5b64\u7acb\u4e3b\u4e49\u3001\u63d0\u9ad8\u5173\u7a0e\u2014\u2014\u65af\u59c6\u7279-\u970d\u5229\u6cd5\u6848\uff09\uff0c**\u9886\u5bfc\u771f\u7a7a\u5bfc\u81f4\u5371\u673a\u5916\u6ea2\u4e0e\u6269\u6563\uff0c\u6700\u7ec8\u6f14\u53d8\u4e3a\u5927\u8427\u6761**\u3002\n4. **HST \u63a8\u8bba**\uff1a\u7a33\u5b9a\u7684\u5f00\u653e\u4e16\u754c\u7ecf\u6d4e\u4e0e\u9886\u5bfc\u56fd\u7684\u5b9e\u529b\u6b63\u76f8\u5173\uff1b\u9738\u6743\u8870\u9000 \u2192 \u516c\u5171\u7269\u54c1\u4f9b\u7ed9\u4e0d\u8db3 \u2192 \u4f53\u7cfb\u4e0d\u7a33\u3002\n5. **\u57fa\u6b27\u6c49\u7684\u6279\u8bc4\u4fee\u6b63**\uff1a\u57fa\u6b27\u6c49\u300a\u9738\u6743\u4e4b\u540e\u300b\u540c\u610f\u91d1\u5fb7\u5c14\u4f2f\u683c\u5173\u4e8e\u516c\u5171\u7269\u54c1\u7684\u8bca\u65ad\uff0c\u4f46\u8bba\u8bc1**\u9738\u6743\u8870\u9000\u540e\u65e2\u6709\u56fd\u9645\u5236\u5ea6\u4ecd\u80fd\u7ef4\u6301\u5408\u4f5c**\uff08\u5236\u5ea6\u9ecf\u6027 + \u4ea4\u6613\u6210\u672c\u903b\u8f91\uff09\u3002\n6. **\u514b\u62c9\u65af\u7eb3\u7684\u6269\u5c55**\uff1a\u514b\u62c9\u65af\u7eb3\u5c06\u9886\u5bfc\u8bba\u4ece\u7ecf\u6d4e\u9886\u57df\u63a8\u5e7f\u5230\u4e00\u822c\u56fd\u9645\u673a\u5236\u2014\u2014\"\u9738\u6743\u4ea7\u751f\u673a\u5236\uff0c\u673a\u5236\u63d0\u4f9b\u516c\u5171\u7269\u54c1\"\u3002\n7. **\u5f53\u4ee3\u542b\u4e49**\uff1a\n   - \u7f8e\u56fd\u76f8\u5bf9\u8870\u843d\u4e0e\"\u9886\u5bfc\u9000\u573a\"\uff08\u7279\u6717\u666e\u65f6\u671f\u9000\u7fa4\u3001\u62dc\u767b\"\u5c0f\u9662\u9ad8\u5899\"\uff09\u5f15\u53d1\u5bf9\u5168\u7403\u516c\u5171\u7269\u54c1\u4f9b\u7ed9\u4e0d\u8db3\u7684\u62c5\u5fe7\uff1b\n   - \u4e2d\u56fd\"\u5168\u7403\u516c\u5171\u4ea7\u54c1\"\u5021\u8bae\uff08\u4e00\u5e26\u4e00\u8def\u3001\u4e9a\u6295\u884c\u3001\u6c14\u5019\u627f\u8bfa\uff09\u90e8\u5206\u586b\u8865\u771f\u7a7a\uff0c\u4f46\u5408\u6cd5\u6027\u4e0e\u89c4\u5219\u5316\u4ecd\u662f\u5173\u952e\u3002\n\n\u91d1\u5fb7\u5c14\u4f2f\u683c\u7684\u9886\u5bfc\u8bba\u662f HST \u8c31\u7cfb\u7684\u8d77\u70b9\uff0c\u4e0e\u5409\u5c14\u5e73\u3001\u514b\u62c9\u65af\u7eb3\u3001\u83ab\u5fb7\u5c14\u65af\u57fa\u2014\u6c64\u666e\u68ee\uff08\u9738\u6743\u5468\u671f\u8bba\uff09\u5171\u540c\u6784\u6210\u9738\u6743\u7814\u7a76\u8109\u7edc\uff08\u53c2\u89c1 Kindleberger 1973\uff1bGilpin 1987\uff1b\u7530\u91ce\u7b2c\u56db\u7ae0\uff09\u3002\n\n### 25. \u6bd4\u8f83\u4e16\u754c\u7ecf\u6d4e\u4e2d\u82f1\u56fd\u9738\u6743\u548c\u7f8e\u56fd\u9738\u6743\u7684\u5dee\u5f02\u3010\u6a21\u62df-9\u3011\n\n\u82f1\u56fd\uff08\u7ea6 1815\u20141914\uff09\u4e0e\u7f8e\u56fd\uff081945\u2014 \uff09\u662f\u4e24\u6b21\u4e16\u754c\u7ecf\u6d4e\u9738\u6743\u5468\u671f\u7684\u4ee3\u8868\uff0c\u4e8c\u8005\u65e2\u6709\u76f8\u4f3c\uff08\u5982\u5f00\u653e\u6027\u3001\u516c\u5171\u7269\u54c1\u4f9b\u7ed9\uff09\u4e5f\u6709\u663e\u8457\u5dee\u5f02\uff1a\n\n1. **\u7269\u8d28\u57fa\u7840**\uff1a\n   - **\u82f1\u56fd**\uff1a\u5de5\u4e1a\u9769\u547d\u9886\u5148 + \u6d77\u519b\u7edd\u5bf9\u4f18\u52bf + \u6b96\u6c11\u5e1d\u56fd\uff08\"\u65e5\u4e0d\u843d\"\uff09\uff1b\n   - **\u7f8e\u56fd**\uff1a\u5236\u9020\u4e1a + \u79d1\u6280 + \u7f8e\u5143 + \u6d77\u519b + \u8054\u76df\u4f53\u7cfb\uff08\u975e\u9886\u571f\u5e1d\u56fd\uff09\u3002\n2. **\u56fd\u9645\u7ecf\u6d4e\u5236\u5ea6**\uff1a\n   - **\u82f1\u56fd**\uff1a**\u81ea\u53d1\u6027\u3001\u975e\u6b63\u5f0f**\u2014\u2014\u91d1\u672c\u4f4d\uff08\u65e0\u6b63\u5f0f\u534f\u8bae\uff09\u3001\u81ea\u7531\u8d38\u6613\uff08\u300a\u8c37\u7269\u6cd5\u300b\u5e9f\u9664\uff09\u3001\u4f26\u6566\u4f5c\u4e3a\u56fd\u9645\u91d1\u878d\u4e2d\u5fc3\u3001\u5546\u4e1a\u60ef\u4f8b\u4e0e\u6d77\u4e8b\u6cd5\uff1b\n   - **\u7f8e\u56fd**\uff1a**\u534f\u8bae\u6027\u3001\u5236\u5ea6\u5316**\u2014\u2014\u5e03\u96f7\u987f\u68ee\u6797\u4f53\u7cfb\uff08IMF\u3001\u4e16\u884c\uff09\u3001GATT/WTO\u3001OECD\u3001UN \u4f53\u7cfb\uff1b\u5236\u5ea6\u5316\u7a0b\u5ea6\u8fdc\u9ad8\u3002\n3. **\u8d27\u5e01\u5b89\u6392**\uff1a\n   - **\u82f1\u56fd**\uff1a\u91d1\u672c\u4f4d + \u82f1\u9551\u4f5c\u4e3a\u5173\u952e\u8d27\u5e01\uff0c\u6ca1\u6709\"\u8d85\u989d\u7279\u6743\"\uff08\u8d27\u5e01\u5151\u6362\u91d1\uff09\uff1b\n   - **\u7f8e\u56fd**\uff1a\u6cd5\u5e01\u672c\u4f4d + \u7f8e\u5143\u4f5c\u4e3a\u5173\u952e\u8d27\u5e01\uff0c\u4eab\u6709\u94f8\u5e01\u7a0e\u4e0e\"\u8d85\u989d\u7279\u6743\"\uff08\u6234\u9ad8\u4e50\uff09\uff1b\u5236\u88c1\u80fd\u529b\u4f9d\u8d56 SWIFT \u4e0e\u7f8e\u5143\u6e05\u7b97\u4f53\u7cfb\u3002\n4. **\u519b\u4e8b\u5b89\u6392**\uff1a\n   - **\u82f1\u56fd**\uff1a\u6d77\u519b\u5355\u6781\u4f18\u52bf + \u5927\u9646\u5747\u52bf\u7b56\u7565\uff1b\n   - **\u7f8e\u56fd**\uff1a\u6d77\u519b + \u5168\u7403\u57fa\u5730\u7f51\u7edc + \u540c\u76df\u4f53\u7cfb\uff08NATO\u3001\u7f8e\u65e5\u540c\u76df\u3001\u7f8e\u97e9\u540c\u76df\u3001AUKUS \u7b49\uff09\uff1b\u6218\u7565\u5177\u6709\u6301\u7eed\u9646\u6d77\u590d\u5408\u7279\u5f81\u3002\n5. **\u610f\u8bc6\u5f62\u6001/\u6b63\u5f53\u6027\u53d9\u4e8b**\uff1a\n   - **\u82f1\u56fd**\uff1a\u81ea\u7531\u8d38\u6613 + \u6587\u660e\u4f7f\u547d + \u5e1d\u56fd\u79e9\u5e8f\uff1b\n   - **\u7f8e\u56fd**\uff1a\u81ea\u7531\u6c11\u4e3b + \u5e02\u573a\u8d44\u672c\u4e3b\u4e49 + \u5168\u7403\u6cbb\u7406\u3002\n6. **\u56fd\u5185\u653f\u6cbb\u57fa\u7840**\uff1a\n   - **\u82f1\u56fd**\uff1a\u8d35\u65cf\u2014\u8d44\u4ea7\u9636\u7ea7\u8054\u5408 \u2192 \u5de5\u4e1a\u8d44\u672c\u4e3b\u5bfc\u540e\u7684\u5f00\u653e\u8d38\u6613\u5171\u8bc6\uff1b\n   - **\u7f8e\u56fd**\uff1a\u591a\u5143\u5229\u76ca\u96c6\u56e2\u653f\u6cbb + \u56fd\u4f1a\u2014\u884c\u653f\u5206\u6743\uff1b\u793e\u4f1a\u8054\u76df\u968f\u4ea7\u4e1a\u5468\u671f\u53d8\u52a8\u5267\u70c8\uff0c\u9738\u6743\u653f\u7b56\u5468\u671f\u6027\u53cd\u590d\u3002\n7. **\u7ef4\u6301\u6210\u672c\u4e0e\u7ec8\u7ed3\u65b9\u5f0f**\uff1a\n   - **\u82f1\u56fd**\uff1a\u6b96\u6c11\u5730\u76f4\u63a5\u6210\u672c\u9ad8\uff0c\u4e24\u6b21\u5927\u6218\u540e\u5e1d\u56fd\u89e3\u4f53\uff0c1956 \u5e74\u82cf\u4f0a\u58eb\u5371\u673a\u6807\u5fd7\u9738\u6743\u7ec8\u7ed3\uff1b\n   - **\u7f8e\u56fd**\uff1a\u5236\u5ea6\u5316 + \u8054\u76df\u5206\u62c5\u964d\u4f4e\u7ef4\u6301\u6210\u672c\uff0c\u4f46 21 \u4e16\u7eaa\u76f8\u5bf9\u8870\u843d\uff08\u4e2d\u56fd\u5d1b\u8d77\u3001\u5185\u90e8\u6781\u5316\uff09\u4f7f\u9738\u6743\u8fdb\u5165\"\u8c03\u6574\u4e0e\u91cd\u5851\"\u9636\u6bb5\u3002\n8. **\u5ef6\u7eed\u6027**\uff1a\u82f1\u56fd\u9738\u6743\u7ec8\u7ed3\u540e\u4f26\u6566\u4ecd\u662f\u56fd\u9645\u91d1\u878d\u4e2d\u5fc3\uff1b\u7f8e\u56fd\u82e5\u9738\u6743\u91cd\u5851\uff0c\u7f8e\u5143\u3001\u6280\u672f\u3001\u82f1\u8bed\u3001\u6559\u80b2\u4f53\u7cfb\u7b49\u7ed3\u6784\u6027\u6743\u529b\u4ecd\u5c06\u957f\u671f\u5ef6\u7eed\u3002\n\n**\u7406\u8bba\u610f\u6db5**\uff1a\u4e24\u6b21\u9738\u6743\u5bf9\u6bd4\u63ed\u793a\u4e86**\u6b63\u5f0f\u5236\u5ea6\u5316\u3001\u53ef\u4fe1\u627f\u8bfa\u3001\u8054\u76df\u5206\u62c5**\u5bf9\u9738\u6743\u6301\u4e45\u6027\u7684\u91cd\u8981\u6027\uff08\u53c2\u89c1 Gilpin \u300a\u5168\u7403\u653f\u6cbb\u7ecf\u6d4e\u5b66\u300b\uff1bIkenberry\u300a\u5927\u6218\u80dc\u5229\u4e4b\u540e\u300b\uff1b\u5b8b\u65b0\u5b81/\u9648\u5cb3\u7b2c\u4e03\u7ae0\uff09\u3002\n\n### 26. \u7b80\u8ff0\u4e16\u754c\u4f53\u7cfb\u7406\u8bba\u7684\u5b66\u672f\u6e90\u5934\u3010\u6a21\u62df-9\u3011\n\n\u6c83\u52d2\u65af\u5766\u5728 1970 \u5e74\u4ee3\u63d0\u51fa\u7684\u4e16\u754c\u4f53\u7cfb\u7406\u8bba\uff08World System Theory, WST\uff09\u7efc\u5408\u591a\u4e2a\u5b66\u672f\u4f20\u7edf\uff0c\u5176\u5b66\u672f\u6e90\u5934\u4e3b\u8981\u6709\uff1a\n\n1. **\u6cd5\u56fd\u5e74\u9274\u5b66\u6d3e\uff08\u7279\u522b\u662f\u5e03\u7f57\u4ee3\u5c14\uff09**\uff1a\n   - \u5e03\u7f57\u4ee3\u5c14\u300a\u83f2\u5229\u666e\u4e8c\u4e16\u65f6\u671f\u7684\u5730\u4e2d\u6d77\u4e16\u754c\u300b\u300a15\u201418 \u4e16\u7eaa\u7269\u8d28\u6587\u660e\u3001\u7ecf\u6d4e\u4e0e\u8d44\u672c\u4e3b\u4e49\u300b\u63d0\u4f9b**\u957f\u65f6\u6bb5\uff08longue dur\u00e9e\uff09\u5386\u53f2\u89c2\u3001\u5b8f\u89c2\u5730\u7406\u7ed3\u6784\u3001\"\u4e16\u754c\u2014\u7ecf\u6d4e\"\u6982\u5ff5**\uff1b\n   - \u6c83\u52d2\u65af\u5766\u501f\u7528\u5176\"\u4e16\u754c\u2014\u7ecf\u6d4e\"\u6982\u5ff5\u5e76\u6539\u9020\u4e3a\"\u73b0\u4ee3\u4e16\u754c\u4f53\u7cfb\"\u3002\n2. **\u9a6c\u514b\u601d\u4e3b\u4e49\u4f20\u7edf**\uff1a\n   - \u8d44\u672c\u4e3b\u4e49\u751f\u4ea7\u65b9\u5f0f\u3001\u5269\u4f59\u4ef7\u503c\u3001\u9636\u7ea7\u6597\u4e89\u3001\u5168\u7403\u79ef\u7d2f\u7b49\u57fa\u672c\u6982\u5ff5\uff1b\n   - \u5c24\u5176\u662f\u5217\u5b81\u7684\u5e1d\u56fd\u4e3b\u4e49\u8bba\u3001\u5362\u68ee\u5821\u7684\u8d44\u672c\u79ef\u7d2f\u8bba\uff0c\u63d0\u4f9b\u8d44\u672c\u4e3b\u4e49\u8de8\u56fd\u6269\u5f20\u5206\u6790\u6846\u67b6\u3002\n3. **\u62c9\u7f8e\u4f9d\u9644\u8bba**\uff08Frank\u3001Cardoso\u3001Furtado\u3001Amin\uff09\uff1a\n   - \u4e2d\u5fc3\u2014\u5916\u56f4\u7ed3\u6784\u3001\"\u4e0d\u53d1\u8fbe\u7684\u53d1\u5c55\"\u3001\"\u5b97\u4e3b\u2014\u536b\u661f\"\u94fe\u6761\uff1b\n   - \u6c83\u52d2\u65af\u5766\u628a\u4f9d\u9644\u8bba\u4ece\u62c9\u7f8e\u4e00\u57df\u63d0\u5347\u4e3a\u5168\u7403\u7ed3\u6784\u7406\u8bba\uff0c\u5e76\u52a0\u5165\"\u534a\u8fb9\u7f18\"\u4f5c\u4e3a\u7f13\u51b2\u3002\n4. **\u7ed3\u6784\u4e3b\u4e49\u53d1\u5c55\u7ecf\u6d4e\u5b66**\uff08\u666e\u96f7\u7ef4\u4ec0\u3001ECLAC\uff09\uff1a\n   - \u8d38\u6613\u6761\u4ef6\u957f\u671f\u6076\u5316\u8bba\u3001\u539f\u6599 vs \u5236\u6210\u54c1\u7684\u4e0d\u5e73\u7b49\u4ea4\u6362\uff1b\n   - \u63d0\u4f9b\u7ecf\u6d4e\u7ed3\u6784\u4e3b\u4e49\u89c6\u89d2\u3002\n5. **\u718a\u5f7c\u7279\u2014\u5eb7\u5fb7\u62c9\u5b63\u8036\u592b\u957f\u6ce2\u7406\u8bba**\uff1a\n   - \u5468\u671f\u6027\u89c6\u89d2\uff0c\u628a\u9738\u6743\u66f4\u66ff\u3001\u6280\u672f\u9769\u547d\u4e0e\u4e16\u754c\u7ecf\u6d4e\u957f\u6ce2\u7ed3\u5408\u3002\n6. **\u97e6\u4f2f\u7684\u4e16\u754c\u5b97\u6559\u6bd4\u8f83\u4e0e\u6587\u660e\u5206\u6790**\uff1a\n   - \u89e3\u91ca\u4e3a\u4f55\u8d44\u672c\u4e3b\u4e49\u9996\u5148\u5728\u897f\u6b27\u5174\u8d77\uff0c\u6587\u5316\u5236\u5ea6\u56e0\u7d20\u7684\u8003\u5bdf\u3002\n\n**\u6c83\u52d2\u65af\u5766\u7684\u7efc\u5408\u8d21\u732e**\uff1a\u628a\u4e0a\u8ff0\u4f20\u7edf\u878d\u5408\u4e3a\u4ee5**\"\u5355\u4e00\u4e16\u754c\u5e02\u573a + \u591a\u5143\u653f\u6cbb\u6743\u5a01 + \u4e2d\u5fc3\u2014\u534a\u8fb9\u7f18\u2014\u8fb9\u7f18\u4e09\u5c42\u5206\u5de5 + \u957f\u6ce2\u5468\u671f + \u9738\u6743\u66f4\u66ff\"**\u4e3a\u6838\u5fc3\u7684\u5b8f\u5927\u7406\u8bba\u4f53\u7cfb\u3002\u5176\u8d85\u8d8a\u524d\u4eba\u4e4b\u5904\u5728\u4e8e\uff1a\u2460\u628a\"\u4e16\u754c\"\u4f5c\u4e3a\u5206\u6790\u5355\u4f4d\u800c\u975e\u6c11\u65cf\u56fd\u5bb6\uff1b\u2461\u628a\u73b0\u4ee3\u8d44\u672c\u4e3b\u4e49\u89c6\u4e3a 16 \u4e16\u7eaa\u4ee5\u6765\u5728\u6b27\u6d32\u8bde\u751f\u3001\u4e0d\u53ef\u9006\u6269\u5f20\u7684\u5386\u53f2\u6027\u4f53\u7cfb\uff08\u53c2\u89c1 Wallerstein\u300a\u73b0\u4ee3\u4e16\u754c\u4f53\u7cfb\u300b\u5377\u4e00\uff1b\u738b\u6b63\u6bc5\u300a\u4e16\u754c\u4f53\u7cfb\u8bba\u4e0e\u4e2d\u56fd\u300b\u7b2c\u4e00\u7ae0\uff1b\u5b8b\u65b0\u5b81/\u9648\u5cb3\u7b2c\u516d\u7ae0\uff09\u3002\n\n### 27. \u7b80\u8ff0\u73b0\u4ee3\u4e16\u754c\u4f53\u7cfb\u7684\u6027\u8d28\u3010\u6a21\u62df-9\u3011\n\n\u6c83\u52d2\u65af\u5766\u300a\u73b0\u4ee3\u4e16\u754c\u4f53\u7cfb\u300b\u63d0\u51fa\"\u73b0\u4ee3\u4e16\u754c\u4f53\u7cfb\"\u6982\u5ff5\uff0c\u5f3a\u8c03\u5176\u4e0e\u5386\u53f2\u4e0a\u5176\u4ed6\u4e16\u754c\u4f53\u7cfb\uff08\u5982\u5e1d\u56fd\u578b\u4e16\u754c\u4f53\u7cfb\uff09\u7684\u672c\u8d28\u5dee\u5f02\u3002\u5176\u6027\u8d28\u5305\u62ec\uff1a\n\n1. **\u8d44\u672c\u4e3b\u4e49\u6027\u8d28**\uff1a\n   - \u73b0\u4ee3\u4e16\u754c\u4f53\u7cfb\u8d77\u6e90\u4e8e 16 \u4e16\u7eaa\u897f\u6b27\u8d44\u672c\u4e3b\u4e49\u6269\u5f20\uff1b\n   - \u4ee5**\u8d44\u672c\u79ef\u7d2f\u4e3a\u6839\u672c\u52a8\u529b**\uff0c\u53d7\u5e02\u573a\u5229\u6da6\u903b\u8f91\u9a71\u52a8\uff1b\n   - \u4e0e\u53e4\u4ee3\u5e1d\u56fd\u9760\u653f\u6cbb\u5f3a\u5236\u6c72\u53d6\u5269\u4f59\u4e0d\u540c\u3002\n2. **\"\u4e16\u754c\u2014\u7ecf\u6d4e\"\u5f62\u6001**\uff1a\n   - \u4e0d\u662f\u4e16\u754c\u653f\u6cbb\u5e1d\u56fd\uff08\u65e0\u5355\u4e00\u653f\u6cbb\u4e2d\u5fc3\uff09\uff0c\u800c\u662f**\u5355\u4e00\u4e16\u754c\u5e02\u573a + \u591a\u5143\u653f\u6cbb\u6743\u5a01\uff08\u6c11\u65cf\u56fd\u5bb6\u4f53\u7cfb\uff09**\u7684\"\u4e16\u754c\u2014\u7ecf\u6d4e\"\uff1b\n   - \u6c11\u65cf\u56fd\u5bb6\u4f53\u7cfb\u662f\u73b0\u4ee3\u4e16\u754c\u4f53\u7cfb\u7684\u653f\u6cbb\u7ed3\u6784\uff1b\u8d44\u672c\u4e3b\u4e49\u8de8\u56fd\u6d41\u52a8\u662f\u5176\u7ecf\u6d4e\u7ed3\u6784\u3002\n3. **\u4e09\u5c42\u5206\u5de5\u7ed3\u6784**\uff1a\n   - **\u4e2d\u5fc3**\uff1a\u9ad8\u6280\u672f\u3001\u9ad8\u5229\u6da6\u3001\u81ea\u7531\u52b3\u52a8\u3001\u5f3a\u56fd\u5bb6\uff1b\n   - **\u534a\u8fb9\u7f18**\uff1a\u4e2d\u7b49\u6280\u672f\u3001\u6df7\u5408\u52b3\u52a8\u5f62\u5f0f\u3001\u4e2d\u7b49\u56fd\u5bb6\uff1b\n   - **\u8fb9\u7f18**\uff1a\u4f4e\u6280\u672f\u3001\u4f4e\u5229\u6da6\u3001\u5f3a\u5236/\u534a\u5f3a\u5236\u52b3\u52a8\u3001\u5f31\u56fd\u5bb6\uff1b\n   - \u4e09\u8005\u6784\u6210**\u4e0d\u5e73\u7b49\u4ea4\u6362 + \u5269\u4f59\u8f6c\u79fb**\u7684\u7b49\u7ea7\u7ed3\u6784\u3002\n4. **\u4e0d\u5e73\u7b49\u6027**\uff1a\n   - \u4e0d\u662f\u5404\u90e8\u5206\u5b64\u7acb\u53d1\u5c55\uff0c\u800c\u662f**\u4e2d\u5fc3\u901a\u8fc7\u4e0d\u5e73\u7b49\u7ed3\u6784\u6301\u7eed\u4ece\u8fb9\u7f18\u6c72\u53d6\u5269\u4f59
