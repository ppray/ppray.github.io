3. **法治与透明度问题**：
   - 国际投资者对中国法治环境、信息透明度仍有顾虑；
   - 影响人民币资产长期持有意愿；
4. **网络效应锁定**：
   - 美元的网络优势短期难以撼动；
   - 国际金融基础设施仍以美元为中心；
5. **地缘政治风险**：
   - 中美博弈使部分国家在加大人民币使用上犹豫；
   - 担心被卷入大国对抗；
6. **国内储蓄结构**：
   - 中国高储蓄率 + 经常账户长期顺差 → 难以通过逆差向外提供人民币（与美国相反）；
   - 这是与特里芬难题相反的"反特里芬"约束。
7. **政治体制差异**：
   - 国际投资者对体制差异的顾虑构成结构性障碍。

**七、日元国际化的教训**

1. 1980 年代日本曾积极推动日元国际化，但 1990 年代后因泡沫破裂、金融体系问题、低利率长期化、监管碎片化等原因而停滞；
2. 教训：①国内金融市场必须高度发达；②政策协同至关重要；③不能过度依赖单一推动力（贸易）。
3. 对人民币启示：①金融市场建设必须先行；②推进节奏须稳健；③配套法治与透明度建设。

**八、策略建议**

1. **"以我为主、循序渐进"**：避免速胜论，分阶段推进；
2. **优先发展贸易结算**：利用中国制造业 + 一带一路项目优势；
3. **稳步开放金融市场**：扩大债券市场、衍生品市场对外开放，强化法治；
4. **基础设施建设**：①CIPS 扩容；②数字人民币国际化；③与 SWIFT 并行而非对抗；
5. **多边协作**：①金砖支付系统；②区域货币合作（CMIM、东盟+3）；③SDR 改革；
6. **国内宏观稳健**：低通胀、稳定增长、合理负债率构成人民币国际化基础；
7. **风险管理**：保留资本账户审慎管理工具，应对金融冲击。

**九、前景判断**

1. **基线情形**：未来 10—20 年人民币结算占比升至 8—10%，储备份额升至 5—7%，进入"国际货币第二梯队"；
2. **乐观情形**：去美元化加速 + 数字人民币突破 → 人民币成为多极国际货币体系核心之一；
3. **悲观情形**：地缘对抗加剧 + 国内金融风险暴露 → 人民币国际化停滞甚至倒退。

**十、理论结论**

人民币国际化是中国从"贸易大国"向"金融强国"转型的关键载体，其推进受**经济基础、制度建设、地缘政治、技术变革**多重因素塑造。短期内不应追求挑战美元霸权，而应**稳步推进结构性升位 + 替代基础设施建设 + 国内宏观稳健**。从历史长时段看，人民币国际化是中国在国际货币体系中实现位置升级的战略选择，也是国际货币体系朝多极化、多元化方向演变的重要变量（参见 Cohen《国际货币的未来》；Eichengreen《嚣张的特权》；田野第四章；翟东升相关研究；周小川"超主权货币"文章）。

### 15. 评析拉西特和奥尼尔的三角和平理论【模拟-8】

布鲁斯·拉西特（Bruce Russett）与约翰·奥尼尔（John Oneal）在《三角和平：民主、相互依存、国际组织》（中译本 2009，原版 2001）系统化"康德三角"和平理论，是当代自由主义和平论的集大成之作。

**一、康德三角的理论谱系**

康德 1795 年《永久和平论》提出永久和平三大支柱：①**共和宪法**（民主）；②**国际联邦**（国际制度）；③**世界主义法**（包括经济交往）。罗素特—奥尼尔把康德的思想现代化为：**民主 + 相互依赖 + 国际组织 = 和平**。

**二、三大支柱的命题**

1. **民主和平论**（democratic peace）：
   - **民主国家之间几乎不发生战争**（"民主和平最接近 IR 中的'定律'"——Levy）；
   - 机制：①规范——民主国家解决冲突的非暴力方式向国际延伸；②结构——民主政治的多重否决点、舆论监督、领导人问责使发动战争代价高；
   - 经验：自 1815 年以来民主国家之间几乎无战争（少数边缘案例）。
2. **相互依赖和平**（economic interdependence peace）：
   - **贸易和投资互嵌降低冲突概率**——继承波拉切克、罗斯克兰斯；
   - 机制：①机会成本——冲突会破坏既有贸易；②国内利益集团——跨国资本反对冲突；③信息渠道——经济联系增加沟通、降低误判；
   - 经验：双边贸易额每增加 10%，双边冲突频率下降约 10%。
3. **国际组织和平**（international organization peace）：
   - **共同参与国际组织（IGO）有助于降低冲突**；
   - 机制：①信息提供与透明度；②争端解决渠道；③规范扩散与社会化；④组织化外交降低误判；
   - 经验：双边共同参与的 IGO 数量与冲突概率显著负相关。

**三、三角的相互强化**

罗素特—奥尼尔强调三大支柱**相互嵌套、相互强化**：
- 民主推动相互依赖（市场经济 + 法治）；
- 相互依赖推动制度建设（贸易需要规则）；
- 制度强化民主（国际制度对国内民主有规范效应）；
- 三角形成 → 自我强化的和平循环。

**四、实证设计与结论**

罗素特—奥尼尔运用 1885—1992 年国家间二元数据，控制相对实力、地理距离、防御同盟、争端历史等变量，回归分析显示：
1. 双方民主水平上升一个标准差 → 冲突概率下降约 33%；
2. 双边贸易依赖加深 → 冲突概率下降约 30%；
3. 共同参与 IGO 数量上升一个标准差 → 冲突概率下降约 24%；
4. 三因素同时存在时减少冲突概率超过 70%；
5. 结论：康德三角是 20 世纪后期长和平（long peace）的结构性基础。

**五、理论评价：优点**

1. **理论综合性**：把民主和平、贸易和平、制度和平统一在康德框架下，避免单一因素决定论；
2. **经验严谨性**：大规模面板数据 + 多种模型检验；
3. **政策启示明确**：推进民主、贸易、国际组织三位一体；
4. **跨议题应用价值**：从战争冲突推广到经济合作、环境治理；
5. **作为国际制度自由主义高峰**：与基欧汉、Ikenberry 互补构成自由主义 IPE 主轴。

**六、理论评价：批评与局限**

1. **方法论批评**：
   - **内生性问题**：和平促进了民主与贸易 vs 民主和贸易促进和平？因果方向难辨；
   - **样本偏向**：研究样本以发达国家为主，对欠发达国家解释力弱；
   - **冷战效应混淆**：长和平可能更多源于核威慑与超级大国均势，而非三角；
2. **理论批评**：
   - **米尔斯海默批评**：民主和平是冷战末期偶然现象，非结构性规律；
   - **现实主义反驳**：核武器 + 均势 + 美国霸权才是和平基础；
   - **批判理论批评**（Cox 等）："民主"定义过于狭窄（欧美式自由民主），暗藏文明优越论；
3. **历史反例**：
   - **1914 一战前夕**：英德高度经济互嵌但仍开战 → 科普兰"预期理论"修正——关键不是当前贸易，而是预期未来贸易；
   - **当代中印关系**：两国民主成分有限但有大量经济联系，2020 加勒万冲突显示制度不足以防冲突；
   - **俄乌战争**：欧俄高度能源依赖未防战争；
4. **当代挑战**：
   - **威权资本主义崛起**：威权大国（中国、俄罗斯）经济强大但非民主，挑战民主和平命题；
   - **去全球化趋势**：贸易战、技术脱钩削弱相互依赖和平基础；
   - **国际组织瘫痪**：WTO、UNSC 多次瘫痪削弱制度和平基础；
5. **范式批判**：
   - 三角和平假设了"民主 + 市场 + 制度"是普世通用，忽视文化、历史多样性；
   - 西方中心主义倾向，被批为"自由帝国主义"理论包装。

**七、当代修正与延伸**

1. **科普兰预期理论**：贸易能否带来和平取决于未来贸易预期，弥补静态贸易和平论；
2. **米兰斯基《商业繁荣与战争危险》**：经济相互依赖 + 不安全感叠加可能加剧冲突；
3. **Mansfield-Pevehouse**：IGO 的和平效应取决于其制度密度、监督机制、强制能力；
4. **"经济防御性现实主义"**（Drezner）：相互依赖可被武器化（如金融制裁），变成冲突工具；
5. **"民主退潮"（democratic recession）**：2006 以来全球民主指数下降，挑战民主和平基础。

**八、对中国的意涵**

1. **中国并非民主国家，但深度参与全球贸易和国际制度**——挑战纯民主和平命题，提供制度 + 贸易和平的部分替代；
2. **中美贸易战 + 脱钩 + 制裁**削弱康德三角第二、三支柱，增加冲突风险；
3. **中国应坚持参与多边制度 + 推动经济相互依赖**，对冲对抗逻辑；
4. **维护和平不仅靠民主**：威权大国通过克制、制度参与、合作也可维护和平；
5. **理论启示**：单纯依赖三角中任一因素易脆弱，需要多重保险机制。

**九、理论结论**

罗素特—奥尼尔三角和平论是 20 世纪后期自由主义 IPE 的高峰之作，提供了"和平不只是力量制衡的产物，更是制度、贸易、价值观共同塑造"的理论视野。其经验与理论贡献值得肯定，但**单一因素决定论倾向、范式中心主义、当代挑战**也提醒我们：和平是脆弱的、多元的、需要持续经营的状态。21 世纪和平建设需要在康德三角基础上，加入**多极化共存、非西方价值观对话、危机管控机制、武器化经济相互依赖的治理**等新维度（参见 Russett & Oneal《三足鼎立》中译本；Copeland 2015；Mearsheimer 2001；田野第十章；宋新宁/陈岳第十一章）。

### 16. 运用所学 IPE 理论分析中国加入世界贸易组织的原因【模拟-8】

中国 2001 年 12 月正式加入 WTO，是改革开放进程中最具战略意义的事件之一，也是 IPE"国内—国际互动"研究的经典案例。

**一、历史脉络**

1. **1986 年**：中国向 GATT 提出恢复缔约国地位申请；
2. **1995 年**：WTO 取代 GATT，中国谈判延续；
3. **1999 年**：中美达成入世双边协议（朱镕基—巴尔舍夫斯基）；
4. **2001 年 11 月 11 日**：多哈部长级会议通过中国入世决议；
5. **2001 年 12 月 11 日**：中国正式成为 WTO 成员。

谈判历时 **15 年**，是 WTO 历史上最长入世谈判之一。

**二、推动入世的国内政治动因**

1. **改革派的制度承诺战略**：
   - 朱镕基政府利用 WTO 承诺锁定国内市场化改革，防止改革反复（基欧汉式"可信承诺"机制）；
   - 借外部约束推动国内难以推动的改革（国企改革、银行业改革、行政体制改革）；
2. **沿海出口集团的支持**：
   - 沿海经济、出口企业、外资合作伙伴是主要受益者，形成强大政治支持基础；
   - 形成"开放派"政治联盟（Rogowski/Hiscox 框架）；
3. **官僚体系的现代化诉求**：
   - 入世需要建立现代市场监管能力、与国际接轨，推动行政体制现代化；
4. **加入"主流"国际秩序**：
   - 1989 年后中国寻求恢复国际地位，WTO 是关键平台；
   - 入世是"和平崛起"战略的重要组成。

**三、推动入世的国际政治动因**

1. **美国战略考量**：
   - 克林顿政府认为"接触+融合"将促使中国走向市场化、自由化、可能民主化；
   - 美国商界（特别是大型跨国公司）强力游说入世；
   - **PNTR（永久正常贸易关系）**法案是美国国内政治协调的产物；
2. **WTO 体制需求**：
   - WTO 需要把中国这一主要贸易国纳入规则体系，否则规则覆盖不完整；
   - 多哈回合启动需要中国参与；
3. **其他成员的市场利益**：
   - 欧盟、日本、加拿大、澳大利亚等都希望进入中国市场；
   - 形成"入世推手"国际联盟；
4. **冷战后秩序重塑**：
   - 苏联解体后，全球化加速；
   - 把中国纳入西方主导的国际经济秩序是冷战后秩序设计的重要一环。

**四、经济动因（绝对收益视角）**

1. **市场扩展**：
   - 获得 MFN 待遇（无需每年由美国国会重审），出口稳定性提升；
   - 进入发达国家市场的稳定预期；
2. **吸引外资**：
   - 入世增强外资信心，FDI 大幅流入（入世后年均吸引 FDI 翻倍）；
3. **技术升级**：
   - 通过外资 + 全球价值链获得技术、管理、市场学习机会；
4. **制度红利**：
   - 借助 WTO 规则推动国内市场化改革，提升资源配置效率；
5. **就业创造**：
   - 出口部门快速扩张，吸纳大量农村剩余劳动力（参见刘易斯二元结构论）；
6. **国家财政**：
   - 出口扩展 → 增值税 + 关税 + 企业所得税增加。

**五、社会联盟视角（Rogowski/Hiscox）**

1. **支持入世**：
   - 沿海出口企业、外资合作方、城市消费者、外贸服务业；
   - 出口劳动密集型行业工人（H-O 视角下劳动丰裕国劳动受益）；
   - 改革派官员、经济学家、跨国企业；
2. **反对/担忧入世**：
   - 进口竞争行业（汽车、电信、农业、金融）；
   - 部分国有企业；
   - 农业利益集团（特别是种植业农民）；
   - 部分地方政府（受冲击产业集中地区）；
3. **政治妥协**：
   - 政府承诺给予敏感行业过渡期（汽车 5—7 年、农业部分品类、银行业 5 年、电信分阶段）；
   - 配套国企改革、银行业改革、农业政策调整。

**六、双层博弈视角（Putnam）**

罗伯特·普特南"双层博弈"框架：政府同时在国际层和国内层谈判。
1. **国际层**：与美欧日等谈判市场开放、关税减让；
2. **国内层**：与国企、地方政府、敏感行业协商内部调整；
3. **小赢集分析**：政府必须在两层都获得最低支持才能达成协议；
4. **借外约束内**：朱镕基政府利用 WTO 谈判压力推动国企改革、银行业改革（"狼来了"策略）。

**七、制度自由主义视角（基欧汉）**

1. **降低交易成本**：入世为中国与全球贸易合作提供制度框架，降低反复议价成本；
2. **稳定预期**：WTO 规则为外资和贸易伙伴提供稳定预期，吸引长期投资；
3. **可信承诺**：入世承诺约束政府政策反复，提升国际信誉；
4. **路径依赖**：一旦深度嵌入 WTO 规则体系，撤离成本极高 → 形成"制度黏性"。

**八、霸权与崛起国关系视角（Ikenberry）**

1. 中国选择**"在既有秩序内崛起"**——加入而非颠覆 WTO；
2. 美国推动中国入世也希望**通过秩序内嵌制约中国**，但低估了中国的吸纳与适应能力；
3. 入世是中美关系"接触 + 融合"战略的高峰，也为后来"竞争 + 对抗"埋下伏笔（美国认为中国"未按预期演变"）。

**九、入世后的实际效果**

1. **贸易爆发**：
   - 出口从 2001 年 2660 亿美元增至 2022 年 3.6 万亿美元（13.5 倍）；
   - 2009 年成为全球第一大出口国；
   - 货物贸易总额 2013 年成为全球第一；
2. **吸引外资**：
   - FDI 流入由 470 亿美元（2001）升至 1900 亿美元（2022）；
3. **国内改革**：
   - 修订 2000 多部法律法规；
   - 国企改革加速、银行业改革突破、行政许可法出台；
4. **产业升级**：
   - 从初级加工 → 高端制造 → 部分领域全球领先；
   - 全球价值链中心地位巩固；
5. **就业创造**：
   - 加入 WTO 后 10 年创造制造业就业约 8000 万；
6. **国际地位提升**：
   - 入世后 20 年内 GDP 从世界第六升至第二；
   - 国际影响力大幅提升。

**十、当代回望与反思**

1. **入世是中国改革开放进程的里程碑**：没有入世，没有"中国奇迹"；
2. **WTO 入世也带来挑战**：①国内分化加剧；②部分行业冲击；③外部依赖加深；④后期与美国关系紧张；
3. **美方对入世效果的反思**：美国学界 / 政界对"接触政策"失败的批评成为对华政策转向的依据；
4. **后入世挑战**：中美贸易战、技术脱钩、WTO 上诉机构瘫痪、对中国"非市场经济地位"质疑；
5. **中国应对**：维护 WTO 多边核心，同时推动 RCEP、CPTPP、DEPA 等区域路径；积极推动 WTO 改革；维护开放型世界经济。

**十一、理论结论**

中国入世是**国内改革派 + 国际秩序需求 + 经济相互利益 + 制度承诺战略**多重因素汇合的结果。从 IPE 理论看，它是制度自由主义、双层博弈、"颠倒的第二意象"等理论的经典案例。入世后中国与全球经济深度互嵌，既成就了崛起也面临转型挑战。展望未来，中国应继续坚定维护多边贸易体制，同时推动改革，避免脱钩对抗陷阱，为全球贸易治理贡献中国方案（参见基欧汉 1984；Putnam 1988；Ikenberry 2001；田野第三、五章；龙永图等亲历者回忆）。

### 17. 分析路径依赖对政治经济发展的影响【模拟-9】

路径依赖（path dependence）是历史制度主义和演化经济学的核心概念，对理解政治经济发展的长时段轨迹具有重要解释力。

**一、概念起源与界定**

1. **演化经济学起源**：阿瑟（W. Brian Arthur）研究 QWERTY 键盘、VHS vs Betamax 录像带、巴克拉斯 vs 莱特兄弟早期飞机设计等案例，论证**早期偶然选择 + 报酬递增机制 → 路径锁定**。
2. **诺思的引入**：诺思《制度、制度变迁与经济绩效》（1990）把路径依赖引入制度分析：**制度一旦形成会通过报酬递增自我强化**，使后续选择被锁定，即使存在更优替代方案，重新建立成本也极高。
3. **皮尔逊的政治学引申**：皮尔逊（Paul Pierson）《时间中的政治》（2004）系统化路径依赖在政治学中的应用，强调政治制度具有**比经济制度更强的路径依赖性**。

**二、路径依赖的四大机制**

1. **学习效应（learning effects）**：使用某项技术/制度的经验积累，使其效率不断提升；
2. **协调效应（coordination effects）**：他人采用同样制度时收益增加（如计量单位、通信协议）；
3. **适应预期（adaptive expectations）**：行为者预期他人将继续使用，自己也加入；
4. **报酬递增（increasing returns）**：上述三机制综合产生收益递增，使既有制度难以被替代。

**三、政治制度的路径依赖特征**

皮尔逊指出政治制度比经济制度路径依赖更强：
1. **集体行动困境**：变革需多人协调，成本极高；
2. **制度密度**：政治制度相互嵌套，单一变革牵动全局；
3. **权力不对称**：既得利益集团有动机维护现状；
4. **学习适应慢**：政治反馈周期长、信号嘈杂；
5. **认知限制**：政治问题复杂，行为者依赖既有认知框架。

**四、对政治经济发展的影响**

1. **国家发展轨迹的差异**：
   - **例**：北美与拉美都在 16—19 世纪经历殖民，但因初始制度差异（北美自由土地分配 vs 拉美种植园奴隶制）形成完全不同的长期发展轨迹；
   - Acemoglu & Robinson《国家为何衰败》论证"包容型 vs 汲取型制度"的长期路径分化；
2. **经济组织形式**：
   - **例**：美式股东资本主义 vs 德日利益相关者资本主义因 19—20 世纪初制度选择固化下来；
3. **福利国家类型**：
   - 艾斯平-安德森三类福利体制（自由主义、保守合作主义、社会民主主义）反映 19—20 世纪选择路径锁定；
4. **金融体系类型**：
   - 银行主导 vs 市场主导金融体系长期分化；
5. **政治体制**：
   - 总统制 vs 议会制、多数制 vs 比例代表制 → 长期固化；
6. **国际制度演变**：
   - 布雷顿森林机构 80 年仍主导全球金融治理；
   - WTO 规则即使不适应数字时代仍难以重写；
7. **货币与汇率制度**：
   - 美元主导 80 年来未被颠覆，体现强路径依赖；

**五、路径依赖与制度变迁**

路径依赖并非完全锁定，制度仍可变迁，主要机制：
1. **关键节点（critical junctures）**：危机、战争、革命打破既有路径；
   - **例**：1929 大萧条 → 福利国家兴起；1991 苏联解体 → 转型经济；2008 危机 → 金融监管重塑；
2. **渐进性制度变迁**（Streeck & Thelen）：
   - **替换（displacement）**：新制度逐步取代旧制度；
   - **分层（layering）**：新规则叠加在旧规则之上；
   - **漂移（drift）**：环境变化但制度不调整 → 制度功能转变；
   - **转换（conversion）**：制度形式不变但功能/解释改变；
   - **耗尽（exhaustion）**：制度逐步衰竭直至消亡；
3. **观念创新**：新理论 / 范式可在关键时刻为变迁提供智力支撑（凯恩斯主义、新自由主义、当代产业政策回归）。

**六、关键案例分析**

**案例 1：美元主导**
- 1944 偶然成为关键货币 → 网络效应、流动性、机构嵌入 → 80 年路径锁定；
- 即使 1971 黄金脱钩、特里芬难题等多次危机仍未被替代；
- 当前去美元化进程缓慢印证路径依赖。

**案例 2：QWERTY 键盘**
- 1870 年代设计为防机械按键卡顿 → 学习、协调、适应预期 → 直到今天仍是主导；
- 已证明 Dvorak 键盘效率更高但难以普及。

**案例 3：欧元区单一货币 + 多元财政**
- 1999 年制度设计存在内在缺陷（货币联盟无财政联盟）；
- 但路径依赖使欧元区不可能解体，只能渐进修补（ESM、银行业联盟、共同债券）。

**案例 4：中国渐进改革路径**
- 1978 年起未走"休克疗法"，而是双轨制、特区先行、分步推进；
- 形成"渐进 + 实验 + 试点"的制度路径；
- 这一路径强化了中国制度的特殊性，难以简单转向西式自由化。

**案例 5：北美 vs 拉美长期分化**
- Acemoglu & Robinson 论证北美包容性制度 vs 拉美汲取性制度的长期分化；
- 制度路径决定 200 年发展差距。

**七、对当代政治经济的启示**

1. **改革窗口稀缺性**：关键节点窗口短暂，错过则路径锁定；
2. **早期选择极端重要**：早期偶然选择可决定长期轨迹；
3. **激进 vs 渐进改革**：路径依赖支持渐进改革（避免破坏现有秩序的合作基础）；
4. **既得利益的政治经济**：变革常受既得利益阻碍，需要联盟重组；
5. **制度供给与制度替代**：补充性制度供给（如 AIIB 之于世行）比直接替代更可行；
6. **观念变迁的重要性**：观念创新是路径变迁的智力支撑（凯恩斯、哈耶克、当代产业政策回归）。

**八、对中国发展的意涵**

1. **改革开放路径的强化**：40 年开放路径已形成强路径依赖，不太可能逆转；
2. **国有经济的路径依赖**：国企改革难以走完全私有化路径；
3. **制度型开放**：是路径依赖下的合理选择，循序渐进推进；
4. **国际制度建设**：AIIB、新开发银行等补位策略符合路径依赖逻辑；
5. **人民币国际化的渐进路径**：避免短期挑战美元，认知到网络效应与路径依赖的力量；
6. **科技自立自强**：突破"卡脖子"需要长期投入，认识到技术路径依赖的现实。

**九、批评与局限**

1. **过度决定论倾向**：可能低估行为者能动性；
2. **关键节点识别困难**：事后归因易，事前预测难；
3. **路径锁定不绝对**：技术革命、危机冲击仍可打破路径；
4. **忽略权力维度**：纯演化视角易忽略权力斗争的塑造作用；
5. **政策含义弱化**：若一切由路径决定，政策选择空间何在？

**十、理论结论**

路径依赖揭示了**政治经济发展的历史性、不可逆性、和制度的"黏性"**。其核心洞见是：今天的选择决定明天的可能性集合；早期选择具有放大效应；改革必须考虑既有路径约束。对中国而言，理解路径依赖意味着：①珍惜改革开放路径的不可逆性；②识别并把握关键节点；③以渐进 + 试验 + 补位策略实现制度演进；④在国际制度建设上做长期布局。同时也要警惕过度决定论，保留行动者的能动性与变革可能（参见 North 1990；Pierson 2004；Streeck & Thelen 2005；Acemoglu & Robinson 2012；田野第一章；皮尔逊《时间中的政治》中译本）。

### 18. 运用所学 IPE 理论分析二十国集团、金砖国家峰会等新兴国际机制【模拟-9】

G20、金砖国家峰会等新兴国际机制是 21 世纪以来全球治理结构调整的重要表现。它们既反映新兴大国崛起，也体现既有秩序的适应能力。

**一、新兴机制的总体图景**

1. **G20（Group of Twenty）**：
   - 1999 年部长级 G20 设立（应对亚洲金融危机）；
   - 2008 年升级为首脑机制（应对全球金融危机）；
   - 成员：G7 + 中、俄、印、巴、墨、阿根廷、澳、印尼、韩、沙特、南非、土耳其 + 欧盟（共 20 方）；
   - 占全球 GDP 约 85%、贸易约 75%、人口约 2/3；
2. **金砖国家（BRICS）**：
   - 2001 年高盛奥尼尔提出 BRIC 概念（中、俄、印、巴）；
   - 2009 年首次首脑会议；
   - 2011 年南非加入；
   - 2024 年扩员：埃及、埃塞俄比亚、伊朗、阿联酋加入（沙特受邀但未正式加入）；
3. **配套机制**：
   - 金砖应急储备安排（CRA, 2014）；
   - 新开发银行（NDB, 2015）；
   - 金砖支付系统（推进中）；
4. **其他新兴机制**：
   - 上海合作组织（SCO）扩展；
   - 亚投行（AIIB）；
   - 区域全面经济伙伴关系协定（RCEP）；
   - 一带一路（BRI）；
   - 全球发展、安全、文明三大倡议。

**二、新兴机制兴起的理论解释**

1. **霸权秩序转型视角**（Ikenberry）：
   - 既有秩序（IMF、世行、WTO 等）反映 1945 年权力结构，未充分体现新兴大国权重；
   - 新兴大国通过补充性机制供给"修补"或"补位"现有秩序；
2. **制度自由主义视角**（基欧汉）：
   - 新议题（气候、数字、AI）超出既有制度覆盖能力；
   - 新机制提供针对性合作框架，降低议题特定的交易成本；
3. **结构性权力视角**（Strange）：
   - 新兴大国通过机制供给提升自身结构性权力（特别是金融、知识结构）；
   - 例：金砖支付系统对冲美元金融结构；
4. **批判 IPE 视角**（Cox/Gill）：
   - 新兴机制是新兴跨国资本与国家精英的"反霸权"尝试；
   - 但其本身也嵌入资本主义世界体系；
5. **集体行动困境视角**（Olson）：
   - 公共物品供给中"霸权领导退场"留下真空，需要新机制补位。

**三、G20 的角色与作用**

1. **历史性突破**：
   - 2008 危机时 G20 升级为首脑机制，标志着发达国家与新兴大国共同治理全球经济的格局形成；
   - 取代 G7/G8 成为"全球经济治理首要平台"；
2. **核心议题**：
   - 全球金融监管协调（巴塞尔 III、金融稳定理事会改革）；
   - 国际宏观经济协调；
   - 贸易与投资治理；
   - 发展融资、债务可持续性；
   - 气候融资、绿色金融；
   - 数字经济、税收（BEPS 行动）；
   - 反腐败、卫生治理；
3. **重要成果**：
   - 2009 伦敦峰会通过 1.1 万亿美元救助方案；
   - 2010 首尔峰会通过 IMF 份额改革；
   - 2014 布里斯班峰会通过"全球增长 2%"目标；
   - 2016 杭州峰会推动"包容性增长"议程；
   - 2020 利雅得线上峰会应对新冠疫情；
   - 2024 里约峰会推动"全球反饥饿与贫困联盟"；
4. **局限**：
   - 决策非约束性（"软法"性质）；
   - 议程零散、缺乏聚焦；
   - 大国博弈使协调困难；
   - 缺乏常设秘书处（轮值主席国制）。

**四、金砖国家的角色与作用**

1. **政治意义**：
   - 新兴大国的"集体声音"，对冲西方主导的多边机制；
   - 提供"南南合作"高级别平台；
   - 推动国际秩序多极化、多元化；
2. **经济治理**：
   - **新开发银行（NDB）**：基础设施、可持续发展融资，规模逐步扩大；
   - **应急储备安排（CRA）**：1000 亿美元货币救助机制，对冲 IMF 依赖；
   - **本币结算扩大**：减少对美元依赖；
   - **金砖支付系统**：正在研发的去美元化基础设施；
3. **政策协调**：
   - 在 WTO、IMF、UN 改革议题上协调立场；
   - 推动 IMF 份额改革、WTO 公平规则；
4. **2024 扩员意义**：
   - 加入埃及、埃塞俄比亚、伊朗、阿联酋后，金砖+ 占全球 GDP（PPP）超过 35%；
   - 覆盖更多发展中国家声音；
   - 增强对全球南方代表性；
5. **局限**：
   - 成员国差异大（俄印冲突、中印边界、地缘政治分歧）；
   - 缺乏共同价值观或意识形态基础；
   - 决策机制松散；
   - 部分成员国经济结构相似（出口原料、依赖中国市场）形成竞争而非互补。

**五、新兴机制与既有秩序的关系**

1. **补充而非替代**：
   - AIIB 与世行 / 亚开行平行运作而非对抗；
   - 新开发银行与世行分工互补；
   - 金砖 CRA 与 IMF 互补；
   - 整体上是"渐进改革"而非"颠覆"路径；
2. **施压改革**：
   - 新机制存在本身对既有机制构成竞争压力，推动改革；
   - **例**：AIIB 推动世行加快治理改革、提升东亚发展中国家份额；
3. **多边主义的"网络化"**：
   - 不同议题、不同区域、不同议程的多重机制并存；
   - 形成"多边主义网络"或"碎片化多边主义"；
4. **风险**：
   - 机制竞争可能导致规则碎片化、监管套利；
   - 大国可能利用机制对抗加剧分裂；
   - 治理效率因机制过多而下降。

**六、中国在新兴机制中的角色**

1. **关键推动者**：
   - 金砖、AIIB、新开发银行、BRI 等中国都是主要发起或参与者；
2. **资源贡献者**：
   - AIIB 中国出资比例最高、占主导股权；
   - NDB 五国平均出资，中国为最大经济体；
   - BRI 累计投资数千亿美元；
3. **规则塑造者**：
   - 推动绿色 BRI、廉洁 BRI、数字 BRI；
   - 在 G20 推动包容性增长、发展融资；
4. **平衡角色**：
   - 在守成与新兴之间充当桥梁；
   - 既维护既有秩序（WTO、UN），又补充新机制；
5. **挑战**：
   - 守成大国的怀疑与抵制；
   - 新兴机制成员的不同诉求协调；
   - 国内治理能力配套（如海外项目监管、债务可持续）。

**七、新兴机制的未来走向**

1. **G20 走向制度化**：可能建立常设秘书处、提升执行力；
2. **金砖+ 扩展**：吸纳更多发展中国家，强化全球南方平台；
3. **议题专门化**：在气候、AI、数字、卫生等新议题上建立专项机制；
4. **基础设施升级**：金砖支付系统、CBDC 跨境互联；
5. **与既有机制协调**：建立 G20—金砖—G7 等机制间协调；
6. **应对地缘风险**：需要管控地缘政治冲突对治理合作的破坏。

**八、理论结论**

G20、金砖等新兴国际机制反映了**全球治理从西方主导向多极合作转型**的历史趋势。它们既是新兴大国崛起的制度表达，也是既有秩序适应能力的考验。从 IPE 理论看，新兴机制体现了**制度供给的可竞争性、霸权秩序的可改革性、全球治理的多元主义**。展望未来，全球治理结构将是**"既有 + 新兴 + 区域 + 双边"多层嵌套**形态。中国应继续在新兴机制中发挥负责任的领导作用，推动全球治理朝更公正、包容、有效的方向演进（参见 Ikenberry 2001；基欧汉 1984；Strange 1988；田野第四章；宋新宁/陈岳第十章；中国国际问题研究院相关研究）。

### 19. 评析诺思的国家理论【模拟-10】

道格拉斯·诺思（Douglass North, 1920—2015）是新制度经济学奠基人之一，1993 年诺贝尔经济学奖得主。其国家理论散见于《经济史中的结构与变迁》（1981）、《制度、制度变迁与经济绩效》（1990）、《理解经济变迁的过程》（2005）和与 Wallis、Weingast 合著《暴力与社会秩序》（2009）。

**一、诺思国家理论的核心命题**

1. **国家的"双重身份"**：
   - **保护者**：界定与执行产权，提供秩序与合作框架；
   - **掠夺者**：统治者有动机以财政收益最大化为目标，可能侵蚀产权；
2. **诺思悖论**：
   - **"国家既是经济增长的关键，又是经济衰退的根源"**；
   - 没有国家则产权无保障 → 经济停滞；有国家则可能侵蚀产权 → 经济停滞；
   - 这是国家与发展关系的核心张力。
3. **统治者的双重目标**：
   - **财政收入最大化**（短期、独裁租金）；
   - **社会产出最大化**（长期、共同利益）；
   - 两者常冲突，统治者倾向短期。
4. **制度选择的"二级最优"**：
   - 受**统治者偏好 + 政治可行性 + 信息约束 + 路径依赖**限制，实际制度往往非"最优"而是"次优"；
   - 解释了为何许多国家陷入次优制度陷阱。

**二、关键概念与机制**

1. **国家的暴力比较优势**：
   - 国家是"暴力垄断 + 财政汲取"的复合体；
   - 暴力垄断使其能提供安全公共物品，也使其能行掠夺；
2. **统治者—被统治者契约**：
   - 国家与公民间存在隐含契约：公民缴税换取保护；
   - 契约的稳定性取决于公平性与正当性；
3. **集团成本**：
   - 统治者需要在不同利益集团间分配收益；
   - 集团成本高 → 政策被特定集团俘获 → 制度低效；
4. **意识形态作用**：
   - 诺思晚期强调意识形态对制度变迁的重要性；
   - 共享观念降低交易成本、稳定制度预期。

**三、《暴力与社会秩序》的扩展**

诺思—Wallis—Weingast（2009）提出"自然国家 vs 开放进入秩序"二分：
1. **自然国家（natural state / limited access order）**：
   - 通过限制经济与政治权力的进入维护精英联盟；
   - 精英特权换取暴力克制；
   - 历史上绝大多数社会属此类（拉美、非洲、中东大量国家）；
2. **开放进入秩序（open access order）**：
   - 经济与政治权力的进入对所有公民开放；
   - 法治、竞争性政党、自由企业；
   - 现代发达国家原型（美欧日等）；
3. **过渡的门槛条件**：
   - ①精英内部法治；②政治组织自由；③暴力的完全国家化；
   - 仅约 25 个国家完成过渡。

**四、对发展的解释力**

1. **拉美陷阱**：
   - 西班牙殖民传承的汲取性制度 → 精英联盟掠夺 → 长期低增长；
2. **东亚奇迹**：
   - 国家强、自主性高、嵌入式自主性（Evans）→ 推动产业政策成功；
   - 战后日韩台从威权阶段过渡到开放进入秩序；
3. **苏联转型**：
   - 路径依赖 + 缺乏配套制度 → 休克疗法失败 → 寡头资本主义；
4. **中国改革**：
   - 渐进改革 + 实验 + 路径依赖；
   - 保留国家强主导，但通过"分级实验 + 经济激励"促进发展；
   - 诺思—Wallis—Weingast 框架下中国仍属"自然国家"但有较强发展能力。

**五、理论评价：优点**

1. **理论综合性**：把产权、制度、交易成本、暴力、意识形态统一在国家分析框架；
2. **历史厚度**：从中世纪欧洲到当代发展案例，具长时段比较优势；
3. **政策启示明确**：保护产权、约束统治者、推动开放秩序；
4. **对发展研究的奠基性贡献**：是 Acemoglu & Robinson《国家为何衰败》的直接思想前史；
5. **对新制度主义国家研究的核心地位**：与 Tilly、Skocpol、Evans 并列。

**六、理论评价：批评与局限**

1. **个体理性假设的局限**：
   - 国家分析以"统治者效用最大化"为出发点，可能忽视集体行动逻辑、官僚体系自主性；
2. **西方中心倾向**：
   - "开放进入秩序"以欧美模式为典范，对非西方治理模式（如中国、新加坡）解释不足；
   - 把发展等同于民主化路径；
3. **过渡机制说明不足**：
   - 从自然国家向开放进入秩序过渡的机制说明不够具体；
   - 为何仅 25 国完成过渡？哪些因素决定？
4. **忽视国际维度**：
   - 国家被分析为内部互动产物，未充分考虑国际因素（战争、贸易、霸权）对国家形成的塑造；
   - 与 Tilly"战争造就国家"框架的对话不足；
5. **意识形态分析不充分**：
   - 虽然晚期重视，但仍处描述阶段，未形成系统理论；
6. **东亚发展国家的挑战**：
   - 东亚案例（特别是中国）显示"非开放进入秩序"也可实现高速发展，挑战开放秩序必要性假设；
7. **路径依赖与变迁的张力**：
   - 强调路径依赖时易陷入决定论；
   - 关键节点机制说明不足；

**七、对中国研究的意义**

1. **解释中国渐进改革成功**：
   - 路径依赖 + 试错实验 + 嵌入式国家自主性；
   - 不走休克疗法符合诺思制度变迁的渐进逻辑；
2. **解释中国仍存在的制度困境**：
   - 国有企业产权模糊（部分诺思悖论）；
   - 反腐败常态化反映约束官员的需要；
   - 法治建设是制度演进的关键方向；
3. **挑战诺思—Wallis—Weingast 框架**：
   - 中国是"自然国家"但创造了人类史上最大规模发展；
   - 可能需要"中国特色发展型国家"作为第三类型；
4. **对未来路径的启示**：
   - 制度变迁需要长期、渐进、配套；
   - 关键节点（如三中全会改革）需要把握；
   - 意识形态（如发展观、共同富裕、中国式现代化）对制度演进至关重要。

**八、理论结论**

诺思的国家理论是**新制度主义对国家分析的奠基性贡献**，其核心命题——产权、暴力、统治者激励、路径依赖——构成现代政治经济学的基本词汇。其优点在于综合性、历史厚度、政策启示；局限在于西方中心倾向、过渡机制说明不足、对非西方治理模式包容不够。诺思晚期对意识形态、关键节点、开放进入秩序的扩展显示其理论的开放性。对中国研究而言，诺思框架是必要工具但非充分工具——需结合中国特色发展型国家、嵌入式自主性、举国体制等本土理论资源，才能形成更具解释力的国家理论（参见 North 1981, 1990, 2005；North-Wallis-Weingast 2009；田野第二章；皮尔逊；Acemoglu & Robinson 2012）。

### 20. 运用所学 IPE 理论分析中国企业"走出去"的困境【模拟-10】

中国企业"走出去"（going global）始于 1999 年战略部署，2013 年随一带一路加速。其规模扩大同时，面临多重国际政治经济困境。

**一、"走出去"进程概况**

1. **早期（1999—2005）**：以国企能源、矿产为主，规模有限；
2. **中期（2006—2015）**：扩展到制造业、基础设施、金融服务；2008 危机后加速；
3. **加速期（2013—2018）**：一带一路推动 + 民企对外投资爆发；2016 年对外投资额达历史峰值 1961 亿美元；
4. **调整期（2017—）**：监管收紧 + 外部环境恶化；2018 年后增速放缓但结构升级；
5. **数据**：2023 年中国 ODI 存量超 2.95 万亿美元，全球第三；境外企业数 4.7 万家。

**二、走出去困境的多维分析**

**1. 政治风险：东道国政治环境**
- **政权更迭与政策连续性**：缅甸密松水电、斯里兰卡汉班托塔港、马来西亚东海岸铁路等项目因政权更迭被搁置或重谈；
- **资源民族主义**：拉美、非洲多国对资源项目征收特别税或国有化；
- **反外资抗议**：东南亚多国针对中国项目的反对运动；
- **腐败与治理风险**：1+多个非洲项目因腐败丑闻受挫。

**2. 大国博弈与"中国威胁论"**
- **美国主导的安全审查**：CFIUS 审查中国对美投资，否决多起科技并购（如华为收购 3Com、中海油收购优尼科、紫光收购镁光等）；
- **欧盟外资审查机制**：2019 年生效，对中国 5G、半导体、AI 投资严审；
- **澳大利亚、加拿大等跟随**：限制中国对关键基础设施投资；
- **印度限制**：2020 中印冲突后限制中国 APP、投资；
- **意识形态化**：将中国投资标签化为"债务陷阱外交"、"经济胁迫"。

**3. 制裁与长臂管辖**
- **二级制裁**：美国对伊朗、俄罗斯、朝鲜等制裁的二级延伸，使中国企业被罚款或限制（如中兴 2017、华为系列）；
- **实体清单（Entity List）**：限制美国技术与零部件向中国企业出口（华为、中芯国际、海康威视等数百家企业）；
- **资产冻结风险**：俄乌战争后冻结俄罗斯储备引发"资产安全"担忧。

**4. 经营管理能力不足**
- **跨文化管理**：管理团队海外经验有限，跨文化沟通障碍多；
- **本土化不够**：过度依赖派驻中方员工，本土雇佣比例低；
- **合规能力弱**：对东道国法律、税务、劳工、环境法规理解不足；
- **公共关系薄弱**：与媒体、社区、NGO 沟通能力弱，易引发负面舆论；
- **危机管理弱**：突发事件应对能力不足。

**5. 融资与汇率风险**
- **跨境融资成本**：美元利率上行 → 项目融资成本飙升；
- **汇率波动**：东道国货币贬值（如非洲、拉美多国）造成损失；
- **被东道国"债务陷阱"指控**：BRI 项目被部分国家延期或重谈；
- **再融资困难**：项目周期长，再融资受国际金融条件影响大。

**6. 行业与领域差异**
- **能源/矿产**：政治风险高，但战略价值大；
- **基础设施**：周期长、回收慢、政治敏感；
- **制造业（如富士康越南、华为印度）**：受地缘政治直接冲击；
- **数字/互联网（TikTok、SHEIN、Temu）**：面临数据安全、内容审查、税收等多重压力；
- **金融业**：监管壁垒最高。

**7. 国际规则与标准约束**
- **OECD 反贿赂公约**：对中国国企海外腐败行为施压；
- **ESG 标准上升**：环境、社会、治理标准提高，部分中国企业难以快速适应；
- **可持续基建标准**：G7、欧盟、世行推动"高质量基础设施"标准，对中国 BRI 形成竞争；
- **数据治理规则**：欧盟 GDPR、美国 CLOUD Act 等限制跨境数据流。

**三、IPE 理论分析**

1. **结构性权力视角**（Strange）：
   - 中国走出去面对的是美国主导的安全、生产、金融、知识四结构；
   - 在金融结构（融资、清算、监管）和知识结构（标准、规则、话语）上中国仍处弱势；
2. **霸权稳定 / 守成—崛起视角**（Ikenberry/Mearsheimer）：
   - 守成霸权倾向于阻挠崛起国对外扩展；
   - 中国走出去被视为对既有秩序的挑战，引发反制；
3. **复合相互依赖视角**（基欧汉/奈）：
   - 多元行为体（政府、企业、NGO、媒体、专家）共同影响走出去进程；
   - 议题相互关联（投资 + 安全 + 人权 + 环境），增加协调难度；
4. **路径依赖视角**：
   - 既有国际规则反映西方偏好，中国后进 → 需在既有规则内调整或推动改革；
5. **批判 IPE 视角**（Cox）：
   - 中国资本扩张面临既有跨国资本主义阶级 + 美国霸权的结构性约束。

**四、应对策略**

1. **企业层面**：
   - 加强合规与风险管理能力；
   - 提升跨文化管理与本土化水平；
   - 加强公共关系与社区参与；
   - 多元融资渠道、汇率对冲；
   - 行业聚焦与差异化战略；
2. **政府层面**：
   - 提供风险预警与信息服务；
   - 完善对外投资监管，防止盲目走出去；
   - 加强与东道国政府双边协调；
   - 推动 BRI 升级（绿色 BRI、廉洁 BRI、数字 BRI、健康 BRI）；
   - 推动符合中国利益的国际规则形成（如可持续基础设施、可持续贸易）；
3. **多边层面**：
   - 通过 AIIB、新开发银行、金砖等机制提供融资替代；
   - 在 G20、世行等推动包容性发展融资规则；
   - 推动联合国 2030 议程，把基础设施纳入可持续发展框架；
4. **风险管控**：
   - 海外利益保护机制建设（领事保护、安保合作）；
   - 应对金融制裁风险（多元结算、CIPS、数字人民币）；
   - 投资保险机制（中信保等）扩展；
5. **国内配套**：
   - 提升海外项目财务监管；
   - 完善对外投资统计与风险评估体系；
   - 加强国际化人才培养。

**五、特定行业案例**

1. **TikTok 在美**：被指数据安全风险，面临强制剥离压力 — 数字时代走出去的新型困境；
2. **华为 5G**：因美国制裁失去海外大部分市场，转向云计算、汽车电子等新业务；
3. **比亚迪在欧**：扩张电动车市场，但面临欧盟反补贴调查；
4. **宁德时代**：动力电池全球扩张，面临美国《通胀削减法案》排除；
5. **斯里兰卡汉班托塔港**：被指"债务陷阱"典型，但实际是斯里兰卡债务危机背景下的资产置换；
6. **委内瑞拉投资**：因政治动荡损失严重，凸显资源出口型经济风险。

**六、未来展望**

1. **结构升级**：从能源 + 基础设施 + 制造业转向新能源 + 数字经济 + 高端服务；
2. **区域聚焦**：东盟、中东、拉美、非洲成为重点（欧美投资受阻）；
3. **本土化深化**：以本土雇佣、本土合作、本土研发为核心；
4. **规则塑造**：从"按规则走"向"参与规则制定"转变；
5. **风险应对常态化**：建立海外利益保护体系；
6. **绿色与数字转型**：契合全球可持续发展与数字化趋势。

**七、理论结论**

中国企业走出去的困境是**结构性权力不对称 + 大国博弈 + 治理能力不足 + 路径依赖**等多重因素叠加的产物。从 IPE 理论看，它揭示了**崛起国在既有秩序中扩展的根本张力**。应对之道在于**企业能力升级 + 政府支持优化 + 多边规则塑造 + 风险管控常态化**四位一体。展望未来，中国企业走出去将进入"规模—结构—规则"三位一体的深度调整期，是中国从经贸大国向经贸强国转型的核心环节（参见 Strange 1988；Ikenberry 2001；田野第十章；中国对外投资发展报告系列；商务部相关分析）。

### 21. 评析国家主义理论【模拟-11】

国家主义（statism）理论是 20 世纪后期对多元主义、马克思主义"国家工具论"的批判性反思，主张**国家是相对自主的政治行为体**。其代表人物有 Theda Skocpol、Stephen Krasner、Peter Evans、Charles Tilly、Michael Mann 等。

**一、国家主义的理论谱系**

1. **韦伯传统**：国家是垄断暴力的合法组织 → 强调国家的强制能力与官僚理性；
2. **马克思的折衷"国家相对自主性"**：马克思在《路易·波拿巴的雾月十八日》中已提出国家可在阶级冲突中获得相对自主性；
3. **Hintze、Tilly 的"战争造就国家"**：国家形成于战争压力下的财政汲取与组织化；
4. **20 世纪 70 年代国家主义复兴**：作为对多元主义（贝克尔、达尔）的反驳；
5. **当代发展型国家研究**（Johnson、Evans、Amsden、Wade）：东亚奇迹的国家主义解释。

**二、国家主义的核心命题**

1. **国家是独立行为体**：
   - 国家有自己的偏好与利益，不简单等同于阶级或利益集团合力；
   - 国家官僚体系拥有独立的政策偏好；
2. **国家自主性（state autonomy）**：
   - 国家可独立于社会经济精英形成并贯彻政策；
   - 自主性来源：官僚结构、财政能力、强制能力、意识形态正当性；
3. **国家能力（state capacity）**：
   - 国家将既定目标转化为政策结果的能力；
   - 包括汲取、调控、强制、合法化、渗透五大能力（Mann）；
4. **国家形成的内生性**：
   - 战争、革命、危机塑造国家形态；
   - "战争造就国家"（Tilly）。

**三、关键概念与人物**

1. **Theda Skocpol**：
   - 《国家与社会革命》（1979）：以法、俄、中三国革命比较，论证革命爆发的关键是国家危机而非阶级冲突；
   - 《把国家带回来》（1985，编）：宣告国家主义复兴；
2. **Stephen Krasner**：
   - 《捍卫国家利益》（1978）：论证美国对外原料政策由国家自主性而非企业利益主导；
3. **Peter Evans**：
   - 《嵌入式自主性》（1995）：论证发展型国家成功的关键是"国家自主性 + 与企业的紧密联系"；
4. **Charles Tilly**：
   - 《强制、资本与欧洲国家》（1990）：论证国家形成与战争、财政、商业的互动；
5. **Michael Mann**：
   - 《社会权力的来源》系列：区分国家的"专制权力"（独立行动）与"基础设施权力"（渗透社会）；
6. **Chalmers Johnson**：
   - 《通产省与日本奇迹》（1982）：开创"发展型国家"研究，论证日本通产省主导工业政策的成功。

**四、对发展型国家的解释**

国家主义对东亚奇迹的解释：
1. **强国家 + 嵌入式自主性**：日韩台战后国家具有高度自主性与官僚能力；
2. **产业政策**：通过选择性扶持、出口导向、汇率管理推动赶超；
3. **国家—企业关系**：紧密但不被俘获，形成"嵌入式自主性"（Evans）；
4. **政治稳定 + 安全压力**：冷战与朝鲜战争塑造的"防御性现代化"；
5. **教育投资**：人力资本积累作为长期发展基础；
6. **对中国改革开放的启示**：渐进 + 国家主导 + 实验 + 开放是"中国式现代化"路径。

**五、理论评价：优点**

1. **纠正了多元主义忽视国家自主性的偏向**；
2. **纠正了马克思工具论简单化国家**；
3. **解释了东亚发展奇迹**——多元主义、市场主义都难以解释；
4. **强调制度与历史厚度**——避免单纯个体理性化分析；
5. **政策启示明确**：发展中国家需要建设强国家以推动发展；
6. **跨学科综合性**：融合社会学、政治学、经济学、历史学。

**六、理论评价：批评与局限**

1. **"国家"概念过于笼统**：
   - 国家内部各部门、各层级利益与偏好差异巨大；
   - 把国家视为统一行为体易掩盖内部冲突；
2. **国家自主性的来源说明不足**：
   - 为何有些国家有强自主性、其他没有？因果机制不够清晰；
   - Evans"嵌入式自主性"是改进但仍有解释空白；
3. **路径依赖与变迁张力**：
   - 国家主义强调国家自主性但难以解释国家衰败；
   - 诺思"国家悖论"补充了变迁分析；
4. **东亚奇迹的复制性问题**：
   - 东亚成功条件（冷战压力 + 国家能力 + 文化遗产）不易复制；
   - 拉美、非洲许多国家尝试"发展型国家"但失败；
5. **威权倾向的隐忧**：
   - 强国家可能滑向威权主义、压制社会自由；
   - "嵌入式自主性"需要平衡，否则演变为"裙带资本主义"；
6. **新自由主义的反扑**：
   - 1980—2000 年代华盛顿共识对国家主义构成意识形态压力；
   - 但 2008 危机后国家干预重新被接受；
7. **全球化压力**：
   - 全球化使国家自主性受到金融市场、跨国公司、国际制度约束；
   - "国家与市场"关系需要重新思考。

**七、当代复兴：产业政策与新华盛顿共识**

1. **2008 危机后**：
   - 凯恩斯主义复兴 → 国家干预合法性恢复；
   - 各国推动产业政策（美国半导体、欧盟绿色协议、日本数字化）；
2. **2020 新冠后**：
   - 供应链安全、医疗自给、关键产业自主成为政策焦点；
   - 美国《CHIPS 法案》《通胀削减法案》是新型产业政策；
3. **"新华盛顿共识"**：
   - 拜登政府明确放弃旧华盛顿共识（自由化、私有化）；
   - 转向产业政策 + 友岸外包 + 国家投资 + 工人保护；
4. **国家主义理论的再确认**：
   - 学界对国家在发展、安全、技术中作用的重视上升；
   - Mariana Mazzucato《企业家的国家》等成为新一波国家主义代表作。

**八、对中国研究的意义**

1. **解释中国奇迹**：
   - 强国家 + 嵌入式自主性 + 渐进改革 + 实验创新 + 长期规划；
   - 中国是国家主义最成功的当代案例；
2. **"举国体制"的延续与升级**：
   - 在芯片、AI、新能源、生物医药等关键技术领域；
   - 但需平衡自主创新与开放合作；
3. **国家治理现代化**：
   - 提升国家能力的现代化（数字治理、信用体系、应急管理）；
   - 同时推进法治化与有限政府；
4. **共同富裕与再分配**：
   - 国家在再分配中的主导作用；
   - 防止资本主导和社会分化；
5. **挑战**：
   - 防止国家自主性走向官僚专断；
   - 平衡国家与市场、国家与社会；
   - 避免"诺思悖论"的负面后果。

**九、理论结论**

国家主义理论是**对国家在政治经济发展中独立作用的系统化论证**，是 20 世纪后期 IPE 与比较政治经济学的重大成就。其核心命题——国家自主性、国家能力、嵌入式自主性、发展型国家——为理解东亚奇迹、当代产业政策回归、中国式现代化提供了重要理论框架。其局限在于国家概念笼统、自主性来源说明不足、东亚经验复制性问题等。21 世纪国家主义理论需要回应全球化、数字化、气候变化等新挑战，并在中国式现代化、新华盛顿共识等新经验中持续丰富自身。对中国而言，国家主义不是"过时理论"而是**理解中国发展模式与未来路径的重要工具**（参见 Skocpol 1979；Krasner 1978；Evans 1995；Tilly 1990；Mann 1986—1993；Mazzucato 2013；田野第七章；杨光斌《政治学导论》）。

### 22. 运用所学 IPE 理论分析中国的自主创新政策【模拟-11】

自主创新政策是中国 21 世纪以来推动科技与产业升级的核心战略，集中体现了国家主义、发展型国家、产业政策的中国式实践。

**一、政策演进**

1. **2006 年《国家中长期科学和技术发展规划纲要（2006—2020）》**：
   - 首次系统提出"自主创新"战略，确立 16 个重大科技专项；
   - 目标：到 2020 年研发投入占 GDP 2.5%，进入创新型国家行列；
2. **2010 年战略性新兴产业政策**：节能环保、新一代信息技术、生物、高端装备、新能源、新材料、新能源汽车七大产业；
3. **2015 年《中国制造 2025》**：聚焦十大重点领域，目标 2025 年迈入制造强国行列；
4. **2016 年国家创新驱动发展战略纲要**：到 2020 创新型国家、2030 创新型国家前列、2050 世界科技强国；
5. **2020 年"双循环"战略 + "卡脖子"专项攻关**：核心技术自主可控；
6. **2022 年党的二十大**："高水平科技自立自强"成为核心战略；
7. **2023—2024 年新质生产力**：AI、新能源、生物制造、低空经济等新领域。

**二、政策内容**

1. **顶层规划**：
   - 五年规划、中长期规划、重大专项；
   - 国家重大科技基础设施（FAST、上海光源、量子卫星）；
2. **财政投入**：
   - 研发投入持续增长，2023 年达 3.3 万亿元（GDP 占比 2.65%）；
   - 公共研发资金占总研发约 20%，企业研发占主体；
3. **国家实验室体系**：
   - 国家实验室 + 国家重点实验室 + 新型研发机构；
4. **金融支持**：
   - 政府引导基金（科创基金、半导体基金）；
   - 科创板、北交所支持创新企业 IPO；
   - 信贷优惠、税收优惠；
5. **产业政策**：
   - 战略新兴产业目录、产业基金、补贴；
   - "揭榜挂帅""赛马"等新型攻关机制；
6. **人才战略**：
   - 海归人才计划（千人计划、青年千人）；
   - 国内高校"双一流"建设；
   - 科技教育投入大幅增加；
7. **国际合作**：
   - 中外联合实验室；
   - 国际大科学计划参与（ITER、SKA）；
   - 一带一路科技合作；
8. **保护性政策**：
   - 数据安全法、个人信息保护法；
   - 关键技术出口管制（稀土、镓、锗）；
   - 国家安全审查机制。

**三、理论分析**

**1. 国家主义 / 发展型国家视角**：
- 体现"嵌入式自主性"——国家与企业紧密但不被俘获；
- 通过五年规划 + 重大专项 + 金融支持 + 政策引导构建"中国式发展型国家"；
- 与日本通产省、韩国经济企划院模式相承又有所不同（中国规模更大、市场更复杂、政治体制不同）。

**2. 产业政策理论**：
- **市场失灵补正**：基础研究、共性技术、风险投资具公共物品属性，市场供给不足，需国家介入；
- **幼稚产业保护**（李斯特）：对处于追赶阶段的关键产业提供保护与扶持；
- **赶超战略**（格申克龙）：后发国家可通过国家主导加快追赶；
- **创新生态系统**（Etzkowitz 三螺旋）：政府—产业—大学三者协同。

**3. 结构性权力视角**（Strange）：
- 自主创新是中国构建生产结构、知识结构权力的核心战略；
- 突破"卡脖子"是争夺生产结构主导权的关键；
- 标准制定、专利布局、关键平台主导是知识结构建设。

**4. 路径依赖与制度变迁**：
- 中国创新政策呈现强路径依赖：从改革开放初的"引进吸收消化再创新"到自主创新的渐进过渡；
- 关键节点（中美贸易战）加速了从"开放合作"向"自主可控"的转向。

**5. 颠倒的第二意象**：
- 外部压力（特别是美国技术封锁）回溯塑造中国创新政策；
- 倒逼自主可控、产业链安全、技术主权意识。

**四、成就与突破**

1. **总量指标**：
   - 研发投入跃居世界第二（仅次美国）；
   - 国际科技论文产出超过美国（2022）；
   - PCT 国际专利申请数全球第一；
2. **特定领域领先**：
   - 5G（华为）、量子通信（潘建伟团队）、超级计算（神威·太湖之光）、高铁、特高压输电、北斗导航；
3. **新兴产业**：
   - 新能源汽车（比亚迪、宁德时代）、太阳能（隆基、晶澳）、风电、生物技术；
4. **平台与基础设施**：
   - FAST 射电望远镜、量子卫星、中国空间站、嫦娥探月、天问火星；
5. **创新生态**：
   - 深圳、杭州、合肥等创新型城市崛起；
   - 阿里、腾讯、字节、华为等新一代企业；
   - 风险投资生态发展。

**五、挑战与困境**

1. **关键技术"卡脖子"**：
   - 高端芯片（先进制程）、光刻机、EDA 工具、高端材料、生物医药关键原料；
   - 美国出口管制 + 实体清单形成严密封锁；
2. **基础研究薄弱**：
   - 原创性基础研究相对欧美仍有差距；
   - 顶尖期刊论文质量、诺奖级成果偏少；
3. **科研评价体系问题**：
   - 论文导向 → 不利原创；
   - "破五唯"改革效果待观察；
4. **国际合作受阻**：
   - 美国对中国留学生、学者限制；
   - 部分国际科技合作中断；
5. **市场扭曲风险**：
   - 政府引导基金可能造成产能过剩（光伏曾出现）；
   - 补贴政策易被骗补、寻租；
6. **创新人才结构**：
   - 海归回国速度放缓；
   - 国内顶尖人才仍流失；
7. **知识产权与商业秘密保护**：
   - 部分领域知识产权保护仍待加强；
   - 跨国公司对中国创新环境信心不足；
8. **军民融合管理**：
   - 军用与民用技术界限模糊带来出口管制困境。

**六、政策建议**

1. **加强基础研究**：
   - 提高基础研究占比（目标 10%+，目前约 6.5%）；
   - 长期稳定支持自由探索；
   - 改革科研评价体系，鼓励原创；
2. **完善创新生态**：
   - 加强企业主体地位（华为研发模式经验）；
   - 提升风险投资生态；
   - 强化产学研合作；
3. **开放合作**：
   - 不"脱钩"，继续推动国际科技合作；
   - 主动参与全球科技治理；
   - 吸引国际顶尖人才；
4. **产业政策优化**：
   - 从"补贴 + 选择性扶持"向"营商环境 + 公平竞争 + 制度型支持"转变；
   - 避免过度补贴扭曲市场；
   - 引入第三方评估机制；
5. **应对外部封锁**：
   - 集中力量突破"卡脖子"；
   - 备份替代方案（如 RISC-V vs ARM、华为鸿蒙 vs 安卓）；
   - 多元化供应链；
6. **法治化保障**：
   - 加强知识产权保护；
   - 完善数据治理框架；
   - 提供稳定可预期的制度环境。

**七、对全球科技治理的影响**

1. **多极化**：中国创新崛起推动全球科技治理多极化；
2. **规则竞争**：5G、AI、数据治理等领域规则竞争加剧；
3. **跨境合作模式变化**：从"全球协作"转向"集团式合作"（美欧 vs 中俄等）；
4. **新兴技术国际治理**：AI、生物技术、量子等新兴技术治理框架尚未形成；
5. **中国规则贡献**：通过 ITU、ISO、IEC 等推动技术标准。

**八、理论结论**

中国自主创新政策是**国家主义、发展型国家、产业政策**的当代典范。其成就证明了在适当条件下国家主导的创新追赶可行；其挑战也表明在高端、原创、基础研究领域仅靠国家投入不够，需要**开放生态 + 法治环境 + 市场活力 + 长期主义**的综合配套。展望未来，中国自主创新将进入"突破—巩固—引领"三位一体阶段，是中国式现代化的核心动力，也是 21 世纪全球科技治理的关键变量（参见 Evans 1995；Mazzucato《企业家的国家》《使命经济》；田野第七章；中国科技部、国务院发展研究中心相关报告）。

### 23. 评析霸权稳定理论【模拟-12】

霸权稳定理论（Hegemonic Stability Theory, HST）是 20 世纪 70 年代以来 IPE 的核心理论之一，由 Charles Kindleberger 首创、Stephen Krasner 与 Robert Gilpin 系统化。

**一、理论核心命题**

1. **基本命题**：稳定的开放国际经济体系要求一个**霸权国**提供并维护必要的国际公共物品；
2. **机制**：霸权国具有提供公共物品的能力和意愿（其单方收益足够大）；
3. **推论**：霸权强 → 公共物品供给充足 → 体系稳定；霸权衰 → 公共物品供给不足 → 体系不稳；
4. **历史经验**：19 世纪英国霸权下的金本位 + 自由贸易；1945 年后美国霸权下的布雷顿森林 + GATT；两次大战间霸权真空 + 大萧条。

**二、理论谱系**

1. **金德尔伯格"领导论"**：
   - 《1929—1939 年的世界经济萧条》（1973）；
   - 五大公共物品：开放市场、稳定汇率、最后贷款人、反周期长期贷款、政策协调；
2. **克拉斯纳"霸权与机制"**：
   - 《国家权力与国际贸易结构》（1976）；
   - 把霸权与国际机制（regimes）连接，霸权产生机制；
3. **吉尔平"霸权周期"**：
   - 《国际关系政治经济学》（1987）；
   - 霸权周期分四阶段：兴起—成熟—衰落—更替；
   - 霸权战争是更替的常见机制；
4. **基欧汉的修正**：
   - 《霸权之后》（1984）；
   - 同意 HST 对兴起的解释，但论证制度具有黏性，霸权衰退后仍可维持合作；
5. **Modelski-Thompson 长波霸权周期**：
   - 约 100—120 年的全球霸权周期；
   - 与康德拉季耶夫长波叠加。

**三、理论评价：优点**

1. **解释力**：
   - 解释 19 世纪英国主导下的自由贸易兴起与崩溃；
   - 解释 1930 年代大萧条的全球扩散；
   - 解释 1945 年后美国主导的开放秩序建立；
2. **整合视野**：
   - 把权力、合作、制度统一在一个框架；
   - 跨越自由主义—现实主义鸿沟；
3. **政策启示明确**：
   - 强调霸权国对国际公共物品的责任；
   - 警告霸权衰退的体系风险；
4. **历史厚度**：
   - 跨越数百年历史比较；
   - 与世界体系论、长波论对话；
5. **方法论严谨**：
   - 提供可证伪的命题（公共物品供给与霸权强度正相关）；

**四、理论评价：批评与局限**

1. **概念问题**：
   - **霸权定义模糊**：能力指标、政策意愿、合法性如何综合衡量？
   - **公共物品定义争议**：哪些算公共物品？谁的公共物品？
   - **稳定 vs 开放**：稳定与开放并非同义，可能存在"封闭稳定"；
2. **历史反例**：
   - **英国实际并非自由贸易绝对推动者**：英国自由贸易主要服务于其工业优势；
   - **美国战后开放部分是冷战需要**：对苏联阵营开放并不重要；
   - **霸权下也有保护主义**：英国 19 世纪末转向保护主义、美国 1971 后多次推保护主义；
3. **基欧汉的逻辑反驳**：
   - 制度具有黏性，霸权衰退后合作仍可维持；
   - 例：1980 年代美国相对衰退但 GATT/WTO 仍持续；
4. **现实主义反驳（米尔斯海默）**：
   - 霸权稳定假定霸权国"慷慨"，但大国总追求权力最大化；
   - 实际上霸权国更倾向于剥削而非提供公共物品；
5. **批判 IPE 反驳（考克斯）**：
   - HST 是为"霸权秩序"辩护的"问题解决理论"；
   - 忽视霸权秩序的剥削、压迫、不平等维度；
6. **集体行动困境的解释力**：
   - 公共物品也可由小集团联合提供（K-集团理论 Snidal）；
   - 非霸权情况下也可能维持合作；
7. **对崛起国挑战的解释不足**：
   - 中国崛起背景下既有霸权秩序如何调整？
   - HST 暗含"霸权更替"逻辑（吉尔平"霸权战争"）但可能过度悲观。

**五、当代演变与挑战**

1. **美国相对衰退**：
   - 1970 年代起 GDP 占世界比重下降；
   - 但绝对地位仍主导；
2. **新兴大国崛起**：
   - 中国成为第二大经济体；
   - 印度、巴西等也在上升；
3. **公共物品供给真空**：
   - 美国"退群"（巴黎协定、伊核协议、TPP）；
   - WTO 上诉机构瘫痪；
   - 气候、卫生、AI 治理供给不足；
4. **多元供给者**：
   - 中国通过 AIIB、BRI、新开发银行补位；
   - 欧盟通过 GDPR、CBAM 等规则供给；
   - 区域机制（RCEP、CPTPP、ASEAN）兴起；
5. **"金德尔伯格陷阱"再讨论**：
   - 约瑟夫·奈担忧崛起国不愿、守成国不能 → 公共物品供给真空；
   - 但中国实际上是积极的公共物品供给者；
6. **多极化下的秩序问题**：
   - 没有单一霸权的秩序如何维系？
   - 是否需要从"霸权稳定"过渡到"协作稳定"？

**六、对中国研究的意义**

1. **中国崛起的理论挑战**：
   - 中国不寻求霸权但希望参与秩序塑造；
   - 中国式制度供给（AIIB、BRI、人类命运共同体）；
2. **"和平崛起 / 和平发展"**：
   - 不重复 19—20 世纪霸权战争模式；
   - 通过既有秩序内崛起 + 补充性制度供给；
3. **国际公共物品的中国贡献**：
   - 蓝盔部队、防扩散合作、气候承诺、卫生援助、债务减免；
   - 全球发展、安全、文明三大倡议；
4. **多极化与协作稳定**：
   - 中国主张多边主义、多极化、协商共治；
   - 反对单一霸权及其衍生的对抗逻辑。

**七、HST 的当代修正**

1. **协作霸权（Snidal）**：
   - 公共物品可由 K-集团（几个大国）联合提供；
   - 不需单一霸权；
2. **嵌入式霸权（Ikenberry）**：
   - 霸权通过制度化、自我约束、可信承诺维持；
   - 即使权力衰退，制度仍维系秩序；
3. **多边主义补充霸权**：
   - 国际制度 + 多边机制承担部分公共物品供给；
4. **网络化治理**：
   - 国家 + 国际组织 + 跨国行为体 + 区域机制共同治理；
   - 非"金字塔"而是"网络化"全球治理。

**八、理论结论**

霸权稳定理论是 IPE 历史上最具影响的理论之一，其核心洞见——**公共物品、领导责任、霸权周期**——至今仍具解释力。其局限——霸权定义模糊、历史反例、批判视角缺位、对崛起国研究不足——也促使理论持续修正。21 世纪全球治理已进入"后单一霸权"时代，需要发展**多极协作型 + 制度化 + 网络化**的新治理理论。HST 的遗产是提醒我们：**全球公共物品的稳定供给永远是稀缺的、需要被刻意维护的**——无论是通过霸权、制度还是协作。中国作为重要新兴大国，应在全球公共物品供给中承担与其能力相称的责任，与其他主要经济体共同维护开放、包容、可持续的国际秩序（参见 Kindleberger 1973；Krasner 1976；Gilpin 1987；Keohane 1984；Ikenberry 2001；田野第四章；约瑟夫·奈关于"金德尔伯格陷阱"的讨论）。

### 24. 运用所学 IPE 理论分析贸易保护主义产生的国内政治根源【模拟-12】

贸易保护主义周期性兴起是 IPE 的核心议题之一。其产生的国内政治根源涉及多重理论框架。

**一、保护主义的历史周期**

历史上贸易保护主义经历多个高潮：
1. **17—18 世纪重商主义时期**：高关税 + 殖民垄断；
2. **19 世纪后期**：1873 经济萧条后欧美普遍提高关税；
3. **1930 年代大萧条**：斯姆特-霍利法案 + 关税战 + 帝国特惠制；
4. **1970—80 年代**：日本贸易摩擦、自愿出口限制、新保护主义；
5. **2008 年危机后**：贸易救济措施激增；
6. **2017 年以来**：特朗普"美国优先"+ 全球贸易战 + 拜登"新华盛顿共识"。

每次保护主义高潮都有特定的国内政治根源。

**二、社会联盟视角（Rogowski/Hiscox）**

1. **要素丰裕度 + 流动性**决定贸易冲击下的政治分化：
   - 高要素流动 → 阶级联盟（资本 vs 劳动）；
   - 低要素流动 → 部门联盟（出口部门 vs 进口竞争部门）；
2. **当代发达国家保护主义的根源**：
   - 资本丰裕但劳动稀缺 → 自由贸易使劳动受损；
   - 制造业空心化、铁锈带衰退 → 形成反全球化联盟；
   - 受冲击群体规模有限但地理集中、政治高效；
3. **发展中国家保护主义的根源**：
   - 进口替代时期保护本地工业资本与城市消费者；
   - 农业部门在贸易开放中可能受冲击。

**三、保护待售模型（Grossman-Helpman 1994）**

1. **核心命题**：政府目标函数 = 社会福利 + 政治献金加权和；
2. **政治均衡**：
   - 组织化产业（行业协会、大企业、工会）获得高保护；
   - 进口需求弹性低、进口渗透率高的产业更易获保护；
3. **经验解释力强**：
   - 美国农业、糖业、钢铁、汽车保护程度高于市场均衡；
   - 印度、巴西、墨西哥制造业保护呈现类似模式；
4. **对当代美国保护主义的解释**：
   - 农业利益集团（玉米、大豆、糖、乳制品）；
   - 制造业（钢铁、铝、电池、半导体）；
   - 工会（汽车、钢铁工人联合会）；
   - 都成为保护主义政策的主要受益者与游说者。

**四、寻租视角（Krueger / Bhagwati）**

1. 保护政策创造"租金"（受保护行业的超额利润）；
2. 行业利益集团有动机投入资源争取保护（寻租）；
3. **集体行动逻辑**（奥尔森）：
   - 受益方少而集中 → 易组织；
   - 受损方（消费者、出口部门、纳税人）多而分散 → 难组织；
4. **巴格瓦蒂的 DUP 理论**：
   - 直接非生产性逐利活动（DUP）造成社会福利损失；
   - 保护主义不仅是分配问题，更是效率问题。

**五、政治制度视角**

1. **选举制度**：
   - 多数制下议员对选区利益（特别是地方制造业）高度敏感 → 更易支持保护；
   - 比例代表制下保护倾向相对弱化（但农业利益集团仍强）；
2. **政府类型**：
   - 总统制 + 国会强干预 → 易陷入保护游说政治（美国）；
   - 议会制 + 行政主导 → 决策更整体性（欧洲）；
3. **联邦制 vs 单一制**：
   - 联邦制下地方利益更易反映到中央政策；
   - 单一制下中央协调能力更强；
4. **政党体制**：
   - 两党制下政党争夺中间选民可能转向保护主义议程；
   - 多党制下保护主义诉求被分散到不同政党。

**六、"颠倒的第二意象"视角（Gourevitch）**

1. **国际冲击 → 国内重组**：
   - 1930 大萧条 → 美国新政 + 高关税 + 罗斯福联盟；
   - "China Shock" → 美国铁锈带衰退 → 民粹主义 + 特朗普现象；
   - 新冠疫情 → 供应链安全焦虑 → 经济安全优先；
2. **国际制度的回溯影响**：
   - WTO 入世推动中国国内改革；
   - 但发达国家国内对 WTO 的反弹也加剧（保护主义、单边主义）。

**七、Rodrik"超级全球化三难"视角**

1. 深度全球化、民族国家、民主政治三者不可兼得；
2. 当深度全球化与民主政治冲突时，民主可能选择限制全球化；
3. 保护主义是民主政治对全球化的"反弹"形式；
4. **解决路径**：温和全球化 + 国内政策空间扩展。

**八、当代特殊根源**

1. **不平等加剧**：
   - 全球化收益高度集中（金融、科技、跨国公司）；
   - 损失广泛分散（制造业工人、传统产业）；
   - 收入与财富不平等推动反全球化政治；
2. **经济安全意识上升**：
   - 关键技术、关键矿产、医疗物资、能源、粮食的安全焦虑；
   - 推动产业政策回归、关键产业本土化；
3. **地缘政治化**：
   - 中美博弈 + 俄乌战争 → 经济议题被安全化；
   - "去风险化"、"友岸外包"、"近岸外包"成为新型保护主义形式；
4. **新型保护工具**：
   - 出口管制（半导体、AI）；
   - 投资审查（CFIUS、EU 外资审查）；
   - 数据本地化要求；
   - 补贴竞争（CHIPS 法案、通胀削减法案）；
5. **意识形态变迁**：
   - 新自由主义共识瓦解；
   - 国家主义、产业政策、工人保护重新合法化。

**九、保护主义的政治后果**

1. **国际**：
   - 贸易摩擦升级；
   - 全球价值链重组；
   - 多边贸易体制弱化；
2. **国内**：
   - 短期保护特定行业；
   - 但抬升消费者价格、损害出口部门、降低长期效率；
   - 易引发寻租政治、制度僵化；
3. **政治反弹**：
   - 受损部门（出口商、消费者）反向游说；
   - 保护政策可能反复（如美国关税政策频繁调整）。

**十、对中国意涵**

1. **中国是保护主义主要目标**：
   - 美国对华关税、出口管制、投资限制；
   - 欧盟反补贴调查（电动车）；
   - 印度、印尼对中国商品的反倾销；
2. **中国应对**：
   - 维护多边贸易体制；
   - 推动 RCEP、CPTPP、DEPA 等区域合作；
   - 反制美国关税与出口管制；
   - 扩大内需 + 双循环；
   - 推动产业升级以应对低端产业转移；
3. **避免对等保护陷阱**：
   - 不全面闭关，保持高水平开放；
   - 选择性反制、不扩大化；
   - 推动公平贸易规则。

**十一、政策建议**

1. **国际层面**：
   - 维护 WTO 核心地位、推动改革；
   - 反对单边主义、保护主义；
   - 加强国际规则供给（数字贸易、绿色贸易、可持续渔业补贴）；
2. **国内层面**：
   - 配套再分配 + 再培训 + 社会保障；
   - 减少全球化输家政治反弹基础；
   - 产业升级配套，化解低端产业转移压力；
3. **跨议题**：
   - 加强国际宏观协调；
   - 应对气候、卫生、AI 等新议题需要全球合作而非保护主义。

**十二、理论结论**

贸易保护主义的国内政治根源是**社会联盟分化 + 利益集团寻租 + 政治制度过滤 + 国际冲击回溯 + 意识形态变迁**多重因素的综合产物。其当代特点是**经济安全化 + 地缘政治化 + 不平等驱动**。应对保护主义需要在**国际规则维护、国内再分配配套、产业升级、多边合作**多个层面综合施策。中国作为开放型经济体，应坚持高水平开放，同时通过国内政策化解全球化政治压力，避免陷入西方"贸易冲击 → 民粹反弹 → 保护主义"的负反馈循环（参见 Rogowski 1989；Grossman-Helpman 1994；Hiscox 2002；Rodrik 2011；田野第六章；宋新宁/陈岳第三章）。

### 25. 评析世界体系理论【模拟-13】

世界体系理论（World System Theory）由沃勒斯坦（Wallerstein, 1930—2019）创立，是 20 世纪后期最具影响力的宏观社会理论之一。其代表作《现代世界体系》四卷本（1974—2011）以及《世界体系分析导论》（2004）。

**一、理论核心命题**

1. **世界体系是分析单位**：
   - 突破民族国家分析框架，把"世界"作为分析单位；
   - 现代世界体系起源于 16 世纪欧洲资本主义扩张；
2. **资本主义的世界—经济性质**：
   - 现代世界体系本质是**单一资本主义世界—经济 + 多元政治权威（民族国家体系）**；
   - 与古代世界帝国（单一政治权威）形成对比；
3. **三层不平等分工**：
   - **中心**：高技术、高资本密度、自由劳动、强国家；
   - **半边缘**：中等技术、混合劳动、中等国家、起缓冲作用；
   - **边缘**：低技术、原料 / 劳动密集、强制 / 半强制劳动、弱国家；
   - 三层之间存在不平等交换与剩余转移；
4. **霸权周期**：
   - 历史上三个霸权周期：荷兰（17 世纪）—英国（19 世纪）—美国（20 世纪）；
   - 每个霸权先后在生产、商业、金融三个领域取得领先；
5. **康德拉季耶夫长波**：
   - 内嵌于世界体系，约 50—60 年；
   - A 段扩张、B 段收缩；
6. **不可逆扩张**：
   - 16 世纪起持续扩张，19 世纪末已吞并所有"外部地区"；
7. **结构性危机**：
   - 沃勒斯坦晚年判断当代体系已进入结构性过渡阶段（金融化、利润率下降、生态危机）。

**二、理论谱系与发展**

1. **直接前史**：
   - 布罗代尔年鉴学派"长时段 + 世界经济"概念；
   - 拉美依附论（弗兰克、卡多佐、Furtado、Amin）；
   - 普雷维什 "中心—外围 + 贸易条件恶化论"；
   - 马克思列宁帝国主义论；
2. **沃勒斯坦的综合**：
   - 把上述传统融合为系统性宏大理论；
3. **重要扩展**：
   - **Giovanni Arrighi**《漫长的 20 世纪》：把霸权周期与资本积累系统化为"系统性资本积累周期"；
   - **Andre Gunder Frank 后期**《白银资本》：重新评估东方在前现代世界经济中的地位；
   - **Christopher Chase-Dunn**：把世界体系论与定量分析、计算机模型结合；
   - **Janet Abu-Lughod**《在欧洲霸权之前》：研究 13 世纪世界体系；
   - **John Hobson**《西方文明的东方起源》：质疑欧洲中心主义；
4. **当代延伸**：
   - 全球价值链（GVC）与全球生产网络（GPN）研究继承"商品链"概念；
   - 半边缘上升（中国、印度、巴西崛起）促进新研究；
   - 气候危机、AI 革命的世界体系含义。

**三、理论评价：优点**

1. **宏观视野**：
   - 把世界 500 年发展整合在统一理论框架；
   - 揭示长时段结构与长期不平等；
2. **对依附论的超越**：
   - 引入"半边缘"概念，解决依附论解释半边缘上升的困难；
   - 把分析单位从民族国家提升到世界体系；
3. **多学科综合**：
   - 整合历史学、经济学、社会学、政治学；
   - 与年鉴学派、马克思主义、依附论对话；
4. **对全球不平等的解释力**：
   - 解释为何 200 年来全球不平等持续；
   - 不发达不是滞后而是被持续汲取的结果；
5. **批判取向**：
   - 揭示资本主义世界体系的剥削、压迫、危机本质；
   - 为反体系运动提供智识支撑；
6. **对当代理论的启发**：
   - 全球价值链、半边缘上升、气候正义、跨国资本主义研究都受其影响。

**四、理论评价：批评与局限**

1. **过度决定论**：
   - 把结构强调到几乎否定行为者能动性；
   - 难以解释半边缘国家（中国、印度、巴西）的崛起；
   - 国家选择空间被低估；
2. **经济决定论倾向**：
   - 把资本主义视为单一决定力量；
   - 政治、文化、意识形态被简化为经济附属；
3. **欧洲中心主义批评（悖论性）**：
   - 虽然批评欧洲中心主义，但其框架仍以欧洲资本主义扩张为起点；
   - Hobson、Frank 后期对此有批评；
4. **概念操作化困难**：
   - 中心、半边缘、边缘三层分类标准不一致（生产、贸易、金融、政治、社会指标可能给出不同分类）；
   - 半边缘概念尤其模糊；
5. **历史争议**：
   - 16 世纪欧洲资本主义起源说被质疑（中国、伊斯兰世界已有发达商业网络）；
   - 长波周期的实证基础仍有争议；
6. **对中国崛起的解释不足**：
   - 中国从边缘 → 半边缘 → 接近中心的快速崛起挑战世界体系论"路径锁定"逻辑；
   - 沃勒斯坦晚年承认中国是体系性变量；
7. **新自由主义的批评**：
   - 自由主义经济学家认为世界体系论低估市场效率、夸大剥削；
8. **政策含义模糊**：
   - 若全球资本主义注定剥削、危机，应如何应对？
   - "反体系运动"具体内容不明；
9. **缺乏微观基础**：
   - 宏观结构分析未充分嵌入微观行为者；
   - 与博弈论、理性选择理论对话不足。

**五、当代演变**

1. **半边缘上升的挑战**：
   - 中国、印度、巴西、南非、墨西哥、土耳其、印尼等迅速发展；
   - 部分国家（特别是中国）显示出"突破半边缘锁定"的可能；
2. **金融化的全球扩展**：
   - 沃勒斯坦后期判断当代体系处于"金融化"阶段，预示霸权衰退；
   - 2008 危机后这一判断得到部分印证；
3. **气候危机与生态边界**：
   - 资本主义无限扩张遭遇地球生态边界；
   - 这是世界体系论"内部矛盾"的新表现；
4. **数字资本主义**：
   - 平台经济、数据资本、AI 创造新的中心—外围关系；
   - "数字殖民"成为新议题；
5. **中国崛起的体系含义**：
   - 中国能否实现"非依附性发展"？
   - 中国崛起会否带来体系性转型？
   - 沃勒斯坦的悲观论与中国的成长是否构成结构性矛盾？

**六、对中国研究的意义**

1. **理解中国融入与超越**：
   - 中国通过加入全球价值链 + 自主创新 + 国家主导 + 制度供给，正在重塑半边缘上升路径；
   - 但仍面临高端被锁定（半导体、关键技术）压力；
2. **应对"中心—外围"再生产**：
   - 中国一带一路、新开发银行等可能扮演新的中心角色，但也面临"重复中心—外围"的风险；
   - 需要新型南南合作模式；
3. **全球价值链中的位置升级**：
   - 从加工组装 → 设计 → 品牌 → 生态主导；
   - 微笑曲线两端攀升；
4. **生态文明的体系含义**：
   - 中国提出生态文明、双碳目标，可能成为后碳资本主义的探索者；
5. **挑战"结构锁定"的实证案例**：
   - 中国证明了在世界体系内可通过策略性国家行动实现快速上升；
   - 对世界体系论的悲观决定论构成挑战。

**七、理论结论**

世界体系理论是 20 世纪后期最雄心勃勃、最具批判性的 IPE 理论之一。其核心贡献——**把世界作为分析单位、揭示长时段结构性不平等、整合霸权周期与长波**——至今具有重要价值。其局限——决定论倾向、概念模糊、对半边缘上升解释不足——也促使理论持续修正。21 世纪全球资本主义面临深刻转型：金融化、气候危机、技术革命、半边缘崛起、霸权调整——所有这些都需要在世界体系视野下重新理解。对中国研究而言，世界体系论既是**警示**（避免被锁定在半边缘）也是**机遇**（在体系转型中实现位置升级）。理论与现实的对话将继续推动 IPE 研究的深化（参见 Wallerstein 1974—2011；Arrighi 1994；Frank 1998；王正毅；宋新宁/陈岳第六章）。

### 26. 运用所学 IPE 理论分析中国的能源安全问题【模拟-13】

中国能源安全是国家安全、经济发展、外交战略的核心议题。其复杂性涉及供给、价格、运输、转型、地缘政治等多维度。

**一、能源安全的内涵**

1. **传统能源安全**：
   - **供给安全**：能源供应不被中断；
   - **价格安全**：能源价格可承受、不大幅波动；
   - **运输安全**：进口运输通道不被切断；
2. **现代能源安全**：
   - **结构安全**：能源结构多元化、可持续；
   - **技术安全**：能源技术自主可控；
   - **转型安全**：能源转型过程不引发系统性风险；
   - **气候安全**：能源活动不引发不可逆气候风险。

**二、中国能源现状**

1. **能源结构**（2023）：
   - 煤炭占一次能源 55.3%；
   - 石油 18.0%；
   - 天然气 8.5%；
   - 非化石能源 17.2%（水电、风电、太阳能、核电、生物质）；
2. **对外依存度**：
   - **石油** 72%（2023）——居高不下；
   - **天然气** 42%；
   - **铁矿石** 80%+；
3. **核心进口来源**：
   - 石油：沙特、俄罗斯、伊拉克、安哥拉、阿曼、阿联酋；
   - 天然气：俄罗斯、土库曼斯坦、澳大利亚、卡塔尔、马来西亚；
4. **运输通道**：
   - 海运（约 80% 石油）：马六甲海峡是关键瓶颈（"马六甲困局"）；
   - 陆路：中俄管道、中亚管道、中缅管道、中巴经济走廊。

**三、能源安全的挑战**

1. **传统挑战**：
   - **进口高依存**：石油、天然气大量依赖进口；
   - **价格波动**：国际油价大幅波动影响经济稳定；
   - **运输瓶颈**：马六甲海峡、霍尔木兹海峡、苏伊士运河等战略要冲；
2. **地缘政治挑战**：
   - **中美博弈**：美国海军可能威胁海上能源通道；
   - **中东不稳**：伊朗、沙特、也门冲突影响中东能源供给；
   - **俄乌战争**：俄罗斯能源出口转向中国，但也带来"过度依赖俄罗斯"风险；
   - **"小院高墙"**：美国限制中国获取关键能源技术（如先进核电技术）；
3. **气候转型挑战**：
   - **双碳目标**：2030 碳达峰、2060 碳中和；
   - **煤炭高占比**：转型压力大；
   - **新能源产业升级**：电池、光伏、风电、储能技术持续突破；
4. **国内挑战**：
   - **能源消费仍快速增长**：经济发展 + 城市化 + 工业化；
   - **效率提升压力**：单位 GDP 能耗仍高于发达国家；
   - **新能源消纳**：风光发电波动性 → 电网调节压力；
5. **技术挑战**：
   - 关键技术（先进核电、储能、氢能、智能电网）部分仍依赖国外；
   - "卡脖子"风险。

**四、理论分析**

**1. 结构性权力视角（Strange）**：
- 能源安全是构建中国生产结构、安全结构权力的核心；
- 美国通过中东驻军 + 海军优势 + 美元石油定价构建能源霸权；
- 中国需通过多元化 + 自主技术 + 替代基础设施提升结构性权力。

**2. 公共物品与霸权稳定（金德尔伯格）**：
- 能源体系的稳定（包括航道安全、价格稳定）具公共物品属性；
- 美国海军长期提供这一公共物品；
- 美国相对衰退背景下需要更多国家参与维护。

**3. 复合相互依赖（基欧汉/奈）**：
- 能源贸易使各方相互依赖；
- 敏感性 + 脆弱性双重维度；
- 中国对中东、俄罗斯能源依赖具不同脆弱性特征。

**4. 颠倒的第二意象**：
- 国际能源市场波动 → 国内经济 + 政治调整；
- 1973、1979、2008、2022 等能源危机塑造中国国内能源政策。

**5. 路径依赖**：
- 煤炭基础设施 + 火电体系深度锁定；
- 转型面临路径依赖阻力；
- 但新能源产业 + 电动车 + 智能电网构成新路径。

**6. 国家主义 / 产业政策**：
- 中国能源战略具显著国家主导特征；
- 国家石油公司（三桶油）、国家电网、新能源产业政策；
- 类似日韩发展型国家做法。

**五、应对战略**

**1. 供给多元化**：
- **来源多元**：中东 + 俄罗斯 + 中亚 + 非洲 + 拉美 + 澳大利亚；
- **运输多元**：海运 + 陆路管道 + LNG；
- **储备体系**：战略石油储备 + 商业储备；

**2. 通道安全**：
- **海军建设**：远海护航能力（亚丁湾护航编队、航母编队）；
- **陆路替代**：中俄管道（西伯利亚 1+2）、中亚管道、中缅管道、中巴经济走廊；
- **国际合作**：与沿途国家合作、参与海上反海盗等；

**3. 结构调整**：
- **去煤增气**：天然气替代部分煤炭；
- **大力发展新能源**：光伏 + 风电 + 核电 + 水电 + 储能；
- **电动化**：交通电动化降低石油依赖；
- **氢能**：长期能源转型路径；

**4. 技术自主**：
- **新能源技术**：光伏（隆基、晶澳）、风电（金风、远景）、电池（宁德、比亚迪）全球领先；
- **核电**：华龙一号、第四代核电；
- **储能**：化学储能、抽水蓄能、新型电池；
- **智能电网**：特高压、虚拟电厂、能源互联网；

**5. 国际合作**：
- **能源外交**：上合组织、金砖、阿盟、非盟能源合作；
- **一带一路**：能源基础设施互联互通；
- **气候合作**：参与《巴黎协定》、推动绿色合作；
- **能源金融**：人民币结算、CIPS 应用；

**6. 价格机制**：
- **上海原油期货**：推动人民币原油定价权；
- **天然气、煤炭、电力市场化改革**：理顺价格机制；
- **碳市场**：碳排放权交易体系；

**7. 治理改革**：
- **国家能源局 + 国家发改委**统筹；
- **能源法**修订；
- **新型能源体系**建设；
- **节能减排**：单位 GDP 能耗持续下降；

**8. 应对地缘风险**：
- **避免单一依赖**：俄罗斯、中东都不过度依赖；
- **金融制裁应对**：本币结算、替代支付系统、储备多元；
- **军事威慑**：海军能力建设；
- **外交化解**：与中东国家、俄罗斯保持稳定关系。

**六、双碳目标与能源转型**

1. **2030 碳达峰**：
   - 能源消费总量控制；
   - 煤炭消费稳中有降；
   - 非化石能源占比 25%；
2. **2060 碳中和**：
   - 能源结构根本性变革；
   - 非化石能源占比 80%+；
3. **新型电力系统**：
   - 以新能源为主体；
   - 储能 + 智能电网 + 分布式能源；
4. **绿色金融**：
   - 绿色债券、ESG 投资、转型金融；
5. **新能源产业全球领先**：
   - 中国制造的光伏、风电、电池支撑全球能源转型；
   - 同时面临美欧反补贴、贸易壁垒挑战。

**七、当前重点议题**

1. **俄罗斯能源依赖管理**：
   - 俄乌战争后中俄能源贸易扩大；
   - 需平衡机会与依赖风险；
2. **中东战略管理**：
   - 沙特 + 伊朗 + 阿联酋 + 卡塔尔均是重要伙伴；
   - 中国推动沙伊和解显示外交斡旋能力；
3. **关键矿产安全**：
   - 锂、钴、镍、稀土对新能源至关重要；
   - 美欧争夺关键矿产；
4. **核能复兴**：
   - 第四代核电、小堆、聚变；
5. **氢能与储能产业链**：
   - 长期战略储备；
   - 国际标准竞争。

**八、理论结论**

中国能源安全是**经济发展 + 国家安全 + 气候转型 + 地缘博弈**多维交织的战略议题。其应对需要**供给多元化 + 结构调整 + 技术自主 + 国际合作 + 价格市场化**综合策略。从 IPE 理论看，能源安全是中国构建综合国力、提升国际地位、参与全球治理的关键载体。展望未来，中国能源安全将进入"传统安全 + 转型安全 + 气候安全"三位一体的新阶段，**双碳目标 + 新型能源体系 + 关键矿产 + 数字化转型** 是核心战略方向。中国能源安全成功不仅关乎中国，也关乎全球气候、能源、经济秩序的未来（参见 Strange 1988；Yergin《能源重塑世界》；田野第十章；国家能源局能源蓝皮书系列；翟东升相关研究）。

### 27. 评析贸易和平理论【模拟-14】

贸易和平理论（commercial peace theory）是国际政治经济学中关于"经济相互依赖是否促进和平"这一核心命题的系统研究。其谱系自孟德斯鸠、康德到当代波拉切克、罗斯克兰斯、罗素特—奥尼尔、科普兰，构成自由主义和平论的核心组件。

**一、理论谱系**

1. **思想前史**：
   - 孟德斯鸠《论法的精神》（1748）："商业的自然效果是带来和平"；
   - 康德《永久和平论》（1795）：商业精神、共和宪政、国际联邦三位一体；
   - 19 世纪曼彻斯特学派（Cobden, Bright）：自由贸易必然带来和平；
   - 诺曼·安杰尔《大幻象》（1910）：现代经济相互依赖使战争不可想象（一战证伪此论）；
2. **当代复兴**：
   - 波拉切克（Polachek, 1980）：经验研究开创性贡献；
   - 罗斯克兰斯（Rosecrance, 1986）：贸易国宏观论证；
   - 罗素特—奥尼尔（Russett & Oneal, 2001）：康德三角综合；
   - 科普兰（Copeland, 2015）：贸易预期理论修正；
3. **批判与挑战**：
   - 米尔斯海默（Mearsheimer）：贸易并非和平根本基础；
   - Barbieri：贸易关系可能加剧而非缓和冲突；
   - 武器化相互依赖（Farrell & Newman, 2019）：经济联系可被武器化。

**二、核心命题与机制**

1. **基本命题**：经济相互依赖（特别是贸易）程度提升 → 冲突概率下降；
2. **微观机制**：
   - **机会成本**：冲突会破坏既有贸易，机会成本上升 → 国家更克制；
   - **跨国利益集团**：商业利益集团反对冲突；
   - **信息渠道**：经济联系增加沟通，降低误判；
   - **学习与社会化**：长期合作内化合作偏好；
3. **波拉切克的经验贡献**：
   - 1980 论文运用 1958—1967 双边数据；
   - 贸易翻倍 → 冲突减少约 1/5（弹性 -0.19 至 -0.34）；
4. **罗斯克兰斯的宏观贡献**：
   - 二战后**贸易国 vs 军事—领土国**两条路径；
   - 核武器 + 跨国生产 + 国际制度使贸易国模式占优；
5. **康德三角的综合**：
   - 民主 + 贸易 + 国际组织三位一体；
   - 经验上显著降低冲突；
6. **科普兰的预期修正**：
   - 决定和平的不是当前贸易额，而是**未来贸易预期**；
   - 预期未来贸易将被切断 → 反而可能引发预防性冲突。

**三、理论评价：优点**

1. **理论综合性**：把经济与政治、商业与战争统一在框架内；
2. **经验基础扎实**：大量定量研究支持；
3. **政策启示明确**：推进经济一体化是和平的物质基础；
4. **对国际制度的支撑**：贸易和平为推动 WTO 等多边贸易制度提供理论依据；
5. **解释战后长和平**：战后发达国家间无战争，部分得益于深度经济一体化；
6. **跨议题应用**：从贸易扩展到投资、金融、能源相互依赖。

**四、理论评价：批评与局限**

1. **历史反例**：
   - **1914 一战前**：英德、英俄经济高度互嵌但仍开战；安杰尔《大幻象》被证伪；
   - **当代俄欧能源依赖**：高度互嵌未阻止 2022 俄乌战争；
   - **二战前美日**：经济联系密切但 1941 偷袭珍珠港；
2. **因果方向问题**：
   - 是贸易促进和平还是和平促进贸易？
   - 内生性问题难以解决；
3. **变量选择问题**：
   - "贸易额"作为依赖度指标是否合理？
   - 不对称依赖可能导致不同效果；
   - 战略性产品贸易（能源、关键技术）vs 一般贸易效果不同；
4. **机制疑问**：
   - 商业利益集团是否真的反对冲突？例：一战前德国军工集团鼓动战争；
   - 经济利益与民族主义、安全焦虑相比，权重如何？
5. **科普兰的修正**：
   - 当前贸易额不足以解释，需要预期；
   - 这削弱了"贸易必然带来和平"的简单命题；
6. **武器化相互依赖**（Farrell & Newman）：
   - 经济联系可被武器化（金融制裁、出口管制、技术封锁）；
   - 相互依赖反而成为冲突工具；
7. **不对称依赖**：
   - 不对称依赖可能加剧脆弱方的不安全感；
   - 推动其寻求自主（去依赖、自力更生），增加冲突风险；
8. **范式批评**：
   - 米尔斯海默：经济基础不能改变国家追求权力的本质；
   - 现实主义：贸易和平在多极、安全紧张时期失效；
9. **当代挑战**：
   - 中美贸易战 + 技术脱钩 → 贸易和平基础动摇；
   - 经济议题被安全化 → 贸易合作被战略对抗压制；

**五、不同子理论的对比**

| 理论 | 核心命题 | 政策含义 | 局限 |
|---|---|---|---|
| 波拉切克 | 贸易额 ↑ → 冲突 ↓ | 推进贸易 | 静态、忽略预期 |
| 罗斯克兰斯 | 体系向贸易国倾斜 | 鼓励商业模式 | 战略安全议题适用性弱 |
| 罗素特—奥尼尔 | 民主 + 贸易 + IGO 三角 | 推三角并进 | 民主和平受质疑 |
| 科普兰 | 预期决定 | 维护贸易前景预期 | 预期难度量 |
| 武器化论 | 相互依赖可被武器化 | 警惕脱钩与制裁 | 解构和平基础 |

**六、当代演变与挑战**

1. **全球化退潮**：
   - 2008 后全球贸易增速放缓；
   - 贸易战、技术脱钩、产业回流；
   - 贸易和平物质基础受侵蚀；
2. **武器化相互依赖**：
   - 美国对俄罗斯、伊朗、朝鲜的金融制裁；
   - 对中国的芯片、AI 出口管制；
   - SWIFT 切断、资产冻结；
   - 相互依赖从"合作粘合剂"变为"对抗工具"；
3. **科普兰预期理论的现实印证**：
   - 中国对未来贸易预期下降 → 加快自主创新；
   - 俄罗斯对未来欧洲贸易预期破灭 → 转向亚洲、孤立；
4. **大国战略博弈**：
   - 中美战略竞争 → 贸易和平受压；
   - 但完全脱钩成本巨大，部分领域仍合作；
5. **新型贸易形态**：
   - 数字贸易、服务贸易、跨境数据流；
   - 这些新形态的和平效应仍待研究。

**七、对中国意涵**

1. **维护与发达国家经济相互依赖**：
   - 防止全面脱钩；
   - 在敏感技术领域采取必要自主，但保持广泛领域合作；
2. **管理预期**（科普兰意涵）：
   - 维护贸易前景的可预期性；
   - 避免被解读为"挑战秩序"；
3. **应对武器化风险**：
   - 减少关键依赖（半导体、关键技术）；
   - 多元化结算（人民币、CIPS）；
   - 关键产业自主可控；
4. **推动新型相互依赖**：
   - RCEP、一带一路深化区域合作；
   - 数字、绿色、健康新型相互依赖；
5. **维护和平**：
   - 通过经济合作 + 制度建设 + 外交斡旋；
   - 反对武器化经济相互依赖；
   - 推动建立"经济胁迫反制工具箱"；

**八、政策建议**

1. **多边层面**：
   - 维护 WTO、推进改革；
   - 反对单边制裁、出口管制泛化；
   - 推动"经济胁迫"国际规则；
2. **双边层面**：
   - 与主要伙伴维护经济合作；
   - 建立危机管控机制；
3. **国内层面**：
   - 提升自主能力，减少关键依赖；
   - 加强经济安全治理；
4. **创新机制**：
   - 经济治理 + 安全治理协同；
   - 应对"安全化"挑战。

**九、理论结论**

贸易和平理论是 IPE 与国际安全研究交叉的重要领域，其核心洞见——**经济相互依赖能降低冲突概率**——具有重要解释力和政策启示。但其也面临**历史反例、因果争议、机制疑问、武器化挑战**等局限。21 世纪贸易和平理论需要回应：**①武器化相互依赖；②预期管理；③不对称依赖的脆弱性；④数字时代新型相互依赖**等新议题。对中国而言，贸易和平既是机会（深度参与全球化的和平红利）也是挑战（应对武器化与脱钩压力）。维护和平需要在**贸易合作 + 制度建设 + 危机管控 + 战略克制**多个维度综合发力。理论与现实的对话将继续推动这一研究领域的深化（参见 Polachek 1980；Rosecrance 1986；Russett & Oneal 2001；Copeland 2015；Farrell & Newman 2019；田野第十章；翟东升相关研究）。

### 28. 运用所学 IPE 理论分析中国的粮食安全问题【模拟-14】

粮食安全是中国国家安全的基础组成部分，"国之大者"。其内涵、挑战、政策构成 IPE 国家安全研究的核心议题。

**一、粮食安全的概念**

1. **FAO 1996 年罗马宣言定义**：
   - **可获得性**（availability）：有足够的供给；
   - **可达到性**（accessibility）：物理与经济上可获得；
   - **可利用性**（utilization）：营养与卫生标准达标；
   - **稳定性**（stability）：以上三方面随时间稳定；
2. **中国官方表述**：
   - "确保谷物基本自给、口粮绝对安全"；
   - "把饭碗端在自己手里、装中国粮"；
3. **多维内涵**：
   - 数量安全（吃得饱）；
   - 质量安全（吃得好、吃得安全）；
   - 结构安全（饲料粮 + 油料 + 肉蛋奶）；
   - 战略安全（不被卡脖子）；
   - 可持续安全（耕地、水资源、生态）。

**二、中国粮食现状**

1. **总产量**（2023）：69541 万吨（约 1.39 万亿斤），连续 9 年稳定在 6.5 亿吨以上；
2. **口粮**：稻谷、小麦自给率 100%+；
3. **谷物**：自给率 95%；
4. **大豆**：进口依赖度 84%（2023 进口约 1 亿吨）；
5. **食用植物油**：进口依赖度约 70%；
6. **肉类**：基本自给但饲料粮（玉米、大豆）大量进口；
7. **耕地资源**：18 亿亩耕地红线；
8. **人均粮食**：约 493 公斤/人，超过 FAO 安全线（400 公斤）；
9. **粮食外贸**：进口大于出口，但口粮净出口为正。

**三、粮食安全挑战**

1. **资源约束**：
   - **耕地不足**：人均耕地约 1.4 亩，远低于世界平均 3.5 亩；
   - **水资源紧缺**：北方缺水、农业用水大；
   - **耕地质量**：退化、污染、酸化；
2. **饲料粮依赖**：
   - 中国是世界最大大豆进口国（70% 国际贸易量）；
   - 主要来源：巴西、美国、阿根廷；
   - 用途主要是养殖业（饲料 + 油料）；
3. **国际市场冲击**：
   - 国际粮价波动（俄乌战争 + 干旱 + 通胀）；
   - 出口国限制（俄罗斯、印度限制大米/小麦出口）；
   - 全球价值链断裂；
4. **地缘政治风险**：
   - 中美关系紧张 → 大豆等供给链不确定性；
   - 海运通道安全；
   - "粮食武器化"潜在风险；
5. **气候变化**：
   - 极端天气（干旱、洪涝、台风）频率增加；
   - 长期气温上升 → 部分农作物适宜性变化；
   - 病虫害变化；
6. **结构性挑战**：
   - 农村劳动力老龄化；
   - 城市化进程占用耕地；
   - 小农生产方式效率低；
   - 农业现代化滞后；
7. **质量与生态**：
   - 农药、化肥过量使用；
   - 食品安全事件偶发；
   - 农业面源污染；
8. **种业"卡脖子"**：
   - 部分高端品种依赖国外（玉米、蔬菜种子）；
   - 种业安全是粮食安全基础。

**四、IPE 理论分析**

**1. 国家主义视角**：
- 粮食安全是国家核心利益，需国家主导；
- 中国采取"以国家粮食安全战略 + 国有粮食企业（中粮、中储粮）+ 政策性农业银行 + 储备体系"构建国家主导模式；

**2. 公共物品视角**：
- 粮食安全具部分公共物品属性；
- 政府需弥补市场失灵（如生态、储备、研发）；

**3. 结构性权力视角**（Strange）：
- 全球粮食市场被四大粮商（ABCD：ADM、Bunge、Cargill、Louis Dreyfus）主导；
- 大豆定价、玉米贸易、运输物流均被跨国资本控制；
- 中国通过中粮等国企整合产业链（如收购 Noble Agri、Nidera）提升结构性权力；

**4. 相互依赖与脆弱性**（基欧汉/奈）：
- 大豆等饲料粮对外依赖度高，但可通过多元化降低脆弱性；
- 美国曾通过粮食禁运（1980 对苏联）使用粮食武器，警示意义大；

**5. 国际机制与全球治理**：
- WTO 农业协议、FAO、IFAD 等国际机制；
- 中国是 WTO 农业谈判重要参与方（G-33、特别保障机制）；

**6. 颠倒的第二意象**：
- 国际粮价波动 → 国内通胀压力 → 政策调整；
- 俄乌战争 → 中国加强粮食安全意识；

**7. 国内政治经济**：
- 农业 vs 工业 vs 服务业的资源分配；
- 农村 vs 城市利益平衡；
- 三农政策（农业补贴、农村振兴、农民收入）。

**五、应对战略**

**1. 立足国内**：
- **18 亿亩耕地红线**：严格保护耕地；
- **永久基本农田**：约 15.46 亿亩；
- **高标准农田建设**：到 2030 建成 12 亿亩；
- **黑土地保护工程**；
- **盐碱地综合利用**；
- **耕地占补平衡 + 进出平衡**；

**2. 提升科技**：
- **种业振兴**：南繁硅谷、国家种业实验室、种质资源库；
- **现代农业技术**：数字农业、智慧农业、精准农业；
- **农业机械化**：综合机械化率超过 73%；
- **生物技术**：转基因、基因编辑应用；
- **农业气象服务**；

**3. 优化结构**：
- **稻谷、小麦绝对自给**；
- **大豆扩种**：2023 大豆种植面积创新高；
- **玉米稳产高产**；
- **油料生产**：油菜、花生扩种；
- **新型农产品**：替代蛋白、合成淀粉等前沿探索；

**4. 储备体系**：
- **国家储备**：中央储备 + 地方储备 + 商业储备；
- 储备规模 1 年以上消费量；
- 储备品种多元；
- **轮换机制**：保持新鲜度；

**5. 国际合作（多元化）**：
- **进口来源多元化**：巴西、阿根廷、俄罗斯、澳大利亚、东盟等；
- **海外农业投资**：黑海地区、非洲、东南亚；
- **"农业一带一路"**：技术合作、贸易往来；
- **南南合作**：粮食技术援助；

**6. 全球治理参与**：
- **G20 农业**：推动粮食安全议程；
- **WTO 农业谈判**：维护发展中国家政策空间；
- **FAO**：积极承担国际责任；
- **应急储备**：东盟 + 3 大米紧急储备；

**7. 农村振兴**：
- **三农政策**：减税降费、补贴、新农合、新农保；
- **农业现代化**：合作社、家庭农场、社会化服务；
- **农村基础设施**：水利、道路、电网、互联网；
- **农村人才**：返乡创业、新型职业农民培训；

**8. 食品安全 + 营养**：
- 强化食品安全监管；
- 健康饮食指导；
- 减少食物浪费（餐饮浪费、储运损失）；

**9. 应对地缘风险**：
- **粮食人民币结算**：减少美元依赖；
- **战略储备**：应对极端情景；
- **运输通道**：海运 + 陆运多元；
- **国际话语权**：参与全球粮食治理。

**六、典型案例**

1. **中粮集团国际化**：
   - 2014 年收购 Noble Agri 51% 股权；
   - 2014 年收购 Nidera 51% 股权；
   - 整合后成立 COFCO International；
   - 提升全球粮食供应链话语权；
2. **国家粮食储备**：
   - 中储粮直属库 + 地方储备；
   - 储备规模和品种保密；
3. **海南南繁硅谷**：
   - 全国 70% 以上作物新品种育种；
   - 国家种业基地；
4. **东北黑土地保护**：
   - 重点保护工程；
   - 玉米大豆主产区；
5. **新型大豆扩种**：
   - 振兴大豆产业；
   - 减少对外依赖；

**七、当前重点议题**

1. **大豆战略**：
   - 短期：进口多元化 + 储备；
   - 中期：扩种 + 单产提升；
   - 长期：替代蛋白技术；
2. **种业"卡脖子"**：
   - 突破核心种源；
   - 推动种企做大做强；
   - 完善知识产权保护；
3. **气候变化适应**：
   - 抗逆品种选育；
   - 农业基础设施加强；
   - 农业保险扩展；
4. **新质生产力赋能农业**：
   - 数字农业、AI 育种、合成生物学、垂直农场；

**八、政策评价与建议**

1. **坚持立足国内为主、适度进口**：中国饭碗中国造；
2. **科技兴农**：以种业 + 数字 + 生物技术为核心；
3. **结构优化**：稳口粮 + 扩大豆 + 优结构；
4. **多元开放**：进口来源多元化 + 国际合作；
5. **强化储备 + 应急体系**：应对极端情景；
6. **农村振兴**：解决三农根本问题；
7. **应对气候变化**：长期适应 + 减缓；
8. **全球治理**：参与并塑造全球粮食治理；
9. **法治化**：粮食安全保障法（2024 年实施）。

**九、理论结论**

中国粮食安全是**资源约束 + 结构调整 + 技术突破 + 全球互动 + 治理升级**多维交织的战略议题。从 IPE 理论看，它体现了**国家主义、结构性权力、相互依赖、全球治理**等多重逻辑。其应对需要**立足国内 + 科技兴农 + 多元开放 + 储备应急 + 农村振兴**综合战略。展望未来，中国粮食安全将进入"传统安全 + 结构安全 + 气候安全 + 战略安全"四位一体新阶段，是中国式现代化的根基。粮食安全不仅关乎中国 14 亿人口的吃饭问题，也关乎全球粮食市场稳定与发展中国家粮食权利（参见 Strange 1988；田野第十章；国家粮食和物资储备局相关报告；中国农业政策与中国粮食安全白皮书）。

5. **概念辨析**：敏感性 vs 脆弱性；协作型 vs 协调型博弈；科斯第一 vs 第二定理；自主性 vs 能力；H-O vs 李嘉图-维纳——必须能区分。

</script>
<script>
(function(){
  var md=document.getElementById('md-source').textContent;
  marked.setOptions({gfm:true,breaks:false,headerIds:true,mangle:false});

  requestAnimationFrame(function(){
  document.getElementById('content').innerHTML=marked.parse(md);
  var h1El=document.querySelector('h1');
  if(h1El)document.title=h1El.textContent;

  var content=document.getElementById('content');
  var h3s=content.querySelectorAll('h3');
  var qi=0;

  h3s.forEach(function(h3){
    qi++;
    var h3Id=h3.id||'';

    var item=document.createElement('div');
    item.className='question-item';
    item.dataset.idx=qi;
    if(h3Id)item.id=h3Id;

    var header=document.createElement('div');
    header.className='question-header';

    var num=document.createElement('span');
    num.className='question-num';
    num.textContent=qi;

    var title=document.createElement('span');
    title.className='question-title';
    title.textContent=h3.textContent;

    var arrow=document.createElement('span');
    arrow.className='question-arrow';
    arrow.textContent='\u25B6';

    header.appendChild(num);
    header.appendChild(title);
    header.appendChild(arrow);

    var body=document.createElement('div');
    body.className='question-body';

    var sib=h3.nextElementSibling;
    while(sib&&sib.tagName!=='H2'&&sib.tagName!=='H3'){
      var next=sib.nextElementSibling;
      body.appendChild(sib);
      sib=next;
    }

    item.appendChild(header);
    item.appendChild(body);
    h3.parentNode.replaceChild(item,h3);

    header.addEventListener('click',function(){
      item.classList.toggle('expanded');
    });
  });

  var questions=document.querySelectorAll('.question-item');
  var focusIdx=-1;
  var bodyCache=new Array(questions.length);

  for(var i=0;i<questions.length;i++){
    bodyCache[i]=questions[i].querySelector('.question-body').textContent.toLowerCase();
  }

  function setFocus(idx){
    for(var i=0;i<questions.length;i++)questions[i].classList.remove('focused');
    if(idx<0||idx>=questions.length)return;
    focusIdx=idx;
    questions[idx].classList.add('focused');
    questions[idx].scrollIntoView({behavior:'smooth',block:'center'});
  }

  function clearFocus(){
    for(var i=0;i<questions.length;i++)questions[i].classList.remove('focused');
    focusIdx=-1;
  }

  var searchInput=document.getElementById('searchInput');
  var searchCount=document.getElementById('searchCount');
  var debounceTimer;

  function doSearch(){
    var query=searchInput.value.trim().toLowerCase();
    var matched=0;

    for(var i=0;i<questions.length;i++){
      var q=questions[i];
      var titleEl=q.querySelector('.question-title');
      var origTitle=titleEl.dataset.orig||titleEl.textContent;
      if(!titleEl.dataset.orig)titleEl.dataset.orig=titleEl.textContent;

      if(!query){
        q.style.display='';
        titleEl.innerHTML=origTitle;
        matched++;
        continue;
      }

      var titleMatch=origTitle.toLowerCase().indexOf(query)!==-1;
      var bodyMatch=bodyCache[i].indexOf(query)!==-1;

      if(titleMatch||bodyMatch){
        q.style.display='';
        matched++;
        if(titleMatch){
          var re=new RegExp('('+query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
          titleEl.innerHTML=origTitle.replace(re,'<mark>$1</mark>');
        }else{
          titleEl.innerHTML=origTitle;
        }
      }else{
        q.style.display='none';
        q.classList.remove('expanded');
        titleEl.innerHTML=origTitle;
      }
    }
    searchCount.textContent=query?matched+' / '+questions.length+' 题':'';
  }

  searchInput.addEventListener('input',function(){
    clearTimeout(debounceTimer);
    debounceTimer=setTimeout(doSearch,150);
  });

  document.getElementById('btnExpandAll').addEventListener('click',function(){
    for(var i=0;i<questions.length;i++)questions[i].classList.add('expanded');
  });
  document.getElementById('btnCollapseAll').addEventListener('click',function(){
    for(var i=0;i<questions.length;i++)questions[i].classList.remove('expanded');
  });

  var backToTop=document.getElementById('backToTop');
  var toolbar=document.getElementById('toolbar');
  var kbdHint=document.getElementById('kbdHint');

  window.addEventListener('scroll',function(){
    var y=window.scrollY;
    backToTop.classList.toggle('visible',y>400);
    toolbar.classList.toggle('scrolled',y>100);
    kbdHint.classList.toggle('visible',y<200);
  },{passive:true});

  backToTop.addEventListener('click',function(){
    window.scrollTo({top:0,behavior:'smooth'});
  });

  kbdHint.classList.add('visible');

  document.addEventListener('keydown',function(e){
    if(document.activeElement===searchInput){
      if(e.key==='Escape'){searchInput.blur();searchInput.value='';doSearch();clearFocus()}
      return;
    }
    if(e.key==='/'){e.preventDefault();searchInput.focus();return}
    if(e.key==='j'||e.key==='J'){setFocus(Math.min(focusIdx+1,questions.length-1));return}
    if(e.key==='k'||e.key==='K'){setFocus(Math.max(focusIdx-1,0));return}
    if(e.key==='Enter'&&focusIdx>=0){questions[focusIdx].classList.toggle('expanded');return}
    if(e.key==='Escape'){clearFocus();return}
    if(e.key==='e'||e.key==='E'){
      var allExp=true;
      for(var i=0;i<questions.length;i++){if(!questions[i].classList.contains('expanded')){allExp=false;break}}
      for(var i=0;i<questions.length;i++){
        if(allExp)questions[i].classList.remove('expanded');
        else questions[i].classList.add('expanded');
      }
    }
  });
  });
})();
</script>
