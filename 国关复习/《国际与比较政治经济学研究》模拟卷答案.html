77\u6d0b\u6cd5\u516c\u7ea6\u754c\u5b9a\u4e13\u5c5e\u7ecf\u6d4e\u533a\u3001\u5916\u7a7a\u6761\u7ea6\u754c\u5b9a\u5916\u7a7a\u4ea7\u6743\u3001\u5df4\u9ece\u6c14\u5019\u534f\u5b9a\u754c\u5b9a\u6392\u653e\u6743\uff1b\n   - \u4ea7\u6743\u6e05\u6670 \u2192 \u51cf\u5c11\u8c08\u5224\u4e0e\u51b2\u7a81\uff1b\u4ea7\u6743\u6a21\u7cca \u2192 \u4e0d\u786e\u5b9a\u4e0e\u51b2\u7a81\uff08\u5357\u6d77\u5212\u754c\u4e89\u7aef\u3001\u5317\u6781\u8d44\u6e90\u3001\u7f51\u7edc\u7a7a\u95f4\uff09\u3002\n4. **\u73af\u5883\u6cbb\u7406\u7684\u79d1\u65af\u89c6\u89d2**\uff1a\n   - \u4eac\u90fd\u8bae\u5b9a\u4e66\u2014\u5df4\u9ece\u534f\u5b9a\u7684\u78b3\u6392\u653e\u4ea4\u6613\uff08ETS\uff09\u662f\u5178\u578b\u79d1\u65af\u5f0f\u89e3\u51b3\u65b9\u6848\uff1a\n     - \u653f\u5e9c\u754c\u5b9a\u6392\u653e\u6743\uff08\u4ea7\u6743\uff09\uff1b\n     - \u5141\u8bb8\u8de8\u4f01\u4e1a\u3001\u8de8\u56fd\u4ea4\u6613\uff08\u5e02\u573a\u8c08\u5224\uff09\uff1b\n     - \u901a\u8fc7\u4ef7\u683c\u673a\u5236\u5c06\u5916\u90e8\u6027\u5185\u90e8\u5316\uff1b\n   - \u4f46\u5176\u524d\u63d0\uff08\u4ea7\u6743\u6e05\u6670 + \u4f4e\u4ea4\u6613\u6210\u672c\uff09\u5728\u591a\u8fb9\u5c42\u9762\u5e38\u88ab\u8fdd\u53cd\uff0c\u5bfc\u81f4\u78b3\u5e02\u573a\u5206\u5272\u4e0e\u76d1\u7ba1\u5957\u5229\u3002\n\n**\u4e09\u3001\u5e94\u7528\u6848\u4f8b\u4e0e\u9650\u5236**\n\n1. **WTO \u4e89\u7aef\u89e3\u51b3\u673a\u5236**\uff1a\u901a\u8fc7\u63d0\u4f9b\u4f4e\u6210\u672c\u3001\u89c4\u5219\u5316\u7684\u7ea0\u7eb7\u89e3\u51b3\u6e20\u9053\uff0c**\u964d\u4f4e\u56fd\u5bb6\u95f4\u8d38\u6613\u6469\u64e6\u7684\u6267\u884c\u4ea4\u6613\u6210\u672c**\u2014\u2014\u662f\u79d1\u65af\u7b2c\u4e8c\u5b9a\u7406\u7684\u6210\u529f\u5e94\u7528\u3002\n2. **\u56fd\u9645\u6e14\u4e1a\u6cbb\u7406**\uff1a\u5965\u65af\u7279\u7f57\u59c6\u628a\u79d1\u65af\u2014\u516c\u5171\u6c60\u5858\u8d44\u6e90\u2014\u591a\u4e2d\u5fc3\u6cbb\u7406\u7ed3\u5408\uff0c\u8bc1\u660e\u672c\u5730\u5316\u4ea7\u6743 + \u4f4e\u4ea4\u6613\u6210\u672c\u80fd\u907f\u514d\"\u516c\u5730\u60b2\u5267\"\u3002\n3. **\u6c14\u5019\u8c08\u5224\u56f0\u5883**\uff1a\u53c2\u4e0e\u65b9\u8fc7\u591a\uff08\u8fd1 200 \u56fd\uff09 \u2192 \u534f\u8c03\u6210\u672c\u5de8\u5927\uff1b\u76d1\u7763\u6267\u884c\u56f0\u96be \u2192 \u9ad8\u4ea4\u6613\u6210\u672c\uff1b\u4ea7\u6743\u754c\u5b9a\u6709\u5f3a\u5206\u914d\u540e\u679c\uff08\u5386\u53f2\u6392\u653e\u8d23\u4efb\uff09\u2192 \u8c08\u5224\u50f5\u5c40\u3002\u8868\u660e\u79d1\u65af\u8def\u5f84\u5728\u5927\u578b\u591a\u8fb9\u573a\u666f\u7684\u5c40\u9650\u3002\n4. **\u91d1\u878d\u8de8\u5883\u76d1\u7ba1**\uff1aBCBS\u3001FSB\u3001IOSCO \u63d0\u4f9b\u76d1\u7ba1\u534f\u8c03\u6846\u67b6\uff0c\u964d\u4f4e\u8de8\u5883\u91d1\u878d\u76d1\u7ba1\u534f\u8c03\u6210\u672c\uff0c\u4f53\u73b0\u79d1\u65af\u903b\u8f91\u3002\n\n**\u56db\u3001\u5bf9\u73b0\u5b9e\u4e3b\u4e49\u7684\u53cd\u9a73\u4e0e\u5f20\u529b**\n\n1. **\u53cd\u9a73**\uff1a\u73b0\u5b9e\u4e3b\u4e49\u8ba4\u4e3a\u56fd\u9645\u65e0\u653f\u5e9c\u72b6\u6001\u4e0b\u5408\u4f5c\u4e0d\u53ef\u80fd\u6216\u8106\u5f31\u3002\u79d1\u65af\u2014\u57fa\u6b27\u6c49\u8def\u5f84\u8bba\u8bc1\uff1a**\u53ea\u8981\u4ea4\u6613\u6210\u672c\u53ef\u88ab\u964d\u4f4e\u3001\u5916\u90e8\u6027\u53ef\u88ab\u5185\u90e8\u5316\uff0c\u56fd\u5bb6\u5c31\u6709\u5408\u4f5c\u52a8\u529b**\u3002\u9738\u6743\u4e0d\u662f\u5408\u4f5c\u7684\u552f\u4e00\u57fa\u7840\u3002\n2. **\u5f20\u529b**\uff1a\u7136\u800c\u5728**\u5b89\u5168\u654f\u611f\u8bae\u9898**\u3001**\u5206\u914d\u51b2\u7a81\u5927\u8bae\u9898**\uff08\u6c14\u5019\u8d23\u4efb\u3001AI \u6cbb\u7406\uff09\u4e0a\uff0c\u4ea4\u6613\u6210\u672c\u6781\u9ad8\u3001\u4ea7\u6743\u754c\u5b9a\u6709\u96f6\u548c\u6027\u8d28\uff0c\u79d1\u65af\u8def\u5f84\u89e3\u91ca\u529b\u53d7\u9650\u3002\n\n**\u4e94\u3001\u5f53\u4ee3\u610f\u4e49\u4e0e\u4e2d\u56fd\u7acb\u573a**\n\n1. \u4e2d\u56fd\u63a8\u52a8\u7684 RCEP\u3001\u4e9a\u6295\u884c\u3001CIPS \u7b49\u53ef\u89c6\u4e3a**\u964d\u4f4e\u533a\u57df\u5185\u4ea4\u6613\u6210\u672c\u3001\u754c\u5b9a\u533a\u57df\u4ea7\u6743**\u7684\u79d1\u65af\u5f0f\u5b9e\u8df5\uff1b\n2. \u4e00\u5e26\u4e00\u8def\u5021\u8bae\u6d89\u53ca\u5927\u91cf\u8de8\u5883\u4ea7\u6743\u754c\u5b9a\u95ee\u9898\uff08\u57fa\u7840\u8bbe\u65bd\u6240\u6709\u6743\u3001\u8fd0\u8425\u6743\u3001\u503a\u52a1\u8d23\u4efb\uff09\uff0c\u9700\u8981\u53d1\u5c55\u4e2d\u79d1\u65af\u5f0f\u5236\u5ea6\u5b89\u6392\uff1b\n3. \u5168\u7403\u6570\u5b57\u6cbb\u7406\u3001AI \u6cbb\u7406\u3001\u592a\u7a7a\u6cbb\u7406\u662f 21 \u4e16\u7eaa\u79d1\u65af\u5b9a\u7406\u56fd\u9645\u5e94\u7528\u7684\u65b0\u524d\u6cbf\u3002\n\n**\u516d\u3001\u7406\u8bba\u8bc4\u4ef7**\n\n\u79d1\u65af\u5b9a\u7406\u4e3a IPE \u63d0\u4f9b\u4e86\uff1a\u2460\u56fd\u9645\u5236\u5ea6\u529f\u80fd\u6027\u8d77\u6e90\u7684\u5fae\u89c2\u57fa\u7840\uff1b\u2461\u8de8\u5883\u5916\u90e8\u6027\u6cbb\u7406\u7684\u5e02\u573a\u5316\u8def\u5f84\uff1b\u2462\u9738\u6743\u540e\u5408\u4f5c\u53ef\u80fd\u6027\u7684\u7406\u8bba\u652f\u6491\u3002\u540c\u65f6\u5176\u5c40\u9650\u2014\u2014\u4ea4\u6613\u6210\u672c\u524d\u63d0\u3001\u4ea7\u6743\u53ef\u754c\u5b9a\u6027\u3001\u5206\u914d\u4e2d\u6027\u2014\u2014\u4e5f\u63d0\u9192\u6211\u4eec\uff1a**\u5236\u5ea6\u4e0d\u4ec5\u6709\u6548\u7387\u7ef4\u5ea6\uff0c\u66f4\u6709\u6743\u529b\u4e0e\u5206\u914d\u7ef4\u5ea6**\u3002\u79d1\u65af\u8def\u5f84\u4e0e\u8003\u514b\u65af\u6279\u5224\u8def\u5f84\u4e92\u8865\uff0c\u5171\u540c\u6784\u6210\u5b8c\u6574\u7684 IPE \u5236\u5ea6\u7406\u8bba\u8c31\u7cfb\uff08\u53c2\u89c1 Coase 1960\uff1b\u57fa\u6b27\u6c49\u300a\u9738\u6743\u4e4b\u540e\u300b\uff1b\u7530\u91ce\u7b2c\u4e8c\u7ae0\uff09\u3002\n\n### 4. \u8fd0\u7528\u6240\u5b66 IPE \u7406\u8bba\u5206\u6790\u4e16\u754c\u8d38\u6613\u7ec4\u7ec7\uff08WTO\uff09\u5728\u4e16\u754c\u7ecf\u6d4e\u4e2d\u7684\u4f5c\u7528\u3010\u6a21\u62df-2\u3011\n\nWTO 1995 \u5e74\u7531 GATT \u5347\u7ea7\u800c\u6210\uff0c\u662f\u5f53\u524d\u7ba1\u7406\u591a\u8fb9\u8d38\u6613\u4f53\u5236\u7684\u6838\u5fc3\u56fd\u9645\u7ec4\u7ec7\u3002\u5176\u5728\u4e16\u754c\u7ecf\u6d4e\u4e2d\u7684\u4f5c\u7528\u53ef\u4ece\u591a\u4e2a IPE \u7406\u8bba\u89c6\u89d2\u5206\u6790\u3002\n\n**\u4e00\u3001\u4f5c\u4e3a\u56fd\u9645\u516c\u5171\u7269\u54c1\u7684\u63d0\u4f9b\u8005\uff08\u91d1\u5fb7\u5c14\u4f2f\u683c/\u514b\u62c9\u65af\u7eb3\u89c6\u89d2\uff09**\n\nWTO \u63d0\u4f9b\u4e86\u5173\u952e\u7684\u56fd\u9645\u516c\u5171\u7269\u54c1\uff1a\n1. **\u591a\u8fb9\u8d38\u6613\u89c4\u5219\u4f53\u7cfb**\uff1aMFN\u3001\u56fd\u6c11\u5f85\u9047\u3001\u7ea6\u675f\u6027\u5173\u7a0e\u3001\u900f\u660e\u5ea6\u7b49\u57fa\u672c\u539f\u5219\uff1b\n2. **\u4e89\u7aef\u89e3\u51b3\u673a\u5236\uff08DSB\uff09**\uff1a\u88ab\u79f0\u4e3a\"\u7687\u51a0\u4e0a\u7684\u660e\u73e0\"\uff0c\u63d0\u4f9b\u4f4e\u6210\u672c\u3001\u89c4\u5219\u5316\u7684\u56fd\u5bb6\u95f4\u8d38\u6613\u7ea0\u7eb7\u89e3\u51b3\u6e20\u9053\uff1b\n3. **\u8c08\u5224\u8bba\u575b**\uff1a\u5b9a\u671f\u56de\u5408\u8c08\u5224\u63a8\u8fdb\u81ea\u7531\u5316\uff1b\n4. **\u8d38\u6613\u653f\u7b56\u5ba1\u8bae**\uff1a\u5b9a\u671f\u5ba1\u8bae\u6210\u5458\u8d38\u6613\u653f\u7b56\uff0c\u63d0\u5347\u900f\u660e\u5ea6\u3002\n\n\u8fd9\u4e9b\u516c\u5171\u7269\u54c1\u964d\u4f4e\u4e86\u4e16\u754c\u8d38\u6613\u7684\u4ea4\u6613\u6210\u672c\uff0c\u4e3a\u5168\u7403\u4ef7\u503c\u94fe\u7e41\u8363\u63d0\u4f9b\u5236\u5ea6\u57fa\u7840\u3002\n\n**\u4e8c\u3001\u964d\u4f4e\u4ea4\u6613\u6210\u672c\uff0c\u4fc3\u8fdb\u5408\u4f5c\uff08\u57fa\u6b27\u6c49\u89c6\u89d2\uff09**\n\nWTO \u901a\u8fc7\u4ee5\u4e0b\u673a\u5236\u964d\u4f4e\u56fd\u5bb6\u95f4\u5408\u4f5c\u7684\u4ea4\u6613\u6210\u672c\uff1a\n1. **\u4fe1\u606f\u6210\u672c**\uff1a\u8d38\u6613\u653f\u7b56\u5ba1\u8bae\u673a\u5236 + \u901a\u62a5\u4e49\u52a1 + \u79d8\u4e66\u5904\u5206\u6790\uff1b\n2. **\u8c08\u5224\u6210\u672c**\uff1a\u591a\u8fb9\u4e00\u63fd\u5b50\u8c08\u5224\u964d\u4f4e\u91cd\u590d\u53cc\u8fb9\u8c08\u5224\u6210\u672c\uff1b\n3. **\u76d1\u7763\u6210\u672c**\uff1a\u900f\u660e\u5ea6\u4e49\u52a1 + \u540c\u884c\u5ba1\u8bae\uff1b\n4. **\u6267\u884c\u6210\u672c**\uff1aDSB \u63d0\u4f9b\u6743\u5a01\u88c1\u51b3\u4e0e\u6388\u6743\u62a5\u590d\u673a\u5236\uff1b\n5. **\u53ef\u4fe1\u627f\u8bfa**\uff1a\u7ea6\u675f\u6027\u5173\u7a0e + \u4e0d\u8f7b\u6613\u64a4\u56de\u539f\u5219\u4f7f\u5404\u56fd\u627f\u8bfa\u66f4\u53ef\u4fe1\uff0c\u964d\u4f4e\u518d\u8c08\u5224\u6210\u672c\u3002\n\n**\u4e09\u3001\u5d4c\u5165\u5f0f\u81ea\u7531\u4e3b\u4e49\u7684\u5236\u5ea6\u5316\uff08Ruggie \u89c6\u89d2\uff09**\n\nWTO \u4f53\u73b0\u4e86 Ruggie \u6240\u79f0\"\u5d4c\u5165\u5f0f\u81ea\u7531\u4e3b\u4e49\"\u2014\u2014\u5728\u8d38\u6613\u5f00\u653e\u4e0e\u56fd\u5185\u653f\u7b56\u7a7a\u95f4\u4e4b\u95f4\u5bfb\u6c42\u5e73\u8861\uff1a\n1. \u5173\u7a0e\u540c\u76df\u4f8b\u5916\u3001\u4fdd\u969c\u63aa\u65bd\u3001\u53cd\u503e\u9500/\u53cd\u8865\u8d34\u7b49\"\u5b89\u5168\u9600\"\u4e3a\u56fd\u5185\u653f\u6cbb\u51b2\u51fb\u63d0\u4f9b\u7f13\u51b2\uff1b\n2. \u7279\u6b8a\u4e0e\u5dee\u522b\u5f85\u9047\uff08S&D\uff09\u4e3a\u53d1\u5c55\u4e2d\u56fd\u5bb6\u4fdd\u7559\u653f\u7b56\u7a7a\u95f4\uff1b\n3. \u536b\u751f\u4e0e\u690d\u7269\u536b\u751f\uff08SPS\uff09\u3001\u6280\u672f\u6027\u8d38\u6613\u58c1\u5792\uff08TBT\uff09\u534f\u8bae\u5728\u8d38\u6613\u81ea\u7531\u4e0e\u56fd\u5185\u76d1\u7ba1\u95f4\u6c42\u5e73\u8861\u3002\n\n**\u56db\u3001\u9738\u6743\u7a33\u5b9a\u4e0e\u673a\u5236\u7684\u4e92\u52a8\uff08Krasner / Ikenberry\uff09**\n\nWTO \u4f53\u73b0\u9738\u6743\u79e9\u5e8f\u7684\u5236\u5ea6\u5316\uff1a\n1. **\u7f8e\u56fd\u4e3b\u5bfc\u5efa\u7acb**\uff1a\u7f8e\u6b27\u6218\u540e\u63a8\u52a8 GATT\u300120 \u4e16\u7eaa 90 \u5e74\u4ee3\u7f8e\u56fd\u4e3b\u5bfc\u4e4c\u62c9\u572d\u56de\u5408\u5347\u7ea7\u4e3a WTO\uff1b\n2. **\u89c4\u5219\u53cd\u6620\u5148\u53d1\u56fd\u5bb6\u504f\u597d**\uff1a\u77e5\u8bc6\u4ea7\u6743\uff08TRIPS\uff09\u3001\u670d\u52a1\u8d38\u6613\uff08GATS\uff09\u7b49\u89c4\u5219\u6df1\u5ea6\u53cd\u6620\u7f8e\u6b27\u670d\u52a1\u4e1a\u3001\u8de8\u56fd\u516c\u53f8\u5229\u76ca\uff1b\n3. **\u5d1b\u8d77\u56fd\u5438\u7eb3**\uff1a\u4e2d\u56fd 2001 \u5e74\u5165\u4e16\u662f WTO \u5386\u53f2\u4e0a\u6700\u5927\u4e8b\u4ef6\u4e4b\u4e00\uff0c\u4f53\u73b0\u9738\u6743\u79e9\u5e8f\u7684\u5438\u7eb3\u80fd\u529b\u3002\n\n\u4f46 21 \u4e16\u7eaa WTO \u9762\u4e34**\u9738\u6743\u9886\u5bfc\u9000\u573a**\u95ee\u9898\uff1a\u7f8e\u56fd\u963b\u6320 DSB \u4e0a\u8bc9\u673a\u6784\u6cd5\u5b98\u4efb\u547d \u2192 2019 \u5e74 12 \u6708\u8d77\u4e0a\u8bc9\u673a\u6784\u762b\u75ea \u2192 DSB \u6838\u5fc3\u529f\u80fd\u5f31\u5316\u3002\n\n**\u4e94\u3001\u8d38\u6613\u548c\u5e73\u7684\u5236\u5ea6\u57fa\u7840\uff08Polachek / Rosecrance\uff09**\n\nWTO \u901a\u8fc7\u5236\u5ea6\u5316\u8d38\u6613\u5f00\u653e\u652f\u6491\"\u8d38\u6613\u548c\u5e73\"\uff1a\n1. \u964d\u4f4e\u8d38\u6613\u6469\u64e6\u5347\u7ea7\u4e3a\u653f\u6cbb\u51b2\u7a81\u7684\u98ce\u9669\uff08DSB \u7f13\u51b2\uff09\uff1b\n2. \u901a\u8fc7\u7ecf\u6d4e\u4e92\u5d4c\u589e\u52a0\u5404\u56fd\u653f\u6cbb\u514b\u5236\u7684\u7269\u8d28\u57fa\u7840\uff1b\n3. \u5f62\u6210\u8de8\u56fd\u751f\u4ea7\u7f51\u7edc\u4e0e\u8d38\u6613\u56fd\u793e\u4f1a\u8054\u76df\uff0c\u5f31\u5316\u4fdd\u62a4\u4e3b\u4e49\u529b\u91cf\u3002\n\n**\u516d\u3001\u5bf9\u56fd\u5185\u653f\u6cbb\u7684\u5851\u9020\u4f5c\u7528\uff08\u98a0\u5012\u7684\u7b2c\u4e8c\u610f\u8c61\uff09**\n\nWTO \u901a\u8fc7\u4ee5\u4e0b\u65b9\u5f0f\u56de\u6eaf\u5f71\u54cd\u6210\u5458\u56fd\u56fd\u5185\u653f\u6cbb\uff1a\n1. **\u653f\u7b56\u7ea6\u675f**\uff1a\u6210\u5458\u56fd\u5fc5\u987b\u4fee\u6539\u56fd\u5185\u6cd5\u5f8b\u4ee5\u7b26\u5408 WTO \u89c4\u5219\uff08\u4e2d\u56fd\u5165\u4e16\u4fee\u6539 2000 \u591a\u90e8\u6cd5\u89c4\uff09\uff1b\n2. **\u884c\u653f\u80fd\u529b\u5efa\u8bbe**\uff1a\u8981\u6c42\u6210\u5458\u56fd\u5efa\u7acb\u7edf\u4e00\u5bf9\u5916\u8d38\u6613\u7ba1\u7406\u673a\u6784\u3001\u900f\u660e\u5ea6\u673a\u5236\u3001\u534f\u5546\u7a0b\u5e8f\uff1b\n3. **\u56fd\u5185\u8054\u76df\u91cd\u7ec4**\uff1a\u8fdb\u51fa\u53e3\u90e8\u95e8 vs \u8fdb\u53e3\u7ade\u4e89\u90e8\u95e8\u7684\u653f\u6cbb\u529b\u91cf\u5bf9\u6bd4\u56e0 WTO \u800c\u53d8\u5316\uff1b\n4. **\u627f\u8bfa\u9501\u5b9a**\uff1a\u653f\u5e9c\u501f WTO \u627f\u8bfa\u7ea6\u675f\u56fd\u5185\u672a\u6765\u53cd\u590d\uff0c\u5bf9\u5185\u538b\u5236\u4fdd\u62a4\u4e3b\u4e49\u538b\u529b\u3002\n\n**\u4e03\u3001\u5f53\u4ee3\u56f0\u5883\u4e0e\u6539\u9769\u8bae\u7a0b**\n\nWTO \u5f53\u524d\u9762\u4e34\uff1a\n1. **\u8c08\u5224\u529f\u80fd\u762b\u75ea**\uff1a\u591a\u54c8\u56de\u5408\u65e0\u9650\u6401\u7f6e\uff0c\u65b0\u8bae\u9898\uff08\u6570\u5b57\u8d38\u6613\u3001\u7eff\u8272\u8d38\u6613\u3001\u8865\u8d34\u89c4\u5219\uff09\u96be\u4ee5\u7eb3\u5165\uff1b\n2. **\u4e89\u7aef\u89e3\u51b3\u762b\u75ea**\uff1a\u4e0a\u8bc9\u673a\u6784\u505c\u6446\uff08\u90e8\u5206\u56fd\u5bb6\u901a\u8fc7\"\u591a\u65b9\u4e34\u65f6\u4e0a\u8bc9\u4ef2\u88c1\u5b89\u6392\" MPIA \u5e94\u5bf9\uff09\uff1b\n3. **\u89c4\u5219\u4e0e\u73b0\u5b9e\u8131\u8282**\uff1a\u6570\u5b57\u8d38\u6613\u3001\u8de8\u5883\u6570\u636e\u6d41\u3001\u5173\u952e\u6280\u672f\u7ba1\u63a7\u3001\u56fd\u5bb6\u5b89\u5168\u4f8b\u5916\u7b49\u9886\u57df\u89c4\u5219\u4e0d\u8db3\uff1b\n4. **\u5927\u56fd\u5bf9\u6297**\uff1a\u4e2d\u7f8e\u8d38\u6613\u6218\u4f7f WTO \u89c4\u5219\u88ab\"\u7ed5\u8fc7\"\uff08301 \u5173\u7a0e\u8fdd\u53cd MFN\uff09\uff1b\n5. **\u5408\u6cd5\u6027\u8d64\u5b57**\uff1a\u53d1\u5c55\u4e2d\u56fd\u5bb6\u6279\u8bc4\u89c4\u5219\u6709\u5229\u53d1\u8fbe\u56fd\u5bb6\u3002\n\n\u6539\u9769\u8bae\u7a0b\uff1a\u2460\u6062\u590d DSB \u4e0a\u8bc9\u673a\u6784\uff1b\u2461\u6f84\u6e05\"\u56fd\u5bb6\u5b89\u5168\u4f8b\u5916\"\uff08GATT \u7b2c 21 \u6761\uff09\uff1b\u2462\u89c4\u8303\u4ea7\u4e1a\u8865\u8d34\uff1b\u2463\u7eb3\u5165\u6570\u5b57\u8d38\u6613\uff08\u7535\u5b50\u5546\u52a1\u8c08\u5224\uff09\u3001\u7eff\u8272\u8d38\u6613\u3001\u53ef\u6301\u7eed\u6e14\u4e1a\u8865\u8d34\uff1b\u2464\u6539\u9769\u51b3\u7b56\u673a\u5236\uff08\u63a5\u53d7\u8bf8\u8fb9\u8def\u5f84\uff09\u3002\n\n**\u516b\u3001\u4e2d\u56fd\u7acb\u573a\u4e0e\u4f5c\u7528**\n\n\u4e2d\u56fd\u662f WTO \u7684\u6700\u5927\u53d7\u76ca\u8005\u4e5f\u662f\u6700\u5927\u5229\u76ca\u76f8\u5173\u8005\uff1a\n1. \u5165\u4e16 20 \u5e74\u8d27\u7269\u8d38\u6613\u89c4\u6a21\u589e\u957f 10 \u500d\u4ee5\u4e0a\u3001\u8dc3\u5c45\u4e16\u754c\u7b2c\u4e00\uff1b\n2. \u4e2d\u56fd\u4e00\u8d2f\u4e3b\u5f20\u7ef4\u62a4\u591a\u8fb9\u8d38\u6613\u4f53\u5236\u6838\u5fc3\u5730\u4f4d\u3001\u53cd\u5bf9\u5355\u8fb9\u4e3b\u4e49\uff1b\n3. \u4e2d\u56fd\u79ef\u6781\u53c2\u4e0e\u6e14\u4e1a\u8865\u8d34\u3001\u7535\u5b50\u5546\u52a1\u3001\u6295\u8d44\u4fbf\u5229\u5316\u7b49\u8bf8\u8fb9\u8c08\u5224\uff1b\n4. \u4e2d\u56fd\u7533\u8bf7\u52a0\u5165 CPTPP\u3001DEPA\uff0c\u4e0e RCEP \u534f\u540c\u63a8\u8fdb\u533a\u57df\u8d38\u6613\u81ea\u7531\u5316\u3002\n\n**\u4e5d\u3001\u7406\u8bba\u7ed3\u8bba**\n\nWTO \u662f\u8fc4\u4eca\u4e3a\u6b62\u6700\u5177\u666e\u904d\u6027\u548c\u7ea6\u675f\u529b\u7684\u591a\u8fb9\u7ecf\u6d4e\u6cbb\u7406\u673a\u6784\uff0c\u5176\u5386\u53f2\u6210\u5c31\uff08\u8d38\u6613\u6269\u5f20\u3001\u4e89\u7aef\u89c4\u5219\u5316\u3001\u5d4c\u5165\u5f0f\u81ea\u7531\u4e3b\u4e49\u5b9e\u8df5\uff09\u4e0e\u5f53\u4ee3\u56f0\u5883\uff08\u9886\u5bfc\u771f\u7a7a\u3001\u89c4\u5219\u843d\u540e\u3001\u51b3\u7b56\u762b\u75ea\uff09\u5171\u540c\u6784\u6210 21 \u4e16\u7eaa\u591a\u8fb9\u4e3b\u4e49\u547d\u8fd0\u7684\u7f29\u5f71\u3002WTO \u7684\u5b58\u7eed\u4e0e\u6539\u9769\u76f4\u63a5\u5173\u7cfb\u5230**\u5168\u7403\u516c\u5171\u7269\u54c1\u4f9b\u7ed9\u3001\u8d38\u6613\u548c\u5e73\u3001\u4e16\u754c\u7ecf\u6d4e\u79e9\u5e8f**\u7684\u672a\u6765\uff08\u53c2\u89c1 Krasner 1976\uff1b\u57fa\u6b27\u6c49 1984\uff1bRuggie 1982\uff1b\u7530\u91ce\u7b2c\u4e09\u3001\u56db\u7ae0\uff1b\u5b8b\u65b0\u5b81/\u9648\u5cb3\u7b2c\u56db\u7ae0\uff09\u3002\n\n### 5. \u8bba\u8ff0\u56fd\u9645\u5236\u5ea6\u4f55\u4ee5\u63a8\u52a8\u56fd\u9645\u5408\u4f5c\u3010\u6a21\u62df-3\u3011\n\n\u56fd\u9645\u5236\u5ea6\uff08international institutions\uff09\u5982\u4f55\u5728\u65e0\u653f\u5e9c\u72b6\u6001\u4e0b\u63a8\u52a8\u56fd\u9645\u5408\u4f5c\uff0c\u662f IPE \u7684\u6838\u5fc3\u7406\u8bba\u95ee\u9898\u3002\u57fa\u6b27\u6c49\u3001\u5948\u3001\u514b\u62c9\u65af\u7eb3\u3001\u9a6c\u4e01\u7b49\u5b66\u8005\u5728\u65b0\u81ea\u7531\u5236\u5ea6\u4e3b\u4e49\u6846\u67b6\u4e0b\u63d0\u4f9b\u4e86\u7cfb\u7edf\u7b54\u6848\u3002\n\n**\u4e00\u3001\u5408\u4f5c\u56f0\u5883\u7684\u5fae\u89c2\u57fa\u7840**\n\n\u56fd\u9645\u5408\u4f5c\u9762\u4e34\u4e24\u7c7b\u535a\u5f08\u56f0\u5883\uff1a\n1. **\u534f\u4f5c\u578b\u535a\u5f08\uff08\u56da\u5f92\u56f0\u5883\u578b\uff09**\uff1a\u5b58\u5728\u5408\u4f5c\u2014\u5408\u4f5c\u7684\u5e15\u7d2f\u6258\u4f18\u5747\u8861\uff0c\u4f46\u4e2a\u4f53\u7406\u6027\u5bfc\u81f4\u80cc\u53db\u2014\u80cc\u53db\u3002\u5173\u952e\u662f**\u6fc0\u52b1\u95ee\u9898**\u3002\n2. **\u534f\u8c03\u578b\u535a\u5f08\uff08\u730e\u9e7f\u578b\uff09**\uff1a\u5b58\u5728\u591a\u91cd\u5747\u8861\uff0c\u4f46\u90fd\u4f18\u4e8e\u4e0d\u534f\u8c03\uff0c\u5173\u952e\u662f**\u9884\u671f\u534f\u8c03\u95ee\u9898**\u3002\n3. \u52a0\u4e0a**\u96c6\u4f53\u884c\u52a8\u56f0\u5883**\uff08\u642d\u4fbf\u8f66\uff09\u4e0e**\u4fe1\u606f\u4e0d\u5bf9\u79f0**\uff08\u4e0d\u77e5\u5bf9\u65b9\u771f\u5b9e\u610f\u56fe\u4e0e\u80fd\u529b\uff09\u3002\n\n**\u4e8c\u3001\u56fd\u9645\u5236\u5ea6\u63a8\u52a8\u5408\u4f5c\u7684\u6838\u5fc3\u673a\u5236**\n\n1. **\u964d\u4f4e\u4ea4\u6613\u6210\u672c**\uff08\u57fa\u6b27\u6c49\u300a\u9738\u6743\u4e4b\u540e\u300b\uff09\uff1a\n   - \u63d0\u4f9b\u5e38\u8bbe\u8bba\u575b\uff0c\u907f\u514d\u53cd\u590d\u8bae\u4ef7\uff1b\n   - \u63d0\u4f9b\u79d8\u4e66\u5904\u4e0e\u4e13\u5bb6\u5206\u6790\u80fd\u529b\uff0c\u964d\u4f4e\u4fe1\u606f\u6210\u672c\uff1b\n   - \u901a\u8fc7\u6a21\u677f\u5316\u89c4\u5219\u964d\u4f4e\u8c08\u5224\u6210\u672c\u3002\n\n2. **\u63d0\u4f9b\u4fe1\u606f\u4e0e\u63d0\u5347\u900f\u660e\u5ea6**\uff1a\n   - \u901a\u62a5\u4e49\u52a1\u3001\u5b9a\u671f\u5ba1\u8bae\u3001\u4e13\u5bb6\u8bc4\u4f30\u3001\u6280\u672f\u63f4\u52a9\uff1b\n   - \u51cf\u5c11\u4fe1\u606f\u4e0d\u5bf9\u79f0 \u2192 \u964d\u4f4e\u8bef\u5224\u4e0e\u673a\u4f1a\u4e3b\u4e49\uff1b\n   - \u4f8b\uff1aIMF \u7b2c\u56db\u6761\u6b3e\u78cb\u5546\u3001WTO \u8d38\u6613\u653f\u7b56\u5ba1\u8bae\u3001IAEA \u6838\u67e5\u3002\n\n3. **\u7a33\u5b9a\u9884\u671f\u4e0e\u53ef\u4fe1\u627f\u8bfa**\uff1a\n   - \u89c4\u5219\u5316\u8fd0\u884c \u2192 \u9884\u671f\u7a33\u5b9a\uff1b\n   - \u81ea\u6211\u7ea6\u675f\uff08\u9738\u6743\u56fd\u63a5\u53d7\u89c4\u5219\uff09\u2192 \u53ef\u4fe1\u4fe1\u53f7\uff1b\n   - \u9000\u51fa\u4e0e\u8fdd\u7ea6\u7684\u9ad8\u6210\u672c \u2192 \u627f\u8bfa\u66f4\u53ef\u4fe1\u3002\n\n4. **\u76d1\u7763\u4e0e\u6267\u884c\uff08\u5e94\u5bf9\u534f\u4f5c\u578b\u535a\u5f08\uff09**\uff1a\n   - \u540c\u884c\u5ba1\u8bae\u3001\u4e89\u7aef\u89e3\u51b3\u3001\u60e9\u7f5a\u673a\u5236\uff1b\n   - \u4f8b\uff1aWTO \u62a5\u590d\u6388\u6743\u3001IAEA \u62a5\u544a\u8054\u5408\u56fd\u5b89\u7406\u4f1a\u3001\u4eba\u6743\u673a\u5236\u7684\"\u7279\u6b8a\u7a0b\u5e8f\"\u3002\n\n5. **\u63d0\u4f9b\u7126\u70b9\u534f\u8c03\uff08\u5e94\u5bf9\u534f\u8c03\u578b\u535a\u5f08\uff09**\uff1a\n   - \u6807\u51c6\u5316\uff08IEC\u3001ISO\u3001SWIFT \u62a5\u6587\u6807\u51c6\u3001\u4e92\u8054\u7f51\u57df\u540d ICANN\uff09\uff1b\n   - \u7126\u70b9\u9009\u62e9\uff08\u8d38\u6613\u5173\u7a0e\u8c08\u5224\u4ece\"\u6700\u60e0\u56fd\"\u5c55\u5f00\u3001\u6c14\u5019\u8c08\u5224\u4ece\"\u5df4\u9ece\u6e29\u5347\u4e0a\u9650\"\u5c55\u5f00\uff09\u3002\n\n6. **\u8bae\u9898\u8054\u63a5\u4e0e\u4e00\u63fd\u5b50\u5b89\u6392**\uff1a\n   - \u628a\u591a\u4e2a\u8bae\u9898\u6253\u5305\u4ee5\u6269\u5c55\u8c08\u5224\u4f59\u5730\uff1b\n   - \u8de8\u8bae\u9898\u5bf9\u51b2\u521b\u9020\"\u53cc\u8d62\"\u7ec4\u5408\uff1b\n   - \u4f8b\uff1a\u4e4c\u62c9\u572d\u56de\u5408\u628a\u519c\u4e1a\u3001\u670d\u52a1\u3001\u77e5\u8bc6\u4ea7\u6743\u540c\u65f6\u6253\u5305\u3002\n\n7. **\u5851\u9020\u8eab\u4efd\u4e0e\u89c4\u8303**\uff1a\n   - \u5236\u5ea6\u8fd0\u884c\u5185\u5d4c\u89c4\u8303\u6269\u6563\uff1b\n   - \u56fd\u5bb6\u901a\u8fc7\u53cd\u590d\u4e92\u52a8\u5185\u5316\u5408\u4f5c\u504f\u597d\uff1b\n   - \u4f8b\uff1aWTO \u5165\u4e16\u56fd\u5bf9\u89c4\u5219\u7684\u5185\u5316\u3001\u6b27\u76df\u5bf9\u6210\u5458\u56fd\u8eab\u4efd\u5851\u9020\u3002\n\n**\u4e09\u3001\u5236\u5ea6\u7684\"\u9ecf\u6027\"\u4e0e\u9738\u6743\u540e\u5408\u4f5c**\n\n\u57fa\u6b27\u6c49\u5173\u952e\u547d\u9898\uff1a**\u5373\u4fbf\u9738\u6743\u8870\u843d\uff0c\u56fd\u9645\u5236\u5ea6\u4ecd\u80fd\u7ef4\u6301\u5408\u4f5c**\u2014\u2014\n1. \u5236\u5ea6\u7684\"\u6c89\u6ca1\u6210\u672c\"\u4f7f\u91cd\u5efa\u6210\u672c\u6781\u9ad8\uff1b\n2. \u8def\u5f84\u4f9d\u8d56\u4f7f\u73b0\u884c\u89c4\u5219\u5f62\u6210\"\u73b0\u72b6\u504f\u597d\"\uff1b\n3. \u56fd\u5bb6\u95f4\u5df2\u5efa\u7acb\u7684\u9884\u671f\u4e0e\u5229\u76ca\u7ed1\u5b9a\u4e0d\u6613\u6d88\u89e3\uff1b\n4. \u56fd\u5185\u5229\u76ca\u96c6\u56e2\u5df2\u5d4c\u5165\u5236\u5ea6\uff0c\u53cd\u5bf9\u9000\u51fa\u3002\n\n\u4f8b\uff1a\u2460WTO \u5728\u7f8e\u56fd\u9886\u5bfc\u9000\u573a\u4e0b\u4ecd\u5ef6\u7eed\uff1b\u2461IMF/\u4e16\u884c\u867d\u6539\u9769\u7f13\u6162\u4f46\u6301\u7eed\uff1b\u2462\u4e00\u4e9b\u6761\u7ea6\uff08\u5982\u7981\u6b62\u5316\u5b66\u6b66\u5668\u516c\u7ea6\uff09\u6210\u5458\u56fd\u4e3b\u52a8\u591a\u4e8e\u64a4\u7ea6\u3002\n\n**\u56db\u3001\u5236\u5ea6\u7684\u5c40\u9650**\n\n1. **\u5236\u5ea6\u65e0\u6cd5\u89e3\u51b3\u6838\u5fc3\u5229\u76ca\u51b2\u7a81**\uff1a\u5728\u5206\u914d\u51b2\u7a81\u5927\u3001\u5b89\u5168\u654f\u611f\u8bae\u9898\u4e0a\uff08\u6838\u88c1\u519b\u3001\u9886\u571f\u4e89\u7aef\uff09\uff0c\u5236\u5ea6\u4f5c\u7528\u6709\u9650\uff1b\n2. **\u9738\u6743\u9886\u5bfc\u4ecd\u7136\u91cd\u8981**\uff1a\u5236\u5ea6\u7684\u6d3b\u529b\u90e8\u5206\u4f9d\u8d56\u9738\u6743\u56fd\u7684\"\u4e3b\u52a8\u7ef4\u62a4\"\uff0c\u7eaf\u9760\u5236\u5ea6\u9ecf\u6027\u96be\u4ee5\u5e94\u5bf9\u6df1\u5ea6\u5371\u673a\uff1b\n3. **\u5236\u5ea6\u53ef\u80fd\u50f5\u5316**\uff1a\u8def\u5f84\u4f9d\u8d56\u4f7f\u5236\u5ea6\u96be\u4ee5\u5e94\u5bf9\u65b0\u8bae\u9898\uff08WTO \u96be\u4ee5\u5904\u7406\u6570\u5b57\u8d38\u6613\uff09\uff1b\n4. **\u6b63\u5f53\u6027\u8d64\u5b57**\uff1a\u53d1\u5c55\u4e2d\u56fd\u5bb6\u4ee3\u8868\u6027\u4e0d\u8db3\uff0c\u5a01\u80c1\u5236\u5ea6\u6301\u7eed\u6027\uff1b\n5. **\u5236\u5ea6\u53ef\u88ab\u5f31\u5316**\uff1a\u9738\u6743\u56fd\u53ef\u901a\u8fc7\"\u9000\u7fa4\"\"\u963b\u6320\u4efb\u547d\"\"\u8bbe\u7acb\u66ff\u4ee3\u5236\u5ea6\"\u7b49\u65b9\u5f0f\u524a\u5f31\uff08\u7279\u6717\u666e\u653f\u5e9c\u5bf9 WTO\u3001\u5df4\u9ece\u534f\u5b9a\u3001\u4f0a\u6838\u534f\u8bae\uff09\u3002\n\n**\u4e94\u3001\u5e94\u5bf9\u5236\u5ea6\u5c40\u9650\u7684\u65b0\u8def\u5f84**\n\n1. **\u591a\u8fb9 \u2192 \u591a\u5c42\u7ea7\u2014\u591a\u901f\u5ea6\u6cbb\u7406**\uff1a\u6838\u5fc3\u5236\u5ea6 + \u533a\u57df\u5236\u5ea6 + \u53cc\u8fb9\u534f\u8bae + \u8de8\u56fd\u7f51\u7edc\u76f8\u4e92\u5d4c\u5957\uff1b\n2. **\u5f3a\u5316\u975e\u56fd\u5bb6\u884c\u4e3a\u4f53\u53c2\u4e0e**\uff1a\u8de8\u56fd NGO\u3001\u4e13\u5bb6\u5171\u540c\u4f53\u3001\u8de8\u56fd\u516c\u53f8\u53c2\u4e0e\uff1b\n3. **\u8bae\u9898\u4e13\u95e8\u5316\u5236\u5ea6**\uff1a\u91d1\u878d\u7a33\u5b9a\u7406\u4e8b\u4f1a\uff08FSB\uff09\u3001IMO\u3001ICAO \u7b49\"\u529f\u80fd\u6027\u5236\u5ea6\"\uff1b\n4. **\u65b0\u5174\u5927\u56fd\u7684\u5236\u5ea6\u4f9b\u7ed9**\uff1aAIIB\u3001\u65b0\u5f00\u53d1\u94f6\u884c\u3001CIPS\u3001\u4e00\u5e26\u4e00\u8def\u3001\"\u5168\u7403\u5b89\u5168\u5021\u8bae\"\u7b49\u4e2d\u56fd\u5236\u5ea6\u4f9b\u7ed9\u8865\u4f4d\u3002\n\n**\u516d\u3001\u4e2d\u56fd\u4e0e\u56fd\u9645\u5236\u5ea6\u5408\u4f5c**\n\n\u4e2d\u56fd\u662f\u56fd\u9645\u5236\u5ea6\u7684\u91cd\u8981\u53c2\u4e0e\u8005\u4e0e\u6539\u9769\u8005\uff1a\n1. \u5165\u4e16 20 \u4f59\u5e74\u6df1\u5ea6\u5d4c\u5165 WTO \u89c4\u5219\u4f53\u7cfb\uff1b\n2. \u5728 IMF\u3001\u4e16\u884c\u79ef\u6781\u63a8\u52a8\u4efd\u989d\u6539\u9769\uff08\u4e2d\u56fd\u4efd\u989d\u4ece 2.94% \u5347\u81f3 6.39%\uff09\uff1b\n3. \u4e3b\u52a8\u5efa\u7acb AIIB\u3001\u65b0\u5f00\u53d1\u94f6\u884c\u3001CIPS \u7b49\u8865\u5145\u6027\u5236\u5ea6\uff1b\n4. \u5728\u6c14\u5019\u3001\u9632\u6269\u6563\u3001\u536b\u751f\u7b49\u9886\u57df\u79ef\u6781\u627f\u62c5\u56fd\u9645\u8d23\u4efb\u3002\n\n**\u4e03\u3001\u7406\u8bba\u7ed3\u8bba**\n\n\u56fd\u9645\u5236\u5ea6\u901a\u8fc7**\u964d\u4f4e\u4ea4\u6613\u6210\u672c\u3001\u63d0\u4f9b\u4fe1\u606f\u3001\u7a33\u5b9a\u9884\u671f\u3001\u76d1\u7763\u6267\u884c\u3001\u534f\u8c03\u7126\u70b9\u3001\u8bae\u9898\u8054\u63a5\u3001\u5851\u9020\u89c4\u8303**\u7b49\u591a\u91cd\u673a\u5236\u63a8\u52a8\u5408\u4f5c\uff0c\u4e14\u5177\u6709**\u663e\u8457\u7684\"\u9738\u6743\u540e\"\u9ecf\u6027**\u3002\u4f46\u5236\u5ea6\u6709\u6548\u6027\u59cb\u7ec8\u4f9d\u8d56**\u6743\u529b\u652f\u6491 + \u5229\u76ca\u5951\u5408 + \u89c4\u8303\u8ba4\u540c**\u4e09\u5927\u57fa\u7840\uff0c\u4efb\u4e00\u57fa\u7840\u677e\u52a8\u90fd\u5c06\u524a\u5f31\u5408\u4f5c\u80fd\u529b\u300221 \u4e16\u7eaa\u7684\u5173\u952e\u95ee\u9898\u662f\uff1a\u5728\u9738\u6743\u8f6c\u578b\u80cc\u666f\u4e0b\u5982\u4f55\u91cd\u5851\u56fd\u9645\u5236\u5ea6\uff0c\u4f7f\u5176\u540c\u65f6\u53cd\u6620\u65b0\u5174\u5927\u56fd\u504f\u597d\u4e0e\u5168\u7403\u516c\u5171\u5229\u76ca\uff08\u53c2\u89c1\u57fa\u6b27\u6c49\u300a\u9738\u6743\u4e4b\u540e\u300b\uff1bKrasner 1983\uff1bMartin 1992\uff1b\u7530\u91ce\u7b2c\u4e09\u7ae0\uff1b\u5b8b\u65b0\u5b81/\u9648\u5cb3\u7b2c\u56db\u7ae0\uff09\u3002\n\n### 6. \u8fd0\u7528\u6240\u5b66 IPE \u7406\u8bba\u5206\u6790\u56fd\u9645\u8d27\u5e01\u57fa\u91d1\u7ec4\u7ec7\u5728\u4e16\u754c\u7ecf\u6d4e\u4e2d\u7684\u4f5c\u7528\u3010\u6a21\u62df-3\u3011\n\nIMF 1944 \u5e74\u5728\u5e03\u96f7\u987f\u68ee\u6797\u4f1a\u8bae\u786e\u7acb\u30011945 \u5e74\u6210\u7acb\uff0c\u662f\u5f53\u4ee3\u56fd\u9645\u8d27\u5e01\u4f53\u7cfb\u7684\u6838\u5fc3\u5236\u5ea6\u3002\u5176\u5728\u4e16\u754c\u7ecf\u6d4e\u4e2d\u7684\u4f5c\u7528\u53ef\u4ece\u591a\u91cd IPE \u7406\u8bba\u89c6\u89d2\u5206\u6790\u3002\n\n**\u4e00\u3001\u8bbe\u7acb\u80cc\u666f\u4e0e\u529f\u80fd\u5b9a\u4f4d**\n\n\u5e03\u96f7\u987f\u68ee\u6797\u4f1a\u8bae\u8bbe\u8ba1 IMF \u7684\u521d\u8877\u662f**\u907f\u514d\u91cd\u8e48\u4e24\u6b21\u5927\u6218\u95f4\u56fd\u9645\u8d27\u5e01\u4f53\u7cfb\u5d29\u6e83\u8986\u8f99**\uff08\u91d1\u672c\u4f4d\u5d29\u584c \u2192 \u7ade\u76f8\u8d2c\u503c \u2192 \u8d38\u6613\u7d27\u7f29 \u2192 \u5927\u8427\u6761\uff09\u3002IMF \u4e09\u5927\u6cd5\u5b9a\u804c\u80fd\uff1a\n1. **\u6c47\u7387\u76d1\u7763**\uff08\u7b2c\u56db\u6761\u6b3e\u78cb\u5546\uff09\uff1a\u76d1\u7763\u6210\u5458\u56fd\u6c47\u7387\u653f\u7b56\u3001\u9632\u6b62\u64cd\u7eb5\u6c47\u7387\uff1b\n2. **\u56fd\u9645\u6536\u652f\u6551\u52a9**\uff1a\u5411\u51fa\u73b0\u56fd\u9645\u6536\u652f\u56f0\u96be\u7684\u6210\u5458\u56fd\u63d0\u4f9b\u77ed\u671f\u878d\u8d44\uff08\u9644\u6761\u4ef6\u8d37\u6b3e\uff0cconditionality\uff09\uff1b\n3. **\u80fd\u529b\u5efa\u8bbe\u4e0e\u6280\u672f\u63f4\u52a9**\uff1a\u534f\u52a9\u6210\u5458\u56fd\u5efa\u7acb\u5b8f\u89c2\u7ecf\u6d4e\u7ba1\u7406\u4e0e\u91d1\u878d\u76d1\u7ba1\u80fd\u529b\u3002\n\n**\u4e8c\u3001\u4f5c\u4e3a\u56fd\u9645\u516c\u5171\u7269\u54c1\u63d0\u4f9b\u8005\uff08\u91d1\u5fb7\u5c14\u4f2f\u683c\u89c6\u89d2\uff09**\n\nIMF \u63d0\u4f9b\u5173\u952e\u56fd\u9645\u516c\u5171\u7269\u54c1\uff1a\n1. **\u6c47\u7387\u7a33\u5b9a\u76d1\u7763**\uff1a\u76d1\u7763\u9632\u6b62\"\u4ee5\u90bb\u4e3a\u58d1\"\u7684\u7ade\u4e89\u6027\u8d2c\u503c\uff1b\n2. **\u56fd\u9645\u6536\u652f\u8c03\u6574\u878d\u8d44**\uff1a\u51cf\u5c11\u5371\u673a\u56fd\u4ed3\u4fc3\u91c7\u53d6\u8d38\u6613\u4fdd\u62a4\u6216\u6c47\u5151\u7ba1\u5236\uff1b\n3. **\u6700\u540e\u8d37\u6b3e\u4eba\u529f\u80fd**\uff08\u90e8\u5206\uff09\uff1a\u5728\u4e3b\u6743\u503a\u52a1/\u8d27\u5e01\u5371\u673a\u65f6\u63d0\u4f9b\u6551\u52a9\uff1b\n4. **\u91d1\u878d\u7a33\u5b9a\u76d1\u7763**\uff1aFSAP\uff08\u91d1\u878d\u90e8\u95e8\u8bc4\u4f30\uff09+ \u76d1\u6d4b\u5168\u7403\u91d1\u878d\u7a33\u5b9a\u6027\u3002\n\n**\u4e09\u3001\u964d\u4f4e\u4ea4\u6613\u6210\u672c\u4e0e\u7a33\u5b9a\u9884\u671f\uff08\u57fa\u6b27\u6c49\u89c6\u89d2\uff09**\n\nIMF \u901a\u8fc7\u4ee5\u4e0b\u673a\u5236\u964d\u4f4e\u56fd\u9645\u8d27\u5e01\u5408\u4f5c\u6210\u672c\uff1a\n1. **\u7edf\u4e00\u7684\u6570\u636e\u6807\u51c6**\uff08SDDS\uff09\u4e0e\u900f\u660e\u5ea6\u673a\u5236\uff1b\n2. **\u7b2c\u56db\u6761\u6b3e\u78cb\u5546**\u63d0\u4f9b\u9ad8\u8d28\u91cf\u56fd\u522b\u7ecf\u6d4e\u5206\u6790\uff1b\n3. **WEO\uff08\u4e16\u754c\u7ecf\u6d4e\u5c55\u671b\uff09+ GFSR\uff08\u5168\u7403\u91d1\u878d\u7a33\u5b9a\u62a5\u544a\uff09**\u4e3a\u5168\u7403\u5b8f\u89c2\u534f\u8c03\u63d0\u4f9b\u4fe1\u606f\u57fa\u7840\uff1b\n4. **\u9644\u6761\u4ef6\u8d37\u6b3e**\u964d\u4f4e\u6551\u52a9\u8c08\u5224\u7684\u53cd\u590d\u4ea4\u6613\u6210\u672c\uff1b\n5. **SDR \u521b\u8bbe**\u4f5c\u4e3a\u8865\u5145\u6027\u56fd\u9645\u50a8\u5907\u8d44\u4ea7\u3002\n\n**\u56db\u3001\u9738\u6743\u79e9\u5e8f\u7684\u5236\u5ea6\u5316\uff08\u514b\u62c9\u65af\u7eb3/Ikenberry \u89c6\u89d2\uff09**\n\nIMF \u53cd\u6620\u7f8e\u56fd\u6218\u540e\u9738\u6743\u5b89\u6392\uff1a\n1. **\u4efd\u989d\u4e0e\u6295\u7968\u6743**\uff1a\u7f8e\u56fd 16% \u4ee5\u4e0a\u4efd\u989d\u4e8b\u5b9e\u4e0a\u62e5\u6709\u91cd\u5927\u51b3\u7b56\u5426\u51b3\u6743\uff08\u5173\u952e\u51b3\u7b56\u9700 85% \u591a\u6570\uff09\uff1b\n2. **\u603b\u88c1\u60ef\u4f8b**\uff1a\u957f\u671f\u7531\u6b27\u6d32\u4eba\u62c5\u4efb\uff0c\u53cd\u6620\u6218\u540e\u6b27\u7f8e\u4e3b\u5bfc\u683c\u5c40\uff1b\n3. **\u603b\u90e8\u534e\u76db\u987f**\uff1a\u5730\u7406\u4e0e\u653f\u6cbb\u4e0a\u9760\u8fd1\u7f8e\u56fd\u8d22\u653f\u90e8\uff1b\n4. **\u653f\u7b56\u504f\u597d**\uff1a1980\u201490 \u5e74\u4ee3\"\u534e\u76db\u987f\u5171\u8bc6\"\u2014\u2014\u8d22\u653f\u7d27\u7f29\u3001\u8d38\u6613\u81ea\u7531\u5316\u3001\u79c1\u6709\u5316\u3001\u6c47\u7387\u81ea\u7531\u2014\u2014\u6df1\u5ea6\u53cd\u6620\u7f8e\u56fd\u8d22\u653f\u90e8\u4e0e\u534e\u5c14\u8857\u5229\u76ca\u3002\n\n**\u4e94\u3001\u7ed3\u6784\u6027\u6743\u529b\u7684\u4f53\u73b0\uff08\u65af\u7279\u5170\u5947\u89c6\u89d2\uff09**\n\nIMF \u662f\u7f8e\u56fd\"\u91d1\u878d\u7ed3\u6784\u6027\u6743\u529b\"\u7684\u5ef6\u4f38\uff1a\n1. \u901a\u8fc7\u9644\u6761\u4ef6\u8d37\u6b3e\u5f71\u54cd\u5371\u673a\u56fd\u5b8f\u89c2\u4e0e\u5236\u5ea6\u6539\u9769\uff08\u62c9\u7f8e 80 \u5e74\u4ee3\u3001\u4e9a\u6d32 97 \u5e74\u3001\u4fc4\u7f57\u65af 90 \u5e74\u4ee3\u3001\u5e0c\u814a 2010 \u5e74\u4ee3\uff09\uff1b\n2. \u76d1\u63a7\u53d1\u5c55\u4e2d\u56fd\u5bb6\u91d1\u878d\u81ea\u7531\u5316\u8fdb\u7a0b\uff1b\n3. \u5851\u9020\u56fd\u9645\u91d1\u878d\u76d1\u7ba1\u6807\u51c6\uff08BCBS / FSB \u7b49\u5e76\u5217\u673a\u6784\uff09\uff1b\n4. \u901a\u8fc7 SDR\u3001\u7279\u522b\u63d0\u6b3e\u6743\u7bee\u5b50\u91cd\u6784\u7b49\u624b\u6bb5\u5f71\u54cd\u56fd\u9645\u50a8\u5907\u7ed3\u6784\u3002\n\n**\u516d\u3001\u6279\u8bc4\u4e0e\u4e89\u8bae**\n\n1. **\u9644\u6761\u4ef6\u8d37\u6b3e\u88ab\u6307\"\u4e00\u5200\u5207\"**\uff1a\u2460\u5ffd\u89c6\u56fd\u522b\u5dee\u5f02\uff1b\u2461\u52a0\u5267\u5371\u673a\u56fd\u7d27\u7f29\uff08\u4e9a\u6d32\u91d1\u878d\u5371\u673a\u88ab\u65af\u8482\u683c\u5229\u8328\u4e25\u5389\u6279\u8bc4\uff09\uff1b\u2462\u4fb5\u8680\u653f\u7b56\u81ea\u4e3b\u6743\uff1b\n2. **\u4ee3\u8868\u6027\u8d64\u5b57**\uff1a\u53d1\u5c55\u4e2d\u56fd\u5bb6\u4efd\u989d\u4e0e\u5f71\u54cd\u529b\u8fdc\u4f4e\u4e8e\u5176\u7ecf\u6d4e\u6743\u91cd\uff1b\n3. **\u9053\u5fb7\u98ce\u9669**\uff1a\u6551\u52a9\u9884\u671f\u53ef\u80fd\u9f13\u52b1\u6295\u673a\u6027\u8d44\u672c\u6d41\u52a8\uff1b\n4. **\u653f\u7b56\u504f\u5411**\uff1a\u504f\u597d\u91d1\u878d\u81ea\u7531\u5316\u3001\u7d27\u7f29\u3001\u79c1\u6709\u5316\uff0c\u5bf9\u52b3\u5de5\u3001\u793e\u4f1a\u4fdd\u969c\u5173\u6ce8\u4e0d\u8db3\uff1b\n5. **\u6539\u9769\u6ede\u540e**\uff1a2010 \u5e74\u4efd\u989d\u6539\u9769\u76f4\u5230 2016 \u5e74\u624d\u751f\u6548\uff0c\u53cd\u6620\u65e2\u5f97\u5229\u76ca\u963b\u529b\u3002\n\n**\u4e03\u3001IMF \u7684\u6539\u9769\u4e0e\u4e2d\u56fd\u89d2\u8272**\n\n1. **\u4efd\u989d\u6539\u9769**\uff082010 \u901a\u8fc7\u30012016 \u751f\u6548\uff09\uff1a\u53d1\u5c55\u4e2d\u56fd\u5bb6\u4efd\u989d\u4e0a\u5347\u7ea6 6 \u4e2a\u767e\u5206\u70b9\uff1b**\u4e2d\u56fd\u4efd\u989d\u5347\u81f3 6.39%**\uff0c\u8dc3\u5c45\u7b2c\u4e09\uff08\u4ec5\u6b21\u7f8e\u3001\u65e5\uff09\uff1b\n2. **SDR \u7bee\u5b50\u91cd\u6784**\uff082015 \u901a\u8fc7\u30012016 \u751f\u6548\uff09\uff1a\u4eba\u6c11\u5e01\u7eb3\u5165 SDR \u7bee\u5b50\uff0c\u6743\u91cd 10.92%\uff082022 \u5e74\u8c03\u6574\u4e3a 12.28%\uff09\uff0c\u5c45\u7f8e\u5143\u3001\u6b27\u5143\u540e\u7b2c\u4e09\uff1b\n3. **\u653f\u7b56\u7075\u6d3b\u5316**\uff1a2008 \u5371\u673a\u540e IMF \u90e8\u5206\u4fee\u6b63\u7acb\u573a\uff0c\u627f\u8ba4\u8d44\u672c\u7ba1\u5236\u5728\u7279\u5b9a\u6761\u4ef6\u4e0b\u5408\u7406\u6027\u3001\u5f3a\u8c03\u7ed3\u6784\u6027\u6539\u9769\u5e94\u914d\u5408\u793e\u4fdd\uff1b\n4. **\u65b0\u5174\u5927\u56fd\u5236\u5ea6\u8865\u4f4d**\uff1a\u91d1\u7816\u5e94\u6025\u50a8\u5907\u5b89\u6392\uff08CRA, 2014\uff09\u3001\u4e2d\u56fd\u4e3b\u5bfc\u7684\u53cc\u8fb9\u8d27\u5e01\u4e92\u6362\u7f51\u7edc\u90e8\u5206\u5bf9\u51b2 IMF \u4e3b\u5bfc\u683c\u5c40\uff1b\n5. **\u4e2d\u56fd\u4e3b\u5f20**\uff1a\u2460\u52a0\u5feb\u4efd\u989d\u4e0e\u6cbb\u7406\u6539\u9769\uff1b\u2461\u6269\u5927 SDR \u4f7f\u7528\uff1b\u2462\u52a0\u5f3a\u53d1\u5c55\u4e2d\u56fd\u5bb6\u58f0\u97f3\uff1b\u2463\u53cd\u5bf9\u9644\u6761\u4ef6\u8d37\u6b3e\u7684\u8fc7\u5ea6\u5e72\u9884\u3002\n\n**\u516b\u3001\u5f53\u4ee3\u6311\u6218**\n\n1. **\u5927\u56fd\u535a\u5f08\u52a0\u5267**\uff1a\u7f8e\u56fd\u56fd\u4f1a\u957f\u671f\u963b\u6320\u6539\u9769\uff1b\u4e2d\u4fc4\u7b49\u63a8\u52a8\u591a\u5143\u5316\uff1b\n2. **\u5168\u7403\u91d1\u878d\u67b6\u6784\u788e\u7247\u5316**\uff1a\u53cc\u8fb9\u4e92\u6362\u3001\u533a\u57df\u91d1\u878d\u5b89\u6392\uff08CRA\u3001CMIM\u3001ESM\uff09\u90e8\u5206\u66ff\u4ee3 IMF \u6551\u52a9\u529f\u80fd\uff1b\n3. **\u6570\u5b57\u8d27\u5e01\u4e0e\u7a33\u5b9a\u5e01\u6311\u6218\u56fd\u9645\u8d27\u5e01\u6cbb\u7406**\uff1b\n4. **\u6c14\u5019\u878d\u8d44\u3001\u503a\u52a1\u5371\u673a\u91cd\u7ec4**\u7b49\u65b0\u8bae\u9898\u5bf9 IMF \u5de5\u5177\u7bb1\u63d0\u51fa\u65b0\u8981\u6c42\u3002\n\n**\u4e5d\u3001\u7406\u8bba\u7ed3\u8bba**\n\nIMF \u662f\u56fd\u9645\u5236\u5ea6\u53d1\u6325**\u4fe1\u606f\u63d0\u4f9b + \u76d1\u7763 + \u6551\u52a9 + \u89c4\u8303\u5851\u9020**\u529f\u80fd\u7684\u5178\u578b\u6848\u4f8b\uff0c\u4f53\u73b0\u4e86\u9738\u6743\u79e9\u5e8f\u5982\u4f55\u901a\u8fc7\u5236\u5ea6\u5316\u5f97\u4ee5\u7ef4\u7cfb\u3002\u540c\u65f6\uff0c\u5176\u53d7\u5230\u7684\u6279\u8bc4\u2014\u2014\u9644\u6761\u4ef6\u8d37\u6b3e\u7684\u653f\u6cbb\u5316\u3001\u4ee3\u8868\u6027\u8d64\u5b57\u3001\u653f\u7b56\u504f\u5411\u2014\u2014\u4e5f\u63ed\u793a\u4e86\u5236\u5ea6\u5373\u6743\u529b\u8f7d\u4f53\u7684\u672c\u8d28\uff08\u8003\u514b\u65af\u5f0f\u6279\u5224\uff09\u3002IMF \u7684\u672a\u6765\u53d6\u51b3\u4e8e\u80fd\u5426\u5728\u5b88\u6210\u5927\u56fd\u4e0e\u65b0\u5174\u5927\u56fd\u4e4b\u95f4\u91cd\u5851\u6743\u529b\u2014\u89c4\u5219\u5e73\u8861\uff0c\u56de\u5f52\"\u56fd\u9645\u516c\u5171\u7269\u54c1\u63d0\u4f9b\u8005\"\u7684\u521d\u5fc3\uff08\u53c2\u89c1 Krasner 1983\uff1b\u57fa\u6b27\u6c49 1984\uff1bStrange\u300a\u56fd\u5bb6\u4e0e\u5e02\u573a\u300b\uff1b\u7530\u91ce\u7b2c\u56db\u7ae0\uff1b\u5b8b\u65b0\u5b81/\u9648\u5cb3\u7b2c\u4e94\u7ae0\uff09\u3002\n\n### 7. \u8bba\u8ff0\u5f71\u54cd\u4e00\u56fd\u6c47\u7387\u5236\u5ea6\u9009\u62e9\u7684\u653f\u6cbb\u56e0\u7d20\u3010\u6a21\u62df-4\u3011\n\n\u6c47\u7387\u5236\u5ea6\u9009\u62e9\uff08\u56fa\u5b9a vs \u6d6e\u52a8 vs \u4e2d\u95f4\u5236\u5ea6\uff09\u4e0d\u4ec5\u662f\u6280\u672f\u7ecf\u6d4e\u95ee\u9898\uff0c\u66f4\u6df1\u523b\u5730\u53cd\u6620\u56fd\u5185\u653f\u6cbb\u7ed3\u6784\u4e0e\u56fd\u9645\u653f\u6cbb\u4f4d\u7f6e\u3002\u4e3b\u8981\u653f\u6cbb\u56e0\u7d20\u5305\u62ec\uff1a\n\n**\u4e00\u3001Mundell-Fleming \u4e0d\u53ef\u80fd\u4e09\u89d2\u7684\u653f\u6cbb\u542b\u4e49**\n\n\u8499\u4ee3\u5c14-\u5f17\u83b1\u660e\u6a21\u578b\u63ed\u793a\uff1a**\u8d44\u672c\u81ea\u7531\u6d41\u52a8\u3001\u56fa\u5b9a\u6c47\u7387\u3001\u72ec\u7acb\u8d27\u5e01\u653f\u7b56\u4e09\u8005\u4e0d\u53ef\u517c\u5f97**\u3002\u4e00\u56fd\u5fc5\u987b\u653e\u5f03\u5176\u4e2d\u4e00\u9879\uff0c\u800c\u653e\u5f03\u54ea\u4e00\u9879\u662f\u653f\u6cbb\u9009\u62e9\uff1a\n- \u9009\u62e9\"\u56fa\u5b9a\u6c47\u7387 + \u8d44\u672c\u81ea\u7531 + \u727a\u7272\u8d27\u5e01\u653f\u7b56\u72ec\u7acb\"\u2014\u2014\u6b27\u5143\u533a\uff08\u9664\u5fb7\u56fd\uff09\u3001\u9999\u6e2f\uff1b\n- \u9009\u62e9\"\u56fa\u5b9a\u6c47\u7387 + \u8d27\u5e01\u72ec\u7acb + \u8d44\u672c\u7ba1\u5236\"\u2014\u2014\u6539\u9769\u5f00\u653e\u521d\u671f\u4e2d\u56fd\u3001\u9a6c\u6765\u897f\u4e9a\uff1b\n- \u9009\u62e9\"\u6d6e\u52a8\u6c47\u7387 + \u8d44\u672c\u81ea\u7531 + \u8d27\u5e01\u72ec\u7acb\"\u2014\u2014\u7f8e\u3001\u82f1\u3001\u65e5\u3001\u52a0\u3002\n\n**\u4e8c\u3001\u56fd\u5185\u653f\u6cbb\u5236\u5ea6\u56e0\u7d20**\n\n1. **\u9009\u4e3e\u5236\u5ea6**\uff08Bernhard & Leblang\uff09\uff1a\n   - \u591a\u6570\u4ee3\u8868\u5236 \u2192 \u5355\u4e00\u653f\u515a\u653f\u5e9c \u2192 \u503e\u5411**\u6d6e\u52a8\u6c47\u7387**\uff08\u4fdd\u7559\u8d27\u5e01\u72ec\u7acb\u7528\u4e8e\u653f\u6cbb\u5468\u671f\uff09\uff1b\n   - \u6bd4\u4f8b\u4ee3\u8868\u5236 \u2192 \u8054\u5408\u653f\u5e9c \u2192 \u503e\u5411**\u56fa\u5b9a\u6c47\u7387/\u8d27\u5e01\u8054\u76df**\uff08\u5916\u90e8\u951a\u89e3\u51b3\u5185\u90e8\u5206\u6b67\uff09\uff1b\n2. **\u592e\u884c\u72ec\u7acb\u6027**\uff1a\u72ec\u7acb\u592e\u884c\u504f\u597d\u6d6e\u52a8\uff1b\u884c\u653f\u4e3b\u5bfc\u592e\u884c\u503e\u5411\u56fa\u5b9a\u4ee5\u7ea6\u675f\u81ea\u8eab\uff1b\n3. **\u653f\u6cbb\u4f53\u5236**\uff1a\u5a01\u6743\u653f\u4f53\u53ef\u5f3a\u529b\u7ef4\u6301\u56fa\u5b9a\u6c47\u7387\uff08\u5982\u9999\u6e2f\u8054\u7cfb\u6c47\u7387\uff09\uff0c\u4f46\u6613\u56e0\u50a8\u5907\u8017\u5c3d\u800c\u5d29\u6e83\u3002\n\n**\u4e09\u3001\u5229\u76ca\u96c6\u56e2\u653f\u6cbb\uff08Frieden \u8303\u5f0f\uff09**\n\n\u4e0d\u540c\u90e8\u95e8\u5bf9\u6c47\u7387\u5236\u5ea6\u6709\u4e0d\u540c\u504f\u597d\uff1a\n1. **\u53ef\u8d38\u6613\u54c1\u90e8\u95e8\uff08\u51fa\u53e3\u3001\u8fdb\u53e3\u7ade\u4e89\uff09**\uff1a\u504f\u597d**\u7a33\u5b9a\u4e14\u4f4e\u4f30**\u7684\u6c47\u7387\uff0c\u56e0\u6b64\u503e\u5411\u56fa\u5b9a/\u7ba1\u7406\uff1b\n2. **\u975e\u8d38\u6613\u54c1\u90e8\u95e8\uff08\u5730\u4ea7\u3001\u96f6\u552e\u3001\u672c\u5730\u670d\u52a1\uff09**\uff1a\u504f\u597d\u7a33\u5b9a\u4f46\u4e0d\u5728\u610f\u6c34\u5e73\uff0c\u56e0\u6b64\u503e\u5411\u56fa\u5b9a\uff1b\n3. **\u91d1\u878d\u90e8\u95e8\uff08\u8de8\u5883\u8d44\u91d1\u8fd0\u4f5c\uff09**\uff1a\u504f\u597d**\u6d6e\u52a8 + \u8d44\u672c\u81ea\u7531**\uff0c\u56e0\u4e3a\u6d6e\u52a8\u8d4b\u4e88\u5957\u5229\u7a7a\u95f4\u548c\u7ba1\u7406\u5de5\u5177\uff1b\n4. **\u8de8\u5883\u5de5\u4f5c\u8005**\uff1a\u504f\u597d\u7a33\u5b9a\uff08\u6c47\u6b3e\u4ef7\u503c\u7a33\u5b9a\uff09\uff1b\n5. **\u8fdb\u53e3\u6d88\u8d39\u54c1\u6d88\u8d39\u8005**\uff1a\u504f\u597d\u9ad8\u4f30\u6c47\u7387\uff08\u8d2d\u4e70\u529b\u5f3a\uff09\u3002\n\n**Frieden \u547d\u9898**\uff1a\u4ee5\u5236\u9020\u4e1a\u4e3a\u4e3b\u7684\u56fd\u5bb6\uff08\u5fb7\u56fd\u3001\u65e5\u672c\uff09\u503e\u5411\u9009\u62e9\u7a33\u5b9a/\u7ba1\u7406\u6c47\u7387\uff1b\u4ee5\u91d1\u878d\u4e1a\u4e3a\u4e3b\u7684\u56fd\u5bb6\uff08\u82f1\u56fd\u3001\u745e\u58eb\uff09\u503e\u5411\u6d6e\u52a8\uff1b\u670d\u52a1\u51fa\u53e3\u5927\u56fd\uff08\u745e\u58eb\u3001\u65b0\u52a0\u5761\uff09\u60c5\u51b5\u590d\u6742\u3002\n\n**\u56db\u3001\u793e\u4f1a\u8054\u76df\uff08Rogowski/Hiscox\uff09**\n\n\u793e\u4f1a\u8054\u76df\u5f62\u6001\u51b3\u5b9a\u6c47\u7387\u653f\u6cbb\uff1a\n1. **\u8981\u7d20\u6d41\u52a8\u9ad8 + \u8d44\u672c\u4e30\u88d5\u56fd**\uff1a\u8d44\u672c\u53ef\u80fd\u8054\u5408\u53cd\u5bf9\u5e01\u503c\u9ad8\u4f30\u3001\u4fdd\u62a4\u5236\u9020\u4e1a\uff1b\n2. **\u8981\u7d20\u6d41\u52a8\u4f4e + \u51fa\u53e3\u90e8\u95e8\u96c6\u4e2d**\uff1a\u90e8\u95e8\u5185\u8054\u76df\u4e3b\u5bfc\uff0c\u5f3a\u529b\u63a8\u52a8\u6c47\u7387\u652f\u6301\u51fa\u53e3\uff1b\n3. **\u8981\u7d20\u4e30\u88d5\u5ea6\u5dee\u5f02\u5927**\uff1a\u9636\u7ea7\u51b2\u7a81\u6fc0\u70c8\uff0c\u6c47\u7387\u5236\u5ea6\u6210\u4e3a\u5206\u914d\u653f\u6cbb\u7126\u70b9\uff08\u62c9\u7f8e\u9ad8\u901a\u80c0\u5386\u53f2\uff09\u3002\n\n**\u4e94\u3001\u56fd\u9645\u653f\u6cbb\u4f4d\u7f6e\u56e0\u7d20**\n\n1. **\u9738\u6743\u8d27\u5e01\u5730\u4f4d**\uff1a\u53d1\u884c\u56fd\u9645\u50a8\u5907\u8d27\u5e01\u7684\u56fd\u5bb6\uff08\u7f8e\u56fd\uff09\u503e\u5411\u6d6e\u52a8\uff08\u4eab\u6709\"\u8d85\u989d\u7279\u6743\"\uff09\uff1b\n2. **\u8d27\u5e01\u951a\u9009\u62e9**\uff1a\u4e2d\u5c0f\u56fd\u5e38\u9489\u4f4f\u4e3b\u8981\u8d38\u6613\u4f19\u4f34\u8d27\u5e01\uff08\u897f\u975e\u56fd\u5bb6\u9489\u6b27\u5143\u3001\u6d77\u6e7e\u56fd\u5bb6\u9489\u7f8e\u5143\uff09\uff1b\n3. **\u8054\u76df\u4e0e\u5b89\u5168\u5173\u7cfb**\uff1a\u5b89\u5168\u4f9d\u8d56\u7f8e\u56fd \u2192 \u8d27\u5e01\u4e5f\u5e38\u9489\u7f8e\u5143\uff08\u6c99\u7279\u3001\u5df4\u6797\uff09\uff1b\n4. **\u53bb\u7f8e\u5143\u5316\u538b\u529b**\uff1a\u6b27\u5143\u533a\u3001\u4eba\u6c11\u5e01\u56fd\u9645\u5316\u7b49\u53cd\u6620\u5bf9\u7f8e\u5143\u9738\u6743\u7684\u5bf9\u51b2\u3002\n\n**\u516d\u3001\u5371\u673a\u9a71\u52a8\u7684\u5236\u5ea6\u5207\u6362**\n\n\u6c47\u7387\u5236\u5ea6\u9009\u62e9\u5e38\u56e0\u5371\u673a\u800c\u88ab\u52a8\u8c03\u6574\uff1a\n1. **1971 \u5e03\u96f7\u987f\u68ee\u6797\u5d29\u6e83**\uff1a\u7f8e\u56fd\u8131\u94a9\u9ec4\u91d1\uff0c\u4e3b\u8981\u56fd\u5bb6\u88ab\u8feb\u6d6e\u52a8\uff1b\n2. **1992 \u82f1\u9551\u5371\u673a**\uff1a\u82f1\u56fd\u88ab\u8feb\u9000\u51fa ERM\uff1b\n3. **1997 \u4e9a\u6d32\u91d1\u878d\u5371\u673a**\uff1a\u6cf0\u56fd\u3001\u97e9\u56fd\u3001\u5370\u5c3c\u88ab\u8feb\u4ece\u56fa\u5b9a\u6539\u4e3a\u6d6e\u52a8\uff1b\n4. **2010 \u6b27\u503a\u5371\u673a**\uff1a\u5e0c\u814a\u7b49\u88ab\u8feb\u63a5\u53d7\u8d22\u653f\u7d27\u7f29\u4ee5\u7ef4\u6301\u6b27\u5143\uff1b\n5. **2014 \u4fc4\u7f57\u65af\u5362\u5e03\u5371\u673a**\uff1a\u4fc4\u88ab\u8feb\u6d6e\u52a8\uff1b\n6. **2022 \u897f\u65b9\u5236\u88c1\u540e**\uff1a\u4fc4\u7f57\u65af\u56de\u5230\u8d44\u672c\u7ba1\u5236 + \u7ba1\u7406\u6d6e\u52a8\u3002\n\n**\u4e03\u3001\u4e2d\u56fd\u6c47\u7387\u5236\u5ea6\u6f14\u53d8\u7684\u653f\u6cbb\u5206\u6790**\n\n1. **1979\u20141994**\uff1a\u53cc\u8f68\u5236\uff08\u5b98\u5b9a\u6c47\u7387 + \u8c03\u5242\u5e02\u573a\uff09\uff0c\u53cd\u6620\u5916\u6c47\u77ed\u7f3a\u4e0e\u8ba1\u5212\u4f53\u5236\u6b8b\u4f59\uff1b\n2. **1994 \u6c47\u7387\u5e76\u8f68**\uff1a\u5efa\u7acb\u6709\u7ba1\u7406\u7684\u6d6e\u52a8\u6c47\u7387\u5236\u5ea6\uff0c\u4e0e\u5916\u8d38\u4f53\u5236\u6539\u9769\u914d\u5957\uff1b\n3. **2005 \u6c47\u6539**\uff1a\u53c2\u8003\u4e00\u7bee\u5b50\u8d27\u5e01\u3001\u6709\u7ba1\u7406\u6d6e\u52a8\uff1b7 \u5e74\u7d2f\u8ba1\u5347\u503c 21%\uff1b\n4. **2015 \"8\u00b711\" \u6c47\u6539**\uff1a\u4e2d\u95f4\u4ef7\u5b9a\u4ef7\u673a\u5236\u6539\u9769\uff0c\u5f15\u5165\"\u6536\u76d8\u4ef7 + \u4e00\u7bee\u5b50 + \u9006\u5468\u671f\u56e0\u5b50\"\uff1b\n5. **2022 \u540e**\uff1a\u4eba\u6c11\u5e01\u53cc\u5411\u6ce2\u52a8\u52a0\u5927\uff0c\u5bf9\u7f8e\u5143\u4e00\u5ea6\u8dcc\u7834 7.3\uff0c\u592e\u884c\u5f3a\u8c03\"\u6c47\u7387\u4e0d\u662f\u5de5\u5177\"\u3002\n\n**\u653f\u6cbb\u8003\u91cf**\uff1a\n- \u5916\u8d38\u51fa\u53e3\u96c6\u56e2 vs \u8fdb\u53e3\u5546 vs \u91d1\u878d\u5e02\u573a\u7684\u535a\u5f08\uff1b\n- \"\u4fdd\u6c47\u7387\"vs\"\u4fdd\u50a8\u5907\"\u7684\u653f\u6cbb\u9009\u62e9\uff1b\n- \u4eba\u6c11\u5e01\u56fd\u9645\u5316\u63a8\u8fdb\u5bf9\u6c47\u7387\u5e02\u573a\u5316\u7684\u8981\u6c42\uff1b\n- \u4e2d\u7f8e\u6218\u7565\u535a\u5f08\u5bf9\u6c47\u7387\u653f\u7b56\u7684\u5916\u90e8\u7ea6\u675f\u3002\n\n**\u516b\u3001\u653f\u7b56\u542b\u4e49**\n\n1. \u6ca1\u6709\"\u6700\u4f18\u6c47\u7387\u5236\u5ea6\"\uff0c\u5173\u952e\u662f\u4e0e\u56fd\u5185\u653f\u6cbb\u3001\u4ea7\u4e1a\u7ed3\u6784\u3001\u56fd\u9645\u4f4d\u7f6e\u76f8\u5339\u914d\uff1b\n2. **\u89d2\u70b9\u89e3\u5047\u8bf4**\uff08McKinnon/Fischer\uff09\uff1a\u53ea\u6709\u5b8c\u5168\u56fa\u5b9a\uff08\u8d27\u5e01\u8054\u76df\u3001\u8d27\u5e01\u5c40\uff09\u6216\u81ea\u7531\u6d6e\u52a8\u53ef\u6301\u7eed\uff0c\u4e2d\u95f4\u5236\u5ea6\u8106\u5f31\u2014\u2014\u4f46\u4e2d\u56fd\"\u7ba1\u7406\u6d6e\u52a8 + \u8d44\u672c\u7ba1\u5236\"\u662f\u53cd\u4f8b\uff1b\n3. \u6c47\u7387\u5236\u5ea6\u53ef\u9010\u6b65\u6f14\u53d8\uff0c\u8def\u5f84\u4f9d\u8d56\u660e\u663e\uff08\u53c2\u89c1 Frieden\u300aCurrency Politics\u300b\uff1bBernhard & Leblang\uff1b\u7530\u91ce\u7b2c\u516d\u7ae0\uff09\u3002\n\n**\u4e5d\u3001\u7ed3\u8bba**\n\n\u6c47\u7387\u5236\u5ea6\u9009\u62e9\u662f**\u56fd\u5185\u653f\u6cbb\u5236\u5ea6\u3001\u5229\u76ca\u96c6\u56e2\u3001\u56fd\u9645\u4f4d\u7f6e\u3001\u5371\u673a\u7ecf\u9a8c**\u5171\u540c\u5851\u9020\u7684\u4ea7\u7269\u3002\u5176\u672c\u8d28\u662f\u5206\u914d\u653f\u6cbb\uff1a\u8c01\u53d7\u76ca\u3001\u8c01\u4ed8\u51fa\u4ee3\u4ef7\u3002\u4e2d\u56fd\u5728\u65b0\u65f6\u4ee3\u6c47\u7387\u653f\u7b56\u7684\u65b9\u5411\u5e94\u662f**\u7a33\u6b65\u63a8\u8fdb\u5e02\u573a\u5316 + \u914d\u5957\u8d44\u672c\u8d26\u6237\u5ba1\u614e\u5f00\u653e + \u52a0\u5f3a\u5b8f\u89c2\u5ba1\u614e\u7ba1\u7406**\uff0c\u5728\u4e0d\u53ef\u80fd\u4e09\u89d2\u7ea6\u675f\u4e0b\u627e\u5230\u7b26\u5408\u81ea\u8eab\u5229\u76ca\u7ed3\u6784\u7684\u5e73\u8861\uff08\u53c2\u89c1 Frieden 2015\uff1b\u7530\u91ce\u7b2c\u516d\u7ae0\uff1b\u7fdf\u4e1c\u5347\u76f8\u5173\u7814\u7a76\uff09\u3002\n\n### 8. \u8fd0\u7528\u6240\u5b66 IPE \u7406\u8bba\u5206\u6790\u7f8e\u5143\u9738\u6743\u7814\u7a76\u3010\u6a21\u62df-4\u3011\n\n\u7f8e\u5143\u9738\u6743\u662f\u5f53\u4ee3\u56fd\u9645\u653f\u6cbb\u7ecf\u6d4e\u5b66\u7684\u6838\u5fc3\u8bae\u9898\u3002\u5176\u5f62\u6210\u3001\u7ef4\u7cfb\u4e0e\u672a\u6765\u6784\u6210 IPE \u7406\u8bba\u5e94\u7528\u7684\u4e30\u5bcc\u573a\u57df\u3002\n\n**\u4e00\u3001\u7f8e\u5143\u9738\u6743\u7684\u6982\u5ff5\u4e0e\u8868\u73b0**\n\n\u7f8e\u5143\u9738\u6743\uff08dollar hegemony\uff09\u6307\u7f8e\u5143\u5728\u56fd\u9645\u8d27\u5e01\u4f53\u7cfb\u4e2d\u4eab\u6709**\u7ed3\u6784\u6027\u4e3b\u5bfc\u5730\u4f4d**\uff0c\u8868\u73b0\u4e3a\uff1a\n1. **\u7ed3\u7b97\u8d27\u5e01**\uff1a\u7ea6 40% \u7684\u5168\u7403\u8d38\u6613\u300180% \u4ee5\u4e0a\u7684\u8de8\u5883\u652f\u4ed8\u4ee5\u7f8e\u5143\u8ba1\u4ef7\uff1b\n2. **\u50a8\u5907\u8d27\u5e01**\uff1a\u7ea6 58% \u7684\u5168\u7403\u5916\u6c47\u50a8\u5907\u4e3a\u7f8e\u5143\uff08IMF COFER\uff09\uff1b\n3. **\u5927\u5b97\u5546\u54c1\u5b9a\u4ef7**\uff1a\u77f3\u6cb9\u3001\u9ec4\u91d1\u3001\u94dc\u3001\u94c1\u77ff\u77f3\u7b49\u4ee5\u7f8e\u5143\u5b9a\u4ef7\uff1b\n4. **\u91d1\u878d\u5e02\u573a\u57fa\u51c6**\uff1a\u7f8e\u5143\u5229\u7387\uff08SOFR\uff09\u6210\u4e3a\u5168\u7403\u8d44\u91d1\u6210\u672c\u57fa\u51c6\uff1b\n5. **\u57fa\u7840\u8bbe\u65bd\u4e3b\u5bfc**\uff1aSWIFT\u3001CHIPS\u3001Fedwire \u6784\u6210\u5168\u7403\u7f8e\u5143\u6e05\u7b97\u9aa8\u67b6\uff1b\n6. **\u8d85\u989d\u7279\u6743**\uff08exorbitant privilege\uff0c\u6234\u9ad8\u4e50\uff09\uff1a\u7f8e\u56fd\u53ef\u4f4e\u6210\u672c\u878d\u8d44\u5176\u7ecf\u5e38\u8d26\u6237\u8d64\u5b57\u3002\n\n**\u4e8c\u3001\u5f62\u6210\u7684\u5386\u53f2\u8def\u5f84\uff08\u8def\u5f84\u4f9d\u8d56\u89c6\u89d2\uff09**\n\n1. **1944 \u5e03\u96f7\u987f\u68ee\u6797\u4f1a\u8bae**\uff1a\u6000\u7279\u65b9\u6848\u80dc\u51fa\uff0c\u786e\u7acb\u7f8e\u5143\u2014\u9ec4\u91d1\u53cc\u6302\u94a9\uff1b\n2. **\u9a6c\u6b47\u5c14\u8ba1\u5212**\uff1a\u7f8e\u5143\u6ce8\u5165\u6b27\u6d32\uff0c\u5de9\u56fa\u7f8e\u5143\u6e05\u7b97\u5730\u4f4d\uff1b\n3. **1971 \u9ec4\u91d1\u8131\u94a9**\uff1a\u5c3c\u514b\u677e\u8131\u91d1\u540e\u7f8e\u5143\u6210\u4e3a\u4e0d\u53ef\u5151\u6362\u6cd5\u5e01\uff0c\u4f46\u56e0\"\u8def\u5f84\u4f9d\u8d56\"\uff08\u5e02\u573a\u6d41\u52a8\u6027\u3001\u5b89\u5168\u8d44\u4ea7\u3001\u7f51\u7edc\u6548\u5e94\uff09\u5730\u4f4d\u53cd\u800c\u5f3a\u5316\uff1b\n4. **1974 \u77f3\u6cb9\u7f8e\u5143**\uff1a\u7f8e\u6c99\u534f\u8bae\u2014\u2014OPEC \u63a5\u53d7\u7f8e\u5143\u5b9a\u4ef7 \u2192 \u77f3\u6cb9\u7f8e\u5143\u5faa\u73af\uff1b\n5. **1980\u20142000 \u5e74\u4ee3**\uff1a\u91d1\u878d\u81ea\u7531\u5316\u3001\u534e\u5c14\u8857\u4e3b\u5bfc\u5168\u7403\u8d44\u672c\u6d41\u52a8 \u2192 \u7f8e\u5143\u91d1\u878d\u7f51\u7edc\u5168\u7403\u6e17\u900f\uff1b\n6. **\u540e\u51b7\u6218 + WTO + \u5168\u7403\u5316**\uff1a\u6269\u5927\u7f8e\u5143\u8d38\u6613\u9700\u6c42\uff0c\u8fdb\u4e00\u6b65\u56fa\u5316\u5730\u4f4d\u3002\n\n**\u4e09\u3001\u7ef4\u7cfb\u7684\u7ed3\u6784\u6027\u57fa\u7840\uff08\u65af\u7279\u5170\u5947\u7ed3\u6784\u6027\u6743\u529b\u89c6\u89d2\uff09**\n\n1. **\u5b89\u5168\u7ed3\u6784**\uff1a\u7f8e\u56fd\u519b\u4e8b\u9738\u6743\u4e0e\u76df\u56fd\u4f53\u7cfb\u63d0\u4f9b\"\u5b89\u5168\u6ea2\u4ef7\"\uff0c\u4f7f\u7f8e\u5143\u6210\u4e3a\u5b89\u5168\u8d44\u4ea7\u9996\u9009\uff1b\n2. **\u751f\u4ea7\u7ed3\u6784**\uff1a\u7f8e\u56fd\u4e3b\u5bfc\u9ad8\u7aef\u4ef7\u503c\u94fe \u2192 \u5168\u7403\u4f9d\u8d56\u4ee5\u7f8e\u5143\u7ed3\u7b97\u9ad8\u7aef\u4e2d\u95f4\u54c1\uff1b\n3. **\u91d1\u878d\u7ed3\u6784**\uff1a\u2460\u7f8e\u56fd\u56fd\u503a\u662f\u5168\u7403\u6700\u6df1\u3001\u6700\u5e7f\u3001\u6700\u53ef\u9760\u7684\u5b89\u5168\u8d44\u4ea7\u5e02\u573a\uff1b\u2461\u7f8e\u5143\u662f SWIFT \u7684\u4e3b\u5bfc\u8ba1\u4ef7\u5355\u4f4d\uff1b\u2462\u7f8e\u8054\u50a8\u662f\u4e8b\u5b9e\u4e0a\u7684\u5168\u7403\u6700\u540e\u8d37\u6b3e\u4eba\uff08\u901a\u8fc7\u6d41\u52a8\u6027\u4e92\u6362\u7f51\u7edc\uff09\uff1b\n4. **\u77e5\u8bc6\u7ed3\u6784**\uff1a\u2460\u7f8e\u5f0f\u91d1\u878d\u7406\u8bba\u4e0e\u76d1\u7ba1\u6846\u67b6\uff08\u5df4\u585e\u5c14\u534f\u8bae\u3001IFRS\u3001\u4fe1\u7528\u8bc4\u7ea7\uff09\uff1b\u2461\u82f1\u8bed\u4f5c\u4e3a\u91d1\u878d\u4e1a\u901a\u7528\u8bed\uff1b\u2462\u534e\u5c14\u8857\u2014\u667a\u5e93\u2014\u5927\u5b66\u7f51\u7edc\u6784\u5efa\u4e3b\u6d41\u91d1\u878d\u8bdd\u8bed\u3002\n\n**\u56db\u3001\u7f51\u7edc\u5916\u90e8\u6027\u4e0e\u8def\u5f84\u4f9d\u8d56**\n\n1. **\u7f51\u7edc\u6548\u5e94**\uff1a\u5927\u5bb6\u7528\u7f8e\u5143 \u2192 \u6bcf\u4e2a\u4eba\u7ee7\u7eed\u7528\u7f8e\u5143\u66f4\u4fbf\u5229 \u2192 \u5de9\u56fa\u7f8e\u5143\u4e3b\u5bfc\uff08\u7c7b\u4f3c Windows\u3001\u82f1\u8bed\uff09\uff1b\n2. **\u6c89\u6ca1\u6210\u672c**\uff1a\u91d1\u878d\u673a\u6784 IT \u7cfb\u7edf\u3001\u4f01\u4e1a\u8d22\u52a1\u6d41\u7a0b\u6df1\u5ea6\u5d4c\u5165\u7f8e\u5143 \u2192 \u5207\u6362\u6210\u672c\u5de8\u5927\uff1b\n3. **\u9884\u671f\u534f\u8c03**\uff1a\u7f8e\u5143\u88ab\u9884\u671f\u4e3a\"\u672a\u6765\u4e3b\u5bfc\u8d27\u5e01\" \u2192 \u81ea\u6211\u5b9e\u73b0\u3002\n\n**\u4e94\u3001\u7f8e\u5143\u9738\u6743\u7684\u653f\u6cbb\u7ecf\u6d4e\u6536\u76ca**\n\n1. **\u94f8\u5e01\u7a0e**\uff1a\u53d1\u884c\u56fd\u9645\u8d27\u5e01\u7684\u8d22\u653f\u6536\u76ca\uff08\u7ea6 GDP 0.3\u20140.5%\uff09\uff1b\n2. **\u8d85\u989d\u501f\u8d37\u80fd\u529b**\uff1a\u53ef\u5728\u7ecf\u6d4e\u4e0b\u884c\u65f6\u7ef4\u6301\u8d64\u5b57\u878d\u8d44\uff1b\n3. **\u91d1\u878d\u5236\u88c1\u5de5\u5177**\uff1a\u901a\u8fc7 SWIFT \u5207\u65ad\u3001\u8d44\u4ea7\u51bb\u7ed3\u3001\"\u957f\u81c2\u7ba1\u8f96\"\u7b49\u5236\u88c1\u5bf9\u624b\uff08\u4f0a\u6717\u3001\u4fc4\u7f57\u65af\u3001\u671d\u9c9c\uff09\uff1b\n4. **\u8d27\u5e01\u4e3b\u6743\u5916\u6ea2**\uff1a\u7f8e\u8054\u50a8\u653f\u7b56\u5916\u6ea2\u5168\u7403\uff0c\u4f46\u5176\u4ed6\u56fd\u5bb6\u653f\u7b56\u5916\u6ea2\u56de\u7f8e\u56fd\u6709\u9650\uff1b\n5. **\u5b8f\u89c2\u5f39\u6027**\uff1a\u7f8e\u56fd\u53ef\u627f\u62c5\u66f4\u5927\u8d22\u653f\u8d64\u5b57\u3001\u66f4\u9ad8\u516c\u5171\u503a\u52a1\u800c\u4e0d\u81f4\u5371\u673a\u3002\n\n**\u516d\u3001\u7f8e\u5143\u9738\u6743\u7684\u4ee3\u4ef7\u4e0e\u6096\u8bba**\n\n1. **\u7279\u91cc\u82ac\u96be\u9898**\uff1a\u7f8e\u56fd\u5fc5\u987b\u7ef4\u6301\u7ecf\u5e38\u8d26\u6237\u9006\u5dee\u4ee5\u5411\u4e16\u754c\u63d0\u4f9b\u7f8e\u5143 \u2192 \u957f\u671f\u524a\u5f31\u672c\u5e01\u4fe1\u7528\uff1b\n2. **\"\u8fc7\u5ea6\u7279\u6743\"\u53cd\u566c\"**\uff1a\u8fc7\u5ea6\u4f9d\u8d56\u7f8e\u5143\u56fd\u9645\u5730\u4f4d \u2192 \u5236\u9020\u4e1a\u7a7a\u5fc3\u5316\u3001\u4ea7\u4e1a\u8f6c\u79fb\u3001\u793e\u4f1a\u5206\u5316\uff08\u94c1\u9508\u5e26\uff09\uff1b\n3. **\u91d1\u878d\u5236\u88c1\u6ee5\u7528\u7684\u53cd\u5411\u6548\u5e94**\uff1a\u4fc3\u4f7f\u4fc4\u3001\u4f0a\u6717\u3001\u4e2d\u56fd\u52a0\u5feb\u53bb\u7f8e\u5143\u5316\uff1b\n4. **\u653f\u6cbb\u6781\u5316\u4e0e\u503a\u52a1\u4e0a\u9650\u653f\u6cbb**\uff1a\u7f8e\u56fd\u56fd\u5185\u653f\u6cbb\u4e0d\u7a33\u5b9a\u5a01\u80c1\u7f8e\u5143\u4fe1\u8a89\u3002\n\n**\u4e03\u3001\u53bb\u7f8e\u5143\u5316\u4e0e\u6311\u6218**\n\n1. **\u6b27\u5143\u7684\u6311\u6218\uff081999\u20142010\uff09**\uff1a\u6b27\u503a\u5371\u673a\u540e\u589e\u957f\u653e\u7f13\uff0c\u4f46\u4f5c\u4e3a\u7b2c\u4e8c\u5927\u50a8\u5907\u8d27\u5e01\u5730\u4f4d\u7a33\u5b9a\uff1b\n2. **\u4eba\u6c11\u5e01\u56fd\u9645\u5316**\uff1a\u8de8\u5883\u652f\u4ed8\u5360\u6bd4\u4e0a\u5347\u4f46\u50a8\u5907\u4efd\u989d\u4ecd\u5c0f\uff08\u7ea6 2\u20143%\uff09\uff1b\n3. **\u6570\u5b57\u4eba\u6c11\u5e01 + CIPS**\uff1a\u6784\u5efa\u66ff\u4ee3\u6027\u6e05\u7b97\u57fa\u7840\u8bbe\u65bd\uff1b\n4. **\u91d1\u7816\u56fd\u5bb6\u672c\u5e01\u7ed3\u7b97**\uff1a\u672c\u5e01\u7ed3\u7b97\u6269\u5927\u4f46\u4ecd\u5728\u8fb9\u7f18\uff1b\n5. **\u9ec4\u91d1\u56de\u5f52**\uff1a\u592e\u884c\u9ec4\u91d1\u8d2d\u4e70\u6fc0\u589e\uff0c\u90e8\u5206\u5bf9\u51b2\u7f8e\u5143\u98ce\u9669\uff1b\n6. **SDR \u4e0e\"\u8d85\u4e3b\u6743\u8d27\u5e01\"**\uff1a\u5468\u5c0f\u5ddd 2009 \u6587\u7ae0\u91cd\u63d0\uff0c\u4f46\u5b9e\u64cd\u63a8\u8fdb\u6709\u9650\uff1b\n7. **\u7a33\u5b9a\u5e01\u4e0e CBDC**\uff1a\u6280\u672f\u5c42\u9762\u63d0\u4f9b\u6f5c\u5728\u66ff\u4ee3\u8def\u5f84\u3002\n\n**\u516b\u3001\u6279\u5224\u7406\u8bba\u89c6\u89d2\uff08\u8003\u514b\u65af/\u5409\u5c14\uff09**\n\n\u65b0\u845b\u5170\u897f\u4e3b\u4e49\u89c6\u7f8e\u5143\u9738\u6743\u4e3a\uff1a\n1. **\u8de8\u56fd\u8d44\u672c\u4e3b\u4e49\u9636\u7ea7 + \u7f8e\u56fd\u56fd\u5bb6 + \u56fd\u9645\u91d1\u878d\u5236\u5ea6**\u7684\"\u5386\u53f2\u96c6\u56e2\"\uff1b\n2. \u901a\u8fc7 IMF\u3001\u4e16\u884c\u3001\u5df4\u585e\u5c14\u534f\u8bae\u3001\u7f8e\u8054\u50a8\u6784\u6210\"\u7f8e\u5143\u9738\u6743 + \u65b0\u81ea\u7531\u4e3b\u4e49\"\u7684\u5168\u7403\u6cbb\u7406\u7ed3\u6784\uff1b\n3. \u5176\u5d29\u6e83\u9700\u8981\u65b0\u7684\"\u5386\u53f2\u96c6\u56e2\"\u2014\u2014\u5305\u62ec\u65b0\u5174\u5927\u56fd + \u5168\u7403\u5357\u65b9 + \u56fd\u5185\u53cd\u65b0\u81ea\u7531\u4e3b\u4e49\u8fd0\u52a8\u7684\u8054\u5408\u3002\n\n**\u4e5d\u3001\u4e2d\u56fd\u6218\u7565\u9009\u9879**\n\n1. **\u7a33\u5065\u53bb\u7f8e\u5143\u5316**\uff1a\u800c\u975e\u6025\u4e8e\"\u6311\u6218\"\uff1b\n2. **\u4eba\u6c11\u5e01\u56fd\u9645\u5316**\uff1a\u7a33\u6b65\u63a8\u8fdb\uff0c\u91cd\u70b9\u5728\u5927\u5b97\u5546\u54c1\u5b9a\u4ef7\u3001\u8de8\u5883\u652f\u4ed8\u3001\u50a8\u5907\u8d27\u5e01\u529f\u80fd\uff1b\n3. **\u5efa\u8bbe\u66ff\u4ee3\u57fa\u7840\u8bbe\u65bd**\uff1aCIPS\u3001\u6570\u5b57\u4eba\u6c11\u5e01\u3001\u8de8\u5883\u652f\u4ed8\u4e92\u8054\uff1b\n4. **\u591a\u8fb9\u5e03\u5c40**\uff1a\u91d1\u7816\u5e94\u6025\u50a8\u5907\u3001\u53cc\u8fb9\u4e92\u6362\u3001SDR \u6539\u9769\uff1b\n5. **\u56fd\u5185\u5b8f\u89c2\u7a33\u5065**\uff1a\u4fdd\u6301\u4f4e\u901a\u80c0\u3001\u7a33\u5b9a\u589e\u957f\u3001\u5408\u7406\u8d1f\u503a\u7387\uff0c\u4e3a\u4eba\u6c11\u5e01\u56fd\u9645\u5316\u63d0\u4f9b\u57fa\u7840\uff1b\n6. **\u907f\u514d\u5bf9\u6297\u6fc0\u53d1\u53cd\u5f39**\uff1a\u5faa\u5e8f\u6e10\u8fdb\uff0c\u501f\u673a\u4e0d\u6311\u6218\uff1b\n7. **\u7ba1\u7406\u91d1\u878d\u5236\u88c1\u98ce\u9669**\uff1a\u5206\u6563\u50a8\u5907\u3001\u63d0\u5347\u9ec4\u91d1\u5360\u6bd4\u3001\u63a8\u52a8\u7ed3\u7b97\u591a\u5143\u5316\u3002\n\n**\u5341\u3001\u7406\u8bba\u7ed3\u8bba**\n\n\u7f8e\u5143\u9738\u6743\u662f**\u7ed3\u6784\u6027\u6743\u529b\u3001\u8def\u5f84\u4f9d\u8d56\u3001\u7f51\u7edc\u5916\u90e8\u6027\u3001\u9738\u6743\u79e9\u5e8f**\u591a\u91cd\u673a\u5236\u7684\u7efc\u5408\u4ea7\u7269\uff0c\u96be\u4ee5\u88ab\u77ed\u671f\u98a0\u8986\u4f46\u6b63\u9762\u4e34\u5185\u90e8\u77db\u76fe\uff08\u7279\u91cc\u82ac\u96be\u9898\u3001\u653f\u6cbb\u6781\u5316\uff09\u548c\u5916\u90e8\u6311\u6218\uff08\u53bb\u7f8e\u5143\u5316\u3001\u6280\u672f\u66ff\u4ee3\uff09\u7684\u53cc\u91cd\u538b\u529b\u3002\u672a\u6765 20\u201430 \u5e74\u56fd\u9645\u8d27\u5e01\u4f53\u7cfb\u5927\u6982\u7387\u662f**\u7f8e\u5143\u4e3b\u5bfc + \u591a\u6781\u5316\u8865\u5145**\u683c\u5c40\uff0c\u800c\u975e\u7b80\u5355\u7684\"\u9738\u6743\u66f4\u66ff\"\u3002\u4e2d\u56fd\u6218\u7565\u5e94\u805a\u7126\u4eba\u6c11\u5e01\u7ed3\u6784\u6027\u5347\u4f4d\u4e0e\u66ff\u4ee3\u57fa\u7840\u8bbe\u65bd\u5efa\u8bbe\uff0c\u800c\u975e\u77ed\u671f\"\u6311\u6218\"\u7f8e\u5143\uff08\u53c2\u89c1 Strange\u300a\u75af\u72c2\u7684\u91d1\u94b1\u300b\uff1bEichengreen\u300a\u56a3\u5f20\u7684\u7279\u6743\u300b\uff1b\u7530\u91ce\u7b2c\u56db\u7ae0\uff1b\u7fdf\u4e1c\u5347\u76f8\u5173\u7814\u7a76\uff09\u3002\n\n### 9. \u8bba\u8ff0\u56fd\u9645\u8d38\u6613\u5bf9\u56fd\u5185\u653f\u6cbb\u5206\u5316\u7684\u5f71\u54cd\u3010\u6a21\u62df-5\u300115\u3011\n\n\u56fd\u9645\u8d38\u6613\u5f00\u653e\u5bf9\u56fd\u5185\u653f\u6cbb\u7684\u5206\u5316\u6548\u5e94\u662f IPE \u7684\u6838\u5fc3\u8bae\u9898\u3002\u5176\u7406\u8bba\u8c31\u7cfb\u81ea\u674e\u5609\u56fe\u2014\u65af\u6258\u5c14\u73c0\u2014\u8428\u7f2a\u5c14\u68ee\uff0c\u5230\u7f57\u683c\u592b\u65af\u57fa\u3001Hiscox\u3001Autor\u2014Dorn\u2014Hanson\uff0c\u5df2\u5f62\u6210\u7cfb\u7edf\u6846\u67b6\u3002\n\n**\u4e00\u3001\u7406\u8bba\u57fa\u7840\uff1aH-O \u6a21\u578b\u4e0e\u65af\u6258\u5c14\u73c0\u2014\u8428\u7f2a\u5c14\u68ee\u5b9a\u7406**\n\n\u8d6b\u514b\u6b47\u5c14\u2014\u4fc4\u6797\u6a21\u578b + \u65af\u6258\u5c14\u73c0\u2014\u8428\u7f2a\u5c14\u68ee\u5b9a\u7406\uff1a\u5728\u8981\u7d20\u81ea\u7531\u6d41\u52a8\u5047\u8bbe\u4e0b\uff0c**\u8d38\u6613\u5f00\u653e\u4f1a\u62ac\u5347\u4e00\u56fd\u76f8\u5bf9\u4e30\u88d5\u8981\u7d20\u7684\u5b9e\u9645\u62a5\u916c\uff0c\u538b\u4f4e\u76f8\u5bf9\u7a00\u7f3a\u8981\u7d20\u7684\u5b9e\u9645\u62a5\u916c**\u3002\n- \u53d1\u8fbe\u56fd\u5bb6\uff1a\u8d44\u672c\u4e30\u88d5 \u2192 \u8d38\u6613\u4f7f\u8d44\u672c\u53d7\u76ca\u3001\u52b3\u52a8\u53d7\u635f\uff1b\n- \u53d1\u5c55\u4e2d\u56fd\u5bb6\uff1a\u52b3\u52a8\u4e30\u88d5 \u2192 \u8d38\u6613\u4f7f\u52b3\u52a8\u53d7\u76ca\u3001\u8d44\u672c\u53d7\u635f\uff08\u867d\u7136\u73b0\u5b9e\u672a\u5fc5\u5982\u6b64\u7b80\u5355\uff09\u3002\n\n**\u4e8c\u3001Rogowski\uff081989\uff09\u7684\u793e\u4f1a\u8054\u76df\u5206\u6790**\n\nRogowski \u5728\u300a\u5546\u4e1a\u4e0e\u8054\u76df\u300b\u4e2d\u63d0\u51fa**\u4e09\u8981\u7d20\uff08\u571f\u5730\u3001\u52b3\u52a8\u3001\u8d44\u672c\uff09+ \u8981\u7d20\u4e30\u88d5\u5ea6**\u6846\u67b6\uff0c\u9884\u6d4b\u8d38\u6613\u51b2\u51fb\u4e0b\u4e0d\u540c\u56fd\u5bb6\u7684\u8054\u76df\u5f62\u5f0f\uff1a\n\n| \u7ecf\u6d4e\u7c7b\u578b | \u4e30\u88d5\u8981\u7d20 | \u8d38\u6613\u5f00\u653e\u53d7\u76ca\u65b9 | \u653f\u6cbb\u8054\u76df\u7279\u5f81 |\n|---|---|---|---|\n| 19c \u7f8e\u56fd\uff08\u571f\u5730\u591a\u3001\u8d44\u672c\u5c11\u3001\u52b3\u52a8\u5c11\uff09| \u571f\u5730 | \u519c\u573a\u4e3b vs \u5de5\u4eba + \u8d44\u672c | \u6c11\u7cb9\u4e3b\u4e49\u8fd0\u52a8 |\n| 19c \u82f1\u56fd\uff08\u8d44\u672c\u591a\uff09| \u8d44\u672c | \u8d44\u672c vs \u571f\u5730 + \u52b3\u52a8 | \u81ea\u7531\u8d38\u6613\u8054\u76df\u4e3b\u5bfc |\n| \u5f53\u4ee3\u53d1\u5c55\u4e2d\u56fd\u5bb6 | \u52b3\u52a8 | \u52b3\u52a8 vs \u8d44\u672c + \u571f\u5730 | \u6c11\u7cb9\u53cd\u7cbe\u82f1\u8fd0\u52a8 |\n| \u5f53\u4ee3\u53d1\u8fbe\u56fd\u5bb6 | \u8d44\u672c\uff08\u9ad8\u6280\u80fd\uff09| \u8d44\u672c vs \u52b3\u52a8 | \u7ecf\u6d4e\u6c11\u65cf\u4e3b\u4e49\u3001\u7279\u6717\u666e\u73b0\u8c61 |\n\n**\u4e09\u3001Hiscox\uff082002\uff09\u7684\u8981\u7d20\u6d41\u52a8\u4fee\u6b63**\n\nHiscox \u4fee\u6b63\uff1a\u5f53\u8981\u7d20\u8de8\u4ea7\u4e1a\u6d41\u52a8\u6027\u4f4e\u65f6\uff0c\u5206\u5316\u6cbf**\u90e8\u95e8**\u800c\u975e\u9636\u7ea7\u5c55\u5f00\uff1a\n- \u7f8e\u56fd\u94c1\u9508\u5e26\uff1a\u6c7d\u8f66\u4e1a\u8d44\u672c\u4e0e\u5de5\u4eba\u8054\u5408\u53cd\u5bf9\u81ea\u7531\u8d38\u6613\uff1b\n- \u7845\u8c37\uff1a\u79d1\u6280\u4e1a\u8d44\u672c\u4e0e\u5de5\u7a0b\u5e08\u8054\u5408\u652f\u6301\u5f00\u653e\uff1b\n- \u519c\u4e1a\u5e26\uff1a\u7389\u7c73/\u5927\u8c46\u519c\u573a\u4e3b\u8054\u5408\u652f\u6301\u51fa\u53e3\uff08\u53cd\u5bf9\u4e2d\u7f8e\u8d38\u6613\u6218\uff09\uff1b\n- 19\u201420 \u4e16\u7eaa\u7f8e\u56fd\u9009\u6c11\u5bf9\u8d38\u6613\u7684\u6001\u5ea6\u6cbf\u5730\u7406\u800c\u975e\u9636\u7ea7\u5206\u5e03\u3002\n\n**\u56db\u3001\u4fdd\u62a4\u5f85\u552e\u6a21\u578b\uff08Grossman-Helpman 1994\uff09**\n\nGrossman-Helpman \u63d0\u4f9b\u8d38\u6613\u4fdd\u62a4\u7684\u653f\u6cbb\u7ecf\u6d4e\u5747\u8861\uff1a\n- \u7ec4\u7ec7\u5316\u7a0b\u5ea6\u9ad8\u7684\u4ea7\u4e1a\u83b7\u5f97\u66f4\u9ad8\u4fdd\u62a4\uff1b\n- \u8fdb\u53e3\u9700\u6c42\u5f39\u6027\u4f4e\u3001\u8fdb\u53e3\u6e17\u900f\u7387\u9ad8\u7684\u4ea7\u4e1a\u66f4\u6613\u83b7\u4fdd\u62a4\uff1b\n- \u7f8e\u56fd\u519c\u4e1a\u3001\u94a2\u94c1\u3001\u6c7d\u8f66\u3001\u7cd6\u4e1a\u3001\u534a\u5bfc\u4f53\u7b49\u9ad8\u4fdd\u62a4\u884c\u4e1a\u7b26\u5408\u8be5\u903b\u8f91\u3002\n\n**\u4e94\u3001\u8d38\u6613\u51b2\u51fb\u7684\u5b9e\u8bc1\u7814\u7a76\uff08Autor-Dorn-Hanson \"China Shock\"\uff09**\n\nAutor\u3001Dorn\u3001Hanson\uff082013, 2016\uff09\"China Shock\" \u7814\u7a76\uff1a\n- \u4e2d\u56fd\u51fa\u53e3\u51b2\u51fb\u4f7f\u7f8e\u56fd\u5236\u9020\u4e1a\u5c31\u4e1a 2001\u20142011 \u635f\u5931\u7ea6 200\u2014240 \u4e07\uff1b\n- \u53d7\u51b2\u51fb\u5730\u533a\u5de5\u8d44\u4e0b\u964d\u3001\u6536\u5165\u51cf\u5c11\u3001\u5065\u5eb7\u6076\u5316\u3001\u5bb6\u5ead\u7834\u88c2\u7387\u4e0a\u5347\uff1b\n- \u8fd9\u4e9b\u5730\u533a**\u652f\u6301\u7279\u6717\u666e + \u53cd\u5168\u7403\u5316\u653f\u515a + \u6c11\u7cb9\u653f\u5ba2\u6bd4\u4f8b\u663e\u8457\u4e0a\u5347**\uff1b\n- \u7ecf\u6d4e\u51b2\u51fb \u2192 \u653f\u6cbb\u5206\u5316 \u2192 \u653f\u7b56\u53cd\u5f39\uff08\u5173\u7a0e\u6218\u3001\u4fdd\u62a4\u4e3b\u4e49\u3001\u4ea7\u4e1a\u653f\u7b56\u56de\u6f6e\uff09\u3002\n\n**\u516d\u3001\u8d38\u6613\u51b2\u51fb\u5bf9\u653f\u6cbb\u7684\u591a\u6e20\u9053\u5f71\u54cd**\n\n1. **\u6295\u7968\u884c\u4e3a**\uff1a\u53d7\u8d38\u6613\u51b2\u51fb\u5730\u533a\u6295\u7968\u66f4\u503e\u5411\u4fdd\u62a4\u4e3b\u4e49\u653f\u515a\uff1b\n2. **\u515a\u6d3e\u91cd\u7ec4**\uff1a\u4f20\u7edf\u5de6\u53f3\u7ffc\u5206\u88c2\u3001\u65b0\u53f3\u7ffc\u6c11\u7cb9\u5d1b\u8d77\uff08\u7f8e\u56fd\u5171\u548c\u515a\"\u7279\u6717\u666e\u5316\"\u3001\u6b27\u6d32\u6c11\u7cb9\u515a\u6da8\u52bf\uff09\uff1b\n3. **\u653f\u7b56\u6781\u5316**\uff1a\u8d38\u6613\u3001\u79fb\u6c11\u3001\u6587\u5316\u8bae\u9898\u76f8\u4e92\u7ea0\u7f20\uff0c\u52a0\u6df1\u793e\u4f1a\u5206\u88c2\uff1b\n4. **\u96c6\u4f53\u8ba4\u540c\u53d8\u5316**\uff1a\u9636\u7ea7\u2014\u65cf\u88d4\u2014\u5730\u57df\u8ba4\u540c\u91cd\u7ec4\uff1b\n5. **\u793e\u4f1a\u4fe1\u4efb\u4e0b\u964d**\uff1a\u7ecf\u6d4e\u4e0d\u5b89\u5168\u611f\u964d\u4f4e\u5bf9\u5236\u5ea6\u4fe1\u4efb\uff1b\n6. **\u653f\u5e9c\u80fd\u529b\u53d7\u8d28\u7591**\uff1a\u81ea\u7531\u8d38\u6613\u5e26\u6765\u7684\"\u8d62\u5bb6\u901a\u5403\"\u52a0\u5267\u518d\u5206\u914d\u8d64\u5b57\u3002\n\n**\u4e03\u3001\u56fd\u5bb6\u95f4\u5206\u5316\u7684\u5dee\u5f02\u5316\u673a\u5236**\n\n\u4e3a\u4ec0\u4e48\u76f8\u540c\u8d38\u6613\u51b2\u51fb\u5728\u4e0d\u540c\u56fd\u5bb6\u4ea7\u751f\u4e0d\u540c\u653f\u6cbb\u53cd\u5e94\uff1f\n1. **\u518d\u5206\u914d\u5236\u5ea6\u5f3a\u5ea6**\uff1a\u5317\u6b27 + \u5fb7\u56fd\u2014\u2014\u53d1\u8fbe\u518d\u5206\u914d + \u518d\u5c31\u4e1a\u57f9\u8bad \u2192 \u53cd\u5f39\u8f83\u5f31\uff1b\u7f8e\u56fd + \u82f1\u56fd\u2014\u2014\u518d\u5206\u914d\u5f31 \u2192 \u53cd\u5f39\u5f3a\u70c8\uff1b\n2. **\u5de5\u4f1a\u529b\u91cf**\uff1a\u5f3a\u5de5\u4f1a\u56fd\u5bb6\uff08\u5317\u6b27\u3001\u5fb7\u56fd\uff09\u80fd\u7f13\u51b2\u51b2\u51fb\uff1b\u5f31\u5de5\u4f1a\u56fd\u5bb6\uff08\u7f8e\u3001\u82f1\uff09\u51b2\u51fb\u76f4\u63a5\u4f20\u5bfc\u5230\u653f\u6cbb\uff1b\n3. **\u6559\u80b2\u4e0e\u57f9\u8bad\u7cfb\u7edf**\uff1a\u5fb7\u56fd\u53cc\u5143\u5236\u5b66\u5f92\u8bad\u7ec3 \u2192 \u5de5\u4eba\u8f6c\u578b\u5feb\uff1b\u7f8e\u56fd\u77ed\u7f3a \u2192 \u8f6c\u578b\u6162\uff1b\n4. **\u653f\u6cbb\u5236\u5ea6**\uff1a\u6bd4\u4f8b\u4ee3\u8868\u5236 + \u8054\u5408\u653f\u5e9c \u2192 \u53cd\u5f39\u5206\u6563\uff1b\u591a\u6570\u5236 \u2192 \u6c11\u7cb9\u653f\u515a\u7a81\u7834\u6613\uff1b\n5. **\u610f\u8bc6\u5f62\u6001\u8d44\u6e90**\uff1a\u6c11\u65cf\u4e3b\u4e49\u4f20\u7edf\u5f3a\u56fd\u5bb6\u66f4\u6613\u51fa\u73b0\u4fdd\u62a4\u4e3b\u4e49\u53cd\u5f39\u3002\n\n**\u516b\u3001\u8d38\u6613\u3001\u79fb\u6c11\u3001\u6280\u672f\u53d8\u9769\u7684\u4ea4\u4e92**\n\n\u8fd1\u5e74\u7814\u7a76\u5f3a\u8c03\uff1a\n1. **\u6280\u672f\u53d8\u9769\uff08\u81ea\u52a8\u5316\u3001AI\uff09**\u4e5f\u4ea7\u751f\u7c7b\u4f3c\u8d38\u6613\u51b2\u51fb\u7684\u653f\u6cbb\u5206\u5316\u6548\u5e94\uff1b\n2. **\u8d38\u6613 + \u6280\u672f + \u79fb\u6c11**\u4e09\u91cd\u51b2\u51fb\u53e0\u52a0 \u2192 \u4ea7\u4e1a\u5de5\u4eba\u7fa4\u4f53\u7684\u5168\u9762\u5b89\u5168\u611f\u4e27\u5931\uff1b\n3. \u5355\u7eaf\u53cd\u8d38\u6613\u672a\u5fc5\u80fd\u89e3\u51b3\u95ee\u9898\uff0c\u4f46\u6210\u4e3a\u653f\u6cbb\u8868\u8fbe\u8f7d\u4f53\uff1b\n4. \u653f\u7b56\u9700\u8981\u7efc\u5408\u5e94\u5bf9\uff1a\u518d\u5206\u914d + \u518d\u57f9\u8bad + \u4ea7\u4e1a\u653f\u7b56 + \u793e\u4f1a\u4fdd\u969c\u6269\u5c55\u3002\n\n**\u4e5d\u3001\u4e2d\u56fd\u60c5\u5883**\n\n\u4e2d\u56fd\u4f5c\u4e3a\"\u8d38\u6613\u51b2\u51fb\"\u4e3b\u8981\u53d1\u51fa\u65b9\uff0c\u540c\u65f6\u4e5f\u662f\u63a5\u6536\u65b9\uff1a\n1. **\u5165\u4e16\u53d7\u76ca**\uff1a\u51fa\u53e3\u90e8\u95e8\u3001\u6cbf\u6d77\u7ecf\u6d4e\u3001\u57ce\u5e02\u4e2d\u4ea7\u53d7\u76ca\u663e\u8457\uff1b\n2. **\u5165\u4e16\u4ee3\u4ef7**\uff1a\u90e8\u5206\u56fd\u6709\u4f01\u4e1a\u804c\u5de5\u4e0b\u5c97\u3001\u519c\u4e1a\u90e8\u95e8\u627f\u538b\u3001\u4e1c\u5317\u8870\u9000\u52a0\u5267\uff1b\n3. **\u5f53\u4e0b\u8d38\u6613\u6218\u51b2\u51fb**\uff1a\u9ad8\u7aef\u5236\u9020\u4e1a + \u534a\u5bfc\u4f53\u88ab\u538b\u5236\u3001\u51fa\u53e3\u7ba1\u5236\u635f\u5bb3\u7279\u5b9a\u884c\u4e1a\uff1b\n4. **\u56fd\u5185\u5206\u5316**\uff1a\u6cbf\u6d77 vs \u5185\u9646\u3001\u4e1c\u5357 vs \u4e1c\u5317\u3001\u57ce\u5e02 vs \u519c\u6751\uff1b\n5. **\u518d\u5206\u914d + \u4ea7\u4e1a\u5347\u7ea7 + \u5185\u5faa\u73af**\u6210\u4e3a\u5e94\u5bf9\u7b56\u7565\u3002\n\n**\u5341\u3001\u653f\u7b56\u610f\u6db5\u4e0e\u7406\u8bba\u7ed3\u8bba**\n\n\u56fd\u9645\u8d38\u6613\u5f00\u653e\u867d\u63d0\u5347\u603b\u798f\u5229\uff0c\u4f46\u56e0**\u5206\u914d\u6548\u5e94\u4e0d\u5747\u3001\u8c03\u6574\u80fd\u529b\u6709\u9650\u3001\u653f\u6cbb\u5236\u5ea6\u8fc7\u6ee4**\uff0c\u53ef\u80fd\u5f15\u53d1\u6df1\u523b\u653f\u6cbb\u5206\u5316\u4e43\u81f3\u53cd\u5168\u7403\u5316\u8fd0\u52a8\u3002\u5f53\u4ee3\u7406\u8bba\u5f3a\u8c03\uff1a\n1. \u8d38\u6613\u653f\u7b56\u4e0d\u80fd\u8131\u79bb\u518d\u5206\u914d\u653f\u7b56\uff1b\n2. \u5fc5\u987b\u914d\u5957\u6559\u80b2\u3001\u57f9\u8bad\u3001\u793e\u4fdd\u4ee5\u63d0\u5347\u8981\u7d20\u6d41\u52a8\u6027\uff1b\n3. \u653f\u6cbb\u5236\u5ea6\u5fc5\u987b\u6709\u627f\u63a5\u8c03\u6574\u51b2\u51fb\u7684\u80fd\u529b\uff1b\n4. \u56fd\u5bb6\u5e94\u4e3b\u52a8\u7ba1\u7406\u4ef7\u503c\u94fe\u8f6c\u578b\uff0c\u800c\u975e\u88ab\u52a8\u63a5\u53d7\u5e02\u573a\u7ed3\u679c\u3002\n\n**Rodrik \u63d0\u51fa\u7684\"\u8d85\u7ea7\u5168\u7403\u5316\u4e09\u96be\"**\uff1a\u6df1\u5ea6\u5168\u7403\u5316\u3001\u6c11\u65cf\u56fd\u5bb6\u3001\u6c11\u4e3b\u653f\u6cbb\u4e09\u8005\u4e0d\u53ef\u517c\u5f97\u3002\u8fd9\u4e00\u547d\u9898\u9884\u793a\u4e86 21 \u4e16\u7eaa\u5168\u7403\u5316\u7684\u6839\u672c\u8c03\u6574\u65b9\u5411\uff1a**\u6709\u8282\u5236\u7684\u5168\u7403\u5316 + \u56fd\u5185\u653f\u7b56\u7a7a\u95f4 + \u6c11\u4e3b\u5408\u6cd5\u6027**\u7684\u518d\u5e73\u8861\uff08\u53c2\u89c1 Rogowski 1989\uff1bHiscox 2002\uff1bAutor et al. 2013\uff1bRodrik\u300a\u5168\u7403\u5316\u7684\u6096\u8bba\u300b\uff1b\u7530\u91ce\u7b2c\u516d\u7ae0\uff09\u3002\n\n### 10. \u8fd0\u7528\u6240\u5b66 IPE \u7406\u8bba\u5206\u6790\u5e76\u4e3e\u4f8b\u8bf4\u660e\u8de8\u56fd\u516c\u53f8\u7684\u653f\u6cbb\u5f71\u54cd\u3010\u6a21\u62df-5\u300115\u3011\n\n\u8de8\u56fd\u516c\u53f8\uff08MNCs / TNCs\uff09\u662f 20 \u4e16\u7eaa\u540e\u671f\u4ee5\u6765\u4e16\u754c\u7ecf\u6d4e\u7684\u6838\u5fc3\u884c\u4e3a\u4f53\u4e4b\u4e00\u3002\u5176\u653f\u6cbb\u5f71\u54cd\u6784\u6210 IPE \u91cd\u8981\u7814\u7a76\u8bae\u9898\u3002\n\n**\u4e00\u3001\u8de8\u56fd\u516c\u53f8\u7684\u5174\u8d77\u4e0e\u5168\u7403\u5730\u4f4d**\n\n1. **\u89c4\u6a21**\uff1aUNCTAD \u6570\u636e\uff0c\u5168\u7403\u7ea6 8.5 \u4e07\u5bb6\u8de8\u56fd\u6bcd\u516c\u53f8\uff0c\u63a7\u5236\u7ea6 80 \u4e07\u5bb6\u6d77\u5916\u5b50\u516c\u53f8\uff0cFDI \u5b58\u91cf\u8d85 40 \u4e07\u4ebf\u7f8e\u5143\uff1b\n2. **\u4ef7\u503c\u94fe**\uff1a\u7ea6 80% \u7684\u5168\u7403\u8d38\u6613\u901a\u8fc7\u8de8\u56fd\u516c\u53f8\u4e3b\u5bfc\u7684\u5168\u7403\u4ef7\u503c\u94fe\uff1b\n3. **\u5e02\u503c**\uff1a\u82f9\u679c\u3001\u5fae\u8f6f\u3001\u82f1\u4f1f\u8fbe\u3001\u4e9a\u9a6c\u900a\u7b49\u5e02\u503c\u8d85\u8fc7\u591a\u6570\u4e2d\u7b49\u56fd\u5bb6 GDP\uff1b\n4. **\u5c31\u4e1a\u4e0e\u7a0e\u6536**\uff1a\u5168\u7403\u7ea6 8000 \u4e07\u4eba\u76f4\u63a5\u53d7\u96c7\u4e8e\u8de8\u56fd\u516c\u53f8\u6d77\u5916\u5b50\u516c\u53f8\u3002\n\n**\u4e8c\u3001\u8de8\u56fd\u516c\u53f8\u653f\u6cbb\u5f71\u54cd\u7684\u7406\u8bba\u8c31\u7cfb**\n\n1. **\u81ea\u7531\u4e3b\u4e49/\u76f8\u4e92\u4f9d\u8d56\u8bba**\uff08Vernon, Keohane-Nye\uff09\uff1a\u8de8\u56fd\u516c\u53f8\u901a\u8fc7\u8de8\u754c\u751f\u4ea7\u7f51\u7edc\u6df1\u5316\u56fd\u5bb6\u95f4\u4f9d\u8d56\u3001\u63a8\u52a8\u5408\u4f5c\uff1b\n2. **\u4f9d\u9644\u8bba / \u4e16\u754c\u4f53\u7cfb**\uff1a\u8de8\u56fd\u516c\u53f8\u662f\u4e2d\u5fc3\u2014\u5916\u56f4\u7ed3\u6784\u518d\u751f\u4ea7\u7684\u4e3b\u8981\u8f7d\u4f53\uff1b\n3. **\u7ed3\u6784\u6027\u6743\u529b**\uff08Strange\uff09\uff1a\u8de8\u56fd\u516c\u53f8\u662f\u7f8e\u56fd\u751f\u4ea7\u7ed3\u6784\u6743\u529b\u7684\u4e3b\u8981\u627f\u62c5\u8005\uff1b\n4. **\u4fdd\u62a4\u5f85\u552e\u6a21\u578b**\uff08Grossman-Helpman\uff09\uff1a\u8de8\u56fd\u516c\u53f8\u901a\u8fc7\u653f\u6cbb\u732e\u91d1\u3001\u6e38\u8bf4\u5851\u9020\u8d38\u6613\u653f\u7b56\uff1b\n5. **\u6279\u5224 IPE / \u65b0\u845b\u5170\u897f\u4e3b\u4e49**\uff08Cox, Gill\uff09\uff1a\u8de8\u56fd\u516c\u53f8\u662f\u8de8\u56fd\u8d44\u672c\u4e3b\u4e49\u9636\u7ea7\u548c\"\u5386\u53f2\u96c6\u56e2\"\u7684\u6838\u5fc3\u3002\n\n**\u4e09\u3001\u5bf9\u6bcd\u56fd\u653f\u6cbb\u7684\u5f71\u54cd**\n\n1. **\u5851\u9020\u5bf9\u5916\u7ecf\u6d4e\u653f\u7b56**\uff1a\n   - \u63a8\u52a8\u8d38\u6613\u81ea\u7531\u5316\u3001\u6295\u8d44\u534f\u5b9a\uff08BIT/FTA\uff09\u3001\u77e5\u8bc6\u4ea7\u6743\u4fdd\u62a4\u5f3a\u5316\uff08TRIPS\uff09\uff1b\n   - **\u4f8b**\uff1a\u7f8e\u56fd\u5236\u836f\u4e1a\uff08Pfizer \u7b49\uff09\u901a\u8fc7\"\u77e5\u8bc6\u4ea7\u6743\u59d4\u5458\u4f1a\"\u63a8\u52a8 TRIPS \u8c08\u5224\uff0c\u786e\u4fdd\u5168\u7403\u836f\u54c1\u4e13\u5229\u4fdd\u62a4\u3002\n2. **\u653f\u6cbb\u732e\u91d1\u4e0e\u6e38\u8bf4**\uff1a\n   - \u7f8e\u56fd OpenSecrets \u6570\u636e\u663e\u793a\uff0c\u8d22\u5bcc 500 \u5f3a\u4f01\u4e1a\u6bcf\u5e74\u6e38\u8bf4\u652f\u51fa\u8d85\u8fc7 30 \u4ebf\u7f8e\u5143\uff1b\n   - **\u4f8b**\uff1a\u7845\u8c37\u4f01\u4e1a\u5927\u4e3e\u6e38\u8bf4\u53cd\u5784\u65ad\u653f\u7b56\u3001\u5f71\u54cd\u6570\u636e\u9690\u79c1\u7acb\u6cd5\u3002\n3. **\u7a0e\u6536\u653f\u6cbb**\uff1a\n   - \u901a\u8fc7\u8f6c\u79fb\u5b9a\u4ef7\u3001\u7a0e\u6536\u7b79\u5212\u538b\u4f4e\u6709\u6548\u7a0e\u7387\uff0c\u5f15\u53d1\u5168\u7403\u7a0e\u57fa\u4fb5\u8680\uff08BEPS\uff09\u95ee\u9898\uff1b\n   - **\u4f8b**\uff1a\u82f9\u679c\u901a\u8fc7\u7231\u5c14\u5170\u907f\u7a0e\u5b89\u6392\u88ab\u6b27\u76df\u8ffd\u8ba8 130 \u4ebf\u6b27\u5143\u7a0e\u6b3e\uff082016\uff09\uff1b\n4. **\u5c31\u4e1a\u4e0e\u4ea7\u4e1a\u653f\u7b56**\uff1a\n   - \u8de8\u56fd\u516c\u53f8\u6d77\u5916\u6295\u8d44\u5f15\u53d1\u6bcd\u56fd\"\u4ea7\u4e1a\u7a7a\u5fc3\u5316\"\u5fe7\u8651\uff1b\n   - **\u4f8b**\uff1a\u7f8e\u56fd\u94c1\u9508\u5e26\u8870\u9000\u4e0e\u8de8\u56fd\u516c\u53f8\u5916\u79fb\u76f4\u63a5\u76f8\u5173\uff0c\u63a8\u52a8\u7279\u6717\u666e\"\u7f8e\u56fd\u4f18\u5148\"\u3002\n\n**\u56db\u3001\u5bf9\u4e1c\u9053\u56fd\u653f\u6cbb\u7684\u5f71\u54cd**\n\n1. **\u5851\u9020\u4ea7\u4e1a\u653f\u7b56**\uff1a\n   - \u8de8\u56fd\u516c\u53f8\u6295\u8d44\u5f71\u54cd\u4e1c\u9053\u56fd\u4ea7\u4e1a\u7ed3\u6784\u3001\u6280\u672f\u5347\u7ea7\u8def\u5f84\uff1b\n   - **\u4f8b**\uff1a\u65e5\u672c\u6c7d\u8f66\u4e1a\u5728 1990 \u5e74\u4ee3\u540e\u5927\u89c4\u6a21\u5728\u7f8e\u56fd\u8bbe\u5382\u4ee5\u89c4\u907f\u8d38\u6613\u6469\u64e6\uff0c\u6df1\u523b\u5851\u9020\u7f8e\u56fd\u5357\u90e8\u7ecf\u6d4e\u3002\n2. **\u5f71\u54cd\u6cd5\u5f8b\u4e0e\u76d1\u7ba1\u6846\u67b6**\uff1a\n   - \u901a\u8fc7 BIT \u6295\u8d44\u4ef2\u88c1\u6761\u6b3e\uff08ISDS\uff09\u7ea6\u675f\u4e1c\u9053\u56fd\u653f\u7b56\u7a7a\u95f4\uff1b\n   - **\u4f8b**\uff1aPhilip Morris \u901a\u8fc7 ISDS \u8d77\u8bc9\u6fb3\u5927\u5229\u4e9a\u70df\u8349\u5305\u88c5\u6cd5\uff082011-2015\uff0c\u6700\u7ec8\u8d25\u8bc9\uff09\uff1b\u83f2\u5229\u666e\u83ab\u91cc\u65af\u8bc9\u4e4c\u62c9\u572d\u7b49\u6848\u4f8b\u3002\n3. **\u7a0e\u6536\u4fb5\u8680**\uff1a\n   - \u8f6c\u79fb\u5b9a\u4ef7\u4f7f\u4e1c\u9053\u56fd\u7a0e\u6536\u635f\u5931\u4e25\u91cd\uff08\u975e\u6d32\u3001\u4e1c\u5357\u4e9a\u6bcf\u5e74\u635f\u5931\u6570\u767e\u4ebf\u7f8e\u5143\uff09\uff1b\n4. **\u73af\u5883\u4e0e\u793e\u4f1a\u6807\u51c6**\uff1a\n   - \"\u5411\u4e0b\u7ade\u6b21\"\u538b\u529b\uff08race to the bottom\uff09VS \u56fd\u9645 ESG \u6807\u51c6\u7684\"\u5411\u4e0a\u7ade\u9ad8\"\uff1b\n   - **\u4f8b**\uff1a\u8010\u514b 1990 \u5e74\u4ee3\u88ab\u66dd\u5149\u4e1c\u5357\u4e9a\u8840\u6c57\u5de5\u5382\uff0c\u5f15\u53d1\u8de8\u56fd CSR \u6807\u51c6\u63d0\u5347\u3002\n5. **\u653f\u6cbb\u5e72\u9884**\uff1a\n   - \u5386\u53f2\u4e0a\u6709 UFC\uff08\u8054\u5408\u679c\u54c1\u516c\u53f8\uff09\u53c2\u4e0e\u62c9\u7f8e\u653f\u53d8\u3001ITT \u53c2\u4e0e\u667a\u5229 1973 \u653f\u53d8\u7b49\u6848\u4f8b\uff1b\n   - \u5f53\u4ee3\u8de8\u56fd\u516c\u53f8\u53c2\u4e0e\u65b9\u5f0f\u66f4\u9690\u6027\uff0c\u901a\u8fc7\u6e38\u8bf4\u3001\u5a92\u4f53\u3001\u5546\u4f1a\u5f71\u54cd\u653f\u7b56\u3002\n\n**\u4e94\u3001\u5bf9\u56fd\u9645\u5236\u5ea6\u4e0e\u5168\u7403\u6cbb\u7406\u7684\u5f71\u54cd**\n\n1. **\u5851\u9020\u56fd\u9645\u89c4\u5219**\uff1a\n   - \u8de8\u56fd\u516c\u53f8\u662f WTO\u3001WIPO\u3001ICAO\u3001IMO\u3001BIS \u7b49\u673a\u6784\u89c4\u5219\u8ba8\u8bba\u7684\u4e8b\u5b9e\u4e0a\u53c2\u4e0e\u8005\uff1b\n   - **\u4f8b**\uff1a\u4fe1\u606f\u6280\u672f\u534f\u8bae\uff08ITA\uff09\u6269\u5c55\u7531 ICT \u8de8\u56fd\u516c\u53f8\u8054\u76df\u63a8\u52a8\u3002\n2. **\u8de8\u56fd\u6cbb\u7406\u53c2\u4e0e**\uff1a\n   - \u8054\u5408\u56fd\u5168\u7403\u5951\u7ea6\uff08UN Global Compact\uff09\u3001ISO 26000\u3001\u5df4\u585e\u5c14\u534f\u8bae\uff08\u91d1\u878d\u4e1a\uff09\uff1b\n   - **\u4f8b**\uff1a\u624e\u514b\u4f2f\u683c\u76f4\u63a5\u51fa\u5e2d G7 \u6570\u5b57\u6cbb\u7406\u8ba8\u8bba\u3002\n3. **\u65b0\u578b\u6cbb\u7406\u5f62\u6001**\uff1a\n   - \"\u516c\u79c1\u4f19\u4f34\u5173\u7cfb\"\uff08PPP\uff09\u3001\"\u591a\u5229\u76ca\u76f8\u5173\u65b9\u5021\u8bae\"\uff08MSI\uff09\u2014\u2014 ICANN\u3001ISO\u3001\u4e16\u754c\u7ecf\u6d4e\u8bba\u575b\uff1b\n   - \u8fd9\u4e9b\u6cbb\u7406\u5f62\u6001\u628a\u8de8\u56fd\u516c\u53f8\u7eb3\u5165\u89c4\u5219\u5236\u5b9a\u3002\n\n**\u516d\u3001\u5bf9\u56fd\u9645\u653f\u6cbb\u7ed3\u6784\u7684\u5f71\u54cd**\n\n1. **\u56fd\u9645\u7ade\u4e89\u7684\"\u4f01\u4e1a\u5316\"**\uff1a\n   - \u56fd\u5bb6\u901a\u8fc7\u8de8\u56fd\u516c\u53f8\u5ef6\u4f38\u5f71\u54cd\u529b\uff08\u534e\u4e3a\u3001TikTok\u3001\u82f9\u679c\u3001\u53f0\u79ef\u7535\uff09\uff1b\n   - \u8de8\u56fd\u516c\u53f8\u6210\u4e3a\u5927\u56fd\u7ade\u4e89\"\u4ee3\u7406\u4eba\"\uff08\u534a\u5bfc\u4f53\u3001AI\u3001\u7535\u52a8\u8f66\uff09\u3002\n2. **\u7ecf\u6d4e\u6218\u4e0e\u5236\u88c1\u5de5\u5177**\uff1a\n   - \u8de8\u56fd\u516c\u53f8\u88ab\u7eb3\u5165\u5236\u88c1\u4f53\u7cfb\uff08\u51fa\u53e3\u7ba1\u5236\u3001\u5b9e\u4f53\u6e05\u5355\u3001\u4e8c\u7ea7\u5236\u88c1\uff09\uff1b\n   - **\u4f8b**\uff1a\u7f8e\u56fd\u5bf9\u534e\u4e3a\u82af\u7247\u7ba1\u5236\u3001\u5bf9\u4e2d\u82af\u56fd\u9645\u9650\u5236\uff1b\u4fc4\u7f57\u65af\u88ab\u5207\u65ad SWIFT \u540e\u8de8\u56fd\u516c\u53f8\u5927\u64a4\u79bb\u3002\n3. **\u6570\u636e\u4e3b\u6743\u4e0e\u8de8\u5883\u6570\u636e\u6d41**\uff1a\n   - \u8de8\u56fd\u516c\u53f8\u63a7\u5236\u7684\u6570\u636e\u6210\u4e3a\u65b0\u578b\"\u4e3b\u6743\"\u8bae\u9898\uff1b\n   - **\u4f8b**\uff1aTikTok \u6570\u636e\u5f52\u5c5e\u3001\u8c37\u6b4c\u9000\u51fa\u4e2d\u56fd\u5927\u9646\u3001\u6b27\u76df GDPR vs \u7f8e\u56fd CLOUD Act \u51b2\u7a81\u3002\n\n**\u4e03\u3001\u5bf9\u4e2d\u56fd\u7684\u53cc\u5411\u5f71\u54cd**\n\n1. **\u5438\u5f15\u5916\u8d44\u4fc3\u8fdb\u5de5\u4e1a\u5316**\uff1a\n   - 1992\u20142010 \u5e74\u4ee3\u5916\u8d44\u662f\u4e2d\u56fd\u51fa\u53e3\u578b\u589e\u957f\u7684\u6838\u5fc3\uff1b\n   - \u82f9\u679c\u2014\u5bcc\u58eb\u5eb7\u2014\u53f0\u79ef\u7535\u6a21\u5f0f\u5851\u9020\u4e2d\u56fd\u5236\u9020\u4e1a\u5347\u7ea7\u8def\u5f84\uff1b\n2. **\u6280\u672f\u6ea2\u51fa\u4e0e\u672c\u5730\u4f01\u4e1a\u5d1b\u8d77**\uff1a\n   - \u4e2d\u56fd\u672c\u571f\u4f01\u4e1a\u901a\u8fc7\u4f9b\u5e94\u5546\u5173\u7cfb\u3001\u4eba\u624d\u6d41\u52a8\u3001\u5e02\u573a\u5b66\u4e60\u5b9e\u73b0\u6280\u672f\u5347\u7ea7\uff1b\n   - \u90e8\u5206\u9886\u57df\uff08\u7535\u52a8\u8f66\u3001\u592a\u9633\u80fd\u30015G\uff09\u5df2\u8d85\u8d8a\u5916\u8d44\u3002\n3. **\u5f53\u4ee3\u8c03\u6574**\uff1a\n   - \"\u8131\u94a9 / \u53bb\u98ce\u9669\u5316\"\u538b\u529b\u4e0b\u90e8\u5206\u5916\u8d44\u64a4\u79bb/\u8f6c\u79fb\uff08\u8d8a\u5357\u3001\u58a8\u897f\u54e5\u3001\u5370\u5ea6\uff09\uff1b\n   - \u4e2d\u56fd\u63a8\u52a8\u5916\u8d44\u5347\u7ea7\uff08\u9ad8\u7aef\u5236\u9020\u3001\u7814\u53d1\u4e2d\u5fc3\uff09\u4ee5\u5e94\u5bf9\u8f6c\u79fb\u538b\u529b\u3002\n4. **\u4e2d\u56fd\u8de8\u56fd\u516c\u53f8\"\u8d70\u51fa\u53bb\"**\uff1a\n   - \u534e\u4e3a\u3001TikTok\u3001\u6bd4\u4e9a\u8fea\u3001\u5b81\u5fb7\u65f6\u4ee3\u7b49\u6210\u4e3a\u65b0\u4e00\u4ee3\u8de8\u56fd\u516c\u53f8\uff1b\n   - \u9762\u4e34\u4e1c\u9053\u56fd\u653f\u6cbb\u963b\u529b\u3001\u5b89\u5168\u5ba1\u67e5\u3001\u6280\u672f\u5c01\u9501\u7b49\u6311\u6218\u3002\n\n**\u516b\u3001\u89c4\u5236\u8de8\u56fd\u516c\u53f8\u7684\u5168\u7403\u52aa\u529b**\n\n1. **OECD BEPS \u884c\u52a8\u8ba1\u5212**\uff1a\u5168\u7403\u6700\u4f4e\u516c\u53f8\u7a0e\uff0815%\uff092024 \u5e74\u8d77\u9010\u6b65\u5b9e\u65bd\uff1b\n2. **UN \u8de8\u56fd\u516c\u53f8\u5546\u4e1a\u4eba\u6743\u6307\u5bfc\u539f\u5219**\uff08Ruggie \u6846\u67b6\uff09\uff1b\n3. **\u6b27\u76df\u4f9b\u5e94\u94fe\u5c3d\u804c\u8c03\u67e5\u6307\u4ee4**\uff08CSDDD\uff09\uff1b\n4. **WTO \u6295\u8d44\u4fbf\u5229\u5316\u534f\u5b9a**\u6b63\u5728\u8c08\u5224\u4e2d\u3002\n\n**\u4e5d\u3001\u7406\u8bba\u7ed3\u8bba**\n\n\u8de8\u56fd\u516c\u53f8\u662f 21 \u4e16\u7eaa IPE \u7684\u6838\u5fc3\u884c\u4e3a\u4f53\uff0c\u5176\u653f\u6cbb\u5f71\u54cd\u5448\u73b0\u4ee5\u4e0b\u7279\u5f81\uff1a\n1. **\u7ed3\u6784\u6027\u5f71\u54cd > \u5173\u7cfb\u6027\u5f71\u54cd**\u2014\u2014\u901a\u8fc7\u5851\u9020\u751f\u4ea7\u3001\u6280\u672f\u3001\u4fe1\u606f\u7ed3\u6784\u800c\u975e\u76f4\u63a5\u5e72\u9884\u653f\u7b56\u65bd\u52a0\u5f71\u54cd\uff1b\n2. **\u8de8\u8fb9\u754c\u6027**\u2014\u2014\u540c\u65f6\u5f71\u54cd\u6bcd\u56fd\u3001\u4e1c\u9053\u56fd\u548c\u56fd\u9645\u5236\u5ea6\uff1b\n3. **\u5927\u56fd\u535a\u5f08\u4ee3\u7406\u4eba\u5316**\u2014\u2014\u8de8\u56fd\u516c\u53f8\u65e5\u76ca\u6210\u4e3a\u56fd\u5bb6\u95f4\u7ade\u4e89\u8f7d\u4f53\uff1b\n4. **\u6cbb\u7406\u5bf9\u8c61\u4e0e\u6cbb\u7406\u53c2\u4e0e\u8005\u53cc\u91cd\u8eab\u4efd**\u2014\u2014\u65e2\u88ab\u89c4\u5236\u53c8\u53c2\u4e0e\u89c4\u5236\u5236\u5b9a\uff1b\n5. **\u653f\u6cbb\u5316\u52a0\u5267**\u2014\u2014\u4ece\u7eaf\u5546\u4e1a\u5b9e\u4f53\u5411\"\u653f\u6cbb\u2014\u7ecf\u6d4e\u590d\u5408\u4f53\"\u6f14\u53d8\u3002\n\n\u4e2d\u56fd\u5e94\u5bf9\u7b56\u7565\u5e94\u662f**\"\u7ba1\u597d\u2014\u7528\u597d\u2014\u8d70\u51fa\u53bb\"\u4e09\u4f4d\u4e00\u4f53**\uff1a\u65e2\u8981\u89c4\u5236\u5916\u8d44\u8de8\u56fd\u516c\u53f8\u5728\u534e\u884c\u4e3a\uff0c\u53c8\u8981\u5584\u7528\u5176\u6280\u672f\u6ea2\u51fa\uff0c\u66f4\u8981\u652f\u6301\u4e2d\u56fd\u8de8\u56fd\u516c\u53f8\u5728\u5168\u7403\u4ef7\u503c\u94fe\u4e2d\u7684\u4f4d\u7f6e\u5347\u7ea7\uff08\u53c2\u89c1 Strange\u300a\u56fd\u5bb6\u4e0e\u5e02\u573a\u300b\uff1bGilpin \u300a\u5168\u7403\u653f\u6cbb\u7ecf\u6d4e\u5b66\u300b\u7b2c\u5341\u7ae0\uff1b\u7530\u91ce\u7b2c\u4e94\u3001\u5341\u7ae0\uff1b\u5b8b\u65b0\u5b81/\u9648\u5cb3\u7b2c\u4e5d\u7ae0\uff09\u3002\n\n### 11. \u8bba\u8ff0\u5e76\u4e3e\u4f8b\u8bf4\u660e\u7ecf\u6d4e\u5168\u7403\u5316\u5f71\u54cd\u56fd\u5185\u653f\u6cbb\u7684\u9014\u5f84\u3010\u6a21\u62df-6\u3011\n\n\u7ecf\u6d4e\u5168\u7403\u5316\u901a\u8fc7\u591a\u79cd\u9014\u5f84\u6df1\u523b\u5851\u9020\u5404\u56fd\u56fd\u5185\u653f\u6cbb\u3002\u5176\u5206\u6790\u8c31\u7cfb\u81ea Gourevitch\"\u98a0\u5012\u7684\u7b2c\u4e8c\u610f\u8c61\"\u5230 Ro
