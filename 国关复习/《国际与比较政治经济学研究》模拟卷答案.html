a97\u8865\u3001\u5bfb\u79df\uff1b\n6. **\u521b\u65b0\u4eba\u624d\u7ed3\u6784**\uff1a\n   - \u6d77\u5f52\u56de\u56fd\u901f\u5ea6\u653e\u7f13\uff1b\n   - \u56fd\u5185\u9876\u5c16\u4eba\u624d\u4ecd\u6d41\u5931\uff1b\n7. **\u77e5\u8bc6\u4ea7\u6743\u4e0e\u5546\u4e1a\u79d8\u5bc6\u4fdd\u62a4**\uff1a\n   - \u90e8\u5206\u9886\u57df\u77e5\u8bc6\u4ea7\u6743\u4fdd\u62a4\u4ecd\u5f85\u52a0\u5f3a\uff1b\n   - \u8de8\u56fd\u516c\u53f8\u5bf9\u4e2d\u56fd\u521b\u65b0\u73af\u5883\u4fe1\u5fc3\u4e0d\u8db3\uff1b\n8. **\u519b\u6c11\u878d\u5408\u7ba1\u7406**\uff1a\n   - \u519b\u7528\u4e0e\u6c11\u7528\u6280\u672f\u754c\u9650\u6a21\u7cca\u5e26\u6765\u51fa\u53e3\u7ba1\u5236\u56f0\u5883\u3002\n\n**\u516d\u3001\u653f\u7b56\u5efa\u8bae**\n\n1. **\u52a0\u5f3a\u57fa\u7840\u7814\u7a76**\uff1a\n   - \u63d0\u9ad8\u57fa\u7840\u7814\u7a76\u5360\u6bd4\uff08\u76ee\u6807 10%+\uff0c\u76ee\u524d\u7ea6 6.5%\uff09\uff1b\n   - \u957f\u671f\u7a33\u5b9a\u652f\u6301\u81ea\u7531\u63a2\u7d22\uff1b\n   - \u6539\u9769\u79d1\u7814\u8bc4\u4ef7\u4f53\u7cfb\uff0c\u9f13\u52b1\u539f\u521b\uff1b\n2. **\u5b8c\u5584\u521b\u65b0\u751f\u6001**\uff1a\n   - \u52a0\u5f3a\u4f01\u4e1a\u4e3b\u4f53\u5730\u4f4d\uff08\u534e\u4e3a\u7814\u53d1\u6a21\u5f0f\u7ecf\u9a8c\uff09\uff1b\n   - \u63d0\u5347\u98ce\u9669\u6295\u8d44\u751f\u6001\uff1b\n   - \u5f3a\u5316\u4ea7\u5b66\u7814\u5408\u4f5c\uff1b\n3. **\u5f00\u653e\u5408\u4f5c**\uff1a\n   - \u4e0d\"\u8131\u94a9\"\uff0c\u7ee7\u7eed\u63a8\u52a8\u56fd\u9645\u79d1\u6280\u5408\u4f5c\uff1b\n   - \u4e3b\u52a8\u53c2\u4e0e\u5168\u7403\u79d1\u6280\u6cbb\u7406\uff1b\n   - \u5438\u5f15\u56fd\u9645\u9876\u5c16\u4eba\u624d\uff1b\n4. **\u4ea7\u4e1a\u653f\u7b56\u4f18\u5316**\uff1a\n   - \u4ece\"\u8865\u8d34 + \u9009\u62e9\u6027\u6276\u6301\"\u5411\"\u8425\u5546\u73af\u5883 + \u516c\u5e73\u7ade\u4e89 + \u5236\u5ea6\u578b\u652f\u6301\"\u8f6c\u53d8\uff1b\n   - \u907f\u514d\u8fc7\u5ea6\u8865\u8d34\u626d\u66f2\u5e02\u573a\uff1b\n   - \u5f15\u5165\u7b2c\u4e09\u65b9\u8bc4\u4f30\u673a\u5236\uff1b\n5. **\u5e94\u5bf9\u5  \u6cd5\u6cbb\u73af\u5883 + \u5e02\u573a\u6d3b\u529b + \u957f\u671f\u4e3b\u4e49**\u7684\u7efc\u5408\u914d\u5957\u3002\u5c55\u671b\u672a\u6765\uff0c\u4e2d\u56fd\u81ea\u4e3b\u521b\u65b0\u5c06\u8fdb\u5165\"\u7a81\u7834\u2014\u5de9\u56fa\u2014\u5f15\u9886\"\u4e09\u4f4d\u4e00\u4f53\u9636\u6bb5\uff0c\u662f\u4e2d\u56fd\u5f0f\u73b0\u4ee3\u5316\u7684\u6838\u5fc3\u52a8\u529b\uff0c\u4e5f\u662f 21 \u4e16\u7eaa\u5168\u7403\u79d1\u6280\u6cbb\u7406\u7684\u5173\u952e\u53d8\u91cf\uff08\u53c2\u89c1 Evans 1995\uff1bMazzucato\u300a\u4f01\u4e1a\u5bb6\u7684\u56fd\u5bb6\u300b\u300a\u4f7f\u547d\u7ecf\u6d4e\u300b\uff1b\u7530\u91ce\u7b2c\u4e03\u7ae0\uff1b\u4e2d\u56fd\u79d1\u6280\u90e8\u3001\u56fd\u52a1\u9662\u53d1\u5c55\u7814\u7a76\u4e2d\u5fc3\u76f8\u5173\u62a5\u544a\uff09\u3002\n\n### 23. \u8bc4\u6790\u9738\u6743\u7a33\u5b9a\u7406\u8bba\u3010\u6a21\u62df-12\u3011\n\n\u9738\u6743\u7a33\u5b9a\u7406\u8bba\uff08Hegemonic Stability Theory, HST\uff09\u662f 20 \u4e16\u7eaa 70 \u5e74\u4ee3\u4ee5\u6765 IPE \u7684\u6838\u5fc3\u7406\u8bba\u4e4b\u4e00\uff0c\u7531 Charles Kindleberger \u9996\u521b\u3001Stephen Krasner \u4e0e Robert Gilpin \u7cfb\u7edf\u5316\u3002\n\n**\u4e00\u3001\u7406\u8bba\u6838\u5fc3\u547d\u9898**\n\n1. **\u57fa\u672c\u547d\u9898**\uff1a\u7a33\u5b9a\u7684\u5f00\u653e\u56fd\u9645\u7ecf\u6d4e\u4f53\u7cfb\u8981\u6c42\u4e00\u4e2a**\u9738\u6743\u56fd**\u63d0\u4f9b\u5e76\u7ef4\u62a4\u5fc5\u8981\u7684\u56fd\u9645\u516c\u5171\u7269\u54c1\uff1b\n2. **\u673a\u5236**\uff1a\u9738\u6743\u56fd\u5177\u6709\u63d0\u4f9b\u516c\u5171\u7269\u54c1\u7684\u80fd\u529b\u548c\u610f\u613f\uff08\u5176\u5355\u65b9\u6536\u76ca\u8db3\u591f\u5927\uff09\uff1b\n3. **\u63a8\u8bba**\uff1a\u9738\u6743\u5f3a \u2192 \u516c\u5171\u7269\u54c1\u4f9b\u7ed9\u5145\u8db3 \u2192 \u4f53\u7cfb\u7a33\u5b9a\uff1b\u9738\u6743\u8870 \u2192 \u516c\u5171\u7269\u54c1\u4f9b\u7ed9\u4e0d\u8db3 \u2192 \u4f53\u7cfb\u4e0d\u7a33\uff1b\n4. **\u5386\u53f2\u7ecf\u9a8c**\uff1a19 \u4e16\u7eaa\u82f1\u56fd\u9738\u6743\u4e0b\u7684\u91d1\u672c\u4f4d + \u81ea\u7531\u8d38\u6613\uff1b1945 \u5e74\u540e\u7f8e\u56fd\u9738\u6743\u4e0b\u7684\u5e03\u96f7\u987f\u68ee\u6797 + GATT\uff1b\u4e24\u6b21\u5927\u6218\u95f4\u9738\u6743\u771f\u7a7a + \u5927\u8427\u6761\u3002\n\n**\u4e8c\u3001\u7406\u8bba\u8c31\u7cfb**\n\n1. **\u91d1\u5fb7\u5c14\u4f2f\u683c\"\u9886\u5bfc\u8bba\"**\uff1a\n   - \u300a1929\u20141939 \u5e74\u7684\u4e16\u754c\u7ecf\u6d4e\u8427\u6761\u300b\uff081973\uff09\uff1b\n   - \u4e94\u5927\u516c\u5171\u7269\u54c1\uff1a\u5f00\u653e\u5e02\u573a\u3001\u7a33\u5b9a\u6c47\u7387\u3001\u6700\u540e\u8d37\u6b3e\u4eba\u3001\u53cd\u5468\u671f\u957f\u671f\u8d37\u6b3e\u3001\u653f\u7b56\u534f\u8c03\uff1b\n2. **\u514b\u62c9\u65af\u7eb3\"\u9738\u6743\u4e0e\u673a\u5236\"**\uff1a\n   - \u300a\u56fd\u5bb6\u6743\u529b\u4e0e\u56fd\u9645\u8d38\u6613\u7ed3\u6784\u300b\uff081976\uff09\uff1b\n   - \u628a\u9738\u6743\u4e0e\u56fd\u9645\u673a\u5236\uff08regimes\uff09\u8fde\u63a5\uff0c\u9738\u6743\u4ea7\u751f\u673a\u5236\uff1b\n3. **\u5409\u5c14\u5e73\"\u9738\u6743\u5468\u671f\"**\uff1a\n   - \u300a\u56fd\u9645\u5173\u7cfb\u653f\u6cbb\u7ecf\u6d4e\u5b66\u300b\uff081987\uff09\uff1b\n   - \u9738\u6743\u5468\u671f\u5206\u56db\u9636\u6bb5\uff1a\u5174\u8d77\u2014\u6210\u719f\u2014\u8870\u843d\u2014\u66f4\u66ff\uff1b\n   - \u9738\u6743\u6218\u4e89\u662f\u66f4\u66ff\u7684\u5e38\u89c1\u673a\u5236\uff1b\n4. **\u57fa\u6b27\u6c49\u7684\u4fee\u6b63**\uff1a\n   - \u300a\u9738\u6743\u4e4b\u540e\u300b\uff081984\uff09\uff1b\n   - \u540c\u610f HST \u5bf9\u5174\u8d77\u7684\u89e3\u91ca\uff0c\u4f46\u8bba\u8bc1\u5236\u5ea6\u5177\u6709\u9ecf\u6027\uff0c\u9738\u6743\u8870\u9000\u540e\u4ecd\u53ef\u7ef4\u6301\u5408\u4f5c\uff1b\n5. **Modelski-Thompson \u957f\u6ce2\u9738\u6743\u5468\u671f**\uff1a\n   - \u7ea6 100\u2014120 \u5e74\u7684\u5168\u7403\u9738\u6743\u5468\u671f\uff1b\n   - \u4e0e\u5eb7\u5fb7\u62c9\u5b63\u8036\u592b\u957f\u6ce2\u53e0\u52a0\u3002\n\n**\u4e09\u3001\u7406\u8bba\u8bc4\u4ef7\uff1a\u4f18\u70b9**\n\n1. **\u89e3\u91ca\u529b**\uff1a\n   - \u89e3\u91ca 19 \u4 38\u6743\u6218\u4e89\"\uff09\u4f46\u53ef\u80fd\u8fc7\u5ea6\u60b2\u89c2\u3002\n\n**\u4e94\u3001\u5f53\u4ee3\u6f14\u53d8\u4e0e\u6311\u6218**\n\n1. **\u7f8e\u56fd\u76f8\u5bf9\u8870\u9000**\uff1a\n   - 1970 \u5e74\u4ee3\u8d77 GDP \u5360\u4e16\u754c\u6bd4\u91cd\u4e0b\u964d\uff1b\n   - \u4f46\u7edd\u5bf9\u5730\u4f4d\u4ecd\u4e3b\u5bfc\uff1b\n2. **\u65b0\u5174\u5927\u56fd\u5d1b\u8d77**\uff1a\n   - \u4e2d\u56fd\u6210\u4e3a\u7b2c\u4e8c\u5927\u7ecf\u6d4e\u4f53\uff1b\n   - \u5370\u5ea6\u3001\u5df4\u897f\u7b49\u4e5f\u5728\u4e0a\u5347\uff1b\n3. **\u516c\u5171\u7269\u54c1\u4f9b\u7ed9\u771f\u7a7a**\uff1a\n   - \u7f8e\u56fd\"\u9000\u7fa4\"\uff08\u5df4\u9ece\u534f\u5b9a\u3001\u4f0a\u6838\u534f\u8bae\u3001TPP\uff09\uff1b\n   - WTO \u4e0a\u8bc9\u673a\u6784\u762b\u75ea\uff1b\n   - \u6c14\u5019\u3001\u536b\u751f\u3001AI \u6cbb\u7406\u4f9b\u7ed9\u4e0d\u8db3\uff1b\n4. **\u591a\u5143\u4f9b\u7ed9\u8005**\uff1a\n   - \u4e2d\u56fd\u901a\u8fc7 AIIB\u3001BRI\u3001\u65b0\u5f00\u53d1\u94f6\u884c\u8865\u4f4d\uff1b\n   - \u6b27\u76df\u901a\u8fc7 GDPR\u3001CBAM \u7b49\u89c4\u5219\u4f9b\u7ed9\uff1b\n   - \u533a\u57df\u673a\u5236\uff08RCEP\u3001CPTPP\u3001ASEAN\uff09\u5174\u8d77\uff1b\n5. **\"\u91d1\u5fb7\u5c14\u4f2f\u683c\u9677\u9631\"\u518d\u8ba8\u8bba**\uff1a\n   - \u7ea6\u745f\u592b\u00b7\u5948\u62c5\u5fe7\u5d1b\u8d77\u56fd\u4e0d\u613f\u3001\u5b88\u6210\u56fd\u4e0d\u80fd \u2192 \u516c\u5171\u7269\u54c1\u4f9b\u7ed9\u771f\u7a7a\uff1b\n   - \u4f46\u4e2d\u56fd\u5b9e\u9645\u4e0a\u662f\u79ef\u6781\u7684\u516c\u5171\u7269\u54c1\u4f9b\u7ed9\u8005\uff1b\n6. **\u591a\u6781\u5316\u4e0b\u7684\u79e9\u5e8f\u95ee\u9898**\uff1a\n   - \u6ca1\u6709\u5355\u4e00\u9738\u6743\u7684\u79e9\u5e8f\u5982\u4f55\u7ef4\u7cfb\uff1f\n   - \u662f\u5426\u9700\u8981\u4ece\"\u9738\u6743\u7a33\u5b9a\"\u8fc7\u6e21\u5230\"\u534f\u4f5c\u7a33\u5b9a\"\uff1f\n\n**\u516d\u3001\u5bf9\u4e2d\u56fd\u7814\u7a76\u7684\u610f\u4e49**\n\n1. **\u4e2d\u56fd\u5d1b\u8d77\u7684\u7406\u8bba\u6311\u6218**\uff1a\n   - \u4e2d\u56fd\u4e0d\u5bfb\u6c42\u9738\u6743\u4f46\u5e0c\u671b\u53c2\u4e0e\u79e9\u5e8f\u5851\u9020\uff1b\n   - \u4e2d\u56fd\u5f0f\u5236\u5ea6\u4f9b\u7ed9\uff08AIIB\u3001BRI\u3001\u4eba\u7c7b\u547d\u8fd0\u5171\u540c\u4f53\uff09\uff1b\n2. **\"\u548c\u5e73\u5d1b\u8d77 / \u548c\u5e73\u53d1\u5c55\"**\uff1a\n   - \u4e0d\u91cd\u590d 19\u201420 \u4e16\u7eaa\u9738\u6743\u6218\u4e89\u6a21\u5f0f\uff1b\n   - \u901a\u8fc7\u65e2\u6709\u79e9\u5e8f\u5185\u5d1b\u8d77 + \u8865\u5145\u6027\u5236\u5ea6\u4f9b\u7ed9\uff1b\n3. **\u56fd\u9645\u516c\u5171\u7269\u54c1\u7684\u4e2d\u56fd\u8d21\u732e**\uff1a\n   - \u84dd\u76d4\u90e8\u961f\u3001\u9632\u6269\u6563\u5408\u4f5c\u3001\u6c14\u5019\u627f\u8bfa\u3001\u536b\u751f\u63f4\u52a9\u3001\u503a\u52a1\u51cf\u514d\uff1b\n   - \u5168\u7403\u53d1\u5c55\u3001\u5b89\u5168\u3001\u6587\u660e\u4e09\u5927\u5021\u8bae\uff1b\n4. **\u591a\u6781\u5316\u4e0e\u534f\u4f5c\u7a33\u5b9a**\uff1a\n   - \u4e2d\u56fd\u4e3b\u5f20\u591a\u8fb9\u4e3b\u4e49\u3001\u591a\u6781\u5316\u3001\u534f\u5546\u5171\u6cbb\uff1b\n   - \u53cd\u5bf9\u5355\u4e00\u9738\u6743\u53ca\u5176\u884d\u751f\u7684\u5bf9\u6297\u903b\u8f91\u3002\n\n**\u4e03\u3001HST \u7684\u5f53\u4ee3\u4fee\u6b63**\n\n1. **\u534f\u4f5c\u9738\u6743\uff08Snidal\uff09**\uff1a\n   - \u516c\u5171\u7269\u54c1\u53ef\u7531 K-\u96c6\u56e2\uff08\u51e0\u4e2a\u5927\u56fd\uff09\u8054\u5408\u63d0\u4f9b\uff1b\n   - \u4e0d\u9700\u5355\u4e00\u9738\u6743\uff1b\n2. **\u5d4c\u5165\u5f0f\u9738\u6743\uff08Ikenberry\uff09**\uff1a\n   - \u9738\u6743\u901a\u8fc7\u5236\u5ea6\u5316\u3001\u81ea\u6211\u7ea6\u675f\u3001\u53ef\u4fe1\u627f\u8bfa\u7ef4\u6301\uff1b\n   - \u5373\u4f7f\u6743\u529b\u8870\u9000\uff0c\u5236\u5ea6\u4ecd\u7ef4\u7cfb\u79e9\u5e8f\uff1b\n3. **\u591a\u8fb9\u4e3b\u4e49\u8865\u5145\u9738\u6743**\uff1a\n   - \u56fd\u9645\u5236\u5ea6 + \u591a\u8fb9\u673a\u5236\u627f\u62c5\u90e8\u5206\u516c\u5171\u7269\u54c1\u4f9b\u7ed9\uff1b\n4. **\u7f51\u7edc\u5316\u6cbb\u7406**\uff1a\n   - \u56fd\u5bb6 + \u56fd\u9645\u7ec4\u7ec7 + \u8de8\u56fd\u884c\u4e3a\u4f53 + \u533a\u57df\u673a\u5236\u5171\u540c\u6cbb\u7406\uff1b\n   - \u975e\"\u91d1\u5b57\u5854\"\u800c\u662f\"\u7f51\u7edc\u5316\"\u5168\u7403\u6cbb\u7406\u3002\n\n**\u516b\u3001\u7406\u8bba\u7ed3\u8bba**\n\n\u9738\u6743\u7a33\u5b9a\u7406\u8bba\u662f IPE \u5386\u53f2\u4e0a\u6700\u5177\u5f71\u54cd\u7684\u7406\u8bba\u4e4b\u4e00\uff0c\u5176\u6838\u5fc3\u6d1e\u89c1\u2014\u2014**\u516c\u5171\u7269\u54c1\u3001\u9886\u5bfc\u8d23\u4efb\u3001\u9738\u6743\u5468\u671f**\u2014\u2014\u81f3\u4eca\u4ecd\u5177\u89e3\u91ca\u529b\u3002\u5176\u5c40\u9650\u2014\u2014\u9738\u6743\u5b9a\u4e49\u6a21\u7cca\u3001\u5386\u53f2\u53cd\u4f8b\u3001\u6279\u5224\u89c6\u89d2\u7f3a\u4f4d\u3001\u5bf9\u5d1b\u8d77\u56fd\u7814\u7a76\u4e0d\u8db3\u2014\u2014\u4e5f\u4fc3\u4f7f\u7406\u8bba\u6301\u7eed\u4fee\u6b63\u300221 \u4e16\u7eaa\u5168\u7403\u6cbb\u7406\u5df2\u8fdb\u5165\"\u540e\u5355\u4e00\u9738\u6743\"\u65f6\u4ee3\uff0c\u9700\u8981\u53d1\u5c55**\u591a\u6781\u534f\u4f5c\u578b + \u5236\u5ea6\u5316 + \u7f51\u7edc\u5316**\u7684\u65b0\u6cbb\u7406\u7406\u8bba\u3002HST \u7684\u9057\u4ea7\u662f\u63d0\u9192\u6211\u4eec\uff1a**\u5168\u7403\u516c\u5171\u7269\u54c1\u7684\u7a33\u5b9a\u4f9b\u7ed9\u6c38\u8fdc\u662f\u7a00\u7f3a\u7684\u3001\u9700\u8981\u88ab\u523b\u610f\u7ef4\u62a4\u7684**\u2014\u2014\u65e0\u8bba\u662f\u901a\u8fc7\u9738\u6743\u3001\u5236\u5ea6\u8fd8\u662f\u534f\u4f5c\u3002\u4e2d\u56fd\u4f5c\u4e3a\u91cd\u8981\u65b0\u5174\u5927\u56fd\uff0c\u5e94\u5728\u5168\u7403\u516c\u5171\u7269\u54c1\u4f9b\u7ed9\u4e2d\u627f\u62c5\u4e0e\u5176\u80fd\u529b\u76f8\u79f0\u7684\u8d23\u4efb\uff0c\u4e0e\u5176\u4ed6\u4e3b\u8981\u7ecf\u6d4e\u4f53\u5171\u540c\u7ef4\u62a4\u5f00\u653e\u3001\u5305\u5bb9\u3001\u53ef\u6301\u7eed\u7684\u56fd\u9645\u79e9\u5e8f\uff08\u53c2\u89c1 Kindleberger 1973\uff1bKrasner 1976\uff1bGilpin 1987\uff1bKeohane 1984\uff1bIkenberry 2001\uff1b\u7530\u91ce\u7b2c\u56db\u7ae0\uff1b\u7ea6\u745f\u592b\u00b7\u5948\u5173\u4e8e\"\u91d1\u5fb7\u5c14\u4f2f\u683c\u9677\u9631\"\u7684\u8ba8\u8bba\uff09\u3002\n\n### 24. \u8fd0\u7528\u6240\u5b66 IPE \u7406\u8bba\u5206\u6790\u8d38\u6613\u4fdd\u62a4\u4e3b\u4e49\u4ea7\u751f\u7684\u56fd\u5185\u653f\u6cbb\u6839\u6e90\u3010\u6a21\u62df-12\u3011\n\n\u8d38\u6613\u4fdd\u62a4\u4e3b\u4e49\u5468\u671f\u6027\u5174\u8d77\u662f IPE \u7684\u6838\u5fc3\u8bae\u9898\u4e4b\u4e00\u3002\u5176\u4ea7\u751f\u7684\u56fd\u5185\u653f\u6cbb\u6839\u6e90\u6d89\u53ca\u591a\u91cd\u7406\u8bba\u6846\u67b6\u3002\n\n**\u4e00\u3001\u4fdd\u62a4\u4e3b\u4e49\u7684\u5386\u53f2\u5468\u671f**\n\n\u5386\u53f2\u4e0a\u8d38\u6613\u4fdd\u62a4\u4e3b\u4e49\u7ecf\u5386\u591a\u4e2a\u9ad8\u6f6e\uff1a\n1. **17\u201418 \u4e16\u7eaa\u91cd\u5546\u4e3b\u4e49\u65f6\u671f**\uff1a\u9ad8\u5173\u7a0e + \u6b96\u6c11\u5784\u65ad\uff1b\n2. **19 \u4e16\u7eaa\u540e\u671f**\uff1a1873 \u7ecf\u6d4e\u8427\u6761\u540e\u6b27\u7f8e\u666e\u904d\u63d0\u9ad8\u5173\u7a0e\uff1b\n3. **1930 \u5e74\u4ee3\u5927\u8427\u6761**\uff1a\u65af\u59c6\u7279-\u970d\u5229\u6cd5\u6848 + \u5173\u7a0e\u6218 + \u5e1d\u56fd\u7279\u60e0\u5236\uff1b\n4. **1970\u201480 \u5e74\u4ee3**\uff1a\u65e5\u672c\u8d38\u6613\u6469\u64e6\u3001\u81ea\u613f\u51fa\u53e3\u9650\u5236\u3001\u65b0\u4fdd\u62a4\u4e3b\u4e49\uff1b\n5. **2008 \u5e74\u5371\u673a\u540e**\uff1a\u8d38\u6613\u6551\u6d4e\u63aa\u65bd\u6fc0\u589e\uff1b\n6. **2017 \u5e74\u4ee5\u6765**\uff1a\u7279\u6717\u666e\"\u7f8e\u56fd\u4f18\u5148\"+ \u5168\u7403\u8d38\u6613\u6218 + \u62dc\u767b\"\u65b0\u534e\u76db\u987f\u5171\u8bc6\"\u3002\n\n\u6bcf\u6b21\u4fdd\u62a4\u4e3b\u4e49\u9ad8\u6f6e\u90fd\u6709\u7279\u5b9a\u7684\u56fd\u5185\u653f\u6cbb\u6839\u6e90\u3002\n\n**\u4e8c\u3001\u793e\u4f1a\u8054\u76df\u89c6\u89d2\uff08Rogowski/Hiscox\uff09**\n\n1. **\u8981\u7d20\u4e30\u88d5\u5ea6 + \u6d41\u52a8\u6027**\u51b3\u5b9a\u8d38\u6613\u51b2\u51fb\u4e0b\u7684\u653f\u6cbb\u5206\u5316\uff1a\n   - \u9ad8\u8981\u7d20\u6d41\u52a8 \u2192 \u9636\u7ea7\u8054\u76df\uff08\u8d44\u672c vs \u52b3\u52a8\uff09\uff1b\n   - \u4f4e\u8981\u7d20\u6d41\u52a8 \u2192 \u90e8\u95e8\u8054\u76df\uff08\u51fa\u53e3\u90e8\u95e8 vs \u8fdb\u53e3\u7ade\u4e89\u90e8\u95e8\uff09\uff1b\n2. **\u5f53\u4ee3\u53d1\u8fbe\u56fd\u5bb6\u4fdd\u62a4\u4e3b\u4e49\u7684\u6839\u6e90**\uff1a\n   - \u8d44\u672c\u4e30\u88d5\u4f46\u52b3\u52a8\u7a00\u7f3a \u2192 \u81ea\u7531\u8d38\u6613\u4f7f\u52b3\u52a8\u53d7\u635f\uff1b\n   - \u5236\u9020\u4e1a\u7a7a\u5fc3\u5316\u3001\u94c1\u9508\u5e26\u8870\u9000 \u2192 \u5f62\u6210\u53cd\u5168\u7403\u5316\u8054\u76df\uff1b\n   - \u53d7\u51b2\u51fb\u7fa4\u4f53\u89c4\u6a21\u6709\u9650\u4f46\u5730\u7406\u96c6\u4e2d\u3001\u653f\u6cbb\u9ad8\u6548\uff1b\n3. **\u53d1\u5c55\u4e2d\u56fd\u5bb6\u4fdd\u62a4\u4e3b\u4e49\u7684\u6839\u6e90**\uff1a\n   - \u8fdb\u53e3\u66ff\u4ee3\u65f6\u671f\u4fdd\u62a4\u672c\u5730\u5de5\u4e1a\u8d44\u672c\u4e0e\u57ce\u5e02\u6d88\u8d39\u8005\uff1b\n   - \u519c\u4e1a\u90e8\u95e8\u5728\u8d38\u6613\u5f00\u653e\u4e2d\u53ef\u80fd\u53d7\u51b2\u51fb\u3002\n\n**\u4e09\u3001\u4fdd\u62a4\u5f85\u552e\u6a21\u578b\uff08Grossman-Helpman 1994\uff09**\n\n1. **\u6838\u5fc3\u547d\u9898**\uff1a\u653f\u5e9c\u76ee\u6807\u51fd\u6570 = \u793e\u4f1a\u798f\u5229 + \u653f\u6cbb\u732e\u91d1\u52a0\u6743\u548c\uff1b\n2. **\u653f\u6cbb\u5747\u8861**\uff1a\n   - \u7ec4\u7ec7\u5316\u4ea7\u4e1a\uff08\u884c\u4e1a\u534f\u4f1a\u3001\u5927\u4f01\u4e1a\u3001\u5de5\u4f1a\uff09\u83b7\u5f97\u9ad8\u4fdd\u62a4\uff1b\n   - \u8fdb\u53e3\u9700\u6c42\u5f39\u6027\u4f4e\u3001\u8fdb\u53e3\u6e17\u900f\u7387\u9ad8\u7684\u4ea7\u4e1a\u66f4\u6613\u83b7\u4fdd\u62a4\uff1b\n3. **\u7ecf\u9a8c\u89e3\u91ca\u529b\u5f3a**\uff1a\n   - \u7f8e\u56fd\u519c\u4e1a\u3001\u7cd6\u4e1a\u3001\u94a2\u94c1\u3001\u6c7d\u8f66\u4fdd\u62a4\u7a0b\u5ea6\u9ad8\u4e8e\u5e02\u573a\u5747\u8861\uff1b\n   - \u5370\u5ea6\u3001\u5df4\u897f\u3001\u58a8\u897f\u54e5\u5236\u9020\u4e1a\u4fdd\u62a4\u5448\u73b0\u7c7b\u4f3c\u6a21\u5f0f\uff1b\n4. **\u5bf9\u5f53\u4ee3\u7f8e\u56fd\u4fdd\u62a4\u4e3b\u4e49\u7684\u89e3\u91ca**\uff1a\n   - \u519c\u4e1a\u5229\u76ca\u96c6\u56e2\uff08\u7389\u7c73\u3001\u5927\u8c46\u3001\u7cd6\u3001\u4e73\u5236\u54c1\uff09\uff1b\n   - \u5236\u9020\u4e1a\uff08\u94a2\u94c1\u3001\u94dd\u3001\u7535\u6c60\u3001\u534a\u5bfc\u4f53\uff09\uff1b\n   - \u5de5\u4f1a\uff08\u6c7d\u8f66\u3001\u94a2\u94c1\u5de5\u4eba\u8054\u5408\u4f1a\uff09\uff1b\n   - \u90fd\u6210\u4e3a\u4fdd\u62a4\u4e3b\u4e49\u653f\u7b56\u7684\u4e3b\u8981\u53d7\u76ca\u8005\u4e0e\u6e38\u8bf4\u8005\u3002\n\n**\u56db\u3001\u5bfb\u79df\u89c6\u89d2\uff08Krueger / Bhagwati\uff09**\n\n1. \u4fdd\u62a4\u653f\u7b56\u521b\u9020\"\u79df\u91d1\"\uff08\u53d7\u4fdd\u62a4\u884c\u4e1a\u7684\u8d85\u989d\u5229\u6da6\uff09\uff1b\n2. \u884c\u4e1a\u5229\u76ca\u96c6\u56e2\u6709\u52a8\u673a\u6295\u5165\u8d44\u6e90\u4e89\u53d6\u4fdd\u62a4\uff08\u5bfb\u79df\uff09\uff1b\n3. **\u96c6\u4f53\u884c\u52a8\u903b\u8f91**\uff08\u5965\u5c14\u68ee\uff09\uff1a\n   - \u53d7\u76ca\u65b9\u5c11\u800c\u96c6\u4e2d \u2192 \u6613\u7ec4\u7ec7\uff1b\n   - \u53d7\u635f\u65b9\uff08\u6d88\u8d39\u8005\u3001\u51fa\u53e3\u90e8\u95e8\u3001\u7eb3\u7a0e\u4eba\uff09\u591a\u800c\u5206\u6563 \u2192 \u96be\u7ec4\u7ec7\uff1b\n4. **\u5df4\u683c\u74e6\u8482\u7684 DUP \u7406\u8bba**\uff1a\n   - \u76f4\u63a5\u975e\u751f\u4ea7\u6027\u9010\u5229\u6d3b\u52a8\uff08DUP\uff09\u9020\u6210\u793e\u4f1a\u798f\u5229\u635f\u5931\uff1b\n   - \u4fdd\u62a4\u4e3b\u4e49\u4e0d\u4ec5\u662f\u5206\u914d\u95ee\u9898\uff0c\u66f4\u662f\u6548\u7387\u95ee\u9898\u3002\n\n**\u4e94\u3001\u653f\u6cbb\u5236\u5ea6\u89c6\u89d2**\n\n1. **\u9009\u4e3e\u5236\u5ea6**\uff1a\n   - \u591a\u6570\u5236\u4e0b\u8bae\u5458\u5bf9\u9009\u533a\u5229\u76ca\uff08\u7279\u522b\u662f\u5730\u65b9\u5236\u9020\u4e1a\uff09\u9ad8\u5ea6\u654f\u611f \u2192 \u66f4\u6613\u652f\u6301\u4fdd\u62a4\uff1b\n   - \u6bd4\u4f8b\u4ee3\u8868\u5236\u4e0b\u4fdd\u62a4\u503e\u5411\u76f8\u5bf9\u5f31\u5316\uff08\u4f46\u519c\u4e1a\u5229\u76ca\u96c6\u56e2\u4ecd\u5f3a\uff09\uff1b\n2. **\u653f\u5e9c\u7c7b\u578b**\uff1a\n   - \u603b\u7edf\u5236 + \u56fd\u4f1a\u5f3a\u5e72\u9884 \u2192 \u6613\u9677\u5165\u4fdd\u62a4\u6e38\u8bf4\u653f\u6cbb\uff08\u7f8e\u56fd\uff09\uff1b\n   - \u8bae\u4f1a\u5236 + \u884c\u653f\u4e3b\u5bfc \u2192 \u51b3\u7b56\u66f4\u6574\u4f53\u6027\uff08\u6b27\u6d32\uff09\uff1b\n3. **\u8054\u90a6\u5236 vs \u5355\u4e00\u5236**\uff1a\n   - \u8054\u90a6\u5236\u4e0b\u5730\u65b9\u5229\u76ca\u66f4\u6613\u53cd\u6620\u5230\u4e2d\u592e\u653f\u7b56\uff1b\n   - \u5355\u4e00\u5236\u4e0b\u4e2d\u592e\u534f\u8c03\u80fd\u529b\u66f4\u5f3a\uff1b\n4. **\u653f\u515a\u4f53\u5236**\uff1a\n   - \u4e24\u515a\u5236\u4e0b\u653f\u515a\u4e89\u593a\u4e2d\u95f4\u9009\u6c11\u53ef\u80fd\u8f6c\u5411\u4fdd\u62a4\u4e3b\u4e49\u8bae\u7a0b\uff1b\n   - \u591a\u515a\u5236\u4e0b\u4fdd\u62a4\u4e3b\u4e49\u8bc9\u6c42\u88ab\u5206\u6563\u5230\u4e0d\u540c\u653f\u515a\u3002\n\n**\u516d\u3001\"\u98a0\u5012\u7684\u7b2c\u4e8c\u610f\u8c61\"\u89c6\u89d2\uff08Gourevitch\uff09**\n\n1. **\u56fd\u9645\u51b2\u51fb \u2192 \u56fd\u5185\u91cd\u7ec4**\uff1a\n   - 1930 \u5927\u8427\u6761 \u2192 \u7f8e\u56fd\u65b0\u653f + \u9ad8\u5173\u7a0e + \u7f57\u65af\u798f\u8054\u76df\uff1b\n   - \"China Shock\" \u2192 \u7f8e\u56fd\u94c1\u9508\u5e26\u8870\u9000 \u2192 \u6c11\u7cb9\u4e3b\u4e49 + \u7279\u6717\u666e\u73b0\u8c61\uff1b\n   - \u65b0\u51a0\u75ab\u60c5 \u2192 \u4f9b\u5e94\u94fe\u5b89\u5168\u7126\u8651 \u2192 \u7ecf\u6d4e\u5b89\u5168\u4f18\u5148\uff1b\n2. **\u56fd\u9645\u5236\u5ea6\u7684\u56de\u6eaf\u5f71\u54cd**\uff1a\n   - WTO \u5165\u4e16\u63a8\u52a8\u4e2d\u56fd\u56fd\u5185\u6539\u9769\uff1b\n   - \u4f46\u53d1\u8fbe\u56fd\u5bb6\u56fd\u5185\u5bf9 WTO \u7684\u53cd\u5f39\u4e5f\u52a0\u5267\uff08\u4fdd\u62a4\u4e3b\u4e49\u3001\u5355\u8fb9\u4e3b\u4e49\uff09\u3002\n\n**\u4e03\u3001Rodrik\"\u8d85\u7ea7\u5168\u7403\u5316\u4e09\u96be\"\u89c6\u89d2**\n\n1. \u6df1\u5ea6\u5168\u7403\u5316\u3001\u6c11\u65cf\u56fd\u5bb6\u3001\u6c11\u4e3b\u653f\u6cbb\u4e09\u8005\u4e0d\u53ef\u517c\u5f97\uff1b\n2. \u5f53\u6df1\u5ea6\u5168\u7403\u5316\u4e0e\u6c11\u4e3b\u653f\u6cbb\u51b2\u7a81\u65f6\uff0c\u6c11\u4e3b\u53ef\u80fd\u9009\u62e9\u9650\u5236\u5168\u7403\u5316\uff1b\n3. \u4fdd\u62a4\u4e3b\u4e49\u662f\u6c11\u4e3b\u653f\u6cbb\u5bf9\u5168\u7403\u5316\u7684\"\u53cd\u5f39\"\u5f62\u5f0f\uff1b\n4. **\u89e3\u51b3\u8def\u5f84**\uff1a\u6e29\u548c\u5168\u7403\u5316 + \u56fd\u5185\u653f\u7b56\u7a7a\u95f4\u6269\u5c55\u3002\n\n**\u516b\u3001\u5f53\u4ee3\u7279\u6b8a\u6839\u6e90**\n\n1. **\u4e0d\u5e73\u7b49\u52a0\u5267**\uff1a\n   - \u5168\u7403\u5316\u6536\u76ca\u9ad8\u5ea6\u96c6\u4e2d\uff08\u91d1\u878d\u3001\u79d1\u6280\u3001\u8de8\u56fd\u516c\u53f8\uff09\uff1b\n   - \u635f\u5931\u5e7f\u6cdb\u5206\u6563\uff08\u5236\u9020\u4e1a\u5de5\u4eba\u3001\u4f20\u7edf\u4ea7\u4e1a\uff09\uff1b\n   - \u6536\u5165\u4e0e\u8d22\u5bcc\u4e0d\u5e73\u7b49\u63a8\u52a8\u53cd\u5168\u7403\u5316\u653f\u6cbb\uff1b\n2. **\u7ecf\u6d4e\u5b89\u5168\u610f\u8bc6\u4e0a\u5347**\uff1a\n   - \u5173\u952e\u6280\u672f\u3001\u5173\u952e\u77ff\u4ea7\u3001\u533b\u7597\u7269\u8d44\u3001\u80fd\u6e90\u3001\u7cae\u98df\u7684\u5b89\u5168\u7126\u8651\uff1b\n   - \u63a8\u52a8\u4ea7\u4e1a\u653f\u7b56\u56de\u5f52\u3001\u5173\u952e\u4ea7\u4e1a\u672c\u571f\u5316\uff1b\n3. **\u5730\u7f18\u653f\u6cbb\u5316**\uff1a\n   - \u4e2d\u7f8e\u535a\u5f08 + \u4fc4\u4e4c\u6218\u4e89 \u2192 \u7ecf\u6d4e\u8bae\u9898\u88ab\u5b89\u5168\u5316\uff1b\n   - \"\u53bb\u98ce\u9669\u5316\"\u3001\"\u53cb\u5cb8\u5916\u5305\"\u3001\"\u8fd1\u5cb8\u5916\u5305\"\u6210\u4e3a\u65b0\u578b\u4fdd\u62a4\u4e3b\u4e49\u5f62\u5f0f\uff1b\n4. **\u65b0\u578b\u4fdd\u62a4\u5de5\u5177**\uff1a\n   - \u51fa\u53e3\u7ba1\u5236\uff08\u534a\u5bfc\u4f53\u3001AI\uff09\uff1b\n   - \u6295\u8d44\u5ba1\u67e5\uff08CFIUS\u3001EU \u5916\u8d44\u5ba1\u67e5\uff09\uff1b\n   - \u6570\u636e\u672c\u5730\u5316\u8981\u6c42\uff1b\n   - \u8865\u8d34\u7ade\u4e89\uff08CHIPS \u6cd5\u6848\u3001\u901a\u80c0\u524a\u51cf\u6cd5\u6848\uff09\uff1b\n5. **\u610f\u8bc6\u5f62\u6001\u53d8\u8fc1**\uff1a\n   - \u65b0\u81ea\u7531\u4e3b\u4e49\u5171\u8bc6\u74e6\u89e3\uff1b\n   - \u56fd\u5bb6\u4e3b\u4e49\u3001\u4ea7\u4e1a\u653f\u7b56\u3001\u5de5\u4eba\u4fdd\u62a4\u91cd\u65b0\u5408\u6cd5\u5316\u3002\n\n**\u4e5d\u3001\u4fdd\u62a4\u4e3b\u4e49\u7684\u653f\u6cbb\u540e\u679c**\n\n1. **\u56fd\u9645**\uff1a\n   - \u8d38\u6613\u6469\u64e6\u5347\u7ea7\uff1b\n   - \u5168\u7403\u4ef7\u503c\u94fe\u91cd\u7ec4\uff1b\n   - \u591a\u8fb9\u8d38\u6613\u4f53\u5236\u5f31\u5316\uff1b\n2. **\u56fd\u5185**\uff1a\n   - \u77ed\u671f\u4fdd\u62a4\u7279\u5b9a\u884c\u4e1a\uff1b\n   - \u4f46\u62ac\u5347\u6d88\u8d39\u8005\u4ef7\u683c\u3001\u635f\u5bb3\u51fa\u53e3\u90e8\u95e8\u3001\u964d\u4f4e\u957f\u671f\u6548\u7387\uff1b\n   - \u6613\u5f15\u53d1\u5bfb\u79df\u653f\u6cbb\u3001\u5236\u5ea6\u50f5\u5316\uff1b\n3. **\u653f\u6cbb\u53cd\u5f39**\uff1a\n   - \u53d7\u635f\u90e8\u95e8\uff08\u51fa\u53e3\u5546\u3001\u6d88\u8d39\u8005\uff09\u53cd\u5411\u6e38\u8bf4\uff1b\n   - \u4fdd\u62a4\u653f\u7b56\u53ef\u80fd\u53cd\u590d\uff08\u5982\u7f8e\u56fd\u5173\u7a0e\u653f\u7b56\u9891\u7e41\u8c03\u6574\uff09\u3002\n\n**\u5341\u3001\u5bf9\u4e2d\u56fd\u610f\u6db5**\n\n1. **\u4e2d\u56fd\u662f\u4fdd\u62a4\u4e3b\u4e49\u4e3b\u8981\u76ee\u6807**\uff1a\n   - \u7f8e\u56fd\u5bf9\u534e\u5173\u7a0e\u3001\u51fa\u53e3\u7ba1\u5236\u3001\u6295\u8d44\u9650\u5236\uff1b\n   - \u6b27\u76df\u53cd\u8865\u8d34\u8c03\u67e5\uff08\u7535\u52a8\u8f66\uff09\uff1b\n   - \u5370\u5ea6\u3001\u5370\u5c3c\u5bf9\u4e2d\u56fd\u5546\u54c1\u7684\u53cd\u503e\u9500\uff1b\n2. **\u4e2d\u56fd\u5e94\u5bf9**\uff1a\n   - \u7ef4\u62a4\u591a\u8fb9\u8d38\u6613\u4f53\u5236\uff1b\n   - \u63a8\u52a8 RCEP\u3001CPTPP\u3001DEPA \u7b49\u533a\u57df\u5408\u4f5c\uff1b\n   - \u53cd\u5236\u7f8e\u56fd\u5173\u7a0e\u4e0e\u51fa\u53e3\u7ba1\u5236\uff1b\n   - \u6269\u5927\u5185\u9700 + \u53cc\u5faa\u73af\uff1b\n   - \u63a8\u52a8\u4ea7\u4e1a\u5347\u7ea7\u4ee5\u5e94\u5bf9\u4f4e\u7aef\u4ea7\u4e1a\u8f6c\u79fb\uff1b\n3. **\u907f\u514d\u5bf9\u7b49\u4fdd\u62a4\u9677\u9631**\uff1a\n   - \u4e0d\u5168\u9762\u95ed\u5173\uff0c\u4fdd\u6301\u9ad8\u6c34\u5e73\u5f00\u653e\uff1b\n   - \u9009\u62e9\u6027\u53cd\u5236\u3001\u4e0d\u6269\u5927\u5316\uff1b\n   - \u63a8\u52a8\u516c\u5e73\u8d38\u6613\u89c4\u5219\u3002\n\n**\u5341\u4e00\u3001\u653f\u7b56\u5efa\u8bae**\n\n1. **\u56fd\u9645\u5c42\u9762**\uff1a\n   - \u7ef4\u62a4 WTO \u6838\u5fc3\u5730\u4f4d\u3001\u63a8\u52a8\u6539\u9769\uff1b\n   - \u53cd\u5bf9\u5355\u8fb9\u4e3b\u4e49\u3001\u4fdd\u62a4\u4e3b\u4e49\uff1b\n   - \u52a0\u5f3a\u56fd\u9645\u89c4\u5219\u4f9b\u7ed9\uff08\u6570\u5b57\u8d38\u6613\u3001\u7eff\u8272\u8d38\u6613\u3001\u53ef\u6301\u7eed\u6e14\u4e1a\u8865\u8d34\uff09\uff1b\n2. **\u56fd\u5185\u5c42\u9762**\uff1a\n   - \u914d\u5957\u518d\u5206\u914d + \u518d\u57f9\u8bad + \u793e\u4f1a\u4fdd\u969c\uff1b\n   - \u51cf\u5c11\u5168\u7403\u5316\u8f93\u5bb6\u653f\u6cbb\u53cd\u5f39\u57fa\u7840\uff1b\n   - \u4ea7\u4e1a\u5347\u7ea7\u914d\u5957\uff0c\u5316\u89e3\u4f4e\u7aef\u4ea7\u4e1a\u8f6c\u79fb\u538b\u529b\uff1b\n3. **\u8de8\u8bae\u9898**\uff1a\n   - \u52a0\u5f3a\u56fd\u9645\u5b8f\u89c2\u534f\u8c03\uff1b\n   - \u5e94\u5bf9\u6c14\u5019\u3001\u536b\u751f\u3001AI \u7b49\u65b0\u8bae\u9898\u9700\u8981\u5168\u7403\u5408\u4f5c\u800c\u975e\u4fdd\u62a4\u4e3b\u4e49\u3002\n\n**\u5341\u4e8c\u3001\u7406\u8bba\u7ed3\u8bba**\n\n\u8d38\u6613\u4fdd\u62a4\u4e3b\u4e49\u7684\u56fd\u5185\u653f\u6cbb\u6839\u6e90\u662f**\u793e\u4f1a\u8054\u76df\u5206\u5316 + \u5229\u76ca\u96c6\u56e2\u5bfb\u79df + \u653f\u6cbb\u5236\u5ea6\u8fc7\u6ee4 + \u56fd\u9645\u51b2\u51fb\u56de\u6eaf + \u610f\u8bc6\u5f62\u6001\u53d8\u8fc1**\u591a\u91cd\u56e0\u7d20\u7684\u7efc\u5408\u4ea7\u7269\u3002\u5176\u5f53\u4ee3\u7279\u70b9\u662f**\u7ecf\u6d4e\u5b89\u5168\u5316 + \u5730\u7f18\u653f\u6cbb\u5316 + \u4e0d\u5e73\u7b49\u9a71\u52a8**\u3002\u5e94\u5bf9\u4fdd\u62a4\u4e3b\u4e49\u9700\u8981\u5728**\u56fd\u9645\u89c4\u5219\u7ef4\u62a4\u3001\u56fd\u5185\u518d\u5206\u914d\u914d\u5957\u3001\u4ea7\u4e1a\u5347\u7ea7\u3001\u591a\u8fb9\u5408\u4f5c**\u591a\u4e2a\u5c42\u9762\u7efc\u5408\u65bd\u7b56\u3002\u4e2d\u56fd\u4f5c\u4e3a\u5f00\u653e\u578b\u7ecf\u6d4e\u4f53\uff0c\u5e94\u575a\u6301\u9ad8\u6c34\u5e73\u5f00\u653e\uff0c\u540c\u65f6\u901a\u8fc7\u56fd\u5185\u653f\u7b56\u5316\u89e3\u5168\u7403\u5316\u653f\u6cbb\u538b\u529b\uff0c\u907f\u514d\u9677\u5165\u897f\u65b9\"\u8d38\u6613\u51b2\u51fb \u2192 \u6c11\u7cb9\u53cd\u5f39 \u2192 \u4fdd\u62a4\u4e3b\u4e49\"\u7684\u8d1f\u53cd\u9988\u5faa\u73af\uff08\u53c2\u89c1 Rogowski 1989\uff1bGrossman-Helpman 1994\uff1bHiscox 2002\uff1bRodrik 2011\uff1b\u7530\u91ce\u7b2c\u516d\u7ae0\uff1b\u5b8b\u65b0\u5b81/\u9648\u5cb3\u7b2c\u4e09\u7ae0\uff09\u3002\n\n### 25. \u8bc4\u6790\u4e16\u754c\u4f53\u7cfb\u7406\u8bba\u3010\u6a21\u62df-13\u3011\n\n\u4e16\u754c\u4f53\u7cfb\u7406\u8bba\uff08World System Theory\uff09\u7531\u6c83\u52d2\u65af\u5766\uff08Wallerstein, 1930\u20142019\uff09\u521b\u7acb\uff0c\u662f 20 \u4e16\u7eaa\u540e\u671f\u6700\u5177\u5f71\u54cd\u529b\u7684\u5b8f\u89c2\u793e\u4f1a\u7406\u8bba\u4e4b\u4e00\u3002\u5176\u4ee3\u8868\u4f5c\u300a\u73b0\u4ee3\u4e16\u754c\u4f53\u7cfb\u300b\u56db\u5377\u672c\uff081974\u20142011\uff09\u4ee5\u53ca\u300a\u4e16\u754c\u4f53\u7cfb\u5206\u6790\u5bfc\u8bba\u300b\uff082004\uff09\u3002\n\n**\u4e00\u3001\u7406\u8bba\u6838\u5fc3\u547d\u9898**\n\n1. **\u4e16\u754c\u4f53\u7cfb\u662f\u5206\u6790\u5355\u4f4d**\uff1a\n   - \u7a81\u7834\u6c11\u65cf\u56fd\u5bb6\u5206\u6790\u6846\u67b6\uff0c\u628a\"\u4e16\u754c\"\u4f5c\u4e3a\u5206\u6790\u5355\u4f4d\uff1b\n   - \u73b0\u4ee3\u4e16\u754c\u4f53\u7cfb\u8d77\u6e90\u4e8e 16 \u4e16\u7eaa\u6b27\u6d32\u8d44\u672c\u4e3b\u4e49\u6269\u5f20\uff1b\n2. **\u8d44\u672c\u4e3b\u4e49\u7684\u4e16\u754c\u2014\u7ecf\u6d4e\u6027\u8d28**\uff1a\n   - \u73b0\u4ee3\u4e16\u754c\u4f53\u7cfb\u672c\u8d28\u662f**\u5355\u4e00\u8d44\u672c\u4e3b\u4e49\u4e16\u754c\u2014\u7ecf\u6d4e + \u591a\u5143\u653f\u6cbb\u6743\u5a01\uff08\u6c11\u65cf\u56fd\u5bb6\u4f53\u7cfb\uff09**\uff1b\n   - \u4e0e\u53e4\u4ee3\u4e16\u754c\u5e1d\u56fd\uff08\u5355\u4e00\u653f\u6cbb\u6743\u5a01\uff09\u5f62\u6210\u5bf9\u6bd4\uff1b\n3. **\u4e09\u5c42\u4e0d\u5e73\u7b49\u5206\u5de5**\uff1a\n   - **\u4e2d\u5fc3**\uff1a\u9ad8\u6280\u672f\u3001\u9ad8\u8d44\u672c\u5bc6\u5ea6\u3001\u81ea\u7531\u52b3\u52a8\u3001\u5f3a\u56fd\u5bb6\uff1b\n   - **\u534a\u8fb9\u7f18**\uff1a\u4e2d\u7b49\u6280\u672f\u3001\u6df 6784\u5206\u6790\u672a\u5145\u5206\u5d4c\u5165\u5fae\u89c2\u884c\u4e3a\u8005\uff1b\n   - \u4e0e\u535a\u5f08\u8bba\u3001\u7406\u6027\u9009\u62e9\u7406\u8bba\u5bf9\u8bdd\u4e0d\u8db3\u3002\n\n**\u4e94\u3001\u5f53\u4ee3\u6f14\u53d8**\n\n1. **\u534a\u8fb9\u7f18\u4e0a\u5347\u7684\u6311\u6218**\uff1a\n   - \u4e2d\u56fd\u3001\u5370\u5ea6\u3001\u5df4\u897f\u3001\u5357\u975e\u3001\u58a8\u897f\u54e5\u3001\u571f\u8033\u5176\u3001\u5370\u5c3c\u7b49\u8fc5\u901f\u53d1\u5c55\uff1b\n   - \u90e8\u5206\u56fd\u5bb6\uff08\u7279\u522b\u662f\u4e2d\u56fd\uff09\u663e\u793a\u51fa\"\u7a81\u7834\u534a\u8fb9\u7f18\u9501\u5b9a\"\u7684\u53ef\u80fd\uff1b\n2. **\u91d1\u878d\u5316\u7684\u5168\u7403\u6269\u5c55**\uff1a\n   - \u6c83\u52d2\u65af\u5766\u540e\u671f\u5224\u65ad\u5f53\u4ee3\u4f53\u7cfb\u5904\u4e8e\"\u91d1\u878d\u5316\"\u9636\u6bb5\uff0c\u9884\u793a\u9738\u6743\u8870\u9000\uff1b\n   - 2008 \u5371\u673a\u540e\u8fd9\u4e00\u5224\u65ad\u5f97\u5230\u90e8\u5206\u5370\u8bc1\uff1b\n3. **\u6c14\u5019\u5371\u673a\u4e0e\u751f\u6001\u8fb9\u754c**\uff1a\n   - \u8d44\u672c\u4e3b\u4e49\u65e0\u9650\u6269\u5f20\u906d\u9047\u5730\u7403\u751f\u6001\u8fb9\u754c\uff1b\n   - \u8fd9\u662f\u4e16\u754c\u4f53\u7cfb\u8bba\"\u5185\u90e8\u77db\u76fe\"\u7684\u65b0\u8868\u73b0\uff1b\n4. **\u6570\u5b57\u8d44\u672c\u4e3b\u4e49**\uff1a\n   - \u5e73\u53f0\u7ecf\u6d4e\u3001\u6570\u636e\u8d44\u672c\u3001AI \u521b\u9020\u65b0\u7684\u4e2d\u5fc3\u2014\u5916\u56f4\u5173\u7cfb\uff1b\n   - \"\u6570\u5b57\u6b96\u6c11\"\u6210\u4e3a\u65b0\u8bae\u9898\uff1b\n5. **\u4e2d\u56fd\u5d1b\u8d77\u7684\u4f53\u7cfb\u542b\u4e49**\uff1a\n   - \u4e2d\u56fd\u80fd\u5426\u5b9e\u73b0\"\u975e\u4f9d\u9644\u6027\u53d1\u5c55\"\uff1f\n   - \u4e2d\u56fd\u5d1b\u8d77\u4f1a\u5426\u5e26\u6765\u4f53\u7cfb\u6027\u8f6c\u578b\uff1f\n   - \u6c83\u52d2\u65af\u5766\u7684\u60b2\u89c2\u8bba\u4e0e\u4e2d\u56fd\u7684\u6210\u957f\u662f\u5426\u6784\u6210\u7ed3\u6784\u6027\u77db\u76fe\uff1f\n\n**\u516d\u3001\u5bf9\u4e2d\u56fd\u7814\u7a76\u7684\u610f\u4e49**\n\n1. **\u7406\u89e3 u6790\u5355\u4f4d\u3001\u63ed\u793a\u957f\u65f6\u6bb5\u7ed3\u6784\u6027\u4e0d\u5e73\u7b49\u3001\u6574\u5408\u9738\u6743\u5468\u671f\u4e0e\u957f\u6ce2**\u2014\u2014\u81f3\u4eca\u5177\u6709\u91cd\u8981\u4ef7\u503c\u3002\u5176\u5c40\u9650\u2014\u2014\u51b3\u5b9a\u8bba\u503e\u5411\u3001\u6982\u5ff5\u6a21\u7cca\u3001\u5bf9\u534a\u8fb9\u7f18\u4e0a\u5347\u89e3\u91ca\u4e0d\u8db3\u2014\u2014\u4e5f\u4fc3\u4f7f\u7406\u8bba\u6301\u7eed\u4fee\u6b63\u300221 \u4e16\u7eaa\u5168\u7403\u8d44\u672c\u4e3b\u4e49\u9762\u4e34\u6df1\u523b\u8f6c\u578b\uff1a\u91d1\u878d\u5316\u3001\u6c14\u5019\u5371\u673a\u3001\u6280\u672f\u9769\u547d\u3001\u534a\u8fb9\u7f18\u5d1b\u8d77\u3001\u9738\u6743\u8c03\u6574\u2014\u2014\u6240\u6709\u8fd9\u4e9b\u90fd\u9700\u8981\u5728\u4e16\u754c\u4f53\u7cfb\u89c6\u91ce\u4e0b\u91cd\u65b0\u7406\u89e3\u3002\u5bf9\u4e2d\u56fd\u7814\u7a76\u800c\u8a00\uff0c\u4e16\u754c\u4f53\u7cfb\u8bba\u65e2\u662f**\u8b66\u793a**\uff08\u907f\u514d\u88ab\u9501\u5b9a\u5728\u534a\u8fb9\u7f18\uff09\u4e5f\u662f**\u673a\u9047**\uff08\u5728\u4f53\u7cfb\u8f6c\u578b\u4e2d\u5b9e\u73b0\u4f4d\u7f6e\u5347\u7ea7\uff09\u3002\u7406\u8bba\u4e0e\u73b0\u5b9e\u7684\u5bf9\u8bdd\u5c06\u7ee7\u7eed\u63a8\u52a8 IPE \u7814\u7a76\u7684\u6df1\u5316\uff08\u53c2\u89c1 Wallerstein 1974\u20142011\uff1bArrighi 1994\uff1bFrank 1998\uff1b\u738b\u6b63\u6bc5\uff1b\u5b8b\u65b0\u5b81/\u9648\u5cb3\u7b2c\u516d\u7ae0\uff09\u3002\n\n### 26. \u8fd0\u7528\u6240\u5b66 IPE \u7406\u8bba\u5206\u6790\u4e2d\u56fd\u7684\u80fd\u6e90\u5b89\u5168\u95ee\u9898\u3010\u6a21\u62df-13\u3011\n\n\u4e2d\u56fd\u80fd\u6e90\u5b89\u5168\u662f\u56fd\u5bb6\u5b89\u5168\u3001\u7ecf\u6d4e\u53d1\u5c55\u3001\u5916\u4ea4\u6218\u7565\u7684\u6838\u5fc3\u8bae\u9898\u3002\u5176\u590d\u6742\u6027\u6d89\u53ca\u4f9b\u7ed9\u3001\u4ef7\u683c\u3001\u8fd0\u8f93\u3001\u8f6c\u578b\u3001\u5730\u7f18\u653f\u6cbb\u7b49\u591a\u7ef4\u5ea6\u3002\n\n**\u4e00\u3001\u80fd\u6e90\u5b89\u5168\u7684\u5185\u6db5**\n\n1. **\u4f20\u7edf\u80fd\u6e90\u5b89\u5168**\uff1a\n   - **\u4f9b\u7ed9\u5b89\u5168**\uff1a\u80fd\u6e90\u4f9b\u5e94\u4e0d\u88ab\u4e2d\u65ad\uff1b\n   - **\u4ef7\u683c\u5b89\u5168**\uff1a\u80fd\u6e90\u4ef7\u683c\u53ef\u627f\u53d7\u3001\u4e0d\u5927\u5e45\u6ce2\u52a8\uff1b\n   - **\u8fd0\u8f93\u5b89\u5168**\uff1a\u8fdb\u53e3\u8fd0\u8f93\u901a\u9053\u4e0d\u88ab\u5207\u65ad\uff1b\n2. **\u73b0\u4ee3\u80fd\u6e90\u5b89\u5168**\uff1a\n   - **\u7ed3\u6784\u5b89\u5168**\uff1a\u80fd\u6e90\u7ed3\u6784\u591a\u5143\u5316\u3001\u53ef\u6301\u7eed\uff1b\n   - **\u6280\u672f\u5b89\u5168**\uff1a\u80fd\u6e90\u6280\u672f\u81ea\u4e3b\u53ef\u63a7\uff1b\n   - **\u8f6c\u578b\u5b89\u5168**\uff1a\u80fd\u6e90\u8f6c\u578b\u8fc7\u7a0b\u4e0d\u5f15\u53d1\u7cfb\u7edf\u6027\u98ce\u9669\uff1b\n   - **\u6c14\u5019\u5b89\u5168**\uff1a\u80fd\u6e90\u6d3b\u52a8\u4e0d\u5f15\u53d1\u4e0d\u53ef\u9006\u6c14\u5019\u98ce\u9669\u3002\n\n**\u4e8c\u3001\u4e2d\u56fd\u80fd\u6e90\u73b0\u72b6**\n\n1. **\u80fd\u6e90\u7ed3\u6784**\uff082023\uff09\uff1a\n   - \u7164\u70ad\u5360\u4e00\u6b21\u80fd\u6e90 55.3%\uff1b\n   - \u77f3\u6cb9 18.0%\uff1b\n   - \u5929\u7136\u6c14 8.5%\uff1b\n   - \u975e\u5316\u77f3\u80fd\u6e90 17.2%\uff08\u6c34\u7535\u3001\u98ce\u7535\u3001\u592a\u9633\u80fd\u3001\u6838\u7535\u3001\u751f\u7269\u8d28\uff09\uff1b\n2. **\u5bf9\u5916\u4f9d\u5b58\u5ea6**\uff1a\n   - **\u77f3\u6cb9** 72%\uff082023\uff09\u2014\u2014\u5c45\u9ad8\u4e0d\u4e0b\uff1b\n   - **\u5929\u7136\u6c14** 42%\uff1b\n   - **\u94c1\u77ff\u77f3** 80%+\uff1b\n3. **\u6838\u5fc3\u8fdb\u53e3\u6765\u6e90**\uff1a\n   - \u77f3\u6cb9\uff1a\u6c99\u7279\u3001\u4fc4\u7f57\u65af\u3001\u4f0a\u62c9\u514b\u3001\u5b89\u54e5\u62c9\u3001\u963f\u66fc\u3001\u963f\u8054\u914b\uff1b\n   - \u5929\u7136\u6c14\uff1a\u4fc4\u7f57\u65af\u3001\u571f\u5e93\u66fc\u65af\u5766\u3001\u6fb3\u5927\u5229\u4e9a\u3001\u5361\u5854\u5c14\u3001\u9a6c\u6765\u897f\u4e9a\uff1b\n4. **\u8fd0\u8f93\u901a\u9053**\uff1a\n   - \u6d77\u8fd0\uff08\u7ea6 80% \u77f3\u6cb9\uff09\uff1a\u9a6c\u516d\u7532\u6d77\u5ce1\u662f\u5173\u952e\u74f6\u9888\uff08\"\u9a6c\u516d\u7532\u56f0\u5c40\"\uff09\uff1b\n   - \u9646\u8def\uff1a\u4e2d\u4fc4\u7ba1\u9053\u3001\u4e2d\u4e9a\u7ba1\u9053\u3001\u4e2d\u7f05\u7ba1\u9053\u3001\u4e2d\u5df4\u7ecf\u6d4e\u8d70\u5eca\u3002\n\n**\u4e09\u3001\u80fd\u6e90\u5b89\u5168\u7684\u6311\u6218**\n\n1. **\u4f20\u7edf\u6311\u6218**\uff1a\n   - **\u8fdb\u53e3\u9ad8\u4f9d\u5b58**\uff1a\u77f3\u6cb9\u3001\u5929\u7136\u6c14\u5927\u91cf\u4f9d\u8d56\u8fdb\u53e3\uff1b\n   - **\u4ef7\u683c\u6ce2\u52a8**\uff1a\u56fd\u9645\u6cb9\u4ef7\u5927\u5e45\u6ce2\u52a8\u5f71\u54cd\u7ecf\u6d4e\u7a33\u5b9a\uff1b\n   - **\u8fd0\u8f93\u74f6\u9888**\uff1a\u9a6c\u516d\u7532\u6d77\u5ce1\u3001\u970d\u5c14\u6728\u5179\u6d77\u5ce1\u3001\u82cf\u4f0a\u58eb\u8fd0\u6cb3\u7b49\u6218\u7565\u8981\u51b2\uff1b\n2. **\u5730\u7f18\u653f\u6cbb\u6311\u6218**\uff1a\n   - **\u4e2d\u7f8e\u535a\u5f08**\uff1a\u7f8e\u56fd\u6d77\u519b\u53ef\u80fd\u5a01\u80c1\u6d77\u4e0a\u80fd\u6e90\u901a\u9053\uff1b\n   - **\u4e2d\u4e1c\u4e0d\u7a33**\uff1a\u4f0a\u6717\u3001\u6c99\u7279\u3001\u4e5f\u95e8\u51b2\u7a81\u5f71\u54cd\u4e2d\u4e1c\u80fd\u6e90\u4f9b\u7ed9\uff1b\n   - **\u4fc4\u4e4c\u6218\u4e89**\uff1a\u4fc4\u7f57\u65af\u80fd\u6e90\u51fa\u53e3\u8f6c\u5411\u4e2d\u56fd\uff0c\u4f46\u4e5f\u5e26\u6765\"\u8fc7\u5ea6\u4f9d\u8d56\u4fc4\u7f57\u65af\"\u98ce\u9669\uff1b\n   - **\"\u5c0f\u9662\u9ad8\u5899\"**\uff1a\u7f8e\u56fd\u9650\u5236\u4e2d\u56fd\u83b7\u53d6\u5173\u952e\u80fd\u6e90\u6280\u672f\uff08\u5982\u5148\u8fdb\u6838\u7535\u6280\u672f\uff09\uff1b\n3. **\u6c14\u5019\u8f6c\u578b\u6311\u6218**\uff1a\n   - **\u53cc\u78b3\u76ee\u6807**\uff1a2030 \u78b3\u8fbe\u5cf0\u30012060 \u78b3\u4e2d\u548c\uff1b\n   - **\u7164\u70ad\u9ad8\u5360\u6bd4**\uff1a\u8f6c\u578b\u538b\u529b\u5927\uff1b\n   - **\u65b0\u80fd\u6e90\u4ea7\u4e1a\u5347\u7ea7**\uff1a\u7535\u6c60\u3001\u5149\u4f0f\u3001\u98ce\u7535\u3001\u50a8\u80fd\u6280\u672f\u6301\u7eed\u7a81\u7834\uff1b\n4. **\u56fd\u5185\u6311\u6218**\uff1a\n   - **\u80fd\u6e90\u6d88\u8d39\u4ecd\u5feb\u901f\u589e\u957f**\uff1a\u7ecf\u6d4e\u53d1\u5c55 + \u57ce\u5e02\u5316 + \u5de5\u4e1a\u5316\uff1b\n   - **\u6548\u7387\u63d0\u5347\u538b\u529b**\uff1a\u5355\u4f4d GDP \u80fd\u8017\u4ecd\u9ad8\u4e8e\u53d1\u8fbe\u56fd\u5bb6\uff1b\n   - **\u65b0\u80fd\u6e90\u6d88\u7eb3**\uff1a\u98ce\u5149\u53d1\u7535\u6ce2\u52a8\u6027 \u2192 \u7535\u7f51\u8c03\u8282\u538b\u529b\uff1b\n5. **\u6280\u672f\u6311\u6218**\uff1a\n   - \u5173\u952e\u6280\u672f\uff08\u5148\u8fdb\u6838\u7535\u3001\u50a8\u80fd\u3001\u6c22\u80fd\u3001\u667a\u80fd\u7535\u7f51\uff09\u90e8\u5206\u4ecd\u4f9d\u8d56\u56fd\u5916\uff1b\n   - \"\u5361\u8116\u5b50\"\u98ce\u9669\u3002\n\n**\u56db\u3001\u7406\u8bba\u5206\u6790**\n\n**1. \u7ed3\u6784\u6027\u6743\u529b\u89c6\u89d2\uff08Strange\uff09**\uff1a\n- \u80fd\u6e90\u5b89\u5168\u662f\u6784\u5efa\u4e2d\u56fd\u751f\u4ea7\u7ed3\u6784\u3001\u5b89\u5168\u7ed3\u6784\u6743\u529b\u7684\u6838\u5fc3\uff1b\n- \u7f8e\u56fd\u901a\u8fc7\u4e2d\u4e1c\u9a7b\u519b + \u6d77\u519b\u4f18\u52bf + \u7f8e\u5143\u77f3\u6cb9\u5b9a\u4ef7\u6784\u5efa\u80fd\u6e90\u9738\u6743\uff1b\n- \u4e2d\u56fd\u9700\u901a\u8fc7\u591a\u5143\u5316 + \u81ea\u4e3b\u6280\u672f + \u66ff\u4ee3\u57fa\u7840\u8bbe\u65bd\u63d0\u5347\u7ed3\u6784\u6027\u6743\u529b\u3002\n\n**2. \u516c\u5171\u7269\u54c1\u4e0e\u9738\u6743\u7a33\u5b9a\uff08\u91d1\u5fb7\u5c14\u4f2f\u683c\uff09**\uff1a\n- \u80fd\u6e90\u4f53\u7cfb\u7684\u7a33\u5b9a\uff08\u5305\u62ec\u822a\u9053\u5b89\u5168\u3001\u4ef7\u683c\u7a33\u5b9a\uff09\u5177\u516c\u5171\u7269\u54c1\u5c5e\u6027\uff1b\n- \u7f8e\u56fd\u6d77\u519b\u957f\u671f\u63d0\u4f9b\u8fd9\u4e00\u516c\u5171\u7269\u54c1\uff1b\n- \u7f8e\u56fd\u76f8\u5bf9\u8870\u9000\u80cc\u666f\u4e0b\u9700\u8981\u66f4\u591a\u56fd\u5bb6\u53c2\u4e0e\u7ef4\u62a4\u3002\n\n**3. \u590d\u5408\u76f8\u4e92\u4f9d\u8d56\uff08\u57fa\u6b27\u6c49/\u5948\uff09**\uff1a\n- \u80fd\u6e90\u8d38\u6613\u4f7f\u5404\u65b9\u76f8\u4e92\u4f9d\u8d56\uff1b\n- \u654f\u611f\u6027 + \u8106\u5f31\u6027\u53cc\u91cd\u7ef4\u5ea6\uff1b\n- \u4e2d\u56fd\u5bf9\u4e2d\u4e1c\u3001\u4fc4\u7f57\u65af\u80fd\u6e90\u4f9d\u8d56\u5177\u4e0d\u540c\u8106\u5f31\u6027\u7279\u5f81\u3002\n\n**4. \u98a0\u5012\u7684\u7b2c\u4e8c\u610f\u8c61**\uff1a\n- \u56fd\u9645\u80fd\u6e90\u5e02\u573a\u6ce2\u52a8 \u2192 \u56fd\u5185\u7ecf\u6d4e + \u653f\u6cbb\u8c03\u6574\uff1b\n- 1973\u30011979\u30012008\u30012022 \u7b49\u80fd\u6e90\u5371\u673a\u5851\u9020\u4e2d\u56fd\u56fd\u5185\u80fd\u6e90\u653f\u7b56\u3002\n\n**5. \u8def\u5f84\u4f9d\u8d56**\uff1a\n- \u7164\u70ad\u57fa\u7840\u8bbe\u65bd + \u706b\u7535\u4f53\u7cfb\u6df1\u5ea6\u9501\u5b9a\uff1b\n- \u8f6c\u578b\u9762\u4e34\u8def\u5f84\u4f9d\u8d56\u963b\u529b\uff1b\n- \u4f46\u65b0\u80fd\u6e90\u4ea7\u4e1a + \u7535\u52a8\u8f66 + \u667a\u80fd\u7535\u7f51\u6784\u6210\u65b0\u8def\u5f84\u3002\n\n**6. \u56fd\u5bb6\u4e3b\u4e49 / \u4ea7\u4e1a\u653f\u7b56**\uff1a\n- \u4e2d\u56fd\u80fd\u6e90\u6218\u7565\u5177\u663e\u8457\u56fd\u5bb6\u4e3b\u5bfc\u7279\u5f81\uff1b\n- \u56fd\u5bb6\u77f3\u6cb9\u516c\u53f8\uff08\u4e09\u6876\u6cb9\uff09\u3001\u56fd\u5bb6\u7535\u7f51\u3001\u65b0\u80fd\u6e90\u4ea7\u4e1a\u653f\u7b56\uff1b\n- \u7c7b\u4f3c\u65e5\u97e9\u53d1\u5c55\u578b\u56fd\u5bb6\u505a\u6cd5\u3002\n\n**\u4e94\u3001\u5e94\u5bf9\u6218\u7565**\n\n**1. \u4f9b\u7ed9\u591a\u5143\u5316**\uff1a\n- **\u6765\u6e90\u591a\u5143**\uff1a\u4e2d\u4e1c + \u4fc4\u7f57\u65af + \u4e2d\u4e9a + \u975e\u6d32 + \u62c9\u7f8e + \u6fb3\u5927\u5229\u4e9a\uff1b\n- **\u8fd0\u8f93\u591a\u5143**\uff1a\u6d77\u8fd0 + \u9646\u8def\u7ba1\u9053 + LNG\uff1b\n- **\u50a8\u5907\u4f53\u7cfb**\uff1a\u6218\u7565\u77f3\u6cb9\u50a8\u5907 + \u5546\u4e1a\u50a8\u5907\uff1b\n\n**2. \u901a\u9053\u5b89\u5168**\uff1a\n- **\u6d77\u519b\u5efa\u8bbe**\uff1a\u8fdc\u6d77\u62a4\u822a\u80fd\u529b\uff08\u4e9a\u4e01\u6e7e\u62a4\u822a\u7f16\u961f\u3001\u822a\u6bcd\u7f16\u961f\uff09\uff1b\n- **\u9646\u8def\u66ff\u4ee3**\uff1a\u4e2d\u4fc4\u7ba1\u9053\uff08\u897f\u4f2f\u5229\u4e9a 1+2\uff09\u3001\u4e2d\u4e9a\u7ba1\u9053\u3001\u4e2d\u7f05\u7ba1\u9053\u3001\u4e2d\u5df4\u7ecf\u6d4e\u8d70\u5eca\uff1b\n- **\u56fd\u9645\u5408\u4f5c**\uff1a\u4e0e\u6cbf\u9014\u56fd\u5bb6\u5408\u4f5c\u3001\u53c2\u4e0e\u6d77\u4e0a\u53cd\u6d77\u76d7\u7b49\uff1b\n\n**3. \u7ed3\u6784\u8c03\u6574**\uff1a\n- **\u53bb\u7164\u589e\u6c14**\uff1a\u5929\u7136\u6c14\u66ff\u4ee3\u90e8\u5206\u7164\u70ad\uff1b\n- **\u5927\u529b\u53d1\u5c55\u65b0\u80fd\u6e90**\uff1a\u5149\u4f0f + \u98ce\u7535 + \u6838\u7535 + \u6c34\u7535 + \u50a8\u80fd\uff1b\n- **\u7535\u52a8\u5316**\uff1a\u4ea4\u901a\u7535\u52a8\u5316\u964d\u4f4e\u77f3\u6cb9\u4f9d\u8d56\uff1b\n- **\u6c22\u80fd**\uff1a\u957f\u671f\u80fd\u6e90\u8f6c\u578b\u8def\u5f84\uff1b\n\n**4. \u6280\u672f\u81ea\u4e3b**\uff1a\n- **\u65b0\u80fd\u6e90\u6280\u672f**\uff1a\u5149\u4f0f\uff08\u9686\u57fa\u3001\u6676\u6fb3\uff09\u3001\u98ce\u7535\uff08\u91d1\u98ce\u3001\u8fdc\u666f\uff09\u3001\u7535\u6c60\uff08\u5b81\u5fb7\u3001\u6bd4\u4e9a\u8fea\uff09\u5168\u7403\u9886\u5148\uff1b\n- **\u6838\u7535**\uff1a\u534e\u9f99\u4e00\u53f7\u3001\u7b2c\u56db\u4ee3\u6838\u7535\uff1b\n- **\u50a8\u80fd**\uff1a\u5316\u5b66\u50a8\u80fd\u3001\u62bd\u6c34\u84c4\u80fd\u3001\u65b0\u578b\u7535\u6c60\uff1b\n- **\u667a\u80fd\u7535\u7f51**\uff1a\u7279\u9ad8\u538b\u3001\u865a\u62df\u7535\u5382\u3001\u80fd\u6e90\u4e92\u8054\u7f51\uff1b\n\n**5. \u56fd\u9645\u5408\u4f5c**\uff1a\n- **\u80fd\u6e90\u5916\u4ea4**\uff1a\u4e0a\u5408\u7ec4\u7ec7\u3001\u91d1\u7816\u3001\u963f\u76df\u3001\u975e\u76df\u80fd\u6e90\u5408\u4f5c\uff1b\n- **\u4e00\u5e26\u4e00\u8def**\uff1a\u80fd\u6e90\u57fa\u7840\u8bbe\u65bd\u4e92\u8054\u4e92\u901a\uff1b\n- **\u6c14\u5019\u5408\u4f5c**\uff1a\u53c2\u4e0e\u300a\u5df4\u9ece\u534f\u5b9a\u300b\u3001\u63a8\u52a8\u7eff\u8272\u5408\u4f5c\uff1b\n- **\u80fd\u6e90\u91d1\u878d**\uff1a\u4eba\u6c11\u5e01\u7ed3\u7b97\u3001CIPS \u5e94\u7528\uff1b\n\n**6. \u4ef7\u683c\u673a\u5236**\uff1a\n- **\u4e0a\u6d77\u539f\u6cb9\u671f\u8d27**\uff1a\u63a8\u52a8\u4eba\u6c11\u5e01\u539f\u6cb9\u5b9a\u4ef7\u6743\uff1b\n- **\u5929\u7136\u6c14\u3001\u7164\u70ad\u3001\u7535\u529b\u5e02\u573a\u5316\u6539\u9769**\uff1a\u7406\u987a\u4ef7\u683c\u673a\u5236\uff1b\n- **\u78b3\u5e02\u573a**\uff1a\u78b3\u6392\u653e\u6743\u4ea4\u6613\u4f53\u7cfb\uff1b\n\n**7. \u6cbb\u7406\u6539\u9769**\uff1a\n- **\u56fd\u5bb6\u80fd\u6e90\u5c40 + \u56fd\u5bb6\u53d1\u6539\u59d4**\u7edf\u7b79\uff1b\n- **\u80fd\u6e90\u6cd5**\u4fee\u8ba2\uff1b\n- **\u65b0\u578b\u80fd\u6e90\u4f53\u7cfb**\u5efa\u8bbe\uff1b\n- **\u8282\u80fd\u51cf\u6392**\uff1a\u5355\u4f4d GDP \u80fd\u8017\u6301\u7eed\u4e0b\u964d\uff1b\n\n**8. \u5e94\u5bf9\u5730\u7f18\u98ce\u9669**\uff1a\n- **\u907f\u514d\u5355\u4e00\u4f9d\u8d56**\uff1a\u4fc4\u7f57\u65af\u3001\u4e2d\u4e1c\u90fd\u4e0d\u8fc7\u5ea6\u4f9d\u8d56\uff1b\n- **\u91d1\u878d\u5236\u88c1\u5e94\u5bf9**\uff1a\u672c\u5e01\u7ed3\u7b97\u3001\u66ff\u4ee3\u652f\u4ed8\u7cfb\u7edf\u3001\u50a8\u5907\u591a\u5143\uff1b\n- **\u519b\u4e8b\u5a01\u6151**\uff1a\u6d77\u519b\u80fd\u529b\u5efa\u8bbe\uff1b\n- **\u5916\u4ea4\u5316\u89e3**\uff1a\u4e0e\u4e2d\u4e1c\u56fd\u5bb6\u3001\u4fc4\u7f57\u65af\u4fdd\u6301\u7a33\u5b9a\u5173\u7cfb\u3002\n\n**\u516d\u3001\u53cc\u78b3\u76ee\u6807\u4e0e\u80fd\u6e90\u8f6c\u578b**\n\n1. **2030 \u78b3\u8fbe\u5cf0**\uff1a\n   - \u80fd\u6e90\u6d88\u8d39\u603b\u91cf\u63a7\u5236\uff1b\n   - \u7164\u70ad\u6d88\u8d39\u7a33\u4e2d\u6709\u964d\uff1b\n   - \u975e\u5316\u77f3\u80fd\u6e90\u5360\u6bd4 25%\uff1b\n2. **2060 \u78b3\u4e2d\u548c**\uff1a\n   - \u80fd\u6e90\u7ed3\u6784\u6839\u672c\u6027\u53d8\u9769\uff1b\n   - \u975e\u5316\u77f3\u80fd\u6e90\u5360\u6bd4 80%+\uff1b\n3. **\u65b0\u578b\u7535\u529b\u7cfb\u7edf**\uff1a\n   - \u4ee5\u65b0\u80fd\u6e90\u4e3a\u4e3b\u4f53\uff1b\n   - \u50a8\u80fd + \u667a\u80fd\u7535\u7f51 + \u5206\u5e03\u5f0f\u80fd\u6e90\uff1b\n4. **\u7eff\u8272\u91d1\u878d**\uff1a\n   - \u7eff\u8272\u503a\u5238\u3001ESG \u6295\u8d44\u3001\u8f6c\u578b\u91d1\u878d\uff1b\n5. **\u65b0\u80fd\u6e90\u4ea7\u4e1a\u5168\u7403\u9886\u5148**\uff1a\n   - \u4e2d\u56fd\u5236\u9020\u7684\u5149\u4f0f\u3001\u98ce\u7535\u3001\u7535\u6c60\u652f\u6491\u5168\u7403\u80fd\u6e90\u8f6c\u578b\uff1b\n   - \u540c\u65f6\u9762\u4e34\u7f8e\u6b27\u53cd\u8865\u8d34\u3001\u8d38\u6613\u58c1\u5792\u6311\u6218\u3002\n\n**\u4e03\u3001\u5f53\u524d\u91cd\u70b9\u8bae\u9898**\n\n1. **\u4fc4\u7f57\u65af\u80fd\u6e90\u4f9d\u8d56\u7ba1\u7406**\uff1a\n   - \u4fc4\u4e4c\u6218\u4e89\u540e\u4e2d\u4fc4\u80fd\u6e90\u8d38\u6613\u6269\u5927\uff1b\n   - \u9700\u5e73\u8861\u673a\u4f1a\u4e0e\u4f9d\u8d56\u98ce\u9669\uff1b\n2. **\u4e2d\u4e1c\u6218\u7565\u7ba1\u7406**\uff1a\n   - \u6c99\u7279 + \u4f0a\u6717 + \u963f\u8054\u914b + \u5361\u5854\u5c14\u5747\u662f\u91cd\u8981\u4f19\u4f34\uff1b\n   - \u4e2d\u56fd\u63a8\u52a8\u6c99\u4f0a\u548c\u89e3\u663e\u793a\u5916\u4ea4\u65a1\u65cb\u80fd\u529b\uff1b\n3. **\u5173\u952e\u77ff\u4ea7\u5b89\u5168**\uff1a\n   - \u9502\u3001\u94b4\u3001\u954d\u3001\u7a00\u571f\u5bf9\u65b0\u80fd\u6e90\u81f3\u5173\u91cd\u8981\uff1b\n   - \u7f8e\u6b27\u4e89\u593a\u5173\u952e\u77ff\u4ea7\uff1b\n4. **\u6838\u80fd\u590d\u5174**\uff1a\n   - \u7b2c\u56db\u4ee3\u6838\u7535\u3001\u5c0f\u5806\u3001\u805a\u53d8\uff1b\n5. **\u6c22\u80fd\u4e0e\u50a8\u80fd\u4ea7\u4e1a\u94fe**\uff1a\n   - \u957f\u671f\u6218\u7565\u50a8\u5907\uff1b\n   - \u56fd\u9645\u6807\u51c6\u7ade\u4e89\u3002\n\n**\u516b\u3001\u7406\u8bba\u7ed3\u8bba**\n\n\u4e2d\u56fd\u80fd\u6e90\u5b89\u5168\u662f**\u7ecf\u6d4e\u53d1\u5c55 + \u56fd\u5bb6\u5b89\u5168 + \u6c14\u5019\u8f6c\u578b + \u5730\u7f18\u535a\u5f08**\u591a\u7ef4\u4ea4\u7ec7\u7684\u6218\u7565\u8bae\u9898\u3002\u5176\u5e94\u5bf9\u9700\u8981**\u4f9b\u7ed9\u591a\u5143\u5316 + \u7ed3\u6784\u8c03\u6574 + \u6280\u672f\u81ea\u4e3b + \u56fd\u9645\u5408\u4f5c + \u4ef7\u683c\u5e02\u573a\u5316**\u7efc\u5408\u7b56\u7565\u3002\u4ece IPE \u7406\u8bba\u770b\uff0c\u80fd\u6e90\u5b89\u5168\u662f\u4e2d\u56fd\u6784\u5efa\u7efc\u5408\u56fd\u529b\u3001\u63d0\u5347\u56fd\u9645\u5730\u4f4d\u3001\u53c2\u4e0e\u5168\u7403\u6cbb\u7406\u7684\u5173\u952e\u8f7d\u4f53\u3002\u5c55\u671b\u672a\u6765\uff0c\u4e2d\u56fd\u80fd\u6e90\u5b89\u5168\u5c06\u8fdb\u5165\"\u4f20\u7edf\u5b89\u5168 + \u8f6c\u578b\u5b89\u5168 + \u6c14\u5019\u5b89\u5168\"\u4e09\u4f4d\u4e00\u4f53\u7684\u65b0\u9636\u6bb5\uff0c**\u53cc\u78b3\u76ee\u6807 + \u65b0\u578b\u80fd\u6e90\u4f53\u7cfb + \u5173\u952e\u77ff\u4ea7 + \u6570\u5b57\u5316\u8f6c\u578b** \u662f\u6838\u5fc3\u6218\u7565\u65b9\u5411\u3002\u4e2d\u56fd\u80fd\u6e90\u5b89\u5168\u6210\u529f\u4e0d\u4ec5\u5173\u4e4e\u4e2d\u56fd\uff0c\u4e5f\u5173\u4e4e\u5168\u7403\u6c14\u5019\u3001\u80fd\u6e90\u3001\u7ecf\u6d4e\u79e9\u5e8f\u7684\u672a\u6765\uff08\u53c2\u89c1 Strange 1988\uff1bYergin\u300a\u80fd\u6e90\u91cd\u5851\u4e16\u754c\u300b\uff1b\u7530\u91ce\u7b2c\u5341\u7ae0\uff1b\u56fd\u5bb6\u80fd\u6e90\u5c40\u80fd\u6e90\u84dd\u76ae\u4e66\u7cfb\u5217\uff1b\u7fdf\u4e1c\u5347\u76f8\u5173\u7814\u7a76\uff09\u3002\n\n### 27. \u8bc4\u6790\u8d38\u6613\u548c\u5e73\u7406\u8bba\u3010\u6a21\u62df-14\u3011\n\n\u8d38\u6613\u548c\u5e73\u7406\u8bba\uff08commercial peace theory\uff09\u662f\u56fd\u9645\u653f\u6cbb\u7ecf\u6d4e\u5b66\u4e2d\u5173\u4e8e\"\u7ecf\u6d4e\u76f8\u4e92\u4f9d\u8d56\u662f\u5426\u4fc3\u8fdb\u548c\u5e73\"\u8fd9\u4e00\u6838\u5fc3\u547d\u9898\u7684\u7cfb\u7edf\u7814\u7a76\u3002\u5176\u8c31\u7cfb\u81ea\u5b5f\u5fb7\u65af\u9e20\u3001\u5eb7\u5fb7\u5230\u5f53\u4ee3\u6ce2\u62c9\u5207\u514b\u3001\u7f57\u65af\u514b\u5170\u65af\u3001\u7f57\u7d20\u7279\u2014\u5965\u5c3c\u5c14\u3001\u79d1\u666e\u5170\uff0c\u6784\u6210\u81ea\u7531\u4e3b\u4e49\u548c\u5e73\u8bba\u7684\u6838\u5fc3\u7ec4\u4ef6\u3002\n\n**\u4e00\u3001\u7406\u8bba\u8c31\u7cfb**\n\n1. **\u601d\u60f3\u524d\u53f2**\uff1a\n   - \u5b5f\u5fb7\u65af\u9e20\u300a\u8bba\u6cd5\u7684\u7cbe\u795e\u300b\uff081748\uff09\uff1a\"\u5546\u4e1a\u7684\u81ea\u7136\u6548\u679c\u662f\u5e26\u6765\u548c\u5e73\"\uff1b\n   - \u5eb7\u5fb7\u300a\u6c38\u4e45\u548c\u5e73\u8bba\u300b\uff081795\uff09\uff1a\u5546\u4e1a\u7cbe\u795e\u3001\u5171\u548c\u5baa\u653f\u3001\u56fd\u9645\u8054\u90a6\u4e09\u4f4d\u4e00\u4f53\uff1b\n   - 19 \u4e16\u7eaa\u66fc\u5f7b\u65af\u7279\u5b66\u6d3e\uff08Cobden, Bright\uff09\uff1a\u81ea\u7531\u8d38\u6613\u5fc5\u7136\u5e26\u6765\u548c\u5e73\uff1b\n   - \u8bfa\u66fc\u00b7\u5b89\u6770\u5c14\u300a\u5927\u5e7b\u8c61\u300b\uff081910\uff09\uff1a\u73b0\u4ee3\u7ecf\u6d4e\u76f8\u4e92\u4f9d\u8d56\u4f7f\u6218\u4e89\u4e0d\u53ef\u60f3\u8c61\uff08\u4e00\u6218\u8bc1\u4f2a\u6b64\u8bba\uff09\uff1b\n2. **\u5f53\u4ee3\u590d\u5174**\uff1a\n   - \u6ce2\u62c9\u5207\u514b\uff08Polachek, 1980\uff09\uff1a\u7ecf\u9a8c\u7814\u7a76\u5f00\u521b\u6027\u8d21\u732e\uff1b\n   - \u7f57\u65af\u514b\u5170\u65af\uff08Rosecrance, 1986\uff09\uff1a\u8d38\u6613\u56fd\u5b8f\u89c2\u8bba\u8bc1\uff1b\n   - \u7f57\u7d20\u7279\u2014\u5965\u5c3c\u5c14\uff08Russett & Oneal, 2001\uff09\uff1a\u5eb7\u5fb7\u4e09\u89d2\u7efc\u5408\uff1b\n   - \u79d1\u666e\u5170\uff08Copeland, 2015\uff09\uff1a\u8d38\u6613\u9884\u671f\u7406\u8bba\u4fee\u6b63\uff1b\n3. **\u6279\u5224\u4e0e\u6311\u6218**\uff1a\n   - \u7c73\u5c14\u65af\u6d77\u9ed8\uff08Mearsheimer\uff09\uff1a\u8d38\u6613\u5e76\u975e\u548c\u5e73\u6839\u672c\u57fa\u7840\uff1b\n   - Barbieri\uff1a\u8d38\u6613\u5173\u7cfb\u53ef\u80fd\u52a0\u5267\u800c\u975e\u7f13\u548c\u51b2\u7a81\uff1b\n   - \u6b66\u5668\u5316\u76f8\u4e92\u4f9d\u8d56\uff08Farrell & Newman, 2019\uff09\uff1a\u7ecf\u6d4e\u8054\u7cfb\u53ef\u88ab\u6b66\u5668\u5316\u3002\n\n**\u4e8c\u3001\u6838\u5fc3\u547d\u9898\u4e0e\u673a\u5236**\n\n1. **\u57fa\u672c\u547d\u9898**\uff1a\u7ecf\u6d4e\u76f8\u4e92\u4f9d\u8d56\uff08\u7279\u522b\u662f\u8d38\u6613\uff09\u7a0b\u5ea6\u63d0\u5347 \u2192 \u51b2\u7a81\u6982\u7387\u4e0b\u964d\uff1b\n2. **\u5fae\u89c2\u673a\u5236**\uff1a\n   - **\u673a\u4f1a\u6210\u672c**\uff1a\u51b2\u7a81\u4f1a\u7834\u574f\u65e2\u6709\u8d38\u6613\uff0c\u673a\u4f1a\u6210\u672c\u4e0a\u5347 \u2192 \u56fd\u5bb6\u66f4\u514b\u5236\uff1b\n   - **\u8de8\u56fd\u5229\u76ca\u96c6\u56e2**\uff1a\u5546\u4e1a\u5229\u76ca\u96c6\u56e2\u53cd\u5bf9\u51b2\u7a81\uff1b\n   - **\u4fe1\u606f\u6e20\u9053**\uff1a\u7ecf\u6d4e\u8054\u7cfb\u589e\u52a0\u6c9f\u901a\uff0c\u964d\u4f4e\u8bef\u5224\uff1b\n   - **\u5b66\u4e60\u4e0e\u793e\u4f1a\u5316**\uff1a\u957f\u671f\u5408\u4f5c\u5185\u5316\u5408\u4f5c\u504f\u597d\uff1b\n3. **\u6ce2\u62c9\u5207\u514b\u7684\u7ecf\u9a8c\u8d21\u732e**\uff1a\n   - 1980 \u8bba\u6587\u8fd0\u7528 1958\u20141967 \u53cc\u8fb9\u6570\u636e\uff1b\n   - \u8d38\u6613\u7ffb\u500d \u2192 \u51b2\u7a81\u51cf\u5c11\u7ea6 1/5\uff08\u5f39\u6027 -0.19 \u81f3 -0.34\uff09\uff1b\n4. **\u7f57\u65af\u514b\u5170\u65af\u7684\u5b8f\u89c2\u8d21\u732e**\uff1a\n   - \u4e8c\u6218\u540e**\u8d38\u6613\u56fd vs \u519b\u4e8b\u2014\u9886\u571f\u56fd**\u4e24\u6761\u8def\u5f84\uff1b\n   - \u6838\u6b66\u5668 + \u8de8\u56fd\u751f\u4ea7 + \u56fd\u9645\u5236\u5ea6\u4f7f\u8d38\u6613\u56fd\u6a21\u5f0f\u5360\u4f18\uff1b\n5. **\u5eb7\u5fb7\u4e09\u89d2\u7684\u7efc\u5408**\uff1a\n   - \u6c11\u4e3b + \u8d38\u6613 + \u56fd\u9645\u7ec4\u7ec7\u4e09\u4f4d\u4e00\u4f53\uff1b\n   - \u7ecf\u9a8c\u4e0a\u663e\u8457\u964d\u4f4e\u51b2\u7a81\uff1b\n6. **\u79d1\u666e\u5170\u7684\u9884\u671f\u4fee\u6b63**\uff1a\n   - \u51b3\u5b9a\u548c\u5e73\u7684\u4e0d\u662f\u5f53\u524d\u8d38\u6613\u989d\uff0c\u800c\u662f**\u672a\u6765\u8d38\u6613\u9884\u671f**\uff1b\n   - \u9884\u671f\u672a\u6765\u8d38\u6613\u5c06\u88ab\u5207\u65ad \u2192 \u53cd\u800c\u53ef\u80fd\u5f15\u53d1\u9884\u9632\u6027\u51b2\u7a81\u3002\n\n**\u4e09\u3001\u7406\u8bba\u8bc4\u4ef7\uff1a\u4f18\u70b9**\n\n1. **\u7406\u8bba\u7efc\u5408\u6027**\uff1a\u628a\u7ecf\u6d4e\u4e0e\u653f\u6cbb\u3001\u5546\u4e1a\u4e0e\u6218\u4e89\u7edf\u4e00\u5728\u6846\u67b6\u5185\uff1b\n2. **\u7ecf\u9a8c\u57fa\u7840\u624e\u5b9e**\uff1a\u5927\u91cf\u5b9a\u91cf\u7814\u7a76\u652f\u6301\uff1b\n3. **\u653f\u7b56\u542f\u793a\u660e\u786e**\uff1a\u63a8\u8fdb\u7ecf\u6d4e\u4e00\u4f53\u5316\u662f\u548c\u5e73\u7684\u7269\u8d28\u57fa\u7840\uff1b\n4. **\u5bf9\u56fd\u9645\u5236\u5ea6\u7684\u652f\u6491**\uff1a\u8d38\u6613\u548c\u5e73\u4e3a\u63a8\u52a8 WTO \u7b49\u591a\u8fb9\u8d38\u6613\u5236\u5ea6\u63d0\u4f9b\u7406\u8bba\u4f9d\u636e\uff1b\n5. **\u89e3\u91ca\u6218\u540e\u957f\u548c\u5e73**\uff1a\u6218\u540e\u53d1\u8fbe\u56fd\u5bb6\u95f4\u65e0\u6218\u4e89\uff0c\u90e8\u5206\u5f97\u76ca\u4e8e\u6df1\u5ea6\u7ecf\u6d4e\u4e00\u4f53\u5316\uff1b\n6. **\u8de8\u8bae\u9898\u5e94\u7528**\uff1a\u4ece\u8d38\u6613\u6269\u5c55\u5230\u6295\u8d44\u3001\u91d1\u878d\u3001\u80fd\u6e90\u76f8\u4e92\u4f9d\u8d56\u3002\n\n**\u56db\u3001\u7406\u8bba\u8bc4\u4ef7\uff1a\u6279\u8bc4\u4e0e\u5c40\u9650**\n\n1. **\u5386\u53f2\u53cd\u4f8b**\uff1a\n   - **1914 \u4e00\u6218\u524d**\uff1a\u82f1\u5fb7\u3001\u82f1\u4fc4\u7ecf\u6d4e\u9ad8\u5ea6\u4e92\u5d4c\u4f46\u4ecd\u5f00\u6218\uff1b\u5b89\u6770\u5c14\u300a\u5927\u5e7b\u8c61\u300b\u88ab\u8bc1\u4f2a\uff1b\n   - **\u5f53\u4ee3\u4fc4\u6b27\u80fd\u6e90\u4f9d\u8d56**\uff1a\u9ad8\u5ea6\u4e92\u5d4c\u672a\u963b\u6b62 2022 \u4fc4\u4e4c\u6218\u4e89\uff1b\n   - **\u4e8c\u6218\u524d\u7f8e\u65e5**\uff1a\u7ecf\u6d4e\u8054\u7cfb\u5bc6\u5207\u4f46 1941 \u5077\u88ad\u73cd\u73e0\u6e2f\uff1b\n2. **\u56e0\u679c\u65b9\u5411\u95ee\u9898**\uff1a\n   - \u662f\u8d38\u6613\u4fc3\u8fdb\u548c\u5e73\u8fd8\u662f\u548c\u5e73\u4fc3\u8fdb\u8d38\u6613\uff1f\n   - \u5185\u751f\u6027\u95ee\u9898\u96be\u4ee5\u89e3\u51b3\uff1b\n3. **\u53d8\u91cf\u9009\u62e9\u95ee\u9898**\uff1a\n   - \"\u8d38\u6613\u989d\"\u4f5c\u4e3a\u4f9d\u8d56\u5ea6\u6307\u6807\u662f\u5426\u5408\u7406\uff1f\n   - \u4e0d\u5bf9\u79f0\u4f9d\u8d56\u53ef\u80fd\u5bfc\u81f4\u4e0d\u540c\u6548\u679c\uff1b\n   - \u6218\u7565\u6027\u4ea7\u54c1\u8d38\u6613\uff08\u80fd\u6e90\u3001\u5173\u952e\u6280\u672f\uff09vs \u4e00\u822c\u8d38\u6613\u6548\u679c\u4e0d\u540c\uff1b\n4. **\u673a\u5236\u7591\u95ee**\uff1a\n   - \u5546\u4e1a\u5229\u76ca\u96c6\u56e2\u662f\u5426\u771f\u7684\u53cd\u5bf9\u51b2\u7a81\uff1f\u4f8b\uff1a\u4e00\u6218\u524d\u5fb7\u56fd\u519b\u5de5\u96c6\u56e2\u9f13\u52a8\u6218\u4e89\uff1b\n   - \u7ecf\u6d4e\u5229\u76ca\u4e0e\u6c11\u65cf\u4e3b\u4e49\u3001\u5b89\u5168\u7126\u8651\u76f8\u6bd4\uff0c\u6743\u91cd\u5982\u4f55\uff1f\n5. **\u79d1\u666e\u5170\u7684\u4fee\u6b63**\uff1a\n   - \u5f53\u524d\u8d38\u6613\u989d\u4e0d\u8db3\u4ee5\u89e3\u91ca\uff0c\u9700\u8981\u9884\u671f\uff1b\n   - \u8fd9\u524a\u5f31\u4e86\"\u8d38\ u63d0\u5347\u81ea\u4e3b\u80fd\u529b\uff0c\u51cf\u5c11\u5173\u952e\u4f9d\u8d56\uff1b\n   - \u52a0\u5f3a\u7ecf\u6d4e\u5b89\u5168\u6cbb\u7406\uff1b\n4. **\u521b\u65b0\u673a\u5236**\uff1a\n   - \u7ecf\u6d4e\u6cbb\u7406 + \u5b89\u5168\u6cbb\u7406\u534f\u540c\uff1b\n   - \u5e94\u5bf9\"\u5b89\u5168\u5316\"\u6311\u6218\u3002\n\n**\u4e5d\u3001\u7406\u8bba\u7ed3\u8bba**\n\n\u8d38\u6613\u548c\u5e73\u7406\u8bba\u662f IPE \u4e0e\u56fd\u9645\u5b89\u5168\u7814\u7a76\u4ea4\u53c9\u7684\u91cd\u8981\u9886\u57df\uff0c\u5176\u6838\u5fc3\u6d1e\u89c1\u2014\u2014**\u7ecf\u6d4e\u76f8\u4e92\u4f9d\u8d56\u80fd\u964d\u4f4e\u51b2\u7a81\u6982\u7387**\u2014\u2014\u5177\u6709\u91cd\u8981\u89e3\u91ca\u529b\u548c\u653f\u7b56\u542f\u793a\u3002\u4f46\u5176\u4e5f\u9762\u4e34**\u5386\u53f2\u53cd\u4f8b\u3001\u56e0\u679c\u4e89\u8bae\u3001\u673a\u5236\u7591\u95ee\u3001\u6b66\u5668\u5316\u6311\u6218**\u7b49\u5c40\u9650\u300221 \u4e16\u7eaa\u8d38\u6613\u548c\u5e73\u7406\u8bba\u9700\u8981\u56de\u5e94\uff1a**\u2460\u6b66\u5668\u5316\u76f8\u4e92\u4f9d\u8d56\uff1b\u2461\u9884\u671f\u7ba1\u7406\uff1b\u2462\u4e0d\u5bf9\u79f0\u4f9d\u8d56\u7684\u8106\u5f31\u6027\uff1b\u2463\u6570\u5b57\u65f6\u4ee3\u65b0\u578b\u76f8\u4e92\u4f9d\u8d56**\u7b49\u65b0\u8bae\u9898\u3002\u5bf9\u4e2d\u56fd\u800c\u8a00\uff0c\u8d38\u6613\u548c\u5e73\u65e2\u662f\u673a\u4f1a\uff08\u6df1\u5ea6\u53c2\u4e0e\u5168\u7403\u5316\u7684\u548c\u5e73\u7ea2\u5229\uff09\u4e5f\u662f\u6311\u6218\uff08\u5e94\u5bf9\u6b66\u5668\u5316\u4e0e\u8131\u94a9\u538b\u529b\uff09\u3002\u7ef4\u62a4\u548c\u5e73\u9700\u8981\u5728**\u8d38\u6613\u5408\u4f5c + \u5236\u5ea6\u5efa\u8bbe + \u5371\u673a\u7ba1\u63a7 + \u6218\u7565\u514b\u5236**\u591a\u4e2a\u7ef4\u5ea6\u7efc\u5408\u53d1\u529b\u3002\u7406\u8bba\u4e0e\u73b0\u5b9e\u7684\u5bf9\u8bdd\u5c06\u7ee7\u7eed\u63a8\u52a8\u8fd9\u4e00\u7814\u7a76\u9886\u57df\u7684\u6df1\u5316\uff08\u53c2\u89c1 Polachek 1980\uff1bRosecrance 1986\uff1bRussett & Oneal 2001\uff1bCopeland 2015\uff1bFarrell & Newman 2019\uff1b\u7530\u91ce\u7b2c\u5341\u7ae0\uff1b\u7fdf\u4e1c\u5347\u76f8\u5173\u7814\u7a76\uff09\u3002\n\n### 28. \u8fd0\u7528\u6240\u5b66 IPE \u7406\u8bba\u5206\u6790\u4e2d\u56fd\u7684\u7cae\u98df\u5b89\u5168\u95ee\u9898\u3010\u6a21\u62df-14\u3011\n\n\u7cae\u98df\u5b89\u5168\u662f\u4e2d\u56fd\u56fd\u5bb6\u5b89\u5168\u7684\u57fa\u7840\u7ec4\u6210\u90e8\u5206\uff0c\"\u56fd\u4e4b\u5927\u8005\"\u3002\u5176\u5185\u6db5\u3001\u6311\u6218\u3001\u653f\u7b56\u6784\u6210 IPE \u56fd\u5bb6\u5b89\u5168\u7814\u7a76\u7684\u6838\u5fc3\u8bae\u9898\u3002\n\n**\u4e00\u3001\u7cae\u98df\u5b89\u5168\u7684\u6982\u5ff5**\n\n1. **FAO 1996 \u5e74\u7f57\u9a6c\u5ba3\u8a00\u5b9a\u4e49**\uff1a\n   - **\u53ef\u83b7\u5f97\u6027**\uff08availability\uff09\uff1a\u6709\u8db3\u591f\u7684\u4f9b\u7ed9\uff1b\n   - **\u53ef\u8fbe\u5230\u6027**\uff08accessibility\uff09\uff1a\u7269\u7406\u4e0e\u7ecf\u6d4e\u4e0a\u53ef\u83b7\u5f97\uff1b\n   - **\u53ef\u5229\u7528\u6027**\uff08utilization\uff09\uff1a\u8425\u517b\u4e0e\u536b\u751f\u6807\u51c6\u8fbe\u6807\uff1b\n   - **\u7a33\u5b9a\u6027**\uff08stability\uff09\uff1a\u4ee5\u4e0a\u4e09\u65b9\u9762\u968f\u65f6\u95f4\u7a33\u5b9a\uff1b\n2. **\u4e2d\u56fd\u5b98\u65b9\u8868\u8ff0**\uff1a\n   - \"\u786e\u4fdd\u8c37\u7269\u57fa\u672c\u81ea\u7ed9\u3001\u53e3\u7cae\u7edd\u5bf9\u5b89\u5168\"\uff1b\n   - \"\u628a\u996d\u7897\u7aef\u5728\u81ea\u5df1\u624b\u91cc\u3001\u88c5\u4e2d\u56fd\u7cae\"\uff1b\n3. **\u591a\u7ef4\u5185\u6db5**\uff1a\n   - \u6570\u91cf\u5b89\u5168\uff08\u5403\u5f97\u9971\uff09\uff1b\n   - \u8d28\u91cf\u5b89\u5168\uff08\u5403\u5f97\u597d\u3001\u5403\u5f97\u5b89\u5168\uff09\uff1b\n   - \u7ed3\u6784\u5b89\u5168\uff08\u9972\u6599\u7cae + \u6cb9\u6599 + \u8089\u86cb\u5976\uff09\uff1b\n   - \u6218\u7565\u5b89\u5168\uff08\u4e0d\u88ab\u5361\u8116\u5b50\uff09\uff1b\n   - \u53ef\u6301\u7eed\u5b89\u5168\uff08\u8015\u5730\u3001\u6c34\u8d44\u6e90\u3001\u751f\u6001\uff09\u3002\n\n**\u4e8c\u3001\u4e2d\u56fd\u7cae\u98df\u73b0\u72b6**\n\n1. **\u603b\u4ea7\u91cf**\uff082023\uff09\uff1a69541 \u4e07\u5428\uff08\u7ea6 1.39 \u4e07\u4ebf\u65a4\uff09\uff0c\u8fde\u7eed 9 \u5e74\u7a33\u5b9a\u5728 6.5 \u4ebf\u5428\u4ee5\u4e0a\uff1b\n2. **\u53e3\u7cae**\uff1a\u7a3b\u8c37\u3001\u5c0f\u9ea6\u81ea\u7ed9\u7387 100%+\uff1b\n3. **\u8c37\u7269**\uff1a\u81ea\u7ed9\u7387 95%\uff1b\n4. **\u5927\u8c46**\uff1a\u8fdb\u53e3\u4f9d\u8d56\u5ea6 84%\uff082023 \u8fdb\u53e3\u7ea6 1 \u4ebf\u5428\uff09\uff1b\n5. **\u98df\u7528\u690d\u7269\u6cb9**\uff1a\u8fdb\u53e3\u4f9d\u8d56\u5ea6\u7ea6 70%\uff1b\n6. **\u8089\u7c7b**\uff1a\u57fa\u672c\u81ea\u7ed9\u4f46\u9972\u6599\u7cae\uff08\u7389\u7c73\u3001\u5927\u8c46\uff09\u5927\u91cf\u8fdb\u53e3\uff1b\n7. **\u8015\u5730\u8d44\u6e90**\uff1a18 \u4ebf\u4ea9\u8015\u5730\u7ea2\u7ebf\uff1b\n8. **\u4eba\u5747\u7cae\u98df**\uff1a\u7ea6 493 \u516c\u65a4/\u4eba\uff0c\u8d85\u8fc7 FAO \u5b89\u5168\u7ebf\uff08400 \u516c\u65a4\uff09\uff1b\n9. **\u7cae\u98df\u5916\u8d38**\uff1a\u8fdb\u53e3\u5927\u4e8e\u51fa\u53e3\uff0c\u4f46\u53e3\u7cae\u51c0\u51fa\u53e3\u4e3a\u6b63\u3002\n\n**\u4e09\u3001\u7cae\u98df\u5b89\u5168\u6311\u6218**\n\n1. **\u8d44\u6e90\u7ea6\u675f**\uff1a\n   - **\u8015\u5730\u4e0d\u8db3**\uff1a\u4eba\u5747\u8015\u5730\u7ea6 1.4 \u4ea9\uff0c\u8fdc\u4f4e\u4e8e\u4e16\u754c\u5e73\u5747 3.5 \u4ea9\uff1b\n   - **\u6c34\u8d44\u6e90\u7d27\u7f3a**\uff1a\u5317\u65b9\u7f3a\u6c34\u3001\u519c\u4e1a\u7528\u6c34\u5927\uff1b\n   - **\u8015\u5730\u8d28\u91cf**\uff1a\u9000\u5316\u3001\u6c61\u67d3\u3001\u9178\u5316\uff1b\n2. **\u9972\u6599\u7cae\u4f9d\u8d56**\uff1a\n   - \u4e2d\u56fd\u662f\u4e16\u754c\u6700\u5927\u5927\u8c46\u8fdb\u53e3\u56fd\uff0870% \u56fd\u9645\u8d38\u6613\u91cf\uff09\uff1b\n   - \u4e3b\u8981\u6765\u6e90\uff1a\u5df4\u897f\u3001\u7f8e\u56fd\u3001\u963f\u6839\u5ef7\uff1b\n   - \u7528\u9014\u4e3b\u8981\u662f\u517b\u6b96\u4e1a\uff08\u9972\u6599 + \u6cb9\u6599\uff09\uff1b\n3. **\u56fd\u9645\u5e02\u573a\u51b2\u51fb**\uff1a\n   - \u56fd\u9645\u7cae\u4ef7\u6ce2\u52a8\uff08\u4fc4\u4e4c\u6218\u4e89 + \u5e72\u65f1 + \u901a\u80c0\uff09\uff1b\n   - \u51fa\u53e3\u56fd\u9650\u5236\uff08\u4fc4\u7f57\u65af\u3001\u5370\u5ea6\u9650\u5236\u5927\u7c73/\u5c0f\u9ea6\u51fa\u53e3\uff09\uff1b\n   - \u5168\u7403\u4ef7\u503c\u94fe\u65ad\u88c2\uff1b\n4. **\u5730\u7f18\u653f\u6cbb\u98ce\u9669**\uff1a\n   - \u4e2d\u7f8e\u5173\u7cfb\u7d27\u5f20 \u2192 \u5927\u8c46\u7b49\u4f9b\u7ed9\u94fe\u4e0d\u786e\u5b9a\u6027\uff1b\n   - \u6d77\u8fd0\u901a\u9053\u5b89\u5168\uff1b\n   - \"\u7cae\u98df\u6b66\u5668\u5316\"\u6f5c\u5728\u98ce\u9669\uff1b\n5. **\u6c14\u5019\u53d8\u5316**\uff1a\n   - \u6781\u7aef\u5929\u6c14\uff08\u5e72\u65f1\u3001\u6d2a\u6d9d\u3001\u53f0\u98ce\uff09\u9891\u7387\u589e\u52a0\uff1b\n   - \u957f\u671f\u6c14\u6e29\u4e0a\u5347 \u2192 \u90e8\u5206\u519c\u4f5c\u7269\u9002\u5b9c\u6027\u53d8\u5316\uff1b\n   - \u75c5\u866b\u5bb3\u53d8\u5316\uff1b\n6. **\u7ed3\u6784\u6027\u6311\u6218**\uff1a\n   - \u519c\u6751\u52b3\u52a8\u529b\u8001\u9f84\u5316\uff1b\n   - \u57ce\u5e02\u5316\u8fdb\u7a0b\u5360\u7528\u8015\u5730\uff1b\n   - \u5c0f\u519c\u751f\u4ea7\u65b9\u5f0f\u6548\u7387\u4f4e\uff1b\n   - \u519c\u4e1a\u73b0\u4ee3\u5316\u6ede\u540e\uff1b\n7. **\u8d28\u91cf\u4e0e\u751f\u6001**\uff1a\n   - \u519c\u836f\u3001\u5316\u80a5\u8fc7\u91cf\u4f7f\u7528\uff1b\n   - \u98df\u54c1\u5b89\u5168\u4e8b\u4ef6\u5076\u53d1\uff1b\n   - \u519c\u4e1a\u9762\u6e90\u6c61\u67d3\uff1b\n8. **\u79cd\u4e1a\"\u5361\u8116\u5b50\"**\uff1a\n   - \u90e8\u5206\u9ad8\u7aef\u54c1\u79cd\u4f9d\u8d56\u56fd\u5916\uff08\u7389\u7c73\u3001\u852c\u83dc\u79cd\u5b50\uff09\uff1b\n   - \u79cd\u4e1a\u5b89\u5168\u662f\u7cae\u98df\u5b89\u5168\u57fa\u7840\u3002\n\n**\u56db\u3001IPE \u7406\u8bba\u5206\u6790**\n\n**1. \u56fd\u5bb6\u4e3b\u4e49\u89c6\u89d2**\uff1a\n- \u7cae\u98df\u5b89\u5168\u662f\u56fd\u5bb6\u6838\u5fc3\u5229\u76ca\uff0c\u9700\u56fd\u5bb6\u4e3b\u5bfc\uff1b\n- \u4e2d\u56fd\u91c7\u53d6\"\u4ee5\u56fd\u5bb6\u7cae\u98df\u5b89\u5168\u6218\u7565 + \u56fd\u6709\u7cae\u98df\u4f01\u4e1a\uff08\u4e2d\u7cae\u3001\u4e2d\u50a8\u7cae\uff09+ \u653f\u7b56\u6027\u519c\u4e1a\u94f6\u884c + \u50a8\u5907\u4f53\u7cfb\"\u6784\u5efa\u56fd\u5bb6\u4e3b\u5bfc\u6a21\u5f0f\uff1b\n\n**2. \u516c\u5171\u7269\u54c1\u89c6\u89d2**\uff1a\n- \u7cae\u98df\u5b89\u5168\u5177\u90e8\u5206\u516c\u5171\u7269\u54c1\u5c5e\u6027\uff1b\n- \u653f\u5e9c\u9700\u5f25\u8865\u5e02\u573a\u5931\u7075\uff08\u5982\u751f\u6001\u3001\u50a8\u5907\u3001\u7814\u53d1\uff09\uff1b\n\n**3. \u7ed3\u6784\u6027\u6743\u529b\u89c6\u89d2**\uff08Strange\uff09\uff1a\n- \u5168\u7403\u7cae\u98df\u5e02\u573a\u88ab\u56db\u5927\u7cae\u5546\uff08ABCD\uff1aADM\u3001Bunge\u3001Cargill\u3001Louis Dreyfus\uff09\u4e3b\u5bfc\uff1b\n- \u5927\u8c46\u5b9a\u4ef7\u3001\u7389\u7c73\u8d38\u6613\u3001\u8fd0\u8f93\u7269\u6d41\u5747\u88ab\u8de8\u56fd\u8d44\u672c\u63a7\u5236\uff1b\n- \u4e2d\u56fd\u901a\u8fc7\u4e2d\u7cae\u7b49\u56fd\u4f01\u6574\u5408\u4ea7\u4e1a\u94fe\uff08\u5982\u6536\u8d2d Noble Agri\u3001Nidera\uff09\u63d0\u5347\u7ed3\u6784\u6027\u6743\u529b\uff1b\n\n**4. \u76f8\u4e92\u4f9d\u8d56\u4e0e\u8106\u5f31\u6027**\uff08\u57fa\u6b27\u6c49/\u5948\uff09\uff1a\n- \u5927\u8c46\u7b49\u9972\u6599\u7cae\u5bf9\u5916\u4f9d\u8d56\u5ea6\u9ad8\uff0c\u4f46\u53ef\u901a\u8fc7\u591a\u5143\u5316\u964d\u4f4e\u8106\u5f31\u6027\uff1b\n- \u7f8e\u56fd\u66fe\u901a\u8fc7\u7cae\u98df\u7981\u8fd0\uff081980 \u5bf9\u82cf\u8054\uff09\u4f7f\u7528\u7cae\u98df\u6b66\u5668\uff0c\u8b66\u793a\u610f\u4e49\u5927\uff1b\n\n**5. \u56fd\u9645\u673a\u5236\u4e0e\u5168\u7403\u6cbb\u7406**\uff1a\n- WTO \u519c\u4e1a\u534f\u8bae\u3001FAO\u3001IFAD \u7b49\u56fd\u9645\u673a\u5236\uff1b\n- \u4e2d\u56fd\u662f WTO \u519c\u4e1a\u8c08\u5224\u91cd\u8981\u53c2\u4e0e\u65b9\uff08G-33\u3001\u7279\u522b\u4fdd\u969c\u673a\u5236\uff09\uff1b\n\n**6. \u98a0\u5012\u7684\u7b2c\u4e8c\u610f\u8c61**\uff1a\n- \u56fd\u9645\u7cae\u4ef7\u6ce2\u52a8 \u2192 \u56fd\u5185\u901a\u80c0\u538b\u529b \u2192 \u653f\u7b56\u8c03\u6574\uff1b\n- \u4fc4\u4e4c\u6218\u4e89 \u2192 \u4e2d\u56fd\u52a0\u5f3a\u7cae\u98df\u5b89\u5168\u610f\u8bc6\uff1b\n\n**7. \u56fd\u5185\u653f\u6cbb\u7ecf\u6d4e**\uff1a\n- \u519c\u4e1a vs \u5de5\u4e1a vs \u670d\u
