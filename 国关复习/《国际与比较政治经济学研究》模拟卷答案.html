## Part I 名词解释（59 题）

> 体例：每题 80–150 字，括号标注出现的模拟卷套号。

### 一、新制度经济学与公共选择类

**1. 公共物品（Public Goods）**【模拟-1】
萨缪尔森（1954）提出的概念，指同时具有**非排他性**（无法或成本高昂地阻止他人消费）与**非竞争性**（一个人的消费不减少他人可获消费量）的物品。在国际关系中，国际安全秩序、自由贸易体制、稳定的国际货币体系等被金德尔伯格、基欧汉视为典型的"国际公共物品"。其供给易引发"搭便车"问题，故需要霸权国或具有约束力的国际制度来保证供给（参见田野第二章；吉尔平《全球政治经济学》第四章）。

**2. 公共池塘资源（Common-Pool Resources, CPR）**【模拟-1】
奥斯特罗姆在《公共事物的治理之道》中提出，指**消费上具有竞争性、但排他性低**的资源，如渔场、地下水、大气、公海渔业、轨道与频谱等。它不同于纯公共物品（非竞争）也不同于私人物品（高排他），因而易陷入"公用地的悲剧"。奥斯特罗姆通过多案例研究证明，自组织的本地治理在满足明晰边界、监督、分级制裁等八项设计原则时，可避免国家化或私有化也能持续治理 CPR。

**3. 搭便车（Free Riding）**【模拟-1】
奥尔森《集体行动的逻辑》核心命题：在公共物品供给场合，由于排他成本高，任何个体都有不付出贡献仍可享用收益的激励，因而集体提供常常不足。在国际关系中表现为**小国对霸权国提供的安全/制度/货币公共品的免费搭乘**，是霸权稳定论解释国际公共物品供给困境的重要逻辑。其结果是公共物品供给不足、霸权国负担过重，最终影响合作维系。

**4. 外部性（Externality）**【模拟-2】
庇古首创、科斯系统化的概念，指**一项经济活动对未参与该活动的第三方造成的、未通过价格机制反映的成本或收益**。负外部性如跨境污染、金融危机的国际传染；正外部性如基础研究、疫苗、稳定汇率体系。外部性是市场失灵的主要表现之一，构成政府干预或国际制度建设的理论依据。在 IPE 中，跨境外部性是各类国际机制（环境、金融监管、宏观协调）产生的核心驱动力。

**5. 交易成本（Transaction Costs）**【模拟-1】
科斯（1937）首创、威廉姆森系统化：指为达成、签订、监督和执行契约所付出的成本，包括**信息搜寻成本、谈判与缔约成本、监督与执行成本**。在国际关系中，国家间合作必须克服信息不对称、谈判困难、违约风险等问题，这些都构成交易成本。基欧汉《霸权之后》借用此概念论证：**国际制度的核心功能就是降低国家间交易成本**（提供信息、稳定预期、降低协议执行成本），即使在霸权衰落后仍能维持合作。

**6. 科斯第一定理（Coase Theorem I）**【模拟-6】
科斯《社会成本问题》（1960）：**在交易成本为零、产权清晰界定的条件下，无论初始产权如何分配，市场谈判都将导致资源的帕累托最优配置**。其在国际关系中的引申是：当国际谈判成本极低时，国家间外部性问题可通过自愿谈判解决，无需霸权或集中化制度。该定理是新制度经济学的逻辑起点，凸显了"产权 + 交易成本"分析框架的核心地位。

**7. 科斯第二定理（Coase Theorem II）**【模拟-7】
即"反向科斯定理"：**在交易成本为正的现实世界中，不同的产权初始安排会导致不同的资源配置结果，因而产权制度设计本身具有效率含义**。这一推论解释了制度的必要性——既然现实中交易成本不可能为零，那么如何通过制度设计降低交易成本、合理界定产权就成为关键问题。在 IPE 中，国际制度（WTO、IMF、海洋法公约等）正是通过界定各国权利义务以降低交易成本、解决跨境外部性。

**8. 公用地的悲剧（Tragedy of the Commons）**【模拟-5】
哈丁（Hardin, 1968）在《科学》杂志发表的命题：在公共牧场上，每个牧民出于自利都倾向于增加放牧数量，因为收益归己、成本由全体分担，最终导致草场过度放牧而崩溃。它形象描绘了**公共池塘资源因产权不清而被过度利用**的困境。在国际关系中常用于解释全球公共领域（大气、海洋渔业、地下水）的治理失灵，也是奥斯特罗姆 CPR 自治研究的理论靶子。

**9. 市场失灵（Market Failure）**【模拟-11】
新福利经济学概念，指**市场机制在某些情形下无法实现资源的帕累托最优配置**。主要表现包括：①公共物品供给不足；②外部性内化困难；③信息不对称（柠檬市场）；④垄断与不完全竞争；⑤宏观经济不稳定。市场失灵构成政府干预的传统理由。在 IPE 中，跨境市场失灵（跨境外部性、国际公共物品）是国际制度产生的核心动因（参见田野第二章）。

**10. 政府失灵（Government Failure）**【模拟-11】
公共选择学派（布坎南、塔洛克）针对"市场失灵就需政府干预"的命题提出的反驳：政府本身亦受信息约束、寻租侵蚀、官僚利益、政治商业周期等影响，干预效果可能比市场失灵更糟。表现为：①信息不足导致的政策失误；②利益集团俘获；③官僚机构扩张倾向；④政策时滞与短视。政府失灵论是新自由主义改革（减税、放松管制、私有化）的重要理论支撑。

**11. 寻租（Rent-seeking）**【模拟-12】
图洛克（Tullock, 1967）首创、克鲁格（Krueger, 1974）正式命名的概念：指**经济主体为获取或维持政府创造的、超过市场竞争所能给予的超额收益（"租金"）而进行的非生产性资源支出**，如游说、贿赂、行政诉讼、行业组织等。寻租是政府失灵的微观机制，对 IPE 的重要启示在于：贸易保护政策、汇率管制、产业补贴等都会引发企业寻租行为，最终导致政策被特殊利益俘获、社会净福利损失。

**12. 阿罗不可能定理（Arrow's Impossibility Theorem）**【模拟-6、14】
阿罗（1951）在《社会选择与个人价值》中证明：当存在三个或以上备选方案时，**不可能存在一个同时满足无限制定义域、帕累托原则、独立于无关备选方案、非独裁**等条件的社会偏好函数。该定理动摇了功利主义福利经济学基础，揭示**民主集体决策本身的内在悖论**，对公共选择理论和制度设计影响深远。其国际关系含义是：多边谈判中投票悖论与议程操纵不可避免，制度设计必须正视集体决策的内在张力。

**13. 协调型博弈（Coordination Game）**【模拟-6】
博弈论分类的一类博弈，**存在多重纳什均衡，且参与者偏好相同均衡（均衡之间无帕累托排序冲突，但有不同协调点）**。典型如"猎鹿博弈""左行右行"。其核心难题是**预期协调**而非合作激励——参与者都愿意合作，只是不知道选哪个均衡。国际制度在协调型博弈中扮演**焦点提供者**角色，如国际度量衡、技术标准、SWIFT 报文规范（参见田野第三章）。

**14. 协作型博弈（Collaboration Game）**【模拟-6、14】
对应"囚徒困境"型博弈，**存在唯一帕累托优于纳什均衡的合作结果，但个体理性会导致背叛**。其核心难题是**激励问题**：每个参与者都有违背协议的诱惑，因此制度需要提供监督、信息和惩罚机制以维持合作。WTO 的争端解决机制、《巴黎协定》的透明度框架、国际金融监管的同行评估等都是为协作型博弈设计的制度（参见田野第三章）。

**15. 囚徒困境（Prisoner's Dilemma）**【模拟-5、13】
图克 1950 年提出的博弈模型：两名嫌犯被分别审讯，**坦白是各自的占优策略**，但双方都坦白的结果（重判）严格次于双方都不坦白（轻判）。其揭示了**个体理性与集体理性的悖论**。在 IPE 中常用于解释贸易保护、军备竞赛、温室气体减排等领域的合作困境，论证国际制度通过重复博弈、信息透明、惩罚机制将一次性 PD 转化为可持续合作的必要性。

### 二、相互依赖与全球化类

**16. 全球化（Globalization）**【模拟-2】
指**跨国界的人员、商品、资本、信息、技术、文化等流动规模与速度的空前提升，导致各国相互依赖加深的过程**。包含经济（贸易、FDI、金融）、政治（治理碎片化与全球治理需求）、文化（信息和价值观传播）三层维度。吉尔平视当代全球化为美国霸权下的市场扩张；考克斯则强调其阶级与意识形态属性。1980 年代以来由新自由主义推动，2008 年危机后陷入"逆全球化"调整。

**17. 全球治理（Global Governance）**【模拟-3、13】
詹姆斯·罗西瑙、全球治理委员会提出：指**在无世界政府的条件下，由国家、国际组织、跨国公司、NGO、专家共同体等多种行为体通过正式与非正式制度安排，对全球性问题进行管理的过程**。其特征是多中心、多层次、跨主权、规范多元。涉及领域包括气候变化、跨国犯罪、互联网、流行病、金融稳定。中国 2010 年代后提出"全球治理体系改革"主张，强调发展中国家代表性提升。

**18. 国际制度（International Institutions）**【模拟-3、12】
基欧汉定义：**规定行为体角色、约束行动、塑造预期的一组持续而相互关联的规则（正式与非正式）**，包括正式的国际组织（IGO）、国际机制（regimes）和惯例（conventions）。其功能是降低交易成本、提供信息、塑造预期、稳定合作。克拉斯纳进一步将"国际机制"细分为原则、规范、规则、决策程序。国际制度是制度自由主义理论的核心概念（参见基欧汉《霸权之后》、田野第一章）。

**19. 复合相互依赖（Complex Interdependence）**【模拟-3】
基欧汉、奈在《权力与相互依赖》（1977）提出，与现实主义"国家中心、安全至上、军力为本"的世界相对的理想型，三大特征：①**多渠道联系**（政府间、跨政府、跨国社会联系并存）；②**议题无等级**（安全不再优先于经济、环境等议题）；③**军事力量作用下降**（在富国间、特定议题上不可用或低效）。复合相互依赖条件下，国际机制和议题联接成为主要权力来源。

**20. 敏感性相互依赖（Sensitivity Interdependence）**【模拟-2】
基欧汉、奈区分相互依赖两个维度之一：指**在既定政策框架下，一国变化对另一国造成代价反应的速度与程度**。例如 1973 年石油禁运对欧日的快速冲击。它衡量**短期内未调整时的脆弱度**，但若一方能迅速调整政策，敏感性可不必转化为脆弱性。在权力分析中，敏感性较低意味着对方依赖你较强、你议价地位较高。

**21. 脆弱性相互依赖（Vulnerability Interdependence）**【模拟-2、15】
基欧汉、奈区分相互依赖的第二维度，指**即使一国采取调整政策，仍要付出的代价的相对程度**，反映改变政策框架后剩余的不利后果。例如石油禁运后日本通过节能、储备、能源多元化等调整后仍承受的代价。脆弱性比敏感性更接近**结构性权力**：一方脆弱性低、对方脆弱性高时，前者获得议价优势。该概念是相互依赖分析的核心权力来源。

### 三、经济发展理论类

**22. 二元结构论（Dual-Sector Model）**【模拟-1】
刘易斯（W. A. Lewis, 1954）《劳动无限供给条件下的经济发展》中提出：**发展中国家经济存在传统农业部门（边际生产率近零、劳动剩余）与现代工业部门（高生产率、低工资劳动力供给弹性近无穷）的二元结构**。工业部门通过吸纳农业剩余劳动力实现资本积累，直到农业部门工资上升至与工业平齐的"刘易斯拐点"。该模型解释了工业化路径，是发展经济学奠基理论之一。

**23. 经济成长阶段论（Stages of Economic Growth）**【模拟-2、15】
罗斯托（W. W. Rostow, 1960）在《经济增长的阶段：非共产党宣言》中提出：人类经济发展经历**传统社会—起飞前提条件—起飞—成熟—大众消费—超大众消费**六个阶段。"起飞"是关键阶段，需主导部门、社会动员、制度创新三大条件。该理论是冷战时期美国对发展中国家政策（如"进步联盟"）的理论支撑，曾受到依附论严厉批评（无视外部约束、线性进化论），但其阶段划分至今仍有启发。

**24. 长波理论（Long Wave Theory）**【模拟-3】
即康德拉季耶夫长波，指经济活动以约 **50–60 年为周期**的扩张—收缩波动，由技术革命驱动。每一长波对应一组主导技术（蒸汽机—铁路—电气—汽车—信息技术），熊彼特将其与"创造性破坏"和企业家创新挂钩。曼德尔、阿瑞吉等左翼学者将其与世界体系周期联系，论证霸权更替与长波相关。当下许多研究将 AI、新能源视为新一轮长波起点。

**25. 康德拉季耶夫周期（Kondratieff Cycle）**【模拟-7、15】
苏联经济学家康德拉季耶夫 1920 年代研究欧美 19 世纪以来价格与产出数据时发现的约 50 年长波。每一波分为上升期（技术应用、投资旺盛、价格上升）与下降期（投资饱和、过剩、危机）。后被熊彼特、曼德尔、阿瑞吉发展为"创造性破坏"和世界体系霸权周期理论，与世界经济中的霸权更迭、金融化趋势有理论对应（参见王正毅《世界体系论与中国》）。

**26. 熊彼特周期（Schumpeter Cycle）**【模拟-8、13】
熊彼特在《经济周期》（1939）中综合短中长三种周期：**基钦周期（约 40 个月，库存）+ 朱格拉周期（9–10 年，设备投资）+ 康德拉季耶夫周期（约 50 年，技术革命）**。其核心机制是**企业家创新带来的"创造性破坏"**：新技术摧毁旧产业、引发结构调整，形成波浪式发展。它把技术、企业家与周期统一起来，是把"技术变革"作为长期增长根本动力的经典模型。

### 四、国际货币与汇率制度类

**27. 金本位制（Gold Standard）**【模拟-4】
19 世纪后期至 1914 年盛行的国际货币制度，以**黄金为本位货币、各国货币按法定含金量挂钩、自由铸造与自由兑换、黄金自由进出口**为特征。其内在调节机制是休谟"价格—铸币流动机制"：顺差国黄金流入→货币增加→物价上升→出口减少，反之亦然。一战中断后曾以金汇兑本位形式短暂恢复，1931 年英国脱金后彻底崩溃。金本位是 19 世纪英国霸权的货币体制依托。

**28. 布雷顿森林体系（Bretton Woods System）**【模拟-4、13】
1944 年布雷顿森林会议确立、1945–1971 年运行的国际货币体系，核心是**"双挂钩"**：美元按 1 盎司=35 美元与黄金挂钩，其他成员国货币按固定平价与美元挂钩（允许 ±1% 浮动）。配套设立 IMF（汇率监督与短期国际收支融资）与世界银行（长期发展贷款）。该体系反映美国战后霸权地位，1971 年因特里芬难题与美国黄金外流而崩溃，由 1976 年牙买加体系（浮动汇率合法化）继承。

**29. 国际货币基金组织（IMF）**【模拟-5、14】
1944 年布雷顿森林会议设立、1945 年成立的政府间国际组织，总部华盛顿。三大职能：①**汇率监督**（第四条款磋商）；②**国际收支救助**（含附条件贷款，conditionality）；③**技术援助与能力建设**。投票权按份额加权，美国持有 16% 以上事实否决权。其结构与政策长期被发展中国家批评为反映"华盛顿共识"偏好。2010 年改革后中国份额升至第三位，但 SDR 篮子重构与治理民主化仍是改革核心议题。

**30. 世界贸易组织（WTO）**【模拟-5】
1995 年由 GATT 升级而成的多边贸易组织，目前 164 个成员，总部日内瓦。三大基本原则：**非歧视（最惠国待遇 + 国民待遇）、互惠减让、透明度**。三大职能：①管理多边贸易协定；②提供谈判论坛；③争端解决（DSB，"皇冠上的明珠"）。涵盖 GATT（货物）、GATS（服务）、TRIPS（知识产权）等。中国 2001 年加入；2017 年以来上诉机构因美国阻挠而停摆，多哈回合谈判长期僵局凸显多边机制困境。

### 五、贸易理论与贸易政治类

**31. 赫克歇尔—俄林模型（Heckscher-Ohlin Model）**【模拟-7】
新古典贸易理论的核心模型：在两国—两商品—两要素框架下，**一国应出口密集使用其相对丰裕要素的商品，进口密集使用其相对稀缺要素的商品**。其政治含义由斯托尔珀—萨缪尔森定理给出：贸易开放将**抬升一国相对丰裕要素的实际报酬，压低相对稀缺要素的实际报酬**。这构成贸易政治联盟分析的基础（如发达国家资本拥护自由贸易、劳动反对，反之发展中国家相反）。

**32. 李嘉图—维纳模型（Ricardo-Viner / Specific Factors Model）**【模拟-7、15】
对 H-O 模型的修订：假设**部分要素在产业间流动性极低（产业专用）**——如设备、技术工人在短期内不能转换部门。结论是：贸易开放后，**收益沿"产业部门线"划分**——出口部门（不论资本还是劳动）受益，进口竞争部门（不论资本还是劳动）受损。这一模型由 Hiscox 等用于解释发达国家中跨阶级的产业联盟与贸易政治分化（如美国汽车业工会与资本一致反对自由贸易）。

**33. 保护待售模型（Protection for Sale）**【模拟-7、14】
格罗斯曼与赫尔普曼（Grossman & Helpman, 1994）建立的政治经济学模型：**政府作为追求政治献金 + 社会福利加权和的目标函数最大化者，在政治组织化的产业获得更高保护**。其关键结论：①产业的政治组织程度（捐款能力）正向影响保护水平；②进口需求弹性越低、进口渗透率越高，保护倾向越大。该模型为美式贸易政策的国会—利益集团结构提供了微观基础（参见田野第六章）。

**34. 行业间要素流动程度（Inter-industry Factor Mobility）**【模拟-8、13】
比较政治经济学关于要素流动性的核心变量：**衡量资本、劳动等生产要素能否在产业部门间低成本地重新配置**。要素流动性高 → H-O / 斯托尔珀-萨缪尔森逻辑成立，政治联盟沿**阶级线**（资本 vs 劳动）形成；要素流动性低 → 李嘉图-维纳模型逻辑成立，政治联盟沿**产业线**（部门内资本+劳动 vs 其他部门）形成。Rogowski、Hiscox 据此分析不同国家贸易政治格局差异。

**35. 社会联盟（Social Coalitions）**【模拟-12】
罗格夫斯基（Rogowski, 1989）《商业与联盟》提出的概念：指**面对贸易开放或冲击时，社会内部因要素受益—受损格局形成的阶级或产业政治联盟**，进而塑造一国对外经济政策。要素丰裕度（土地、劳动、资本）+ 流动性决定联盟形式：高流动性下形成阶级联盟（"红 vs 绿 vs 城市"），低流动性下形成产业联盟。社会联盟分析是"颠倒的第二意象"传统的重要案例。

### 六、霸权与国际秩序类

**36. 结构性权力（Structural Power）**【模拟-9】
苏珊·斯特兰奇在《国家与市场》（1988）提出，**与"关系性权力"（A 让 B 做不愿做的事）相对的、能塑造他人选择框架的权力**。她区分四种结构性权力：①**安全结构**（提供安全的能力）；②**生产结构**（决定什么、由谁、怎么生产）；③**金融结构**（决定信用创造与货币制度）；④**知识结构**（决定何为知识、谁能获得、如何传播）。结构性权力可解释美国"超额特权"和西方在全球治理中的话语主导地位。

**37. 路径依赖（Path Dependence）**【模拟-9】
诺思借自演化经济学的核心概念：指**制度一旦确立，会因报酬递增机制（学习效应、协调效应、适应预期、网络效应）而自我强化，使后续选择被既有路径锁定**。即便存在更优替代方案，重新建立也面临高额转换成本。它解释了"制度黏性"和发展轨迹的国别差异（"诺思悖论"），是历史制度主义的核心机制。在 IPE 中可用于解释美元主导地位、布雷顿森林机构持续存在等现象。

**38. 罗斯克兰斯的贸易国（Trading State）**【模拟-9】
理查德·罗斯克兰斯（Richard Rosecrance）在《贸易国的兴起》（1986）提出：与历史上靠领土扩张获取财富与权力的**军事—领土国家**相对，二战后涌现出靠**对外贸易和国际分工实现增长与安全**的"贸易国"，如战后德国、日本、新加坡。其核心命题：随着核武器、跨国生产、国际制度发展，征服成本上升而贸易收益增加，贸易国模式在体系中扩散，构成"贸易和平"的结构基础。

**39. 颠倒的第二意象（Second Image Reversed）**【模拟-8】
古勒维奇（Peter Gourevitch, 1978）《颠倒的第二意象：国际渊源与国内政治》：与华尔兹《人、国家与战争》中"第二意象"（国内政治决定外交）相对，**国际体系结构和压力也会回溯塑造一国国内政治制度、社会联盟与政策方向**。世界经济周期、国际安全压力、危机传染等都是这种回溯机制的载体。该论文是 IPE"国内 — 国际互动"研究范式的奠基之作，构成 OEP（Open Economy Politics）的方法论起点。

**40. 国家自主性（State Autonomy）**【模拟-3】
国家主义学派（Skocpol、Krasner、Evans 等）核心概念：指**国家及其官僚机构独立于国内特定利益集团（资本、阶级、社会团体）而形成并贯彻偏好的能力**。它强调国家不只是利益集团的"力学合力"，而是独立的政治行为体。自主性的来源包括官僚结构、财政能力、强制能力、意识形态正当性等。斯考切波《国家与社会革命》、克拉斯纳《捍卫国家利益》是经典代表（参见田野第七章）。

**41. 国家能力（State Capacity）**【模拟-4】
与自主性相对的国家行动维度：指**国家把既定目标转化为政策结果的实际执行能力**，包括汲取能力（财税）、调控能力（宏观经济）、强制能力（治安、国防）、合法化能力（认同、动员）、渗透能力（基层治理）。Mann、Migdal、王绍光/胡鞍钢均有重要研究。在 IPE 中，国家能力解释了为何有些发展中国家能成功推进产业政策与赶超（东亚四小龙），而其他国家失败。

**42. 国内结构（Domestic Structure）**【模拟-4、15】
卡赞斯坦《在权力与富裕之间》、托马斯·里塞-卡彭等学者使用的核心概念：指**一国国家与社会关系的稳定模式**，包括国家组织形式（集权/分权）、社会组织形式（多元/统合）、国家—社会联系（强/弱）。它是跨国行为体进入目标国社会、塑造对外经济政策的"过滤器"，也是各国对相同外部冲击产生不同政策回应的关键变量。

**43. 英国学派（English School）**【模拟-4】
源自 20 世纪 50 年代英国国际关系研究小组（曼宁、布尔、文森特、沃森等）的国际关系理论流派，核心概念是**"国际社会"**——介于霍布斯式"无政府体系"与世界主义式"世界社会"之间，由共享规则与制度（外交、国际法、均势、大国管理、战争）维系的国家共同体。其方法上偏历史—诠释。代表作有布尔《无政府社会》。该学派与建构主义有亲缘关系，对解释主权规范演变、人权干预、新兴大国融入秩序具有解释力。

### 七、世界体系与依附理论类

**44. 依附（Dependency）**【模拟-10】
卡多佐、多斯桑托斯、弗兰克等拉美依附论学者的核心概念：指**外围国家的经济结构、增长节奏被中心国家的需求、资本与技术决定，外围发展取决于、并被限制于中心—外围关系**。卡多佐进一步区分"封闭式依附"与"联系性依附发展"（dependent development），承认外围在跨国公司投资下可获得部分工业化，但本质上仍嵌入不平等结构。依附论挑战了罗斯托式现代化理论。

**45. 商品链（Commodity Chains）**【模拟-10】
霍普金斯、沃勒斯坦提出、格里芬等发展的概念：指**为生产某一最终商品而跨地区、跨国相互联结的劳动与生产过程网络**。后由 Gereffi 发展为"全球商品链"（GCC），区分"生产者驱动"（汽车、电子）与"购买者驱动"（服装、零售）两类。它把世界体系论的中心—外围结构落实到具体产业链上，揭示价值分配的不平等。21 世纪后被"全球价值链"（GVC）和"全球生产网络"（GPN）研究继承。

**46. 世界体系（World System）**【模拟-10】
沃勒斯坦（Wallerstein）在《现代世界体系》（1974—）提出的宏观结构概念：**16 世纪起在欧洲资本主义扩张下形成的、以单一世界市场和多元政治权威（民族国家体系）为基础的跨国分工体系**，由**中心—半边缘—边缘**三层不平等分工构成。中心国家垄断资本与技术密集生产，外围承担原料与劳动密集生产，半边缘起缓冲作用。世界体系内嵌世界霸权周期与康德拉季耶夫长波。

### 八、人物类（Renmin/IPE 教材重点人物）

**47. 罗伯特·考克斯（Robert W. Cox）**【模拟-9】
加拿大裔批判 IPE 理论代表人物。代表作《生产、权力与世界秩序》（1987）、论文《社会力量、国家与世界秩序》（1981）。其核心命题：**"理论总是为某种人、出于某种目的"，区分"问题解决理论"与"批判理论"**。批判理论拒绝把现有秩序视为永恒，主张通过历史结构方法（物质能力、观念、制度三层互动）揭示世界秩序的阶级与霸权基础。是新葛兰西主义 IPE 学派的奠基者。

**48. 苏珊·斯特兰奇（Susan Strange）**【模拟-9】
英国 IPE 学派代表人物。代表作《国家与市场》（1988）、《疯狂的金钱》（1998）、《赌场资本主义》（1986）。批评主流（美式）IPE 过度学院化、忽视权力与历史。提出**结构性权力**（安全、生产、金融、知识四个结构）的著名分析框架，强调美国并未真正衰落，而是有意"放弃管理"。其政治经济学具有强烈反主流和现实关怀色彩，对中国学者影响深远。

**49. 查尔斯·金德尔伯格（Charles P. Kindleberger）**【模拟-10】
美国经济史学家、霸权稳定论的早期提出者。代表作《1929—1939 年的世界经济萧条》（1973）、《疯狂、惊恐与崩溃：金融危机史》。提出**"领导论"**：1929 年大萧条之所以演变为世界性灾难，是因为英国已无力、美国还不愿承担国际经济领导责任（提供市场、稳定汇率、最后贷款人），制度公共物品供给中断。该论断成为霸权稳定论（HST）的滥觞。

**50. 斯蒂芬·克拉斯纳（Stephen D. Krasner）**【模拟-10】
美国新现实主义/国家主义代表人物。代表作《捍卫国家利益》（1978）、《国际机制》（1983，编）、《主权：有组织的伪善》（1999）。两大贡献：①把霸权稳定论从经济领域扩展到一般国际机制（"霸权产生机制、机制提供公共物品"）；②**国际机制定义**：原则、规范、规则与决策程序的集合。其国家主义立场强调国家自主性，挑战利益集团多元主义。

**51. 罗纳德·科斯（Ronald Coase）**【模拟-12】
英国经济学家、新制度经济学奠基人，1991 年诺贝尔经济学奖得主。两篇划时代论文：**《企业的性质》（1937）提出交易成本概念**，解释企业边界与组织选择；**《社会成本问题》（1960）提出科斯定理**，论证产权与外部性的关系。其工作开启了产权经济学、交易成本经济学、新制度经济学，对 IPE 制度分析（特别是基欧汉《霸权之后》）具有奠基性意义。

**52. 罗伯特·基欧汉（Robert Keohane）**【模拟-11】
美国新自由制度主义代表人物。与奈合著《权力与相互依赖》（1977）提出复合相互依赖；独著《霸权之后》（1984）借交易成本理论论证**国际制度即便在霸权衰落后仍能维持合作**。其核心立场：在无政府状态下，国际制度通过降低交易成本、提供信息、稳定预期推动合作；制度具有"黏性"。是当代 IPE 主流"OEP 范式"的方法论旗手之一。

**53. 埃莉诺·奥斯特罗姆（Elinor Ostrom）**【模拟-11】
2009 年诺贝尔经济学奖得主，首位女性经济学奖获得者。代表作《公共事物的治理之道》（1990）。通过多国渔场、灌溉、森林、牧场案例研究，论证**公共池塘资源既无需国家化也无需私有化，本地社区可基于八项设计原则（边界明晰、规则贴合、集体决策、监督、分级制裁、冲突解决、自组织权、嵌套治理）实现长期可持续治理**。其理论挑战了"公用地悲剧"宿命论，成为多中心治理理论支柱。

**54. 彼得·卡赞斯坦（Peter Katzenstein）**【模拟-11】
德裔美籍 IPE 与比较政治学者，"颠倒的第二意象"派代表。代表作《在权力与富裕之间》（1978，编）、《小国家在世界市场中》（1985）、《文化规范与国家安全》（1996）。前两部作品将"国内结构""社会联盟""民主合作主义"等概念引入 IPE，论证小国如何通过"民主合作主义"应对开放经济冲击；后者引入建构主义，强调认同、规范对外交政策的塑造。

**55. 安德烈·冈德·弗兰克（Andre Gunder Frank）**【模拟-10 中的"宗主—卫星"模式题目背景人物】
德裔依附论代表人物。代表作《拉丁美洲：不发达与革命》（1969）、《依附性积累与不发达》（1978）。提出**"宗主—卫星"模式**：资本主义世界体系由层层链锁的宗主—卫星关系构成，外围国家的"不发达"不是停留在前现代，而是资本主义中心持续抽取剩余的"不发达的发展"结果。1990 年代后转向《白银资本》，重估东方在世界经济中的地位。

**56. 费尔南多·恩里克·卡多佐（F. H. Cardoso）**【模拟-12 简答题相关】
巴西社会学家、前总统（1995-2003）。与法雷托合著《拉丁美洲的依附与发展》（1969）。提出**"联系性依附发展"（associated dependent development）**：与弗兰克的"不发达发展"悲观论不同，他承认在跨国公司投资下外围可实现一定程度的工业化与现代化，但这种发展仍嵌入不平等的中心—外围结构。该框架解释了 1970 年代巴西、墨西哥的"奇迹"。

**57. 理查德·库珀（Richard N. Cooper）**【模拟-12】
美国国际经济学家、相互依赖理论先驱。代表作《相互依赖的经济学》（1968）、《有序的世界？》（1987）。最早系统论证：**经济一体化下各国宏观政策外溢效应增强，国别政策有效性下降，必须通过国际宏观协调（policy coordination）应对**。其工作是基欧汉、奈复合相互依赖理论的直接思想前史，也是 IMF、G7 等宏观协调机制的理论基础之一。

### 九、其他与时事类

**58. 拉美经济委员会（ECLAC/CEPAL）**【模拟-6】
联合国 1948 年设立的区域经济委员会，总部圣地亚哥。普雷维什在此提出**"中心—外围"理论**与**"贸易条件长期恶化论"**，论证原料出口国相对工业品进口国的贸易条件趋于恶化。其政策主张是**进口替代工业化（ISI）+ 国家主导的发展战略**，深刻影响 1950–1970 年代拉美与第三世界发展政策。是结构主义发展经济学和依附论的理论母体之一。

**59. 蒙代尔—弗莱明模型（Mundell-Fleming Model）**【模拟-8】
20 世纪 60 年代蒙代尔（罗伯特·蒙代尔）和弗莱明独立提出的开放经济宏观模型，是 IS-LM 模型的开放经济扩展。其经典推论"**不可能三角"（Trilemma）**：**资本自由流动、固定汇率、独立货币政策三者不可兼得**。该模型构成现代国际宏观经济与汇率制度选择研究的基础，对解释金本位、布雷顿森林、欧元区、人民币汇改路径都至关重要。

**60. 诺思悖论（North's Paradox）**【模拟-8】
诺思在《经济史中的结构与变迁》（1981）提出的命题：**国家是经济增长的关键，又是经济衰退的根源**——国家既需要保护产权以促进市场发展，又有动力为统治者短期利益侵蚀产权。其核心张力来自国家的"双重目标"：财政收入最大化 vs 社会产出最大化。该悖论解释了为何有些国家陷入"汲取型制度"陷阱（Acemoglu）、为何制度路径依赖难以打破，是制度变迁分析的核心命题。

## Part II 简答题（39 题）

> 体例：每题 300–500 字，要点编号清晰，便于背诵。

### 1. 简述重商主义的信条【模拟-1】

重商主义（Mercantilism）是 16—18 世纪盛行于西欧的国家主义经济思想，是民族国家初兴时期的主导意识形态。其核心信条可概括为：

1. **财富即货币（金银本位观）**：把一国财富等同于其拥有的金银等贵金属数量。金银被视为国力的实物表现，因此政策目标是最大限度地积累贵金属。
2. **贸易顺差（顺差最大化）**：在金银总量大体既定的世界里，**一国所得就是他国所失**（零和博弈观）。因此要通过**奖出限入**（鼓励出口、限制进口）来获取贸易顺差，从而吸纳金银。
3. **国家强力干预**：国家必须主动管理对外贸易、产业、航运与殖民，包括关税壁垒、出口补贴、特许公司（如东印度公司）、《航海条例》等手段。
4. **生产性产业优先**：扶植本国制造业，限制原料出口、限制工业品进口；殖民地被定位为原料供应地与本国制造品销售市场。
5. **国家强大与财富互为表里**：财富用于支撑军备和海权，强大的国家又能保障财富的获取与安全，二者相辅相成。

代表人物有托马斯·孟（《英国得自对外贸易的财富》）、柯尔贝（法国财政大臣）。重商主义为近代民族国家的经济独立与工业起飞提供了政策框架，对后世的"汉密尔顿主义"（美）、"李斯特国民经济学"（德）、东亚发展型国家、当代产业政策都有思想遗产（参见吉尔平《国际关系政治经济学》第二章；宋新宁/陈岳第二章）。

### 2. 简述托马斯·孟的重商主义学说【模拟-2、15】

托马斯·孟（Thomas Mun, 1571—1641）是英国东印度公司董事，**晚期（成熟）重商主义**——又称"贸易差额论"——的集大成者。代表作《英国得自对外贸易的财富》（1664 年由其子整理出版）。其学说核心：

1. **总贸易差额论**：批评早期重商主义"货币差额论"机械禁止白银出口的做法，主张**只要总体贸易顺差为正，个别贸易关系出现逆差或个别白银外流都不要紧**。东印度公司将白银运到东方换回胡椒、丝绸等商品再转口到欧洲，最终为英国带回更多金银。
2. **生产—贸易循环观**：贵金属流入只是结果，根本动力在于生产竞争力和商业网络。因此政策应鼓励本国制造业、航运业、转口贸易、再出口业。
3. **节俭与勤奋**：强调民族节俭与勤勉劳动是积累财富的根本。
4. **政策建议**：①禁止原料出口、奢侈品进口；②鼓励本国制造业出口；③扩张商船队和殖民地；④通过《航海条例》（1651）巩固英国对国际航运的控制。

托马斯·孟的学说与英国 17—18 世纪的商业革命相契合，为英国海权与工业革命准备了制度基础。他比早期重商主义更具弹性和市场感，被视为重商主义思想成熟形态的代表（参见吉尔平第二章；宋新宁/陈岳第三章）。

### 3. 简述汉密尔顿的新重商主义学说【模拟-3】

亚历山大·汉密尔顿（Alexander Hamilton, 1755—1804）是美国首任财政部长。1791 年向国会提交《关于制造业的报告》，是**新大陆民族经济独立思想的奠基性文件**，被视为"新重商主义"或"美国体系"的源头。其核心主张：

1. **制造业立国论**：农业立国（杰斐逊主义）无法支撑独立国家的安全与未来，必须通过工业化建立自主的制造业体系。农工并举才能避免对欧洲的产业从属。
2. **幼稚产业保护**：新生制造业面对欧洲（特别是英国）成熟产业的竞争处于天然劣势，必须通过**进口关税、出口补贴、奖励金、政府采购**等手段予以保护和扶持，直至其具备竞争力。
3. **国家信用与金融基础**：力主联邦承担各州战争债务、建立合众国银行、统一货币和债券市场，建立稳健的国家信用体系，为工业化融资。
4. **国家积极干预**：政府不仅要提供保护，还要主动投资基础设施（道路、运河）、技术引进与移民吸引（"挖角"欧洲技工）。
5. **关税同时是财政收入和保护手段**：关税既保护幼稚产业，又是联邦主要财源。

汉密尔顿学说被 19 世纪德国学者李斯特发展为系统的"国民经济学体系"，并为德、日、东亚后发国家提供了赶超模板。其精神延续至今，可见于产业政策、出口管控、半导体补贴等当代美国"新华盛顿共识"实践（参见吉尔平第二章；樊勇明第三章）。

### 4. 简述李斯特的幼稚产业保护论【模拟-4】

弗里德里希·李斯特（Friedrich List, 1789—1846）是 19 世纪德国民族经济学家，代表作《政治经济学的国民体系》（1841）。在面对工业革命中英国的全球产业优势时，他系统提出了**幼稚产业保护论**：

1. **国民经济学批判古典经济学**：批判亚当·斯密、李嘉图的"世界主义经济学"忽视了国家差异；指出**自由贸易的好处只对已经领先的工业国（英国）真实**，对后发国家是"扔掉脚下梯子"。
2. **生产力理论**：财富的能力比财富本身更重要。一国生产力（制造能力、技术、教育、基础设施）才是长期国力之本。
3. **经济发展五阶段论**：原始未开化—畜牧业—农业—农工业—农工商业。后发国家必须借助保护推动从农业向农工商业的跃迁。
4. **幼稚产业保护原则**：①保护对象限于具有潜在比较优势的关键制造业；②保护手段以**关税**为主，必要时辅以补贴；③保护具有**阶段性、有限性、可退出性**——一旦行业成熟即应撤除保护，避免长期依赖。
5. **保护范围**：制造业，**不保护农业**（因为德国当时已具优势）；不保护过度成熟或永远没有竞争力的产业。

李斯特理论为德国关税同盟、统一后帝国工业化、以及战后日韩台"东亚发展型国家"提供了思想资源，构成"经济民族主义"传统的奠基（参见吉尔平第二章；田野第六章）。

### 5. 简述凯恩斯的超贸易保护主义【模拟-5】

凯恩斯在大萧条与战后早期的著述（如《说服集》《告别自由放任》《通往奴役之路》评论、《自给自足论》1933 等）中，对古典自由贸易立场进行重大修正，被称为**"超贸易保护主义"**——它不再像传统保护主义那样仅服务于幼稚产业，而是**服务于充分就业和宏观经济稳定**的更高目标。要点：

1. **理论前提**：凯恩斯证明市场不会自动实现充分就业，存在长期有效需求不足。因此宏观调控、财政与货币干预成为必要。
2. **贸易政策从属于宏观稳定**：开放经济条件下，国际收支失衡、进口冲击、汇率波动可能加剧国内有效需求不足和失业，因此**贸易保护是平衡国际收支、保护国内就业的合法工具**。
3. **关税与汇率调控**：主张相机使用关税、外汇管制乃至适度的"贸易壁垒"以维持国内经济稳定；批评金本位束缚国内宏观政策。
4. **国家自给的有限度合理性**：在 1933 年《自给自足论》中，他罕见地为有限度的经济自给辩护，认为**金融、思想、文化的国际化值得追求，而生产应尽量本地化以维护社会稳定**。
5. **战后多边制度构想**：在战时设想的"国际清算同盟"（Bancor 方案）中，赋予各国保留必要资本管制和贸易调整权的空间，反映了其超贸易保护主义遗产。

凯恩斯的超保护主义是**嵌入式自由主义**（Ruggie）的思想前驱，把贸易自由化置于国内宏观稳定的从属地位（参见吉尔平第八章；宋新宁/陈岳第四章）。

### 6. 简述理性选择制度主义的主要命题【模拟-1、15】

理性选择制度主义（Rational Choice Institutionalism, RCI）是 1970 年代以来兴起的新制度主义三大流派之一（另两为历史制度主义、社会学制度主义），其学术源头是新制度经济学（科斯、诺思、威廉姆森）与公共选择学派（布坎南）。主要命题：

1. **行为人假设**：行为者是**有限理性、追求效用最大化的策略性主体**，制度被视为约束行为的"博弈规则"或"激励结构"。
2. **制度的功能性起源**：制度因**降低交易成本、解决集体行动困境、提供信息、稳定预期**等功能性需要而产生（"功能解释"）。
3. **制度即均衡**：制度是行为者在反复博弈中形成的稳定预期与策略组合（均衡概念），并通过自我实施机制（self-enforcing）维系。
4. **演绎—均衡—比较静态分析**：方法上重视形式化建模、博弈论、比较静态推理。
5. **国际关系含义**：基欧汉《霸权之后》借此论证国际制度即使在霸权衰落后仍能持续——因为成员国在反复博弈中已建立预期与利益绑定，撤除制度的转换成本巨大。

代表人物：诺思、奥斯特罗姆、谢泼斯尔、温加斯特，国关领域有基欧汉、米尔纳、马丁（Lisa Martin）等。其优点是逻辑严密、可证伪；常被批评忽视历史、文化与权力（参见田野第一、二章）。

### 7. 简述历史制度主义的主要命题【模拟-2】

历史制度主义（Historical Institutionalism, HI）是新制度主义三流派之一，以斯考切波（Skocpol）、霍尔（P. Hall）、斯坦莫（Steinmo）、塞伦（Thelen）等为代表。其主要命题：

1. **制度的历史性**：制度是历史进程的产物，**关键时刻（critical junctures）**的选择会长期锁定制度路径。
2. **路径依赖（Path Dependence）**：制度一旦形成，会通过报酬递增（学习效应、协调效应、适应预期、网络外部性）自我强化，使后续选择被锁定，重新选择成本高昂。
3. **关键节点 + 长期稳定**：制度演变呈"间断—稳定—间断"模式（punctuated equilibrium）：长期稳定被偶发的危机/冲击打破，进入新一轮路径依赖。
4. **权力非对称性**：制度不仅有协调与降低交易成本的功能，更是**权力斗争的产物**，反映特定时期的权力分配，因而具有再分配效应。
5. **观念与行动者**：行动者既被制度结构所塑造，也能在关键时刻通过观念创新、联盟重组改变制度（"渐进性制度变迁"——塞伦的概念：分层、漂移、转换、替换、耗尽）。
6. **方法**：偏案例比较、过程追踪、长时段历史叙事。

历史制度主义弥补了理性选择制度主义对历史与权力维度的忽视，对解释不同国家的制度差异（如福利国家类型学、汇率制度选择、金融监管模式）有较强解释力（参见田野第一章；霍尔《政治科学的三种新制度主义》）。

### 8. 简述交易成本的分类【模拟-3、14】

交易成本由科斯在《企业的性质》（1937）首创，威廉姆森系统分类。可按**发生阶段**与**性质**两条思路分类：

**A. 按交易过程阶段（事前 vs 事后）：**
1. **事前交易成本**：①搜寻信息成本（找交易对象、产品信息）；②谈判与缔约成本（讨价还价、起草合同）；③签约决策成本。
2. **事后交易成本**：①监督成本（确认对方履约）；②执行成本（处理违约、诉讼仲裁）；③调整成本（根据外部变化重新谈判）；④锁定成本（关系专用投资被对方"敲竹杠"）。

**B. 按性质（北方/威廉姆森综合）：**
1. **信息成本**：克服信息不对称的成本。
2. **谈判成本**：与谈判力、各方数量、议程复杂性相关。
3. **监督与执行成本**：检测违约、施加惩罚、维护契约履行的成本。
4. **不确定性溢价**：环境不确定性导致的额外契约设计成本。

**国际关系含义**：基欧汉《霸权之后》将交易成本概念引入 IPE，论证**国际制度的核心功能就是降低国家间合作的事前与事后交易成本**——提供信息（减少不对称）、稳定预期（减少不确定性）、设立监督机制（减少机会主义）、降低重复谈判成本（提供持续框架）。因此即使霸权衰落，国家仍因转换成本而维系既有制度（参见田野第二章）。

### 9. 简述公共选择理论的假设【模拟-6】

公共选择理论（Public Choice）由布坎南、塔洛克在 1960—70 年代创立，以《同意的计算》《自由市场与国家》为代表作，把经济学方法应用于政治过程分析。其核心假设：

1. **方法论个体主义**：政治行为分析应从个体出发，集体行动是个体选择的加总。
2. **理性自利人假设（同质化）**：政治人与经济人遵循同一行为逻辑——追求自身效用最大化。**官员、议员、选民、利益集团**都是理性自利者，不存在天然"为公"的政治人。
3. **政治即交易**：政治过程被视为各方利益的交易和博弈，类似市场过程；政治"市场"亦受供求规律支配。
4. **政府失灵假设**：政府不必然纠正市场失灵，可能因官僚扩张、寻租、信息不足、投票悖论而产生政府失灵。
5. **制度约束至关重要**：既然政治人自利，必须通过宪政规则、分权制衡、规则化决策约束权力，才能避免侵蚀公共利益。

主要推论：①政治商业周期；②寻租现象；③选民理性无知；④利益集团对政策的影响；⑤投票悖论与议程操纵；⑥多数人的暴政与少数人的剥夺。公共选择对 IPE 的影响主要在贸易政治（保护待售模型）、央行独立性论证、汇率政治分析等（参见樊勇明第五章）。

### 10. 简述寻租支出的类型【模拟-6】

寻租（rent-seeking）由 Tullock（1967）首创，Krueger（1974）正式命名，指经济主体为获取或维持政府创造的、超过市场竞争所能给予的超额收益（"租金"）而进行的**非生产性**资源支出。寻租支出的主要类型：

1. **直接寻租支出**：①政治献金与游说支出（lobbying）；②对官员的贿赂；③组建利益集团、行业协会的费用；④诉讼和行政复议费用。
2. **过度投资以争取保护**：在尚未确立保护时，企业通过夸大投资规模、就业人数等指标，制造"too big to fail"压力，争取关税保护、补贴或救助。
3. **行政壁垒的过度配合**：为获得许可证、配额、特许经营权而进行的过度投入，如证书与资质投资、关系建设。
4. **防御性寻租（counter-rent-seeking）**：受现行政策伤害的群体为撤销不利政策而进行的支出（如出口企业反对汇率高估的游说）。
5. **寻租的二次衍生**：①保护垄断地位的进一步监督与维护成本；②政府反寻租机构本身的运行成本（图洛克方阵）；③对寻租官员的"租金分享"安排。
6. **巴格瓦蒂的直接非生产性寻利活动（DUP）**：把寻租推广为更广泛的"非生产性逐利活动"，包括游说、走私、关税逃避等。

寻租支出的总社会成本通常远超寻租者实际获得的租金（图洛克方阵 + 巴格瓦蒂 DUP），是政府失灵和保护性政策福利损失的核心微观机制（参见田野第六章；樊勇明第五章）。

### 11. 简述并举例说明国家自主性的来源【模拟-1，原题为简答】

国家自主性（state autonomy）指国家及其官僚体系能独立于国内特定利益集团形成偏好并贯彻政策的能力，是国家主义学派（Skocpol、Krasner、Evans）核心概念。其主要来源：

1. **官僚结构的连贯性与专业性**：拥有连贯、专业、考试录用、长任期的官僚系统，使其能形成超越具体利益集团的政策偏好。**例**：日本通产省、韩国经济企划院、新加坡建屋发展局。
2. **国家与社会的相对距离**：国家与社会经济精英之间存在制度化区隔时（如选拔机制、轮岗、回避制度），自主性更高。**例**：中国干部异地交流制度。
3. **强国家的财政与强制能力**：拥有充足的财政汲取能力和强制工具（军警、税务），减少对特定集团的资源依赖。**例**：北欧高税收—高公共支出体制。
4. **外部压力与安全威胁**：面临严重外部威胁（战争、危机）时，国家可借合法性提升而扩展自主性。**例**：以色列、韩国冷战时期的发展国家。
5. **意识形态正当性**：拥有支撑国家行动的意识形态资源（如发展主义、民族主义、平等主义）。**例**：东亚发展型国家"赶超"叙事。
6. **国家与社会的"嵌入"型联系**：埃文斯《嵌入式自主性》指出，国家与重点产业精英保持紧密但非俘获的"嵌入"型联系，使政策具有可操作性且不被俘获。**例**：韩国朴正熙时期国家—大企业关系。
7. **国际制度与外部认可**：国际地位、国际制度成员资格也是自主性的资源。**例**：欧元区成员国央行通过欧央行独立性提升自主性。

国家自主性的强弱解释了为何相似外部冲击下不同国家产业政策成败差异巨大（参见田野第七章；Evans《嵌入的自主性》）。

### 12. 简述产生国家自主性的条件【模拟-2】

承接上题。国家自主性并非天然存在，需要一系列条件支撑。综合 Skocpol、Krasner、Evans 等学者的研究，主要条件：

1. **国家与社会的结构性分离**：存在区分"国家场域"与"社会场域"的制度边界（公务员制度、利益冲突回避、政商旋转门限制）。
2. **官僚体系的韦伯式特征**：①基于考试与功绩的选拔；②层级化、规则化、文书化运作；③长任期与专业化分工；④稳定的薪酬与退休保障。这是 Evans"嵌入式自主性"的"自主"一面。
3. **充足的财政与强制能力**：稳定财源（直接税体系、土地税或资源租金）+ 有效暴力垄断，使国家行动不必依赖特定利益集团捐资。
4. **国家精英的政治意志与凝聚力**：领导集团必须有清晰的战略目标和内部一致性（如东亚发展型国家"赶超意识形态"）。
5. **抵御利益集团俘获的制度安排**：透明度、监督机制、媒体监督、反腐机构等可限制俘获风险。
6. **国际地位与外部资源**：国际承认、外援、安全保护、技术引进等为国家自主行动提供资源杠杆。
7. **危机与关键节点**：战争、革命、深度危机等会**短暂解锁**自主性扩张窗口，但能否制度化为长期自主性取决于上述结构性条件。
8. **意识形态与社会认同**：发展主义、民族主义、平等主义等正当性叙事是国家自主行动的"软"资源。

值得注意的是，自主性过高也可能导致脱离社会反馈、走向掠夺型国家，因此 Evans 强调"自主性必须以嵌入性为基础"——既独立于又联系于关键社会集团（参见田野第七章；Skocpol《国家与社会革命》）。

### 13. 简述国内结构对跨国行为体进入目标国社会的影响【模拟-3】

国内结构（domestic structure）由 Risse-Kappen、卡赞斯坦发展，指一国"国家—社会关系的稳定模式"，包括国家集权度、社会组织化程度、国家与社会的联系方式。它构成跨国行为体（跨国公司、NGO、国际组织、外国政府、知识共同体）进入目标国社会、影响其政策的"过滤器"。主要影响机制：

1. **入口数量与渠道形式**：
   - **集权国家、社会原子化**（如苏联式国家）：只有少数政府层级的入口可用，跨国行为体几乎只能走政府渠道（外交、官方合作）。
   - **分权国家、社会多元化**（如美国）：入口众多（国会、州、利益集团、媒体），跨国行为体可走多渠道游说。
   - **统合主义国家**（如德国、北欧）：入口集中于少数功能代表机构（顶级行业联合会、工会），需通过它们接入决策。
2. **联盟伙伴的选择**：国内结构决定跨国行为体在目标国的可能盟友。分权多元结构下盟友选择丰富、政策影响快但短促；集权统合结构下盟友少但一旦建立合作影响深远。
3. **政策影响速度与深度**：分权多元 → 见效快但易变；集权统合 → 见效慢但稳定。
4. **过滤效果**：相同的国际压力（如气候议题、人权议题）在不同国内结构下产生差异化的政策回应——如美式立法政治、欧式合作主义、东亚式行政主导。
5. **跨国—国内联盟**："颠倒的第二意象"机制：跨国行为体往往与目标国内部受国际化冲击的群体形成跨边界联盟（如美企与中国地方政府推动加入 WTO）。

该框架解释了为何相同国际制度对不同国家的影响深浅不一（参见 Risse-Kappen 编《把跨国行为体带回来》；卡赞斯坦《在权力与富裕之间》；田野第五章）。

### 14. 简述霸权国建立约束性国际制度的动机【模拟-4、14】

约束性国际制度（binding international institutions）指对成员国（包括霸权国自身）行为构成实质性约束的国际制度，如 WTO 争端解决机制、《核不扩散条约》、IMF 的份额与表决规则。霸权国为何愿意接受对自身的约束？主要动机：

1. **可信承诺（credible commitment）**：通过自我约束，霸权国能向其他国家发出"不会滥用优势"的可信信号，从而吸引更多国家加入、降低其他国家的安全或经济防御成本，扩大合作基础。
2. **锁定后霸权时代的优势**：约翰·伊肯伯里（Ikenberry）《大战胜利之后》论证：霸权国趁权力顶峰建立约束性制度，可在自身相对衰落后仍享受制度"路径依赖"红利——将当时的权力优势"制度化、永久化"。
3. **降低治理成本与外部性**：约束性制度可降低反复议价的交易成本、稳定预期，霸权国实际上"用部分自主性换取系统稳定"。
4. **应对国内反对意见**：在国内政治分化时，霸权国领导人可借助国际承诺约束未来国内政策反复（"以外部约束国内"），如美国通过 WTO 约束国内贸易保护派。
5. **维护正当性**：单纯权力支配会激起抵抗，约束性制度提供合法性外衣，使霸权秩序更具持久性。Lake 称之为"权威/正当性的购买"。
6. **拉拢崛起国**：通过让出部分规则权，吸纳崛起国进入既有秩序（如中国加入 WTO、印度加入气候机制），降低体系冲突风险。
7. **解决信息与协调问题**：在多边治理中，约束性制度对所有参与方而言降低信息成本、稳定协调，霸权国也直接受益。

约束性程度受霸权国国内政治变量影响：分权多元政体下国会监督更易迫使总统接受约束；强人体制下行政更倾向单边主义（参见 Ikenberry《大战胜利之后》；田野第四章）。

### 15. 简述要素流动程度对政治联盟形成的影响【模拟-4】

要素流动程度（factor mobility）——资本、劳动等生产要素在产业部门间的可转移性——是国际贸易政治分析的核心变量，决定了贸易冲击下国内政治联盟的形成方式。

1. **高要素流动情形 → H-O / 斯托尔珀-萨缪尔森逻辑**：
   - 假设资本、劳动可自由在产业间流动；
   - 贸易开放后，**一国相对丰裕要素**（如发达国家的资本、发展中国家的劳动）整体受益，**相对稀缺要素**整体受损；
   - 政治联盟沿**阶级线**形成：发达国家资本拥护自由贸易、劳工反对；发展中国家相反。
   - **罗格夫斯基（1989）《商业与联盟》**用三要素（土地、劳动、资本）和要素丰裕度组合，预测出不同国家的政治分化（"红 vs 绿 vs 城市"等联盟形式）。

2. **低要素流动情形 → 李嘉图-维纳 / 特定要素逻辑**：
   - 资本、劳动具有较强产业专用性，短期难以转移；
   - 贸易开放后，**出口部门**（资本 + 劳动都受益）vs **进口竞争部门**（资本 + 劳动都受损）；
   - 政治联盟沿**产业部门线**形成。**例**：美国汽车业工会与资本一致反对自由贸易；硅谷资本与软件工程师一致支持自由贸易。
   - **Hiscox（2002）《国际贸易与政治冲突》**实证证明：要素流动性高的国家更易出现阶级化贸易政治，流动性低的国家更易出现部门化贸易政治。

3. **政策含义**：①再就业培训、社保等政策可提升要素流动性，缓和贸易冲突的阶级化或部门化对立；②区域差异大、产业集中度高的国家（如美国铁锈带）易形成强烈的反全球化部门联盟。

该分析框架是 OEP（Open Economy Politics）范式的核心组件之一（参见 Rogowski 1989；Hiscox 2002；田野第六章）。

### 16. 简述选举制度对汇率制度选择的影响【模拟-5、15】

选举制度（多数代表制 vs 比例代表制）通过塑造**政府类型**（单一政党 vs 联合政府）和**对利益集团的回应模式**，影响一国汇率制度选择。主要论证由 Bernhard & Leblang、Frieden 等提出：

1. **比例代表制（PR）→ 联合政府 → 更倾向固定汇率**：
   - PR 制下多党林立，常出现联合政府；
   - 联合政府决策易陷于谈判僵局，**难以独立运用货币政策应对冲击**，因此倾向于**借外部锚（固定汇率、加入货币联盟）"外包"货币政策**，避免国内分歧消耗；
   - 例：欧元区前西欧大量小国采用钉住马克、最终加入欧元（参见 Frieden 等关于欧洲货币一体化研究）。

2. **多数代表制 → 单一政党政府 → 更倾向浮动汇率**：
   - 单一政党政府对货币政策有较强自主控制权，倾向**保留独立货币政策应对经济冲击和选举周期**；
   - 因此对汇率自由度有偏好（浮动或可调钉住）；
   - 例：英美在金本位后多次坚持浮动或脱钩。

3. **汇率政策的利益集团回应**：
   - PR 制 + 统合主义国家（如德国、奥地利）：制造业出口集团 + 工会偏好稳定汇率以维持出口竞争力，联合政府能形成稳定联盟支持固定汇率。
   - 多数制 + 多元主义国家（如美国）：金融业偏好浮动、制造业偏好低估，政府摇摆于利益集团之间，最终以浮动汇率体现金融业偏好。

4. **政治商业周期视角**：单一政党政府更能利用货币政策操纵选举周期（PBC），因此偏好浮动；联合政府难以协调 PBC，偏好制度化锚定。

5. **整合性结论**：汇率制度选择并非纯技术问题，而是国内政治制度（选举—政府类型—利益集团回应模式）的政治经济产物（参见田野第六章；Bernhard, Broz & Clark 编 "The Political Economy of Monetary Institutions"）。

### 17. 简述波拉切克的贸易和平理论【模拟-5、14】

所罗门·波拉切克（Solomon Polachek）在 1980 年发表《冲突与贸易》（"Conflict and Trade"）一文，是当代"贸易和平论"经验研究的开山之作。其核心命题：

1. **基本假设**：国家是理性行为体，**冲突会破坏既有贸易，因而带来机会成本**。贸易关系越密切，冲突的机会成本越高。
2. **核心命题（贸易—冲突反向关系）**：**两国双边贸易规模越大，发生武装冲突或敌对行为的概率越低**。
3. **经验设计**：使用 COPDAB / WEIS 国家间冲突事件数据 + 双边贸易统计，控制相对实力、地理距离、政治体制等，估计贸易额对冲突频率的弹性。结果显示弹性约为 -0.19 至 -0.34，**贸易翻倍使冲突减少约 1/5**。
4. **理论机制**：①冲突预期机会成本上升；②跨国利益集团形成（出口商、跨国公司）反对冲突；③信息渠道增加，降低误判风险。
5. **延伸**：①不仅总贸易量重要，**贸易品的可替代性**也关键——若贸易品有完全替代来源，机会成本下降；②**贸易对称性**影响——不对称依赖可能激发恐惧而增加冲突；③Russett & Oneal 后续把贸易与民主、国际制度并列，发展为"康德三角"（贸易—民主—制度）和平论。
6. **现实意涵**：①推动经济一体化是和平政策的组成部分；②对中美关系而言，深度互嵌的贸易关系构成战略克制的物质基础，但"脱钩"会侵蚀这一基础。

批评意见：①一战前英德密切贸易仍爆发战争（吉尔平等历史反证）；②贸易也可能引发分配冲突而成为战争催化（罗斯克兰斯部分修正）。波拉切克为后续 Russett、Oneal、Mansfield 等贸易和平研究奠定经验框架（参见 Polachek 1980；Russett & Oneal 《三足鼎立》中译本）。

### 18. 简述罗斯克兰斯的贸易和平理论【模拟-6】

理查德·罗斯克兰斯（Richard Rosecrance）在《贸易国的兴起》（1986）中提出系统的"贸易和平"宏观论证，与波拉切克的微观经验研究互补。其核心命题：

1. **两种国家模式**：历史上有两条富强路径——**军事—领土模式**（靠征服扩张获取财富与权力）和**贸易—商业模式**（靠对外贸易和国际分工获取收益）。
2. **历史趋势**：二战以来，**贸易国模式收益上升、军事国模式成本上升**，体系日益向贸易国倾斜。代表为西德、日本、新加坡、瑞士、北欧诸国。
3. **结构原因**：
   - **核武器使大国战争代价不可承受**，征服收益急剧下降；
   - **现代生产技术依赖跨国分工**，征服后无法独占价值链；
   - **跨国公司、国际金融**使财富流动性强，难以靠占领领土锁定；
   - **国际制度（GATT/WTO、IMF）** 提供了贸易—金融的稳定环境，降低了"非领土路径致富"的不确定性。
4. **国内政治效应**：贸易国国内形成支持开放、反对扩张的"贸易导向社会联盟"（出口商、跨国公司、消费者），削弱军事—工业集团的政治权重。
5. **和平推论**：贸易国相互之间倾向通过谈判、规则与制度而非战争解决争端；体系内贸易国比重提升 → 体系层面战争概率下降。
6. **限制条件**：贸易和平依赖三大支柱——**自由贸易体制、安全保障（多由霸权提供）、跨国生产网络**。任何一项受损（如保护主义抬头、安全格局碎片化、价值链断裂）都会动摇贸易和平。

罗斯克兰斯比波拉切克更宏观：它不只是经验上看到贸易与冲突反向相关，而是论证整个体系结构性变化使贸易国模式日益主导（参见 Rosecrance 1986；杨光斌《政治学导论》相关章节；宋新宁/陈岳第十章）。

### 19. 简述贸易的预期价值对战争与和平的影响【模拟-7】

戴尔·科普兰（Dale Copeland）在《经济相互依赖与战争》（2015）中提出"贸易预期理论"，对传统贸易和平论作出关键修正。要点：

1. **核心命题**：决定贸易能否带来和平的，**不是当前贸易额本身，而是对未来贸易前景的预期**。
2. **机理**：
   - 若一国预期**未来贸易将继续/扩大**，则当前合作收益巨大，冒险动用武力的机会成本高，倾向和平；
   - 若一国预期**未来贸易将被切断/萎缩**（如对手将实施禁运、脱钩），则当前贸易反而成为"被威胁的资产"，国家可能采取**预防性行动**（preventive action）锁定关键资源或市场，冲突概率上升。
3. **历史案例**：
   - **一战前的德国**：与英法贸易密切，但对未来贸易前景悲观（认为英国海权可随时切断德国海上贸易），因此发展海军、扩张陆军，最终倾向战争——经典反例对纯波拉切克式贸易和平论的修正。
   - **日本 1941 年**：因美国石油禁运 + 资产冻结使其预期未来贸易彻底断绝，转向偷袭珍珠港的预防性战争。
4. **政策含义**：
   - 单纯增加贸易额不等于和平；**保持贸易前景的可预期性、避免突然脱钩或制裁威胁**才是关键。
   - 经济武器化（制裁、出口管制）虽具短期效力，但会扭曲预期、催化冲突。
5. **中美关系含义**：美国对华芯片、半导体出口管制不断升级，可能促使中国从"开放预期"转向"封锁预期"，加快自主创新和战略储备，从中长期看不利于体系稳定。
6. **理论意义**：科普兰把现实主义"安全困境"与自由主义"贸易和平"统一在"预期"这一变量上，被视为近 30 年贸易—和平研究最重要的理论综合之一（参见 Copeland 2015；田野第十章）。

### 20. 简述复合相互依赖的主要特征【模拟-7】

基欧汉、奈在《权力与相互依赖》（1977）提出"复合相互依赖"（Complex Interdependence）作为"现实主义世界"的对立理想型，三大主要特征：

1. **多渠道联系（multiple channels）**：
   - 国家间互动**不再限于政府首脑外交**，还包括跨政府联系（如各国财政部之间、央行行长之间）和跨国社会联系（跨国公司、NGO、专业团体、学术共同体）；
   - 多渠道使外交政策制定变得复杂、议程被分散到多个部门。
2. **议题无等级（absence of hierarchy among issues）**：
   - 国家间议程**不再以军事安全为绝对优先**，经济、环境、能源、技术、人权等议题并列；
   - 不同议题领域的利益集团、利益结构不同，因此外交政策内部存在张力。
3. **军事力量作用下降（minor role of military force）**：
   - 在富国之间、特定议题（贸易、金融、环境）上，军事力量难以使用或使用代价过高；
   - 议题联接（issue linkage）的代价 → 在某议题上动用军力会损害其他议题合作；
   - 国内政治反对动用军力的成本上升。

**与现实主义对照**：现实主义假设国家是单一行为体、安全至上、军力是主要权力来源；复合相互依赖则假设多元行为体、多议题、议题对应的非军事权力（市场、技术、规则）成为主导。

**权力含义**：在复合相互依赖中，权力呈现议题特定性（issue-specific power），结构性权力（议程设置、制度形塑）和议题联接能力成为主导。

**经验解释力**：①欧盟内部、美加、美日关系部分符合该理想型；②美中关系长期具有"半复合相互依赖"特征，但 2017 年后军事化、安全化趋势削弱了这一特征。

复合相互依赖是 IPE 主流框架的核心理论起点（参见基欧汉/奈《权力与相互依赖》中译本；田野第三章）。

### 21. 简述复合相互依赖的政治过程【模拟-7】

承接上题。在复合相互依赖条件下，国际政治过程相比现实主义有显著不同。基欧汉、奈识别出四种典型政治过程：

1. **议程设置过程的变化**：
   - 安全议题不再自动占据议程首位；
   - 由议题独特的利益结构、跨国行为体、专业知识共同体推动议题进入议程（如气候变化由科学界推动）；
   - 议程设置权（agenda-setting power）成为关键权力来源。
2. **议题联接（issue linkage）的复杂化**：
   - 现实主义假设各议题可被高度联接（强国可用一议题压另一议题）；
   - 复合相互依赖下，议题领域相对自治、各自利益结构不同，**强联接代价高**、容易引发跨议题反弹；
   - 因此联接更多发生于同议题域内或紧密相关议题间。
3. **国际组织的作用上升**：
   - 国际组织成为多议题、多渠道联系的常态化场所；
   - 提供议程设置场所、专业知识、信息透明、利益协调平台；
   - 小国通过国际组织放大其影响力。
4. **跨国与跨政府联系成为常规渠道**：
   - 央行行长定期会晤（BIS）、财长会议（G20）、行业监管机构跨国协调；
   - 跨国 NGO（如绿色和平、人权观察、国际特赦）跨边界游说；
   - 这些渠道使**对外政策"分散化"**，国家不再是单一理性行为体。

**政策含义**：
- 外交政策协调难度上升，对国内官僚体系协调能力提出更高要求；
- 软实力、规则塑造能力成为重要资源；
- 小国与非国家行为体在特定议题上可获得不成比例的影响力。

**评价**：复合相互依赖框架对欧美关系、跨太平洋经济关系、全球治理等高度互嵌领域解释力强；对涉及核心安全的地缘冲突解释力弱。它对理解 21 世纪的"碎片化全球治理"具有重要价值（参见基欧汉/奈第二章；田野第三章）。

### 22. 简述集体行动困境的成因【模拟-8】

集体行动困境（Collective Action Problem）由奥尔森《集体行动的逻辑》（1965）系统阐述：在自利理性假设下，**为共同利益采取行动反而难以达成**。主要成因：

1. **公共物品的非排他性**：集团一旦提供了公共物品（如国际安全、自由贸易体制、环境治理），无论是否贡献都可享用，**搭便车具有理性吸引力**。
2. **个体收益—成本不对称**：贡献的成本由个体独自承担，收益却被全体共享，**个体边际激励远小于社会最优**。
3. **集团规模效应**：
   - **大集团**中个体贡献对总产出影响微小，难以激励，且监督成本高，更易失败；
   - **小集团**中个体贡献效应明显、监督容易，更易组织（"小集团优于大集团"）。
4. **利益不对称**：少数大利益主体（如大企业、大国）可能因自身收益足够大而单方面提供公共物品（"霸权稳定"逻辑的微观基础），但同时压力也最大。
5. **缺乏选择性激励**（selective incentives）：奥尔森指出，**仅当集团能向贡献者提供专属奖励（如行业协会的内部服务）或惩罚不贡献者（如工会会费强制）时**，集体行动才能持续。
6. **信息不对称与执行困难**：监督谁贡献多少、识别搭便车者、施加可信惩罚都需要交易成本。
7. **重复博弈与折现率**：若行为人对未来折现高（短视）、不期望未来再合作，则更倾向搭便车；长期重复博弈下合作可能持续（Axelrod"重复囚徒困境")。

**国际关系含义**：
- 国际公共物品（自由贸易、金融稳定、气候减排）供给不足；
- 需要霸权国（金德尔伯格、克拉斯纳）或制度安排（基欧汉）提供选择性激励、监督、惩罚来克服困境；
- **气候谈判长期僵局、WTO 多哈失败**都体现典型集体行动困境（参见 Olson 1965；田野第二章）。

### 23. 简述世界经济霸权的两种模型【模拟-8】

关于世界经济霸权，主流 IPE 理论有两种模型——**"良性"霸权（benign hegemony）**与**"掠夺型"霸权（predatory/coercive hegemony）**：

1. **"良性"霸权（公共物品提供模型）**——金德尔伯格、基欧汉路径：
   - **核心命题**：霸权国愿意承担系统稳定的公共物品供给成本，因为其单方收益足够大；
   - **公共物品**：①开放市场（buyer of last resort）；②稳定汇率；③最后贷款人；④反周期资本流；⑤一致政策；
   - **机制**：制度建设 + 自我克制 + 提供单边惠益；
   - **结果**：体系成员搭便车也能获益，霸权与稳定正相关；
   - **历史范例**：1860—1914 年英国（金本位 + 自由贸易）、1945—1970 年代美国（布雷顿森林 + GATT + 马歇尔计划）；
   - **政策含义**：霸权衰落 → 公共物品供给不足 → 体系动荡（解释 1930 年代大萧条）。

2. **"掠夺型"霸权（强制汲取模型）**——克拉斯纳早期立场 + 现实主义路径：
   - **核心命题**：霸权国利用结构性权力**强制塑造规则，使收益向自己倾斜**；
   - **机制**：①规则偏好己方；②差异化对待（核心盟友 vs 边缘国家）；③货币与金融的"超额特权"（exorbitant privilege，戴高乐对美元的批评）；
   - **典型表现**：美元铸币税、SWIFT 制裁、长臂管辖、限制性技术出口管制；
   - **结果**：霸权下体系稳定的代价由外围承担，体系存在不平等分配。

3. **综合与张力**：
   - 同一霸权的"良性"与"掠夺"特征在不同议题、不同阶段比重不同；
   - 例：战后美国对西欧、日本采取**良性**做法（马歇尔计划、容忍贸易顺差），但对发展中国家与冷战对手则更**强制**（CIA 干预、制裁）；
   - 当代美国的金融制裁体系扩散到长臂管辖，**掠夺性面孔上升**。

4. **理论评价**：单纯良性模型回避了不平等，纯掠夺模型回避了合作；两个模型互补，更接近现实（参见 Kindleberger 1973；Gilpin《全球政治经济学》第三章；田野第四章）。

### 24. 简述金德尔伯格的霸权稳定理论【模拟-8】

查尔斯·金德尔伯格在《1929—1939 年的世界经济萧条》（1973）中提出**"领导论"**，是霸权稳定论（HST）的早期版本。主要内容：

1. **理论问题**：为什么 1929 年的美国股市危机能演变为全球经济大萧条？为何 1873 年危机却没有？
2. **核心命题**：稳定的开放世界经济需要一个国家承担**领导责任**，提供五大公共物品：
   - **开放市场（buyer of last resort）**：在他国出口受阻时提供吸纳市场；
   - **反周期长期信贷**：在世界经济萧条时提供资本流出；
   - **稳定汇率体系**：维持可预期的国际收付体系；
   - **协调宏观经济政策**：通过协商防止以邻为壑；
   - **最后贷款人**：在金融恐慌时提供流动性。
3. **领导真空理论**：1930 年代英国已无力提供领导（实力衰退、放弃金本位），美国还不愿承担责任（孤立主义、提高关税——斯姆特-霍利法案），**领导真空导致危机外溢与扩散，最终演变为大萧条**。
4. **HST 推论**：稳定的开放世界经济与领导国的实力正相关；霸权衰退 → 公共物品供给不足 → 体系不稳。
5. **基欧汉的批评修正**：基欧汉《霸权之后》同意金德尔伯格关于公共物品的诊断，但论证**霸权衰退后既有国际制度仍能维持合作**（制度黏性 + 交易成本逻辑）。
6. **克拉斯纳的扩展**：克拉斯纳将领导论从经济领域推广到一般国际机制——"霸权产生机制，机制提供公共物品"。
7. **当代含义**：
   - 美国相对衰落与"领导退场"（特朗普时期退群、拜登"小院高墙"）引发对全球公共物品供给不足的担忧；
   - 中国"全球公共产品"倡议（一带一路、亚投行、气候承诺）部分填补真空，但合法性与规则化仍是关键。

金德尔伯格的领导论是 HST 谱系的起点，与吉尔平、克拉斯纳、莫德尔斯基—汤普森（霸权周期论）共同构成霸权研究脉络（参见 Kindleberger 1973；Gilpin 1987；田野第四章）。

### 25. 比较世界经济中英国霸权和美国霸权的差异【模拟-9】

英国（约 1815—1914）与美国（1945— ）是两次世界经济霸权周期的代表，二者既有相似（如开放性、公共物品供给）也有显著差异：

1. **物质基础**：
   - **英国**：工业革命领先 + 海军绝对优势 + 殖民帝国（"日不落"）；
   - **美国**：制造业 + 科技 + 美元 + 海军 + 联盟体系（非领土帝国）。
2. **国际经济制度**：
   - **英国**：**自发性、非正式**——金本位（无正式协议）、自由贸易（《谷物法》废除）、伦敦作为国际金融中心、商业惯例与海事法；
   - **美国**：**协议性、制度化**——布雷顿森林体系（IMF、世行）、GATT/WTO、OECD、UN 体系；制度化程度远高。
3. **货币安排**：
   - **英国**：金本位 + 英镑作为关键货币，没有"超额特权"（货币兑换金）；
   - **美国**：法币本位 + 美元作为关键货币，享有铸币税与"超额特权"（戴高乐）；制裁能力依赖 SWIFT 与美元清算体系。
4. **军事安排**：
   - **英国**：海军单极优势 + 大陆均势策略；
   - **美国**：海军 + 全球基地网络 + 同盟体系（NATO、美日同盟、美韩同盟、AUKUS 等）；战略具有持续陆海复合特征。
5. **意识形态/正当性叙事**：
   - **英国**：自由贸易 + 文明使命 + 帝国秩序；
   - **美国**：自由民主 + 市场资本主义 + 全球治理。
6. **国内政治基础**：
   - **英国**：贵族—资产阶级联合 → 工业资本主导后的开放贸易共识；
   - **美国**：多元利益集团政治 + 国会—行政分权；社会联盟随产业周期变动剧烈，霸权政策周期性反复。
7. **维持成本与终结方式**：
   - **英国**：殖民地直接成本高，两次大战后帝国解体，1956 年苏伊士危机标志霸权终结；
   - **美国**：制度化 + 联盟分担降低维持成本，但 21 世纪相对衰落（中国崛起、内部极化）使霸权进入"调整与重塑"阶段。
8. **延续性**：英国霸权终结后伦敦仍是国际金融中心；美国若霸权重塑，美元、技术、英语、教育体系等结构性权力仍将长期延续。

**理论意涵**：两次霸权对比揭示了**正式制度化、可信承诺、联盟分担**对霸权持久性的重要性（参见 Gilpin 《全球政治经济学》；Ikenberry《大战胜利之后》；宋新宁/陈岳第七章）。

### 26. 简述世界体系理论的学术源头【模拟-9】

沃勒斯坦在 1970 年代提出的世界体系理论（World System Theory, WST）综合多个学术传统，其学术源头主要有：

1. **法国年鉴学派（特别是布罗代尔）**：
   - 布罗代尔《菲利普二世时期的地中海世界》《15—18 世纪物质文明、经济与资本主义》提供**长时段（longue durée）历史观、宏观地理结构、"世界—经济"概念**；
   - 沃勒斯坦借用其"世界—经济"概念并改造为"现代世界体系"。
2. **马克思主义传统**：
   - 资本主义生产方式、剩余价值、阶级斗争、全球积累等基本概念；
   - 尤其是列宁的帝国主义论、卢森堡的资本积累论，提供资本主义跨国扩张分析框架。
3. **拉美依附论**（Frank、Cardoso、Furtado、Amin）：
   - 中心—外围结构、"不发达的发展"、"宗主—卫星"链条；
   - 沃勒斯坦把依附论从拉美一域提升为全球结构理论，并加入"半边缘"作为缓冲。
4. **结构主义发展经济学**（普雷维什、ECLAC）：
   - 贸易条件长期恶化论、原料 vs 制成品的不平等交换；
   - 提供经济结构主义视角。
5. **熊彼特—康德拉季耶夫长波理论**：
   - 周期性视角，把霸权更替、技术革命与世界经济长波结合。
6. **韦伯的世界宗教比较与文明分析**：
   - 解释为何资本主义首先在西欧兴起，文化制度因素的考察。

**沃勒斯坦的综合贡献**：把上述传统融合为以**"单一世界市场 + 多元政治权威 + 中心—半边缘—边缘三层分工 + 长波周期 + 霸权更替"**为核心的宏大理论体系。其超越前人之处在于：①把"世界"作为分析单位而非民族国家；②把现代资本主义视为 16 世纪以来在欧洲诞生、不可逆扩张的历史性体系（参见 Wallerstein《现代世界体系》卷一；王正毅《世界体系论与中国》第一章；宋新宁/陈岳第六章）。

### 27. 简述现代世界体系的性质【模拟-9】

沃勒斯坦《现代世界体系》提出"现代世界体系"概念，强调其与历史上其他世界体系（如帝国型世界体系）的本质差异。其性质包括：

1. **资本主义性质**：
   - 现代世界体系起源于 16 世纪西欧资本主义扩张；
   - 以**资本积累为根本动力**，受市场利润逻辑驱动；
   - 与古代帝国靠政治强制汲取剩余不同。
2. **"世界—经济"形态**：
   - 不是世界政治帝国（无单一政治中心），而是**单一世界市场 + 多元政治权威（民族国家体系）**的"世界—经济"；
   - 民族国家体系是现代世界体系的政治结构；资本主义跨国流动是其经济结构。
3. **三层分工结构**：
   - **中心**：高技术、高利润、自由劳动、强国家；
   - **半边缘**：中等技术、混合劳动形式、中等国家；
   - **边缘**：低技术、低利润、强制/半强制劳动、弱国家；
   - 三者构成**不平等交换 + 剩余转移**的等级结构。
4. **不平等性**：
   - 不是各部分孤立发展，而是**中心通过不平等结构持续从边缘汲取剩余**；
   - 外围"不发达"不是滞后，而是体系性结果。
5. **周期性**：
   - 内嵌康德拉季耶夫长波（经济周期）和霸权周期（约 100—150 年）；
   - 上升期 = 中心扩张、半边缘上升机会；下降期 = 中心收缩、危机、霸权更替。
6. **不可逆扩张性**：
   - 自 16 世纪起持续扩张，**至 19 世纪末已吞并所有"外部地区"，覆盖全球**；
   - 当代世界体系是单一资本主义世界体系，不存在"另一个"独立体系。
7. **不可避免的危机性**：
   - 阿瑞吉、沃勒斯坦晚年判断当代体系已进入结构性危机（金融化、霸权交替不畅、生态危机、利润率下降）。

**理论评价**：现代世界体系论提供宏大结构视角，对国家间不平等、长时段历史趋势有强解释力；但被批评决定论倾向、低估国家自主性、对中国崛起等"半边缘上升"现象解释不足（参见 Wallerstein 卷一第七章；王正毅；宋新宁/陈岳第六章）。

### 28. 简述安德烈·冈德·弗兰克"宗主—卫星"模式【模拟-10】

弗兰克在《拉丁美洲：不发达与革命》（1969）系统提出"宗主—卫星"（Metropolis-Satellite）模式，是依附论的经典表达：

1. **核心命题**：资本主义世界体系由层层链锁的**宗主—卫星**关系构成。每个"卫星"对其"宗主"而言又同时是上一级的下属。
2. **链条结构**：从全球到地方多层嵌套：
   - **全球层级**：欧美工业中心 → 拉美 / 非洲 / 亚洲依附国；
   - **国别层级**：依附国首都/沿海工商中心 → 内陆农村；
   - **地方层级**：地方大城市 → 周边小城与乡村；
   - 每一级宗主从其卫星汲取剩余，再向上一级宗主上缴。
3. **不发达的发展（"the development of underdevelopment"）**：
   - 弗兰克最著名的命题——**外围"不发达"不是停留在前现代状态，而是被中心持续汲取的结果**；
   - 与罗斯托线性进化论（"赶上中心即可")针锋相对。
4. **历史命题**：
   - 拉美最快增长发生在**与宗主联系被切断**的时期：①殖民母国战争干扰期；②大萧条期；③两次世界大战期；
   - 反证：当与中心联系恢复后，依附结构重建，发展再次停滞。
5. **政治含义**：
   - 在体系内部改良不足以打破依附；
   - 主张革命性脱钩、自主发展、社会主义路径。
6. **批评与修正**：
   - 卡多佐质疑过于决定论，指出在跨国公司投资下外围可实现"联系性依附发展"；
   - 沃勒斯坦扩展为三层（增加"半边缘"）以处理东亚等案例；
   - 实证上，东亚四小龙、中国大陆的赶超成功对纯弗兰克式悲观论构成挑战。
7. **遗产**：尽管经验上受到挑战，"宗主—卫星"模式作为**揭示不平等结构持续再生产的形象模型**仍具理论价值，是世界体系论、全球价值链分析的思想前史（参见 Frank 1969；王正毅；宋新宁/陈岳第六章）。

### 29. 简述寻租对贸易政策的影响【模拟-10】

寻租（rent-seeking）是政府失灵的核心机制之一。在贸易政策领域，寻租对政策制定和效果产生系统性影响：

1. **政策被特殊利益俘获**：
   - 关税、配额、反倾销、技术性壁垒等保护措施创造"租金"（受保护行业的超额利润）；
   - 行业利益集团有强激励组织起来争取保护，**广大消费者因人均损失小而缺乏反向组织能力**（奥尔森"小集团对大集团"逻辑）；
   - **保护待售模型**（Grossman & Helpman 1994）：政府目标函数 = 社会福利 + 政治献金加权和；组织化产业获得高保护。
2. **保护程度的偏离最优**：
   - 寻租使实际保护水平**系统性高于经济最优水平**；
   - 即便相同行业、不同政治体制下保护水平差异巨大，差异由组织化程度、政治体制（多数 vs 比例代表、总统 vs 议会）解释。
3. **资源错配与社会福利损失**：
   - 寻租支出本身是非生产性消耗（图洛克方阵）；
   - 资源被吸引到寻租而非创新；
   - 巴格瓦蒂的 DUP（直接非生产性逐利活动）分析将寻租推广为更广泛福利损失。
4. **保护的政治粘性**：
   - 受保护行业一旦获得保护，会通过持续游说阻止撤销；
   - 政策呈强路径依赖（如美国农产品补贴、糖业保护）。
5. **国际谈判的内部约束**：
   - 国内寻租集团构成谈判约束（"双层博弈"中的"小赢集"），使政府难以做出让步；
   - 多哈回合长期僵局部分源于发达国家农业利益集团的寻租阻力。
6. **政策建议**：
   - **透明化**保护成本（消费者负担曝光）；
   - **关税固化**于多边规则（GATT/WTO）以约束国内寻租；
   - **国内补偿机制**（再就业培训、社保）以削弱反自由贸易联盟；
   - 行政程序改革（限制行业反倾销自由裁量、强制成本—收益评估）。

**理论意涵**：寻租分析揭示了**贸易保护的政治经济学根源不在于市场失灵，而在于政治市场失灵**，为理解贸易政策的非最优性提供了微观基础（参见 Krueger 1974；Grossman & Helpman 1994；田野第六章）。

### 30. 简述政治商业周期的成因【模拟-10】

政治商业周期（Political Business Cycle, PBC）由 William Nordhaus 1975 年提出系统化模型，指**经济波动与政治周期（特别是选举周期）系统性相关的现象**。主要成因：

1. **机会主义型 PBC（Nordhaus 1975）**：
   - **核心机制**：执政者追求连任，**选举前刺激经济**（扩张性货币/财政政策、降低失业率），**选举后紧缩**（应对通胀后果）；
   - 利用选民的**短视偏好**和对最近经济表现的过度反应；
   - 周期长度与选举周期（4—5 年）大致一致。
2. **党派型 PBC（Hibbs 1977）**：
   - 不同政党对失业 vs 通胀的偏好不同：**左派偏好低失业（接受较高通胀）、右派偏好低通胀**；
   - 政权更替导致政策切换 → 经济波动；
   - 例：美国民主党执政期间失业率较低、通胀较高，共和党反之。
3. **理性预期修正版**（Alesina, 1987；Rogoff & Sibert 1988）：
   - 理性选民会预期 PBC 操纵，使纯机会主义型刺激失效；
   - 修正版：**信号传递型 PBC**——能力强的执政者通过财政信号向选民展示能力，引发选举前的有限操纵；
   - **党派理性 PBC**：选举不确定性 + 党派偏好差异 → 选举后初期出现经济波动（市场反应未预期到的政策方向）。
4. **制度变量的影响**：
   - **央行独立性**强 → 货币政策难以服务 PBC，机会主义型 PBC 弱化；
   - **财政纪律**强 → PBC 转向其他工具（监管放松、特定补贴）；
   - **选举制度**：多数制下 PBC 强于比例制（单一执政更易操纵）。
5. **发展中国家的特殊性**：
   - 选举周期 + 汇率政策：拉美国家常出现"选举前高估—选举后贬值"周期；
   - 财政赤字与债务周期化；
   - 政治不稳定加剧周期波动。
6. **当代演变**：
   - 央行独立化降低了货币型 PBC；
   - **财政型 PBC**（减税、基建、补贴）仍突出；
   - **监管型 PBC**（金融监管周期、产业政策周期）日益重要。

**理论意涵**：PBC 分析揭示了**民主政治内嵌的宏观经济不稳定倾向**，是公共选择理论的重要应用，也是央行独立性、财政规则、独立财政机构等"反 PBC 制度"的理论基础（参见 Nordhaus 1975；Hibbs 1977；Alesina 1987；田野第七章）。

### 31. 简述克拉斯纳的霸权稳定理论【模拟-11】

斯蒂芬·克拉斯纳（Stephen Krasner）将霸权稳定论从经济领域（金德尔伯格、吉尔平）系统扩展到**一般国际机制理论**，代表作《国家权力与国际贸易结构》（1976）和《国际机制》（1983，编）。其核心命题：

1. **基本论点**：**国际开放经济体系的兴衰与霸权国实力周期同步**——霸权国愿意并能够提供开放体系所需的公共物品（开放市场、稳定货币、规则供给）。
2. **国家利益结构**：与基欧汉的"国家追求绝对收益"假设不同，克拉斯纳更强调国家追求**多目标**（财富、政治权力、国家安全、社会稳定），霸权国在不同时期对自由贸易的偏好不同。
3. **历史经验**：
   - 19 世纪中后期英国霸权下的自由贸易（1846 谷物法废除—1873 大萧条前）；
   - 1945—1970 年代美国霸权下的 GATT 自由化；
   - 霸权空白期（两次大战间）的关税战与全球萧条。
4. **机制定义**：克拉斯纳把国际机制定义为**"原则、规范、规则与决策程序的集合，行为者预期围绕它们汇聚"**——这一定义至今主导 IPE 学界。
5. **与基欧汉的分歧**：
   - 克拉斯纳：体系稳定与霸权周期紧密同步；
   - 基欧汉：制度具有黏性，霸权衰落后机制仍可维持（"霸权之后"）；
   - 两人共同点：都把霸权与机制供给联系起来。
6. **"被嵌入"的现实主义"**：克拉斯纳被归为"修正现实主义"，承认机制重要但坚持机制服务于国家利益且最终由权力结构决定。
7. **当代延伸**：
   - 解释美国"退群"（巴黎协定、伊核协议、TPP）反映霸权偏好变化；
   - "守成霸权 + 崛起国"格局下机制供给的双轨化（IMF vs AIIB、WTO vs RCEP/CPTPP）。

**评价**：克拉斯纳的 HST 比金德尔伯格更具理论一般性，但在解释 1970 年代后机制持续性方面不如基欧汉的制度自由主义有力。两人观点共同构成 IPE 制度研究的主轴（参见 Krasner 1976, 1983；田野第四章）。

### 32. 简述奥尔森的集体行动理论【模拟-11】

曼瑟·奥尔森（Mancur Olson）在《集体行动的逻辑》（1965）中提出系统的集体行动理论，挑战了多元主义"利益集团自动产生于共同利益"的假设。核心内容：

1. **核心命题**：**有共同利益不等于会有集体行动**。在自利理性假设下，**为公共利益采取行动是反个体理性的**——因为公共物品具有非排他性，搭便车是占优策略。
2. **集团规模的悖论**：
   - **小集团**：成员少 → 个体贡献边际影响大 + 监督成本低 + 易识别搭便车 → **更易实现集体行动**；
   - **大集团**（潜在的群众型利益）：个体贡献边际影响微小 + 监督成本高 + 难以识别搭便车 → **更难实现集体行动**；
   - 结论：组织化利益集团并非反映"多数人共同利益"，而是反映"少数集中利益"——大企业、行业精英比消费者、纳税人更易组织起来。
3. **选择性激励（Selective Incentives）**：
   - 大集团若要实现集体行动，必须提供**专属于贡献者的私人物品奖励**或**对搭便车者的私人物品惩罚**：
     - **正向选择性激励**：行业协会的内部服务、会员专享培训、信息特权；
     - **负向选择性激励**：工会会费强制、行业准入许可；
   - 没有选择性激励的纯公共物品集团（如"反通胀联盟""清洁空气支持者"）几乎无法持续动员。
4. **不对称利益集团的政治后果**：
   - 政治过程被组织化少数利益集团（如行业游说、农场主、工会）所支配；
   - 多数广泛利益（消费者、纳税人）虽人数众多但缺乏组织，难以有效影响政策；
   - 这是寻租、保护主义、补贴政治的微观基础。
5. **《国家兴衰探源》（1982）扩展**：
   - 长时段内利益集团积累 → 政策被既得利益集团阻塞 → 制度僵化与国家衰落；
   - 战争、革命等"清算"事件反而能打破利益集团积累、释放增长空间（解释战后德日"奇迹"）。
6. **国际关系含义**：
   - 国际公共物品供给同样面临集体行动困境，需要霸权或制度提供选择性激励；
   - 解释气候、贸易、金融监管谈判中的搭便车困境。
7. **评价**：奥尔森理论是公共选择、新政治经济学、IPE 制度分析的奠基性贡献，但被批评低估了规范、认同、信任等非物质激励作用（参见 Olson 1965；田野第二章）。

### 33. 简述世界体系的结构【模拟-11】

承接 26、27 题。沃勒斯坦《现代世界体系》提出，现代世界体系的核心结构包括以下几个层面：

1. **经济结构（三层不平等分工）**：
   - **中心（core）**：高技术、高资本密度、高利润的制造与服务业；强国家、自由劳动；
   - **半边缘（semi-periphery）**：中等技术与利润；混合性产业结构；中等国家；起体系内**社会缓冲**作用，吸收上下流动压力；
   - **边缘（periphery）**：低技术、原料和劳动密集生产；弱国家、强制或半强制劳动（殖民时期为奴隶、契约工，当代为非正式劳工）；
   - 三层之间通过**不平等交换**和**剩余转移**联系。
2. **政治结构（民族国家体系）**：
   - 现代世界体系特征是**单一世界市场 + 多元政治权威**（与古代世界帝国对比）；
   - 国家是世界体系的政治承担者，强国家能为本国资本争取体系内的有利位置；
   - 国家体系本身是体系的产物——民族国家随资本主义扩张而扩散。
3. **霸权周期结构**：
   - 历史上有三个霸权周期：**荷兰（约 1620—1670）—英国（约 1815—1873）—美国（约 1945—1970s）**；
   - 每一霸权先后在**生产、商业、金融**三个领域取得领先；
   - 霸权周期约 100—150 年，与康德拉季耶夫长波叠加。
4. **长波结构**：
   - 内嵌康德拉季耶夫 A 段（上升）/ B 段（下降）；
   - A 段：技术革命、市场扩张、半边缘机会窗口；
   - B 段：过剩、金融化、霸权危机、体系结构调整。
5. **意识形态与文化结构**：
   - **资产阶级自由主义**作为霸权意识形态；
   - 19 世纪科学主义—进化论叙事正当化中心—外围分工；
   - 民族主义、社会主义、生态主义等反体系运动周期性涌现。
6. **危机与变迁机制**：
   - **短期波动**：商业周期、金融危机；
   - **中期调整**：康德拉季耶夫长波；
   - **长期转型**：霸权更替、半边缘集团进入中心、体系结构重组；
   - 沃勒斯坦晚年判断当代体系已进入"结构性过渡"阶段（金融化、利润率下降、生态危机）。

**理论意涵**：世界体系结构分析提供从"国家—国家"分析转向"体系—国家"分析的范式，对理解长时段全球不平等、霸权更替、半边缘崛起（中国、印度、巴西）具有重要价值（参见 Wallerstein 卷一；Arrighi《漫长的 20 世纪》；王正毅）。

### 34. 简述考克斯的批判理论【模拟-12】

罗伯特·考克斯（Robert W. Cox）是 IPE 批判学派（新葛兰西主义）奠基人，代表作《社会力量、国家与世界秩序》（1981）、《生产、权力与世界秩序》（1987）。其批判理论核心内容：

1. **理论的根本立场**：
   - 著名命题：**"理论总是为某种人、出于某种目的"**（"Theory is always for someone and for some purpose"）；
   - 区分两类理论：
     - **问题解决理论（problem-solving theory）**：把现行秩序及其权力关系视为既定，思考如何让既有体系更顺畅地运行（如新现实主义、新自由制度主义）；
     - **批判理论（critical theory）**：质疑秩序本身的起源、维系与可能替代方案，揭示其阶级、文化、意识形态基础。
2. **历史结构方法**：
   - 任何**历史结构**由三组力量互动构成：①**物质能力**（生产力、技术、资源）；②**观念**（意识形态、世界观、规范）；③**制度**（国内与国际制度）；
   - 三者在三个层次相互作用：**生产关系—国家形式—世界秩序**。
3. **世界秩序的形成**：
   - 世界秩序不是国家间力量平衡的产物，而是**特定生产关系下形成的国家形式 + 跨国阶级 + 国际制度的综合**；
   - 例：战后"嵌入式自由主义"秩序是福特主义生产 + 凯恩斯式国家 + 美国领导下的多边制度的产物。
4. **跨国阶级与历史集团**：
   - 借用葛兰西的"霸权"（hegemony）概念，强调统治不仅靠强制，更靠**赢得被统治者同意**——通过共享世界观、跨国资本主义阶级联盟、知识共同体；
   - "国际化的国家"（internationalized state）：国家成为跨国资本主义的内部代理人；
   - 例：1980 年代以来新自由主义全球化即跨国资本 + 各国行政精英 + 国际制度的"历史集团"。
5. **变迁动力**：
   - 既有秩序的内部矛盾 + 反霸权运动 → 可能形成新的历史集团；
   - 当代候选反霸权运动：环境运动、劳工运动、全球南方崛起、宗教运动。
6. **方法论特征**：
   - 强调历史性、整体性、辩证关系；
   - 反对主流 IPE 的实证主义、形式化、去历史化倾向。

**评价**：考克斯批判理论开辟了 IPE 的"批判转向"，影响了吉尔（Stephen Gill）、布伦纳、潘尼奇等学者；被批评经验操作性弱、规范立场过强。在 21 世纪逆全球化、新自由主义反思浪潮下其解释力再度凸显（参见 Cox 1981, 1987；杨光斌《政治学导论》；田野相关章节）。

### 35. 简述并举例说明斯特兰奇的"结构性权力"【模拟-12】

苏珊·斯特兰奇（Susan Strange）在《国家与市场》（1988）提出**"结构性权力"（structural power）**概念，与传统"关系性权力"（A 让 B 做不愿做之事）相对，指**塑造他人选择框架的权力**。她区分四种相互联系的结构性权力：

1. **安全结构（security structure）**：
   - 提供安全保护的能力（防务、同盟、核威慑、海军基地网络）；
   - **例**：美国通过 NATO、美日同盟、AUKUS 为盟国提供安全伞，使其在外交—经济议程上跟随美国。
2. **生产结构（production structure）**：
   - 决定**什么产品、由谁、在何地、以什么条件生产**的能力；
   - 通过跨国公司、技术标准、价值链组织实现；
   - **例**：美国通过苹果—台积电—富士康价值链支配高端电子产品生产；通过《芯片法案》和出口管制塑造全球半导体生产格局。
3. **金融结构（financial structure）**：
   - 决定**信用创造与货币制度**的能力；
   - 通过中央银行—美元—SWIFT—主要金融机构网络实现；
   - **例**：美元清算体系使美国可对俄罗斯、伊朗等实施 SWIFT 切断与资产冻结；美联储加息周期外溢全球。
4. **知识结构（knowledge structure）**：
   - 决定**何为权威知识、谁能获得、如何传播**的能力；
   - 通过高等教育、科研体系、媒体、技术标准、专业语言（英语）实现；
   - **例**：美国大学—智库—跨国媒体共同塑造主流经济学、IR 理论、国际法话语；ChatGPT、谷歌、Meta 形成新一代知识基础设施。

**四结构之间的关系**：
- 相互联系、相互强化（金融需要安全保护、生产需要知识与金融、知识传播需要生产基础）；
- 同一行为体在四个结构中的优势叠加 → 总体结构性权力；
- **美国之所以是体系性霸权**，因其在四个结构中均占主导地位。

**斯特兰奇的现实意涵**：
- 美国并非如其抱怨那样"衰落"，而是有意"放弃管理责任"；
- 真正衡量大国地位应看其在四个结构中的位势变化；
- 当代中国在生产结构（制造业）有强势、在知识结构（科研论文产出）追赶、在金融结构和安全结构仍有较大差距。

**理论意义**：把权力分析从"军事 + 经济总量"二维扩展为四维结构分析，为非美国式 IPE 学派提供了重要分析工具（参见 Strange《国家与市场》中译本；田野第四章）。

### 36. 简述费尔南多·恩里克·卡多佐的"联系性依附发展"【模拟-12】

卡多佐（F. H. Cardoso，巴西社会学家、前总统）与法雷托合著《拉丁美洲的依附与发展》（1969）。针对弗兰克"宗主—卫星"模式过度悲观的决定论，他提出**"联系性依附发展"（associated/dependent development）**这一更具弹性的框架：

1. **核心命题**：依附与发展并非互斥。**外围国家可以在与中心保持联系（特别是吸引跨国公司投资）的过程中实现一定程度的工业化与现代化**，但这种发展仍嵌入并再生产中心—外围结构。
2. **三个行为体的"三角联盟"**：
   - **国际跨国公司**：带来资本、技术、市场进入；
   - **本地国家**：提供基础设施、政策扶持、市场保护，分享部分利益；
   - **本地大资本**：通过合资、配套、再分包参与产业链。
   - 三者形成依附性发展的"三角联盟"，主导外围工业化。
3. **历史经验**：
   - 1950—1970 年代巴西、墨西哥、阿根廷的"奇迹"：汽车、钢铁、化工等行业靠跨国公司投资迅速增长；
   - 国民经济实现工业化、城市化、中产阶级扩张；
   - 但农村劳工、城市贫民被排除于发展之外，呈"排他性发展"特征。
4. **依附性的内在限制**：
   - 技术与资本仍依赖中心；
   - 利润大量转移回中心（特许使用费、利润汇回、技术租金）；
   - 产业升级面临中心国家技术封锁；
   - 国内收入分配两极化加剧。
5. **政治含义**：
   - 与弗兰克的"革命脱钩"主张不同，卡多佐**承认部分发展空间**，主张通过强国家、社会改革、再分配政策来争取**更平衡的依附性发展**；
   - 卡多佐后来担任巴西总统（1995—2003），实施雷亚尔计划、强化民主制度、扩大社会保障，部分体现其理论主张。
6. **理论评价**：
   - 比弗兰克更贴近 1970 年代后拉美与东亚部分国家的实际经验；
   - 但被左翼批评为"接受不平等的妥协"；
   - 仍被部分学者视为依附论的最重要修正与延续，是当代"全球价值链 + 半边缘上升"研究的思想前史。

**对中国研究意义**：联系性依附发展概念为分析中国 1980 年代以来的"开放型工业化"——大量引进 FDI、加入全球价值链、保持国家自主性——提供了重要理论资源（参见 Cardoso & Faletto 1969；王正毅；宋新宁/陈岳第六章）。

### 37. 简述列宁的帝国主义理论【模拟-13】

列宁《帝国主义是资本主义的最高阶段》（1916）综合霍布森、希法亭的研究，提出系统的帝国主义理论。其五大特征 + 政治推论：

1. **帝国主义的五大经济特征**：
   - ①**生产与资本的集中**：垄断组织（卡特尔、辛迪加、托拉斯）代替自由竞争，成为经济基础；
   - ②**银行资本与产业资本融合**形成**金融寡头**，控制国民经济命脉；
   - ③**资本输出**取代商品输出，成为对外经济关系的主导形式（追逐高利润、出路过剩资本）；
   - ④**国际垄断同盟**瓜分世界市场（跨国卡特尔）；
   - ⑤**列强对世界领土的瓜分完成**——殖民帝国体系达到顶点，重新瓜分需通过战争。
2. **理论命题**：
   - 帝国主义是资本主义发展到垄断阶段的必然产物，是资本主义的"**最高、寄生的、垂死阶段**"；
   - 资本主义内在矛盾（生产社会化 vs 资本主义私人占有）在帝国主义阶段达到极致；
   - 列强间因瓜分不均必然冲突，**帝国主义战争**（如一战）是体系性产物。
3. **不平衡发展规律**：
   - 资本主义国家发展不平衡 → 力量对比变化 → 既有殖民/势力范围分割不再符合实力 → 战争重新瓜分；
   - 这是 20 世纪两次世界大战的根本机制。
4. **政治推论**：
   - 革命可能在最薄弱环节首先突破（"一国胜利论"）；
   - 殖民地民族解放运动是世界革命的同盟军；
   - 工人贵族（被帝国主义超额利润收买）阻碍革命，需克服第二国际改良主义。
5. **历史评价与当代意义**：
   - **解释力**：对一战、殖民瓜分、跨国垄断、金融资本兴起有强解释力；
   - **不足**：低估资本主义自我调整能力（福利国家、布雷顿森林、去殖民化）；
   - **当代回响**：①金融化与跨国金融资本主导；②跨国公司主导全球价值链；③大国战略竞争与技术封锁可被视为新型"瓜分"（数字、太空、关键矿产）；④"全球南方"概念延续帝国主义—殖民地分析框架。
6. **IPE 影响**：
   - 列宁理论是依附论、世界体系论、批判 IPE 学派的重要思想源头；
   - 沃勒斯坦、阿瑞吉、福斯特等均承认列宁影响。

**评价**：列宁帝国主义论虽产生于 20 世纪初，其揭示的**"金融资本—跨国垄断—不平衡发展—战争"**结构性逻辑对理解 21 世纪大国竞争仍具理论生命力（参见列宁《帝国主义》；王正毅；宋新宁/陈岳第六章）。

### 38. 熊彼特对世界经济周期的分析【模拟-13】

熊彼特（Joseph Schumpeter）在《经济周期》（1939）和《资本主义、社会主义与民主》（1942）中系统提出基于**创新驱动**的世界经济周期理论。要点：

1. **创新作为核心机制**：
   - 经济发展的根本动力不是均衡，而是**企业家创新**带来的"**创造性破坏**"（creative destruction）；
   - 五类创新：①新产品；②新生产方法；③新市场；④新原料来源；⑤新的产业组织形式；
   - 创新打破均衡 → 经济上升；创新效应扩散完毕 → 收益下降 → 危机与调整 → 为下一轮创新清场。
2. **三周期叠加模型**：
   - **基钦周期（Kitchin）**：约 40 个月，库存波动；
   - **朱格拉周期（Juglar）**：约 9—10 年，设备投资周期；
   - **康德拉季耶夫周期（Kondratieff）**：约 50—60 年，技术革命驱动的长波；
   - 三者相互叠加构成总体经济波动。
3. **康德拉季耶夫长波与技术革命**：
   - 每一长波对应一组主导技术：①18 世纪末—19 世纪中：**蒸汽机—纺织—铁路**；②19 世纪中—20 世纪初：**钢铁—电气—化工**；③20 世纪中—1970s：**汽车—石油化工—大规模生产**；④1980s—2010s：**信息技术—互联网**；⑤当下：**AI—新能源—生物技术**（候选）；
   - 每一长波上升期 = 主导技术扩散 + 投资旺盛 + 价格上升；下降期 = 技术饱和 + 过剩产能 + 危机；
   - 危机不是失败，而是"创造性破坏"的必要环节，为新技术腾出空间。
4. **企业家与企业组织演化**：
   - 早期：个人企业家创新；
   - 20 世纪：大企业 R&D 实验室"常规化"创新（管理型资本主义）；
   - 但"常规化"会削弱企业家精神，孕育资本主义的"成功的失败"——熊彼特悲观预言。
5. **经济周期的国际维度**：
   - 创新与长波在世界经济中扩散；
   - 主导技术国 = 该长波的世界经济霸主；
   - 长波转折 = 霸权更替窗口（如美国在二战后接替英国，对应电气—化工—汽车长波）；
   - 当代竞争 = 谁能率先抓住新长波（AI、新能源、生物科技）。
6. **政策含义**：
   - 反垄断不能扼杀大企业创新；
   - 危机时不应过度救助僵尸企业，应允许"创造性破坏"；
   - 国家应支持基础研究与教育，培育创新生态。

**评价**：熊彼特周期论是把**技术、企业家、制度、世界经济**统一起来的宏大理论，对理解长时段世界经济演变和当代技术竞争具有持续解释力（参见 Schumpeter 1939, 1942；曼德尔《晚期资本主义》；宋新宁/陈岳第八章）。

### 39. 简述中央银行独立性的理由【模拟-13】

央行独立性（central bank independence, CBI）指中央银行在制定货币政策时**不受行政当局直接指令、追求长期物价稳定目标**的制度安排。1990 年代以来在全球扩散，理论理由：

1. **时间不一致问题（time inconsistency）**：
   - Kydland & Prescott（1977）、Barro & Gordon（1983）证明：在相机决策下，政府事前承诺"低通胀"，但事后总有刺激产出的诱惑（菲利普斯曲线短期权衡），导致**通胀偏向**（inflation bias）；
   - 解决方案：把货币政策**委托给独立的、规则化的、保守的央行**——通过制度承诺克服时间不一致问题。
2. **政治商业周期约束（PBC）**：
   - 民选政府有动机利用货币政策操纵选举周期（选举前刺激、选举后紧缩）；
   - 独立央行可隔离这种短视压力，维持长期物价稳定。
3. **委托代理与可信承诺**：
   - 央行独立性 = 选民把货币政策权委托给"代理人"以约束未来"自我"；
   - 类似于"奥德赛把自己绑在桅杆上"——通过自我约束获得长期收益（低通胀、低利率溢价、稳定预期）。
4. **经验证据**：
   - **Alesina & Summers（1993）**：跨国对比显示央行独立性指数与平均通胀率显著负相关，且与产出增长不显著相关（不损害实体经济）；
   - 后续研究证实独立央行 + 通胀目标制（inflation targeting）能稳定通胀预期。
5. **金融稳定职能**：
   - 独立央行更能在金融危机时做出"最后贷款人"决策而不受短期政治考量干扰；
   - 例：2008 年美联储应对次贷危机的果断行动。
6. **国际信誉**：
   - 独立央行 → 国际投资者预期稳定 → 主权债利率溢价低、汇率波动小；
   - 是新兴市场金融自由化改革的标配。
7. **对独立性的反驳**：
   - **民主问责弱化**：未经选举的技术官僚掌控关键经济政策，存在民主赤字；
   - **保守偏向**：央行倾向通胀控制，可能牺牲就业与增长；
   - **不应"政治中立"幻觉**：货币政策本质上有分配效应（利率政策影响债权人 vs 债务人、资产持有者 vs 工薪），独立性掩盖了政治选择；
   - **危机后反思**：2008 危机后央行大规模 QE 推升资产价格、加剧贫富分化，凸显央行政治影响不可回避；
   - 翟东升等中国学者主张"民本主义"重审央行独立性。
8. **中国情境**：
   - 中国人民银行在国务院领导下运作，独立性较弱；
   - 但执行力强、政策协同度高；
   - 央行独立性应根据国情、发展阶段、政治体制综合权衡。

**理论意涵**：CBI 是新自由主义货币治理范式的核心制度安排，反映了"以制度约束政治"的公共选择思路，也是当前全球货币政策正常化、金融稳定治理的争议焦点（参见 Kydland & Prescott 1977；Alesina & Summers 1993；田野第七章）。

### 1. 论述亚当·斯密关于自由贸易与国家干预的主要观点【模拟-1】

亚当·斯密（Adam Smith, 1723—1790）在《国富论》（1776）中奠定古典经济自由主义传统。常被误读为"小政府、绝对自由放任"的代表，事实上他对自由贸易与国家干预的立场远为细致。

**一、自由贸易的核心论证**

1. **"看不见的手"与分工说**：市场中追求自利的个体在价格机制引导下产生公益结果。**分工带来生产效率倍增**，而分工的深度受限于市场规模——因此扩大市场（含对外贸易）能不断深化分工、提升生产率。
2. **绝对优势论**：与重商主义"贸易即零和"针锋相对，斯密论证：**各国应专门生产自己具有绝对优势的产品，通过交换互利**，使总产出最大化。
3. **反对重商主义**：批判贸易顺差崇拜与金银堆积，指出真正财富是劳动产出而非金银；保护主义关税与殖民垄断扭曲资源配置、抬高消费成本、扼杀创新。
4. **反对垄断与特许公司**：批评东印度公司等"重商资本"的垄断特权，认为其勾结国家、损害消费者与小生产者。

**二、对国家干预的合理边界**

斯密绝非"无政府放任主义"。他承认国家三项基本职能（《国富论》第五卷）：①**国防**；②**司法**（保护产权与履约）；③**公共工程与公共机构**（道路、桥梁、教育、铸币、邮政等不能由私人提供或不愿提供的公共物品）。

更重要的是，斯密为**国家干预贸易**留有重要例外：
1. **国防例外**：当贸易品涉及国防（如海运能力、军工原料）时，**为维护国防能力可保护本国相关产业**。他明确支持《航海条例》（1651）——"它（航海条例）也许是英国所有商业法规中最聪明的一项"。
2. **报复性关税**：当他国对本国出口征高关税时，**有理由采取报复性关税迫使对方让步**。
3. **税负公平例外**：本国产业承担重税时，应对同类进口品征收等额关税以维持公平竞争。
4. **渐进开放例外**：突然撤除保护可能造成大规模失业，**应渐进推进自由化**，配套再就业安排。
5. **金融与银行监管**：斯密支持对苏格兰小钞票发行的管制，承认金融领域市场失灵的可能。

**三、自由贸易与社会公正**

斯密《道德情操论》强调商业社会的伦理基础：诚信、信任、同情；商业秩序依赖法治与道德约束，**纯粹自利不构成持久秩序**。他批评剥削劳工、垄断地租、商人集团的"密谋反对公众"。

**四、当代意义与人大教材立场**

人大樊勇明、宋新宁等教材肯定斯密的核心贡献，同时指出：
1. 斯密自由贸易论的前提条件——大体平等的国家、不存在外部性、要素流动顺畅——在现实中往往不具备；
2. 李斯特、汉密尔顿对斯密的回应——后发国家不能简单照搬——具有正当性；
3. **斯密的"国家职能 + 公平例外"立场**比 19 世纪柯布登式纯粹自由贸易主义更具弹性，对当代全球化反思（公平贸易、产业政策、再分配）有重要启示。

**五、政策评价**

斯密的"自由贸易 + 必要国家干预"框架在 21 世纪呈现新生命力：①拜登"新华盛顿共识"重申产业政策与国家干预合法性；②"自由开放但有条件"的贸易理念被多国接受；③斯密的"国防例外"被广泛援引为半导体、关键矿产管控的理论依据。其根本启示是：**自由贸易服务于公共利益，而非相反；国家职能不是市场对立面，而是市场良性运行的必要条件**（参见 Smith《国富论》卷四第二章；吉尔平第二章；樊勇明第三章；宋新宁/陈岳第二章）。

### 2. 运用所学 IPE 理论分析 WTO 多哈回合谈判的困境【模拟-1】

多哈回合（Doha Development Round）于 2001 年 11 月在卡塔尔多哈启动，原本计划于 2005 年完成，旨在通过进一步贸易自由化推动发展中国家发展。然而历经 20 余年谈判仍未完成核心议题，已被普遍视为"破裂"或"无限期搁置"。可从多重 IPE 理论视角解析其困境。

**一、集体行动困境与议程过载**

奥尔森式集体行动逻辑：WTO 已有 164 个成员，决策采"协商一致"原则，**任何成员事实上拥有否决权**。议程涵盖农业、非农产品、服务、知识产权、贸易便利化、规则（反倾销、补贴、渔业补贴）、争端解决改革、发展议题等多个领域，**议程超载 + 多边一致门槛**使议程难以推进。

**二、霸权领导真空（金德尔伯格-克拉斯纳视角）**

启动多哈回合时美国仍具霸权领导意愿（"小布什贸易促进权"），但 2008 年危机后**美国对多边贸易体制的领导意愿急剧下降**：奥巴马转向 TPP、RCEP 等"高标准"诸边路径；特朗普直接退群（TPP）、阻挠 WTO 上诉机构法官任命使其 2019 年瘫痪。**领导真空导致公共物品供给中断**，多哈陷入"无国家愿意承担谈判推动成本"的困境。

**三、新兴大国的崛起与议题重构**

中国 2001 年入世，印度、巴西等新兴大国在多哈谈判中扮演重要角色：
- **G-20 集团（农业谈判）**：印度、巴西、阿根廷等领衔，**要求发达国家削减农业补贴**与高关税；
- **G-33 集团**：以印度为代表，**要求保护粮食安全和小农生计**（特殊产品 + 特殊保障机制）；
- **G-90**：最不发达国家集团，要求"少互惠"与发展援助；
- 各集团 vs 美欧形成多重对峙，谈判结构远比乌拉圭回合（美欧主导）复杂。

**四、社会联盟视角（Rogowski / Hiscox）**

发达国家国内反贸易联盟壮大：
- 美国铁锈带制造业工人、农业利益集团组成强大反自由贸易联盟；
- 欧盟内法、意农业集团（特别是 CAP 受益者）抵制农业自由化；
- 发展中国家小农 + 制造业利益集团抵制全面自由化；
- 各方国内反自由化压力使政府难以做出让步（双层博弈"小赢集"收缩）。

**五、议题联接困境（基欧汉/奈复合相互依赖）**

多哈采取"单一承诺"（single undertaking）原则——所有议题必须打包通过，**任一议题僵局即拖累全局**。农业（美欧 vs 印巴）、NAMA（美欧 vs 中印）、服务（美 vs 印巴）、知识产权（药品 vs 制药）等各议题死结相互绑定。议题联接本意是促合作，结果反而互相否决。

**六、"嵌入式自由主义"的瓦解**

Ruggie 概念："嵌入式自由主义"——战后秩序在国际开放与国内再分配/福利国家间取得平衡。1980 年代后新自由主义全球化打破这一平衡，**全球化收益高度集中、损失广泛分散**，引发广泛社会反弹。多哈谈判恰逢这一反弹周期，发达国家国内已无政治空间继续开放。

**七、双轨制度供给与多哈被绕过**

主要国家不再依赖多哈，转向区域和双边路径：①美国主导的 TPP（后 CPTPP）、USMCA、IPEF；②欧盟 FTA 网络；③中国主导的 RCEP、一带一路；④诸边协议（贸易便利化协议 TFA 2017 通过、信息技术协议扩展）。**多哈成为"绕不开但走不通"的死结**。

**八、结构性原因：贸易政治的"OEP"逻辑变迁**

20 世纪 90 年代后贸易冲击从"产业间冲击"转向"全球价值链内冲击"——同一公司在不同国家配置生产，传统的"行业 vs 行业"政治让位于"国家 vs 国家"、"中央 vs 地方"复杂博弈。WTO 旧规则越来越脱离实际贸易形式（数字贸易、跨境服务、数据流、半导体管制几乎未涵盖）。

**九、政策评价与中国立场**

中国一贯主张：①坚持多边贸易体制核心地位；②支持多哈回合"早期收获"；③推动 WTO 改革（争端解决机制重启、上诉机构改革、特殊与差别待遇细化、补贴透明度等）。同时，中国通过 RCEP、CPTPP 申请、DEPA 申请等区域路径补位。

**十、理论结论**

多哈回合困境是**集体行动困境 + 霸权领导真空 + 新兴大国崛起 + 议题联接过载 + 嵌入式自由主义瓦解**等多重因素叠加的结果。其本质是 20 世纪后期国际经济秩序在 21 世纪权力结构与社会基础变化下的适应危机。重启之路需要：①减少议程负担（聚焦数字贸易、绿色贸易、争端解决等可达成议题）；②多速度推进（允许诸边）；③推动新兴大国与守成大国的责任再分配（参见基欧汉《霸权之后》；Krasner 1983；田野第三、四章；宋新宁/陈岳第四章）。

### 3. 论述科斯定理的国际关系涵义【模拟-2】

科斯定理（Coase Theorem）由罗纳德·科斯在《社会成本问题》（1960）提出，是新制度经济学的基石。其在国际关系中的引申，构成新制度主义 IPE 的理论支柱之一。

**一、科斯定理的两个版本**

1. **科斯第一定理**：在**交易成本为零、产权清晰**的条件下，无论初始产权如何分配，市场谈判都会达到帕累托最优配置。
2. **科斯第二定理**（"反向"科斯）：在**交易成本为正**的现实世界中，**产权初始安排会影响最终配置效率**，因此制度设计本身具有效率含义。

**二、对国际关系研究的核心引申**

1. **跨境外部性的解决机制**：
   - 国际关系中存在大量跨境外部性（污染、金融危机传染、安全外溢）；
   - 在交易成本极低、参与方少、利益清晰的情况下，**国家间可通过谈判内部化外部性**，无需霸权或集中机制；
   - 例：美加边境跨境污染争端通过双边谈判与补偿机制解决（如特雷尔冶炼厂案）。
2. **国际制度的功能性起源**：
   - 第二定理推论：现实中国家间交易成本不可能为零（信息不对称、谈判困难、违约风险、政治异质性）；
   - **国际制度的根本功能就是降低国家间交易成本**——提供信息（透明度审议）、稳定预期（规则化）、降低执行成本（争端解决）；
   - 基欧汉《霸权之后》（1984）系统地把科斯—诺思—威廉姆森的交易成本框架引入 IPE：**国际机制是国家应对市场失灵的合作工具，即便霸权衰落，制度因"沉没成本 + 路径依赖"仍可维持合作**。
3. **产权界定的国际版**：
   - 国际制度本质上是**对国家间权利义务的界定**——如海洋法公约界定专属经济区、外空条约界定外空产权、巴黎气候协定界定排放权；
   - 产权清晰 → 减少谈判与冲突；产权模糊 → 不确定与冲突（南海划界争端、北极资源、网络空间）。
4. **环境治理的科斯视角**：
   - 京都议定书—巴黎协定的碳排放交易（ETS）是典型科斯式解决方案：
     - 政府界定排放权（产权）；
     - 允许跨企业、跨国交易（市场谈判）；
     - 通过价格机制将外部性内部化；
   - 但其前提（产权清晰 + 低交易成本）在多边层面常被违反，导致碳市场分割与监管套利。

**三、应用案例与限制**

1. **WTO 争端解决机制**：通过提供低成本、规则化的纠纷解决渠道，**降低国家间贸易摩擦的执行交易成本**——是科斯第二定理的成功应用。
2. **国际渔业治理**：奥斯特罗姆把科斯—公共池塘资源—多中心治理结合，证明本地化产权 + 低交易成本能避免"公地悲剧"。
3. **气候谈判困境**：参与方过多（近 200 国） → 协调成本巨大；监督执行困难 → 高交易成本；产权界定有强分配后果（历史排放责任）→ 谈判僵局。表明科斯路径在大型多边场景的局限。
4. **金融跨境监管**：BCBS、FSB、IOSCO 提供监管协调框架，降低跨境金融监管协调成本，体现科斯逻辑。

**四、对现实主义的反驳与张力**

1. **反驳**：现实主义认为国际无政府状态下合作不可能或脆弱。科斯—基欧汉路径论证：**只要交易成本可被降低、外部性可被内部化，国家就有合作动力**。霸权不是合作的唯一基础。
2. **张力**：然而在**安全敏感议题**、**分配冲突大议题**（气候责任、AI 治理）上，交易成本极高、产权界定有零和性质，科斯路径解释力受限。

**五、当代意义与中国立场**

1. 中国推动的 RCEP、亚投行、CIPS 等可视为**降低区域内交易成本、界定区域产权**的科斯式实践；
2. 一带一路倡议涉及大量跨境产权界定问题（基础设施所有权、运营权、债务责任），需要发展中科斯式制度安排；
3. 全球数字治理、AI 治理、太空治理是 21 世纪科斯定理国际应用的新前沿。

**六、理论评价**

科斯定理为 IPE 提供了：①国际制度功能性起源的微观基础；②跨境外部性治理的市场化路径；③霸权后合作可能性的理论支撑。同时其局限——交易成本前提、产权可界定性、分配中性——也提醒我们：**制度不仅有效率维度，更有权力与分配维度**。科斯路径与考克斯批判路径互补，共同构成完整的 IPE 制度理论谱系（参见 Coase 1960；基欧汉《霸权之后》；田野第二章）。

### 4. 运用所学 IPE 理论分析世界贸易组织（WTO）在世界经济中的作用【模拟-2】

WTO 1995 年由 GATT 升级而成，是当前管理多边贸易体制的核心国际组织。其在世界经济中的作用可从多个 IPE 理论视角分析。

**一、作为国际公共物品的提供者（金德尔伯格/克拉斯纳视角）**

WTO 提供了关键的国际公共物品：
1. **多边贸易规则体系**：MFN、国民待遇、约束性关税、透明度等基本原则；
2. **争端解决机制（DSB）**：被称为"皇冠上的明珠"，提供低成本、规则化的国家间贸易纠纷解决渠道；
3. **谈判论坛**：定期回合谈判推进自由化；
4. **贸易政策审议**：定期审议成员贸易政策，提升透明度。

这些公共物品降低了世界贸易的交易成本，为全球价值链繁荣提供制度基础。

**二、降低交易成本，促进合作（基欧汉视角）**

WTO 通过以下机制降低国家间合作的交易成本：
1. **信息成本**：贸易政策审议机制 + 通报义务 + 秘书处分析；
2. **谈判成本**：多边一揽子谈判降低重复双边谈判成本；
3. **监督成本**：透明度义务 + 同行审议；
4. **执行成本**：DSB 提供权威裁决与授权报复机制；
5. **可信承诺**：约束性关税 + 不轻易撤回原则使各国承诺更可信，降低再谈判成本。

**三、嵌入式自由主义的制度化（Ruggie 视角）**

WTO 体现了 Ruggie 所称"嵌入式自由主义"——在贸易开放与国内政策空间之间寻求平衡：
1. 关税同盟例外、保障措施、反倾销/反补贴等"安全阀"为国内政治冲击提供缓冲；
2. 特殊与差别待遇（S&D）为发展中国家保留政策空间；
3. 卫生与植物卫生（SPS）、技术性贸易壁垒（TBT）协议在贸易自由与国内监管间求平衡。

**四、霸权稳定与机制的互动（Krasner / Ikenberry）**

WTO 体现霸权秩序的制度化：
1. **美国主导建立**：美欧战后推动 GATT、20 世纪 90 年代美国主导乌拉圭回合升级为 WTO；
2. **规则反映先发国家偏好**：知识产权（TRIPS）、服务贸易（GATS）等规则深度反映美欧服务业、跨国公司利益；
3. **崛起国吸纳**：中国 2001 年入世是 WTO 历史上最大事件之一，体现霸权秩序的吸纳能力。

但 21 世纪 WTO 面临**霸权领导退场**问题：美国阻挠 DSB 上诉机构法官任命 → 2019 年 12 月起上诉机构瘫痪 → DSB 核心功能弱化。

**五、贸易和平的制度基础（Polachek / Rosecrance）**

WTO 通过制度化贸易开放支撑"贸易和平"：
1. 降低贸易摩擦升级为政治冲突的风险（DSB 缓冲）；
2. 通过经济互嵌增加各国政治克制的物质基础；
3. 形成跨国生产网络与贸易国社会联盟，弱化保护主义力量。

**六、对国内政治的塑造作用（颠倒的第二意象）**

WTO 通过以下方式回溯影响成员国国内政治：
1. **政策约束**：成员国必须修改国内法律以符合 WTO 规则（中国入世修改 2000 多部法规）；
2. **行政能力建设**：要求成员国建立统一对外贸易管理机构、透明度机制、协商程序；
3. **国内联盟重组**：进出口部门 vs 进口竞争部门的政治力量对比因 WTO 而变化；
4. **承诺锁定**：政府借 WTO 承诺约束国内未来反复，对内压制保护主义压力。

**七、当代困境与改革议程**

WTO 当前面临：
1. **谈判功能瘫痪**：多哈回合无限搁置，新议题（数字贸易、绿色贸易、补贴规则）难以纳入；
2. **争端解决瘫痪**：上诉机构停摆（部分国家通过"多方临时上诉仲裁安排" MPIA 应对）；
3. **规则与现实脱节**：数字贸易、跨境数据流、关键技术管控、国家安全例外等领域规则不足；
4. **大国对抗**：中美贸易战使 WTO 规则被"绕过"（301 关税违反 MFN）；
5. **合法性赤字**：发展中国家批评规则有利发达国家。

改革议程：①恢复 DSB 上诉机构；②澄清"国家安全例外"（GATT 第 21 条）；③规范产业补贴；④纳入数字贸易（电子商务谈判）、绿色贸易、可持续渔业补贴；⑤改革决策机制（接受诸边路径）。

**八、中国立场与作用**

中国是 WTO 的最大受益者也是最大利益相关者：
1. 入世 20 年货物贸易规模增长 10 倍以上、跃居世界第一；
2. 中国一贯主张维护多边贸易体制核心地位、反对单边主义；
3. 中国积极参与渔业补贴、电子商务、投资便利化等诸边谈判；
4. 中国申请加入 CPTPP、DEPA，与 RCEP 协同推进区域贸易自由化。

**九、理论结论**

WTO 是迄今为止最具普遍性和约束力的多边经济治理机构，其历史成就（贸易扩张、争端规则化、嵌入式自由主义实践）与当代困境（领导真空、规则落后、决策瘫痪）共同构成 21 世纪多边主义命运的缩影。WTO 的存续与改革直接关系到**全球公共物品供给、贸易和平、世界经济秩序**的未来（参见 Krasner 1976；基欧汉 1984；Ruggie 1982；田野第三、四章；宋新宁/陈岳第四章）。

### 5. 论述国际制度何以推动国际合作【模拟-3】

国际制度（international institutions）如何在无政府状态下推动国际合作，是 IPE 的核心理论问题。基欧汉、奈、克拉斯纳、马丁等学者在新自由制度主义框架下提供了系统答案。

**一、合作困境的微观基础**

国际合作面临两类博弈困境：
1. **协作型博弈（囚徒困境型）**：存在合作—合作的帕累托优均衡，但个体理性导致背叛—背叛。关键是**激励问题**。
2. **协调型博弈（猎鹿型）**：存在多重均衡，但都优于不协调，关键是**预期协调问题**。
3. 加上**集体行动困境**（搭便车）与**信息不对称**（不知对方真实意图与能力）。

**二、国际制度推动合作的核心机制**

1. **降低交易成本**（基欧汉《霸权之后》）：
   - 提供常设论坛，避免反复议价；
   - 提供秘书处与专家分析能力，降低信息成本；
   - 通过模板化规则降低谈判成本。

2. **提供信息与提升透明度**：
   - 通报义务、定期审议、专家评估、技术援助；
   - 减少信息不对称 → 降低误判与机会主义；
   - 例：IMF 第四条款磋商、WTO 贸易政策审议、IAEA 核查。

3. **稳定预期与可信承诺**：
   - 规则化运行 → 预期稳定；
   - 自我约束（霸权国接受规则）→ 可信信号；
   - 退出与违约的高成本 → 承诺更可信。

4. **监督与执行（应对协作型博弈）**：
   - 同行审议、争端解决、惩罚机制；
   - 例：WTO 报复授权、IAEA 报告联合国安理会、人权机制的"特殊程序"。

5. **提供焦点协调（应对协调型博弈）**：
   - 标准化（IEC、ISO、SWIFT 报文标准、互联网域名 ICANN）；
   - 焦点选择（贸易关税谈判从"最惠国"展开、气候谈判从"巴黎温升上限"展开）。

6. **议题联接与一揽子安排**：
   - 把多个议题打包以扩展谈判余地；
   - 跨议题对冲创造"双赢"组合；
   - 例：乌拉圭回合把农业、服务、知识产权同时打包。

7. **塑造身份与规范**：
   - 制度运行内嵌规范扩散；
   - 国家通过反复互动内化合作偏好；
   - 例：WTO 入世国对规则的内化、欧盟对成员国身份塑造。

**三、制度的"黏性"与霸权后合作**

基欧汉关键命题：**即便霸权衰落，国际制度仍能维持合作**——
1. 制度的"沉没成本"使重建成本极高；
2. 路径依赖使现行规则形成"现状偏好"；
3. 国家间已建立的预期与利益绑定不易消解；
4. 国内利益集团已嵌入制度，反对退出。

例：①WTO 在美国领导退场下仍延续；②IMF/世行虽改革缓慢但持续；③一些条约（如禁止化学武器公约）成员国主动多于撤约。

**四、制度的局限**

1. **制度无法解决核心利益冲突**：在分配冲突大、安全敏感议题上（核裁军、领土争端），制度作用有限；
2. **霸权领导仍然重要**：制度的活力部分依赖霸权国的"主动维护"，纯靠制度黏性难以应对深度危机；
3. **制度可能僵化**：路径依赖使制度难以应对新议题（WTO 难以处理数字贸易）；
4. **正当性赤字**：发展中国家代表性不足，威胁制度持续性；
5. **制度可被弱化**：霸权国可通过"退群""阻挠任命""设立替代制度"等方式削弱（特朗普政府对 WTO、巴黎协定、伊核协议）。

**五、应对制度局限的新路径**

1. **多边 → 多层级—多速度治理**：核心制度 + 区域制度 + 双边协议 + 跨国网络相互嵌套；
2. **强化非国家行为体参与**：跨国 NGO、专家共同体、跨国公司参与；
3. **议题专门化制度**：金融稳定理事会（FSB）、IMO、ICAO 等"功能性制度"；
4. **新兴大国的制度供给**：AIIB、新开发银行、CIPS、一带一路、"全球安全倡议"等中国制度供给补位。

**六、中国与国际制度合作**

中国是国际制度的重要参与者与改革者：
1. 入世 20 余年深度嵌入 WTO 规则体系；
2. 在 IMF、世行积极推动份额改革（中国份额从 2.94% 升至 6.39%）；
3. 主动建立 AIIB、新开发银行、CIPS 等补充性制度；
4. 在气候、防扩散、卫生等领域积极承担国际责任。

**七、理论结论**

国际制度通过**降低交易成本、提供信息、稳定预期、监督执行、协调焦点、议题联接、塑造规范**等多重机制推动合作，且具有**显著的"霸权后"黏性**。但制度有效性始终依赖**权力支撑 + 利益契合 + 规范认同**三大基础，任一基础松动都将削弱合作能力。21 世纪的关键问题是：在霸权转型背景下如何重塑国际制度，使其同时反映新兴大国偏好与全球公共利益（参见基欧汉《霸权之后》；Krasner 1983；Martin 1992；田野第三章；宋新宁/陈岳第四章）。

### 6. 运用所学 IPE 理论分析国际货币基金组织在世界经济中的作用【模拟-3】

IMF 1944 年在布雷顿森林会议确立、1945 年成立，是当代国际货币体系的核心制度。其在世界经济中的作用可从多重 IPE 理论视角分析。

**一、设立背景与功能定位**

布雷顿森林会议设计 IMF 的初衷是**避免重蹈两次大战间国际货币体系崩溃覆辙**（金本位崩塌 → 竞相贬值 → 贸易紧缩 → 大萧条）。IMF 三大法定职能：
1. **汇率监督**（第四条款磋商）：监督成员国汇率政策、防止操纵汇率；
2. **国际收支救助**：向出现国际收支困难的成员国提供短期融资（附条件贷款，conditionality）；
3. **能力建设与技术援助**：协助成员国建立宏观经济管理与金融监管能力。

**二、作为国际公共物品提供者（金德尔伯格视角）**

IMF 提供关键国际公共物品：
1. **汇率稳定监督**：监督防止"以邻为壑"的竞争性贬值；
2. **国际收支调整融资**：减少危机国仓促采取贸易保护或汇兑管制；
3. **最后贷款人功能**（部分）：在主权债务/货币危机时提供救助；
4. **金融稳定监督**：FSAP（金融部门评估）+ 监测全球金融稳定性。

**三、降低交易成本与稳定预期（基欧汉视角）**

IMF 通过以下机制降低国际货币合作成本：
1. **统一的数据标准**（SDDS）与透明度机制；
2. **第四条款磋商**提供高质量国别经济分析；
3. **WEO（世界经济展望）+ GFSR（全球金融稳定报告）**为全球宏观协调提供信息基础；
4. **附条件贷款**降低救助谈判的反复交易成本；
5. **SDR 创设**作为补充性国际储备资产。

**四、霸权秩序的制度化（克拉斯纳/Ikenberry 视角）**

IMF 反映美国战后霸权安排：
1. **份额与投票权**：美国 16% 以上份额事实上拥有重大决策否决权（关键决策需 85% 多数）；
2. **总裁惯例**：长期由欧洲人担任，反映战后欧美主导格局；
3. **总部华盛顿**：地理与政治上靠近美国财政部；
4. **政策偏好**：1980—90 年代"华盛顿共识"——财政紧缩、贸易自由化、私有化、汇率自由——深度反映美国财政部与华尔街利益。

**五、结构性权力的体现（斯特兰奇视角）**

IMF 是美国"金融结构性权力"的延伸：
1. 通过附条件贷款影响危机国宏观与制度改革（拉美 80 年代、亚洲 97 年、俄罗斯 90 年代、希腊 2010 年代）；
2. 监控发展中国家金融自由化进程；
3. 塑造国际金融监管标准（BCBS / FSB 等并列机构）；
4. 通过 SDR、特别提款权篮子重构等手段影响国际储备结构。

**六、批评与争议**

1. **附条件贷款被指"一刀切"**：①忽视国别差异；②加剧危机国紧缩（亚洲金融危机被斯蒂格利茨严厉批评）；③侵蚀政策自主权；
2. **代表性赤字**：发展中国家份额与影响力远低于其经济权重；
3. **道德风险**：救助预期可能鼓励投机性资本流动；
4. **政策偏向**：偏好金融自由化、紧缩、私有化，对劳工、社会保障关注不足；
5. **改革滞后**：2010 年份额改革直到 2016 年才生效，反映既得利益阻力。

**七、IMF 的改革与中国角色**

1. **份额改革**（2010 通过、2016 生效）：发展中国家份额上升约 6 个百分点；**中国份额升至 6.39%**，跃居第三（仅次美、日）；
2. **SDR 篮子重构**（2015 通过、2016 生效）：人民币纳入 SDR 篮子，权重 10.92%（2022 年调整为 12.28%），居美元、欧元后第三；
3. **政策灵活化**：2008 危机后 IMF 部分修正立场，承认资本管制在特定条件下合理性、强调结构性改革应配合社保；
4. **新兴大国制度补位**：金砖应急储备安排（CRA, 2014）、中国主导的双边货币互换网络部分对冲 IMF 主导格局；
5. **中国主张**：①加快份额与治理改革；②扩大 SDR 使用；③加强发展中国家声音；④反对附条件贷款的过度干预。

**八、当代挑战**

1. **大国博弈加剧**：美国国会长期阻挠改革；中俄等推动多元化；
2. **全球金融架构碎片化**：双边互换、区域金融安排（CRA、CMIM、ESM）部分替代 IMF 救助功能；
3. **数字货币与稳定币挑战国际货币治理**；
4. **气候融资、债务危机重组**等新议题对 IMF 工具箱提出新要求。

**九、理论结论**

IMF 是国际制度发挥**信息提供 + 监督 + 救助 + 规范塑造**功能的典型案例，体现了霸权秩序如何通过制度化得以维系。同时，其受到的批评——附条件贷款的政治化、代表性赤字、政策偏向——也揭示了制度即权力载体的本质（考克斯式批判）。IMF 的未来取决于能否在守成大国与新兴大国之间重塑权力—规则平衡，回归"国际公共物品提供者"的初心（参见 Krasner 1983；基欧汉 1984；Strange《国家与市场》；田野第四章；宋新宁/陈岳第五章）。

### 7. 论述影响一国汇率制度选择的政治因素【模拟-4】

汇率制度选择（固定 vs 浮动 vs 中间制度）不仅是技术经济问题，更深刻地反映国内政治结构与国际政治位置。主要政治因素包括：

**一、Mundell-Fleming 不可能三角的政治含义**

蒙代尔-弗莱明模型揭示：**资本自由流动、固定汇率、独立货币政策三者不可兼得**。一国必须放弃其中一项，而放弃哪一项是政治选择：
- 选择"固定汇率 + 资本自由 + 牺牲货币政策独立"——欧元区（除德国）、香港；
- 选择"固定汇率 + 货币独立 + 资本管制"——改革开放初期中国、马来西亚；
- 选择"浮动汇率 + 资本自由 + 货币独立"——美、英、日、加。

**二、国内政治制度因素**

1. **选举制度**（Bernhard & Leblang）：
   - 多数代表制 → 单一政党政府 → 倾向**浮动汇率**（保留货币独立用于政治周期）；
   - 比例代表制 → 联合政府 → 倾向**固定汇率/货币联盟**（外部锚解决内部分歧）；
2. **央行独立性**：独立央行偏好浮动；行政主导央行倾向固定以约束自身；
3. **政治体制**：威权政体可强力维持固定汇率（如香港联系汇率），但易因储备耗尽而崩溃。

**三、利益集团政治（Frieden 范式）**

不同部门对汇率制度有不同偏好：
1. **可贸易品部门（出口、进口竞争）**：偏好**稳定且低估**的汇率，因此倾向固定/管理；
2. **非贸易品部门（地产、零售、本地服务）**：偏好稳定但不在意水平，因此倾向固定；
3. **金融部门（跨境资金运作）**：偏好**浮动 + 资本自由**，因为浮动赋予套利空间和管理工具；
4. **跨境工作者**：偏好稳定（汇款价值稳定）；
5. **进口消费品消费者**：偏好高估汇率（购买力强）。

**Frieden 命题**：以制造业为主的国家（德国、日本）倾向选择稳定/管理汇率；以金融业为主的国家（英国、瑞士）倾向浮动；服务出口大国（瑞士、新加坡）情况复杂。

**四、社会联盟（Rogowski/Hiscox）**

社会联盟形态决定汇率政治：
1. **要素流动高 + 资本丰裕国**：资本可能联合反对币值高估、保护制造业；
2. **要素流动低 + 出口部门集中**：部门内联盟主导，强力推动汇率支持出口；
3. **要素丰裕度差异大**：阶级冲突激烈，汇率制度成为分配政治焦点（拉美高通胀历史）。

**五、国际政治位置因素**

1. **霸权货币地位**：发行国际储备货币的国家（美国）倾向浮动（享有"超额特权"）；
2. **货币锚选择**：中小国常钉住主要贸易伙伴货币（西非国家钉欧元、海湾国家钉美元）；
3. **联盟与安全关系**：安全依赖美国 → 货币也常钉美元（沙特、巴林）；
4. **去美元化压力**：欧元区、人民币国际化等反映对美元霸权的对冲。

**六、危机驱动的制度切换**

汇率制度选择常因危机而被动调整：
1. **1971 布雷顿森林崩溃**：美国脱钩黄金，主要国家被迫浮动；
2. **1992 英镑危机**：英国被迫退出 ERM；
3. **1997 亚洲金融危机**：泰国、韩国、印尼被迫从固定改为浮动；
4. **2010 欧债危机**：希腊等被迫接受财政紧缩以维持欧元；
5. **2014 俄罗斯卢布危机**：俄被迫浮动；
6. **2022 西方制裁后**：俄罗斯回到资本管制 + 管理浮动。

**七、中国汇率制度演变的政治分析**

1. **1979—1994**：双轨制（官定汇率 + 调剂市场），反映外汇短缺与计划体制残余；
2. **1994 汇率并轨**：建立有管理的浮动汇率制度，与外贸体制改革配套；
3. **2005 汇改**：参考一篮子货币、有管理浮动；7 年累计升值 21%；
4. **2015 "8·11" 汇改**：中间价定价机制改革，引入"收盘价 + 一篮子 + 逆周期因子"；
5. **2022 后**：人民币双向波动加大，对美元一度跌破 7.3，央行强调"汇率不是工具"。

**政治考量**：
- 外贸出口集团 vs 进口商 vs 金融市场的博弈；
- "保汇率"vs"保储备"的政治选择；
- 人民币国际化推进对汇率市场化的要求；
- 中美战略博弈对汇率政策的外部约束。

**八、政策含义**

1. 没有"最优汇率制度"，关键是与国内政治、产业结构、国际位置相匹配；
2. **角点解假说**（McKinnon/Fischer）：只有完全固定（货币联盟、货币局）或自由浮动可持续，中间制度脆弱——但中国"管理浮动 + 资本管制"是反例；
3. 汇率制度可逐步演变，路径依赖明显（参见 Frieden《Currency Politics》；Bernhard & Leblang；田野第六章）。

**九、结论**

汇率制度选择是**国内政治制度、利益集团、国际位置、危机经验**共同塑造的产物。其本质是分配政治：谁受益、谁付出代价。中国在新时代汇率政策的方向应是**稳步推进市场化 + 配套资本账户审慎开放 + 加强宏观审慎管理**，在不可能三角约束下找到符合自身利益结构的平衡（参见 Frieden 2015；田野第六章；翟东升相关研究）。

### 8. 运用所学 IPE 理论分析美元霸权研究【模拟-4】

美元霸权是当代国际政治经济学的核心议题。其形成、维系与未来构成 IPE 理论应用的丰富场域。

**一、美元霸权的概念与表现**

美元霸权（dollar hegemony）指美元在国际货币体系中享有**结构性主导地位**，表现为：
1. **结算货币**：约 40% 的全球贸易、80% 以上的跨境支付以美元计价；
2. **储备货币**：约 58% 的全球外汇储备为美元（IMF COFER）；
3. **大宗商品定价**：石油、黄金、铜、铁矿石等以美元定价；
4. **金融市场基准**：美元利率（SOFR）成为全球资金成本基准；
5. **基础设施主导**：SWIFT、CHIPS、Fedwire 构成全球美元清算骨架；
6. **超额特权**（exorbitant privilege，戴高乐）：美国可低成本融资其经常账户赤字。

**二、形成的历史路径（路径依赖视角）**

1. **1944 布雷顿森林会议**：怀特方案胜出，确立美元—黄金双挂钩；
2. **马歇尔计划**：美元注入欧洲，巩固美元清算地位；
3. **1971 黄金脱钩**：尼克松脱金后美元成为不可兑换法币，但因"路径依赖"（市场流动性、安全资产、网络效应）地位反而强化；
4. **1974 石油美元**：美沙协议——OPEC 接受美元定价 → 石油美元循环；
5. **1980—2000 年代**：金融自由化、华尔街主导全球资本流动 → 美元金融网络全球渗透；
6. **后冷战 + WTO + 全球化**：扩大美元贸易需求，进一步固化地位。

**三、维系的结构性基础（斯特兰奇结构性权力视角）**

1. **安全结构**：美国军事霸权与盟国体系提供"安全溢价"，使美元成为安全资产首选；
2. **生产结构**：美国主导高端价值链 → 全球依赖以美元结算高端中间品；
3. **金融结构**：①美国国债是全球最深、最广、最可靠的安全资产市场；②美元是 SWIFT 的主导计价单位；③美联储是事实上的全球最后贷款人（通过流动性互换网络）；
4. **知识结构**：①美式金融理论与监管框架（巴塞尔协议、IFRS、信用评级）；②英语作为金融业通用语；③华尔街—智库—大学网络构建主流金融话语。

**四、网络外部性与路径依赖**

1. **网络效应**：大家用美元 → 每个人继续用美元更便利 → 巩固美元主导（类似 Windows、英语）；
2. **沉没成本**：金融机构 IT 系统、企业财务流程深度嵌入美元 → 切换成本巨大；
3. **预期协调**：美元被预期为"未来主导货币" → 自我实现。

**五、美元霸权的政治经济收益**

1. **铸币税**：发行国际货币的财政收益（约 GDP 0.3—0.5%）；
2. **超额借贷能力**：可在经济下行时维持赤字融资；
3. **金融制裁工具**：通过 SWIFT 切断、资产冻结、"长臂管辖"等制裁对手（伊朗、俄罗斯、朝鲜）；
4. **货币主权外溢**：美联储政策外溢全球，但其他国家政策外溢回美国有限；
5. **宏观弹性**：美国可承担更大财政赤字、更高公共债务而不致危机。

**六、美元霸权的代价与悖论**

1. **特里芬难题**：美国必须维持经常账户逆差以向世界提供美元 → 长期削弱本币信用；
2. **"过度特权"反噬"**：过度依赖美元国际地位 → 制造业空心化、产业转移、社会分化（铁锈带）；
3. **金融制裁滥用的反向效应**：促使俄、伊朗、中国加快去美元化；
4. **政治极化与债务上限政治**：美国国内政治不稳定威胁美元信誉。

**七、去美元化与挑战**

1. **欧元的挑战（1999—2010）**：欧债危机后增长放缓，但作为第二大储备货币地位稳定；
2. **人民币国际化**：跨境支付占比上升但储备份额仍小（约 2—3%）；
3. **数字人民币 + CIPS**：构建替代性清算基础设施；
4. **金砖国家本币结算**：本币结算扩大但仍在边缘；
5. **黄金回归**：央行黄金购买激增，部分对冲美元风险；
6. **SDR 与"超主权货币"**：周小川 2009 文章重提，但实操推进有限；
7. **稳定币与 CBDC**：技术层面提供潜在替代路径。

**八、批判理论视角（考克斯/吉尔）**

新葛兰西主义视美元霸权为：
1. **跨国资本主义阶级 + 美国国家 + 国际金融制度**的"历史集团"；
2. 通过 IMF、世行、巴塞尔协议、美联储构成"美元霸权 + 新自由主义"的全球治理结构；
3. 其崩溃需要新的"历史集团"——包括新兴大国 + 全球南方 + 国内反新自由主义运动的联合。

**九、中国战略选项**

1. **稳健去美元化**：而非急于"挑战"；
2. **人民币国际化**：稳步推进，重点在大宗商品定价、跨境支付、储备货币功能；
3. **建设替代基础设施**：CIPS、数字人民币、跨境支付互联；
4. **多边布局**：金砖应急储备、双边互换、SDR 改革；
5. **国内宏观稳健**：保持低通胀、稳定增长、合理负债率，为人民币国际化提供基础；
6. **避免对抗激发反弹**：循序渐进，借机不挑战；
7. **管理金融制裁风险**：分散储备、提升黄金占比、推动结算多元化。

**十、理论结论**

美元霸权是**结构性权力、路径依赖、网络外部性、霸权秩序**多重机制的综合产物，难以被短期颠覆但正面临内部矛盾（特里芬难题、政治极化）和外部挑战（去美元化、技术替代）的双重压力。未来 20—30 年国际货币体系大概率是**美元主导 + 多极化补充**格局，而非简单的"霸权更替"。中国战略应聚焦人民币结构性升位与替代基础设施建设，而非短期"挑战"美元（参见 Strange《疯狂的金钱》；Eichengreen《嚣张的特权》；田野第四章；翟东升相关研究）。

### 9. 论述国际贸易对国内政治分化的影响【模拟-5、15】

国际贸易开放对国内政治的分化效应是 IPE 的核心议题。其理论谱系自李嘉图—斯托尔珀—萨缪尔森，到罗格夫斯基、Hiscox、Autor—Dorn—Hanson，已形成系统框架。

**一、理论基础：H-O 模型与斯托尔珀—萨缪尔森定理**

赫克歇尔—俄林模型 + 斯托尔珀—萨缪尔森定理：在要素自由流动假设下，**贸易开放会抬升一国相对丰裕要素的实际报酬，压低相对稀缺要素的实际报酬**。
- 发达国家：资本丰裕 → 贸易使资本受益、劳动受损；
- 发展中国家：劳动丰裕 → 贸易使劳动受益、资本受损（虽然现实未必如此简单）。

**二、Rogowski（1989）的社会联盟分析**

Rogowski 在《商业与联盟》中提出**三要素（土地、劳动、资本）+ 要素丰裕度**框架，预测贸易冲击下不同国家的联盟形式：

| 经济类型 | 丰裕要素 | 贸易开放受益方 | 政治联盟特征 |
|---|---|---|---|
| 19c 美国（土地多、资本少、劳动少）| 土地 | 农场主 vs 工人 + 资本 | 民粹主义运动 |
| 19c 英国（资本多）| 资本 | 资本 vs 土地 + 劳动 | 自由贸易联盟主导 |
| 当代发展中国家 | 劳动 | 劳动 vs 资本 + 土地 | 民粹反精英运动 |
| 当代发达国家 | 资本（高技能）| 资本 vs 劳动 | 经济民族主义、特朗普现象 |

**三、Hiscox（2002）的要素流动修正**

Hiscox 修正：当要素跨产业流动性低时，分化沿**部门**而非阶级展开：
- 美国铁锈带：汽车业资本与工人联合反对自由贸易；
- 硅谷：科技业资本与工程师联合支持开放；
- 农业带：玉米/大豆农场主联合支持出口（反对中美贸易战）；
- 19—20 世纪美国选民对贸易的态度沿地理而非阶级分布。

**四、保护待售模型（Grossman-Helpman 1994）**

Grossman-Helpman 提供贸易保护的政治经济均衡：
- 组织化程度高的产业获得更高保护；
- 进口需求弹性低、进口渗透率高的产业更易获保护；
- 美国农业、钢铁、汽车、糖业、半导体等高保护行业符合该逻辑。

**五、贸易冲击的实证研究（Autor-Dorn-Hanson "China Shock"）**

Autor、Dorn、Hanson（2013, 2016）"China Shock" 研究：
- 中国出口冲击使美国制造业就业 2001—2011 损失约 200—240 万；
- 受冲击地区工资下降、收入减少、健康恶化、家庭破裂率上升；
- 这些地区**支持特朗普 + 反全球化政党 + 民粹政客比例显著上升**；
- 经济冲击 → 政治分化 → 政策反弹（关税战、保护主义、产业政策回潮）。

**六、贸易冲击对政治的多渠道影响**

1. **投票行为**：受贸易冲击地区投票更倾向保护主义政党；
2. **党派重组**：传统左右翼分裂、新右翼民粹崛起（美国共和党"特朗普化"、欧洲民粹党涨势）；
3. **政策极化**：贸易、移民、文化议题相互纠缠，加深社会分裂；
4. **集体认同变化**：阶级—族裔—地域认同重组；
5. **社会信任下降**：经济不安全感降低对制度信任；
6. **政府能力受质疑**：自由贸易带来的"赢家通吃"加剧再分配赤字。

**七、国家间分化的差异化机制**

为什么相同贸易冲击在不同国家产生不同政治反应？
1. **再分配制度强度**：北欧 + 德国——发达再分配 + 再就业培训 → 反弹较弱；美国 + 英国——再分配弱 → 反弹强烈；
2. **工会力量**：强工会国家（北欧、德国）能缓冲冲击；弱工会国家（美、英）冲击直接传导到政治；
3. **教育与培训系统**：德国双元制学徒训练 → 工人转型快；美国短缺 → 转型慢；
4. **政治制度**：比例代表制 + 联合政府 → 反弹分散；多数制 → 民粹政党突破易；
5. **意识形态资源**：民族主义传统强国家更易出现保护主义反弹。

**八、贸易、移民、技术变革的交互**

近年研究强调：
1. **技术变革（自动化、AI）**也产生类似贸易冲击的政治分化效应；
2. **贸易 + 技术 + 移民**三重冲击叠加 → 产业工人群体的全面安全感丧失；
3. 单纯反贸易未必能解决问题，但成为政治表达载体；
4. 政策需要综合应对：再分配 + 再培训 + 产业政策 + 社会保障扩展。

**九、中国情境**

中国作为"贸易冲击"主要发出方，同时也是接收方：
1. **入世受益**：出口部门、沿海经济、城市中产受益显著；
2. **入世代价**：部分国有企业职工下岗、农业部门承压、东北衰退加剧；
3. **当下贸易战冲击**：高端制造业 + 半导体被压制、出口管制损害特定行业；
4. **国内分化**：沿海 vs 内陆、东南 vs 东北、城市 vs 农村；
5. **再分配 + 产业升级 + 内循环**成为应对策略。

**十、政策意涵与理论结论**

国际贸易开放虽提升总福利，但因**分配效应不均、调整能力有限、政治制度过滤**，可能引发深刻政治分化乃至反全球化运动。当代理论强调：
1. 贸易政策不能脱离再分配政策；
2. 必须配套教育、培训、社保以提升要素流动性；
3. 政治制度必须有承接调整冲击的能力；
4. 国家应主动管理价值链转型，而非被动接受市场结果。

**Rodrik 提出的"超级全球化三难"**：深度全球化、民族国家、民主政治三者不可兼得。这一命题预示了 21 世纪全球化的根本调整方向：**有节制的全球化 + 国内政策空间 + 民主合法性**的再平衡（参见 Rogowski 1989；Hiscox 2002；Autor et al. 2013；Rodrik《全球化的悖论》；田野第六章）。

### 10. 运用所学 IPE 理论分析并举例说明跨国公司的政治影响【模拟-5、15】

跨国公司（MNCs / TNCs）是 20 世纪后期以来世界经济的核心行为体之一。其政治影响构成 IPE 重要研究议题。

**一、跨国公司的兴起与全球地位**

1. **规模**：UNCTAD 数据，全球约 8.5 万家跨国母公司，控制约 80 万家海外子公司，FDI 存量超 40 万亿美元；
2. **价值链**：约 80% 的全球贸易通过跨国公司主导的全球价值链；
3. **市值**：苹果、微软、英伟达、亚马逊等市值超过多数中等国家 GDP；
4. **就业与税收**：全球约 8000 万人直接受雇于跨国公司海外子公司。

**二、跨国公司政治影响的理论谱系**

1. **自由主义/相互依赖论**（Vernon, Keohane-Nye）：跨国公司通过跨界生产网络深化国家间依赖、推动合作；
2. **依附论 / 世界体系**：跨国公司是中心—外围结构再生产的主要载体；
3. **结构性权力**（Strange）：跨国公司是美国生产结构权力的主要承担者；
4. **保护待售模型**（Grossman-Helpman）：跨国公司通过政治献金、游说塑造贸易政策；
5. **批判 IPE / 新葛兰西主义**（Cox, Gill）：跨国公司是跨国资本主义阶级和"历史集团"的核心。

**三、对母国政治的影响**

1. **塑造对外经济政策**：
   - 推动贸易自由化、投资协定（BIT/FTA）、知识产权保护强化（TRIPS）；
   - **例**：美国制药业（Pfizer 等）通过"知识产权委员会"推动 TRIPS 谈判，确保全球药品专利保护。
2. **政治献金与游说**：
   - 美国 OpenSecrets 数据显示，财富 500 强企业每年游说支出超过 30 亿美元；
   - **例**：硅谷企业大举游说反垄断政策、影响数据隐私立法。
3. **税收政治**：
   - 通过转移定价、税收筹划压低有效税率，引发全球税基侵蚀（BEPS）问题；
   - **例**：苹果通过爱尔兰避税安排被欧盟追讨 130 亿欧元税款（2016）；
4. **就业与产业政策**：
   - 跨国公司海外投资引发母国"产业空心化"忧虑；
   - **例**：美国铁锈带衰退与跨国公司外移直接相关，推动特朗普"美国优先"。

**四、对东道国政治的影响**

1. **塑造产业政策**：
   - 跨国公司投资影响东道国产业结构、技术升级路径；
   - **例**：日本汽车业在 1990 年代后大规模在美国设厂以规避贸易摩擦，深刻塑造美国南部经济。
2. **影响法律与监管框架**：
   - 通过 BIT 投资仲裁条款（ISDS）约束东道国政策空间；
   - **例**：Philip Morris 通过 ISDS 起诉澳大利亚烟草包装法（2011-2015，最终败诉）；菲利普莫里斯诉乌拉圭等案例。
3. **税收侵蚀**：
   - 转移定价使东道国税收损失严重（非洲、东南亚每年损失数百亿美元）；
4. **环境与社会标准**：
   - "向下竞次"压力（race to the bottom）VS 国际 ESG 标准的"向上竞高"；
   - **例**：耐克 1990 年代被曝光东南亚血汗工厂，引发跨国 CSR 标准提升。
5. **政治干预**：
   - 历史上有 UFC（联合果品公司）参与拉美政变、ITT 参与智利 1973 政变等案例；
   - 当代跨国公司参与方式更隐性，通过游说、媒体、商会影响政策。

**五、对国际制度与全球治理的影响**

1. **塑造国际规则**：
   - 跨国公司是 WTO、WIPO、ICAO、IMO、BIS 等机构规则讨论的事实上参与者；
   - **例**：信息技术协议（ITA）扩展由 ICT 跨国公司联盟推动。
2. **跨国治理参与**：
   - 联合国全球契约（UN Global Compact）、ISO 26000、巴塞尔协议（金融业）；
   - **例**：扎克伯格直接出席 G7 数字治理讨论。
3. **新型治理形态**：
   - "公私伙伴关系"（PPP）、"多利益相关方倡议"（MSI）—— ICANN、ISO、世界经济论坛；
   - 这些治理形态把跨国公司纳入规则制定。

**六、对国际政治结构的影响**

1. **国际竞争的"企业化"**：
   - 国家通过跨国公司延伸影响力（华为、TikTok、苹果、台积电）；
   - 跨国公司成为大国竞争"代理人"（半导体、AI、电动车）。
2. **经济战与制裁工具**：
   - 跨国公司被纳入制裁体系（出口管制、实体清单、二级制裁）；
   - **例**：美国对华为芯片管制、对中芯国际限制；俄罗斯被切断 SWIFT 后跨国公司大撤离。
3. **数据主权与跨境数据流**：
   - 跨国公司控制的数据成为新型"主权"议题；
   - **例**：TikTok 数据归属、谷歌退出中国大陆、欧盟 GDPR vs 美国 CLOUD Act 冲突。

**七、对中国的双向影响**

1. **吸引外资促进工业化**：
   - 1992—2010 年代外资是中国出口型增长的核心；
   - 苹果—富士康—台积电模式塑造中国制造业升级路径；
2. **技术溢出与本地企业崛起**：
   - 中国本土企业通过供应商关系、人才流动、市场学习实现技术升级；
   - 部分领域（电动车、太阳能、5G）已超越外资。
3. **当代调整**：
   - "脱钩 / 去风险化"压力下部分外资撤离/转移（越南、墨西哥、印度）；
   - 中国推动外资升级（高端制造、研发中心）以应对转移压力。
4. **中国跨国公司"走出去"**：
   - 华为、TikTok、比亚迪、宁德时代等成为新一代跨国公司；
   - 面临东道国政治阻力、安全审查、技术封锁等挑战。

**八、规制跨国公司的全球努力**

1. **OECD BEPS 行动计划**：全球最低公司税（15%）2024 年起逐步实施；
2. **UN 跨国公司商业人权指导原则**（Ruggie 框架）；
3. **欧盟供应链尽职调查指令**（CSDDD）；
4. **WTO 投资便利化协定**正在谈判中。

**九、理论结论**

跨国公司是 21 世纪 IPE 的核心行为体，其政治影响呈现以下特征：
1. **结构性影响 > 关系性影响**——通过塑造生产、技术、信息结构而非直接干预政策施加影响；
2. **跨边界性**——同时影响母国、东道国和国际制度；
3. **大国博弈代理人化**——跨国公司日益成为国家间竞争载体；
4. **治理对象与治理参与者双重身份**——既被规制又参与规制制定；
5. **政治化加剧**——从纯商业实体向"政治—经济复合体"演变。

中国应对策略应是**"管好—用好—走出去"三位一体**：既要规制外资跨国公司在华行为，又要善用其技术溢出，更要支持中国跨国公司在全球价值链中的位置升级（参见 Strange《国家与市场》；Gilpin 《全球政治经济学》第十章；田野第五、十章；宋新宁/陈岳第九章）。

### 11. 论述并举例说明经济全球化影响国内政治的途径【模拟-6】

经济全球化通过多种途径深刻塑造各国国内政治。其分析谱系自 Gourevitch"颠倒的第二意象"到 Rodrik"全球化三难"，构成 IPE 国内—国际互动研究的核心。

**一、"颠倒的第二意象"基本框架**

Gourevitch（1978）"颠倒的第二意象"命题：国际经济结构与压力**回溯塑造一国国内政治**——政治制度、社会联盟、政策选择。全球化加剧此过程。

**二、影响途径一：贸易冲击 → 社会联盟重组**

承接 Rogowski-Hiscox-Autor 论证：
- 贸易开放 → 产业兴衰 → 受益与受损群体形成 → 政治联盟分化；
- **例 1**：美国铁锈带因"China Shock"投票转向特朗普；
- **例 2**：英国脱欧——制造业衰退区 + 老年白人 + 反全球化情绪共同形成"脱欧联盟"；
- **例 3**：中国沿海 vs 内陆经济差距塑造内部政治平衡（中央转移支付、西部大开发）。

**三、影响途径二：金融全球化 → 货币与财政政策空间收缩**

1. **Mundell-Fleming 不可能三角**：资本自由 + 固定汇率 + 货币独立不可兼得，迫使各国选择放弃部分政策工具；
2. **金融市场约束**：主权债评级、债券市场反应、汇率波动约束财政赤字；
3. **例**：希腊 2010 危机后被迫接受紧缩；新兴市场的"原罪"（用美元借债）使其在美联储加息时承受巨大压力；
4. **政治后果**：财政紧缩 → 福利削减 → 社会抗议 → 政治极化。

**四、影响途径三：跨国公司投资 → 国家—企业关系重塑**

1. **税收竞争（race to the bottom on tax）**：各国为吸引 FDI 降低公司税率；
2. **监管竞争**：监管套利推动监管放松或差异化；
3. **就业讨价**：跨国公司可威胁迁移以争取政府让步；
4. **例**：爱尔兰、卢森堡、新加坡的低税率战略；中国地方政府"招商引资"竞赛。

**五、影响途径四：跨国行为体进入国内政治**

1. **跨国 NGO**：人权观察、绿色和平、国际特赦在多国推动政策变化；
2. **专家共同体**（epistemic communities）：科学家、经济学家网络塑造国内政策（如 IPCC 科学共同体推动气候政策）；
3. **跨国宗教 / 文化运动**：影响家庭、教育、性别等议题；
4. **外国基金会**：福特、洛克菲勒、盖茨基金会资助各国研究 / 治理项目；
5. **例**：欧盟环境标准通过 NGO 网络推动东欧国家立法。

**六、影响途径五：移民 → 人口结构与认同政治**

1. 全球化伴随人员流动（移民、留学、跨境劳工）；
2. **后果**：①劳动市场分化；②族裔/宗教冲突；③福利国家压力；④文化身份政治；
3. **例**：欧洲 2015 难民危机引发民粹主义崛起（德国 AfD、法国国民联盟、意大利兄弟党）；美国移民政治成为两党核心议题。

**七、影响途径六：国际制度约束 → 国内政策与法律调整**

1. **WTO 入世**：中国修改 2000 多部法律法规以符合 WTO 规则；
2. **欧盟扩展**：新成员国必须采纳 acquis communautaire（约 8 万页法律）；
3. **IMF 附条件贷款**：迫使危机国实施财政紧缩、私有化、汇率自由化；
4. **国际刑事法院、人权法院**：约束国内司法实践。

**八、影响途径七：信息与文化全球化 → 公共舆论与认同重塑**

1. **跨国媒体 + 社交平台**：CNN、BBC、TikTok、X 塑造跨国公共舆论；
2. **文化产品**：好莱坞、Netflix、K-pop 影响价值观；
3. **教育全球化**：留学、网课、跨国大学塑造精英；
4. **例**：阿拉伯之春 2011 通过社交媒体跨国传播；TikTok 在多国引发的政治审查与禁令。

**九、影响途径八：危机传染与外部冲击**

1. **金融危机**：1997 亚洲危机、2008 全球危机、2010 欧债危机跨国传染；
2. **流行病**：2020 新冠重塑各国卫生治理、财政、社会政策；
3. **能源冲击**：俄乌战争引发欧洲能源价格飞涨、政府重塑能源政策；
4. **例**：新冠后多国扩大财政赤字与货币宽松，但也加剧通胀压力。

**十、各国回应的差异（卡赞斯坦的"国内结构"）**

相同全球化冲击产生不同政治回应：
1. **北欧合作主义模式**：强工会 + 强福利 → 顺利吸收冲击，社会稳定；
2. **美国多元主义模式**：弱工会 + 弱福利 → 冲击直接传导，民粹崛起；
3. **东亚发展型国家**：强国家 + 嵌入式自主性 → 引导产业升级，社会分化可控；
4. **中国"举国体制"**：以国家主导 + 内循环 + 产业政策应对脱钩压力。

**十一、Rodrik 的"超级全球化三难"**

Rodrik 《全球化的悖论》：**深度全球化、民族国家、民主政治三者不可兼得**：
- 选择"深度全球化 + 民族国家"→ 放弃民主（技术官僚治理，如 19 世纪金本位下的中央银行家秩序）；
- 选择"深度全球化 + 民主"→ 超越民族国家（如欧盟试验）；
- 选择"民族国家 + 民主"→ 限制全球化（适度全球化 + 政策空间，Rodrik 主张）。

**十二、中国情境**

1. **入世效应**：贸易开放重塑沿海 vs 内陆、城市 vs 农村平衡；
2. **金融全球化**：人民币国际化、资本账户审慎开放推动金融监管改革；
3. **跨国公司影响**：外资政策从优惠到平等再到选择性；
4. **国际制度约束**：WTO、IMF、巴黎协定塑造中国监管框架；
5. **数字主权**：数据安全法、个人信息保护法是对全球化数据流的回应；
6. **应对脱钩**：内循环 + 产业升级 + 自主创新构成战略调整。

**十三、政策意涵与理论结论**

经济全球化对国内政治的影响是**多维度、多渠道、跨阶层、跨地域**的。其核心命题：
1. **国际经济不仅是"外部环境"，更是国内政治的"内在变量"**；
2. **国家对全球化的回应能力差异巨大，国内政治制度是关键过滤器**；
3. **简单"开放 vs 封闭"是错误二分法**，真正问题是如何在开放中维持国内政治社会平衡；
4. **再分配、再培训、社会保障**是应对全球化政治冲击的核心政策工具；
5. **中国的"双循环 + 制度型开放"**是对 Rodrik 三难的中国式回答。

中国应继续推进高水平开放，同时强化国内再分配与产业升级，避免陷入西方"贸易冲击 → 民粹反弹"的负反馈循环（参见 Gourevitch 1978；Rodrik《全球化的悖论》；Katzenstein 1985；田野第五、六章）。

### 12. 论述国际货币体系与国际政治体系的关系【模拟-6】

国际货币体系与国际政治体系存在深刻的双向互动关系。其在 IPE 理论中是核心议题，吉尔平、斯特兰奇、艾肯格林等都有重要研究。

**一、国际货币体系的政治本质**

国际货币体系（IMS）由汇率制度、储备资产、国际收支调整机制、国际金融机构等构成。它绝非"中性技术安排"，而是**深度嵌入国际政治权力结构**：
1. **关键货币的政治含义**：发行国际储备货币的国家享有铸币税、超额特权、金融制裁能力等政治收益；
2. **规则塑造的政治偏好**：IMS 规则反映主导国家利益（如 IMF 投票权与政策偏好）；
3. **危机救助的政治选择**：救助哪国、用何条件、由谁付费都是政治决定。

**二、政治体系决定货币体系（自上而下）**

1. **霸权秩序 → 货币体系**：
   - 国际货币体系的关键货币与霸权国货币高度相关；
   - **历史规律**：荷兰盾（17 世纪荷兰霸权）→ 英镑（19 世纪—1914 年英国霸权）→ 美元（1945 年至今美国霸权）；
   - 关键货币选择受霸权国军事、政治、生产能力支撑。
2. **战争与和平 → 货币体系**：
   - **战争**：通常推动金融管制、金本位中断、国家干预扩展；
   - **战后秩序**：1815 维也纳体系下金本位扩展；1944 布雷顿森林体系反映战后美国霸权；
   - 当代俄乌战争、中美博弈推动金融分割与去美元化。
3. **意识形态 → 货币体系**：
   - 古典自由主义 → 金本位 + 自由资本流动；
   - 凯恩斯主义 → 嵌入式自由主义 + 资本管制；
   - 新自由主义 → 浮动汇率 + 资本自由 + 央行独立；
   - 当代"民本主义"/产业政策回潮 → 部分资本管制、产业政策回归。
4. **联盟与对抗 → 货币区**：
   - 欧元区是欧洲一体化政治进程的产物；
   - 海湾合作委员会曾计划货币联盟；
   - 中俄、金砖国家本币结算受地缘政治推动。

**三、货币体系反作用政治体系（自下而上）**

1. **关键货币的政治权力**：
   - 美元霸权赋予美国铸币税、低成本融资、金融制裁能力；
   - 美元政策（QE、加息）外溢全球，塑造他国宏观环境；
2. **货币危机引发政治变迁**：
   - 1997 亚洲金融危机推动印尼苏哈托政权倒台、韩泰民主化；
   - 2010 欧债危机引发希腊、意大利政府更替；
   - 2018 阿根廷、土耳其货币危机重塑国内政治；
3. **国际金融制裁作为政治工具**：
   - SWIFT 切断、资产冻结、长臂管辖（伊朗、俄罗斯、朝鲜）；
   - 制裁效果取决于美元霸权地位 + 多边盟友配合；
4. **货币治理重塑国家行为**：
   - IMF 附条件贷款重塑危机国国内政策；
   - 巴塞尔协议重塑全球银行业；
   - 反洗钱（AML）/反恐融资（CFT）规则约束各国金融体系。

**四、关键历史案例分析**

**案例 1：金本位崩溃（1914—1939）**
- 一战中断金本位、各国回归后又因经济结构变化无法维持；
- 1931 英国脱金标志体系崩溃；
- 缺乏国际领导（金德尔伯格"领导真空"）导致大萧条；
- 政治后果：法西斯主义崛起、二战爆发。

**案例 2：布雷顿森林体系（1944—1971）**
- 政治基础：美国战后绝对霸权 + 西方联盟（应对苏联威胁）；
- 货币安排：美元—黄金双挂钩、IMF 监督、WB 发展融资；
- 政治效益：稳定西方阵营经济、巩固美国领导、为西欧日复兴提供货币基础；
- 崩溃原因：①特里芬难题（美元供给与信用矛盾）；②越战 + 大社会项目导致美国财政赤字 + 通胀；③欧日复兴削弱美国相对地位。

**案例 3：牙买加体系（1976—）**
- 政治基础：美国仍占主导但接受多极化趋势；
- 安排：浮动汇率合法化、黄金非货币化、SDR 补充；
- 政治效益：保留美元主导地位 + 各国汇率灵活性；
- 当代危机：①金融危机频发；②金融制裁滥用引发去美元化；③数字货币挑战。

**案例 4：欧元区（1999—）**
- 政治基础：欧洲一体化深化（特别是德法和解）；
- 货币安排：单一货币 + 欧央行 + 稳定与增长公约；
- 政治效益：欧洲内部货币一体化、对外协调能力提升、欧元作为第二大储备货币；
- 政治成本：成员国失去货币政策 → 欧债危机暴露"货币联盟无财政联盟"困境；
- 危机后改革：ESM、银行业联盟、欧央行 OMT 强化协调能力。

**五、当代国际货币体系与政治体系的互动**

1. **美元霸权与中美博弈**：
   - 中美贸易战 → 关税与制裁 → 部分企业去美元化；
   - 俄乌战争后金融制裁强化反向促进去美元化；
   - 人民币国际化作为长期战略对冲。
2. **金融多极化趋势**：
   - 欧元 + 人民币 + 数字货币 + 黄金共同补充美元；
   - 区域金融安排（CMIM、CRA、ESM）发展；
   - 跨境支付基础设施多元化（CIPS、SPFS）。
3. **数字货币与货币治理**：
   - CBDC（央行数字货币）将重塑跨境支付与货币政策传导；
   - 加密货币 / 稳定币挑战国家货币主权；
   - 数字人民币、数字欧元、FedNow 竞争塑造下一代货币基础设施。
4. **气候、AI 等议题渗透货币治理**：
   - 央行参与气候融资（绿色货币政策）；
   - AI 加速金融市场反应速度，要求货币治理升级。

**六、国际货币体系与国际政治体系的"共变规律"**

历史规律可总结为：
1. **霸权周期 ≈ 关键货币周期**（约 100—150 年）；
2. **危机促进制度变迁**：体系危机往往催生新货币安排（1944、1971、1985 广场协议、1999 欧元、2009 G20 升级）；
3. **意识形态周期影响货币治理**：自由放任 vs 国家干预的钟摆决定货币治理模式；
4. **战争重塑货币结构**：大战往往中断既有体系、催生新秩序。

**七、中国政策含义**

1. **战略目标**：从"美元霸权下的次级伙伴"向"多极化货币体系中的关键参与者"过渡；
2. **路径**：①推进人民币国际化（贸易结算 → 投资 → 储备）；②建设替代清算基础设施（CIPS、数字人民币）；③参与全球货币治理改革（IMF 份额、SDR 重构）；④维护国内宏观稳健（低通胀、稳定增长、合理负债）；
3. **避免误区**：①不挑战美元主导地位以免引发对抗；②不急于资本账户全面开放；③不放弃必要的资本管制以防系统性风险。

**八、理论结论**

国际货币体系与国际政治体系**互为表里、共同演变**。货币体系既是政治权力的载体（吉尔平），也是塑造政治可能性的结构（斯特兰奇）。21 世纪国际货币体系的演变方向——美元主导 + 多极化补充 + 数字化转型——直接关系到大国关系、全球治理与中国战略空间。理解二者关系是理解 IPE 核心议题的关键（参见 Gilpin 《国际关系政治经济学》第四章；Strange 《疯狂的金钱》；Eichengreen《资本全球化》《嚣张的特权》；田野第四章；翟东升相关研究）。

### 13. 运用所学 IPE 理论分析中国与国际经济组织的关系【模拟-7】

中国与国际经济组织的关系是改革开放以来中国外交与经济政策的核心议题之一。其演变可分为**接触 → 学习 → 全面参与 → 改革推动 → 制度供给者**五个阶段。

**一、历史阶段回顾**

1. **1971—1978 重返与接触期**：
   - 1971 年恢复联合国合法席位；
   - 1980 年恢复 IMF、世行席位；
   - 1980 年代积极利用世行贷款支持改革开放（教育、农业、交通）；
2. **1979—2000 学习与融入期**：
   - 1986 年申请恢复 GATT 缔约国地位；
   - 1995 年开始 WTO 入世谈判；
   - 1997 亚洲金融危机展现负责任大国姿态（坚持人民币不贬值）；
3. **2001—2012 全面参与期**：
   - 2001 年加入 WTO，深度嵌入多边贸易体系；
   - 大幅修订国内法律法规以符合国际规则；
   - 在 IMF、世行积极推动份额改革；
4. **2013— 改革推动 + 制度供给期**：
   - 提出 AIIB（2015 成立）、新开发银行（2015 成立）、CRA、一带一路；
   - 推动 RCEP（2020 签署 / 2022 生效）；
   - 申请加入 CPTPP、DEPA；
   - 倡导"人类命运共同体"、提出全球发展、安全、文明倡议。

**二、理论框架一：制度自由主义视角**

基欧汉式制度自由主义解释中国行为：
1. **降低交易成本**：通过加入 WTO、IMF 等降低与全球经济合作的交易成本；
2. **可信承诺**：通过国际承诺约束国内改革反复（如入世承诺锁定市场化改革）；
3. **路径依赖**：中国深度嵌入 WTO 规则体系后，撤离成本巨大；
4. **新制度供给**：作为崛起大国，中国提供 AIIB、新开发银行等补充性制度。

**三、理论框架二：霸权稳定/秩序转型视角**

Ikenberry 视角：
1. 中国选择"在既有秩序内崛起"——加入而非颠覆 WTO、IMF、世行；
2. 同时提供补充性制度（AIIB），形成"内嵌 + 补位"双轨策略；
3. 不同于德、日 1930 年代挑战秩序的路径——这反映中国对路径依赖与体系收益的理性认知。

**四、理论框架三：斯特兰奇结构性权力视角**

中国的国际组织参与是结构性权力建设的载体：
1. **生产结构**：通过 WTO 嵌入获得全球价值链中心地位；
2. **金融结构**：通过 IMF 改革 + 人民币 SDR 入篮提升金融权重；
3. **知识结构**：通过参与各类国际标准制定（ITU、ISO、IEC）提升话语权；
4. **安全结构**：相对弱，但通过 SCO、全球安全倡议补位。

**五、理论框架四：颠倒的第二意象视角**

国际组织对中国国内政治的回溯影响：
1. **法律改革**：WTO 入世推动 2000 余部法律法规修订；
2. **行政重组**：组建商务部、国家发改委、人民银行体系；
3. **国内联盟重塑**：出口部门、跨国公司、沿海地区受益 → 形成开放派；进口竞争部门、内陆地区受冲击 → 形成保护派；
4. **官员能力建设**：大量官员赴 IMF、世行培训，提升宏观治理能力。

**六、关键关系剖析**

1. **中国与 WTO**：
   - 入世收益：贸易规模 20 年增长 10 倍以上、跃居世界第一；外资大规模流入；倒逼国内改革；
   - 当前压力：美国质疑"中国非市场经济地位"、WTO 上诉机构瘫痪；
   - 改革主张：维护多边核心、反对单边主义、推动数字贸易等新议题。
2. **中国与 IMF**：
   - 中国份额从 2.94% 升至 6.39%（第三）；
   - 人民币 SDR 入篮（2016，权重 12.28%）；
   - 中国推动 IMF 治理民主化；
   - 在新冠、债务危机中积极承担责任。
3. **中国与世界银行**：
   - 中国是世行历史上最大借款国之一，也是重要捐款国；
   - 中国从"借款国"向"借款国 + 捐款国 + 制度供给者"转变；
   - AIIB、新开发银行补充世行融资能力。
4. **中国与 G20**：
   - 2008 危机后 G20 升级为首脑机制，中国成为核心参与者；
   - 2016 杭州 G20 峰会推动 G20 关注发展议题；
   - 中国在 G20 数字、绿色、债务议程上发挥重要作用。
5. **中国与新兴机构**：
   - **AIIB**（2015 成立，105 个成员）：聚焦基础设施融资；
   - **新开发银行**（2015 成立，金砖五国 + 新增成员）：金砖国家开发融资；
   - **RCEP**（2022 生效）：全球最大自贸协定，亚太一体化；
   - **一带一路**（2013 提出）：覆盖 150+ 国家的跨区域合作倡议；
   - **金砖应急储备**（CRA, 2014）：金砖国家货币救助安排。

**七、当前挑战**

1. **"修昔底德陷阱"压力**：守成霸权对中国制度建设的疑虑与反制（如对 AIIB 阻挠未遂、对 BRI 抹黑）；
2. **WTO 改革僵局**：上诉机构停摆、对中国国企/补贴规则的施压；
3. **脱钩与"小院高墙"**：美国构建排除中国的诸边机制（IPEF、芯片四方联盟 Chip4）；
4. **新兴机制的协调挑战**：AIIB、新开发银行如何与现有体系协调；
5. **能力建设与国际化人才不足**：中国在国际组织高级职位代表性仍不足；
6. **规则供给能力**：制度供给从"硬件"（资金、基础设施）向"软件"（规则、标准、知识）升级仍需努力。

**八、政策建议**

1. **维护多边核心**：坚持以 WTO/IMF 为核心的多边主义、推动改革而非颠覆；
2. **补充性制度供给**：以 AIIB、RCEP、BRI 等填补全球公共物品供给真空；
3. **规则塑造能力**：在数字贸易、绿色金融、可持续基建等新议题上提出可操作方案；
4. **国际化人才战略**：大力培养与输送国际组织官员；
5. **国内能力配套**：以高水平开放、制度型开放对接国际规则升级；
6. **避免对抗陷阱**：不主动挑战美元/美式秩序，循序渐进推进改革。

**九、理论结论**

中国与国际经济组织的关系演变体现了**"在既有秩序内崛起 + 补充性制度供给"**的中国特色路径。这一路径既符合制度自由主义的路径依赖逻辑，也体现了 Ikenberry 式秩序转型的可能性，更展现了斯特兰奇式结构性权力的中国式建设。展望未来，中国将继续在守成大国与新兴大国之间扮演**桥梁角色**，推动全球经济治理体系朝更公正、包容、可持续方向演进（参见基欧汉 1984；Ikenberry《大战胜利之后》；Strange 1988；田野第四、五章；宋新宁/陈岳第十章）。

### 14. 运用所学 IPE 理论分析人民币国际化问题【模拟-7】

人民币国际化（RMB internationalization）是 21 世纪国际货币体系演变的重要变量。其进程、动力、障碍与前景构成 IPE 重要议题。

**一、人民币国际化的内涵与阶段**

人民币国际化指人民币突破国内边界、在国际经济活动中承担**结算货币、投资货币、储备货币**等多重职能的过程。三阶段递进：
1. **结算货币（贸易）**：在国际贸易与跨境支付中使用；
2. **投资货币（金融）**：在跨境投资、债券、衍生品市场使用；
3. **储备货币**：被外国央行作为外汇储备持有。

**二、推进历程与现状**

1. **2008—2009 启动**：
   - 全球金融危机暴露美元体系风险；
   - 周小川提出"超主权货币"主张；
   - 2009 年启动跨境贸易人民币结算试点；
2. **2010—2015 快速扩张**：
   - 离岸人民币市场（CNH）兴起，香港成为离岸中心；
   - 多个双边货币互换协议签署（截至 2023 累计与 40+ 国家签署）；
   - 沪港通（2014）、深港通（2016）开通；
   - 2015 年 11 月 IMF 决定人民币入 SDR 篮子，2016 年 10 月生效（权重 10.92%）；
3. **2015—2020 调整期**：
   - 8·11 汇改后人民币贬值压力 → 资本管制收紧 → 跨境使用降温；
   - 中美贸易战 → 不确定性上升；
4. **2021— 战略升级期**：
   - 数字人民币（e-CNY）研发与试点扩大；
   - 俄乌战争后金融制裁 → 推动去美元化、人民币结算需求上升；
   - CIPS（人民币跨境支付系统）扩容；
   - 2022 年人民币 SDR 权重上调至 12.28%；
   - 2023 年沙特、伊朗、巴西等扩大人民币结算。

**三、现状数据**

1. **跨境支付**：SWIFT 数据 2023 年人民币占比约 3—4%，位居第四（美元 40%+、欧元 30%+、英镑、人民币）；
2. **储备份额**：IMF COFER 2023 年人民币约 2.5%，位居第五；
3. **CIPS 参与机构**：截至 2023 年覆盖 100+ 国家、1500+ 间接参与者；
4. **货币互换**：与 40+ 国家累计签署约 4 万亿元；
5. **石油人民币**：上海原油期货推出（2018），人民币计价大宗商品交易扩展。

**四、理论分析框架**

1. **货币国际化的功能阶段论**（Cohen, Eichengreen, Frankel）：
   - **结算 → 投资 → 储备**三阶段递进；
   - **私人功能 → 官方功能**：先在私人交易中使用，再被官方接受为储备；
   - 人民币目前主要在结算层面，投资和储备层面进展有限。
2. **网络效应与路径依赖**（Krugman, Cohen）：
   - 国际货币地位强烈受网络效应支撑——大家用美元 → 用美元更便利；
   - 路径依赖使既有关键货币长期稳定，挑战者需突破临界规模才能扩散；
   - 人民币需突破网络效应阻力。
3. **结构性权力视角**（Strange）：
   - 国际货币地位反映发行国在生产、安全、金融、知识四结构的综合权力；
   - 中国生产结构权力突出，但金融、安全、知识结构权力仍不足；
   - 人民币国际化与中国整体结构性权力建设同步推进。
4. **地缘政治视角**：
   - 关键货币地位由军事 + 政治 + 经济综合支撑；
   - 美元霸权依赖美军全球部署；
   - 人民币国际化需配套整体国力提升。

**五、推动因素**

1. **经济基础**：中国 GDP 世界第二、贸易世界第一、制造业第一；
2. **政策推动**：①跨境人民币结算便利化；②扩大债券市场开放；③签署双边互换；④基础设施建设（CIPS、数字人民币）；
3. **国际需求**：①避免美国制裁风险（俄罗斯、伊朗）；②大宗商品多元化结算需求；③人民币资产收益较稳定；④"一带一路"项目融资需求；
4. **金融制裁催化**：俄乌战争后冻结俄罗斯外汇储备使各国警觉，加速去美元化探索；
5. **技术红利**：数字人民币提供新型跨境支付路径。

**六、主要障碍**

1. **资本账户管制**：
   - 中国保留对资本账户的审慎管理；
   - 限制人民币的可自由兑换性 → 限制其作为投资和储备货币功能；
   - 但完全开放又面临系统性金融风险；
2. **金融市场深度不足**：
   - 中国债券市场规模虽大但流动性、对外开放度仍不足；
   - 缺乏深广的人民币安全资产市场（对应美国国债）；
