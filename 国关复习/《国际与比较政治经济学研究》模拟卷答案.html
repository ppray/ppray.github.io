<script id="md-source" type="application/json">"# \u300a\u56fd\u9645\u4e0e\u6bd4\u8f83\u653f\u6cbb\u7ecf\u6d4e\u5b66\u7814\u7a76\u300b\u6a21\u62df\u5377\u7b54\u6848\uff08\u53bb\u91cd\u6574\u7406\u7248\uff09\n\n> \u8986\u76d6\u6a21\u62df 01\u201315 \u5168\u90e8\u9898\u76ee\uff08\u7ea6 126 \u9053\u72ec\u7acb\u9898\u76ee\u53bb\u91cd\u4e3a\uff1a\u540d\u8bcd 59 / \u7b80\u7b54 39 / \u8bba\u8ff0 28\uff09\n> \u4e3b\u8981\u53c2\u8003\uff1a\u7530\u91ce\u300a\u56fd\u9645\u5173\u7cfb\u7684\u5236\u5ea6\u5206\u6790\u65b9\u6cd5\u300b\uff08\u4e2d\u56fd\u4eba\u6c11\u5927\u5b66\u51fa\u7248\u793e\uff0c2010\uff09\u3001\u5b8b\u65b0\u5b81/\u9648\u5cb3\u300a\u56fd\u9645\u653f\u6cbb\u7ecf\u6d4e\u5b66\u6982\u8bba\u300b\uff08\u4e2d\u56fd\u4eba\u6c11\u5927\u5b66\u51fa\u7248\u793e\uff09\u3001\u7f57\u4f2f\u7279\u00b7\u5409\u5c14\u5e73\u300a\u56fd\u9645\u5173\u7cfb\u653f\u6cbb\u7ecf\u6d4e\u5b66\u300b\u300a\u5168\u7403\u653f\u6cbb\u7ecf\u6d4e\u5b66\u300b\u3001\u7f57\u4f2f\u7279\u00b7\u57fa\u6b27\u6c49\u3001\u7ea6\u745f\u592b\u00b7\u5948\u300a\u6743\u529b\u4e0e\u76f8\u4e92\u4f9d\u8d56\u300b\u3001\u82cf\u73ca\u00b7\u65af\u7279\u5170\u5947\u300a\u56fd\u9645\u653f\u6cbb\u7ecf\u6d4e\u5b66\u5bfc\u8bba\uff1a\u56fd\u5bb6\u4e0e\u5e02\u573a\u300b\u3001\u7f57\u4f2f\u7279\u00b7\u8003\u514b\u65af\u300a\u751f\u4ea7\u3001\u6743\u529b\u4e0e\u4e16\u754c\u79e9\u5e8f\u300b\u3001\u4f0a\u66fc\u7ebd\u5c14\u00b7\u6c83\u52d2\u65af\u5766\u300a\u73b0\u4ee3\u4e16\u754c\u4f53\u7cfb\u300b\u3001\u6768\u5149\u658c\u300a\u653f\u6cbb\u5b66\u5bfc\u8bba\u300b\u3001\u738b\u6b63\u6bc5\u300a\u4e16\u754c\u4f53\u7cfb\u8bba\u4e0e\u4e2d\u56fd\u300b\u3001\u6a0a\u52c7\u660e\u300a\u897f\u65b9\u56fd\u9645\u653f\u6cbb\u7ecf\u6d4e\u5b66\u300b\u3002\n\n**\u76ee\u5f55**\n- [Part I \u540d\u8bcd\u89e3\u91ca\uff0859 \u9898\uff09](#part-i-\u540d\u8bcd\u89e3\u91ca59-\u9898)\n- [Part II \u7b80\u7b54\u9898\uff0839 \u9898\uff09](#part-ii-\u7b80\u7b54\u989839-\u9898)\n- [Part III \u8bba\u8ff0\u9898\uff0828 \u9898\uff09](#part-iii-\u8bba\u8ff0\u989828-\u9898)\n- [Part IV \u6309\u5957\u5377\u7d22\u5f15\uff0815 \u5957\uff09](#part-iv-\u6309\u5957\u5377\u7d22\u5f1515-\u5957)\n\n---\n\n## Part I \u540d\u8bcd\u89e3\u91ca\uff0859 \u9898\uff09\n\n> \u4f53\u4f8b\uff1a\u6bcf\u9898 80\u2013150 \u5b57\uff0c\u62ec\u53f7\u6807\u6ce8\u51fa\u73b0\u7684\u6a21\u62df\u5377\u5957\u53f7\u3002\n\n### \u4e00\u3001\u65b0\u5236\u5ea6\u7ecf\u6d4e\u5b66\u4e0e\u516c\u5171\u9009\u62e9\u7c7b\n\n**1. \u516c\u5171\u7269\u54c1\uff08Public Goods\uff09**\u3010\u6a21\u62df-1\u3011\n\u8428\u7f2a\u5c14\u68ee\uff081954\uff09\u63d0\u51fa\u7684\u6982\u5ff5\uff0c\u6307\u540c\u65f6\u5177\u6709**\u975e\u6392\u4ed6\u6027**\uff08\u65e0\u6cd5\u6216\u6210\u672c\u9ad8\u6602\u5730\u963b\u6b62\u4ed6\u4eba\u6d88\u8d39\uff09\u4e0e**\u975e\u7ade\u4e89\u6027**\uff08\u4e00\u4e2a\u4eba\u7684\u6d88\u8d39\u4e0d\u51cf\u5c11\u4ed6\u4eba\u53ef\u83b7\u6d88\u8d39\u91cf\uff09\u7684\u7269\u54c1\u3002\u5728\u56fd\u9645\u5173\u7cfb\u4e2d\uff0c\u56fd\u9645\u5b89\u5168\u79e9\u5e8f\u3001\u81ea\u7531\u8d38\u6613\u4f53\u5236\u3001\u7a33\u5b9a\u7684\u56fd\u9645\u8d27\u5e01\u4f53\u7cfb\u7b49\u88ab\u91d1\u5fb7\u5c14\u4f2f\u683c\u3001\u57fa\u6b27\u6c49\u89c6\u4e3a\u5178\u578b\u7684\"\u56fd\u9645\u516c\u5171\u7269\u54c1\"\u3002\u5176\u4f9b\u7ed9\u6613\u5f15\u53d1\"\u642d\u4fbf\u8f66\"\u95ee\u9898\uff0c\u6545\u9700\u8981\u9738\u6743\u56fd\u6216\u5177\u6709\u7ea6\u675f\u529b\u7684\u56fd\u9645\u5236\u5ea6\u6765\u4fdd\u8bc1\u4f9b\u7ed9\uff08\u53c2\u89c1\u7530\u91ce\u7b2c\u4e8c\u7ae0\uff1b\u5409\u5c14\u5e73\u300a\u5168\u7403\u653f\u6cbb\u7ecf\u6d4e\u5b66\u300b\u7b2c\u56db\u7ae0\uff09\u3002\n\n**2. \u516c\u5171\u6c60\u5858\u8d44\u6e90\uff08Common-Pool Resources, CPR\uff09**\u3010\u6a21\u62df-1\u3011\n\u5965\u65af\u7279\u7f57\u59c6\u5728\u300a\u516c\u5171\u4e8b\u7269\u7684\u6cbb\u7406\u4e4b\u9053\u300b\u4e2d\u63d0\u51fa\uff0c\u6307**\u6d88\u8d39\u4e0a\u5177\u6709\u7ade\u4e89\u6027\u3001\u4f46\u6392\u4ed6\u6027\u4f4e**\u7684\u8d44\u6e90\uff0c\u5982\u6e14\u573a\u3001\u5730\u4e0b\u6c34\u3001\u5927\u6c14\u3001\u516c\u6d77\u6e14\u4e1a\u3001\u8f68\u9053\u4e0e\u9891\u8c31\u7b49\u3002\u5b83\u4e0d\u540c\u4e8e\u7eaf\u516c\u5171\u7269\u54c1\uff08\u975e\u7ade\u4e89\uff09\u4e5f\u4e0d\u540c\u4e8e\u79c1\u4eba\u7269\u54c1\uff08\u9ad8\u6392\u4ed6\uff09\uff0c\u56e0\u800c\u6613\u9677\u5165\"\u516c\u7528\u5730\u7684\u60b2\u5267\"\u3002\u5965\u65af\u7279\u7f57\u59c6\u901a\u8fc7\u591a\u6848\u4f8b\u7814\u7a76\u8bc1\u660e\uff0c\u81ea\u7ec4\u7ec7\u7684\u672c\u5730\u6cbb\u7406\u5728\u6ee1\u8db3\u660e\u6670\u8fb9\u754c\u3001\u76d1\u7763\u3001\u5206\u7ea7\u5236\u88c1\u7b49\u516b\u9879\u8bbe\u8ba1\u539f\u5219\u65f6\uff0c\u53ef\u907f\u514d\u56fd\u5bb6\u5316\u6216\u79c1\u6709\u5316\u4e5f\u80fd\u6301\u7eed\u6cbb\u7406 CPR\u3002\n\n**3. \u642d\u4fbf\u8f66\uff08Free Riding\uff09**\u3010\u6a21\u62df-1\u3011\n\u5965\u5c14\u68ee\u300a\u96c6\u4f53\u884c\u52a8\u7684\u903b\u8f91\u300b\u6838\u5fc3\u547d\u9898\uff1a\u5728\u516c\u5171\u7269\u54c1\u4f9b\u7ed9\u573a\u5408\uff0c\u7531\u4e8e\u6392\u4ed6\u6210\u672c\u9ad8\uff0c\u4efb\u4f55\u4e2a\u4f53\u90fd\u6709\u4e0d\u4ed8\u51fa\u8d21\u732e\u4ecd\u53ef\u4eab\u7528\u6536\u76ca\u7684\u6fc0\u52b1\uff0c\u56e0\u800c\u96c6\u4f53\u63d0\u4f9b\u5e38\u5e38\u4e0d\u8db3\u3002\u5728\u56fd\u9645\u5173\u7cfb\u4e2d\u8868\u73b0\u4e3a**\u5c0f\u56fd\u5bf9\u9738\u6743\u56fd\u63d0\u4f9b\u7684\u5b89\u5168/\u5236\u5ea6/\u8d27\u5e01\u516c\u5171\u54c1\u7684\u514d\u8d39\u642d\u4e58**\uff0c\u662f\u9738\u6743\u7a33\u5b9a\u8bba\u89e3\u91ca\u56fd\u9645\u516c\u5171\u7269\u54c1\u4f9b\u7ed9\u56f0\u5883\u7684\u91cd\u8981\u903b\u8f91\u3002\u5176\u7ed3\u679c\u662f\u516c\u5171\u7269\u54c1\u4f9b\u7ed9\u4e0d\u8db3\u3001\u9738\u6743\u56fd\u8d1f\u62c5\u8fc7\u91cd\uff0c\u6700\u7ec8\u5f71\u54cd\u5408\u4f5c\u7ef4\u7cfb\u3002\n\n**4. \u5916\u90e8\u6027\uff08Externality\uff09**\u3010\u6a21\u62df-2\u3011\n\u5e87\u53e4\u9996\u521b\u3001\u79d1\u65af\u7cfb\u7edf\u5316\u7684\u6982\u5ff5\uff0c\u6307**\u4e00\u9879\u7ecf\u6d4e\u6d3b\u52a8\u5bf9\u672a\u53c2\u4e0e\u8be5\u6d3b\u52a8\u7684\u7b2c\u4e09\u65b9\u9020\u6210\u7684\u3001\u672a\u901a\u8fc7\u4ef7\u683c\u673a\u5236\u53cd\u6620\u7684\u6210\u672c\u6216\u6536\u76ca**\u3002\u8d1f\u5916\u90e8\u6027\u5982\u8de8\u5883\u6c61\u67d3\u3001\u91d1\u878d\u5371\u673a\u7684\u56fd\u9645\u4f20\u67d3\uff1b\u6b63\u5916\u90e8\u6027\u5982\u57fa\u7840\u7814\u7a76\u3001\u75ab\u82d7\u3001\u7a33\u5b9a\u6c47\u7387\u4f53\u7cfb\u3002\u5916\u90e8\u6027\u662f\u5e02\u573a\u5931\u7075\u7684\u4e3b\u8981\u8868\u73b0\u4e4b\u4e00\uff0c\u6784\u6210\u653f\u5e9c\u5e72\u9884\u6216\u56fd\u9645\u5236\u5ea6\u5efa\u8bbe\u7684\u7406\u8bba\u4f9d\u636e\u3002\u5728 IPE \u4e2d\uff0c\u8de8\u5883\u5916\u90e8\u6027\u662f\u5404\u7c7b\u56fd\u9645\u673a\u5236\uff08\u73af\u5883\u3001\u91d1\u878d\u76d1\u7ba1\u3001\u5b8f\u89c2\u534f\u8c03\uff09\u4ea7\u751f\u7684\u6838\u5fc3\u9a71\u52a8\u529b\u3002\n\n**5. \u4ea4\u6613\u6210\u672c\uff08Transaction Costs\uff09**\u3010\u6a21\u62df-1\u3011\n\u79d1\u65af\uff081937\uff09\u9996\u521b\u3001\u5a01\u5ec9\u59c6\u68ee\u7cfb\u7edf\u5316\uff1a\u6307\u4e3a\u8fbe\u6210\u3001\u7b7e\u8ba2\u3001\u76d1\u7763\u548c\u6267\u884c\u5951\u7ea6\u6240\u4ed8\u51fa\u7684\u6210\u672c\uff0c\u5305\u62ec**\u4fe1\u606f\u641c\u5bfb\u6210\u672c\u3001\u8c08\u5224\u4e0e\u7f14\u7ea6\u6210\u672c\u3001\u76d1\u7763\u4e0e\u6267\u884c\u6210\u672c**\u3002\u5728\u56fd\u9645\u5173\u7cfb\u4e2d\uff0c\u56fd\u5bb6\u95f4\u5408\u4f5c\u5fc5\u987b\u514b\u670d\u4fe1\u606f\u4e0d\u5bf9\u79f0\u3001\u8c08\u5224\u56f0\u96be\u3001\u8fdd\u7ea6\u98ce\u9669\u7b49\u95ee\u9898\uff0c\u8fd9\u4e9b\u90fd\u6784\u6210\u4ea4\u6613\u6210\u672c\u3002\u57fa\u6b27\u6c49\u300a\u9738\u6743\u4e4b\u540e\u300b\u501f\u7528\u6b64\u6982\u5ff5\u8bba\u8bc1\uff1a**\u56fd\u9645\u5236\u5ea6\u7684\u6838\u5fc3\u529f\u80fd\u5c31\u662f\u964d\u4f4e\u56fd\u5bb6\u95f4\u4ea4\u6613\u6210\u672c**\uff08\u63d0\u4f9b\u4fe1\u606f\u3001\u7a33\u5b9a\u9884\u671f\u3001\u964d\u4f4e\u534f\u8bae\u6267\u884c\u6210\u672c\uff09\uff0c\u5373\u4f7f\u5728\u9738\u6743\u8870\u843d\u540e\u4ecd\u80fd\u7ef4\u6301\u5408\u4f5c\u3002\n\n**6. \u79d1\u65af\u7b2c\u4e00\u5b9a\u7406\uff08Coase Theorem I\uff09**\u3010\u6a21\u62df-6\u3011\n\u79d1\u65af\u300a\u793e\u4f1a\u6210\u672c\u95ee\u9898\u300b\uff081960\uff09\uff1a**\u5728\u4ea4\u6613\u6210\u672c\u4e3a\u96f6\u3001\u4ea7\u6743\u6e05\u6670\u754c\u5b9a\u7684\u6761\u4ef6\u4e0b\uff0c\u65e0\u8bba\u521d\u59cb\u4ea7\u6743\u5982\u4f55\u5206\u914d\uff0c\u5e02\u573a\u8c08\u5224\u90fd\u5c06\u5bfc\u81f4\u8d44\u6e90\u7684\u5e15\u7d2f\u6258\u6700\u4f18\u914d\u7f6e**\u3002\u5176\u5728\u56fd\u9645\u5173\u7cfb\u4e2d\u7684\u5f15\u7533\u662f\uff1a\u5f53\u56fd\u9645\u8c08\u5224\u6210\u672c\u6781\u4f4e\u65f6\uff0c\u56fd\u5bb6\u95f4\u5916\u90e8\u6027\u95ee\u9898\u53ef\u901a\u8fc7\u81ea\u613f\u8c08\u5224\u89e3\u51b3\uff0c\u65e0\u9700\u9738\u6743\u6216\u96c6\u4e2d\u5316\u5236\u5ea6\u3002\u8be5\u5b9a\u7406\u662f\u65b0\u5236\u5ea6\u7ecf\u6d4e\u5b66\u7684\u903b\u8f91\u8d77\u70b9\uff0c\u51f8\u663e\u4e86\"\u4ea7\u6743 + \u4ea4\u6613\u6210\u672c\"\u5206\u6790\u6846\u67b6\u7684\u6838\u5fc3\u5730\u4f4d\u3002\n\n**7. \u79d1\u65af\u7b2c\u4e8c\u5b9a\u7406\uff08Coase Theorem II\uff09**\u3010\u6a21\u62df-7\u3011\n\u5373\"\u53cd\u5411\u79d1\u65af\u5b9a\u7406\"\uff1a**\u5728\u4ea4\u6613\u6210\u672c\u4e3a\u6b63\u7684\u73b0\u5b9e\u4e16\u754c\u4e2d\uff0c\u4e0d\u540c\u7684\u4ea7\u6743\u521d\u59cb\u5b89\u6392\u4f1a\u5bfc\u81f4\u4e0d\u540c\u7684\u8d44\u6e90\u914d\u7f6e\u7ed3\u679c\uff0c\u56e0\u800c\u4ea7\u6743\u5236\u5ea6\u8bbe\u8ba1\u672c\u8eab\u5177\u6709\u6548\u7387\u542b\u4e49**\u3002\u8fd9\u4e00\u63a8\u8bba\u89e3\u91ca\u4e86\u5236\u5ea6\u7684\u5fc5\u8981\u6027\u2014\u2014\u65e2\u7136\u73b0\u5b9e\u4e2d\u4ea4\u6613\u6210\u672c\u4e0d\u53ef\u80fd\u4e3a\u96f6\uff0c\u90a3\u4e48\u5982\u4f55\u901a\u8fc7\u5236\u5ea6\u8bbe\u8ba1\u964d\u4f4e\u4ea4\u6613\u6210\u672c\u3001\u5408\u7406\u754c\u5b9a\u4ea7\u6743\u5c31\u6210\u4e3a\u5173\u952e\u95ee\u9898\u3002\u5728 IPE \u4e2d\uff0c\u56fd\u9645\u5236\u5ea6\uff08WTO\u3001IMF\u3001\u6d77\u6d0b\u6cd5\u516c\u7ea6\u7b49\uff09\u6b63\u662f\u901a\u8fc7\u754c\u5b9a\u5404\u56fd\u6743\u5229\u4e49\u52a1\u4ee5\u964d\u4f4e\u4ea4\u6613\u6210\u672c\u3001\u89e3\u51b3\u8de8\u5883\u5916\u90e8\u6027\u3002\n\n**8. \u516c\u7528\u5730\u7684\u60b2\u5267\uff08Tragedy of the Commons\uff09**\u3010\u6a21\u62df-5\u3011\n\u54c8\u4e01\uff08Hardin, 1968\uff09\u5728\u300a\u79d1\u5b66\u300b\u6742\u5fd7\u53d1\u8868\u7684\u547d\u9898\uff1a\u5728\u516c\u5171\u7267\u573a\u4e0a\uff0c\u6bcf\u4e2a\u7267\u6c11\u51fa\u4e8e\u81ea\u5229\u90fd\u503e\u5411\u4e8e\u589e\u52a0\u653e\u7267\u6570\u91cf\uff0c\u56e0\u4e3a\u6536\u76ca\u5f52\u5df1\u3001\u6210\u672c\u7531\u5168\u4f53\u5206\u62c5\uff0c\u6700\u7ec8\u5bfc\u81f4\u8349\u573a\u8fc7\u5ea6\u653e\u7267\u800c\u5d29\u6e83\u3002\u5b83\u5f62\u8c61\u63cf\u7ed8\u4e86**\u516c\u5171\u6c60\u5858\u8d44\u6e90\u56e0\u4ea7\u6743\u4e0d\u6e05\u800c\u88ab\u8fc7\u5ea6\u5229\u7528**\u7684\u56f0\u5883\u3002\u5728\u56fd\u9645\u5173\u7cfb\u4e2d\u5e38\u7528\u4e8e\u89e3\u91ca\u5168\u7403\u516c\u5171\u9886\u57df\uff08\u5927\u6c14\u3001\u6d77\u6d0b\u6e14\u4e1a\u3001\u5730\u4e0b\u6c34\uff09\u7684\u6cbb\u7406\u5931\u7075\uff0c\u4e5f\u662f\u5965\u65af\u7279\u7f57\u59c6 CPR \u81ea\u6cbb\u7814\u7a76\u7684\u7406\u8bba\u9776\u5b50\u3002\n\n**9. \u5e02\u573a\u5931\u7075\uff08Market Failure\uff09**\u3010\u6a21\u62df-11\u3011\n\u65b0\u798f\u5229\u7ecf\u6d4e\u5b66\u6982\u5ff5\uff0c\u6307**\u5e02\u573a\u673a\u5236\u5728\u67d0\u4e9b\u60c5\u5f62\u4e0b\u65e0\u6cd5\u5b9e\u73b0\u8d44\u6e90\u7684\u5e15\u7d2f\u6258\u6700\u4f18\u914d\u7f6e**\u3002\u4e3b\u8981\u8868\u73b0\u5305\u62ec\uff1a\u2460\u516c\u5171\u7269\u54c1\u4f9b\u7ed9\u4e0d\u8db3\uff1b\u2461\u5916\u90e8\u6027\u5185\u5316\u56f0\u96be\uff1b\u2462\u4fe1\u606f\u4e0d\u5bf9\u79f0\uff08\u67e0\u6aac\u5e02\u573a\uff09\uff1b\u2463\u5784\u65ad\u4e0e\u4e0d\u5b8c\u5168\u7ade\u4e89\uff1b\u2464\u5b8f\u89c2\u7ecf\u6d4e\u4e0d\u7a33\u5b9a\u3002\u5e02\u573a\u5931\u7075\u6784\u6210\u653f\u5e9c\u5e72\u9884\u7684\u4f20\u7edf\u7406\u7531\u3002\u5728 IPE \u4e2d\uff0c\u8de8\u5883\u5e02\u573a\u5931\u7075\uff08\u8de8\u5883\u5916\u90e8\u6027\u3001\u56fd\u9645\u516c\u5171\u7269\u54c1\uff09\u662f\u56fd\u9645\u5236\u5ea6\u4ea7\u751f\u7684\u6838\u5fc3\u52a8\u56e0\uff08\u53c2\u89c1\u7530\u91ce\u7b2c\u4e8c\u7ae0\uff09\u3002\n\n**10. \u653f\u5e9c\u5931\u7075\uff08Government Failure\uff09**\u3010\u6a21\u62df-11\u3011\n\u516c\u5171\u9009\u62e9\u5b66\u6d3e\uff08\u5e03\u574e\u5357\u3001\u5854\u6d1b\u514b\uff09\u9488\u5bf9\"\u5e02\u573a\u5931\u7075\u5c31\u9700\u653f\u5e9c\u5e72\u9884\"\u7684\u547d\u9898\u63d0\u51fa\u7684\u53cd\u9a73\uff1a\u653f\u5e9c\u672c\u8eab\u4ea6\u53d7\u4fe1\u606f\u7ea6\u675f\u3001\u5bfb\u79df\u4fb5\u8680\u3001\u5b98\u50da\u5229\u76ca\u3001\u653f\u6cbb\u5546\u4e1a\u5468\u671f\u7b49\u5f71\u54cd\uff0c\u5e72\u9884\u6548\u679c\u53ef\u80fd\u6bd4\u5e02\u573a\u5931\u7075\u66f4\u7cdf\u3002\u8868\u73b0\u4e3a\uff1a\u2460\u4fe1\u606f\u4e0d\u8db3\u5bfc\u81f4\u7684\u653f\u7b56\u5931\u8bef\uff1b\u2461\u5229\u76ca\u96c6\u56e2\u4fd8\u83b7\uff1b\u2462\u5b98\u50da\u673a\u6784\u6269\u5f20\u503e\u5411\uff1b\u2463\u653f\u7b56\u65f6\u6ede\u4e0e\u77ed\u89c6\u3002\u653f\u5e9c\u5931\u7075\u8bba\u662f\u65b0\u81ea\u7531\u4e3b\u4e49\u6539\u9769\uff08\u51cf\u7a0e\u3001\u653e\u677e\u7ba1\u5236\u3001\u79c1\u6709\u5316\uff09\u7684\u91cd\u8981\u7406\u8bba\u652f\u6491\u3002\n\n**11. \u5bfb\u79df\uff08Rent-seeking\uff09**\u3010\u6a21\u62df-12\u3011\n\u56fe\u6d1b\u514b\uff08Tullock, 1967\uff09\u9996\u521b\u3001\u514b\u9c81\u683c\uff08Krueger, 1974\uff09\u6b63\u5f0f\u547d\u540d\u7684\u6982\u5ff5\uff1a\u6307**\u7ecf\u6d4e\u4e3b\u4f53\u4e3a\u83b7\u53d6\u6216\u7ef4\u6301\u653f\u5e9c\u521b\u9020\u7684\u3001\u8d85\u8fc7\u5e02\u573a\u7ade\u4e89\u6240\u80fd\u7ed9\u4e88\u7684\u8d85\u989d\u6536\u76ca\uff08\"\u79df\u91d1\"\uff09\u800c\u8fdb\u884c\u7684\u975e\u751f\u4ea7\u6027\u8d44\u6e90\u652f\u51fa**\uff0c\u5982\u6e38\u8bf4\u3001\u8d3f\u8d42\u3001\u884c\u653f\u8bc9\u8bbc\u3001\u884c\u4e1a\u7ec4\u7ec7\u7b49\u3002\u5bfb\u79df\u662f\u653f\u5e9c\u5931\u7075\u7684\u5fae\u89c2\u673a\u5236\uff0c\u5bf9 IPE \u7684\u91cd\u8981\u542f\u793a\u5728\u4e8e\uff1a\u8d38\u6613\u4fdd\u62a4\u653f\u7b56\u3001\u6c47\u7387\u7ba1\u5236\u3001\u4ea7\u4e1a\u8865\u8d34\u7b49\u90fd\u4f1a\u5f15\u53d1\u4f01\u4e1a\u5bfb\u79df\u884c\u4e3a\uff0c\u6700\u7ec8\u5bfc\u81f4\u653f\u7b56\u88ab\u7279\u6b8a\u5229\u76ca\u4fd8\u83b7\u3001\u793e\u4f1a\u51c0\u798f\u5229\u635f\u5931\u3002\n\n**12. \u963f\u7f57\u4e0d\u53ef\u80fd\u5b9a\u7406\uff08Arrow's Impossibility Theorem\uff09**\u3010\u6a21\u62df-6\u300114\u3011\n\u963f\u7f57\uff081951\uff09\u5728\u300a\u793e\u4f1a\u9009\u62e9\u4e0e\u4e2a\u4eba\u4ef7\u503c\u300b\u4e2d\u8bc1\u660e\uff1a\u5f53\u5b58\u5728\u4e09\u4e2a\u6216\u4ee5\u4e0a\u5907\u9009\u65b9\u6848\u65f6\uff0c**\u4e0d\u53ef\u80fd\u5b58\u5728\u4e00\u4e2a\u540c\u65f6\u6ee1\u8db3\u65e0\u9650\u5236\u5b9a\u4e49\u57df\u3001\u5e15\u7d2f\u6258\u539f\u5219\u3001\u72ec\u7acb\u4e8e\u65e0\u5173\u5907\u9009\u65b9\u6848\u3001\u975e\u72ec\u88c1**\u7b49\u6761\u4ef6\u7684\u793e\u4f1a\u504f\u597d\u51fd\u6570\u3002\u8be5\u5b9a\u7406\u52a8\u6447\u4e86\u529f\u5229\u4e3b\u4e49\u798f\u5229\u7ecf\u6d4e\u5b66\u57fa\u7840\uff0c\u63ed\u793a**\u6c11\u4e3b\u96c6\u4f53\u51b3\u7b56\u672c\u8eab\u7684\u5185\u5728\u6096\u8bba**\uff0c\u5bf9\u516c\u5171\u9009\u62e9\u7406\u8bba\u548c\u5236\u5ea6\u8bbe\u8ba1\u5f71\u54cd\u6df1\u8fdc\u3002\u5176\u56fd\u9645\u5173\u7cfb\u542b\u4e49\u662f\uff1a\u591a\u8fb9\u8c08\u5224\u4e2d\u6295\u7968\u6096\u8bba\u4e0e\u8bae\u7a0b\u64cd\u7eb5\u4e0d\u53ef\u907f\u514d\uff0c\u5236\u5ea6\u8bbe\u8ba1\u5fc5\u987b\u6b63\u89c6\u96c6\u4f53\u51b3\u7b56\u7684\u5185\u5728\u5f20\u529b\u3002\n\n**13. \u534f\u8c03\u578b\u535a\u5f08\uff08Coordination Game\uff09**\u3010\u6a21\u62df-6\u3011\n\u535a\u5f08\u8bba\u5206\u7c7b\u7684\u4e00\u7c7b\u535a\u5f08\uff0c**\u5b58\u5728\u591a\u91cd\u7eb3\u4ec0\u5747\u8861\uff0c\u4e14\u53c2\u4e0e\u8005\u504f\u597d\u76f8\u540c\u5747\u8861\uff08\u5747\u8861\u4e4b\u95f4\u65e0\u5e15\u7d2f\u6258\u6392\u5e8f\u51b2\u7a81\uff0c\u4f46\u6709\u4e0d\u540c\u534f\u8c03\u70b9\uff09**\u3002\u5178\u578b\u5982\"\u730e\u9e7f\u535a\u5f08\"\"\u5de6\u884c\u53f3\u884c\"\u3002\u5176\u6838\u5fc3\u96be\u9898\u662f**\u9884\u671f\u534f\u8c03**\u800c\u975e\u5408\u4f5c\u6fc0\u52b1\u2014\u2014\u53c2\u4e0e\u8005\u90fd\u613f\u610f\u5408\u4f5c\uff0c\u53ea\u662f\u4e0d\u77e5\u9053\u9009\u54ea\u4e2a\u5747\u8861\u3002\u56fd\u9645\u5236\u5ea6\u5728\u534f\u8c03\u578b\u535a\u5f08\u4e2d\u626e\u6f14**\u7126\u70b9\u63d0\u4f9b\u8005**\u89d2\u8272\uff0c\u5982\u56fd\u9645\u5ea6\u91cf\u8861\u3001\u6280\u672f\u6807\u51c6\u3001SWIFT \u62a5\u6587\u89c4\u8303\uff08\u53c2\u89c1\u7530\u91ce\u7b2c\u4e09\u7ae0\uff09\u3002\n\n**14. \u534f\u4f5c\u578b\u535a\u5f08\uff08Collaboration Game\uff09**\u3010\u6a21\u62df-6\u300114\u3011\n\u5bf9\u5e94\"\u56da\u5f92\u56f0\u5883\"\u578b\u535a\u5f08\uff0c**\u5b58\u5728\u552f\u4e00\u5e15\u7d2f\u6258\u4f18\u4e8e\u7eb3\u4ec0\u5747\u8861\u7684\u5408\u4f5c\u7ed3\u679c\uff0c\u4f46\u4e2a\u4f53\u7406\u6027\u4f1a\u5bfc\u81f4\u80cc\u53db**\u3002\u5176\u6838\u5fc3\u96be\u9898\u662f**\u6fc0\u52b1\u95ee\u9898**\uff1a\u6bcf\u4e2a\u53c2\u4e0e\u8005\u90fd\u6709\u8fdd\u80cc\u534f\u8bae\u7684\u8bf1\u60d1\uff0c\u56e0\u6b64\u5236\u5ea6\u9700\u8981\u63d0\u4f9b\u76d1\u7763\u3001\u4fe1\u606f\u548c\u60e9\u7f5a\u673a\u5236\u4ee5\u7ef4\u6301\u5408\u4f5c\u3002WTO \u7684\u4e89\u7aef\u89e3\u51b3\u673a\u5236\u3001\u300a\u5df4\u9ece\u534f\u5b9a\u300b\u7684\u900f\u660e\u5ea6\u6846\u67b6\u3001\u56fd\u9645\u91d1\u878d\u76d1\u7ba1\u7684\u540c\u884c\u8bc4\u4f30\u7b49\u90fd\u662f\u4e3a\u534f\u4f5c\u578b\u535a\u5f08\u8bbe\u8ba1\u7684\u5236\u5ea6\uff08\u53c2\u89c1\u7530\u91ce\u7b2c\u4e09\u7ae0\uff09\u3002\n\n**15. \u56da\u5f92\u56f0\u5883\uff08Prisoner's Dilemma\uff09**\u3010\u6a21\u62df-5\u300113\u3011\n\u56fe\u514b 1950 \u5e74\u63d0\u51fa\u7684\u535a\u5f08\u6a21\u578b\uff1a\u4e24\u540d\u5acc\u72af\u88ab\u5206\u522b\u5ba1\u8baf\uff0c**\u5766\u767d\u662f\u5404\u81ea\u7684\u5360\u4f18\u7b56\u7565**\uff0c\u4f46\u53cc\u65b9\u90fd\u5766\u767d\u7684\u7ed3\u679c\uff08\u91cd\u5224\uff09\u4e25\u683c\u6b21\u4e8e\u53cc\u65b9\u90fd\u4e0d\u5766\u767d\uff08\u8f7b\u5224\uff09\u3002\u5176\u63ed\u793a\u4e86**\u4e2a\u4f53\u7406\u6027\u4e0e\u96c6\u4f53\u7406\u6027\u7684\u6096\u8bba**\u3002\u5728 IPE \u4e2d\u5e38\u7528\u4e8e\u89e3\u91ca\u8d38\u6613\u4fdd\u62a4\u3001\u519b\u5907\u7ade\u8d5b\u3001\u6e29\u5ba4\u6c14\u4f53\u51cf\u6392\u7b49\u9886\u57df\u7684\u5408\u4f5c\u56f0\u5883\uff0c\u8bba\u8bc1\u56fd\u9645\u5236\u5ea6\u901a\u8fc7\u91cd\u590d\u535a\u5f08\u3001\u4fe1\u606f\u900f\u660e\u3001\u60e9\u7f5a\u673a\u5236\u5c06\u4e00\u6b21\u6027 PD \u8f6c\u5316\u4e3a\u53ef\u6301\u7eed\u5408\u4f5c\u7684\u5fc5\u8981\u6027\u3002\n\n### \u4e8c\u3001\u76f8\u4e92\u4f9d\u8d56\u4e0e\u5168\u7403\u5316\u7c7b\n\n**16. \u5168\u7403\u5316\uff08Globalization\uff09**\u3010\u6a21\u62df-2\u3011\n\u6307**\u8de8\u56fd\u754c\u7684\u4eba\u5458\u3001\u5546\u54c1\u3001\u8d44\u672c\u3001\u4fe1\u606f\u3001\u6280\u672f\u3001\u6587\u5316\u7b49\u6d41\u52a8\u89c4\u6a21\u4e0e\u901f\u5ea6\u7684\u7a7a\u524d\u63d0\u5347\uff0c\u5bfc\u81f4\u5404\u56fd\u76f8\u4e92\u4f9d\u8d56\u52a0\u6df1\u7684\u8fc7\u7a0b**\u3002\u5305\u542b\u7ecf\u6d4e\uff08\u8d38\u6613\u3001FDI\u3001\u91d1\u878d\uff09\u3001\u653f\u6cbb\uff08\u6cbb\u7406\u788e\u7247\u5316\u4e0e\u5168\u7403\u6cbb\u7406\u9700\u6c42\uff09\u3001\u6587\u5316\uff08\u4fe1\u606f\u548c\u4ef7\u503c\u89c2\u4f20\u64ad\uff09\u4e09\u5c42\u7ef4\u5ea6\u3002\u5409\u5c14\u5e73\u89c6\u5f53\u4ee3\u5168\u7403\u5316\u4e3a\u7f8e\u56fd\u9738\u6743\u4e0b\u7684\u5e02\u573a\u6269\u5f20\uff1b\u8003\u514b\u65af\u5219\u5f3a\u8c03\u5176\u9636\u7ea7\u4e0e\u610f\u8bc6\u5f62\u6001\u5c5e\u6027\u30021980 \u5e74\u4ee3\u4ee5\u6765\u7531\u65b0\u81ea\u7531\u4e3b\u4e49\u63a8\u52a8\uff0c2008 \u5e74\u5371\u673a\u540e\u9677\u5165\"\u9006\u5168\u7403\u5316\"\u8c03\u6574\u3002\n\n**17. \u5168\u7403\u6cbb\u7406\uff08Global Governance\uff09**\u3010\u6a21\u62df-3\u300113\u3011\n\u8a79\u59c6\u65af\u00b7\u7f57\u897f\u7459\u3001\u5168\u7403\u6cbb\u7406\u59d4\u5458\u4f1a\u63d0\u51fa\uff1a\u6307**\u5728\u65e0\u4e16\u754c\u653f\u5e9c\u7684\u6761\u4ef6\u4e0b\uff0c\u7531\u56fd\u5bb6\u3001\u56fd\u9645\u7ec4\u7ec7\u3001\u8de8\u56fd\u516c\u53f8\u3001NGO\u3001\u4e13\u5bb6\u5171\u540c\u4f53\u7b49\u591a\u79cd\u884c\u4e3a\u4f53\u901a\u8fc7\u6b63\u5f0f\u4e0e\u975e\u6b63\u5f0f\u5236\u5ea6\u5b89\u6392\uff0c\u5bf9\u5168\u7403\u6027\u95ee\u9898\u8fdb\u884c\u7ba1\u7406\u7684\u8fc7\u7a0b**\u3002\u5176\u7279\u5f81\u662f\u591a\u4e2d\u5fc3\u3001\u591a\u5c42\u6b21\u3001\u8de8\u4e3b\u6743\u3001\u89c4\u8303\u591a\u5143\u3002\u6d89\u53ca\u9886\u57df\u5305\u62ec\u6c14\u5019\u53d8\u5316\u3001\u8de8\u56fd\u72af\u7f6a\u3001\u4e92\u8054\u7f51\u3001\u6d41\u884c\u75c5\u3001\u91d1\u878d\u7a33\u5b9a\u3002\u4e2d\u56fd 2010 \u5e74\u4ee3\u540e\u63d0\u51fa\"\u5168\u7403\u6cbb\u7406\u4f53\u7cfb\u6539\u9769\"\u4e3b\u5f20\uff0c\u5f3a\u8c03\u53d1\u5c55\u4e2d\u56fd\u5bb6\u4ee3\u8868\u6027\u63d0\u5347\u3002\n\n**18. \u56fd\u9645\u5236\u5ea6\uff08International Institutions\uff09**\u3010\u6a21\u62df-3\u300112\u3011\n\u57fa\u6b27\u6c49\u5b9a\u4e49\uff1a**\u89c4\u5b9a\u884c\u4e3a\u4f53\u89d2\u8272\u3001\u7ea6\u675f\u884c\u52a8\u3001\u5851\u9020\u9884\u671f\u7684\u4e00\u7ec4\u6301\u7eed\u800c\u76f8\u4e92\u5173\u8054\u7684\u89c4\u5219\uff08\u6b63\u5f0f\u4e0e\u975e\u6b63\u5f0f\uff09**\uff0c\u5305\u62ec\u6b63\u5f0f\u7684\u56fd\u9645\u7ec4\u7ec7\uff08IGO\uff09\u3001\u56fd\u9645\u673a\u5236\uff08regimes\uff09\u548c\u60ef\u4f8b\uff08conventions\uff09\u3002\u5176\u529f\u80fd\u662f\u964d\u4f4e\u4ea4\u6613\u6210\u672c\u3001\u63d0\u4f9b\u4fe1\u606f\u3001\u5851\u9020\u9884\u671f\u3001\u7a33\u5b9a\u5408\u4f5c\u3002\u514b\u62c9\u65af\u7eb3\u8fdb\u4e00\u6b65\u5c06\"\u56fd\u9645\u673a\u5236\"\u7ec6\u5206\u4e3a\u539f\u5219\u3001\u89c4\u8303\u3001\u89c4\u5219\u3001\u51b3\u7b56\u7a0b\u5e8f\u3002\u56fd\u9645\u5236\u5ea6\u662f\u5236\u5ea6\u81ea\u7531\u4e3b\u4e49\u7406\u8bba\u7684\u6838\u5fc3\u6982\u5ff5\uff08\u53c2\u89c1\u57fa\u6b27\u6c49\u300a\u9738\u6743\u4e4b\u540e\u300b\u3001\u7530\u91ce\u7b2c\u4e00\u7ae0\uff09\u3002\n\n**19. \u590d\u5408\u76f8\u4e92\u4f9d\u8d56\uff08Complex Interdependence\uff09**\u3010\u6a21\u62df-3\u3011\n\u57fa\u6b27\u6c49\u3001\u5948\u5728\u300a\u6743\u529b\u4e0e\u76f8\u4e92\u4f9d\u8d56\u300b\uff081977\uff09\u63d0\u51fa\uff0c\u4e0e\u73b0\u5b9e\u4e3b\u4e49\"\u56fd\u5bb6\u4e2d\u5fc3\u3001\u5b89\u5168\u81f3\u4e0a\u3001\u519b\u529b\u4e3a\u672c\"\u7684\u4e16\u754c\u76f8\u5bf9\u7684\u7406\u60f3\u578b\uff0c\u4e09\u5927\u7279\u5f81\uff1a\u2460**\u591a\u6e20\u9053\u8054\u7cfb**\uff08\u653f\u5e9c\u95f4\u3001\u8de8\u653f\u5e9c\u3001\u8de8\u56fd\u793e\u4f1a\u8054\u7cfb\u5e76\u5b58\uff09\uff1b\u2461**\u8bae\u9898\u65e0\u7b49\u7ea7**\uff08\u5b89\u5168\u4e0d\u518d\u4f18\u5148\u4e8e\u7ecf\u6d4e\u3001\u73af\u5883\u7b49\u8bae\u9898\uff09\uff1b\u2462**\u519b\u4e8b\u529b\u91cf\u4f5c\u7528\u4e0b\u964d**\uff08\u5728\u5bcc\u56fd\u95f4\u3001\u7279\u5b9a\u8bae\u9898\u4e0a\u4e0d\u53ef\u7528\u6216\u4f4e\u6548\uff09\u3002\u590d\u5408\u76f8\u4e92\u4f9d\u8d56\u6761\u4ef6\u4e0b\uff0c\u56fd\u9645\u673a\u5236\u548c\u8bae\u9898\u8054\u63a5\u6210\u4e3a\u4e3b\u8981\u6743\u529b\u6765\u6e90\u3002\n\n**20. \u654f\u611f\u6027\u76f8\u4e92\u4f9d\u8d56\uff08Sensitivity Interdependence\uff09**\u3010\u6a21\u62df-2\u3011\n\u57fa\u6b27\u6c49\u3001\u5948\u533a\u5206\u76f8\u4e92\u4f9d\u8d56\u4e24\u4e2a\u7ef4\u5ea6\u4e4b\u4e00\uff1a\u6307**\u5728\u65e2\u5b9a\u653f\u7b56\u6846\u67b6\u4e0b\uff0c\u4e00\u56fd\u53d8\u5316\u5bf9\u53e6\u4e00\u56fd\u9020\u6210\u4ee3\u4ef7\u53cd\u5e94\u7684\u901f\u5ea6\u4e0e\u7a0b\u5ea6**\u3002\u4f8b\u5982 1973 \u5e74\u77f3\u6cb9\u7981\u8fd0\u5bf9\u6b27\u65e5\u7684\u5feb\u901f\u51b2\u51fb\u3002\u5b83\u8861\u91cf**\u77ed\u671f\u5185\u672a\u8c03\u6574\u65f6\u7684\u8106\u5f31\u5ea6**\uff0c\u4f46\u82e5\u4e00\u65b9\u80fd\u8fc5\u901f\u8c03\u6574\u653f\u7b56\uff0c\u654f\u611f\u6027\u53ef\u4e0d\u5fc5\u8f6c\u5316\u4e3a\u8106\u5f31\u6027\u3002\u5728\u6743\u529b\u5206\u6790\u4e2d\uff0c\u654f\u611f\u6027\u8f83\u4f4e\u610f\u5473\u7740\u5bf9\u65b9\u4f9d\u8d56\u4f60\u8f83\u5f3a\u3001\u4f60\u8bae\u4ef7\u5730\u4f4d\u8f83\u9ad8\u3002\n\n**21. \u8106\u5f31\u6027\u76f8\u4e92\u4f9d\u8d56\uff08Vulnerability Interdependence\uff09**\u3010\u6a21\u62df-2\u300115\u3011\n\u57fa\u6b27\u6c49\u3001\u5948\u533a\u5206\u76f8\u4e92\u4f9d\u8d56\u7684\u7b2c\u4e8c\u7ef4\u5ea6\uff0c\u6307**\u5373\u4f7f\u4e00\u56fd\u91c7\u53d6\u8c03\u6574\u653f\u7b56\uff0c\u4ecd\u8981\u4ed8\u51fa\u7684\u4ee3\u4ef7\u7684\u76f8\u5bf9\u7a0b\u5ea6**\uff0c\u53cd\u6620\u6539\u53d8\u653f\u7b56\u6846\u67b6\u540e\u5269\u4f59\u7684\u4e0d\u5229\u540e\u679c\u3002\u4f8b\u5982\u77f3\u6cb9\u7981\u8fd0\u540e\u65e5\u672c\u901a\u8fc7\u8282\u80fd\u3001\u50a8\u5907\u3001\u80fd\u6e90\u591a\u5143\u5316\u7b49\u8c03\u6574\u540e\u4ecd\u627f\u53d7\u7684\u4ee3\u4ef7\u3002\u8106\u5f31\u6027\u6bd4\u654f\u611f\u6027\u66f4\u63a5\u8fd1**\u7ed3\u6784\u6027\u6743\u529b**\uff1a\u4e00\u65b9\u8106\u5f31\u6027\u4f4e\u3001\u5bf9\u65b9\u8106\u5f31\u6027\u9ad8\u65f6\uff0c\u524d\u8005\u83b7\u5f97\u8bae\u4ef7\u4f18\u52bf\u3002\u8be5\u6982\u5ff5\u662f\u76f8\u4e92\u4f9d\u8d56\u5206\u6790\u7684\u6838\u5fc3\u6743\u529b\u6765\u6e90\u3002\n\n### \u4e09\u3001\u7ecf\u6d4e\u53d1\u5c55\u7406\u8bba\u7c7b\n\n**22. \u4e8c\u5143\u7ed3\u6784\u8bba\uff08Dual-Sector Model\uff09**\u3010\u6a21\u62df-1\u3011\n\u5218\u6613\u65af\uff08W. A. Lewis, 1954\uff09\u300a\u52b3\u52a8\u65e0\u9650\u4f9b\u7ed9\u6761\u4ef6\u4e0b\u7684\u7ecf\u6d4e\u53d1\u5c55\u300b\u4e2d\u63d0\u51fa\uff1a**\u53d1\u5c55\u4e2d\u56fd\u5bb6\u7ecf\u6d4e\u5b58\u5728\u4f20\u7edf\u519c\u4e1a\u90e8\u95e8\uff08\u8fb9\u9645\u751f\u4ea7\u7387\u8fd1\u96f6\u3001\u52b3\u52a8\u5269\u4f59\uff09\u4e0e\u73b0\u4ee3\u5de5\u4e1a\u90e8\u95e8\uff08\u9ad8\u751f\u4ea7\u7387\u3001\u4f4e\u5de5\u8d44\u52b3\u52a8\u529b\u4f9b\u7ed9\u5f39\u6027\u8fd1\u65e0\u7a77\uff09\u7684\u4e8c\u5143\u7ed3\u6784**\u3002\u5de5\u4e1a\u90e8\u95e8\u901a\u8fc7\u5438\u7eb3\u519c\u4e1a\u5269\u4f59\u52b3\u52a8\u529b\u5b9e\u73b0\u8d44\u672c\u79ef\u7d2f\uff0c\u76f4\u5230\u519c\u4e1a\u90e8\u95e8\u5de5\u8d44\u4e0a\u5347\u81f3\u4e0e\u5de5\u4e1a\u5e73\u9f50\u7684\"\u5218\u6613\u65af\u62d0\u70b9\"\u3002\u8be5\u6a21\u578b\u89e3\u91ca\u4e86\u5de5\u4e1a\u5316\u8def\u5f84\uff0c\u662f\u53d1\u5c55\u7ecf\u6d4e\u5b66\u5960\u57fa\u7406\u8bba\u4e4b\u4e00\u3002\n\n**23. \u7ecf\u6d4e\u6210\u957f\u9636\u6bb5\u8bba\uff08Stages of Economic Growth\uff09**\u3010\u6a21\u62df-2\u300115\u3011\n\u7f57\u65af\u6258\uff08W. W. Rostow, 1960\uff09\u5728\u300a\u7ecf\u6d4e\u589e\u957f\u7684\u9636\u6bb5\uff1a\u975e\u5171\u4ea7\u515a\u5ba3\u8a00\u300b\u4e2d\u63d0\u51fa\uff1a\u4eba\u7c7b\u7ecf\u6d4e\u53d1\u5c55\u7ecf\u5386**\u4f20\u7edf\u793e\u4f1a\u2014\u8d77\u98de\u524d\u63d0\u6761\u4ef6\u2014\u8d77\u98de\u2014\u6210\u719f\u2014\u5927\u4f17\u6d88\u8d39\u2014\u8d85\u5927\u4f17\u6d88\u8d39**\u516d\u4e2a\u9636\u6bb5\u3002\"\u8d77\u98de\"\u662f\u5173\u952e\u9636\u6bb5\uff0c\u9700\u4e3b\u5bfc\u90e8\u95e8\u3001\u793e\u4f1a\u52a8\u5458\u3001\u5236\u5ea6\u521b\u65b0\u4e09\u5927\u6761\u4ef6\u3002\u8be5\u7406\u8bba\u662f\u51b7\u6218\u65f6\u671f\u7f8e\u56fd\u5bf9\u53d1\u5c55\u4e2d\u56fd\u5bb6\u653f\u7b56\uff08\u5982\"\u8fdb\u6b65\u8054\u76df\"\uff09\u7684\u7406\u8bba\u652f\u6491\uff0c\u66fe\u53d7\u5230\u4f9d\u9644\u8bba\u4e25\u5389\u6279\u8bc4\uff08\u65e0\u89c6\u5916\u90e8\u7ea6\u675f\u3001\u7ebf\u6027\u8fdb\u5316\u8bba\uff09\uff0c\u4f46\u5176\u9636\u6bb5\u5212\u5206\u81f3\u4eca\u4ecd\u6709\u542f\u53d1\u3002\n\n**24. \u957f\u6ce2\u7406\u8bba\uff08Long Wave Theory\uff09**\u3010\u6a21\u62df-3\u3011\n\u5373\u5eb7\u5fb7\u62c9\u5b63\u8036\u592b\u957f\u6ce2\uff0c\u6307\u7ecf\u6d4e\u6d3b\u52a8\u4ee5\u7ea6 **50\u201360 \u5e74\u4e3a\u5468\u671f**\u7684\u6269\u5f20\u2014\u6536\u7f29\u6ce2\u52a8\uff0c\u7531\u6280\u672f\u9769\u547d\u9a71\u52a8\u3002\u6bcf\u4e00\u957f\u6ce2\u5bf9\u5e94\u4e00\u7ec4\u4e3b\u5bfc\u6280\u672f\uff08\u84b8\u6c7d\u673a\u2014\u94c1\u8def\u2014\u7535\u6c14\u2014\u6c7d\u8f66\u2014\u4fe1\u606f\u6280\u672f\uff09\uff0c\u718a\u5f7c\u7279\u5c06\u5176\u4e0e\"\u521b\u9020\u6027\u7834\u574f\"\u548c\u4f01\u4e1a\u5bb6\u521b\u65b0\u6302\u94a9\u3002\u66fc\u5fb7\u5c14\u3001\u963f\u745e\u5409\u7b49\u5de6\u7ffc\u5b66\u8005\u5c06\u5176\u4e0e\u4e16\u754c\u4f53\u7cfb\u5468\u671f\u8054\u7cfb\uff0c\u8bba\u8bc1\u9738\u6743\u66f4\u66ff\u4e0e\u957f\u6ce2\u76f8\u5173\u3002\u5f53\u4e0b\u8bb8\u591a\u7814\u7a76\u5c06 AI\u3001\u65b0\u80fd\u6e90\u89c6\u4e3a\u65b0\u4e00\u8f6e\u957f\u6ce2\u8d77\u70b9\u3002\n\n**25. \u5eb7\u5fb7\u62c9\u5b63\u8036\u592b\u5468\u671f\uff08Kondratieff Cycle\uff09**\u3010\u6a21\u62df-7\u300115\u3011\n\u82cf\u8054\u7ecf\u6d4e\u5b66\u5bb6\u5eb7\u5fb7\u62c9\u5b63\u8036\u592b 1920 \u5e74\u4ee3\u7814\u7a76\u6b27\u7f8e 19 \u4e16\u7eaa\u4ee5\u6765\u4ef7\u683c\u4e0e\u4ea7\u51fa\u6570\u636e\u65f6\u53d1\u73b0\u7684\u7ea6 50 \u5e74\u957f\u6ce2\u3002\u6bcf\u4e00\u6ce2\u5206\u4e3a\u4e0a\u5347\u671f\uff08\u6280\u672f\u5e94\u7528\u3001\u6295\u8d44\u65fa\u76db\u3001\u4ef7\u683c\u4e0a\u5347\uff09\u4e0e\u4e0b\u964d\u671f\uff08\u6295\u8d44\u9971\u548c\u3001\u8fc7\u5269\u3001\u5371\u673a\uff09\u3002\u540e\u88ab\u718a\u5f7c\u7279\u3001\u66fc\u5fb7\u5c14\u3001\u963f\u745e\u5409\u53d1\u5c55\u4e3a\"\u521b\u9020\u6027\u7834\u574f\"\u548c\u4e16\u754c\u4f53\u7cfb\u9738\u6743\u5468\u671f\u7406\u8bba\uff0c\u4e0e\u4e16\u754c\u7ecf\u6d4e\u4e2d\u7684\u9738\u6743\u66f4\u8fed\u3001\u91d1\u878d\u5316\u8d8b\u52bf\u6709\u7406\u8bba\u5bf9\u5e94\uff08\u53c2\u89c1\u738b\u6b63\u6bc5\u300a\u4e16\u754c\u4f53\u7cfb\u8bba\u4e0e\u4e2d\u56fd\u300b\uff09\u3002\n\n**26. \u718a\u5f7c\u7279\u5468\u671f\uff08Schumpeter Cycle\uff09**\u3010\u6a21\u62df-8\u300113\u3011\n\u718a\u5f7c\u7279\u5728\u300a\u7ecf\u6d4e\u5468\u671f\u300b\uff081939\uff09\u4e2d\u7efc\u5408\u77ed\u4e2d\u957f\u4e09\u79cd\u5468\u671f\uff1a**\u57fa\u94a6\u5468\u671f\uff08\u7ea6 40 \u4e2a\u6708\uff0c\u5e93\u5b58\uff09+ \u6731\u683c\u62c9\u5468\u671f\uff089\u201310 \u5e74\uff0c\u8bbe\u5907\u6295\u8d44\uff09+ \u5eb7\u5fb7\u62c9\u5b63\u8036\u592b\u5468\u671f\uff08\u7ea6 50 \u5e74\uff0c\u6280\u672f\u9769\u547d\uff09**\u3002\u5176\u6838\u5fc3\u673a\u5236\u662f**\u4f01\u4e1a\u5bb6\u521b\u65b0\u5e26\u6765\u7684\"\u521b\u9020\u6027\u7834\u574f\"**\uff1a\u65b0\u6280\u672f\u6467\u6bc1\u65e7\u4ea7\u4e1a\u3001\u5f15\u53d1\u7ed3\u6784\u8c03\u6574\uff0c\u5f62\u6210\u6ce2\u6d6a\u5f0f\u53d1\u5c55\u3002\u5b83\u628a\u6280\u672f\u3001\u4f01\u4e1a\u5bb6\u4e0e\u5468\u671f\u7edf\u4e00\u8d77\u6765\uff0c\u662f\u628a\"\u6280\u672f\u53d8\u9769\"\u4f5c\u4e3a\u957f\u671f\u589e\u957f\u6839\u672c\u52a8\u529b\u7684\u7ecf\u5178\u6a21\u578b\u3002\n\n### \u56db\u3001\u56fd\u9645\u8d27\u5e01\u4e0e\u6c47\u7387\u5236\u5ea6\u7c7b\n\n**27. \u91d1\u672c\u4f4d\u5236\uff08Gold Standard\uff09**\u3010\u6a21\u62df-4\u3011\n19 \u4e16\u7eaa\u540e\u671f\u81f3 1914 \u5e74\u76db\u884c\u7684\u56fd\u9645\u8d27\u5e01\u5236\u5ea6\uff0c\u4ee5**\u9ec4\u91d1\u4e3a\u672c\u4f4d\u8d27\u5e01\u3001\u5404\u56fd\u8d27\u5e01\u6309\u6cd5\u5b9a\u542b\u91d1\u91cf\u6302\u94a9\u3001\u81ea\u7531\u94f8\u9020\u4e0e\u81ea\u7531\u5151\u6362\u3001\u9ec4\u91d1\u81ea\u7531\u8fdb\u51fa\u53e3**\u4e3a\u7279\u5f81\u3002\u5176\u5185\u5728\u8c03\u8282\u673a\u5236\u662f\u4f11\u8c1f\"\u4ef7\u683c\u2014\u94f8\u5e01\u6d41\u52a8\u673a\u5236\"\uff1a\u987a\u5dee\u56fd\u9ec4\u91d1\u6d41\u5165\u2192\u8d27\u5e01\u589e\u52a0\u2192\u7269\u4ef7\u4e0a\u5347\u2192\u51fa\u53e3\u51cf\u5c11\uff0c\u53cd\u4e4b\u4ea6\u7136\u3002\u4e00\u6218\u4e2d\u65ad\u540e\u66fe\u4ee5\u91d1\u6c47\u5151\u672c\u4f4d\u5f62\u5f0f\u77ed\u6682\u6062\u590d\uff0c1931 \u5e74\u82f1\u56fd\u8131\u91d1\u540e\u5f7b\u5e95\u5d29\u6e83\u3002\u91d1\u672c\u4f4d\u662f 19 \u4e16\u7eaa\u82f1\u56fd\u9738\u6743\u7684\u8d27\u5e01\u4f53\u5236\u4f9d\u6258\u3002\n\n**28. \u5e03\u96f7\u987f\u68ee\u6797\u4f53\u7cfb\uff08Bretton Woods System\uff09**\u3010\u6a21\u62df-4\u300113\u3011\n1944 \u5e74\u5e03\u96f7\u987f\u68ee\u6797\u4f1a\u8bae\u786e\u7acb\u30011945\u20131971 \u5e74\u8fd0\u884c\u7684\u56fd\u9645\u8d27\u5e01\u4f53\u7cfb\uff0c\u6838\u5fc3\u662f**\"\u53cc\u6302\u94a9\"**\uff1a\u7f8e\u5143\u6309 1 \u76ce\u53f8=35 \u7f8e\u5143\u4e0e\u9ec4\u91d1\u6302\u94a9\uff0c\u5176\u4ed6\u6210\u5458\u56fd\u8d27\u5e01\u6309\u56fa\u5b9a\u5e73\u4ef7\u4e0e\u7f8e\u5143\u6302\u94a9\uff08\u5141\u8bb8 \u00b11% \u6d6e\u52a8\uff09\u3002\u914d\u5957\u8bbe\u7acb IMF\uff08\u6c47\u7387\u76d1\u7763\u4e0e\u77ed\u671f\u56fd\u9645\u6536\u652f\u878d\u8d44\uff09\u4e0e\u4e16\u754c\u94f6\u884c\uff08\u957f\u671f\u53d1\u5c55\u8d37\u6b3e\uff09\u3002\u8be5\u4f53\u7cfb\u53cd\u6620\u7f8e\u56fd\u6218\u540e\u9738\u6743\u5730\u4f4d\uff0c1971 \u5e74\u56e0\u7279\u91cc\u82ac\u96be\u9898\u4e0e\u7f8e\u56fd\u9ec4\u91d1\u5916\u6d41\u800c\u5d29\u6e83\uff0c\u7531 1976 \u5e74\u7259\u4e70\u52a0\u4f53\u7cfb\uff08\u6d6e\u52a8\u6c47\u7387\u5408\u6cd5\u5316\uff09\u7ee7\u627f\u3002\n\n**29. \u56fd\u9645\u8d27\u5e01\u57fa\u91d1\u7ec4\u7ec7\uff08IMF\uff09**\u3010\u6a21\u62df-5\u300114\u3011\n1944 \u5e74\u5e03\u96f7\u987f\u68ee\u6797\u4f1a\u8bae\u8bbe\u7acb\u30011945 \u5e74\u6210\u7acb\u7684\u653f\u5e9c\u95f4\u56fd\u9645\u7ec4\u7ec7\uff0c\u603b\u90e8\u534e\u76db\u987f\u3002\u4e09\u5927\u804c\u80fd\uff1a\u2460**\u6c47\u7387\u76d1\u7763**\uff08\u7b2c\u56db\u6761\u6b3e\u78cb\u5546\uff09\uff1b\u2461**\u56fd\u9645\u6536\u652f\u6551\u52a9**\uff08\u542b\u9644\u6761\u4ef6\u8d37\u6b3e\uff0cconditionality\uff09\uff1b\u2462**\u6280\u672f\u63f4\u52a9\u4e0e\u80fd\u529b\u5efa\u8bbe**\u3002\u6295\u7968\u6743\u6309\u4efd\u989d\u52a0\u6743\uff0c\u7f8e\u56fd\u6301\u6709 16% \u4ee5\u4e0a\u4e8b\u5b9e\u5426\u51b3\u6743\u3002\u5176\u7ed3\u6784\u4e0e\u653f\u7b56\u957f\u671f\u88ab\u53d1\u5c55\u4e2d\u56fd\u5bb6\u6279\u8bc4\u4e3a\u53cd\u6620\"\u534e\u76db\u987f\u5171\u8bc6\"\u504f\u597d\u30022010 \u5e74\u6539\u9769\u540e\u4e2d\u56fd\u4efd\u989d\u5347\u81f3\u7b2c\u4e09\u4f4d\uff0c\u4f46 SDR \u7bee\u5b50\u91cd\u6784\u4e0e\u6cbb\u7406\u6c11\u4e3b\u5316\u4ecd\u662f\u6539\u9769\u6838\u5fc3\u8bae\u9898\u3002\n\n**30. \u4e16\u754c\u8d38\u6613\u7ec4\u7ec7\uff08WTO\uff09**\u3010\u6a21\u62df-5\u3011\n1995 \u5e74\u7531 GATT \u5347\u7ea7\u800c\u6210\u7684\u591a\u8fb9\u8d38\u6613\u7ec4\u7ec7\uff0c\u76ee\u524d 164 \u4e2a\u6210\u5458\uff0c\u603b\u90e8\u65e5\u5185\u74e6\u3002\u4e09\u5927\u57fa\u672c\u539f\u5219\uff1a**\u975e\u6b67\u89c6\uff08\u6700\u60e0\u56fd\u5f85\u9047 + \u56fd\u6c11\u5f85\u9047\uff09\u3001\u4e92\u60e0\u51cf\u8ba9\u3001\u900f\u660e\u5ea6**\u3002\u4e09\u5927\u804c\u80fd\uff1a\u2460\u7ba1\u7406\u591a\u8fb9\u8d38\u6613\u534f\u5b9a\uff1b\u2461\u63d0\u4f9b\u8c08\u5224\u8bba\u575b\uff1b\u2462\u4e89\u7aef\u89e3\u51b3\uff08DSB\uff0c\"\u7687\u51a0\u4e0a\u7684\u660e\u73e0\"\uff09\u3002\u6db5\u76d6 GATT\uff08\u8d27\u7269\uff09\u3001GATS\uff08\u670d\u52a1\uff09\u3001TRIPS\uff08\u77e5\u8bc6\u4ea7\u6743\uff09\u7b49\u3002\u4e2d\u56fd 2001 \u5e74\u52a0\u5165\uff1b2017 \u5e74\u4ee5\u6765\u4e0a\u8bc9\u673a\u6784\u56e0\u7f8e\u56fd\u963b\u6320\u800c\u505c\u6446\uff0c\u591a\u54c8\u56de\u5408\u8c08\u5224\u957f\u671f\u50f5\u5c40\u51f8\u663e\u591a\u8fb9\u673a\u5236\u56f0\u5883\u3002\n\n### \u4e94\u3001\u8d38\u6613\u7406\u8bba\u4e0e\u8d38\u6613\u653f\u6cbb\u7c7b\n\n**31. \u8d6b\u514b\u6b47\u5c14\u2014\u4fc4\u6797\u6a21\u578b\uff08Heckscher-Ohlin Model\uff09**\u3010\u6a21\u62df-7\u3011\n\u65b0\u53e4\u5178\u8d38\u6613\u7406\u8bba\u7684\u6838\u5fc3\u6a21\u578b\uff1a\u5728\u4e24\u56fd\u2014\u4e24\u5546\u54c1\u2014\u4e24\u8981\u7d20\u6846\u67b6\u4e0b\uff0c**\u4e00\u56fd\u5e94\u51fa\u53e3\u5bc6\u96c6\u4f7f\u7528\u5176\u76f8\u5bf9\u4e30\u88d5\u8981\u7d20\u7684\u5546\u54c1\uff0c\u8fdb\u53e3\u5bc6\u96c6\u4f7f\u7528\u5176\u76f8\u5bf9\u7a00\u7f3a\u8981\u7d20\u7684\u5546\u54c1**\u3002\u5176\u653f\u6cbb\u542b\u4e49\u7531\u65af\u6258\u5c14\u73c0\u2014\u8428\u7f2a\u5c14\u68ee\u5b9a\u7406\u7ed9\u51fa\uff1a\u8d38\u6613\u5f00\u653e\u5c06**\u62ac\u5347\u4e00\u56fd\u76f8\u5bf9\u4e30\u88d5\u8981\u7d20\u7684\u5b9e\u9645\u62a5\u916c\uff0c\u538b\u4f4e\u76f8\u5bf9\u7a00\u7f3a\u8981\u7d20\u7684\u5b9e\u9645\u62a5\u916c**\u3002\u8fd9\u6784\u6210\u8d38\u6613\u653f\u6cbb\u8054\u76df\u5206\u6790\u7684\u57fa\u7840\uff08\u5982\u53d1\u8fbe\u56fd\u5bb6\u8d44\u672c\u62e5\u62a4\u81ea\u7531\u8d38\u6613\u3001\u52b3\u52a8\u53cd\u5bf9\uff0c\u53cd\u4e4b\u53d1\u5c55\u4e2d\u56fd\u5bb6\u76f8\u53cd\uff09\u3002\n\n**32. \u674e\u5609\u56fe\u2014\u7ef4\u7eb3\u6a21\u578b\uff08Ricardo-Viner / Specific Factors Model\uff09**\u3010\u6a21\u62df-7\u300115\u3011\n\u5bf9 H-O \u6a21\u578b\u7684\u4fee\u8ba2\uff1a\u5047\u8bbe**\u90e8\u5206\u8981\u7d20\u5728\u4ea7\u4e1a\u95f4\u6d41\u52a8\u6027\u6781\u4f4e\uff08\u4ea7\u4e1a\u4e13\u7528\uff09**\u2014\u2014\u5982\u8bbe\u5907\u3001\u6280\u672f\u5de5\u4eba\u5728\u77ed\u671f\u5185\u4e0d\u80fd\u8f6c\u6362\u90e8\u95e8\u3002\u7ed3\u8bba\u662f\uff1a\u8d38\u6613\u5f00\u653e\u540e\uff0c**\u6536\u76ca\u6cbf\"\u4ea7\u4e1a\u90e8\u95e8\u7ebf\"\u5212\u5206**\u2014\u2014\u51fa\u53e3\u90e8\u95e8\uff08\u4e0d\u8bba\u8d44\u672c\u8fd8\u662f\u52b3\u52a8\uff09\u53d7\u76ca\uff0c\u8fdb\u53e3\u7ade\u4e89\u90e8\u95e8\uff08\u4e0d\u8bba\u8d44\u672c\u8fd8\u662f\u52b3\u52a8\uff09\u53d7\u635f\u3002\u8fd9\u4e00\u6a21\u578b\u7531 Hiscox \u7b49\u7528\u4e8e\u89e3\u91ca\u53d1\u8fbe\u56fd\u5bb6\u4e2d\u8de8\u9636\u7ea7\u7684\u4ea7\u4e1a\u8054\u76df\u4e0e\u8d38\u6613\u653f\u6cbb\u5206\u5316\uff08\u5982\u7f8e\u56fd\u6c7d\u8f66\u4e1a\u5de5\u4f1a\u4e0e\u8d44\u672c\u4e00\u81f4\u53cd\u5bf9\u81ea\u7531\u8d38\u6613\uff09\u3002\n\n**33. \u4fdd\u62a4\u5f85\u552e\u6a21\u578b\uff08Protection for Sale\uff09**\u3010\u6a21\u62df-7\u300114\u3011\n\u683c\u7f57\u65af\u66fc\u4e0e\u8d6b\u5c14\u666e\u66fc\uff08Grossman & Helpman, 1994\uff09\u5efa\u7acb\u7684\u653f\u6cbb\u7ecf\u6d4e\u5b66\u6a21\u578b\uff1a**\u653f\u5e9c\u4f5c\u4e3a\u8ffd\u6c42\u653f\u6cbb\u732e\u91d1 + \u793e\u4f1a\u798f\u5229\u52a0\u6743\u548c\u7684\u76ee\u6807\u51fd\u6570\u6700\u5927\u5316\u8005\uff0c\u5728\u653f\u6cbb\u7ec4\u7ec7\u5316\u7684\u4ea7\u4e1a\u83b7\u5f97\u66f4\u9ad8\u4fdd\u62a4**\u3002\u5176\u5173\u952e\u7ed3\u8bba\uff1a\u2460\u4ea7\u4e1a\u7684\u653f\u6cbb\u7ec4\u7ec7\u7a0b\u5ea6\uff08\u6350\u6b3e\u80fd\u529b\uff09\u6b63\u5411\u5f71\u54cd\u4fdd\u62a4\u6c34\u5e73\uff1b\u2461\u8fdb\u53e3\u9700\u6c42\u5f39\u6027\u8d8a\u4f4e\u3001\u8fdb\u53e3\u6e17\u900f\u7387\u8d8a\u9ad8\uff0c\u4fdd\u62a4\u503e\u5411\u8d8a\u5927\u3002\u8be5\u6a21\u578b\u4e3a\u7f8e\u5f0f\u8d38\u6613\u653f\u7b56\u7684\u56fd\u4f1a\u2014\u5229\u76ca\u96c6\u56e2\u7ed3\u6784\u63d0\u4f9b\u4e86\u5fae\u89c2\u57fa\u7840\uff08\u53c2\u89c1\u7530\u91ce\u7b2c\u516d\u7ae0\uff09\u3002\n\n**34. \u884c\u4e1a\u95f4\u8981\u7d20\u6d41\u52a8\u7a0b\u5ea6\uff08Inter-industry Factor Mobility\uff09**\u3010\u6a21\u62df-8\u300113\u3011\n\u6bd4\u8f83\u653f\u6cbb\u7ecf\u6d4e\u5b66\u5173\u4e8e\u8981\u7d20\u6d41\u52a8\u6027\u7684\u6838\u5fc3\u53d8\u91cf\uff1a**\u8861\u91cf\u8d44\u672c\u3001\u52b3\u52a8\u7b49\u751f\u4ea7\u8981\u7d20\u80fd\u5426\u5728\u4ea7\u4e1a\u90e8\u95e8\u95f4\u4f4e\u6210\u672c\u5730\u91cd\u65b0\u914d\u7f6e**\u3002\u8981\u7d20\u6d41\u52a8\u6027\u9ad8 \u2192 H-O / \u65af\u6258\u5c14\u73c0-\u8428\u7f2a\u5c14\u68ee\u903b\u8f91\u6210\u7acb\uff0c\u653f\u6cbb\u8054\u76df\u6cbf**\u9636\u7ea7\u7ebf**\uff08\u8d44\u672c vs \u52b3\u52a8\uff09\u5f62\u6210\uff1b\u8981\u7d20\u6d41\u52a8\u6027\u4f4e \u2192 \u674e\u5609\u56fe-\u7ef4\u7eb3\u6a21\u578b\u903b\u8f91\u6210\u7acb\uff0c\u653f\u6cbb\u8054\u76df\u6cbf**\u4ea7\u4e1a\u7ebf**\uff08\u90e8\u95e8\u5185\u8d44\u672c+\u52b3\u52a8 vs \u5176\u4ed6\u90e8\u95e8\uff09\u5f62\u6210\u3002Rogowski\u3001Hiscox \u636e\u6b64\u5206\u6790\u4e0d\u540c\u56fd\u5bb6\u8d38\u6613\u653f\u6cbb\u683c\u5c40\u5dee\u5f02\u3002\n\n**35. \u793e\u4f1a\u8054\u76df\uff08Social Coalitions\uff09**\u3010\u6a21\u62df-12\u3011\n\u7f57\u683c\u592b\u65af\u57fa\uff08Rogowski, 1989\uff09\u300a\u5546\u4e1a\u4e0e\u8054\u76df\u300b\u63d0\u51fa\u7684\u6982\u5ff5\uff1a\u6307**\u9762\u5bf9\u8d38\u6613\u5f00\u653e\u6216\u51b2\u51fb\u65f6\uff0c\u793e\u4f1a\u5185\u90e8\u56e0\u8981\u7d20\u53d7\u76ca\u2014\u53d7\u635f\u683c\u5c40\u5f62\u6210\u7684\u9636\u7ea7\u6216\u4ea7\u4e1a\u653f\u6cbb\u8054\u76df**\uff0c\u8fdb\u800c\u5851\u9020\u4e00\u56fd\u5bf9\u5916\u7ecf\u6d4e\u653f\u7b56\u3002\u8981\u7d20\u4e30\u88d5\u5ea6\uff08\u571f\u5730\u3001\u52b3\u52a8\u3001\u8d44\u672c\uff09+ \u6d41\u52a8\u6027\u51b3\u5b9a\u8054\u76df\u5f62\u5f0f\uff1a\u9ad8\u6d41\u52a8\u6027\u4e0b\u5f62\u6210\u9636\u7ea7\u8054\u76df\uff08\"\u7ea2 vs \u7eff vs \u57ce\u5e02\"\uff09\uff0c\u4f4e\u6d41\u52a8\u6027\u4e0b\u5f62\u6210\u4ea7\u4e1a\u8054\u76df\u3002\u793e\u4f1a\u8054\u76df\u5206\u6790\u662f\"\u98a0\u5012\u7684\u7b2c\u4e8c\u610f\u8c61\"\u4f20\u7edf\u7684\u91cd\u8981\u6848\u4f8b\u3002\n\n### \u516d\u3001\u9738\u6743\u4e0e\u56fd\u9645\u79e9\u5e8f\u7c7b\n\n**36. \u7ed3\u6784\u6027\u6743\u529b\uff08Structural Power\uff09**\u3010\u6a21\u62df-9\u3011\n\u82cf\u73ca\u00b7\u65af\u7279\u5170\u5947\u5728\u300a\u56fd\u5bb6\u4e0e\u5e02\u573a\u300b\uff081988\uff09\u63d0\u51fa\uff0c**\u4e0e\"\u5173\u7cfb\u6027\u6743\u529b\"\uff08A \u8ba9 B \u505a\u4e0d\u613f\u505a\u7684\u4e8b\uff09\u76f8\u5bf9\u7684\u3001\u80fd\u5851\u9020\u4ed6\u4eba\u9009\u62e9\u6846\u67b6\u7684\u6743\u529b**\u3002\u5979\u533a\u5206\u56db\u79cd\u7ed3\u6784\u6027\u6743\u529b\uff1a\u2460**\u5b89\u5168\u7ed3\u6784**\uff08\u63d0\u4f9b\u5b89\u5168\u7684\u80fd\u529b\uff09\uff1b\u2461**\u751f\u4ea7\u7ed3\u6784**\uff08\u51b3\u5b9a\u4ec0\u4e48\u3001\u7531\u8c01\u3001\u600e\u4e48\u751f\u4ea7\uff09\uff1b\u2462**\u91d1\u878d\u7ed3\u6784**\uff08\u51b3\u5b9a\u4fe1\u7528\u521b\u9020\u4e0e\u8d27\u5e01\u5236\u5ea6\uff09\uff1b\u2463**\u77e5\u8bc6\u7ed3\u6784**\uff08\u51b3\u5b9a\u4f55\u4e3a\u77e5\u8bc6\u3001\u8c01\u80fd\u83b7\u5f97\u3001\u5982\u4f55\u4f20\u64ad\uff09\u3002\u7ed3\u6784\u6027\u6743\u529b\u53ef\u89e3\u91ca\u7f8e\u56fd\"\u8d85\u989d\u7279\u6743\"\u548c\u897f\u65b9\u5728\u5168\u7403\u6cbb\u7406\u4e2d\u7684\u8bdd\u8bed\u4e3b\u5bfc\u5730\u4f4d\u3002\n\n**37. \u8def\u5f84\u4f9d\u8d56\uff08Path Dependence\uff09**\u3010\u6a21\u62df-9\u3011\n\u8bfa\u601d\u501f\u81ea\u6f14\u5316\u7ecf\u6d4e\u5b66\u7684\u6838\u5fc3\u6982\u5ff5\uff1a\u6307**\u5236\u5ea6\u4e00\u65e6\u786e\u7acb\uff0c\u4f1a\u56e0\u62a5\u916c\u9012\u589e\u673a\u5236\uff08\u5b66\u4e60\u6548\u5e94\u3001\u534f\u8c03\u6548\u5e94\u3001\u9002\u5e94\u9884\u671f\u3001\u7f51\u7edc\u6548\u5e94\uff09\u800c\u81ea\u6211\u5f3a\u5316\uff0c\u4f7f\u540e\u7eed\u9009\u62e9\u88ab\u65e2\u6709\u8def\u5f84\u9501\u5b9a**\u3002\u5373\u4fbf\u5b58\u5728\u66f4\u4f18\u66ff\u4ee3\u65b9\u6848\uff0c\u91cd\u65b0\u5efa\u7acb\u4e5f\u9762\u4e34\u9ad8\u989d\u8f6c\u6362\u6210\u672c\u3002\u5b83\u89e3\u91ca\u4e86\"\u5236\u5ea6\u9ecf\u6027\"\u548c\u53d1\u5c55\u8f68\u8ff9\u7684\u56fd\u522b\u5dee\u5f02\uff08\"\u8bfa\u601d\u6096\u8bba\"\uff09\uff0c\u662f\u5386\u53f2\u5236\u5ea6\u4e3b\u4e49\u7684\u6838\u5fc3\u673a\u5236\u3002\u5728 IPE \u4e2d\u53ef\u7528\u4e8e\u89e3\u91ca\u7f8e\u5143\u4e3b\u5bfc\u5730\u4f4d\u3001\u5e03\u96f7\u987f\u68ee\u6797\u673a\u6784\u6301\u7eed\u5b58\u5728\u7b49\u73b0\u8c61\u3002\n\n**38. \u7f57\u65af\u514b\u5170\u65af\u7684\u8d38\u6613\u56fd\uff08Trading State\uff09**\u3010\u6a21\u62df-9\u3011\n\u7406\u67e5\u5fb7\u00b7\u7f57\u65af\u514b\u5170\u65af\uff08Richard Rosecrance\uff09\u5728\u300a\u8d38\u6613\u56fd\u7684\u5174\u8d77\u300b\uff081986\uff09\u63d0\u51fa\uff1a\u4e0e\u5386\u53f2\u4e0a\u9760\u9886\u571f\u6269\u5f20\u83b7\u53d6\u8d22\u5bcc\u4e0e\u6743\u529b\u7684**\u519b\u4e8b\u2014\u9886\u571f\u56fd\u5bb6**\u76f8\u5bf9\uff0c\u4e8c\u6218\u540e\u6d8c\u73b0\u51fa\u9760**\u5bf9\u5916\u8d38\u6613\u548c\u56fd\u9645\u5206\u5de5\u5b9e\u73b0\u589e\u957f\u4e0e\u5b89\u5168**\u7684\"\u8d38\u6613\u56fd\"\uff0c\u5982\u6218\u540e\u5fb7\u56fd\u3001\u65e5\u672c\u3001\u65b0\u52a0\u5761\u3002\u5176\u6838\u5fc3\u547d\u9898\uff1a\u968f\u7740\u6838\u6b66\u5668\u3001\u8de8\u56fd\u751f\u4ea7\u3001\u56fd\u9645\u5236\u5ea6\u53d1\u5c55\uff0c\u5f81\u670d\u6210\u672c\u4e0a\u5347\u800c\u8d38\u6613\u6536\u76ca\u589e\u52a0\uff0c\u8d38\u6613\u56fd\u6a21\u5f0f\u5728\u4f53\u7cfb\u4e2d\u6269\u6563\uff0c\u6784\u6210\"\u8d38\u6613\u548c\u5e73\"\u7684\u7ed3\u6784\u57fa\u7840\u3002\n\n**39. \u98a0\u5012\u7684\u7b2c\u4e8c\u610f\u8c61\uff08Second Image Reversed\uff09**\u3010\u6a21\u62df-8\u3011\n\u53e4\u52d2\u7ef4\u5947\uff08Peter Gourevitch, 1978\uff09\u300a\u98a0\u5012\u7684\u7b2c\u4e8c\u610f\u8c61\uff1a\u56fd\u9645\u6e0a\u6e90\u4e0e\u56fd\u5185\u653f\u6cbb\u300b\uff1a\u4e0e\u534e\u5c14\u5179\u300a\u4eba\u3001\u56fd\u5bb6\u4e0e\u6218\u4e89\u300b\u4e2d\"\u7b2c\u4e8c\u610f\u8c61\"\uff08\u56fd\u5185\u653f\u6cbb\u51b3\u5b9a\u5916\u4ea4\uff09\u76f8\u5bf9\uff0c**\u56fd\u9645\u4f53\u7cfb\u7ed3\u6784\u548c\u538b\u529b\u4e5f\u4f1a\u56de\u6eaf\u5851\u9020\u4e00\u56fd\u56fd\u5185\u653f\u6cbb\u5236\u5ea6\u3001\u793e\u4f1a\u8054\u76df\u4e0e\u653f\u7b56\u65b9\u5411**\u3002\u4e16\u754c\u7ecf\u6d4e\u5468\u671f\u3001\u56fd\u9645\u5b89\u5168\u538b\u529b\u3001\u5371\u673a\u4f20\u67d3\u7b49\u90fd\u662f\u8fd9\u79cd\u56de\u6eaf\u673a\u5236\u7684\u8f7d\u4f53\u3002\u8be5\u8bba\u6587\u662f IPE\"\u56fd\u5185 \u2014 \u56fd\u9645\u4e92\u52a8\"\u7814\u7a76\u8303\u5f0f\u7684\u5960\u57fa\u4e4b\u4f5c\uff0c\u6784\u6210 OEP\uff08Open Economy Politics\uff09\u7684\u65b9\u6cd5\u8bba\u8d77\u70b9\u3002\n\n**40. \u56fd\u5bb6\u81ea\u4e3b\u6027\uff08State Autonomy\uff09**\u3010\u6a21\u62df-3\u3011\n\u56fd\u5bb6\u4e3b\u4e49\u5b66\u6d3e\uff08Skocpol\u3001Krasner\u3001Evans \u7b49\uff09\u6838\u5fc3\u6982\u5ff5\uff1a\u6307**\u56fd\u5bb6\u53ca\u5176\u5b98\u50da\u673a\u6784\u72ec\u7acb\u4e8e\u56fd\u5185\u7279\u5b9a\u5229\u76ca\u96c6\u56e2\uff08\u8d44\u672c\u3001\u9636\u7ea7\u3001\u793e\u4f1a\u56e2\u4f53\uff09\u800c\u5f62\u6210\u5e76\u8d2f\u5f7b\u504f\u597d\u7684\u80fd\u529b**\u3002\u5b83\u5f3a\u8c03\u56fd\u5bb6\u4e0d\u53ea\u662f\u5229\u76ca\u96c6\u56e2\u7684\"\u529b\u5b66\u5408\u529b\"\uff0c\u800c\u662f\u72ec\u7acb\u7684\u653f\u6cbb\u884c\u4e3a\u4f53\u3002\u81ea\u4e3b\u6027\u7684\u6765\u6e90\u5305\u62ec\u5b98\u50da\u7ed3\u6784\u3001\u8d22\u653f\u80fd\u529b\u3001\u5f3a\u5236\u80fd\u529b\u3001\u610f\u8bc6\u5f62\u6001\u6b63\u5f53\u6027\u7b49\u3002\u65af\u8003\u5207\u6ce2\u300a\u56fd\u5bb6\u4e0e\u793e\u4f1a\u9769\u547d\u300b\u3001\u514b\u62c9\u65af\u7eb3\u300a\u634d\u536b\u56fd\u5bb6\u5229\u76ca\u300b\u662f\u7ecf\u5178\u4ee3\u8868\uff08\u53c2\u89c1\u7530\u91ce\u7b2c\u4e03\u7ae0\uff09\u3002\n\n**41. \u56fd\u5bb6\u80fd\u529b\uff08State Capacity\uff09**\u3010\u6a21\u62df-4\u3011\n\u4e0e\u81ea\u4e3b\u6027\u76f8\u5bf9\u7684\u56fd\u5bb6\u884c\u52a8\u7ef4\u5ea6\uff1a\u6307**\u56fd\u5bb6\u628a\u65e2\u5b9a\u76ee\u6807\u8f6c\u5316\u4e3a\u653f\u7b56\u7ed3\u679c\u7684\u5b9e\u9645\u6267\u884c\u80fd\u529b**\uff0c\u5305\u62ec\u6c72\u53d6\u80fd\u529b\uff08\u8d22\u7a0e\uff09\u3001\u8c03\u63a7\u80fd\u529b\uff08\u5b8f\u89c2\u7ecf\u6d4e\uff09\u3001\u5f3a\u5236\u80fd\u529b\uff08\u6cbb\u5b89\u3001\u56fd\u9632\uff09\u3001\u5408\u6cd5\u5316\u80fd\u529b\uff08\u8ba4\u540c\u3001\u52a8\u5458\uff09\u3001\u6e17\u900f\u80fd\u529b\uff08\u57fa\u5c42\u6cbb\u7406\uff09\u3002Mann\u3001Migdal\u3001\u738b\u7ecd\u5149/\u80e1\u978d\u94a2\u5747\u6709\u91cd\u8981\u7814\u7a76\u3002\u5728 IPE \u4e2d\uff0c\u56fd\u5bb6\u80fd\u529b\u89e3\u91ca\u4e86\u4e3a\u4f55\u6709\u4e9b\u53d1\u5c55\u4e2d\u56fd\u5bb6\u80fd\u6210\u529f\u63a8\u8fdb\u4ea7\u4e1a\u653f\u7b56\u4e0e\u8d76\u8d85\uff08\u4e1c\u4e9a\u56db\u5c0f\u9f99\uff09\uff0c\u800c\u5176\u4ed6\u56fd\u5bb6\u5931\u8d25\u3002\n\n**42. \u56fd\u5185\u7ed3\u6784\uff08Domestic Structure\uff09**\u3010\u6a21\u62df-4\u300115\u3011\n\u5361\u8d5e\u65af\u5766\u300a\u5728\u6743\u529b\u4e0e\u5bcc\u88d5\u4e4b\u95f4\u300b\u3001\u6258\u9a6c\u65af\u00b7\u91cc\u585e-\u5361\u5f6d\u7b49\u5b66\u8005\u4f7f\u7528\u7684\u6838\u5fc3\u6982\u5ff5\uff1a\u6307**\u4e00\u56fd\u56fd\u5bb6\u4e0e\u793e\u4f1a\u5173\u7cfb\u7684\u7a33\u5b9a\u6a21\u5f0f**\uff0c\u5305\u62ec\u56fd\u5bb6\u7ec4\u7ec7\u5f62\u5f0f\uff08\u96c6\u6743/\u5206\u6743\uff09\u3001\u793e\u4f1a\u7ec4\u7ec7\u5f62\u5f0f\uff08\u591a\u5143/\u7edf\u5408\uff09\u3001\u56fd\u5bb6\u2014\u793e\u4f1a\u8054\u7cfb\uff08\u5f3a/\u5f31\uff09\u3002\u5b83\u662f\u8de8\u56fd\u884c\u4e3a\u4f53\u8fdb\u5165\u76ee\u6807\u56fd\u793e\u4f1a\u3001\u5851\u9020\u5bf9\u5916\u7ecf\u6d4e\u653f\u7b56\u7684\"\u8fc7\u6ee4\u5668\"\uff0c\u4e5f\u662f\u5404\u56fd\u5bf9\u76f8\u540c\u5916\u90e8\u51b2\u51fb\u4ea7\u751f\u4e0d\u540c\u653f\u7b56\u56de\u5e94\u7684\u5173\u952e\u53d8\u91cf\u3002\n\n**43. \u82f1\u56fd\u5b66\u6d3e\uff08English School\uff09**\u3010\u6a21\u62df-4\u3011\n\u6e90\u81ea 20 \u4e16\u7eaa 50 \u5e74\u4ee3\u82f1\u56fd\u56fd\u9645\u5173\u7cfb\u7814\u7a76\u5c0f\u7ec4\uff08\u66fc\u5b81\u3001\u5e03\u5c14\u3001\u6587\u68ee\u7279\u3001\u6c83\u68ee\u7b49\uff09\u7684\u56fd\u9645\u5173\u7cfb\u7406\u8bba\u6d41\u6d3e\uff0c\u6838\u5fc3\u6982\u5ff5\u662f**\"\u56fd\u9645\u793e\u4f1a\"**\u2014\u2014\u4ecb\u4e8e\u970d\u5e03\u65af\u5f0f\"\u65e0\u653f\u5e9c\u4f53\u7cfb\"\u4e0e\u4e16\u754c\u4e3b\u4e49\u5f0f\"\u4e16\u754c\u793e\u4f1a\"\u4e4b\u95f4\uff0c\u7531\u5171\u4eab\u89c4\u5219\u4e0e\u5236\u5ea6\uff08\u5916\u4ea4\u3001\u56fd\u9645\u6cd5\u3001\u5747\u52bf\u3001\u5927\u56fd\u7ba1\u7406\u3001\u6218\u4e89\uff09\u7ef4\u7cfb\u7684\u56fd\u5bb6\u5171\u540c\u4f53\u3002\u5176\u65b9\u6cd5\u4e0a\u504f\u5386\u53f2\u2014\u8be0\u91ca\u3002\u4ee3\u8868\u4f5c\u6709\u5e03\u5c14\u300a\u65e0\u653f\u5e9c\u793e\u4f1a\u300b\u3002\u8be5\u5b66\u6d3e\u4e0e\u5efa\u6784\u4e3b\u4e49\u6709\u4eb2\u7f18\u5173\u7cfb\uff0c\u5bf9\u89e3\u91ca\u4e3b\u6743\u89c4\u8303\u6f14\u53d8\u3001\u4eba\u6743\u5e72\u9884\u3001\u65b0\u5174\u5927\u56fd\u878d\u5165\u79e9\u5e8f\u5177\u6709\u89e3\u91ca\u529b\u3002\n\n### \u4e03\u3001\u4e16\u754c\u4f53\u7cfb\u4e0e\u4f9d\u9644\u7406\u8bba\u7c7b\n\n**44. \u4f9d\u9644\uff08Dependency\uff09**\u3010\u6a21\u62df-10\u3011\n\u5361\u591a\u4f50\u3001\u591a\u65af\u6851\u6258\u65af\u3001\u5f17\u5170\u514b\u7b49\u62c9\u7f8e\u4f9d\u9644\u8bba\u5b66\u8005\u7684\u6838\u5fc3\u6982\u5ff5\uff1a\u6307**\u5916\u56f4\u56fd\u5bb6\u7684\u7ecf\u6d4e\u7ed3\u6784\u3001\u589e\u957f\u8282\u594f\u88ab\u4e2d\u5fc3\u56fd\u5bb6\u7684\u9700\u6c42\u3001\u8d44\u672c\u4e0e\u6280\u672f\u51b3\u5b9a\uff0c\u5916\u56f4\u53d1\u5c55\u53d6\u51b3\u4e8e\u3001\u5e76\u88ab\u9650\u5236\u4e8e\u4e2d\u5fc3\u2014\u5916\u56f4\u5173\u7cfb**\u3002\u5361\u591a\u4f50\u8fdb\u4e00\u6b65\u533a\u5206\"\u5c01\u95ed\u5f0f\u4f9d\u9644\"\u4e0e\"\u8054\u7cfb\u6027\u4f9d\u9644\u53d1\u5c55\"\uff08dependent development\uff09\uff0c\u627f\u8ba4\u5916\u56f4\u5728\u8de8\u56fd\u516c\u53f8\u6295\u8d44\u4e0b\u53ef\u83b7\u5f97\u90e8\u5206\u5de5\u4e1a\u5316\uff0c\u4f46\u672c\u8d28\u4e0a\u4ecd\u5d4c\u5165\u4e0d\u5e73\u7b49\u7ed3\u6784\u3002\u4f9d\u9644\u8bba\u6311\u6218\u4e86\u7f57\u65af\u6258\u5f0f\u73b0\u4ee3\u5316\u7406\u8bba\u3002\n\n**45. \u5546\u54c1\u94fe\uff08Commodity Chains\uff09**\u3010\u6a21\u62df-10\u3011\n\u970d\u666e\u91d1\u65af\u3001\u6c83\u52d2\u65af\u5766\u63d0\u51fa\u3001\u683c\u91cc\u82ac\u7b49\u53d1\u5c55\u7684\u6982\u5ff5\uff1a\u6307**\u4e3a\u751f\u4ea7\u67d0\u4e00\u6700\u7ec8\u5546\u54c1\u800c\u8de8\u5730\u533a\u3001\u8de8\u56fd\u76f8\u4e92\u8054\u7ed3\u7684\u52b3\u52a8\u4e0e\u751f\u4ea7\u8fc7\u7a0b\u7f51\u7edc**\u3002\u540e\u7531 Gereffi \u53d1\u5c55\u4e3a\"\u5168\u7403\u5546\u54c1\u94fe\"\uff08GCC\uff09\uff0c\u533a\u5206\"\u751f\u4ea7\u8005\u9a71\u52a8\"\uff08\u6c7d\u8f66\u3001\u7535\u5b50\uff09\u4e0e\"\u8d2d\u4e70\u8005\u9a71\u52a8\"\uff08\u670d\u88c5\u3001\u96f6\u552e\uff09\u4e24\u7c7b\u3002\u5b83\u628a\u4e16\u754c\u4f53\u7cfb\u8bba\u7684\u4e2d\u5fc3\u2014\u5916\u56f4\u7ed3\u6784\u843d\u5b9e\u5230\u5177\u4f53\u4ea7\u4e1a\u94fe\u4e0a\uff0c\u63ed\u793a\u4ef7\u503c\u5206\u914d\u7684\u4e0d\u5e73\u7b49\u300221 \u4e16\u7eaa\u540e\u88ab\"\u5168\u7403\u4ef7\u503c\u94fe\"\uff08GVC\uff09\u548c\"\u5168\u7403\u751f\u4ea7\u7f51\u7edc\"\uff08GPN\uff09\u7814\u7a76\u7ee7\u627f\u3002\n\n**46. \u4e16\u754c\u4f53\u7cfb\uff08World System\uff09**\u3010\u6a21\u62df-10\u3011\n\u6c83\u52d2\u65af\u5766\uff08Wallerstein\uff09\u5728\u300a\u73b0\u4ee3\u4e16\u754c\u4f53\u7cfb\u300b\uff081974\u2014\uff09\u63d0\u51fa\u7684\u5b8f\u89c2\u7ed3\u6784\u6982\u5ff5\uff1a**16 \u4e16\u7eaa\u8d77\u5728\u6b27\u6d32\u8d44\u672c\u4e3b\u4e49\u6269\u5f20\u4e0b\u5f62\u6210\u7684\u3001\u4ee5\u5355\u4e00\u4e16\u754c\u5e02\u573a\u548c\u591a\u5143\u653f\u6cbb\u6743\u5a01\uff08\u6c11\u65cf\u56fd\u5bb6\u4f53\u7cfb\uff09\u4e3a\u57fa\u7840\u7684\u8de8\u56fd\u5206\u5de5\u4f53\u7cfb**\uff0c\u7531**\u4e2d\u5fc3\u2014\u534a\u8fb9\u7f18\u2014\u8fb9\u7f18**\u4e09\u5c42\u4e0d\u5e73\u7b49\u5206\u5de5\u6784\u6210\u3002\u4e2d\u5fc3\u56fd\u5bb6\u5784\u65ad\u8d44\u672c\u4e0e\u6280\u672f\u5bc6\u96c6\u751f\u4ea7\uff0c\u5916\u56f4\u627f\u62c5\u539f\u6599\u4e0e\u52b3\u52a8\u5bc6\u96c6\u751f\u4ea7\uff0c\u534a\u8fb9\u7f18\u8d77\u7f13\u51b2\u4f5c\u7528\u3002\u4e16\u754c\u4f53\u7cfb\u5185\u5d4c\u4e16\u754c\u9738\u6743\u5468\u671f\u4e0e\u5eb7\u5fb7\u62c9\u5b63\u8036\u592b\u957f\u6ce2\u3002\n\n### \u516b\u3001\u4eba\u7269\u7c7b\uff08Renmin/IPE \u6559\u6750\u91cd\u70b9\u4eba\u7269\uff09\n\n**47. \u7f57\u4f2f\u7279\u00b7\u8003\u514b\u65af\uff08Robert W. Cox\uff09**\u3010\u6a21\u62df-9\u3011\n\u52a0\u62ff\u5927\u88d4\u6279\u5224 IPE \u7406\u8bba\u4ee3\u8868\u4eba\u7269\u3002\u4ee3\u8868\u4f5c\u300a\u751f\u4ea7\u3001\u6743\u529b\u4e0e\u4e16\u754c\u79e9\u5e8f\u300b\uff081987\uff09\u3001\u8bba\u6587\u300a\u793e\u4f1a\u529b\u91cf\u3001\u56fd\u5bb6\u4e0e\u4e16\u754c\u79e9\u5e8f\u300b\uff081981\uff09\u3002\u5176\u6838\u5fc3\u547d\u9898\uff1a**\"\u7406\u8bba\u603b\u662f\u4e3a\u67d0\u79cd\u4eba\u3001\u51fa\u4e8e\u67d0\u79cd\u76ee\u7684\"\uff0c\u533a\u5206\"\u95ee\u9898\u89e3\u51b3\u7406\u8bba\"\u4e0e\"\u6279\u5224\u7406\u8bba\"**\u3002\u6279\u5224\u7406\u8bba\u62d2\u7edd\u628a\u73b0\u6709\u79e9\u5e8f\u89c6\u4e3a\u6c38\u6052\uff0c\u4e3b\u5f20\u901a\u8fc7\u5386\u53f2\u7ed3\u6784\u65b9\u6cd5\uff08\u7269\u8d28\u80fd\u529b\u3001\u89c2\u5ff5\u3001\u5236\u5ea6\u4e09\u5c42\u4e92\u52a8\uff09\u63ed\u793a\u4e16\u754c\u79e9\u5e8f\u7684\u9636\u7ea7\u4e0e\u9738\u6743\u57fa\u7840\u3002\u662f\u65b0\u845b\u5170\u897f\u4e3b\u4e49 IPE \u5b66\u6d3e\u7684\u5960\u57fa\u8005\u3002\n\n**48. \u82cf\u73ca\u00b7\u65af\u7279\u5170\u5947\uff08Susan Strange\uff09**\u3010\u6a21\u62df-9\u3011\n\u82f1\u56fd IPE \u5b66\u6d3e\u4ee3\u8868\u4eba\u7269\u3002\u4ee3\u8868\u4f5c\u300a\u56fd\u5bb6\u4e0e\u5e02\u573a\u300b\uff081988\uff09\u3001\u300a\u75af\u72c2\u7684\u91d1\u94b1\u300b\uff081998\uff09\u3001\u300a\u8d4c\u573a\u8d44\u672c\u4e3b\u4e49\u300b\uff081986\uff09\u3002\u6279\u8bc4\u4e3b\u6d41\uff08\u7f8e\u5f0f\uff09IPE \u8fc7\u5ea6\u5b66\u9662\u5316\u3001\u5ffd\u89c6\u6743\u529b\u4e0e\u5386\u53f2\u3002\u63d0\u51fa**\u7ed3\u6784\u6027\u6743\u529b**\uff08\u5b89\u5168\u3001\u751f\u4ea7\u3001\u91d1\u878d\u3001\u77e5\u8bc6\u56db\u4e2a\u7ed3\u6784\uff09\u7684\u8457\u540d\u5206\u6790\u6846\u67b6\uff0c\u5f3a\u8c03\u7f8e\u56fd\u5e76\u672a\u771f\u6b63\u8870\u843d\uff0c\u800c\u662f\u6709\u610f\"\u653e\u5f03\u7ba1\u7406\"\u3002\u5176\u653f\u6cbb\u7ecf\u6d4e\u5b66\u5177\u6709\u5f3a\u70c8\u53cd\u4e3b\u6d41\u548c\u73b0\u5b9e\u5173\u6000\u8272\u5f69\uff0c\u5bf9\u4e2d\u56fd\u5b66\u8005\u5f71\u54cd\u6df1\u8fdc\u3002\n\n**49. \u67e5\u5c14\u65af\u00b7\u91d1\u5fb7\u5c14\u4f2f\u683c\uff08Charles P. Kindleberger\uff09**\u3010\u6a21\u62df-10\u3011\n\u7f8e\u56fd\u7ecf\u6d4e\u53f2\u5b66\u5bb6\u3001\u9738\u6743\u7a33\u5b9a\u8bba\u7684\u65e9\u671f\u63d0\u51fa\u8005\u3002\u4ee3\u8868\u4f5c\u300a1929\u20141939 \u5e74\u7684\u4e16\u754c\u7ecf\u6d4e\u8427\u6761\u300b\uff081973\uff09\u3001\u300a\u75af\u72c2\u3001\u60ca\u6050\u4e0e\u5d29\u6e83\uff1a\u91d1\u878d\u5371\u673a\u53f2\u300b\u3002\u63d0\u51fa**\"\u9886\u5bfc\u8bba\"**\uff1a1929 \u5e74\u5927\u8427\u6761\u4e4b\u6240\u4ee5\u6f14\u53d8\u4e3a\u4e16\u754c\u6027\u707e\u96be\uff0c\u662f\u56e0\u4e3a\u82f1\u56fd\u5df2\u65e0\u529b\u3001\u7f8e\u56fd\u8fd8\u4e0d\u613f\u627f\u62c5\u56fd\u9645\u7ecf\u6d4e\u9886\u5bfc\u8d23\u4efb\uff08\u63d0\u4f9b\u5e02\u573a\u3001\u7a33\u5b9a\u6c47\u7387\u3001\u6700\u540e\u8d37\u6b3e\u4eba\uff09\uff0c\u5236\u5ea6\u516c\u5171\u7269\u54c1\u4f9b\u7ed9\u4e2d\u65ad\u3002\u8be5\u8bba\u65ad\u6210\u4e3a\u9738\u6743\u7a33\u5b9a\u8bba\uff08HST\uff09\u7684\u6ee5\u89de\u3002\n\n**50. \u65af\u8482\u82ac\u00b7\u514b\u62c9\u65af\u7eb3\uff08Stephen D. Krasner\uff09**\u3010\u6a21\u62df-10\u3011\n\u7f8e\u56fd\u65b0\u73b0\u5b9e\u4e3b\u4e49/\u56fd\u5bb6\u4e3b\u4e49\u4ee3\u8868\u4eba\u7269\u3002\u4ee3\u8868\u4f5c\u300a\u634d\u536b\u56fd\u5bb6\u5229\u76ca\u300b\uff081978\uff09\u3001\u300a\u56fd\u9645\u673a\u5236\u300b\uff081983\uff0c\u7f16\uff09\u3001\u300a\u4e3b\u6743\uff1a\u6709\u7ec4\u7ec7\u7684\u4f2a\u5584\u300b\uff081999\uff09\u3002\u4e24\u5927\u8d21\u732e\uff1a\u2460\u628a\u9738\u6743\u7a33\u5b9a\u8bba\u4ece\u7ecf\u6d4e\u9886\u57df\u6269\u5c55\u5230\u4e00\u822c\u56fd\u9645\u673a\u5236\uff08\"\u9738\u6743\u4ea7\u751f\u673a\u5236\u3001\u673a\u5236\u63d0\u4f9b\u516c\u5171\u7269\u54c1\"\uff09\uff1b\u2461**\u56fd\u9645\u673a\u5236\u5b9a\u4e49**\uff1a\u539f\u5219\u3001\u89c4\u8303\u3001\u89c4\u5219\u4e0e\u51b3\u7b56\u7a0b\u5e8f\u7684\u96c6\u5408\u3002\u5176\u56fd\u5bb6\u4e3b\u4e49\u7acb\u573a\u5f3a\u8c03\u56fd\u5bb6\u81ea\u4e3b\u6027\uff0c\u6311\u6218\u5229\u76ca\u96c6\u56e2\u591a\u5143\u4e3b\u4e49\u3002\n\n**51. \u7f57\u7eb3\u5fb7\u00b7\u79d1\u65af\uff08Ronald Coase\uff09**\u3010\u6a21\u62df-12\u3011\n\u82f1\u56fd\u7ecf\u6d4e\u5b66\u5bb6\u3001\u65b0\u5236\u5ea6\u7ecf\u6d4e\u5b66\u5960\u57fa\u4eba\uff0c1991 \u5e74\u8bfa\u8d1d\u5c14\u7ecf\u6d4e\u5b66\u5956\u5f97\u4e3b\u3002\u4e24\u7bc7\u5212\u65f6\u4ee3\u8bba\u6587\uff1a**\u300a\u4f01\u4e1a\u7684\u6027\u8d28\u300b\uff081937\uff09\u63d0\u51fa\u4ea4\u6613\u6210\u672c\u6982\u5ff5**\uff0c\u89e3\u91ca\u4f01\u4e1a\u8fb9\u754c\u4e0e\u7ec4\u7ec7\u9009\u62e9\uff1b**\u300a\u793e\u4f1a\u6210\u672c\u95ee\u9898\u300b\uff081960\uff09\u63d0\u51fa\u79d1\u65af\u5b9a\u7406**\uff0c\u8bba\u8bc1\u4ea7\u6743\u4e0e\u5916\u90e8\u6027\u7684\u5173\u7cfb\u3002\u5176\u5de5\u4f5c\u5f00\u542f\u4e86\u4ea7\u6743\u7ecf\u6d4e\u5b66\u3001\u4ea4\u6613\u6210\u672c\u7ecf\u6d4e\u5b66\u3001\u65b0\u5236\u5ea6\u7ecf\u6d4e\u5b66\uff0c\u5bf9 IPE \u5236\u5ea6\u5206\u6790\uff08\u7279\u522b\u662f\u57fa\u6b27\u6c49\u300a\u9738\u6743\u4e4b\u540e\u300b\uff09\u5177\u6709\u5960\u57fa\u6027\u610f\u4e49\u3002\n\n**52. \u7f57\u4f2f\u7279\u00b7\u57fa\u6b27\u6c49\uff08Robert Keohane\uff09**\u3010\u6a21\u62df-11\u3011\n\u7f8e\u56fd\u65b0\u81ea\u7531\u5236\u5ea6\u4e3b\u4e49\u4ee3\u8868\u4eba\u7269\u3002\u4e0e\u5948\u5408\u8457\u300a\u6743\u529b\u4e0e\u76f8\u4e92\u4f9d\u8d56\u300b\uff081977\uff09\u63d0\u51fa\u590d\u5408\u76f8\u4e92\u4f9d\u8d56\uff1b\u72ec\u8457\u300a\u9738\u6743\u4e4b\u540e\u300b\uff081984\uff09\u501f\u4ea4\u6613\u6210\u672c\u7406\u8bba\u8bba\u8bc1**\u56fd\u9645\u5236\u5ea6\u5373\u4fbf\u5728\u9738\u6743\u8870\u843d\u540e\u4ecd\u80fd\u7ef4\u6301\u5408\u4f5c**\u3002\u5176\u6838\u5fc3\u7acb\u573a\uff1a\u5728\u65e0\u653f\u5e9c\u72b6\u6001\u4e0b\uff0c\u56fd\u9645\u5236\u5ea6\u901a\u8fc7\u964d\u4f4e\u4ea4\u6613\u6210\u672c\u3001\u63d0\u4f9b\u4fe1\u606f\u3001\u7a33\u5b9a\u9884\u671f\u63a8\u52a8\u5408\u4f5c\uff1b\u5236\u5ea6\u5177\u6709\"\u9ecf\u6027\"\u3002\u662f\u5f53\u4ee3 IPE \u4e3b\u6d41\"OEP \u8303\u5f0f\"\u7684\u65b9\u6cd5\u8bba\u65d7\u624b\u4e4b\u4e00\u3002\n\n**53. \u57c3\u8389\u8bfa\u00b7\u5965\u65af\u7279\u7f57\u59c6\uff08Elinor Ostrom\uff09**\u3010\u6a21\u62df-11\u3011\n2009 \u5e74\u8bfa\u8d1d\u5c14\u7ecf\u6d4e\u5b66\u5956\u5f97\u4e3b\uff0c\u9996\u4f4d\u5973\u6027\u7ecf\u6d4e\u5b66\u5956\u83b7\u5f97\u8005\u3002\u4ee3\u8868\u4f5c\u300a\u516c\u5171\u4e8b\u7269\u7684\u6cbb\u7406\u4e4b\u9053\u300b\uff081990\uff09\u3002\u901a\u8fc7\u591a\u56fd\u6e14\u573a\u3001\u704c\u6e89\u3001\u68ee\u6797\u3001\u7267\u573a\u6848\u4f8b\u7814\u7a76\uff0c\u8bba\u8bc1**\u516c\u5171\u6c60\u5858\u8d44\u6e90\u65e2\u65e0\u9700\u56fd\u5bb6\u5316\u4e5f\u65e0\u9700\u79c1\u6709\u5316\uff0c\u672c\u5730\u793e\u533a\u53ef\u57fa\u4e8e\u516b\u9879\u8bbe\u8ba1\u539f\u5219\uff08\u8fb9\u754c\u660e\u6670\u3001\u89c4\u5219\u8d34\u5408\u3001\u96c6\u4f53\u51b3\u7b56\u3001\u76d1\u7763\u3001\u5206\u7ea7\u5236\u88c1\u3001\u51b2\u7a81\u89e3\u51b3\u3001\u81ea\u7ec4\u7ec7\u6743\u3001\u5d4c\u5957\u6cbb\u7406\uff09\u5b9e\u73b0\u957f\u671f\u53ef\u6301\u7eed\u6cbb\u7406**\u3002\u5176\u7406\u8bba\u6311\u6218\u4e86\"\u516c\u7528\u5730\u60b2\u5267\"\u5bbf\u547d\u8bba\uff0c\u6210\u4e3a\u591a\u4e2d\u5fc3\u6cbb\u7406\u7406\u8bba\u652f\u67f1\u3002\n\n**54. \u5f7c\u5f97\u00b7\u5361\u8d5e\u65af\u5766\uff08Peter Katzenstein\uff09**\u3010\u6a21\u62df-11\u3011\n\u5fb7\u88d4\u7f8e\u7c4d IPE \u4e0e\u6bd4\u8f83\u653f\u6cbb\u5b66\u8005\uff0c\"\u98a0\u50 u591a\u4f50\uff08F. H. Cardoso\uff09**\u3010\u6a21\u62df-12 \u7b80\u7b54\u9898\u76f8\u5173\u3011\n\u5df4\u897f\u793e\u4f1a\u5b66\u5bb6\u3001\u524d\u603b\u7edf\uff081995-2003\uff09\u3002\u4e0e\u6cd5\u96f7\u6258\u5408\u8457\u300a\u62c9\u4e01\u7f8e\u6d32\u7684\u4f9d\u9644\u4e0e\u53d1\u5c55\u300b\uff081969\uff09\u3002\u63d0\u51fa**\"\u8054\u7cfb\u6027\u4f9d\u9644\u53d1\u5c55\"\uff08associated dependent development\uff09**\uff1a\u4e0e\u5f17\u5170\u514b\u7684\"\u4e0d\u53d1\u8fbe\u53d1\u5c55\"\u60b2\u89c2\u8bba\u4e0d\u540c\uff0c\u4ed6\u627f\u8ba4\u5728\u8de8\u56fd\u516c\u53f8\u6295\u8d44\u4e0b\u5916\u56f4\u53ef\u5b9e\u73b0\u4e00\u5b9a\u7a0b\u5ea6\u7684\u5de5\u4e1a\u5316\u4e0e\u73b0\u4ee3\u5316\uff0c\u4f46\u8fd9\u79cd\u53d1\u5c55\u4ecd\u5d4c\u5165\u4e0d\u5e73\u7b49\u7684\u4e2d\u5fc3\u2014\u5916\u56f4\u7ed3\u6784\u3002\u8be5\u6846\u67b6\u89e3\u91ca\u4e86 1970 \u5e74\u4ee3\u5df4\u897f\u3001\u58a8\u897f\u54e5\u7684\"\u5947\u8ff9\"\u3002\n\n**57. \u7406\u67e5\u5fb7\u00b7\u5e93\u73c0\uff08Richard N. Cooper\uff09**\u3010\u6a21\u62df-12\u3011\n\u7f8e\u56fd\u56fd\u9645\u7ecf\u6d4e\u5b66\u5bb6\u3001\u76f8\u4e92\u4f9d\u8d56\u7406\u8bba\u5148\u9a71\u3002\u4ee3\u8868\u4f5c\u300a\u76f8\u4e92\u4f9d\u8d56\u7684\u7ecf\u6d4e\u5b66\u300b\uff081968\uff09\u3001\u300a\u6709\u5e8f\u7684\u4e16\u754c\uff1f\u300b\uff081987\uff09\u3002\u6700\u65e9\u7cfb\u7edf\u8bba\u8bc1\uff1a**\u7ecf\u6d4e\u4e00\u4f53\u5316\u4e0b\u5404\u56fd\u5b8f\u89c2\u653f\u7b56\u5916\u6ea2\u6548\u5e94\u589e\u5f3a\uff0c\u56fd\u522b\u653f\u7b56\u6709\u6548\u6027\u4e0b\u964d\uff0c\u5fc5\u987b\u901a\u8fc7\u56fd\u9645\u5b8f\u89c2\u534f\u8c03\uff08policy coordination\uff09\u5e94\u5bf9**\u3002\u5176\u5de5\u4f5c\u662f\u57fa\u6b27\u6c49\u3001\u5948\u590d\u5408\u76f8\u4e92\u4f9d\u8d56\u7406\u8bba\u7684\u76f4\u63a5\u601d\u60f3\u524d\u53f2\uff0c\u4e5f\u662f IMF\u3001G7 \u7b49\u5b8f\u89c2\u534f\u8c03\u673a\u5236\u7684\u7406\u8bba\u57fa\u7840\u4e4b\u4e00\u3002\n\n### \u4e5d\u3001\u5176\u4ed6\u4e0e\u65f6\u4e8b\u7c7b\n\n**58. \u62c9\u7f8e\u7ecf\u6d4e\u59d4\u5458\u4f1a\uff08ECLAC/CEPAL\uff09**\u3010\u6a21\u62df-6\u3011\n\u8054\u5408\u56fd 1948 \u5e74\u8bbe\u7acb\u7684\u533a\u57df\u7ecf\u6d4e\u59d4\u5458\u4f1a\uff0c\u603b\u90e8\u5723\u5730\u4e9a\u54e5\u3002\u666e\u96f7\u7ef4\u4ec0\u5728\u6b64\u63d0\u51fa**\"\u4e2d\u5fc3\u2014\u5916\u56f4\"\u7406\u8bba**\u4e0e**\"\u8d38\u6613\u6761\u4ef6\u957f\u671f\u6076\u5316\u8bba\"**\uff0c\u8bba\u8bc1\u539f\u6599\u51fa\u53e3\u56fd\u76f8\u5bf9\u5de5\u4e1a\u54c1\u8fdb\u53e3\u56fd\u7684\u8d38\u6613\u6761\u4ef6\u8d8b\u4e8e\u6076\u5316\u3002\u5176\u653f\u7b56\u4e3b\u5f20\u662f**\u8fdb\u53e3\u66ff\u4ee3\u5de5\u4e1a\u5316\uff08ISI\uff09+ \u56fd\u5bb6\u4e3b\u5bfc\u7684\u53d1\u5c55\u6218\u7565**\uff0c\u6df1\u523b\u5f71\u54cd 1950\u20131970 \u5e74\u4ee3\u62c9\u7f8e\u4e0e\u7b2c\u4e09\u4e16\u754c\u53d1\u5c55\u653f\u7b56\u3002\u662f\u7ed3\u6784\u4e3b\u4e49\u53d1\u5c55\u7ecf\u6d4e\u5b66\u548c\u4f9d\u9644\u8bba\u7684\u7406\u8bba\u6bcd\u4f53\u4e4b\u4e00\u3002\n\n**59. \u8499\u4ee3\u5c14\u2014\u5f17\u83b1\u660e\u6a21\u578b\uff08Mundell-Fleming Model\uff09**\u3010\u6a21\u62df-8\u3011\n20 \u4e16\u7eaa 60 \u5e74\u4ee3\u8499\u4ee3\u5c14\uff08\u7f57\u4f2f\u7279\u00b7\u8499\u4ee3\u5c14\uff09\u548c\u5f17\u83b1\u660e\u72ec\u7acb\u63d0\u51fa\u7684\u5f00\u653e\u7ecf\u6d4e\u5b8f\u89c2\u6a21\u578b\uff0c\u662f IS-LM \u6a21\u578b\u7684\u5f00\u653e\u7ecf\u6d4e\u6269\u5c55\u3002\u5176\u7ecf\u5178\u63a8\u8bba\"**\u4e0d\u53ef\u80fd\u4e09\u89d2\"\uff08Trilemma\uff09**\uff1a**\u8d44\u672c\u81ea\u7531\u6d41\u52a8\u3001\u56fa\u5b9a\u6c47\u7387\u3001\u72ec\u7acb\u8d27\u5e01\u653f\u7b56\u4e09\u8005\u4e0d\u53ef\u517c\u5f97**\u3002\u8be5\u6a21\u578b\u6784\u6210\u73b0\u4ee3\u56fd\u9645\u5b8f\u89c2\u7ecf\u6d4e\u4e0e\u6c47\u7387\u5236\u5ea6\u9009\u62e9\u7814\u7a76\u7684\u57fa\u7840\uff0c\u5bf9\u89e3\u91ca\u91d1\u672c\u4f4d\u3001\u5e03\u96f7\u987f\u68ee\u6797\u3001\u6b27\u5143\u533a\u3001\u4eba\u6c11\u5e01\u6c47\u6539\u8def\u5f84\u90fd\u81f3\u5173\u91cd\u8981\u3002\n\n**60. \u8bfa\u601d\u6096\u8bba\uff08North's Paradox\uff09**\u3010\u6a21\u62df-8\u3011\n\u8bfa\u601d\u5728\u300a\u7ecf\u6d4e\u53f2\u4e2d\u7684\u7ed3\u6784\u4e0e\u53d8\u8fc1\u300b\uff081981\uff09\u63d0\u51fa\u7684\u547d\u9898\uff1a**\u56fd\u5bb6\u662f\u7ecf\u6d4e\u589e\u957f\u7684\u5173\u952e\uff0c\u53c8\u662f\u7ecf\u6d4e\u8870\u9000\u7684\u6839\u6e90**\u2014\u2014\u56fd\u5bb6\u65e2\u9700\u8981\u4fdd\u62a4\u4ea7\u6743\u4ee5\u4fc3\u8fdb\u5e02\u573a\u53d1\u5c55\uff0c\u53c8\u6709\u52a8\u529b\u4e3a\u7edf\u6cbb\u8005\u77ed\u671f\u5229\u76ca\u4fb5\u8680\u4ea7\u6743\u3002\u5176\u6838\u5fc3\u5f20\u529b\u6765\u81ea\u56fd\u5bb6\u7684\"\u53cc\u91cd\u76ee\u6807\"\uff1a\u8d22\u653f\u6536\u5165\u6700\u5927\u5316 vs \u793e\u4f1a\u4ea7\u51fa\u6700\u5927\u5316\u3002\u8be5\u6096\u8bba\u89e3\u91ca\u4e86\u4e3a\u4f55\u6709\u4e9b\u56fd\u5bb6\u9677\u5165\"\u6c72\u53d6\u578b\u5236\u5ea6\"\u9677\u9631\uff08Acemoglu\uff09\u3001\u4e3a\u4f55\u5236\u5ea6\u8def\u5f84\u4f9d\u8d56\u96be\u4ee5\u6253\u7834\uff0c\u662f\u5236\u5ea6\u53d8\u8fc1\u5206\u6790\u7684\u6838\u5fc3\u547d\u9898\u3002\n\n---\n\n## Part II \u7b80\u7b54\u9898\uff0839 \u9898\uff09\n\n> \u4f53\u4f8b\uff1a\u6bcf\u9898 300\u2013500 \u5b57\uff0c\u8981\u70b9\u7f16\u53f7\u6e05\u6670\uff0c\u4fbf\u4e8e\u80cc\u8bf5\u3002\n\n### 1. \u7b80\u8ff0\u91cd\u5546\u4e3b\u4e49\u7684\u4fe1\u6761\u3010\u6a21\u62df-1\u3011\n\n\u91cd\u5546\u4e3b\u4e49\uff08Mercantilism\uff09\u662f 16\u201418 \u4e16\u7eaa\u76db\u884c\u4e8e\u897f\u6b27\u7684\u56fd\u5bb6\u4e3b\u4e49\u7ecf\u6d4e\u601d\u60f3\uff0c\u662f\u6c11\u65cf\u56fd\u5bb6\u521d\u5174\u65f6\u671f\u7684\u4e3b\u5bfc\u610f\u8bc6\u5f62\u6001\u3002\u5176\u6838\u5fc3\u4fe1\u6761\u53ef\u6982\u62ec\u4e3a\uff1a\n\n1. **\u8d22\u5bcc\u5373\u8d27\u5e01\uff08\u91d1\u94f6\u672c\u4f4d\u89c2\uff09**\uff1a\u628a\u4e00\u56fd\u8d22\u5bcc\u7b49\u540c\u4e8e\u5176\u62e5\u6709\u7684\u91d1\u94f6\u7b49\u8d35\u91d1\u5c5e\u6570\u91cf\u3002\u91d1\u94f6\u88ab\u89c6\u4e3a\u56fd\u529b\u7684\u5b9e\u7269\u8868\u73b0\uff0c\u56e0\u6b64\u653f\u7b56\u76ee\u6807\u662f\u6700\u5927\u9650\u5ea6\u5730\u79ef\u7d2f\u8d35\u91d1\u5c5e\u3002\n2. **\u8d38\u6613\u987a\u5dee\uff08\u987a\u5dee\u6700\u5927\u5316\uff09**\uff1a\u5728\u91d1\u94f6\u603b\u91cf\u5927\u4f53\u65e2\u5b9a\u7684\u4e16\u754c\u91cc\uff0c**\u4e00\u56fd\u6240\u5f97\u5c31\u662f\u4ed6\u56fd\u6240\u5931**\uff08\u96f6\u548c\u535a\u5f08\u89c2\uff09\u3002\u56e0\u6b64\u8981\u901a\u8fc7**\u5956\u51fa\u9650\u5165**\uff08\u9f13\u52b1\u51fa\u53e3\u3001\u9650\u5236\u8fdb\u53e3\uff09\u6765\u83b7\u53d6\u8d38\u6613\u987a\u5dee\uff0c\u4ece\u800c\u5438\u7eb3\u91d1\u94f6\u3002\n3. **\u56fd\u5bb6\u5f3a\u529b\u5e72\u9884**\uff1a\u56fd\u5bb6\u5fc5\u987b\u4e3b\u52a8\u7ba1\u7406\u5bf9\u5916\u8d38\u6613\u3001\u4ea7\u4e1a\u3001\u822a\u8fd0\u4e0e\u6b96\u6c11\uff0c\u5305\u62ec\u5173\u7a0e\u58c1\u5792\u3001\u51fa\u53e3\u8865\u8d34\u3001\u7279\u8bb8\u516c\u53f8\uff08\u5982\u4e1c\u5370\u5ea6\u516c\u53f8\uff09\u3001\u300a\u822a\u6d77\u6761\u4f8b\u300b\u7b49\u624b\u6bb5\u3002\n4. **\u751f\u4ea7\u6027\u4ea7\u4e1a\u4f18\u5148**\uff1a\u6276\u690d\u672c\u56fd\u5236\u9020\u4e1a\uff0c\u9650\u5236\u539f\u6599\u51fa\u53e3\u3001\u9650\u5236\u5de5\u4e1a\u54c1\u8fdb\u53e3\uff1b\u6b96\u6c11\u5730\u88ab\u5b9a\u4f4d\u4e3a\u539f\u6599\u4f9b\u5e94\u5730\u4e0e\u672c\u56fd\u5236\u9020\u54c1\u9500\u552e\u5e02\u573a\u3002\n5. **\u56fd\u5bb6\u5f3a\u5927\u4e0e\u8d22\u5bcc\u4e92\u4e3a\u8868\u91cc**\uff1a\u8d22\u5bcc\u7528\u4e8e\u652f\u6491\u519b\u5907\u548c\u6d77\u6743\uff0c\u5f3a\u5927\u7684\u56fd\u5bb6\u53c8\u80fd\u4fdd\u969c\u8d22\u5bcc\u7684\u83b7\u53d6\u4e0e\u5b89\u5168\uff0c\u4e8c\u8005\u76f8\u8f85\u76f8\u6210\u3002\n\n\u4ee3\u8868\u4eba\u7269\u6709\u6258\u9a6c\u65af\u00b7\u5b5f\uff08\u300a\u82f1\u56fd\u5f97\u81ea\u5bf9\u5916\u8d38\u6613\u7684\u8d22\u5bcc\u300b\uff09\u3001\u67ef\u5c14\u8d1d\uff08\u6cd5\u56fd\u8d22\u653f\u5927\u81e3\uff09\u3002\u91cd\u5546\u4e3b\u4e49\u4e3a\u8fd1\u4ee3\u6c11\u65cf\u56fd\u5bb6\u7684\u7ecf\u6d4e\u72ec\u7acb\u4e0e\u5de5\u4e1a\u8d77\u98de\u63d0\u4f9b\u4e86\u653f\u7b56\u6846\u67b6\uff0c\u5bf9\u540e\u4e16\u7684\"\u6c49\u5bc6\u5c14\u987f\u4e3b\u4e49\"\uff08\u7f8e\uff09\u3001\"\u674e\u65af\u7279\u56fd\u6c11\u7ecf\u6d4e\u5b66\"\uff08\u5fb7\uff09\u3001\u4e1c\u4e9a\u53d1\u5c55\u578b\u56fd\u5bb6\u3001\u5f53\u4ee3\u4ea7\u4e1a\u653f\u7b56\u90fd\u6709\u601d\u60f3\u9057\u4ea7\uff08\u53c2\u89c1\u5409\u5c14\u5e73\u300a\u56fd\u9645\u5173\u7cfb\u653f\u6cbb\u7ecf\u6d4e\u5b66\u300b\u7b2c\u4e8c\u7ae0\uff1b\u5b8b\u65b0\u5b81/\u9648\u5cb3\u7b2c\u4e8c\u7ae0\uff09\u3002\n\n### 2. \u7b80\u8ff0\u6258\u9a6c\u65af\u00b7\u5b5f\u7684\u91cd\u5546\u4e3b\u4e49\u5b66\u8bf4\u3010\u6a21\u62df-2\u300115\u3011\n\n\u6258\u9a6c\u65af\u00b7\u5b5f\uff08Thomas Mun, 1571\u20141641\uff09\u662f\u82f1\u56fd\u4e1c\u5370\u5ea6\u516c\u53f8\u8463\u4e8b\uff0c**\u665a\u671f\uff08\u6210\u719f\uff09\u91cd\u5546\u4e3b\u4e49**\u2014\u2014\u53c8\u79f0\"\u8d38\u6613\u5dee\u989d\u8bba\"\u2014\u2014\u7684\u96c6\u5927\u6210\u8005\u3002\u4ee3\u8868\u4f5c\u300a\u82f1\u56fd\u5f97\u81ea\u5bf9\u5916\u8d38\u6613\u7684\u8d22\u5bcc\u300b\uff081664 \u5e74\u7531\u5176\u5b50\u6574\u7406\u51fa\u7248\uff09\u3002\u5176\u5b66\u8bf4\u6838\u5fc3\uff1a\n\n1. **\u603b\u8d38\u6613\u5dee\u989d\u8bba**\uff1a\u6279\u8bc4\u65e9\u671f\u91cd\u5546\u4e3b\u4e49\"\u8d27\u5e01\u5dee\u989d\u8bba\"\u673a\u68b0\u7981\u6b62\u767d\u94f6\u51fa\u53e3\u7684\u505a\u6cd5\uff0c\u4e3b\u5f20**\u53ea\u8981\u603b\u4f53\u8d38\u6613\u987a\u5dee\u4e3a\u6b63\uff0c\u4e2a\u522b\u8d38\u6613\u5173\u7cfb\u51fa\u73b0\u9006\u5dee\u6216\u4e2a\u522b\u767d\u94f6\u5916\u6d41\u90fd\u4e0d\u8981\u7d27**\u3002\u4e1c\u5370\u5ea6\u516c\u53f8\u5c06\u767d\u94f6\u8fd0\u5230\u4e1c\u65b9\u6362\u56de\u80e1\u6912\u3001\u4e1d\u7ef8\u7b49\u5546\u54c1\u518d\u8f6c\u53e3\u5230\u6b27\u6d32\uff0c\u6700\u7ec8\u4e3a\u82f1\u56fd\u5e26\u56de\u66f4\u591a\u91d1\u94f6\u3002\n2. **\u751f\u4ea7\u2014\u8d38\u6613\u5faa\u73af\u89c2**\uff1a\u8d35\u91d1\u5c5e\u6d41\u5165\u53ea\u662f\u7ed3\u679c\uff0c\u6839\u672c\u52a8\u529b\u5728\u4e8e\u751f\u4ea7\u7ade\u4e89\u529b\u548c\u5546\u4e1a\u7f51\u7edc\u3002\u56e0\u6b64\u653f\u7b56\u5e94\u9f13\u52b1\u672c\u56fd\u5236\u9020\u4e1a\u3001\u822a\u8fd0\u4e1a\u3001\u8f6c\u53e3\u8d38\u6613\u3001\u518d\u51fa\u53e3\u4e1a\u3002\n3. **\u8282\u4fed\u4e0e\u52e4\u594b**\uff1a\u5f3a\u8c03\u6c11\u65cf\u8282\u4fed\u4e0e\u52e4\u52c9\u52b3\u52a8\u662f\u79ef\u7d2f\u8d22\u5bcc\u7684\u6839\u672c\u3002\n4. **\u653f\u7b56\u5efa\u8bae**\uff1a\u2460\u7981\u6b62\u539f\u6599\u51fa\u53e3\u3001\u5962\u4f88\u54c1\u8fdb\u53e3\uff1b\u2461\u9f13\u52b1\u672c\u56fd\u5236\u9020\u4e1a\u51fa\u53e3\uff1b\u2462\u6269\u5f20\u5546\u8239\u961f\u548c\u6b96\u6c11\u5730\uff1b\u2463\u901a\u8fc7\u300a\u822a\u6d77\u6761\u4f8b\u300b\uff081651\uff09\u5de9\u56fa\u82f1\u56fd\u5bf9\u56fd\u9645\u822a\u8fd0\u7684\u63a7\u5236\u3002\n\n\u6258\u9a6c\u65af\u00b7\u5b5f\u7684\u5b66\u8bf4\u4e0e\u82f1\u56fd 17\u201418 \u4e16\u7eaa\u7684\u5546\u4e1a\u9769\u547d\u76f8\u5951\u5408\uff0c\u4e3a\u82f1\u56fd\u6d77\u6743\u4e0e\u5de5\u4e1a\u9769\u547d\u51c6\u5907\u4e86\u5236\u5ea6\u57fa\u7840\u3002\u4ed6\u6bd4\u65e9\u671f\u91cd\u5546\u4e3b\u4e49\u66f4\u5177\u5f39\u6027\u548c\u5e02\u573a\u611f\uff0c\u88ab\u89c6\u4e3a\u91cd\u5546\u4e3b\u4e49\u601d\u60f3\u6210\u719f\u5f62\u6001\u7684\u4ee3\u8868\uff08\u53c2\u89c1\u5409\u5c14\u5e73\u7b2c\u4e8c\u7ae0\uff1b\u5b8b\u65b0\u5b81/\u9648\u5cb3\u7b2c\u4e09\u7ae0\uff09\u3002\n\n### 3. \u7b80\u8ff0\u6c49\u5bc6\u5c14\u987f\u7684\u65b0\u91cd\u5546\u4e3b\u4e49\u5b66\u8bf4\u3010\u6a21\u62df-3\u3011\n\n\u4e9a\u5386\u5c71\u5927\u00b7\u6c49\u5bc6\u5c14\u987f\uff08Alexander Hamilton, 1755\u20141804\uff09\u662f\u7f8e\u56fd\u9996\u4efb\u8d22\u653f\u90e8\u957f\u30021791 \u5e74\u5411\u56fd\u4f1a\u63d0\u4ea4\u300a\u5173\u4e8e\u5236\u9020\u4e1a\u7684\u62a5\u544a\u300b\uff0c\u662f**\u65b0\u5927\u9646\u6c11\u65cf\u7ecf\u6d4e\u72ec\u7acb\u601d\u60f3\u7684\u5960\u57fa\u6027\u6587\u4ef6**\uff0c\u88ab\u89c6\u4e3a\"\u65b0\u91cd\u5546\u4e3b\u4e49\"\u6216\"\u7f8e\u56fd\u4f53\u7cfb\"\u7684\u6e90\u5934\u3002\u5176\u6838\u5fc3\u4e3b\u5f20\uff1a\n\n1. **\u5236\u9020\u4e1a\u7acb\u56fd\u8bba**\uff1a\u519c\u4e1a\u7acb\u56fd\uff08\u6770\u6590\u900a\u4e3b\u4e49\uff09\u65e0\u6cd5\u652f\u6491\u72ec\u7acb\u56fd\u5bb6\u7684\u5b89\u5168\u4e0e\u672a\u6765\uff0c\u5fc5\u987b\u901a\u8fc7\u5de5\u4e1a\u5316\u5efa\u7acb\u81ea\u4e3b\u7684\u5236\u9020\u4e1a\u4f53\u7cfb\u3002\u519c\u5de5\u5e76\u4e3e\u624d\u80fd\u907f\u514d\u5bf9\u6b27\u6d32\u7684\u4ea7\u4e1a\u4ece\u5c5e\u3002\n2. **\u5e7c\u7a1a\u4ea7\u4e1a\u4fdd\u62a4**\uff1a\u65b0\u751f\u5236\u9020\u4e1a\u9762\u5bf9\u6b27\u6d32\uff08\u7279\u522b\u662f\u82f1\u56fd\uff09\u6210\u719f\u4ea7\u4e1a\u7684\u7ade\u4e89\u5904\u4e8e\u5929\u7136\u52a3\u52bf\uff0c\u5fc5\u987b\u901a\u8fc7**\u8fdb\u53e3\u5173\u7a0e\u3001\u51fa\u53e3\u8865\u8d34\u3001\u5956\u52b1\u91d1\u3001\u653f\u5e9c\u91c7\u8d2d**\u7b49\u624b\u6bb5\u4e88\u4ee5\u4fdd\u62a4\u548c\u6276\u6301\uff0c\u76f4\u81f3\u5176\u5177\u5907\u7ade\u4e89\u529b\u3002\n3. **\u56fd\u5bb6\u4fe1\u7528\u4e0e\u91d1\u878d\u57fa\u7840**\uff1a\u529b\u4e3b\u8054\u90a6\u627f\u62c5\u5404\u5dde\u6218\u4e89\u503a\u52a1\u3001\u5efa\u7acb\u5408\u4f17\u56fd\u94f6\u884c\u3001\u7edf\u4e00\u8d27\u5e01\u548c\u503a\u5238\u5e02\u573a\uff0c\u5efa\u7acb\u7a33\u5065\u7684\u56fd\u5bb6\u4fe1\u7528\u4f53\u7cfb\uff0c\u4e3a\u5de5\u4e1a\u5316\u878d\u8d44\u3002\n4. **\u56fd\u5bb6\u79ef\u6781\u5e72\u9884**\uff1a\u653f\u5e9c\u4e0d\u4ec5\u8981\u63d0\u4f9b\u4fdd\u62a4\uff0c\u8fd8\u8981\u4e3b\u52a8\u6295\u8d44\u57fa\u7840\u8bbe\u65bd\uff08\u9053\u8def\u3001\u8fd0\u6cb3\uff09\u3001\u6280\u672f\u5f15\u8fdb\u4e0e\u79fb\u6c11\u5438\u5f15\uff08\"\u6316\u89d2\"\u6b27\u6d32\u6280\u5de5\uff09\u3002\n5. **\u5173\u7a0e\u540c\u65f6\u662f\u8d22\u653f\u6536\u5165\u548c\u4fdd\u62a4\u624b\u6bb5**\uff1a\u5173\u7a0e\u65e2\u4fdd\u62a4\u5e7c\u7a1a\u4ea7\u4e1a\uff0c\u53c8\u662f\u8054\u90a6\u4e3b\u8981\u8d22\u6e90\u3002\n\n\u6c49\u5bc6\u5c14\u987f\u5b66\u8bf4\u88ab 19 \u4e16\u7eaa\u5fb7\u56fd\u5b66\u8005\u674e\u65af\u7279\u53d1\u5c55\u4e3a\u7cfb\u7edf\u7684\"\u56fd\u6c11\u7ecf\u6d4e\u5b66\u4f53\u7cfb\"\uff0c\u5e76\u4e3a\u5fb7\u3001\u65e5\u3001\u4e1c\u4e9a\u540e\u53d1\u56fd\u5bb6\u63d0\u4f9b\u4e86\u8d76\u8d85\u6a21\u677f\u3002\u5176\u7cbe\u795e\u5ef6\u7eed\u81f3\u4eca\uff0c\u53ef\u89c1\u4e8e\u4ea7\u4e1a\u653f\u7b56\u3001\u51fa\u53e3\u7ba1\u63a7\u3001\u534a\u5bfc\u4f53\u8865\u8d34\u7b49\u5f53\u4ee3\u7f8e\u56fd\"\u65b0\u534e\u76db\u987f\u5171\u8bc6\"\u5b9e\u8df5\uff08\u53c2\u89c1\u5409\u5c14\u5e73\u7b2c\u4e8c\u7ae0\uff1b\u6a0a\u52c7\u660e\u7b2c\u4e09\u7ae0\uff09\u3002\n\n### 4. \u7b80\u8ff0\u674e\u65af\u7279\u7684\u5e7c\u7a1a\u4ea7\u4e1a\u4fdd\u62a4\u8bba\u3010\u6a21\u62df-4\u3011\n\n\u5f17\u91cc\u5fb7\u91cc\u5e0c\u00b7\u674e\u65af\u7279\uff08Friedrich List, 1789\u20141846\uff09\u662f 19 \u4e16\u7eaa\u5fb7\u56fd\u6c11\u65cf\u7ecf\u6d4e\u5b66\u5bb6\uff0c\u4ee3\u8868\u4f5c\u300a\u653f\u6cbb\u7ecf\u6d4e\u5b66\u7684\u56fd\u6c11\u4f53\u7cfb\u300b\uff081841\uff09\u3002\u5728\u9762\u5bf9\u5de5\u4e1a\u9769\u547d\u4e2d\u82f1\u56fd\u7684\u5168\u7403\u4ea7\u4e1a\u4f18\u52bf\u65f6\uff0c\u4ed6\u7cfb\u7edf\u63d0\u51fa\u4e86**\u5e7c\u7a1a\u4ea7\u4e1a\u4fdd\u62a4\u8bba**\uff1a\n\n1. **\u56fd\u6c11\u7ecf\u6d4e\u5b66\u6279\u5224\u53e4\u5178\u7ecf\u6d4e\u5b66**\uff1a\u6279\u5224\u4e9a\u5f53\u00b7\u65af\u5bc6\u3001\u674e\u5609\u56fe\u7684\"\u4e16\u754c\u4e3b\u4e49\u7ecf\u6d4e\u5b66\"\u5ffd\u89c6\u4e86\u56fd\u5bb6\u5dee\u5f02\uff1b\u6307\u51fa**\u81ea\u7531\u8d38\u6613\u7684\u597d\u5904\u53ea\u5bf9\u5df2\u7ecf\u9886\u5148\u7684\u5de5\u4e1a\u56fd\uff08\u82f1\u56fd\uff09\u771f\u5b9e**\uff0c\u5bf9\u540e\u53d1\u56fd\u5bb6\u662f\"\u6254\u6389\u811a\u4e0b\u68af\u5b50\"\u3002\n2. **\u751f\u4ea7\u529b\u7406\u8bba**\uff1a\u8d22\u5bcc\u7684\u80fd\u529b\u6bd4\u8d22\u5bcc\u672c\u8eab\u66f4\u91cd\u8981\u3002\u4e00\u56fd\u751f\u4ea7\u529b\uff08\u5236\u9020\u80fd\u529b\u3001\u6280\u672f\u3001\u6559\u80b2\u3001\u57fa\u7840\u8bbe\u65bd\uff09\u624d\u662f\u957f\u671f\u56fd\u529b\u4e4b\u672c\u3002\n3. **\u7ecf\u6d4e\u53d1\u5c55\u4e94\u9636\u6bb5\u8bba**\uff1a\u539f\u59cb\u672a\u5f00\u5316\u2014\u755c\u7267\u4e1a\u2014\u519c\u4e1a\u2014\u519c\u5de5\u4e1a\u2014\u519c\u5de5\u5546\u4e1a\u3002\u540e\u53d1\u56fd\u5bb6\u5fc5\u987b\u501f\u52a9\u4fdd\u62a4\u63a8\u52a8\u4ece\u519c\u4e1a\u5411\u519c\u5de5\u5546\u4e1a\u7684\u8dc3\u8fc1\u3002\n4. **\u5e7c\u7a1a\u4ea7\u4e1a\u4fdd\u62a4\u539f\u5219**\uff1a\u2460\u4fdd\u62a4\u5bf9\u8c61\u9650\u4e8e\u5177\u6709\u6f5c\u5728\u6bd4\u8f83\u4f18\u52bf\u7684\u5173\u952e\u5236\u9020\u4e1a\uff1b\u2461\u4fdd\u62a4\u624b\u6bb5\u4ee5**\u5173\u7a0e**\u4e3a\u4e3b\uff0c\u5fc5\u8981\u65f6\u8f85\u4ee5\u8865\u8d34\uff1b\u2462\u4fdd\u62a4\u5177\u6709**\u9636\u6bb5\u6027\u3001\u6709\u9650\u6027\u3001\u53ef\u9000\u51fa\u6027**\u2014\u2014\u4e00\u65e6\u884c\u4e1a\u6210\u719f\u5373\u5e94\u64a4\u9664\u4fdd\u62a4\uff0c\u907f\u514d\u957f\u671f\u4f9d\u8d56\u3002\n5. **\u4fdd\u62a4\u8303\u56f4**\uff1a\u5236\u9020\u4e1a\uff0c**\u4e0d\u4fdd\u62a4\u519c\u4e1a**\uff08\u56e0\u4e3a\u5fb7\u56fd\u5f53\u65f6\u5df2\u5177\u4f18\u52bf\uff09\uff1b\u4e0d\u4fdd\u62a4\u8fc7\u5ea6\u6210\u719f\u6216\u6c38\u8fdc\u6ca1\u6709\u7ade\u4e89\u529b\u7684\u4ea7\u4e1a\u3002\n\n\u674e\u65af\u7279\u7406\u8bba\u4e3a\u5fb7\u56fd\u5173\u7a0e\u540c\u76df\u3001\u7edf\u4e00\u540e\u5e1d\u56fd\u5de5\u4e1a\u5316\u3001\u4ee5\u53ca\u6218\u540e\u65e5\u97e9\u53f0\"\u4e1c\u4e9a\u53d1\u5c55\u578b\u56fd\u5bb6\"\u63d0\u4f9b\u4e86\u601d\u60f3\u8d44\u6e90\uff0c\u6784\u6210\"\u7ecf\u6d4e\u6c11\u65cf\u4e3b\u4e49\"\u4f20\u7edf\u7684\u5960\u57fa\uff08\u53c2\u89c1\u5409\u5c14\u5e73\u7b2c\u4e8c\u7ae0\uff1b\u7530\u91ce\u7b2c\u516d\u7ae0\uff09\u3002\n\n### 5. \u7b80\u8ff0\u51ef\u6069\u65af\u7684\u8d85\u8d38\u6613\u4fdd\u62a4\u4e3b\u4e49\u3010\u6a21\u62df-5\u3011\n\n\u51ef\u6069\u65af\u5728\u5927\u8427\u6761\u4e0e\u6218\u540e\u65e9\u671f\u7684\u8457\u8ff0\uff08\u5982\u300a\u8bf4\u670d\u96c6\u300b\u300a\u544a\u522b\u81ea\u7531\u653e\u4efb\u300b\u300a\u901a\u5f80\u5974\u5f79\u4e4b\u8def\u300b\u8bc4\u8bba\u3001\u300a\u81ea\u7ed9\u81ea\u8db3\u8bba\u300b1933 \u7b49\uff09\u4e2d\uff0c\u5bf9\u53e4\u5178\u81ea\u7531\u8d38\u6613\u7acb\u573a\u8fdb\u884c\u91cd\u5927\u4fee\u6b63\uff0c\u88ab\u79f0\u4e3a**\"\u8d85\u8d38\u6613\u4fdd\u62a4\u4e3b\u4e49\"**\u2014\u2014\u5b83\u4e0d\u518d\u50cf\u4f20\u7edf\u4fdd\u62a4\u4e3b\u4e49\u90a3\u6837\u4ec5\u670d\u52a1\u4e8e\u5e7c\u7a1a\u4ea7\u4e1a\uff0c\u800c\u662f**\u670d\u52a1\u4e8e\u5145\u5206\u5c31\u4e1a\u548c\u5b8f\u89c2\u7ecf\u6d4e\u7a33\u5b9a**\u7684\u66f4\u9ad8\u76ee\u6807\u3002\u8981\u70b9\uff1a\n\n1. **\u7406\u8bba\u524d\u63d0**\uff1a\u51ef\u6069\u65af\u8bc1\u660e\u5e02\u573a\u4e0d\u4f1a\u81ea\u52a8\u5b9e\u73b0\u5145\u5206\u5c31\u4e1a\uff0c\u5b58\u5728\u957f\u671f\u6709\u6548\u9700\u6c42\u4e0d\u8db3\u3002\u56e0\u6b64\u5b8f\u89c2\u8c03\u63a7\u3001\u8d22\u653f\u4e0e\u8d27\u5e01\u5e72\u9884\u6210\u4e3a\u5fc5\u8981\u3002\n2. **\u8d38\u6613\u653f\u7b56\u4ece\u5c5e\u4e8e\u5b8f\u89c2\u7a33\u5b9a**\uff1a\u5f00\u653e\u7ecf\u6d4e\u6761\u4ef6\u4e0b\uff0c\u56fd\u9645\u6536\u652f\u5931\u8861\u3001\u8fdb\u53e3\u51b2\u51fb\u3001\u6c47\u7387\u6ce2\u52a8\u53ef\u80fd\u52a0\u5267\u56fd\u5185\u6709\u6548\u9700\u6c42\u4e0d\u8db3\u548c\u5931\u4e1a\uff0c\u56e0\u6b64**\u8d38\u6613\u4fdd\u62a4\u662f\u5e73\u8861\u56fd\u9645\u6536\u652f\u3001\u4fdd\u62a4\u56fd\u5185\u5c31\u4e1a\u7684\u5408\u6cd5\u5de5\u5177**\u3002\n3. **\u5173\u7a0e\u4e0e\u6c47\u7387\u8c03\u63a7**\uff1a\u4e3b\u5f20\u76f8\u673a\u4f7f\u7528\u5173\u7a0e\u3001\u5916\u6c47\u7ba1\u5236\u4e43\u81f3\u9002\u5ea6\u7684\"\u8d38\u6613\u58c1\u5792\"\u4ee5\u7ef4\u6301\u56fd\u5185\u7ecf\u6d4e\u7a33\u5b9a\uff1b\u6279\u8bc4\u91d1\u672c\u4f4d\u675f\u7f1a\u56fd\u5185\u5b8f\u89c2\u653f\u7b56\u3002\n4. **\u56fd\u5bb6\u81ea\u7ed9\u7684\u6709\u9650\u5ea6\u5408\u7406\u6027**\uff1a\u5728 1933 \u5e74\u300a\u81ea\u7ed9\u81ea\u8db3\u8bba\u300b\u4e2d\uff0c\u4ed6\u7f55\u89c1\u5730\u4e3a\u6709\u9650\u5ea6\u7684\u7ecf\u6d4e\u81ea\u7ed9\u8fa9\u62a4\uff0c\u8ba4\u4e3a**\u91d1\u878d\u3001\u601d\u60f3\u3001\u6587\u5316\u7684\u56fd\u9645\u5316\u503c\u5f97\u8ffd\u6c42\uff0c\u800c\u751f\u4ea7\u5e94\u5c3d\u91cf\u672c\u5730\u5316\u4ee5\u7ef4\u62a4\u793e\u4f1a\u7a33\u5b9a**\u3002\n5. **\u6218\u540e\u591a\u8fb9
