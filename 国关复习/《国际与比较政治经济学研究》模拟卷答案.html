**\uff1b\n   - \u5916\u56f4\"\u4e0d\u53d1\u8fbe\"\u4e0d\u662f\u6ede\u540e\uff0c\u800c\u662f\u4f53\u7cfb\u6027\u7ed3\u679c\u3002\n5. **\u5468\u671f\u6027**\uff1a\n   - \u5185\u5d4c\u5eb7\u5fb7\u62c9\u5b63\u8036\u592b\u957f\u6ce2\uff08\u7ecf\u6d4e\u5468\u671f\uff09\u548c\u9738\u6743\u5468\u671f\uff08\u7ea6 100\u2014150 \u5e74\uff09\uff1b\n   - \u4e0a\u5347\u671f = \u4e2d\u5fc3\u6269\u5f20\u3001\u534a\u8fb9\u7f18\u4e0a\u5347\u673a\u4f1a\uff1b\u4e0b\u964d\u671f = \u4e2d\u5fc3\u6536\u7f29\u3001\u5371\u673a\u3001\u9738\u6743\u66f4\u66ff\u3002\n6. **\u4e0d\u53ef\u9006\u6269\u5f20\u6027**\uff1a\n   - \u81ea 16 \u4e16\u7eaa\u8d77\u6301\u7eed\u6269\u5f20\uff0c**\u81f3 19 \u4e16\u7eaa\u672b\u5df2\u541e\u5e76\u6240\u6709\"\u5916\u90e8\u5730\u533a\"\uff0c\u8986\u76d6\u5168\u7403**\uff1b\n   - \u5f53\u4ee3\u4e16\u754c\u4f53\u7cfb\u662f\u5355\u4e00\u8d44\u672c\u4e3b\u4e49\u4e16\u754c\u4f53\u7cfb\uff0c\u4e0d\u5b58\u5728\"\u53e6\u4e00\u4e2a\"\u72ec\u7acb\u4f53\u7cfb\u3002\n7. **\u4e0d\u53ef\u907f\u514d\u7684\u5371\u673a\u6027**\uff1a\n   - \u963f\u745e\u5409\u3001\u6c83\u52d2\u65af\u5766\u665a\u5e74\u5224\u65ad\u5f53\u4ee3\u4f53\u7cfb\u5df2\u8fdb\u5165\u7ed3\u6784\u6027\u5371\u673a\uff08\u91d1\u878d\u5316\u3001\u9738\u6743\u4ea4\u66ff\u4e0d\u7545\u3001\u751f\u6001\u5371\u673a\u3001\u5229\u6da6\u7387\u4e0b\u964d\uff09\u3002\n\n**\u7406\u8bba\u8bc4\u4ef7**\uff1a\u73b0\u4ee3\u4e16\u754c\u4f53\u7cfb\u8bba\u63d0\u4f9b\u5b8f\u5927\u7ed3\u6784\u89c6\u89d2\uff0c\u5bf9\u56fd\u5bb6\u95f4\u4e0d\u5e73\u7b49\u3001\u957f\u65f6\u6bb5\u5386\u53f2\u8d8b\u52bf\u6709\u5f3a\u89e3\u91ca\u529b\uff1b\u4f46\u88ab\u6279\u8bc4\u51b3\u5b9a\u8bba\u503e\u5411\u3001\u4f4e\u4f30\u56fd\u5bb6\u81ea\u4e3b\u6027\u3001\u5bf9\u4e2d\u56fd\u5d1b\u8d77\u7b49\"\u534a\u8fb9\u7f18\u4e0a\u5347\"\u73b0\u8c61\u89e3\u91ca\u4e0d\u8db3\uff08\u53c2\u89c1 Wallerstein \u5377\u4e00\u7b2c\u4e03\u7ae0\uff1b\u738b\u6b63\u6bc5\uff1b\u5b8b\u65b0\u5b81/\u9648\u5cb3\u7b2c\u516d\u7ae0\uff09\u3002\n\n### 28. \u7b80\u8ff0\u5b89\u5fb7\u70c8\u00b7\u5188\u5fb7\u00b7\u5f17\u5170\u514b\"\u5b97\u4e3b\u2014\u536b\u661f\"\u6a21\u5f0f\u3010\u6a21\u62df-10\u3011\n\n\u5f17\u5170\u514b\u5728\u300a\u62c9\u4e01\u7f8e\u6d32\uff1a\u4e0d\u53d1\u8fbe\u4e0e\u9769\u547d\u300b\uff081969\uff09\u7cfb\u7edf\u63d0\u51fa\"\u5b97\u4e3b\u2014\u536b\u661f\"\uff08Metropolis-Satellite\uff09\u6a21\u5f0f\uff0c\u662f\u4f9d\u9644\u8bba\u7684\u7ecf\u5178\u8868\u8fbe\uff1a\n\n1. **\u6838\u5fc3\u547d\u9898**\uff1a\u8d44\u672c\u4e3b\u4e49\u4e16\u754c\u4f53\u7cfb\u7531\u5c42\u5c42\u94fe\u9501\u7684**\u5b97\u4e3b\u2014\u536b\u661f**\u5173\u7cfb\u6784\u6210\u3002\u6bcf\u4e2a\"\u536b\u661f\"\u5bf9\u5176\"\u5b97\u4e3b\"\u800c\u8a00\u53c8\u540c\u65f6\u662f\u4e0a\u4e00\u7ea7\u7684\u4e0b\u5c5e\u3002\n2. **\u94fe\u6761\u7ed3\u6784**\uff1a\u4ece\u5168\u7403\u5230\u5730\u65b9\u591a\u5c42\u5d4c\u5957\uff1a\n   - **\u5168\u7403\u5c42\u7ea7**\uff1a\u6b27\u7f8e\u5de5\u4e1a\u4e2d\u5fc3 \u2192 \u62c9\u7f8e / \u975e\u6d32 / \u4e9a\u6d32\u4f9d\u9644\u56fd\uff1b\n   - **\u56fd\u522b\u5c42\u7ea7**\uff1a\u4f9d\u9644\u56fd\u9996\u90fd/\u6cbf\u6d77\u5de5\u5546\u4e2d\u5fc3 \u2192 \u5185\u9646\u519c\u6751\uff1b\n   - **\u5730\u65b9\u5c42\u7ea7**\uff1a\u5730\u65b9\u5927\u57ce\u5e02 \u2192 \u5468\u8fb9\u5c0f\u57ce\u4e0e\u4e61\u6751\uff1b\n   - \u6bcf\u4e00\u7ea7\u5b97\u4e3b\u4ece\u5176\u536b\u661f\u6c72\u53d6\u5269\u4f59\uff0c\u518d\u5411\u4e0a\u4e00\u7ea7\u5b97\u4e3b\u4e0a\u7f34\u3002\n3. **\u4e0d\u53d1\u8fbe\u7684\u53d1\u5c55\uff08\"the development of underdevelopment\"\uff09**\uff1a\n   - \u5f17\u5170\u514b\u6700\u8457\u540d\u7684\u547d\u9898\u2014\u2014**\u5916\u56f4\"\u4e0d\u53d1\u8fbe\"\u4e0d\u662f\u505c\u7559\u5728\u524d\u73b0\u4ee3\u72b6\u6001\uff0c\u800c\u662f\u88ab\u4e2d\u5fc3\u6301\u7eed\u6c72\u53d6\u7684\u7ed3\u679c**\uff1b\n   - \u4e0e\u7f57\u65af\u6258\u7ebf\u6027\u8fdb\u5316\u8bba\uff08\"\u8d76\u4e0a\u4e2d\u5fc3\u5373\u53ef\")\u9488\u950b\u76f8\u5bf9\u3002\n4. **\u5386\u53f2\u547d\u9898**\uff1a\n   - \u62c9\u7f8e\u6700\u5feb\u589e\u957f\u53d1\u751f\u5728**\u4e0e\u5b97\u4e3b\u8054\u7cfb\u88ab\u5207\u65ad**\u7684\u65f6\u671f\uff1a\u2460\u6b96\u6c11\u6bcd\u56fd\u6218\u4e89\u5e72\u6270\u671f\uff1b\u2461\u5927\u8427\u6761\u671f\uff1b\u2462\u4e24\u6b21\u4e16\u754c\u5927\u6218\u671f\uff1b\n   - \u53cd\u8bc1\uff1a\u5f53\u4e0e\u4e2d\u5fc3\u8054\u7cfb\u6062\u590d\u540e\uff0c\u4f9d\u9644\u7ed3\u6784\u91cd\u5efa\uff0c\u53d1\u5c55\u518d\u6b21\u505c\u6ede\u3002\n5. **\u653f\u6cbb\u542b\u4e49**\uff1a\n   - \u5728\u4f53\u7cfb\u5185\u90e8\u6539\u826f\u4e0d\u8db3\u4ee5\u6253\u7834\u4f9d\u9644\uff1b\n   - \u4e3b\u5f20\u9769\u547d\u6027\u8131\u94a9\u3001\u81ea\u4e3b\u53d1\u5c55\u3001\u793e\u4f1a\u4e3b\u4e49\u8def\u5f84\u3002\n6. **\u6279\u8bc4\u4e0e\u4fee\u6b63**\uff1a\n   - \u5361\u591a\u4f50\u8d28\u7591\u8fc7\u4e8e\u51b3\u5b9a\u8bba\uff0c\u6307\u51fa\u5728\u8de8\u56fd\u516c\u53f8\u6295\u8d44\u4e0b\u5916\u56f4\u53ef\u5b9e\u73b0\"\u8054\u7cfb\u6027\u4f9d\u9644\u53d1\u5c55\"\uff1b\n   - \u6c83\u52d2\u65af\u5766\u6269\u5c55\u4e3a\u4e09\u5c42\uff08\u589e\u52a0\"\u534a\u8fb9\u7f18\"\uff09\u4ee5\u5904\u7406\u4e1c\u4e9a\u7b49\u6848\u4f8b\uff1b\n   - \u5b9e\u8bc1\u4e0a\uff0c\u4e1c\u4e9a\u56db\u5c0f\u9f99\u3001\u4e2d\u56fd\u5927\u9646\u7684\u8d76\u8d85\u6210\u529f\u5bf9\u7eaf\u5f17\u5170\u514b\u5f0f\u60b2\u89c2\u8bba\u6784\u6210\u6311\u6218\u3002\n7. **\u9057\u4ea7**\uff1a\u5c3d\u7ba1\u7ecf\u9a8c\u4e0a\u53d7\u5230\u6311\u6218\uff0c\"\u5b97\u4e3b\u2014\u536b\u661f\"\u6a21\u5f0f\u4f5c\u4e3a**\u63ed\u793a\u4e0d\u5e73\u7b49\u7ed3\u6784\u6301\u7eed\u518d\u751f\u4ea7\u7684\u5f62\u8c61\u6a21\u578b**\u4ecd\u5177\u7406\u8bba\u4ef7\u503c\uff0c\u662f\u4e16\u754c\u4f53\u7cfb\u8bba\u3001\u5168\u7403\u4ef7\u503c\u94fe\u5206\u6790\u7684\u601d\u60f3\u524d\u53f2\uff08\u53c2\u89c1 Frank 1969\uff1b\u738b\u6b63\u6bc5\uff1b\u5b8b\u65b0\u5b81/\u9648\u5cb3\u7b2c\u516d\u7ae0\uff09\u3002\n\n### 29. \u7b80\u8ff0\u5bfb\u79df\u5bf9\u8d38\u6613\u653f\u7b56\u7684\u5f71\u54cd\u3010\u6a21\u62df-10\u3011\n\n\u5bfb\u79df\uff08rent-seeking\uff09\u662f\u653f\u5e9c\u5931\u7075\u7684\u6838\u5fc3\u673a\u5236\u4e4b\u4e00\u3002\u5728\u8d38\u6613\u653f\u7b56\u9886\u57df\uff0c\u5bfb\u79df\u5bf9\u653f\u7b56\u5236\u5b9a\u548c\u6548\u679c\u4ea7\u751f\u7cfb\u7edf\u6027\u5f71\u54cd\uff1a\n\n1. **\u653f\u7b56\u88ab\u7279\u6b8a\u5229\u76ca\u4fd8\u83b7**\uff1a\n   - \u5173\u7a0e\u3001\u914d\u989d\u3001\u53cd\u503e\u9500\u3001\u6280\u672f\u6027\u58c1\u5792\u7b49\u4fdd\u62a4\u63aa\u65bd\u521b\u9020\"\u79df\u91d1\"\uff08\u53d7\u4fdd\u62a4\u884c\u4e1a\u7684\u8d85\u989d\u5229\u6da6\uff09\uff1b\n   - \u884c\u4e1a\u5229\u76ca\u96c6\u56e2\u6709\u5f3a\u6fc0\u52b1\u7ec4\u7ec7\u8d77\u6765\u4e89\u53d6\u4fdd\u62a4\uff0c**\u5e7f\u5927\u6d88\u8d39\u8005\u56e0\u4eba\u5747\u635f\u5931\u5c0f\u800c\u7f3a\u4e4f\u53cd\u5411\u7ec4\u7ec7\u80fd\u529b**\uff08\u5965\u5c14\u68ee\"\u5c0f\u96c6\u56e2\u5bf9\u5927\u96c6\u56e2\"\u903b\u8f91\uff09\uff1b\n   - **\u4fdd\u62a4\u5f85\u552e\u6a21\u578b**\uff08Grossman & Helpman 1994\uff09\uff1a\u653f\u5e9c\u76ee\u6807\u51fd\u6570 = \u793e\u4f1a\u798f\u5229 + \u653f\u6cbb\u732e\u91d1\u52a0\u6743\u548c\uff1b\u7ec4\u7ec7\u5316\u4ea7\u4e1a\u83b7\u5f97\u9ad8\u4fdd\u62a4\u3002\n2. **\u4fdd\u62a4\u7a0b\u5ea6\u7684\u504f\u79bb\u6700\u4f18**\uff1a\n   - \u5bfb\u79df\u4f7f\u5b9e\u9645\u4fdd\u62a4\u6c34\u5e73**\u7cfb\u7edf\u6027\u9ad8\u4e8e\u7ecf\u6d4e\u6700\u4f18\u6c34\u5e73**\uff1b\n   - \u5373\u4fbf\u76f8\u540c\u884c\u4e1a\u3001\u4e0d\u540c\u653f\u6cbb\u4f53\u5236\u4e0b\u4fdd\u62a4\u6c34\u5e73\u5dee\u5f02\u5de8\u5927\uff0c\u5dee\u5f02\u7531\u7ec4\u7ec7\u5316\u7a0b\u5ea6\u3001\u653f\u6cbb\u4f53\u5236\uff08\u591a\u6570 vs \u6bd4\u4f8b\u4ee3\u8868\u3001\u603b\u7edf vs \u8bae\u4f1a\uff09\u89e3\u91ca\u3002\n3. **\u8d44\u6e90\u9519\u914d\u4e0e\u793e\u4f1a\u798f\u5229\u635f\u5931**\uff1a\n   - \u5bfb\u79df\u652f\u51fa\u672c\u8eab\u662f\u975e\u751f\u4ea7\u6027\u6d88\u8017\uff08\u56fe\u6d1b\u514b\u65b9\u9635\uff09\uff1b\n   - \u8d44\u6e90\u88ab\u5438\u5f15\u5230\u5bfb\u79df\u800c\u975e\u521b\u65b0\uff1b\n   - \u5df4\u683c\u74e6\u8482\u7684 DUP\uff08\u76f4\u63a5\u975e\u751f\u4ea7\u6027\u9010\u5229\u6d3b\u52a8\uff09\u5206\u6790\u5c06\u5bfb\u79df\u63a8\u5e7f\u4e3a\u66f4\u5e7f\u6cdb\u798f\u5229\u635f\u5931\u3002\n4. **\u4fdd\u62a4\u7684\u653f\u6cbb\u7c98\u6027**\uff1a\n   - \u53d7\u4fdd\u62a4\u884c\u4e1a\u4e00\u65e6\u83b7\u5f97\u4fdd\u62a4\uff0c\u4f1a\u901a\u8fc7\u6301\u7eed\u6e38\u8bf4\u963b\u6b62\u64a4\u9500\uff1b\n   - \u653f\u7b56\u5448\u5f3a\u8def\u5f84\u4f9d\u8d56\uff08\u5982\u7f8e\u56fd\u519c\u4ea7\u54c1\u8865\u8d34\u3001\u7cd6\u4e1a\u4fdd\u62a4\uff09\u3002\n5. **\u56fd\u9645\u8c08\u5224\u7684\u5185\u90e8\u7ea6\u675f**\uff1a\n   - \u56fd\u5185\u5bfb\u79df\u96c6\u56e2\u6784\u6210\u8c08\u5224\u7ea6\u675f\uff08\"\u53cc\u5c42\u535a\u5f08\"\u4e2d\u7684\"\u5c0f\u8d62\u96c6\"\uff09\uff0c\u4f7f\u653f\u5e9c\u96be\u4ee5\u505a\u51fa\u8ba9\u6b65\uff1b\n   - \u591a\u54c8\u56de\u5408\u957f\u671f\u50f5\u5c40\u90e8\u5206\u6e90\u4e8e\u53d1\u8fbe\u56fd\u5bb6\u519c\u4e1a\u5229\u76ca\u96c6\u56e2\u7684\u5bfb\u79df\u963b\u529b\u3002\n6. **\u653f\u7b56\u5efa\u8bae**\uff1a\n   - **\u900f\u660e\u5316**\u4fdd\u62a4\u6210\u672c\uff08\u6d88\u8d39\u8005\u8d1f\u62c5\u66dd\u5149\uff09\uff1b\n   - **\u5173\u7a0e\u56fa\u5316**\u4e8e\u591a\u8fb9\u89c4\u5219\uff08GATT/WTO\uff09\u4ee5\u7ea6\u675f\u56fd\u5185\u5bfb\u79df\uff1b\n   - **\u56fd\u5185\u8865\u507f\u673a\u5236**\uff08\u518d\u5c31\u4e1a\u57f9\u8bad\u3001\u793e\u4fdd\uff09\u4ee5\u524a\u5f31\u53cd\u81ea\u7531\u8d38\u6613\u8054\u76df\uff1b\n   - \u884c\u653f\u7a0b\u5e8f\u6539\u9769\uff08\u9650\u5236\u884c\u4e1a\u53cd\u503e\u9500\u81ea\u7531\u88c1\u91cf\u3001\u5f3a\u5236\u6210\u672c\u2014\u6536\u76ca\u8bc4\u4f30\uff09\u3002\n\n**\u7406\u8bba\u610f\u6db5**\uff1a\u5bfb\u79df\u5206\u6790\u63ed\u793a\u4e86**\u8d38\u6613\u4fdd\u62a4\u7684\u653f\u6cbb\u7ecf\u6d4e\u5b66\u6839\u6e90\u4e0d\u5728\u4e8e\u5e02\u573a\u5931\u7075\uff0c\u800c\u5728\u4e8e\u653f\u6cbb\u5e02\u573a\u5931\u7075**\uff0c\u4e3a\u7406\u89e3\u8d38\u6613\u653f\u7b56\u7684\u975e\u6700\u4f18\u6027\u63d0\u4f9b\u4e86\u5fae\u89c2\u57fa\u7840\uff08\u53c2\u89c1 Krueger 1974\uff1bGrossman & Helpman 1994\uff1b\u7530\u91ce\u7b2c\u516d\u7ae0\uff09\u3002\n\n### 30. \u7b80\u8ff0\u653f\u6cbb\u5546\u4e1a\u5468\u671f\u7684\u6210\u56e0\u3010\u6a21\u62df-10\u3011\n\n\u653f\u6cbb\u5546\u4e1a\u5468\u671f\uff08Political Business Cycle, PBC\uff09\u7531 William Nordhaus 1975 \u5e74\u63d0\u51fa\u7cfb\u7edf\u5316\u6a21\u578b\uff0c\u6307**\u7ecf\u6d4e\u6ce2\u52a8\u4e0e\u653f\u6cbb\u5468\u671f\uff08\u7279\u522b\u662f\u9009\u4e3e\u5468\u671f\uff09\u7cfb\u7edf\u6027\u76f8\u5173\u7684\u73b0\u8c61**\u3002\u4e3b\u8981\u6210\u56e0\uff1a\n\n1. **\u673a\u4f1a\u4e3b\u4e49\u578b PBC\uff08Nordhaus 1975\uff09**\uff1a\n   - **\u6838\u5fc3\u673a\u5236**\uff1a\u6267\u653f\u8005\u8ffd\u6c42\u8fde\u4efb\uff0c**\u9009\u4e3e\u524d\u523a\u6fc0\u7ecf\u6d4e**\uff08\u6269\u5f20\u6027\u8d27\u5e01/\u8d22\u653f\u653f\u7b56\u3001\u964d\u4f4e\u5931\u4e1a\u7387\uff09\uff0c**\u9009\u4e3e\u540e\u7d27\u7f29**\uff08\u5e94\u5bf9\u901a\u80c0\u540e\u679c\uff09\uff1b\n   - \u5229\u7528\u9009\u6c11\u7684**\u77ed\u89c6\u504f\u597d**\u548c\u5bf9\u6700\u8fd1\u7ecf\u6d4e\u8868\u73b0\u7684\u8fc7\u5ea6\u53cd\u5e94\uff1b\n   - \u5468\u671f\u957f\u5ea6\u4e0e\u9009\u4e3e\u5468\u671f\uff084\u20145 \u5e74\uff09\u5927\u81f4\u4e00\u81f4\u3002\n2. **\u515a\u6d3e\u578b PBC\uff08Hibbs 1977\uff09**\uff1a\n   - \u4e0d\u540c\u653f\u515a\u5bf9\u5931\u4e1a vs \u901a\u80c0\u7684\u504f\u597d\u4e0d\u540c\uff1a**\u5de6\u6d3e\u504f\u597d\u4f4e\u5931\u4e1a\uff08\u63a5\u53d7\u8f83\u9ad8\u901a\u80c0\uff09\u3001\u53f3\u6d3e\u504f\u597d\u4f4e\u901a\u80c0**\uff1b\n   - \u653f\u6743\u66f4\u66ff\u5bfc\u81f4\u653f\u7b56\u5207\u6362 \u2192 \u7ecf\u6d4e\u6ce2\u52a8\uff1b\n   - \u4f8b\uff1a\u7f8e\u56fd\u6c11\u4e3b\u515a\u6267\u653f\u671f\u95f4\u5931\u4e1a\u7387\u8f83\u4f4e\u3001\u901a\u80c0\u8f83\u9ad8\uff0c\u5171\u548c\u515a\u53cd\u4e4b\u3002\n3. **\u7406\u6027\u9884\u671f\u4fee\u6b63\u7248**\uff08Alesina, 1987\uff1bRogoff & Sibert 1988\uff09\uff1a\n   - \u7406\u6027\u9009\u6c11\u4f1a\u9884\u671f PBC \u64cd\u7eb5\uff0c\u4f7f\u7eaf\u673a\u4f1a\u4e3b\u4e49\u578b\u523a\u6fc0\u5931\u6548\uff1b\n   - \u4fee\u6b63\u7248\uff1a**\u4fe1\u53f7\u4f20\u9012\u578b PBC**\u2014\u2014\u80fd\u529b\u5f3a\u7684\u6267\u653f\u8005\u901a\u8fc7\u8d22\u653f\u4fe1\u53f7\u5411\u9009\u6c11\u5c55\u793a\u80fd\u529b\uff0c\u5f15\u53d1\u9009\u4e3e\u524d\u7684\u6709\u9650\u64cd\u7eb5\uff1b\n   - **\u515a\u6d3e\u7406\u6027 PBC**\uff1a\u9009\u4e3e\u4e0d\u786e\u5b9a\u6027 + \u515a\u6d3e\u504f\u597d\u5dee\u5f02 \u2192 \u9009\u4e3e\u540e\u521d\u671f\u51fa\u73b0\u7ecf\u6d4e\u6ce2\u52a8\uff08\u5e02\u573a\u53cd\u5e94\u672a\u9884\u671f\u5230\u7684\u653f\u7b56\u65b9\u5411\uff09\u3002\n4. **\u5236\u5ea6\u53d8\u91cf\u7684\u5f71\u54cd**\uff1a\n   - **\u592e\u884c\u72ec\u7acb\u6027**\u5f3a \u2192 \u8d27\u5e01\u653f\u7b56\u96be\u4ee5\u670d\u52a1 PBC\uff0c\u673a\u4f1a\u4e3b\u4e49\u578b PBC \u5f31\u5316\uff1b\n   - **\u8d22\u653f\u7eaa\u5f8b**\u5f3a \u2192 PBC \u8f6c\u5411\u5176\u4ed6\u5de5\u5177\uff08\u76d1\u7ba1\u653e\u677e\u3001\u7279\u5b9a\u8865\u8d34\uff09\uff1b\n   - **\u9009\u4e3e\u5236\u5ea6**\uff1a\u591a\u6570\u5236\u4e0b PBC \u5f3a\u4e8e\u6bd4\u4f8b\u5236\uff08\u5355\u4e00\u6267\u653f\u66f4\u6613\u64cd\u7eb5\uff09\u3002\n5. **\u53d1\u5c55\u4e2d\u56fd\u5bb6\u7684\u7279\u6b8a\u6027**\uff1a\n   - \u9009\u4e3e\u5468\u671f + \u6c47\u7387\u653f\u7b56\uff1a\u62c9\u7f8e\u56fd\u5bb6\u5e38\u51fa\u73b0\"\u9009\u4e3e\u524d\u9ad8\u4f30\u2014\u9009\u4e3e\u540e\u8d2c\u503c\"\u5468\u671f\uff1b\n   - \u8d22\u653f\u8d64\u5b57\u4e0e\u503a\u52a1\u5468\u671f\u5316\uff1b\n   - \u653f\u6cbb\u4e0d\u7a33\u5b9a\u52a0\u5267\u5468\u671f\u6ce2\u52a8\u3002\n6. **\u5f53\u4ee3\u6f14\u53d8**\uff1a\n   - \u592e\u884c\u72ec\u7acb\u5316\u964d\u4f4e\u4e86\u8d27\u5e01\u578b PBC\uff1b\n   - **\u8d22\u653f\u578b PBC**\uff08\u51cf\u7a0e\u3001\u57fa\u5efa\u3001\u8865\u8d34\uff09\u4ecd\u7a81\u51fa\uff1b\n   - **\u76d1\u7ba1\u578b PBC**\uff08\u91d1\u878d\u76d1\u7ba1\u5468\u671f\u3001\u4ea7\u4e1a\u653f\u7b56\u5468\u671f\uff09\u65e5\u76ca\u91cd\u8981\u3002\n\n**\u7406\u8bba\u610f\u6db5**\uff1aPBC \u5206\u6790\u63ed\u793a\u4e86**\u6c11\u4e3b\u653f\u6cbb\u5185\u5d4c\u7684\u5b8f\u89c2\u7ecf\u6d4e\u4e0d\u7a33\u5b9a\u503e\u5411**\uff0c\u662f\u516c\u5171\u9009\u62e9\u7406\u8bba\u7684\u91cd\u8981\u5e94\u7528\uff0c\u4e5f\u662f\u592e\u884c\u72ec\u7acb\u6027\u3001\u8d22\u653f\u89c4\u5219\u3001\u72ec\u7acb\u8d22\u653f\u673a\u6784\u7b49\"\u53cd PBC \u5236\u5ea6\"\u7684\u7406\u8bba\u57fa\u7840\uff08\u53c2\u89c1 Nordhaus 1975\uff1bHibbs 1977\uff1bAlesina 1987\uff1b\u7530\u91ce\u7b2c\u4e03\u7ae0\uff09\u3002\n\n### 31. \u7b80\u8ff0\u514b\u62c9\u65af\u7eb3\u7684\u9738\u6743\u7a33\u5b9a\u7406\u8bba\u3010\u6a21\u62df-11\u3011\n\n\u65af\u8482\u82ac\u00b7\u514b\u62c9\u65af\u7eb3\uff08Stephen Krasner\uff09\u5c06\u9738\u6743\u7a33\u5b9a\u8bba\u4ece\u7ecf\u6d4e\u9886\u57df\uff08\u91d1\u5fb7\u5c14\u4f2f\u683c\u3001\u5409\u5c14\u5e73\uff09\u7cfb\u7edf\u6269\u5c55\u5230**\u4e00\u822c\u56fd\u9645\u673a\u5236\u7406\u8bba**\uff0c\u4ee3\u8868\u4f5c\u300a\u56fd\u5bb6\u6743\u529b\u4e0e\u56fd\u9645\u8d38\u6613\u7ed3\u6784\u300b\uff081976\uff09\u548c\u300a\u56fd\u9645\u673a\u5236\u300b\uff081983\uff0c\u7f16\uff09\u3002\u5176\u6838\u5fc3\u547d\u9898\uff1a\n\n1. **\u57fa\u672c\u8bba\u70b9**\uff1a**\u56fd\u9645\u5f00\u653e\u7ecf\u6d4e\u4f53\u7cfb\u7684\u5174\u8870\u4e0e\u9738\u6743\u56fd\u5b9e\u529b\u5468\u671f\u540c\u6b65**\u2014\u2014\u9738\u6743\u56fd\u613f\u610f\u5e76\u80fd\u591f\u63d0\u4f9b\u5f00\u653e\u4f53\u7cfb\u6240\u9700\u7684\u516c\u5171\u7269\u54c1\uff08\u5f00\u653e\u5e02\u573a\u3001\u7a33\u5b9a\u8d27\u5e01\u3001\u89c4\u5219\u4f9b\u7ed9\uff09\u3002\n2. **\u56fd\u5bb6\u5229\u76ca\u7ed3\u6784**\uff1a\u4e0e\u57fa\u6b27\u6c49\u7684\"\u56fd\u5bb6\u8ffd\u6c42\u7edd\u5bf9\u6536\u76ca\"\u5047\u8bbe\u4e0d\u540c\uff0c\u514b\u62c9\u65af\u7eb3\u66f4\u5f3a\u8c03\u56fd\u5bb6\u8ffd\u6c42**\u591a\u76ee\u6807**\uff08\u8d22\u5bcc\u3001\u653f\u6cbb\u6743\u529b\u3001\u56fd\u5bb6\u5b89\u5168\u3001\u793e\u4f1a\u7a33\u5b9a\uff09\uff0c\u9738\u6743\u56fd\u5728\u4e0d\u540c\u65f6\u671f\u5bf9\u81ea\u7531\u8d38\u6613\u7684\u504f\u597d\u4e0d\u540c\u3002\n3. **\u5386\u53f2\u7ecf\u9a8c**\uff1a\n   - 19 \u4e16\u7eaa\u4e2d\u540e\u671f\u82f1\u56fd\u9738\u6743\u4e0b\u7684\u81ea\u7531\u8d38\u6613\uff081846 \u8c37\u7269\u6cd5\u5e9f\u9664\u20141873 \u5927\u8427\u6761\u524d\uff09\uff1b\n   - 1945\u20141970 \u5e74\u4ee3\u7f8e\u56fd\u9738\u6743\u4e0b\u7684 GATT \u81ea\u7531\u5316\uff1b\n   - \u9738\u6743\u7a7a\u767d\u671f\uff08\u4e24\u6b21\u5927\u6218\u95f4\uff09\u7684\u5173\u7a0e\u6218\u4e0e\u5168\u7403\u8427\u6761\u3002\n4. **\u673a\u5236\u5b9a\u4e49**\uff1a\u514b\u62c9\u65af\u7eb3\u628a\u56fd\u9645\u673a\u5236\u5b9a\u4e49\u4e3a**\"\u539f\u5219\u3001\u89c4\u8303\u3001\u89c4\u5219\u4e0e\u51b3\u7b56\u7a0b\u5e8f\u7684\u96c6\u5408\uff0c\u884c\u4e3a\u8005\u9884\u671f\u56f4\u7ed5\u5b83\u4eec\u6c47\u805a\"**\u2014\u2014\u8fd9\u4e00\u5b9a\u4e49\u81f3\u4eca\u4e3b\u5bfc IPE \u5b66\u754c\u3002\n5. **\u4e0e\u57fa\u6b27\u6c49\u7684\u5206\u6b67**\uff1a\n   - \u514b\u62c9\u65af\u7eb3\uff1a\u4f53\u7cfb\u7a33\u5b9a\u4e0e\u9738\u6743\u5468\u671f\u7d27\u5bc6\u540c\u6b65\uff1b\n   - \u57fa\u6b27\u6c49\uff1a\u5236\u5ea6\u5177\u6709\u9ecf\u6027\uff0c\u9738\u6743\u8870\u843d\u540e\u673a\u5236\u4ecd\u53ef\u7ef4\u6301\uff08\"\u9738\u6743\u4e4b\u540e\"\uff09\uff1b\n   - \u4e24\u4eba\u5171\u540c\u70b9\uff1a\u90fd\u628a\u9738\u6743\u4e0e\u673a\u5236\u4f9b\u7ed9\u8054\u7cfb\u8d77\u6765\u3002\n6. **\"\u88ab\u5d4c\u5165\"\u7684\u73b0\u5b9e\u4e3b\u4e49\"**\uff1a\u514b\u62c9\u65af\u7eb3\u88ab\u5f52\u4e3a\"\u4fee\u6b63\u73b0\u5b9e\u4e3b\u4e49\"\uff0c\u627f\u8ba4\u673a\u5236\u91cd\u8981\u4f46\u575a\u6301\u673a\u5236\u670d\u52a1\u4e8e\u56fd\u5bb6\u5229\u76ca\u4e14\u6700\u7ec8\u7531\u6743\u529b\u7ed3\u6784\u51b3\u5b9a\u3002\n7. **\u5f53\u4ee3\u5ef6\u4f38**\uff1a\n   - \u89e3\u91ca\u7f8e\u56fd\"\u9000\u7fa4\"\uff08\u5df4\u9ece\u534f\u5b9a\u3001\u4f0a\u6838\u534f\u8bae\u3001TPP\uff09\u53cd\u6620\u9738\u6743\u504f\u597d\u53d8\u5316\uff1b\n   - \"\u5b88\u6210\u9738\u6743 + \u5d1b\u8d77\u56fd\"\u683c\u5c40\u4e0b\u673a\u5236\u4f9b\u7ed9\u7684\u53cc\u8f68\u5316\uff08IMF vs AIIB\u3001WTO vs RCEP/CPTPP\uff09\u3002\n\n**\u8bc4\u4ef7**\uff1a\u514b\u62c9\u65af\u7eb3\u7684 HST \u6bd4\u91d1\u5fb7\u5c14\u4f2f\u683c\u66f4\u5177\u7406\u8bba\u4e00\u822c\u6027\uff0c\u4f46\u5728\u89e3\u91ca 1970 \u5e74\u4ee3\u540e\u673a\u5236\u6301\u7eed\u6027\u65b9\u9762\u4e0d\u5982\u57fa\u6b27\u6c49\u7684\u5236\u5ea6\u81ea\u7531\u4e3b\u4e49\u6709\u529b\u3002\u4e24\u4eba\u89c2\u70b9\u5171\u540c\u6784\u6210 IPE \u5236\u5ea6\u7814\u7a76\u7684\u4e3b\u8f74\uff08\u53c2\u89c1 Krasner 1976, 1983\uff1b\u7530\u91ce\u7b2c\u56db\u7ae0\uff09\u3002\n\n### 32. \u7b80\u8ff0\u5965\u5c14\u68ee\u7684\u96c6\u4f53\u884c\u52a8\u7406\u8bba\u3010\u6a21\u62df-11\u3011\n\n\u66fc\u745f\u00b7\u5965\u5c14\u68ee\uff08Mancur Olson\uff09\u5728\u300a\u96c6\u4f53\u884c\u52a8\u7684\u903b\u8f91\u300b\uff081965\uff09\u4e2d\u63d0\u51fa\u7cfb\u7edf\u7684\u96c6\u4f53\u884c\u52a8\u7406\u8bba\uff0c\u6311\u6218\u4e86\u591a\u5143\u4e3b\u4e49\"\u5229\u76ca\u96c6\u56e2\u81ea\u52a8\u4ea7\u751f\u4e8e\u5171\u540c\u5229\u76ca\"\u7684\u5047\u8bbe\u3002\u6838\u5fc3\u5185\u5bb9\uff1a\n\n1. **\u6838\u5fc3\u547d\u9898**\uff1a**\u6709\u5171\u540c\u5229\u76ca\u4e0d\u7b49\u4e8e\u4f1a\u6709\u96c6\u4f53\u884c\u52a8**\u3002\u5728\u81ea\u5229\u7406\u6027\u5047\u8bbe\u4e0b\uff0c**\u4e3a\u516c\u5171\u5229\u76ca\u91c7\u53d6\u884c\u52a8\u662f\u53cd\u4e2a\u4f53\u7406\u6027\u7684**\u2014\u2014\u56e0\u4e3a\u516c\u5171\u7269\u54c1\u5177\u6709\u975e\u6392\u4ed6\u6027\uff0c\u642d\u4fbf\u8f66\u662f\u5360\u4f18\u7b56\u7565\u3002\n2. **\u96c6\u56e2\u89c4\u6a21\u7684\u6096\u8bba**\uff1a\n   - **\u5c0f\u96c6\u56e2**\uff1a\u6210\u5458\u5c11 \u2192 \u4e2a\u4f53\u8d21\u732e\u8fb9\u9645\u5f71\u54cd\u5927 + \u76d1\u7763\u6210\u672c\u4f4e + \u6613\u8bc6\u522b\u642d\u4fbf\u8f66 \u2192 **\u66f4\u6613\u5b9e\u73b0\u96c6\u4f53\u884c\u52a8**\uff1b\n   - **\u5927\u96c6\u56e2**\uff08\u6f5c\u5728\u7684\u7fa4\u4f17\u578b\u5229\u76ca\uff09\uff1a\u4e2a\u4f53\u8d21\u732e\u8fb9\u9645\u5f71\u54cd\u5fae\u5c0f + \u76d1\u7763\u6210\u672c\u9ad8 + \u96be\u4ee5\u8bc6\u522b\u642d\u4fbf\u8f66 \u2192 **\u66f4\u96be\u5b9e\u73b0\u96c6\u4f53\u884c\u52a8**\uff1b\n   - \u7ed3\u8bba\uff1a\u7ec4\u7ec7\u5316\u5229\u76ca\u96c6\u56e2\u5e76\u975e\u53cd\u6620\"\u591a\u6570\u4eba\u5171\u540c\u5229\u76ca\"\uff0c\u800c\u662f\u53cd\u6620\"\u5c11\u6570\u96c6\u4e2d\u5229\u76ca\"\u2014\u2014\u5927\u4f01\u4e1a\u3001\u884c\u4e1a\u7cbe\u82f1\u6bd4\u6d88\u8d39\u8005\u3001\u7eb3\u7a0e\u4eba\u66f4\u6613\u7ec4\u7ec7\u8d77\u6765\u3002\n3. **\u9009\u62e9\u6027\u6fc0\u52b1\uff08Selective Incentives\uff09**\uff1a\n   - \u5927\u96c6\u56e2\u82e5\u8981\u5b9e\u73b0\u96c6\u4f53\u884c\u52a8\uff0c\u5fc5\u987b\u63d0\u4f9b**\u4e13\u5c5e\u4e8e\u8d21\u732e\u8005\u7684\u79c1\u4eba\u7269\u54c1\u5956\u52b1**\u6216**\u5bf9\u642d\u4fbf\u8f66\u8005\u7684\u79c1\u4eba\u7269\u54c1\u60e9\u7f5a**\uff1a\n     - **\u6b63\u5411\u9009\u62e9\u6027\u6fc0\u52b1**\uff1a\u884c\u4e1a\u534f\u4f1a\u7684\u5185\u90e8\u670d\u52a1\u3001\u4f1a\u5458\u4e13\u4eab\u57f9\u8bad\u3001\u4fe1\u606f\u7279\u6743\uff1b\n     - **\u8d1f\u5411\u9009\u62e9\u6027\u6fc0\u52b1**\uff1a\u5de5\u4f1a\u4f1a\u8d39\u5f3a\u5236\u3001\u884c\u4e1a\u51c6\u5165\u8bb8\u53ef\uff1b\n   - \u6ca1\u6709\u9009\u62e9\u6027\u6fc0\u52b1\u7684\u7eaf\u516c\u5171\u7269\u54c1\u96c6\u56e2\uff08\u5982\"\u53cd\u901a\u80c0\u8054\u76df\"\"\u6e05\u6d01\u7a7a\u6c14\u652f\u6301\u8005\"\uff09\u51e0\u4e4e\u65e0\u6cd5\u6301\u7eed\u52a8\u5458\u3002\n4. **\u4e0d\u5bf9\u79f0\u5229\u76ca\u96c6\u56e2\u7684\u653f\u6cbb\u540e\u679c**\uff1a\n   - \u653f\u6cbb\u8fc7\u7a0b\u88ab\u7ec4\u7ec7\u5316\u5c11\u6570\u5229\u76ca\u96c6\u56e2\uff08\u5982\u884c\u4e1a\u6e38\u8bf4\u3001\u519c\u573a\u4e3b\u3001\u5de5\u4f1a\uff09\u6240\u652f\u914d\uff1b\n   - \u591a\u6570\u5e7f\u6cdb\u5229\u76ca\uff08\u6d88\u8d39\u8005\u3001\u7eb3\u7a0e\u4eba\uff09\u867d\u4eba\u6570\u4f17\u591a\u4f46\u7f3a\u4e4f\u7ec4\u7ec7\uff0c\u96be\u4ee5\u6709\u6548\u5f71\u54cd\u653f\u7b56\uff1b\n   - \u8fd9\u662f\u5bfb\u79df\u3001\u4fdd\u62a4\u4e3b\u4e49\u3001\u8865\u8d34\u653f\u6cbb\u7684\u5fae\u89c2\u57fa\u7840\u3002\n5. **\u300a\u56fd\u5bb6\u5174\u8870\u63a2\u6e90\u300b\uff081982\uff09\u6269\u5c55**\uff1a\n   - \u957f\u65f6\u6bb5\u5185\u5229\u76ca\u96c6\u56e2\u79ef\u7d2f \u2192 \u653f\u7b56\u88ab\u65e2\u5f97\u5229\u76ca\u96c6\u56e2\u963b\u585e \u2192 \u5236\u5ea6\u50f5\u5316\u4e0e\u56fd\u5bb6\u8870\u843d\uff1b\n   - \u6218\u4e89\u3001\u9769\u547d\u7b49\"\u6e05\u7b97\"\u4e8b\u4ef6\u53cd\u800c\u80fd\u6253\u7834\u5229\u76ca\u96c6\u56e2\u79ef\u7d2f\u3001\u91ca\u653e\u589e\u957f\u7a7a\u95f4\uff08\u89e3\u91ca\u6218\u540e\u5fb7\u65e5\"\u5947\u8ff9\"\uff09\u3002\n6. **\u56fd\u9645\u5173\u7cfb\u542b\u4e49**\uff1a\n   - \u56fd\u9645\u516c\u5171\u7269\u54c1\u4f9b\u7ed9\u540c\u6837\u9762\u4e34\u96c6\u4f53\u884c\u52a8\u56f0\u5883\uff0c\u9700\u8981\u9738\u6743\u6216\u5236\u5ea6\u63d0\u4f9b\u9009\u62e9\u6027\u6fc0\u52b1\uff1b\n   - \u89e3\u91ca\u6c14\u5019\u3001\u8d38\u6613\u3001\u91d1\u878d\u76d1\u7ba1\u8c08\u5224\u4e2d\u7684\u642d\u4fbf\u8f66\u56f0\u5883\u3002\n7. **\u8bc4\u4ef7**\uff1a\u5965\u5c14\u68ee\u7406\u8bba\u662f\u516c\u5171\u9009\u62e9\u3001\u65b0\u653f\u6cbb\u7ecf\u6d4e\u5b66\u3001IPE \u5236\u5ea6\u5206\u6790\u7684\u5960\u57fa\u6027\u8d21\u732e\uff0c\u4f46\u88ab\u6279\u8bc4\u4f4e\u4f30\u4e86\u89c4\u8303\u3001\u8ba4\u540c\u3001\u4fe1\u4efb\u7b49\u975e\u7269\u8d28\u6fc0\u52b1\u4f5c\u7528\uff08\u53c2\u89c1 Olson 1965\uff1b\u7530\u91ce\u7b2c\u4e8c\u7ae0\uff09\u3002\n\n### 33. \u7b80\u8ff0\u4e16\u754c\u4f53\u7cfb\u7684\u7ed3\u6784\u3010\u6a21\u62df-11\u3011\n\n\u627f\u63a5 26\u300127 \u9898\u3002\u6c83\u52d2\u65af\u5766\u300a\u73b0\u4ee3\u4e16\u754c\u4f53\u7cfb\u300b\u63d0\u51fa\uff0c\u73b0\u4ee3\u4e16\u754c\u4f53\u7cfb\u7684\u6838\u5fc3\u7ed3\u6784\u5305\u62ec\u4ee5\u4e0b\u51e0\u4e2a\u5c42\u9762\uff1a\n\n1. **\u7ecf\u6d4e\u7ed3\u6784\uff08\u4e09\u5c42\u4e0d\u5e73\u7b49\u5206\u5de5\uff09**\uff1a\n   - **\u4e2d\u5fc3\uff08core\uff09**\uff1a\u9ad8\u6280\u672f\u3001\u9ad8\u8d44\u672c\u5bc6\u5ea6\u3001\u9ad8\u5229\u6da6\u7684\u5236\u9020\u4e0e\u670d\u52a1\u4e1a\uff1b\u5f3a\u56fd\u5bb6\u3001\u81ea\u7531\u52b3\u52a8\uff1b\n   - **\u534a\u8fb9\u7f18\uff08semi-periphery\uff09**\uff1a\u4e2d\u7b49\u6280\u672f\u4e0e\u5229\u6da6\uff1b\u6df7\u5408\u6027\u4ea7\u4e1a\u7ed3\u6784\uff1b\u4e2d\u7b49\u56fd\u5bb6\uff1b\u8d77\u4f53\u7cfb\u5185**\u793e\u4f1a\u7f13\u51b2**\u4f5c\u7528\uff0c\u5438\u6536\u4e0a\u4e0b\u6d41\u52a8\u538b\u529b\uff1b\n   - **\u8fb9\u7f18\uff08periphery\uff09**\uff1a\u4f4e\u6280\u672f\u3001\u539f\u6599\u548c\u52b3\u52a8\u5bc6\u96c6\u751f\u4ea7\uff1b\u5f31\u56fd\u5bb6\u3001\u5f3a\u5236\u6216\u534a\u5f3a\u5236\u52b3\u52a8\uff08\u6b96\u6c11\u65f6\u671f\u4e3a\u5974\u96b6\u3001\u5951\u7ea6\u5de5\uff0c\u5f53\u4ee3\u4e3a\u975e\u6b63\u5f0f\u52b3\u5de5\uff09\uff1b\n   - \u4e09\u5c42\u4e4b\u95f4\u901a\u8fc7**\u4e0d\u5e73\u7b49\u4ea4\u6362**\u548c**\u5269\u4f59\u8f6c\u79fb**\u8054\u7cfb\u3002\n2. **\u653f\u6cbb\u7ed3\u6784\uff08\u6c11\u65cf\u56fd\u5bb6\u4f53\u7cfb\uff09**\uff1a\n   - \u73b0\u4ee3\u4e16\u754c\u4f53\u7cfb\u7279\u5f81\u662f**\u5355\u4e00\u4e16\u754c\u5e02\u573a + \u591a\u5143\u653f\u6cbb\u6743\u5a01**\uff08\u4e0e\u53e4\u4ee3\u4e16\u754c\u5e1d\u56fd\u5bf9\u6bd4\uff09\uff1b\n   - \u56fd\u5bb6\u662f\u4e16\u754c\u4f53\u7cfb\u7684\u653f\u6cbb\u627f\u62c5\u8005\uff0c\u5f3a\u56fd\u5bb6\u80fd\u4e3a\u672c\u56fd\u8d44\u672c\u4e89\u53d6\u4f53\u7cfb\u5185\u7684\u6709\u5229\u4f4d\u7f6e\uff1b\n   - \u56fd\u5bb6\u4f53\u7cfb\u672c\u8eab\u662f\u4f53\u7cfb\u7684\u4ea7\u7269\u2014\u2014\u6c11\u65cf\u56fd\u5bb6\u968f\u8d44\u672c\u4e3b\u4e49\u6269\u5f20\u800c\u6269\u6563\u3002\n3. **\u9738\u6743\u5468\u671f\u7ed3\u6784**\uff1a\n   - \u5386\u53f2\u4e0a\u6709\u4e09\u4e2a\u9738\u6743\u5468\u671f\uff1a**\u8377\u5170\uff08\u7ea6 1620\u20141670\uff09\u2014\u82f1\u56fd\uff08\u7ea6 1815\u20141873\uff09\u2014\u7f8e\u56fd\uff08\u7ea6 1945\u20141970s\uff09**\uff1b\n   - \u6bcf\u4e00\u9738\u6743\u5148\u540e\u5728**\u751f\u4ea7\u3001\u5546\u4e1a\u3001\u91d1\u878d**\u4e09\u4e2a\u9886\u57df\u53d6\u5f97\u9886\u5148\uff1b\n   - \u9738\u6743\u5468\u671f\u7ea6 100\u2014150 \u5e74\uff0c\u4e0e\u5eb7\u5fb7\u62c9\u5b63\u8036\u592b\u957f\u6ce2\u53e0\u52a0\u3002\n4. **\u957f\u6ce2\u7ed3\u6784**\uff1a\n   - \u5185\u5d4c\u5eb7\u5fb7\u62c9\u5b63\u8036\u592b A \u6bb5\uff08\u4e0a\u5347\uff09/ B \u6bb5\uff08\u4e0b\u964d\uff09\uff1b\n   - A \u6bb5\uff1a\u6280\u672f\u9769\u547d\u3001\u5e02\u573a\u6269\u5f20\u3001\u534a\u8fb9\u7f18\u673a\u4f1a\u7a97\u53e3\uff1b\n   - B \u6bb5\uff1a\u8fc7\u5269\u3001\u91d1\u878d\u5316\u3001\u9738\u6743\u5371\u673a\u3001\u4f53\u7cfb\u7ed3\u6784\u8c03\u6574\u3002\n5. **\u610f\u8bc6\u5f62\u6001\u4e0e\u6587\u5316\u7ed3\u6784**\uff1a\n   - **\u8d44\u4ea7\u9636\u7ea7\u81ea\u7531\u4e3b\u4e49**\u4f5c\u4e3a\u9738\u6743\u610f\u8bc6\u5f62\u6001\uff1b\n   - 19 \u4e16\u7eaa\u79d1\u5b66\u4e3b\u4e49\u2014\u8fdb\u5316\u8bba\u53d9\u4e8b\u6b63\u5f53\u5316\u4e2d\u5fc3\u2014\u5916\u56f4\u5206\u5de5\uff1b\n   - \u6c11\u65cf\u4e3b\u4e49\u3001\u793e\u4f1a\u4e3b\u4e49\u3001\u751f\u6001\u4e3b\u4e49\u7b49\u53cd\u4f53\u7cfb\u8fd0\u52a8\u5468\u671f\u6027\u6d8c\u73b0\u3002\n6. **\u5371\u673a\u4e0e\u53d8\u8fc1\u673a\u5236**\uff1a\n   - **\u77ed\u671f\u6ce2\u52a8**\uff1a\u5546\u4e1a\u5468\u671f\u3001\u91d1\u878d\u5371\u673a\uff1b\n   - **\u4e2d\u671f\u8c03\u6574**\uff1a\u5eb7\u5fb7\u62c9\u5b63\u8036\u592b\u957f\u6ce2\uff1b\n   - **\u957f\u671f\u8f6c\u578b**\uff1a\u9738\u6743\u66f4\u66ff\u3001\u534a\u8fb9\u7f18\u96c6\u56e2\u8fdb\u5165\u4e2d\u5fc3\u3001\u4f53\u7cfb\u7ed3\u6784\u91cd\u7ec4\uff1b\n   - \u6c83\u52d2\u65af\u5766\u665a\u5e74\u5224\u65ad\u5f53\u4ee3\u4f53\u7cfb\u5df2\u8fdb\u5165\"\u7ed3\u6784\u6027\u8fc7\u6e21\"\u9636\u6bb5\uff08\u91d1\u878d\u5316\u3001\u5229\u6da6\u7387\u4e0b\u964d\u3001\u751f\u6001\u5371\u673a\uff09\u3002\n\n**\u7406\u8bba\u610f\u6db5**\uff1a\u4e16\u754c\u4f53\u7cfb\u7ed3\u6784\u5206\u6790\u63d0\u4f9b\u4ece\"\u56fd\u5bb6\u2014\u56fd\u5bb6\"\u5206\u6790\u8f6c\u5411\"\u4f53\u7cfb\u2014\u56fd\u5bb6\"\u5206\u6790\u7684\u8303\u5f0f\uff0c\u5bf9\u7406\u89e3\u957f\u65f6\u6bb5\u5168\u7403\u4e0d\u5e73\u7b49\u3001\u9738\u6743\u66f4\u66ff\u3001\u534a\u8fb9\u7f18\u5d1b\u8d77\uff08\u4e2d\u56fd\u3001\u5370\u5ea6\u3001\u5df4\u897f\uff09\u5177\u6709\u91cd\u8981\u4ef7\u503c\uff08\u53c2\u89c1 Wallerstein \u5377\u4e00\uff1bArrighi\u300a\u6f2b\u957f\u7684 20 \u4e16\u7eaa\u300b\uff1b\u738b\u6b63\u6bc5\uff09\u3002\n\n### 34. \u7b80\u8ff0\u8003\u514b\u65af\u7684\u6279\u5224\u7406\u8bba\u3010\u6a21\u62df-12\u3011\n\n\u7f57\u4f2f\u7279\u00b7\u8003\u514b\u65af\uff08Robert W. Cox\uff09\u662f IPE \u6279\u5224\u5b66\u6d3e\uff08\u65b0\u845b\u5170\u897f\u4e3b\u4e49\uff09\u5960\u57fa\u4eba\uff0c\u4ee3\u8868\u4f5c\u300a\u793e\u4f1a\u529b\u91cf\u3001\u56fd\u5bb6\u4e0e\u4e16\u754c\u79e9\u5e8f\u300b\uff081981\uff09\u3001\u300a\u751f\u4ea7\u3001\u6743\u529b\u4e0e\u4e16\u754c\u79e9\u5e8f\u300b\uff081987\uff09\u3002\u5176\u6279\u5224\u7406\u8bba\u6838\u5fc3\u5185\u5bb9\uff1a\n\n1. **\u7406\u8bba\u7684\u6839\u672c\u7acb\u573a**\uff1a\n   - \u8457\u540d\u547d\u9898\uff1a**\"\u7406\u8bba\u603b\u662f\u4e3a\u67d0\u79cd\u4eba\u3001\u51fa\u4e8e\u67d0\u79cd\u76ee\u7684\"**\uff08\"Theory is always for someone and for some purpose\"\uff09\uff1b\n   - \u533a\u5206\u4e24\u7c7b\u7406\u8bba\uff1a\n     - **\u95ee\u9898\u89e3\u51b3\u7406\u8bba\uff08problem-solving theory\uff09**\uff1a\u628a\u73b0\u884c\u79e9\u5e8f\u53ca\u5176\u6743\u529b\u5173\u7cfb\u89c6\u4e3a\u65e2\u5b9a\uff0c\u601d\u8003\u5982\u4f55\u8ba9\u65e2\u6709\u4f53\u7cfb\u66f4\u987a\u7545\u5730\u8fd0\u884c\uff08\u5982\u65b0\u73b0\u5b9e\u4e3b\u4e49\u3001\u65b0\u81ea\u7531\u5236\u5ea6\u4e3b\u4e49\uff09\uff1b\n     - **\u6279\u5224\u7406\u8bba\uff08critical theory\uff09**\uff1a\u8d28\u7591\u79e9\u5e8f\u672c\u8eab\u7684\u8d77\u6e90\u3001\u7ef4\u7cfb\u4e0e\u53ef\u80fd\u66ff\u4ee3\u65b9\u6848\uff0c\u63ed\u793a\u5176\u9636\u7ea7\u3001\u6587\u5316\u3001\u610f\u8bc6\u5f62\u6001\u57fa\u7840\u3002\n2. **\u5386\u53f2\u7ed3\u6784\u65b9\u6cd5**\uff1a\n   - \u4efb\u4f55**\u5386\u53f2\u7ed3\u6784**\u7531\u4e09\u7ec4\u529b\u91cf\u4e92\u52a8\u6784\u6210\uff1a\u2460**\u7269\u8d28\u80fd\u529b**\uff08\u751f\u4ea7\u529b\u3001\u6280\u672f\u3001\u8d44\u6e90\uff09\uff1b\u2461**\u89c2\u5ff5**\uff08\u610f\u8bc6\u5f62\u6001\u3001\u4e16\u754c\u89c2\u3001\u89c4\u8303\uff09\uff1b\u2462**\u5236\u5ea6**\uff08\u56fd\u5185\u4e0e\u56fd\u9645\u5236\u5ea6\uff09\uff1b\n   - \u4e09\u8005\u5728\u4e09\u4e2a\u5c42\u6b21\u76f8\u4e92\u4f5c\u7528\uff1a**\u751f\u4ea7\u5173\u7cfb\u2014\u56fd\u5bb6\u5f62\u5f0f\u2014\u4e16\u754c\u79e9\u5e8f**\u3002\n3. **\u4e16\u754c\u79e9\u5e8f\u7684\u5f62\u6210**\uff1a\n   - \u4e16\u754c\u79e9\u5e8f\u4e0d\u662f\u56fd\u5bb6\u95f4\u529b\u91cf\u5e73\u8861\u7684\u4ea7\u7269\uff0c\u800c\u662f**\u7279\u5b9a\u751f\u4ea7\u5173\u7cfb\u4e0b\u5f62\u6210\u7684\u56fd\u5bb6\u5f62\u5f0f + \u8de8\u56fd\u9636\u7ea7 + \u56fd\u9645\u5236\u5ea6\u7684\u7efc\u5408**\uff1b\n   - \u4f8b\uff1a\u6218\u540e\"\u5d4c\u5165\u5f0f\u81ea\u7531\u4e3b\u4e49\"\u79e9\u5e8f\u662f\u798f\u7279\u4e3b\u4e49\u751f\u4ea7 + \u51ef\u6069\u65af\u5f0f\u56fd\u5bb6 + \u7f8e\u56fd\u9886\u5bfc\u4e0b\u7684\u591a\u8fb9\u5236\u5ea6\u7684\u4ea7\u7269\u3002\n4. **\u8de8\u56fd\u9636\u7ea7\u4e0e\u5386\u53f2\u96c6\u56e2**\uff1a\n   - \u501f\u7528\u845b\u5170\u897f\u7684\"\u9738\u6743\"\uff08hegemony\uff09\u6982\u5ff5\uff0c\u5f3a\u8c03\u7edf\u6cbb\u4e0d\u4ec5\u9760\u5f3a\u5236\uff0c\u66f4\u9760**\u8d62\u5f97\u88ab\u7edf\u6cbb\u8005\u540c\u610f**\u2014\u2014\u901a\u8fc7\u5171\u4eab\u4e16\u754c\u89c2\u3001\u8de8\u56fd\u8d44\u672c\u4e3b\u4e49\u9636\u7ea7\u8054\u76df\u3001\u77e5\u8bc6\u5171\u540c\u4f53\uff1b\n   - \"\u56fd\u9645\u5316\u7684\u56fd\u5bb6\"\uff08internationalized state\uff09\uff1a\u56fd\u5bb6\u6210\u4e3a\u8de8\u56fd\u8d44\u672c\u4e3b\u4e49\u7684\u5185\u90e8\u4ee3\u7406\u4eba\uff1b\n   - \u4f8b\uff1a1980 \u5e74\u4ee3\u4ee5\u6765\u65b0\u81ea\u7531\u4e3b\u4e49\u5168\u7403\u5316\u5373\u8de8\u56fd\u8d44\u672c + \u5404\u56fd\u884c\u653f\u7cbe\u82f1 + \u56fd\u9645\u5236\u5ea6\u7684\"\u5386\u53f2\u96c6\u56e2\"\u3002\n5. **\u53d8\u8fc1\u52a8\u529b**\uff1a\n   - \u65e2\u6709\u79e9\u5e8f\u7684\u5185\u90e8\u77db\u76fe + \u53cd\u9738\u6743\u8fd0\u52a8 \u2192 \u53ef\u80fd\u5f62\u6210\u65b0\u7684\u5386\u53f2\u96c6\u56e2\uff1b\n   - \u5f53\u4ee3\u5019\u9009\u53cd\u9738\u6743\u8fd0\u52a8\uff1a\u73af\u5883\u8fd0\u52a8\u3001\u52b3\u5de5\u8fd0\u52a8\u3001\u5168\u7403\u5357\u65b9\u5d1b\u8d77\u3001\u5b97\u6559\u8fd0\u52a8\u3002\n6. **\u65b9\u6cd5\u8bba\u7279\u5f81**\uff1a\n   - \u5f3a\u8c03\u5386\u53f2\u6027\u3001\u6574\u4f53\u6027\u3001\u8fa9\u8bc1\u5173\u7cfb\uff1b\n   - \u53cd\u5bf9\u4e3b\u6d41 IPE \u7684\u5b9e\u8bc1\u4e3b\u4e49\u3001\u5f62\u5f0f\u5316\u3001\u53bb\u5386\u53f2\u5316\u503e\u5411\u3002\n\n**\u8bc4\u4ef7**\uff1a\u8003\u514b\u65af\u6279\u5224\u7406\u8bba\u5f00\u8f9f\u4e86 IPE \u7684\"\u6279\u5224\u8f6c\u5411\"\uff0c\u5f71\u54cd\u4e86\u5409\u5c14\uff08Stephen Gill\uff09\u3001\u5e03\u4f26\u7eb3\u3001\u6f58\u5c3c\u5947\u7b49\u5b66\u8005\uff1b\u88ab\u6279\u8bc4\u7ecf\u9a8c\u64cd\u4f5c\u6027\u5f31\u3001\u89c4\u8303\u7acb\u573a\u8fc7\u5f3a\u3002\u5728 21 \u4e16\u7eaa\u9006\u5168\u7403\u5316\u3001\u65b0\u81ea\u7531\u4e3b\u4e49\u53cd\u601d\u6d6a\u6f6e\u4e0b\u5176\u89e3\u91ca\u529b\u518d\u5ea6\u51f8\u663e\uff08\u53c2\u89c1 Cox 1981, 1987\uff1b\u6768\u5149\u658c\u300a\u653f\u6cbb\u5b66\u5bfc\u8bba\u300b\uff1b\u7530\u91ce\u76f8\u5173\u7ae0\u8282\uff09\u3002\n\n### 35. \u7b80\u8ff0\u5e76\u4e3e\u4f8b\u8bf4\u660e\u65af\u7279\u5170\u5947\u7684\"\u7ed3\u6784\u6027\u6743\u529b\"\u3010\u6a21\u62df-12\u3011\n\n\u82cf\u73ca\u00b7\u65af\u7279\u5170\u5947\uff08Susan Strange\uff09\u5728\u300a\u56fd\u5bb6\u4e0e\u5e02\u573a\u300b\uff081988\uff09\u63d0\u51fa**\"\u7ed3\u6784\u6027\u6743\u529b\"\uff08structural power\uff09**\u6982\u5ff5\uff0c\u4e0e\u4f20\u7edf\"\u5173\u7cfb\u6027\u6743\u529b\"\uff08A \u8ba9 B \u505a\u4e0d\u613f\u505a\u4e4b\u4e8b\uff09\u76f8\u5bf9\uff0c\u6307**\u5851\u9020\u4ed6\u4eba\u9009\u62e9\u6846\u67b6\u7684\u6743\u529b**\u3002\u5979\u533a\u5206\u56db\u79cd\u76f8\u4e92\u8054\u7cfb\u7684\u7ed3\u6784\u6027\u6743\u529b\uff1a\n\n1. **\u5b89\u5168\u7ed3\u6784\uff08security structure\uff09**\uff1a\n   - \u63d0\u4f9b\u5b89\u5168\u4fdd\u62a4\u7684\u80fd\u529b\uff08\u9632\u52a1\u3001\u540c\u76df\u3001\u6838\u5a01\u6151\u3001\u6d77\u519b\u57fa\u5730\u7f51\u7edc\uff09\uff1b\n   - **\u4f8b**\uff1a\u7f8e\u56fd\u901a\u8fc7 NATO\u3001\u7f8e\u65e5\u540c\u76df\u3001AUKUS \u4e3a\u76df\u56fd\u63d0\u4f9b\u5b89\u5168\u4f1e\uff0c\u4f7f\u5176\u5728\u5916\u4ea4\u2014\u7ecf\u6d4e\u8bae\u7a0b\u4e0a\u8ddf\u968f\u7f8e\u56fd\u3002\n2. **\u751f\u4ea7\u7ed3\u6784\uff08production structure\uff09**\uff1a\n   - \u51b3\u5b9a**\u4ec0\u4e48\u4ea7\u54c1\u3001\u7531\u8c01\u3001\u5728\u4f55\u5730\u3001\u4ee5\u4ec0\u4e48\u6761\u4ef6\u751f\u4ea7**\u7684\u80fd\u529b\uff1b\n   - \u901a\u8fc7\u8de8\u56fd\u516c\u53f8\u3001\u6280\u672f\u6807\u51c6\u3001\u4ef7\u503c\u94fe\u7ec4\u7ec7\u5b9e\u73b0\uff1b\n   - **\u4f8b**\uff1a\u7f8e\u56fd\u901a\u8fc7\u82f9\u679c\u2014\u53f0\u79ef\u7535\u2014\u5bcc\u58eb\u5eb7\u4ef7\u503c\u94fe\u652f\u914d\u9ad8\u7aef\u7535\u5b50\u4ea7\u54c1\u751f\u4ea7\uff1b\u901a\u8fc7\u300a\u82af\u7247\u6cd5\u6848\u300b\u548c\u51fa\u53e3\u7ba1\u5236\u5851\u9020\u5168\u7403\u534a\u5bfc\u4f53\u751f\u4ea7\u683c\u5c40\u3002\n3. **\u91d1\u878d\u7ed3\u6784\uff08financial structure\uff09**\uff1a\n   - \u51b3\u5b9a**\u4fe1\u7528\u521b\u9020\u4e0e\u8d27\u5e01\u5236\u5ea6**\u7684\u80fd\u529b\uff1b\n   - \u901a\u8fc7\u4e2d\u592e\u94f6\u884c\u2014\u7f8e\u5143\u2014SWIFT\u2014\u4e3b\u8981\u91d1\u878d\u673a\u6784\u7f51\u7edc\u5b9e\u73b0\uff1b\n   - **\u4f8b**\uff1a\u7f8e\u5143\u6e05\u7b97\u4f53\u7cfb\u4f7f\u7f8e\u56fd\u53ef\u5bf9\u4fc4\u7f57\u65af\u3001\u4f0a\u6717\u7b49\u5b9e\u65bd SWIFT \u5207\u65ad\u4e0e\u8d44\u4ea7\u51bb\u7ed3\uff1b\u7f8e\u8054\u50a8\u52a0\u606f\u5468\u671f\u5916\u6ea2\u5168\u7403\u3002\n4. **\u77e5\u8bc6\u7ed3\u6784\uff08knowledge structure\uff09**\uff1a\n   - \u51b3\u5b9a**\u4f55\u4e3a\u6743\u5a01\u77e5\u8bc6\u3001\u8c01\u80fd\u83b7\u5f97\u3001\u5982\u4f55\u4f20\u64ad**\u7684\u80fd\u529b\uff1b\n   - \u901a\u8fc7\u9ad8\u7b49\u6559\u80b2\u3001\u79d1\u7814\u4f53\u7cfb\u3001\u5a92\u4f53\u3001\u6280\u672f\u6807\u51c6\u3001\u4e13\u4e1a\u8bed\u8a00\uff08\u82f1\u8bed\uff09\u5b9e\u73b0\uff1b\n   - **\u4f8b**\uff1a\u7f8e\u56fd\u5927\u5b66\u2014\u667a\u5e93\u2014\u8de8\u56fd\u5a92\u4f53\u5171\u540c\u5851\u9020\u4e3b\u6d41\u7ecf\u6d4e\u5b66\u3001IR \u7406\u8bba\u3001\u56fd\u9645\u6cd5\u8bdd\u8bed\uff1bChatGPT\u3001\u8c37\u6b4c\u3001Meta \u5f62\u6210\u65b0\u4e00\u4ee3\u77e5\u8bc6\u57fa\u7840\u8bbe\u65bd\u3002\n\n**\u56db\u7ed3\u6784\u4e4b\u95f4\u7684\u5173\u7cfb**\uff1a\n- \u76f8\u4e92\u8054\u7cfb\u3001\u76f8\u4e92\u5f3a\u5316\uff08\u91d1\u878d\u9700\u8981\u5b89\u5168\u4fdd\u62a4\u3001\u751f\u4ea7\u9700\u8981\u77e5\u8bc6\u4e0e\u91d1\u878d\u3001\u77e5\u8bc6\u4f20\u64ad\u9700\u8981\u751f\u4ea7\u57fa\u7840\uff09\uff1b\n- \u540c\u4e00\u884c\u4e3a\u4f53\u5728\u56db\u4e2a\u7ed3\u6784\u4e2d\u7684\u4f18\u52bf\u53e0\u52a0 \u2192 \u603b\u4f53\u7ed3\u6784\u6027\u6743\u529b\uff1b\n- **\u7f8e\u56fd\u4e4b\u6240\u4ee5\u662f\u4f53\u7cfb\u6027\u9738\u6743**\uff0c\u56e0\u5176\u5728\u56db\u4e2a\u7ed3\u6784\u4e2d\u5747\u5360\u4e3b\u5bfc\u5730\u4f4d\u3002\n\n**\u65af\u7279\u5170\u5947\u7684\u73b0\u5b9e\u610f\u6db5**\uff1a\n- \u7f8e\u56fd\u5e76\u975e\u5982\u5176\u62b1\u6028\u90a3\u6837\"\u8870\u843d\"\uff0c\u800c\u662f\u6709\u610f\"\u653e\u5f03\u7ba1\u7406\u8d23\u4efb\"\uff1b\n- \u771f\u6b63\u8861\u91cf\u5927\u56fd\u5730\u4f4d\u5e94\u770b\u5176\u5728\u56db\u4e2a\u7ed3\u6784\u4e2d\u7684\u4f4d\u52bf\u53d8\u5316\uff1b\n- \u5f53\u4ee3\u4e2d\u56fd\u5728\u751f\u4ea7\u7ed3\u6784\uff08\u5236\u9020\u4e1a\uff09\u6709\u5f3a\u52bf\u3001\u5728\u77e5\u8bc6\u7ed3\u6784\uff08\u79d1\u7814\u8bba\u6587\u4ea7\u51fa\uff09\u8ffd\u8d76\u3001\u5728\u91d1\u878d\u7ed3\u6784\u548c\u5b89\u5168\u7ed3\u6784\u4ecd\u6709\u8f83\u5927\u5dee\u8ddd\u3002\n\n**\u7406\u8bba\u610f\u4e49**\uff1a\u628a\u6743\u529b\u5206\u6790\u4ece\"\u519b\u4e8b + \u7ecf\u6d4e\u603b\u91cf\"\u4e8c\u7ef4\u6269\u5c55\u4e3a\u56db\u7ef4\u7ed3\u6784\u5206\u6790\uff0c\u4e3a\u975e\u7f8e\u56fd\u5f0f IPE \u5b66\u6d3e\u63d0\u4f9b\u4e86\u91cd\u8981\u5206\u6790\u5de5\u5177\uff08\u53c2\u89c1 Strange\u300a\u56fd\u5bb6\u4e0e\u5e02\u573a\u300b\u4e2d\u8bd1\u672c\uff1b\u7530\u91ce\u7b2c\u56db\u7ae0\uff09\u3002\n\n### 36. \u7b80\u8ff0\u8d39\u5c14\u5357\u591a\u00b7\u6069\u91cc\u514b\u00b7\u5361\u591a\u4f50\u7684\"\u8054\u7cfb\u6027\u4f9d\u9644\u53d1\u5c55\"\u3010\u6a21\u62df-12\u3011\n\n\u5361\u591a\u4f50\uff08F. H. Cardoso\uff0c\u5df4\u897f\u793e\u4f1a\u5b66\u5bb6\u3001\u524d\u603b\u7edf\uff09\u4e0e\u6cd5\u96f7\u6258\u5408\u8457\u300a\u62c9\u4e01\u7f8e\u6d32\u7684\u4f9d\u9644\u4e0e\u53d1\u5c55\u300b\uff081969\uff09\u3002\u9488\u5bf9\u5f17\u5170\u514b\"\u5b97\u4e3b\u2014\u536b\u661f\"\u6a21\u5f0f\u8fc7\u5ea6\u60b2\u89c2\u7684\u51b3\u5b9a\u8bba\uff0c\u4ed6\u63d0\u51fa**\"\u8054\u7cfb\u6027\u4f9d\u9644\u53d1\u5c55\"\uff08associated/dependent development\uff09**\u8fd9\u4e00\u66f4\u5177\u5f39\u6027\u7684\u6846\u67b6\uff1a\n\n1. **\u6838\u5fc3\u547d\u9898**\uff1a\u4f9d\u9644\u4e0e\u53d1\u5c55\u5e76\u975e\u4e92\u65a5\u3002**\u5916\u56f4\u56fd\u5bb6\u53ef\u4ee5\u5728\u4e0e\u4e2d\u5fc3\u4fdd\u6301\u8054\u7cfb\uff08\u7279\u522b\u662f\u5438\u5f15\u8de8\u56fd\u516c\u53f8\u6295\u8d44\uff09\u7684\u8fc7\u7a0b\u4e2d\u5b9e\u73b0\u4e00\u5b9a\u7a0b\u5ea6\u7684\u5de5\u4e1a\u5316\u4e0e\u73b0\u4ee3\u5316**\uff0c\u4f46\u8fd9\u79cd\u53d1\u5c55\u4ecd\u5d4c\u5165\u5e76\u518d\u751f\u4ea7\u4e2d\u5fc3\u2014\u5916\u56f4\u7ed3\u6784\u3002\n2. **\u4e09\u4e2a\u884c\u4e3a\u4f53\u7684\"\u4e09\u89d2\u8054\u76df\"**\uff1a\n   - **\u56fd\u9645\u8de8\u56fd\u516c\u53f8**\uff1a\u5e26\u6765\u8d44\u672c\u3001\u6280\u672f\u3001\u5e02\u573a\u8fdb\u5165\uff1b\n   - **\u672c\u5730\u56fd\u5bb6**\uff1a\u63d0\u4f9b\u57fa\u7840\u8bbe\u65bd\u3001\u653f\u7b56\u6276\u6301\u3001\u5e02\u573a\u4fdd\u62a4\uff0c\u5206\u4eab\u90e8\u5206\u5229\u76ca\uff1b\n   - **\u672c\u5730\u5927\u8d44\u672c**\uff1a\u901a\u8fc7\u5408\u8d44\u3001\u914d\u5957\u3001\u518d\u5206\u5305\u53c2\u4e0e\u4ea7\u4e1a\u94fe\u3002\n   - \u4e09\u8005\u5f62\u6210\u4f9d\u9644\u6027\u53d1\u5c55\u7684\"\u4e09\u89d2\u8054\u76df\"\uff0c\u4e3b\u5bfc\u5916\u56f4\u5de5\u4e1a\u5316\u3002\n3. **\u5386\u53f2\u7ecf\u9a8c**\uff1a\n   - 1950\u20141970 \u5e74\u4ee3\u5df4\u897f\u3001\u58a8\u897f\u54e5\u3001\u963f\u6839\u5ef7\u7684\"\u5947\u8ff9\"\uff1a\u6c7d\u8f66\u3001\u94a2\u94c1\u3001\u5316\u5de5\u7b49\u884c\u4e1a\u9760\u8de8\u56fd\u516c\u53f8\u6295\u8d44\u8fc5\u901f\u589e\u957f\uff1b\n   - \u56fd\u6c11\u7ecf\u6d4e\u5b9e\u73b0\u5de5\u4e1a\u5316\u3001\u57ce\u5e02\u5316\u3001\u4e2d\u4ea7\u9636\u7ea7\u6269\u5f20\uff1b\n   - \u4f46\u519c\u6751\u52b3\u5de5\u3001\u57ce\u5e02\u8d2b\u6c11\u88ab\u6392\u9664\u4e8e\u53d1\u5c55\u4e4b\u5916\uff0c\u5448\"\u6392\u4ed6\u6027\u53d1\u5c55\"\u7279\u5f81\u3002\n4. **\u4f9d\u9644\u6027\u7684\u5185\u5728\u9650\u5236**\uff1a\n   - \u6280\u672f\u4e0e\u8d44\u672c\u4ecd\u4f9d\u8d56\u4e2d\u5fc3\uff1b\n   - \u5229\u6da6\u5927\u91cf\u8f6c\u79fb\u56de\u4e2d\u5fc3\uff08\u7279\u8bb8\u4f7f\u7528\u8d39\u3001\u5229\u6da6\u6c47\u56de\u3001\u6280\u672f\u79df\u91d1\uff09\uff1b\n   - \u4ea7\u4e1a\u5347\u7ea7\u9762\u4e34\u4e2d\u5fc3\u56fd\u5bb6\u6280\u672f\u5c01\u9501\uff1b\n   - \u56fd\u5185\u6536\u5165\u5206\u914d\u4e24\u6781\u5316\u52a0\u5267\u3002\n5. **\u653f\u6cbb\u542b\u4e49**\uff1a\n   - \u4e0e\u5f17\u5170\u514b\u7684\"\u9769\u547d\u8131\u94a9\"\u4e3b\u5f20\u4e0d\u540c\uff0c\u5361\u591a\u4f50**\u627f\u8ba4\u90e8\u5206\u53d1\u5c55\u7a7a\u95f4**\uff0c\u4e3b\u5f20\u901a\u8fc7\u5f3a\u56fd\u5bb6\u3001\u793e\u4f1a\u6539\u9769\u3001\u518d\u5206\u914d\u653f\u7b56\u6765\u4e89\u53d6**\u66f4\u5e73\u8861\u7684\u4f9d\u9644\u6027\u53d1\u5c55**\uff1b\n   - \u5361\u591a\u4f50\u540e\u6765\u62c5\u4efb\u5df4\u897f\u603b\u7edf\uff081995\u20142003\uff09\uff0c\u5b9e\u65bd\u96f7\u4e9a\u5c14\u8ba1\u5212\u3001\u5f3a\u5316\u6c11\u4e3b\u5236\u5ea6\u3001\u6269\u5927\u793e\u4f1a\u4fdd\u969c\uff0c\u90e8\u5206\u4f53\u73b0\u5176\u7406\u8bba\u4e3b\u5f20\u3002\n6. **\u7406\u8bba\u8bc4\u4ef7**\uff1a\n   - \u6bd4\u5f17\u5170\u514b\u66f4\u8d34\u8fd1 1970 \u5e74\u4ee3\u540e\u62c9\u7f8e\u4e0e\u4e1c\u4e9a\u90e8\u5206\u56fd\u5bb6\u7684\u5b9e\u9645\u7ecf\u9a8c\uff1b\n   - \u4f46\u88ab\u5de6\u7ffc\u6279\u8bc4\u4e3a\"\u63a5\u53d7\u4e0d\u5e73\u7b49\u7684\u59a5\u534f\"\uff1b\n   - \u4ecd\u88ab\u90e8\u5206\u5b66\u8005\u89c6\u4e3a\u4f9d\u9644\u8bba\u7684\u6700\u91cd\u8981\u4fee\u6b63\u4e0e\u5ef6\u7eed\uff0c\u662f\u5f53\u4ee3\"\u5168\u7403\u4ef7\u503c\u94fe + \u534a\u8fb9\u7f18\u4e0a\u5347\"\u7814\u7a76\u7684\u601d\u60f3\u524d\u53f2\u3002\n\n**\u5bf9\u4e2d\u56fd\u7814\u7a76\u610f\u4e49**\uff1a\u8054\u7cfb\u6027\u4f9d\u9644\u53d1\u5c55\u6982\u5ff5\u4e3a\u5206\u6790\u4e2d\u56fd 1980 \u5e74\u4ee3\u4ee5\u6765\u7684\"\u5f00\u653e\u578b\u5de5\u4e1a\u5316\"\u2014\u2014\u5927\u91cf\u5f15\u8fdb FDI\u3001\u52a0\u5165\u5168\u7403\u4ef7\u503c\u94fe\u3001\u4fdd\u6301\u56fd\u5bb6\u81ea\u4e3b\u6027\u2014\u2014\u63d0\u4f9b\u4e86\u91cd\u8981\u7406\u8bba\u8d44\u6e90\uff08\u53c2\u89c1 Cardoso & Faletto 1969\uff1b\u738b\u6b63\u6bc5\uff1b\u5b8b\u65b0\u5b81/\u9648\u5cb3\u7b2c\u516d\u7ae0\uff09\u3002\n\n### 37. \u7b80\u8ff0\u5217\u5b81\u7684\u5e1d\u56fd\u4e3b\u4e49\u7406\u8bba\u3010\u6a21\u62df-13\u3011\n\n\u5217\u5b81\u300a\u5e1d\u56fd\u4e3b\u4e49\u662f\u8d44\u672c\u4e3b\u4e49\u7684\u6700\u9ad8\u9636\u6bb5\u300b\uff081916\uff09\u7efc\u5408\u970d\u5e03\u68ee\u3001\u5e0c\u6cd5\u4ead\u7684\u7814\u7a76\uff0c\u63d0\u51fa\u7cfb\u7edf\u7684\u5e1d\u56fd\u4e3b\u4e49\u7406\u8bba\u3002\u5176\u4e94\u5927\u7279\u5f81 + \u653f\u6cbb\u63a8\u8bba\uff1a\n\n1. **\u5e1d\u56fd\u4e3b\u4e49\u7684\u4e94\u5927\u7ecf\u6d4e\u7279\u5f81**\uff1a\n   - \u2460**\u751f\u4ea7\u4e0e\u8d44\u672c\u7684\u96c6\u4e2d**\uff1a\u5784\u65ad\u7ec4\u7ec7\uff08\u5361\u7279\u5c14\u3001\u8f9b\u8fea\u52a0\u3001\u6258\u62c9\u65af\uff09\u4ee3\u66ff\u81ea\u7531\u7ade\u4e89\uff0c\u6210\u4e3a\u7ecf\u6d4e\u57fa\u7840\uff1b\n   - \u2461**\u94f6\u884c\u8d44\u672c\u4e0e\u4ea7\u4e1a\u8d44\u672c\u878d\u5408**\u5f62\u6210**\u91d1\u878d\u5be1\u5934**\uff0c\u63a7\u5236\u56fd\u6c11\u7ecf\u6d4e\u547d\u8109\uff1b\n   - \u2462**\u8d44\u672c\u8f93\u51fa**\u53d6\u4ee3\u5546\u54c1\u8f93\u51fa\uff0c\u6210\u4e3a\u5bf9\u5916\u7ecf\u6d4e\u5173\u7cfb\u7684\u4e3b\u5bfc\u5f62\u5f0f\uff08\u8ffd\u9010\u9ad8\u5229\u6da6\u3001\u51fa\u8def\u8fc7\u5269\u8d44\u672c\uff09\uff1b\n   - \u2463**\u56fd\u9645\u5784\u65ad\u540c\u76df**\u74dc\u5206\u4e16\u754c\u5e02\u573a\uff08\u8de8\u56fd\u5361\u7279\u5c14\uff09\uff1b\n   - \u2464**\u5217\u5f3a\u5bf9\u4e16\u754c\u9886\u571f\u7684\u74dc\u5206\u5b8c\u6210**\u2014\u2014\u6b96\u6c11\u5e1d\u56fd\u4f53\u7cfb\u8fbe\u5230\u9876\u70b9\uff0c\u91cd\u65b0\u74dc\u5206\u9700\u901a\u8fc7\u6218\u4e89\u3002\n2. **\u7406\u8bba\u547d\u9898**\uff1a\n   - \u5e1d\u56fd\u4e3b\u4e49\u662f\u8d44\u672c\u4e3b\u4e49\u53d1\u5c55\u5230\u5784\u65ad\u9636\u6bb5\u7684\u5fc5\u7136\u4ea7\u7269\uff0c\u662f\u8d44\u672c\u4e3b\u4e49\u7684\"**\u6700\u9ad8\u3001\u5bc4\u751f\u7684\u3001\u5782\u6b7b\u9636\u6bb5**\"\uff1b\n   - \u8d44\u672c\u4e3b\u4e49\u5185\u5728\u77db\u76fe\uff08\u751f\u4ea7\u793e\u4f1a\u5316 vs \u8d44\u672c\u4e3b\u4e49\u79c1\u4eba\u5360\u6709\uff09\u5728\u5e1d\u56fd\u4e3b\u4e49\u9636\u6bb5\u8fbe\u5230\u6781\u81f4\uff1b\n   - \u5217\u5f3a\u95f4\u56e0\u74dc\u5206\u4e0d\u5747\u5fc5\u7136\u51b2\u7a81\uff0c**\u5e1d\u56fd\u4e3b\u4e49\u6218\u4e89**\uff08\u5982\u4e00\u6218\uff09\u662f\u4f53\u7cfb\u6027\u4ea7\u7269\u3002\n3. **\u4e0d\u5e73\u8861\u53d1\u5c55\u89c4\u5f8b**\uff1a\n   - \u8d44\u672c\u4e3b\u4e49\u56fd\u5bb6\u53d1\u5c55\u4e0d\u5e73\u8861 \u2192 \u529b\u91cf\u5bf9\u6bd4\u53d8\u5316 \u2192 \u65e2\u6709\u6b96\u6c11/\u52bf\u529b\u8303\u56f4\u5206\u5272\u4e0d\u518d\u7b26\u5408\u5b9e\u529b \u2192 \u6218\u4e89\u91cd\u65b0\u74dc\u5206\uff1b\n   - \u8fd9\u662f 20 \u4e16\u7eaa\u4e24\u6b21\u4e16\u754c\u5927\u6218\u7684\u6839\u672c\u673a\u5236\u3002\n4. **\u653f\u6cbb\u63a8\u8bba**\uff1a\n   - \u9769\u547d\u53ef\u80fd\u5728\u6700\u8584\u5f31\u73af\u8282\u9996\u5148\u7a81\u7834\uff08\"\u4e00\u56fd\u80dc\u5229\u8bba\"\uff09\uff1b\n   - \u6b96\u6c11\u5730\u6c11\u65cf\u89e3\u653e\u8fd0\u52a8\u662f\u4e16\u754c\u9769\u547d\u7684\u540c\u76df\u519b\uff1b\n   - \u5de5\u4eba\u8d35\u65cf\uff08\u88ab\u5e1d\u56fd\u4e3b\u4e49\u8d85\u989d\u5229\u6da6\u6536\u4e70\uff09\u963b\u788d\u9769\u547d\uff0c\u9700\u514b\u670d\u7b2c\u4e8c\u56fd\u9645\u6539\u826f\u4e3b\u4e49\u3002\n5. **\u5386\u53f2\u8bc4\u4ef7\u4e0e\u5f53\u4ee3\u610f\u4e49**\uff1a\n   - **\u89e3\u91ca\u529b**\uff1a\u5bf9\u4e00\u6218\u3001\u6b96\u6c11\u74dc\u5206\u3001\u8de8\u56fd\u5784\u65ad\u3001\u91d1\u878d\u8d44\u672c\u5174\u8d77\u6709\u5f3a\u89e3\u91ca\u529b\uff1b\n   - **\u4e0d\u8db3**\uff1a\u4f4e\u4f30\u8d44\u672c\u4e3b\u4e49\u81ea\u6211\u8c03\u6574\u80fd\u529b\uff08\u798f\u5229\u56fd\u5bb6\u3001\u5e03\u96f7\u987f\u68ee\u6797\u3001\u53bb\u6b96\u6c11\u5316\uff09\uff1b\n   - **\u5f53\u4ee3\u56de\u54cd**\uff1a\u2460\u91d1\u878d\u5316\u4e0e\u8de8\u56fd\u91d1\u878d\u8d44\u672c\u4e3b\u5bfc\uff1b\u2461\u8de8\u56fd\u516c\u53f8\u4e3b\u5bfc\u5168\u7403\u4ef7\u503c\u94fe\uff1b\u2462\u5927\u56fd\u6218\u7565\u7ade\u4e89\u4e0e\u6280\u672f\u5c01\u9501\u53ef\u88ab\u89c6\u4e3a\u65b0\u578b\"\u74dc\u5206\"\uff08\u6570\u5b57\u3001\u592a\u7a7a\u3001\u5173\u952e\u77ff\u4ea7\uff09\uff1b\u2463\"\u5168\u7403\u5357\u65b9\"\u6982\u5ff5\u5ef6\u7eed\u5e1d\u56fd\u4e3b\u4e49\u2014\u6b96\u6c11\u5730\u5206\u6790\u6846\u67b6\u3002\n6. **IPE \u5f71\u54cd**\uff1a\n   - \u5217\u5b81\u7406\u8bba\u662f\u4f9d\u9644\u8bba\u3001\u4e16\u754c\u4f53\u7cfb\u8bba\u3001\u6279\u5224 IPE \u5b66\u6d3e\u7684\u91cd\u8981\u601d\u60f3\u6e90\u5934\uff1b\n   - \u6c83\u52d2\u65af\u5766\u3001\u963f\u745e\u5409\u3001\u798f\u65af\u7279\u7b49\u5747\u627f\u8ba4\u5217\u5b81\u5f71\u54cd\u3002\n\n**\u8bc4\u4ef7**\uff1a\u5217\u5b81\u5e1d\u56fd\u4e3b\u4e49\u8bba\u867d\u4ea7\u751f\u4e8e 20 \u4e16\u7eaa\u521d\uff0c\u5176\u63ed\u793a\u7684**\"\u91d1\u878d\u8d44\u672c\u2014\u8de8\u56fd\u5784\u65ad\u2014\u4e0d\u5e73\u8861\u53d1\u5c55\u2014\u6218\u4e89\"**\u7ed3\u6784\u6027\u903b\u8f91\u5bf9\u7406\u89e3 21 \u4e16\u7eaa\u5927\u56fd\u7ade\u4e89\u4ecd\u5177\u7406\u8bba\u751f\u547d\u529b\uff08\u53c2\u89c1\u5217\u5b81\u300a\u5e1d\u56fd\u4e3b\u4e49\u300b\uff1b\u738b\u6b63\u6bc5\uff1b\u5b8b\u65b0\u5b81/\u9648\u5cb3\u7b2c\u516d\u7ae0\uff09\u3002\n\n### 38. \u718a\u5f7c\u7279\u5bf9\u4e16\u754c\u7ecf\u6d4e\u5468\u671f\u7684\u5206\u6790\u3010\u6a21\u62df-13\u3011\n\n\u718a\u5f7c\u7279\uff08Joseph Schumpeter\uff09\u5728\u300a\u7ecf\u6d4e\u5468\u671f\u300b\uff081939\uff09\u548c\u300a\u8d44\u672c\u4e3b\u4e49\u3001\u793e\u4f1a\u4e3b\u4e49\u4e0e\u6c11\u4e3b\u300b\uff081942\uff09\u4e2d\u7cfb\u7edf\u63d0\u51fa\u57fa\u4e8e**\u521b\u65b0\u9a71\u52a8**\u7684\u4e16\u754c\u7ecf\u6d4e\u5468\u671f\u7406\u8bba\u3002\u8981\u70b9\uff1a\n\n1. **\u521b\u65b0\u4f5c\u4e3a\u6838\u5fc3\u673a\u5236**\uff1a\n   - \u7ecf\u6d4e\u53d1\u5c55\u7684\u6839\u672c\u52a8\u529b\u4e0d\u662f\u5747\u8861\uff0c\u800c\u662f**\u4f01\u4e1a\u5bb6\u521b\u65b0**\u5e26\u6765\u7684\"**\u521b\u9020\u6027\u7834\u574f**\"\uff08creative destruction\uff09\uff1b\n   - \u4e94\u7c7b\u521b\u65b0\uff1a\u2460\u65b0\u4ea7\u54c1\uff1b\u2461\u65b0\u751f\u4ea7\u65b9\u6cd5\uff1b\u2462\u65b0\u5e02\u573a\uff1b\u2463\u65b0\u539f\u6599\u6765\u6e90\uff1b\u2464\u65b0\u7684\u4ea7\u4e1a\u7ec4\u7ec7\u5f62\u5f0f\uff1b\n   - \u521b\u65b0\u6253\u7834\u5747\u8861 \u2192 \u7ecf\u6d4e\u4e0a\u5347\uff1b\u521b\u65b0\u6548\u5e94\u6269\u6563\u5b8c\u6bd5 \u2192 \u6536\u76ca\u4e0b\u964d \u2192 \u5371\u673a\u4e0e\u8c03\u6574 \u2192 \u4e3a\u4e0b\u4e00\u8f6e\u521b\u65b0\u6e05\u573a\u3002\n2. **\u4e09\u5468\u671f\u53e0\u52a0\u6a21\u578b**\uff1a\n   - **\u57fa\u94a6\u5468\u671f\uff08Kitchin\uff09**\uff1a\u7ea6 40 \u4e2a\u6708\uff0c\u5e93\u5b58\u6ce2\u52a8\uff1b\n   - **\u6731\u683c\u62c9\u5468\u671f\uff08Juglar\uff09**\uff1a\u7ea6 9\u201410 \u5e74\uff0c\u8bbe\u5907\u6295\u8d44\u5468\u671f\uff1b\n   - **\u5eb7\u5fb7\u62c9\u5b63\u8036\u592b\u5468\u671f\uff08Kondratieff\uff09**\uff1a\u7ea6 50\u201460 \u5e74\uff0c\u6280\u672f\u9769\u547d\u9a71\u52a8\u7684\u957f\u6ce2\uff1b\n   - \u4e09\u8005\u76f8\u4e92\u53e0\u52a0\u6784\u6210\u603b\u4f53\u7ecf\u6d4e\u6ce2\u52a8\u3002\n3. **\u5eb7\u5fb7\u62c9\u5b63\u8036\u592b\u957f\u6ce2\u4e0e\u6280\u672f\u9769\u547d**\uff1a\n   - \u6bcf\u4e00\u957f\u6ce2\u5bf9\u5e94\u4e00\u7ec4\u4e3b\u5bfc\u6280\u672f\uff1a\u246018 \u4e16\u7eaa\u672b\u201419 \u4e16\u7eaa\u4e2d\uff1a**\u84b8\u6c7d\u673a\u2014\u7eba\u7ec7\u2014\u94c1\u8def**\uff1b\u246119 \u4e16\u7eaa\u4e2d\u201420 \u4e16\u7eaa\u521d\uff1a**\u94a2\u94c1\u2014\u7535\u6c14\u2014\u5316\u5de5**\uff1b\u246220 \u4e16\u7eaa\u4e2d\u20141970s\uff1a**\u6c7d\u8f66\u2014\u77f3\u6cb9\u5316\u5de5\u2014\u5927\u89c4\u6a21\u751f\u4ea7**\uff1b\u24631980s\u20142010s\uff1a**\u4fe1\u606f\u6280\u672f\u2014\u4e92\u8054\u7f51**\uff1b\u2464\u5f53\u4e0b\uff1a**AI\u2014\u65b0\u80fd\u6e90\u2014\u751f\u7269\u6280\u672f**\uff08\u5019\u9009\uff09\uff1b\n   - \u6bcf\u4e00\u957f\u6ce2\u4e0a\u5347\u671f = \u4e3b\u5bfc\u6280\u672f\u6269\u6563 + \u6295\u8d44\u65fa\u76db + \u4ef7\u683c\u4e0a\u5347\uff1b\u4e0b\u964d\u671f = \u6280\u672f\u9971\u548c + \u8fc7\u5269\u4ea7\u80fd + \u5371\u673a\uff1b\n   - \u5371\u673a\u4e0d\u662f\u5931\u8d25\uff0c\u800c\u662f\"\u521b\u9020\u6027\u7834\u574f\"\u7684\u5fc5\u8981\u73af\u8282\uff0c\u4e3a\u65b0\u6280\u672f\u817e\u51fa\u7a7a\u95f4\u3002\n4. **\u4f01\u4e1a\u5bb6\u4e0e\u4f01\u4e1a\u7ec4\u7ec7\u6f14\u5316**\uff1a\n   - \u65e9\u671f\uff1a\u4e2a\u4eba\u4f01\u4e1a\u5bb6\u521b\u65b0\uff1b\n   - 20 \u4e16\u7eaa\uff1a\u5927\u4f01\u4e1a R&D \u5b9e\u9a8c\u5ba4\"\u5e38\u89c4\u5316\"\u521b\u65b0\uff08\u7ba1\u7406\u578b\u8d44\u672c\u4e3b\u4e49\uff09\uff1b\n   - \u4f46\"\u5e38\u89c4\u5316\"\u4f1a\u524a\u5f31\u4f01\u4e1a\u5bb6\u7cbe\u795e\uff0c\u5b55\u80b2\u8d44\u672c\u4e3b\u4e49\u7684\"\u6210\u529f\u7684\u5931\u8d25\"\u2014\u2014\u718a\u5f7c\u7279\u60b2\u89c2\u9884\u8a00\u3002\n5. **\u7ecf\u6d4e\u5468\u671f\u7684\u56fd\u9645\u7ef4\u5ea6**\uff1a\n   - \u521b\u65b0\u4e0e\u957f\u6ce2\u5728\u4e16\u754c\u7ecf\u6d4e\u4e2d\u6269\u6563\uff1b\n   - \u4e3b\u5bfc\u6280\u672f\u56fd = \u8be5\u957f\u6ce2\u7684\u4e16\u754c\u7ecf\u6d4e\u9738\u4e3b\uff1b\n   - \u957f\u6ce2\u8f6c\u6298 = \u9738\u6743\u66f4\u66ff\u7a97\u53e3\uff08\u5982\u7f8e\u56fd\u5728\u4e8c\u6218\u540e\u63a5\u66ff\u82f1\u56fd\uff0c\u5bf9\u5e94\u7535\u6c14\u2014\u5316\u5de5\u2014\u6c7d\u8f66\u957f\u6ce2\uff09\uff1b\n   - \u5f53\u4ee3\u7ade\u4e89 = \u8c01\u80fd\u7387\u5148\u6293\u4f4f\u65b0\u957f\u6ce2\uff08AI\u3001\u65b0\u80fd\u6e90\u3001\u751f\u7269\u79d1\u6280\uff09\u3002\n6. **\u653f\u7b56\u542b\u4e49**\uff1a\n   - \u53cd\u5784\u65ad\u4e0d\u80fd\u627c\u6740\u5927\u4f01\u4e1a\u521b\u65b0\uff1b\n   - \u5371\u673a\u65f6\u4e0d\u5e94\u8fc7\u5ea6\u6551\u52a9\u50f5\u5c38\u4f01\u4e1a\uff0c\u5e94\u5141\u8bb8\"\u521b\u9020\u6027\u7834\u574f\"\uff1b\n   - \u56fd\u5bb6\u5e94\u652f\u6301\u57fa\u7840\u7814\u7a76\u4e0e\u6559\u80b2\uff0c\u57f9\u80b2\u521b\u65b0\u751f\u6001\u3002\n\n**\u8bc4\u4ef7**\uff1a\u718a\u5f7c\u7279\u5468\u671f\u8bba\u662f\u628a**\u6280\u672f\u3001\u4f01\u4e1a\u5bb6\u3001\u5236\u5ea6\u3001\u4e16\u754c\u7ecf\u6d4e**\u7edf\u4e00\u8d77\u6765\u7684\u5b8f\u5927\u7406\u8bba\uff0c\u5bf9\u7406\u89e3\u957f\u65f6\u6bb5\u4e16\u754c\u7ecf\u6d4e\u6f14\u53d8\u548c\u5f53\u4ee3\u6280\u672f\u7ade\u4e89\u5177\u6709\u6301\u7eed\u89e3\u91ca\u529b\uff08\u53c2\u89c1 Schumpeter 1939, 1942\uff1b\u66fc\u5fb7\u5c14\u300a\u665a\u671f\u8d44\u672c\u4e3b\u4e49\u300b\uff1b\u5b8b\u65b0\u5b81/\u9648\u5cb3\u7b2c\u516b\u7ae0\uff09\u3002\n\n### 39. \u7b80\u8ff0\u4e2d\u592e\u94f6\u884c\u72ec\u7acb\u6027\u7684\u7406\u7531\u3010\u6a21\u62df-13\u3011\n\n\u592e\u884c\u72ec\u7acb\u6027\uff08central bank independence, CBI\uff09\u6307\u4e2d\u592e\u94f6\u884c\u5728\u5236\u5b9a\u8d27\u5e01\u653f\u7b56\u65f6**\u4e0d\u53d7\u884c\u653f\u5f53\u5c40\u76f4\u63a5\u6307\u4ee4\u3001\u8ffd\u6c42\u957f\u671f\u7269\u4ef7\u7a33\u5b9a\u76ee\u6807**\u7684\u5236\u5ea6\u5b89\u6392\u30021990 \u5e74\u4ee3\u4ee5\u6765\u5728\u5168\u7403\u6269\u6563\uff0c\u7406\u8bba\u7406\u7531\uff1a\n\n1. **\u65f6\u95f4\u4e0d\u4e00\u81f4\u95ee\u9898\uff08time inconsistency\uff09**\uff1a\n   - Kydland & Prescott\uff081977\uff09\u3001Barro & Gordon\uff081983\uff09\u8bc1\u660e\uff1a\u5728\u76f8\u673a\u51b3\u7b56\u4e0b\uff0c\u653f\u5e9c\u4e8b\u524d\u627f\u8bfa\"\u4f4e\u901a\u80c0\"\uff0c\u4f46\u4e8b\u540e\u603b\u6709\u523a\u6fc0\u4ea7\u51fa\u7684\u8bf1\u60d1\uff08\u83f2\u5229\u666e\u65af\u66f2\u7ebf\u77ed\u671f\u6743\u8861\uff09\uff0c\u5bfc\u81f4**\u901a\u80c0\u504f\u5411**\uff08inflation bias\uff09\uff1b\n   - \u89e3\u51b3\u65b9\u6848\uff1a\u628a\u8d27\u5e01\u653f\u7b56**\u59d4\u6258\u7ed9\u72ec\u7acb\u7684\u3001\u89c4\u5219\u5316\u7684\u3001\u4fdd\u5b88\u7684\u592e\u884c**\u2014\u2014\u901a\u8fc7\u5236\u5ea6\u627f\u8bfa\u514b\u670d\u65f6\u95f4\u4e0d\u4e00\u81f4\u95ee\u9898\u3002\n2. **\u653f\u6cbb\u5546\u4e1a\u5468\u671f\u7ea6\u675f\uff08PBC\uff09**\uff1a\n   - \u6c11\u9009\u653f\u5e9c\u6709\u52a8\u673a\u5229\u7528\u8d27\u5e01\u653f\u7b56\u64cd\u7eb5\u9009\u4e3e\u5468\u671f\uff08\u9009\u4e3e\u524d\u523a\u6fc0\u3001\u9009\u4e3e\u540e\u7d27\u7f29\uff09\uff1b\n   - \u72ec\u7acb\u592e\u884c\u53ef\u9694\u79bb\u8fd9\u79cd\u77ed\u89c6\u538b\u529b\uff0c\u7ef4\u6301\u957f\u671f\u7269\u4ef7\u7a33\u5b9a\u3002\n3. **\u59d4\u6258\u4ee3\u7406\u4e0e\u53ef\u4fe1\u627f\u8bfa**\uff1a\n   - \u592e\u884c\u72ec\u7acb\u6027 = \u9009\u6c11\u628a\u8d27\u5e01\u653f\u7b56\u6743\u59d4\u6258\u7ed9\"\u4ee3\u7406\u4eba\"\u4ee5\u7ea6\u675f\u672a\u6765\"\u81ea\u6211\"\uff1b\n   - \u7c7b\u4f3c\u4e8e\"\u5965\u5fb7\u8d5b\u628a\u81ea\u5df1\u7ed1\u5728\u6845\u6746\u4e0a\"\u2014\u2014\u901a\u8fc7\u81ea\u6211\u7ea6\u675f\u83b7\u5f97\u957f\u671f\u6536\u76ca\uff08\u4f4e\u901a\u80c0\u3001\u4f4e\u5229\u7387\u6ea2\u4ef7\u3001\u7a33\u5b9a\u9884\u671f\uff09\u3002\n4. **\u7ecf\u9a8c\u8bc1\u636e**\uff1a\n   - **Alesina & Summers\uff081993\uff09**\uff1a\u8de8\u56fd\u5bf9\u6bd4\u663e\u793a\u592e\u884c\u72ec\u7acb\u6027\u6307\u6570\u4e0e\u5e73\u5747\u901a\u80c0\u7387\u663e\u8457\u8d1f\u76f8\u5173\uff0c\u4e14\u4e0e\u4ea7\u51fa\u589e\u957f\u4e0d\u663e\u8457\u76f8\u5173\uff08\u4e0d\u635f\u5bb3\u5b9e\u4f53\u7ecf\u6d4e\uff09\uff1b\n   - \u540e\u7eed\u7814\u7a76\u8bc1\u5b9e\u72ec\u7acb\u592e\u884c + \u901a\u80c0\u76ee\u6807\u5236\uff08inflation targeting\uff09\u80fd\u7a33\u5b9a\u901a\u80c0\u9884\u671f\u3002\n5. **\u91d1\u878d\u7a33\u5b9a\u804c\u80fd**\uff1a\n   - \u72ec\u7acb\u592e\u884c\u66f4\u80fd\u5728\u91d1\u878d\u5371\u673a\u65f6\u505a\u51fa\"\u6700\u540e\u8d37\u6b3e\u4eba\"\u51b3\u7b56\u800c\u4e0d\u53d7\u77ed\u671f\u653f\u6cbb\u8003\u91cf\u5e72\u6270\uff1b\n   - \u4f8b\uff1a2008 \u5e74\u7f8e\u8054\u50a8\u5e94\u5bf9\u6b21\u8d37\u5371\u673a\u7684\u679c\u65ad\u884c\u52a8\u3002\n6. **\u56fd\u9645\u4fe1\u8a89**\uff1a\n   - \u72ec\u7acb\u592e\u884c \u2192 \u56fd\u9645\u6295\u8d44\u8005\u9884\u671f\u7a33\u5b9a \u2192 \u4e3b\u6743\u503a\u5229\u7387\u6ea2\u4ef7\u4f4e\u3001\u6c47\u7387\u6ce2\u52a8\u5c0f\uff1b\n   - \u662f\u65b0\u5174\u5e02\u573a\u91d1\u878d\u81ea\u7531\u5316\u6539\u9769\u7684\u6807\u914d\u3002\n7. **\u5bf9\u72ec\u7acb\u6027\u7684\u53cd\u9a73**\uff1a\n   - **\u6c11\u4e3b\u95ee\u8d23\u5f31\u5316**\uff1a\u672a\u7ecf\u9009\u4e3e\u7684\u6280\u672f\u5b98\u50da\u638c\u63a7\u5173\u952e\u7ecf\u6d4e\u653f\u7b56\uff0c\u5b58\u5728\u6c11\u4e3b\u8d64\u5b57\uff1b\n   - **\u4fdd\u5b88\u504f\u5411**\uff1a\u592e\u884c\u503e\u5411\u901a\u80c0\u63a7\u5236\uff0c\u53ef\u80fd\u727a\u7272\u5c31\u4e1a\u4e0e\u589e\u957f\uff1b\n   - **\u4e0d\u5e94\"\u653f\u6cbb\u4e2d\u7acb\"\u5e7b\u89c9**\uff1a\u8d27\u5e01\u653f\u7b56\u672c\u8d28\u4e0a\u6709\u5206\u914d\u6548\u5e94\uff08\u5229\u7387\u653f\u7b56\u5f71\u54cd\u503a\u6743\u4eba vs \u503a\u52a1\u4eba\u3001\u8d44\u4ea7\u6301\u6709\u8005 vs \u5de5\u85aa\uff09\uff0c\u72ec\u7acb\u6027\u63a9\u76d6\u4e86\u653f\u6cbb\u9009\u62e9\uff1b\n   - **\u5371\u673a\u540e\u53cd\u601d**\uff1a2008 \u5371\u673a\u540e\u592e\u884c\u5927\u89c4\u6a21 QE \u63a8\u5347\u8d44\u4ea7\u4ef7\u683c\u3001\u52a0\u5267\u8d2b\u5bcc\u5206\u5316\uff0c\u51f8\u663e\u592e\u884c\u653f\u6cbb\u5f71\u54cd\u4e0d\u53ef\u56de\u907f\uff1b\n   - \u7fdf\u4e1c\u5347\u7b49\u4e2d\u56fd\u5b66\u8005\u4e3b\u5f20\"\u6c11\u672c\u4e3b\u4e49\"\u91cd\u5ba1\u592e\u884c\u72ec\u7acb\u6027\u3002\n8. **\u4e2d\u56fd\u60c5\u5883**\uff1a\n   - \u4e2d\u56fd\u4eba\u6c11\u94f6\u884c\u5728\u56fd\u52a1\u9662\u9886\u5bfc\u4e0b\u8fd0\u4f5c\uff0c\u72ec\u7acb\u6027\u8f83\u5f31\uff1b\n   - \u4f46\u6267\u884c\u529b\u5f3a\u3001\u653f\u7b56\u534f\u540c\u5ea6\u9ad8\uff1b\n   - \u592e\u884c\u72ec\u7acb\u6027\u5e94\u6839\u636e\u56fd\u60c5\u3001\u53d1\u5c55\u9636\u6bb5\u3001\u653f\u6cbb\u4f53\u5236\u7efc\u5408\u6743\u8861\u3002\n\n**\u7406\u8bba\u610f\u6db5**\uff1aCBI \u662f\u65b0\u81ea\u7531\u4e3b\u4e49\u8d27\u5e01\u6cbb\u7406\u8303\u5f0f\u7684\u6838\u5fc3\u5236\u5ea6\u5b89\u6392\uff0c\u53cd\u6620\u4e86\"\u4ee5\u5236\u5ea6\u7ea6\u675f\u653f\u6cbb\"\u7684\u516c\u5171\u9009\u62e9\u601d\u8def\uff0c\u4e5f\u662f\u5f53\u524d\u5168\u7403\u8d27\u5e01\u653f\u7b56\u6b63\u5e38\u5316\u3001\u91d1\u878d\u7a33\u5b9a\u6cbb\u7406\u7684\u4e89\u8bae\u7126\u70b9\uff08\u53c2\u89c1 Kydland & Prescott 1977\uff1bAlesina & Summers 1993\uff1b\u7530\u91ce\u7b2c\u4e03\u7ae0\uff09\u3002\n\n---\n\n## Part III \u8bba\u8ff0\u9898\uff0828 \u9898\uff09\n\n> \u4f53\u4f8b\uff1a\u6bcf\u9898 800\u20131200 \u5b57\uff0c\u5305\u542b\u7406\u8bba\u6846\u67b6 + \u7ecf\u9a8c/\u6848\u4f8b + \u653f\u7b56\u8bc4\u4ef7/\u4e2d\u56fd\u610f\u6db5\u3002\n\n### 1. \u8bba\u8ff0\u4e9a\u5f53\u00b7\u65af\u5bc6\u5173\u4e8e\u81ea\u7531\u8d38\u6613\u4e0e\u56fd\u5bb6\u5e72\u9884\u7684\u4e3b\u8981\u89c2\u70b9\u3010\u6a21\u62df-1\u3011\n\n\u4e9a\u5f53\u00b7\u65af\u5bc6\uff08Adam Smith, 1723\u20141790\uff09\u5728\u300a\u56fd\u5bcc\u8bba\u300b\uff081776\uff09\u4e2d\u5960\u5b9a\u53e4\u5178\u7ecf\u6d4e\u81ea\u7531\u4e3b\u4e49\u4f20\u7edf\u3002\u5e38\u88ab\u8bef\u8bfb\u4e3a\"\u5c0f\u653f\u5e9c\u3001\u7edd\u5bf9\u81ea\u7531\u653e\u4efb\"\u7684\u4ee3\u8868\uff0c\u4e8b\u5b9e\u4e0a\u4ed6\u5bf9\u81ea\u7531\u8d38\u6613\u4e0e\u56fd\u5bb6\u5e72\u9884\u7684\u7acb\u573a\u8fdc\u4e3a\u7ec6\u81f4\u3002\n\n**\u4e00\u3001\u81ea\u7531\u8d38\u6613\u7684\u6838\u5fc3\u8bba\u8bc1**\n\n1. **\"\u770b\u4e0d\u89c1\u7684\u624b\"\u4e0e\u5206\u5de5\u8bf4**\uff1a\u5e02\u573a\u4e2d\u8ffd\u6c42\u81ea\u5229\u7684\u4e2a\u4f53\u5728\u4ef7\u683c\u673a\u5236\u5f15\u5bfc\u4e0b\u4ea7\u751f\u516c\u76ca\u7ed3\u679c\u3002**\u5206\u5de5\u5e26\u6765\u751f\u4ea7\u6548\u7387\u500d\u589e**\uff0c\u800c\u5206\u5de5\u7684\u6df1\u5ea6\u53d7\u9650\u4e8e\u5e02\u573a\u89c4\u6a21\u2014\u2014\u56e0\u6b64\u6269\u5927\u5e02\u573a\uff08\u542b\u5bf9\u5916\u8d38\u6613\uff09\u80fd\u4e0d\u65ad\u6df1\u5316\u5206\u5de5\u3001\u63d0\u5347\u751f\u4ea7\u7387\u3002\n2. **\u7edd\u5bf9\u4f18\u52bf\u8bba**\uff1a\u4e0e\u91cd\u5546\u4e3b\u4e49\"\u8d38\u6613\u5373\u96f6\u548c\"\u9488\u950b\u76f8\u5bf9\uff0c\u65af\u5bc6\u8bba\u8bc1\uff1a**\u5404\u56fd\u5e94\u4e13\u95e8\u751f\u4ea7\u81ea\u5df1\u5177\u6709\u7edd\u5bf9\u4f18\u52bf\u7684\u4ea7\u54c1\uff0c\u901a\u8fc7\u4ea4\u6362\u4e92\u5229**\uff0c\u4f7f\u603b\u4ea7\u51fa\u6700\u5927\u5316\u3002\n3. **\u53cd\u5bf9\u91cd\u5546\u4e3b\u4e49**\uff1a\u6279\u5224\u8d38\u6613\u987a\u5dee\u5d07\u62dc\u4e0e\u91d1\u94f6\u5806\u79ef\uff0c\u6307\u51fa\u771f\u6b63\u8d22\u5bcc\u662f\u52b3\u52a8\u4ea7\u51fa\u800c\u975e\u91d1\u94f6\uff1b\u4fdd\u62a4\u4e3b\u4e49\u5173\u7a0e\u4e0e\u6b96\u6c11\u5784\u65ad\u626d\u66f2\u8d44\u6e90\u914d\u7f6e\u3001\u62ac\u9ad8\u6d88\u8d39\u6210\u672c\u3001\u627c\u6740\u521b\u65b0\u3002\n4. **\u53cd\u5bf9\u5784\u65ad\u4e0e\u7279\u8bb8\u516c\u53f8**\uff1a\u6279\u8bc4\u4e1c\u5370\u5ea6\u516c\u53f8\u7b49\"\u91cd\u5546\u8d44\u672c\"\u7684\u5784\u65ad\u7279\u6743\uff0c\u8ba4\u4e3a\u5176\u52fe\u7ed3\u56fd\u5bb6\u3001\u635f\u5bb3\u6d88\u8d39\u8005\u4e0e\u5c0f\u751f\u4ea7\u8005\u3002\n\n**\u4e8c\u3001\u5bf9\u56fd\u5bb6\u5e72\u9884\u7684\u5408\u7406\u8fb9\u754c**\n\n\u65af\u5bc6\u7edd\u975e\"\u65e0\u653f\u5e9c\u653e\u4efb\u4e3b\u4e49\"\u3002\u4ed6\u627f\u8ba4\u56fd\u5bb6\u4e09\u9879\u57fa\u672c\u804c\u80fd\uff08\u300a\u56fd\u5bcc\u8bba\u300b\u7b2c\u4e94\u5377\uff09\uff1a\u2460**\u56fd\u9632**\uff1b\u2461**\u53f8\u6cd5**\uff08\u4fdd\u62a4\u4ea7\u6743\u4e0e\u5c65\u7ea6\uff09\uff1b\u2462**\u516c\u5171\u5de5\u7a0b\u4e0e\u516c\u5171\u673a\u6784**\uff08\u9053\u8def\u3001\u6865\u6881\u3001\u6559\u80b2\u3001\u94f8\u5e01\u3001\u90ae\u653f\u7b49\u4e0d\u80fd\u7531\u79c1\u4eba\u63d0\u4f9b\u6216\u4e0d\u613f\u63d0\u4f9b\u7684\u516c\u5171\u7269\u54c1\uff09\u3002\n\n\u66f4\u91cd\u8981\u7684\u662f\uff0c\u65af\u5bc6\u4e3a**\u56fd\u5bb6\u5e72\u9884\u8d38\u6613**\u7559\u6709\u91cd\u8981\u4f8b\u5916\uff1a\n1. **\u56fd\u9632\u4f8b\u5916**\uff1a\u5f53\u8d38\u6613\u54c1\u6d89\u53ca\u56fd\u9632\uff08\u5982\u6d77\u8fd0\u80fd\u529b\u3001\u519b\u5de5\u539f\u6599\uff09\u65f6\uff0c**\u4e3a\u7ef4\u62a4\u56fd\u9632\u80fd\u529b\u53ef\u4fdd\u62a4\u672c\u56fd\u76f8\u5173\u4ea7\u4e1a**\u3002\u4ed6\u660e\u786e\u652f\u6301\u300a\u822a\u6d77\u6761\u4f8b\u300b\uff081651\uff09\u2014\u2014\"\u5b83\uff08\u822a\u6d77\u6761\u4f8b\uff09\u4e5f\u8bb8\u662f\u82f1\u56fd\u6240\u6709\u5546\u4e1a\u6cd5\u89c4\u4e2d\u6700\u806a\u660e\u7684\u4e00\u9879\"\u3002\n2. **\u62a5\u590d\u6027\u5173\u7a0e**\uff1a\u5f53\u4ed6\u56fd\u5bf9\u672c\u56fd\u51fa\u53e3\u5f81\u9ad8\u5173\u7a0e\u65f6\uff0c**\u6709\u7406\u7531\u91c7\u53d6\u62a5\u590d\u6027\u5173\u7a0e\u8feb\u4f7f\u5bf9\u65b9\u8ba9\u6b65**\u3002\n3. **\u7a0e\u8d1f\u516c\u5e73\u4f8b\u5916**\uff1a\u672c\u56fd\u4ea7\u4e1a\u627f\u62c5\u91cd\u7a0e\u65f6\uff0c\u5e94\u5bf9\u540c\u7c7b\u8fdb\u53e3\u54c1\u5f81\u6536\u7b49\u989d\u5173\u7a0e\u4ee5\u7ef4\u6301\u516c\u5e73\u7ade\u4e89\u3002\n4. **\u6e10\u8fdb\u5f00\u653e\u4f8b\u5916**\uff1a\u7a81\u7136\u64a4\u9664\u4fdd\u62a4\u53ef\u80fd\u9020\u6210\u5927\u89c4\u6a21\u5931\u4e1a\uff0c**\u5e94\u6e10\u8fdb\u63a8\u8fdb\u81ea\u7531\u5316**\uff0c\u914d\u5957\u518d\u5c31\u4e1a\u5b89\u6392\u3002\n5. **\u91d1\u878d\u4e0e\u94f6\u884c\u76d1\u7ba1**\uff1a\u65af\u5bc6\u652f\u6301\u5bf9\u82cf\u683c\u5170\u5c0f\u949e\u7968\u53d1\u884c\u7684\u7ba1\u5236\uff0c\u627f\u8ba4\u91d1\u878d\u9886\u57df\u5e02\u573a\u5931\u7075\u7684\u53ef\u80fd\u3002\n\n**\u4e09\u3001\u81ea\u7531\u8d38\u6613\u4e0e\u793e\u4f1a\u516c\u6b63**\n\n\u65af\u5bc6\u300a\u9053\u5fb7\u60c5\u64cd\u8bba\u300b\u5f3a\u8c03\u5546\u4e1a\u793e\u4f1a\u7684\u4f26\u7406\u57fa\u7840\uff1a\u8bda\u4fe1\u3001\u4fe1\u4efb\u3001\u540c\u60c5\uff1b\u5546\u4e1a\u79e9\u5e8f\u4f9d\u8d56\u6cd5\u6cbb\u4e0e\u9053\u5fb7\u7ea6\u675f\uff0c**\u7eaf\u7cb9\u81ea\u5229\u4e0d\u6784\u6210\u6301\u4e45\u79e9\u5e8f**\u3002\u4ed6\u6279\u8bc4\u5265\u524a\u52b3\u5de5\u3001\u5784\u65ad\u5730\u79df\u3001\u5546\u4eba\u96c6\u56e2\u7684\"\u5bc6\u8c0b\u53cd\u5bf9\u516c\u4f17\"\u3002\n\n**\u56db\u3001\u5f53\u4ee3\u610f\u4e49\u4e0e\u4eba\u5927\u6559\u6750\u7acb\u573a**\n\n\u4eba\u5927\u6a0a\u52c7\u660e\u3001\u5b8b\u65b0\u5b81\u7b49\u6559\u6750\u80af\u5b9a\u65af\u5bc6\u7684\u6838\u5fc3\u8d21\u732e\uff0c\u540c\u65f6\u6307\u51fa\uff1a\n1. \u65af\u5bc6\u81ea\u7531\u8d38\u6613\u8bba\u7684\u524d\u63d0\u6761\u4ef6\u2014\u2014\u5927\u4f53\u5e73\u7b49\u7684\u56fd\u5bb6\u3001\u4e0d\u5b58\u5728\u5916\u90e8\u6027\u3001\u8981\u7d20\u6d41\u52a8\u987a\u7545\u2014\u2014\u5728\u73b0\u5b9e\u4e2d\u5f80\u5f80\u4e0d\u5177\u5907\uff1b\n2. \u674e\u65af\u7279\u3001\u6c49\u5bc6\u5c14\u987f\u5bf9\u65af\u5bc6\u7684\u56de\u5e94\u2014\u2014\u540e\u53d1\u56fd\u5bb6\u4e0d\u80fd\u7b80\u5355\u7167\u642c\u2014\u2014\u5177\u6709\u6b63\u5f53\u6027\uff1b\n3. **\u65af\u5bc6\u7684\"\u56fd\u5bb6\u804c\u80fd + \u516c\u5e73\u4f8b\u5916\"\u7acb\u573a**\u6bd4 19 \u4e16\u7eaa\u67ef\u5e03\u767b\u5f0f\u7eaf\u7cb9\u81ea\u7531\u8d38\u6613\u4e3b\u4e49\u66f4\u5177\u5f39\u6027\uff0c\u5bf9\u5f53\u4ee3\u5168\u7403\u5316\u53cd\u601d\uff08\u516c\u5e73\u8d38\u6613\u3001\u4ea7\u4e1a\u653f\u7b56\u3001\u518d\u5206\u914d\uff09\u6709\u91cd\u8981\u542f\u793a\u3002\n\n**\u4e94\u3001\u653f\u7b56\u8bc4\u4ef7**\n\n\u65af\u5bc6\u7684\"\u81ea\u7531\u8d38\u6613 + \u5fc5\u8981\u56fd\u5bb6\u5e72\u9884\"\u6846\u67b6\u5728 21 \u4e16\u7eaa\u5448\u73b0\u65b0\u751f\u547d\u529b\uff1a\u2460\u62dc\u767b\"\u65b0\u534e\u76db\u987f\u5171\u8bc6\"\u91cd\u7533\u4ea7\u4e1a\u653f\u7b56\u4e0e\u56fd\u5bb6\u5e72\u9884\u5408\u6cd5\u6027\uff1b\u2461\"\u81ea\u7531\u5f00\u653e\u4f46\u6709\u6761\u4ef6\"\u7684\u8d38\u6613\u7406\u5ff5\u88ab\u591a\u56fd\u63a5\u53d7\uff1b\u2462\u65af\u5bc6\u7684\"\u56fd\u9632\u4f8b\u5916\"\u88ab\u5e7f\u6cdb\u63f4\u5f15\u4e3a\u534a\u5bfc\u4f53\u3001\u5173\u952e\u77ff\u4ea7\u7ba1\u63a7\u7684\u7406\u8bba\u4f9d\u636e\u3002\u5176\u6839\u672c\u542f\u793a\u662f\uff1a**\u81ea\u7531\u8d38\u6613\u670d\u52a1\u4e8e\u516c\u5171\u5229\u76ca\uff0c\u800c\u975e\u76f8\u53cd\uff1b\u56fd\u5bb6\u804c\u80fd\u4e0d\u662f\u5e02\u573a\u5bf9\u7acb\u9762\uff0c\u800c\u662f\u5e02\u573a\u826f\u6027\u8fd0\u884c\u7684\u5fc5\u8981\u6761\u4ef6**\uff08\u53c2\u89c1 Smith\u300a\u56fd\u5bcc\u8bba\u300b\u5377\u56db\u7b2c\u4e8c\u7ae0\uff1b\u5409\u5c14\u5e73\u7b2c\u4e8c\u7ae0\uff1b\u6a0a\u52c7\u660e\u7b2c\u4e09\u7ae0\uff1b\u5b8b\u65b0\u5b81/\u9648\u5cb3\u7b2c\u4e8c\u7ae0\uff09\u3002\n\n### 2. \u8fd0\u7528\u6240\u5b66 IPE \u7406\u8bba\u5206\u6790 WTO \u591a\u54c8\u56de\u5408\u8c08\u5224\u7684\u56f0\u5883\u3010\u6a21\u62df-1\u3011\n\n\u591a\u54c8\u56de\u5408\uff08Doha Development Round\uff09\u4e8e 2001 \u5e74 11 \u6708\u5728\u5361\u5854\u5c14\u591a\u54c8\u542f\u52a8\uff0c\u539f\u672c\u8ba1\u5212\u4e8e 2005 \u5e74\u5b8c\u6210\uff0c\u65e8\u5728\u901a\u8fc7\u8fdb\u4e00\u6b65\u8d38\u6613\u81ea\u7531\u5316\u63a8\u52a8\u53d1\u5c55\u4e2d\u56fd\u5bb6\u53d1\u5c55\u3002\u7136\u800c\u5386\u7ecf 20 \u4f59\u5e74\u8c08\u5224\u4ecd\u672a\u5b8c\u6210\u6838\u5fc3\u8bae\u9898\uff0c\u5df2\u88ab\u666e\u904d\u89c6\u4e3a\"\u7834\u88c2\"\u6216\"\u65e0\u9650\u671f\u6401\u7f6e\"\u3002\u53ef\u4ece\u591a\u91cd IPE \u7406\u8bba\u89c6\u89d2\u89e3\u6790\u5176\u56f0\u5883\u3002\n\n**\u4e00\u3001\u96c6\u4f53\u884c\u52a8\u56f0\u5883\u4e0e\u8bae\u7a0b\u8fc7\u8f7d**\n\n\u5965\u5c14\u68ee\u5f0f\u96c6\u4f53\u884c\u52a8\u903b\u8f91\uff1aWTO \u5df2\u6709 164 \u4e2a\u6210\u5458\uff0c\u51b3\u7b56\u91c7\"\u534f\u5546\u4e00\u81f4\"\u539f\u5219\uff0c**\u4efb\u4f55\u6210\u5458\u4e8b\u5b9e\u4e0a\u62e5\u6709\u5426\u51b3\u6743**\u3002\u8bae\u7a0b\u6db5\u76d6\u519c\u4e1a\u3001\u975e\u519c\u4ea7\u54c1\u3001\u670d\u52a1\u3001\u77e5\u8bc6\u4ea7\u6743\u3001\u8d38\u6613\u4fbf\u5229\u5316\u3001\u89c4\u5219\uff08\u53cd\u503e\u9500\u3001\u8865\u8d34\u3001\u6e14\u4e1a\u8865\u8d34\uff09\u3001\u4e89\u7aef\u89e3\u51b3\u6539\u9769\u3001\u53d1\u5c55\u8bae\u9898\u7b49\u591a\u4e2a\u9886\u57df\uff0c**\u8bae\u7a0b\u8d85\u8f7d + \u591a\u8fb9\u4e00\u81f4\u95e8\u69db**\u4f7f\u8bae\u7a0b\u96be\u4ee5\u63a8\u8fdb\u3002\n\n**\u4e8c\u3001\u9738\u6743\u9886\u5bfc\u771f\u7a7a\uff08\u91d1\u5fb7\u5c14\u4f2f\u683c-\u514b\u62c9\u65af\u7eb3\u89c6\u89d2\uff09**\n\n\u542f\u52a8\u591a\u54c8\u56de\u5408\u65f6\u7f8e\u56fd\u4ecd\u5177\u9738\u6743\u9886\u5bfc\u610f\u613f\uff08\"\u5c0f\u5e03\u4ec0\u8d38\u6613\u4fc3\u8fdb\u6743\"\uff09\uff0c\u4f46 2008 \u5e74\u5371\u673a\u540e**\u7f8e\u56fd\u5bf9\u591a\u8fb9\u8d38\u6613\u4f53\u5236\u7684\u9886\u5bfc\u610f\u613f\u6025\u5267\u4e0b\u964d**\uff1a\u5965\u5df4\u9a6c\u8f6c\u5411 TPP\u3001RCEP \u7b49\"\u9ad8\u6807\u51c6\"\u8bf8\u8fb9\u8def\u5f84\uff1b\u7279\u6717\u666e\u76f4\u63a5\u9000\u7fa4\uff08TPP\uff09\u3001\u963b\u6320 WTO \u4e0a\u8bc9\u673a\u6784\u6cd5\u5b98\u4efb\u547d\u4f7f\u5176 2019 \u5e74\u762b\u75ea\u3002**\u9886\u5bfc\u771f\u7a7a\u5bfc\u81f4\u516c\u5171\u7269\u54c1\u4f9b\u7ed9\u4e2d\u65ad**\uff0c\u591a\u54c8\u9677\u5165\"\u65e0\u56fd\u5bb6\u613f\u610f\u627f\u62c5\u8c08\u5224\u63a8\u52a8\u6210\u672c\"\u7684\u56f0\u5883\u3002\n\n**\u4e09\u3001\u65b0\u5174\u5927\u56fd\u7684\u5d1b\u8d77\u4e0e\u8bae\u9898\u91cd\u6784**\n\n\u4e2d\u56fd 2001 \u5e74\u5165\u4e16\uff0c\u5370\u5ea6\u3001\u5df4\u897f\u7b49\u65b0\u5174\u5927\u56fd\u5728\u591a\u54c8\u8c08\u5224\u4e2d\u626e\u6f14\u91cd\u8981\u89d2\u8272\uff1a\n- **G-20 \u96c6\u56e2\uff08\u519c\u4e1a\u8c08\u5224\uff09**\uff1a\u5370\u5ea6\u3001\u5df4\u897f\u3001\u963f\u6839\u5ef7\u7b49\u9886\u8854\uff0c**\u8981\u6c42\u53d1\u8fbe\u56fd\u5bb6\u524a\u51cf\u519c\u4e1a\u8865\u8d34**\u4e0e\u9ad8\u5173\u7a0e\uff1b\n- **G-33 \u96c6\u56e2**\uff1a\u4ee5\u5370\u5ea6\u4e3a\u4ee3\u8868\uff0c**\u8981\u6c42\u4fdd\u62a4\u7cae\u98df\u5b89\u5168\u548c\u5c0f\u519c\u751f\u8ba1**\uff08\u7279\u6b8a\u4ea7\u54c1 + \u7279\u6b8a\u4fdd\u969c\u673a\u5236\uff09\uff1b\n- **G-90**\uff1a\u6700\u4e0d\u53d1\u8fbe\u56fd\u5bb6\u96c6\u56e2\uff0c\u8981\u6c42\"\u5c11\u4e92\u60e0\"\u4e0e\u53d1\u5c55\u63f4\u52a9\uff1b\n- \u5404\u96c6\u56e2 vs \u7f8e\u6b27\u5f62\u6210\u591a\u91cd\u5bf9\u5cd9\uff0c\u8c08\u5224\u7ed3\u6784\u8fdc\u6bd4\u4e4c\u62c9\u572d\u56de\u5408\uff08\u7f8e\u6b27\u4e3b\u5bfc\uff09\u590d\u6742\u3002\n\n**\u56db\u3001\u793e\u4f1a\u8054\u76df\u89c6\u89d2\uff08Rogowski / Hiscox\uff09**\n\n\u53d1\u8fbe\u56fd\u5bb6\u56fd\u5185\u53cd\u8d38\u6613\u8054\u76df\u58ee\u5927\uff1a\n- \u7f8e\u56fd\u94c1\u9508\u5e26\u5236\u9020\u4e1a\u5de5\u4eba\u3001\u519c\u4e1a\u5229\u76ca\u96c6\u56e2\u7ec4\u6210\u5f3a\u5927\u53cd\u81ea\u7531\u8d38\u6613\u8054\u76df\uff1b\n- \u6b27\u76df\u5185\u6cd5\u3001\u610f\u519c\u4e1a\u96c6\u56e2\uff08\u7279\u522b\u662f CAP \u53d7\u76ca\u8005\uff09\u62b5\u5236\u519c\u4e1a\u81ea\u7531\u5316\uff1b\n- \u53d1\u5c55\u4e2d\u56fd\u5bb6\u5c0f\u519c + \u5236\u9020\u4e1a\u5229\u76ca\u96c6\u56e2\u62b5\u5236\u5168\u9762\u81ea\u7531\u5316\uff1b\n- \u5404\u65b9\u56fd\u5185\u53cd\u81ea\u7531\u5316\u538b\u529b\u4f7f\u653f\u5e9c\u96be\u4ee5\u505a\u51fa\u8ba9\u6b65\uff08\u53cc\u5c42\u535a\u5f08\"\u5c0f\u8d62\u96c6\"\u6536\u7f29\uff09\u3002\n\n**\u4e94\u3001\u8bae\u9898\u8054\u63a5\u56f0\u5883\uff08\u57fa\u6b27\u6c49/\u5948\u590d\u5408\u76f8\u4e92\u4f9d\u8d56\uff09**\n\n\u591a\u54c8\u91c7\u53d6\"\u5355\u4e00\u627f\u8bfa\"\uff08single undertaking\uff09\u539f\u5219\u2014\u2014\u6240\u6709\u8bae\u9898\u5fc5\u987b\u6253\u5305\u901a\u8fc7\uff0c**\u4efb\u4e00\u8bae\u9898\u50f5\u5c40\u5373\u62d6\u7d2f\u5168\u5c40**\u3002\u519c\u4e1a\uff08\u7f8e\u6b27 vs \u5370\u5df4\uff09\u3001NAMA\uff08\u7f8e\u6b27 vs \u4e2d\u5370\uff09\u3001\u670d\u52a1\uff08\u7f8e vs \u5370\u5df4\uff09\u3001\u77e5\u8bc6\u4ea7\u6743\uff08\u836f\u54c1 vs \u5236\u836f\uff09\u7b49\u5404\u8bae\u9898\u6b7b\u7ed3\u76f8\u4e92\u7ed1\u5b9a\u3002\u8bae\u9898\u8054\u63a5\u672c\u610f\u662f\u4fc3\u5408\u4f5c\uff0c\u7ed3\u679c\u53cd\u800c\u4e92\u76f8\u5426\u51b3\u3002\n\n**\u516d\u3001\"\u5d4c\u5165\u5f0f\u81ea\u7531\u4e3b\u4e49\"\u7684\u74e6\u89e3**\n\nRuggie \u6982\u5ff5\uff1a\"\u5d4c\u5165\u5f0f\u81ea\u7531\u4e3b\u4e49\"\u2014\u2014\u6218\u540e\u79e9\u5e8f\u5728\u56fd\u9645\u5f00\u653e\u4e0e\u56fd\u5185\u518d\u5206\u914d/\u798f\u5229\u56fd\u5bb6\u95f4\u53d6\u5f97\u5e73\u8861\u30021980 \u5e74\u4ee3\u540e\u65b0\u81ea\u7531\u4e3b\u4e49\u5168\u7403\u5316\u6253\u7834\u8fd9\u4e00\u5e73\u8861\uff0c**\u5168\u7403\u5316\u6536\u76ca\u9ad8\u5ea6\u96c6\u4e2d\u3001\u635f\u5931\u5e7f\u6cdb\u5206\u6563**\uff0c\u5f15\u53d1\u5e7f\u6cdb\u793e\u4f1a\u53cd\u5f39\u3002\u591a\u54c8\u8c08\u5224\u6070\u9022\u8fd9\u4e00\u53cd\u5f39\u5468\u671f\uff0c\u53d1\u8fbe\u56fd\u5bb6\u56fd\u5185\u5df2\u65e0\u653f\u6cbb\u7a7a\u95f4\u7ee7\u7eed\u5f00\u653e\u3002\n\n**\u4e03\u3001\u53cc\u8f68\u5236\u5ea6\u4f9b\u7ed9\u4e0e\u591a\u54c8\u88ab\u7ed5\u8fc7**\n\n\u4e3b\u8981\u56fd\u5bb6\u4e0d\u518d\u4f9d\u8d56\u591a\u54c8\uff0c\u8f6c\u5411\u533a\u57df\u548c\u53cc\u8fb9\u8def\u5f84\uff1a\u2460\u7f8e\u56fd\u4e3b\u5bfc\u7684 TPP\uff08\u540e CPTPP\uff09\u3001USMCA\u3001IPEF\uff1b\u2461\u6b27\u76df FTA \u7f51\u7edc\uff1b\u2462\u4e2d\u56fd\u4e3b\u5bfc\u7684 RCEP\u3001\u4e00\u5e26\u4e00\u8def\uff1b\u2463\u8bf8\u8fb9\u534f\u8bae\uff08\u8d38\u6613\u4fbf\u5229\u5316\u534f\u8bae TFA 2017 \u901a\u8fc7\u3001\u4fe1\u606f\u6280\u672f\u534f\u8bae\u6269\u5c55\uff09\u3002**\u591a\u54c8\u6210\u4e3a\"\u7ed5\u4e0d\u5f00\u4f46\u8d70\u4e0d\u901a\"\u7684\u6b7b\u7ed3**\u3002\n\n**\u516b\u3001\u7ed3\u6784\u6027\u539f\u56e0\uff1a\u8d38\u6613\u653f\u6cbb\u7684\"OEP\"\u903b\u8f91\u53d8\u8fc1**\n\n20 \u4e16\u7eaa 90 \u5e74\u4ee3\u540e\u8d38\u6613\u51b2\u51fb\u4ece\"\u4ea7\u4e1a\u95f4\u51b2\u51fb\"\u8f6c\u5411\"\u5168\u7403\u4ef7\u503c\u94fe\u5185\u51b2\u51fb\"\u2014\u2014\u540c\u4e00\u516c\u53f8\u5728\u4e0d\u540c\u56fd\u5bb6\u914d\u7f6e\u751f\u4ea7\uff0c\u4f20\u7edf\u7684\"\u884c\u4e1a vs \u884c\u4e1a\"\u653f\u6cbb\u8ba9\u4f4d\u4e8e\"\u56fd\u5bb6 vs \u56fd\u5bb6\"\u3001\"\u4e2d\u592e vs \u5730\u65b9\"\u590d\u6742\u535a\u5f08\u3002WTO \u65e7\u89c4\u5219\u8d8a\u6765\u8d8a\u8131\u79bb\u5b9e\u9645\u8d38\u6613\u5f62\u5f0f\uff08\u6570\u5b57\u8d38\u6613\u3001\u8de8\u5883\u670d\u52a1\u3001\u6570\u636e\u6d41\u3001\u534a\u5bfc\u4f53\u7ba1\u5236\u51e0\u4e4e\u672a\u6db5\u76d6\uff09\u3002\n\n**\u4e5d\u3001\u653f\u7b56\u8bc4\u4ef7\u4e0e\u4e2d\u56fd\u7acb\u573a**\n\n\u4e2d\u56fd\u4e00\u8d2f\u4e3b\u5f20\uff1a\u2460\u575a\u6301\u591a\u8fb9\u8d38\u6613\u4f53\u5236\u6838\u5fc3\u5730\u4f4d\uff1b\u2461\u652f\u6301\u591a\u54c8\u56de\u5408\"\u65e9\u671f\u6536\u83b7\"\uff1b\u2462\u63a8\u52a8 WTO \u6539\u9769\uff08\u4e89\u7aef\u89e3\u51b3\u673a\u5236\u91cd\u542f\u3001\u4e0a\u8bc9\u673a\u6784\u6539\u9769\u3001\u7279\u6b8a\u4e0e\u5dee\u522b\u5f85\u9047\u7ec6\u5316\u3001\u8865\u8d34\u900f\u660e\u5ea6\u7b49\uff09\u3002\u540c\u65f6\uff0c\u4e2d\u56fd\u901a\u8fc7 RCEP\u3001CPTPP \u7533\u8bf7\u3001DEPA \u7533\u8bf7\u7b49\u533a\u57df\u8def\u5f84\u8865\u4f4d\u3002\n\n**\u5341\u3001\u7406\u8bba\u7ed3\u8bba**\n\n\u591a\u54c8\u56de\u5408\u56f0\u5883\u662f**\u96c6\u4f53\u884c\u52a8\u56f0\u5883 + \u9738\u6743\u9886\u5bfc\u771f\u7a7a + \u65b0\u5174\u5927\u56fd\u5d1b\u8d77 + \u8bae\u9898\u8054\u63a5\u8fc7\u8f7d + \u5d4c\u5165\u5f0f\u81ea\u7531\u4e3b\u4e49\u74e6\u89e3**\u7b49\u591a\u91cd\u56e0\u7d20\u53e0\u52a0\u7684\u7ed3\u679c\u3002\u5176\u672c\u8d28\u662f 20 \u4e16\u7eaa\u540e\u671f\u56fd\u9645\u7ecf\u6d4e\u79e9\u5e8f\u5728 21 \u4e16\u7eaa\u6743\u529b\u7ed3\u6784\u4e0e\u793e\u4f1a\u57fa\u7840\u53d8\u5316\u4e0b\u7684\u9002\u5e94\u5371\u673a\u3002\u91cd\u542f\u4e4b\u8def\u9700\u8981\uff1a\u2460\u51cf\u5c11\u8bae\u7a0b\u8d1f\u62c5\uff08\u805a\u7126\u6570\u5b57\u8d38\u6613\u3001\u7eff\u8272\u8d38\u6613\u3001\u4e89\u7aef\u89e3\u51b3\u7b49\u53ef\u8fbe\u6210\u8bae\u9898\uff09\uff1b\u2461\u591a\u901f\u5ea6\u63a8\u8fdb\uff08\u5141\u8bb8\u8bf8\u8fb9\uff09\uff1b\u2462\u63a8\u52a8\u65b0\u5174\u5927\u56fd\u4e0e\u5b88\u6210\u5927\u56fd\u7684\u8d23\u4efb\u518d\u5206\u914d\uff08\u53c2\u89c1\u57fa\u6b27\u6c49\u300a\u9738\u6743\u4e4b\u540e\u300b\uff1bKrasner 1983\uff1b\u7530\u91ce\u7b2c\u4e09\u3001\u56db\u7ae0\uff1b\u5b8b\u65b0\u5b81/\u9648\u5cb3\u7b2c\u56db\u7ae0\uff09\u3002\n\n### 3. \u8bba\u8ff0\u79d1\u65af\u5b9a\u7406\u7684\u56fd\u9645\u5173\u7cfb\u6db5\u4e49\u3010\u6a21\u62df-2\u3011\n\n\u79d1\u65af\u5b9a\u7406\uff08Coase Theorem\uff09\u7531\u7f57\u7eb3\u5fb7\u00b7\u79d1\u65af\u5728\u300a\u793e\u4f1a\u6210\u672c\u95ee\u9898\u300b\uff081960\uff09\u63d0\u51fa\uff0c\u662f\u65b0\u5236\u5ea6\u7ecf\u6d4e\u5b66\u7684\u57fa\u77f3\u3002\u5176\u5728\u56fd\u9645\u5173\u7cfb\u4e2d\u7684\u5f15\u7533\uff0c\u6784\u6210\u65b0\u5236\u5ea6\u4e3b\u4e49 IPE \u7684\u7406\u8bba\u652f\u67f1\u4e4b\u4e00\u3002\n\n**\u4e00\u3001\u79d1\u65af\u5b9a\u7406\u7684\u4e24\u4e2a\u7248\u672c**\n\n1. **\u79d1\u65af\u7b2c\u4e00\u5b9a\u7406**\uff1a\u5728**\u4ea4\u6613\u6210\u672c\u4e3a\u96f6\u3001\u4ea7\u6743\u6e05\u6670**\u7684\u6761\u4ef6\u4e0b\uff0c\u65e0\u8bba\u521d\u59cb\u4ea7\u6743\u5982\u4f55\u5206\u914d\uff0c\u5e02\u573a\u8c08\u5224\u90fd\u4f1a\u8fbe\u5230\u5e15\u7d2f\u6258\u6700\u4f18\u914d\u7f6e\u3002\n2. **\u79d1\u65af\u7b2c\u4e8c\u5b9a\u7406**\uff08\"\u53cd\u5411\"\u79d1\u65af\uff09\uff1a\u5728**\u4ea4\u6613\u6210\u672c\u4e3a\u6b63**\u7684\u73b0\u5b9e\u4e16\u754c\u4e2d\uff0c**\u4ea7\u6743\u521d\u59cb\u5b89\u6392\u4f1a\u5f71\u54cd\u6700\u7ec8\u914d\u7f6e\u6548\u7387**\uff0c\u56e0\u6b64\u5236\u5ea6\u8bbe\u8ba1\u672c\u8eab\u5177\u6709\u6548\u7387\u542b\u4e49\u3002\n\n**\u4e8c\u3001\u5bf9\u56fd\u9645\u5173\u7cfb\u7814\u7a76\u7684\u6838\u5fc3\u5f15\u7533**\n\n1. **\u8de8\u5883\u5916\u90e8\u6027\u7684\u89e3\u51b3\u673a\u5236**\uff1a\n   - \u56fd\u9645\u5173\u7cfb\u4e2d\u5b58\u5728\u5927\u91cf\u8de8\u5883\u5916\u90e8\u6027\uff08\u6c61\u67d3\u3001\u91d1\u878d\u5371\u673a\u4f20\u67d3\u3001\u5b89\u5168\u5916\u6ea2\uff09\uff1b\n   - \u5728\u4ea4\u6613\u6210\u672c\u6781\u4f4e\u3001\u53c2\u4e0e\u65b9\u5c11\u3001\u5229\u76ca\u6e05\u6670\u7684\u60c5\u51b5\u4e0b\uff0c**\u56fd\u5bb6\u95f4\u53ef\u901a\u8fc7\u8c08\u5224\u5185\u90e8\u5316\u5916\u90e8\u6027**\uff0c\u65e0\u9700\u9738\u6743\u6216\u96c6\u4e2d\u673a\u5236\uff1b\n   - \u4f8b\uff1a\u7f8e\u52a0\u8fb9\u5883\u8de8\u5883\u6c61\u67d3\u4e89\u7aef\u901a\u8fc7\u53cc\u8fb9\u8c08\u5224\u4e0e\u8865\u507f\u673a\u5236\u89e3\u51b3\uff08\u5982\u7279\u96f7\u5c14\u51b6\u70bc\u5382\u6848\uff09\u3002\n2. **\u56fd\u9645\u5236\u5ea6\u7684\u529f\u80fd\u6027\u8d77\u6e90**\uff1a\n   - \u7b2c\u4e8c\u5b9a\u7406\u63a8\u8bba\uff1a\u73b0\u5b9e\u4e2d\u56fd\u5bb6\u95f4\u4ea4\u6613\u6210\u672c\u4e0d\u53ef\u80fd\u4e3a\u96f6\uff08\u4fe1\u606f\u4e0d\u5bf9\u79f0\u3001\u8c08\u5224\u56f0\u96be\u3001\u8fdd\u7ea6\u98ce\u9669\u3001\u653f\u6cbb\u5f02\u8d28\u6027\uff09\uff1b\n   - **\u56fd\u9645\u5236\u5ea6\u7684\u6839\u672c\u529f\u80fd\u5c31\u662f\u964d\u4f4e\u56fd\u5bb6\u95f4\u4ea4\u6613\u6210\u672c**\u2014\u2014\u63d0\u4f9b\u4fe1\u606f\uff08\u900f\u660e\u5ea6\u5ba1\u8bae\uff09\u3001\u7a33\u5b9a\u9884\u671f\uff08\u89c4\u5219\u5316\uff09\u3001\u964d\u4f4e\u6267\u884c\u6210\u672c\uff08\u4e89\u7aef\u89e3\u51b3\uff09\uff1b\n   - \u57fa\u6b27\u6c49\u300a\u9738\u6743\u4e4b\u540e\u300b\uff081984\uff09\u7cfb\u7edf\u5730\u628a\u79d1\u65af\u2014\u8bfa\u601d\u2014\u5a01\u5ec9\u59c6\u68ee\u7684\u4ea4\u6613\u6210\u672c\u6846\u67b6\u5f15\u5165 IPE\uff1a**\u56fd\u9645\u673a\u5236\u662f\u56fd\u5bb6\u5e94\u5bf9\u5e02\u573a\u5931\u7075\u7684\u5408\u4f5c\u5de5\u5177\uff0c\u5373\u4fbf\u9738\u6743\u8870\u843d\uff0c\u5236\u5ea6\u56e0\"\u6c89\u6ca1\u6210\u672c + \u8def\u5f84\u4f9d\u8d56\"\u4ecd\u53ef\u7ef4\u6301\u5408\u4f5c**\u3002\n3. **\u4ea7\u6743\u754c\u5b9a\u7684\u56fd\u9645\u7248**\uff1a\n   - \u56fd\u9645\u5236\u5ea6\u672c\u8d28\u4e0a\u662f**\u5bf9\u56fd\u5bb6\u95f4\u6743\u5229\u4e49\u52a1\u7684\u754c\u5b9a**\u2014\u2014\u5982\u6d
